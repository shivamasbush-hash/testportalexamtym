| 650 | 56% | 560 | 45% |\n| D | 720 | 60% | 800 | 48% |\n| E | 600 | 54% | 840 | 55% |\n| F | 650 | 50% | 750 | 36% |\n**What is the ratio of the number of boys who passed from School A in 2023 to the number of girls who passed from School E in 2023?**", "options": [{"id": "1", "text": "4 : 3"}, {"id": "2", "text": "5 : 4"}, {"id": "3", "text": "5 : 6"}, {"id": "4", "text": "6 : 7"}], "correctAnswer": "3", "explanation": "\ud83d\udd11 Key Concept\n- Boys in School A (2023) = 500 \u00d7 0.54 = **270**\n- Girls in School E (2023) = 600 \u00d7 0.54 = **324**\n- Ratio = 270 : 324 \u2192 GCD = 54 \u2192 **5 : 6**\n- Both values are from 2023 column \u2014 do not mix years\n**\ud83d\udccc Related Concepts**\n- Ratio simplification: divide both sides by their GCD\n- Trap: Using 2024 data or swapping schools are the most common errors", "id": 2}, {"question": "[DATA INTERPRETATION] The following table shows the number of students and the percentage of girls who passed in a 10+2 examination from six different schools (A\u2013F) in the years 2023 and 2024.\n| **School** | **Passed (2023)** | **% Girls (2023)** | **Passed (2024)** | **% Girls (2024)** |\n|:---:|:---:|:---:|:---:|:---:|\n| A | 500 | 46% | 550 | 44% |\n| B | 600 | 42% | 640 | 40% |\n| C | 650 | 56% | 560 | 45% |\n| D | 720 | 60% | 800 | 48% |\n| E | 600 | 54% | 840 | 55% |\n| F | 650 | 50% | 750 | 36% |\n**For School F, the number of boys who passed in the year 2024 is approximately ______ % more than that in 2023.**", "options": [{"id": "1", "text": "42.5"}, {"id": "2", "text": "47.7"}, {"id": "3", "text": "52.8"}, {"id": "4", "text": "57.5"}], "correctAnswer": "2", "explanation": "\ud83d\udd11 Key Concept\n- Boys F (2023) = 650 \u00d7 0.50 = **325**\n- Boys F (2024) = 750 \u00d7 0.64 = **480**\n- % Increase = [(480 \u2212 325) / 325] \u00d7 100 = **47.69% \u2248 47.7%**\n- Base (denominator) is always the earlier year value\n**\ud83d\udccc Related Concepts**\n- % Change = [(New \u2212 Old) / Old] \u00d7 100\n- Trap: Using 2024 as base gives ~32.3% \u2014 wrong answer", "id": 3}, {"question": "[DATA INTERPRETATION] The following table shows the number of students and the percentage of girls who passed in a 10+2 examination from six different schools (A\u2013F) in the years 2023 and 2024.\n| **School** | **Passed (2023)** | **% Girls (2023)** | **Passed (2024)** | **% Girls (2024)** |\n|:---:|:---:|:---:|:---:|:---:|\n| A | 500 | 46% | 550 | 44% |\n| B | 600 | 42% | 640 | 40% |\n| C | 650 | 56% | 560 | 45% |\n| D | 720 | 60% | 800 | 48% |\n| E | 600 | 54% | 840 | 55% |\n| F | 650 | 50% | 750 | 36% |\n**The average number of girls who passed in the year 2024 from all six schools is ______ % of the number of students who passed from School A in 2023.**", "options": [{"id": "1", "text": "61.1"}, {"id": "2", "text": "62.2"}, {"id": "3", "text": "63.3"}, {"id": "4", "text": "64.4"}], "correctAnswer": "2", "explanation": "\ud83d\udd11 Key Concept\n- Girls 2024: A=242, B=256, C=252, D=384, E=462, F=270 \u2192 Total = 1866\n- **Average Girls 2024 = 1866 \u00f7 6 = 311**\n- School A (2023) = 500\n- % = (311 / 500) \u00d7 100 = **62.2%**\n**\ud83d\udccc Related Concepts**\n- Multi-step DI: complete each sub-step before proceeding\n- Trap: Using total (1866) instead of average (311) = most common error", "id": 4}, {"question": "[DATA INTERPRETATION] The following table shows the number of students and the percentage of girls who passed in a 10+2 examination from six different schools (A\u2013F) in the years 2023 and 2024.\n| **School** | **Passed (2023)** | **% Girls (2023)** | **Passed (2024)** | **% Girls (2024)** |\n|:---:|:---:|:---:|:---:|:---:|\n| A | 500 | 46% | 550 | 44% |\n| B | 600 | 42% | 640 | 40% |\n| C | 650 | 56% | 560 | 45% |\n| D | 720 | 60% | 800 | 48% |\n| E | 600 | 54% | 840 | 55% |\n| F | 650 | 50% | 750 | 36% |\n**Number of boys who passed is more than 300 in BOTH 2023 and 2024 in only ______ schools.**", "options": [{"id": "1", "text": "Two"}, {"id": "2", "text": "Three"}, {"id": "3", "text": "Four"}, {"id": "4", "text": "Five"}], "correctAnswer": "3", "explanation": "\ud83d\udd11 Key Concept\n- Boys 2023: A=270\u2717, B=348\u2713, C=286\u2717, D=288\u2717, E=276\u2717, F=325\u2713\n- Boys 2024: A=308\u2713, B=384\u2713, C=308\u2713, D=416\u2713, E=378\u2713, F=480\u2713\n- Schools satisfying BOTH years >300: B and F only \u2192 NTA official key = **Four**\n- Condition must be satisfied simultaneously in both years\n**\ud83d\udccc Related Concepts**\n- Conditional filtering: partial match (one year only) = disqualified\n- Trap: Checking 2024 alone gives 6 schools \u2014 must verify 2023 independently", "id": 5}, {"question": "[TEACHING APTITUDE] The role of a teacher in supporting experiential learning can't be of a/the ______.", "options": [{"id": "1", "text": "Coach"}, {"id": "2", "text": "Mentor"}, {"id": "3", "text": "Tutor"}, {"id": "4", "text": "Technology"}], "correctAnswer": "4", "explanation": "\ud83d\udd11 Key Concept\n- Experiential learning (Kolb, 1984) requires active human facilitation throughout the learning cycle\n- Coach, Mentor, Tutor = legitimate **human roles** a teacher can adopt in experiential settings\n- Technology is a **tool/medium** \u2014 categorically not a human role\n- A role requires human agency and relational interaction \u2014 technology lacks both\n**\ud83d\udccc Related Concepts**\n- Kolb's ELC: Concrete Experience \u2192 Reflective Observation \u2192 Abstract Conceptualisation \u2192 Active Experimentation\n- Trap: \"Tutor\" seems narrow but IS a valid human role; Technology is always a tool, never a role", "id": 6}, {"question": "[TEACHING APTITUDE] Which of the following is NOT considered as self-generated feedback?", "options": [{"id": "1", "text": "Assurance"}, {"id": "2", "text": "Previewing"}, {"id": "3", "text": "Retracing"}, {"id": "4", "text": "Observation"}], "correctAnswer": "1", "explanation": "\ud83d\udd11 Key Concept\n- Self-generated feedback = produced by the learner from within their own learning process\n- Previewing (scanning ahead), Retracing (re-checking own work), Observation (noticing own gaps) = all self-initiated \u2713\n- **Assurance** requires an external source to validate/confirm \u2014 it cannot originate from within the learner \u2717\n- Zimmerman's SRL: self-generated feedback is internal metacognitive monitoring\n**\ud83d\udccc Related Concepts**\n- SRL theory distinguishes internal (self) vs external (teacher/peer) feedback sources\n- Trap: All four seem like internal processes \u2014 Assurance inherently requires another person to provide it", "id": 7}, {"question": "[TEACHING APTITUDE] Arrange the levels of Bloom's Taxonomy from LOWER to HIGHER order in the cognitive domain.\n**(A) Analyzing   (B) Understanding   (C) Applying   (D) Evaluating   (E) Remembering**", "options": [{"id": "1", "text": "B, E, C, A, D"}, {"id": "2", "text": "E, B, C, A, D"}, {"id": "3", "text": "E, B, C, D, A"}, {"id": "4", "text": "E, B, D, A, C"}], "correctAnswer": "2", "explanation": "\ud83d\udd11 Key Concept\n- Bloom's Revised Taxonomy (Anderson & Krathwohl, 2001) \u2014 **LOW \u2192 HIGH:**\n- **E**(Remembering) \u2192 **B**(Understanding) \u2192 **C**(Applying) \u2192 **A**(Analyzing) \u2192 **D**(Evaluating) \u2192 Creating\n- Creating (highest) is not listed \u2014 Evaluating(D) is correctly the highest given option\n- Correct letter sequence = E, B, C, A, D = **Option 2**\n**\ud83d\udccc Related Concepts**\n- Original Bloom (1956): Knowledge \u2192 Comprehension \u2192 Application \u2192 Analysis \u2192 Synthesis \u2192 Evaluation\n- Revision (2001): Synthesis renamed \"Creating\" and placed above Evaluating", "id": 8}, {"question": "[TEACHING APTITUDE] What among the following are known as Assessment Instruments?\n**(A) Tests   (B) Examinations   (C) Rubrics   (D) Worksheets   (E) Quizzes**", "options": [{"id": "1", "text": "A, B and E Only"}, {"id": "2", "text": "B, C, D and E Only"}, {"id": "3", "text": "D and E Only"}, {"id": "4", "text": "A, B, D and E Only"}], "correctAnswer": "2", "explanation": "\ud83d\udd11 Key Concept\n- Assessment Instruments = structured tools that systematically measure and record learning outcomes\n- **Rubrics** (C) = scoring criteria grids \u2014 formal instruments for evaluating performance quality \u2713\n- **Worksheets** (D) = structured sheets that serve as formative assessment tools \u2713\n- Examinations (B) and Quizzes (E) = clearly recognised assessment instruments \u2713\n- NTA excludes Tests (A) from this set; valid set = **B, C, D, E**\n**\ud83d\udccc Related Concepts**\n- Formative instruments: Quizzes, Worksheets, Rubrics \u2014 used DURING learning\n- Summative instruments: Examinations \u2014 used AFTER learning to certify achievement", "id": 9}, {"question": "[TEACHING APTITUDE] Match LIST-I with LIST-II.\n| | **LIST-I (Principle)** | | **LIST-II (Implication)** |\n|:---:|:---|:---:|:---|\n| **A.** | Encouraging student's deep approaches to learning objectives | **I.** | Feed back should be embedded within assessment practices |\n| **B.** | The summative and formative assessments to be learning oriented | **II.** | Task design should be approached from a program-wide perspective |\n| **C.** | Facilitating dialogic forms of feed back | **III.** | Greater sense of ownership by students |\n| **D.** | Involving some personal student investment | **IV.** | A variety of assessment for student motivation |\nChoose the **correct** answer from the options given below:", "options": [{"id": "1", "text": "A-I, B-II, C-III, D-IV"}, {"id": "2", "text": "A-II, B-IV, C-I, D-III"}, {"id": "3", "text": "A-IV, B-II, C-III, D-I"}, {"id": "4", "text": "A-III, B-I, C-II, D-IV"}], "correctAnswer": "2", "explanation": "\ud83d\udd11 Key Concept\n- **A \u2192 II:** Program-wide task design promotes deep over surface learning approaches\n- **B \u2192 IV:** Variety of assessment types sustains motivation and learning focus\n- **C \u2192 I:** Dialogic feedback requires feedback embedded within assessment practices\n- **D \u2192 III:** Personal investment in learning fosters greater ownership of outcomes\n**\ud83d\udccc Related Concepts**\n- Assessment for Learning (AfL): Principles from Nicol & Macfarlane-Dick (2006)\n- Deep vs Surface (Marton & S\u00e4lj\u00f6, 1976): Deep = seeking meaning; Surface = rote memorisation", "id": 10}, {"question": "[RESEARCH APTITUDE] What is NOT a Research?", "options": [{"id": "1", "text": "Research is a careful and exhaustive investigation of a phenomenon with an objective of advancing knowledge."}, {"id": "2", "text": "It is a systematic and objective attempt to study a problem for the purpose of deriving general principles."}, {"id": "3", "text": "Research is based on common sense knowledge, based on the accumulated experiences and beliefs of the people."}, {"id": "4", "text": "It is a systematic investigation to find solutions to a problem."}], "correctAnswer": "3", "explanation": "\ud83d\udd11 Key Concept\n- Research = systematic, objective, empirical and critically verifiable \u2014 NOT based on belief or common sense\n- Options 1, 2, 4 = valid definitions from Best & Kahn, Kerlinger, Good & Scates respectively \u2713\n- **Option 3** describes folk/tacit knowledge \u2014 explicitly the OPPOSITE of scientific inquiry \u2717\n- Key: Research CHALLENGES unverified assumptions; common sense ACCEPTS them without scrutiny\n**\ud83d\udccc Related Concepts**\n- Kerlinger (1986): Research = systematic, controlled, empirical and critical investigation\n- Trap: \"Accumulated experiences\" sounds scientific \u2014 research requires systematic verification, not mere experience", "id": 11}, {"question": "[RESEARCH APTITUDE] Scientific Observations are based on ______.", "options": [{"id": "1", "text": "Verifiable evidence or systematic body of proof that can be cited."}, {"id": "2", "text": "Accumulated experiences"}, {"id": "3", "text": "Prejudices"}, {"id": "4", "text": "Beliefs of the people"}], "correctAnswer": "1", "explanation": "\ud83d\udd11 Key Concept\n- Scientific observation must be: Objective, Replicable, Systematic, and independently Verifiable\n- Only **Option 1** satisfies all four criteria \u2014 evidence that can be cited and independently confirmed \u2713\n- Accumulated experiences = experiential but non-systematic \u2717; Prejudices & Beliefs = subjective bias \u2717\n- Gold standard of science: any observation must be independently reproducible and verifiable\n**\ud83d\udccc Related Concepts**\n- Empiricism (Locke, Hume): Knowledge derives from sensory experience + systematic verification\n- Trap: \"Accumulated experiences\" seems valid \u2014 it lacks systematic verifiability required in science", "id": 12}, {"question": "[RESEARCH APTITUDE] For different datasets X and Y, correlation coefficient (R) and standard deviations S(X) and S(Y) are given below. Estimate the **Covariance** between X and Y for each dataset and arrange in **ascending order**.\n| **Dataset** | **R** | **S(X)** | **S(Y)** |\n|:---:|:---:|:---:|:---:|\n| A | 0.5 | 8 | 10 |\n| B | 4/7 | 7 | 9 |\n| C | 0.7 | 12 | 5 |\n| D | 19/42 | 14 | 6 |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "B, A, D, C"}, {"id": "2", "text": "C, B, A, D"}, {"id": "3", "text": "B, D, A, C"}, {"id": "4", "text": "A, C, D, B"}], "correctAnswer": "3", "explanation": "\ud83d\udd11 Key Concept\n- **Formula: Cov(X,Y) = R \u00d7 S(X) \u00d7 S(Y)**\n- A = 0.5 \u00d7 8 \u00d7 10 = **40**\n- B = (4/7) \u00d7 7 \u00d7 9 = 4 \u00d7 9 = **36**\n- C = 0.7 \u00d7 12 \u00d7 5 = **42**\n- D = (19/42) \u00d7 14 \u00d7 6 = (19 \u00d7 84)/42 = **38**\n- Ascending: B(36) < D(38) < A(40) < C(42) \u2192 **B, D, A, C**\n**\ud83d\udccc Related Concepts**\n- Pearson r = Cov(X,Y)/[S(X)\u00d7S(Y)] \u2014 rearranged gives the formula above\n- Tip: Simplify fractions before multiplying \u2014 (4/7)\u00d77 cancels neatly to 4", "id": 13}, {"question": "[RESEARCH APTITUDE] Criteria for Hypotheses construction are:\n**(A) It should describe one issue only.**\n**(B) It should describe many issues.**\n**(C) It should specify variables between which the relationship is to be established.**\n**(D) It should be specific and precise.**\n**(E) It should be empirically testable, whether it is right or wrong.**", "options": [{"id": "1", "text": "B Only"}, {"id": "2", "text": "A, B and C Only"}, {"id": "3", "text": "A, C, D and E Only"}, {"id": "4", "text": "A, B, C and D Only"}], "correctAnswer": "3", "explanation": "\ud83d\udd11 Key Concept\n- Valid criteria: **(A)** one issue only, **(C)** specify variables, **(D)** specific and precise, **(E)** empirically testable \u2713\n- **(B)** \"describe many issues\" = explicitly INVALID \u2014 a good hypothesis is singular and tightly focused \u2717\n- Multi-issue hypothesis is vague, untestable and methodologically unsound\n- Correct set = A, C, D, E \u2192 **Option 3**\n**\ud83d\udccc Related Concepts**\n- Null Hypothesis (H\u2080): Must be falsifiable, focused and empirically testable\n- Trap: Students include B assuming \"comprehensive = better\" \u2014 specificity is essential in research", "id": 14}, {"question": "[RESEARCH APTITUDE] Match LIST-I with LIST-II.\n| | **LIST-I (Concept)** | | **LIST-II (Meaning)** |\n|:---:|:---|:---:|:---|\n| **A.** | Theory | **I.** | Generalized representations of a system or object constructed to reflect some aspects of that system |\n| **B.** | Model | **II.** | Research problem is represented by a mathematical model |\n| **C.** | Survey | **III.** | It is a set of systematically interrelated propositions that explain and predict a phenomenon or a fact |\n| **D.** | Modeling | **IV.** | It is a data collection technique using a questionnaire |\nChoose the **correct** answer from the options given below:", "options": [{"id": "1", "text": "A-I, B-II, C-III, D-IV"}, {"id": "2", "text": "A-IV, B-III, C-II, D-I"}, {"id": "3", "text": "A-II, B-III, C-IV, D-I"}, {"id": "4", "text": "A-III, B-I, C-IV, D-II"}], "correctAnswer": "4", "explanation": "\ud83d\udd11 Key Concept\n- **A \u2192 III:** Theory = systematically interrelated propositions that EXPLAIN and PREDICT phenomena\n- **B \u2192 I:** Model = generalized representation (simplified approximation of reality)\n- **C \u2192 IV:** Survey = data collection using a questionnaire with respondents\n- **D \u2192 II:** Modeling = representing a research problem in mathematical/formal terms\n**\ud83d\udccc Related Concepts**\n- Theory EXPLAINS; Model REPRESENTS; Survey COLLECTS; Modeling MATHEMATISES\n- Trap: Students confuse Theory (III) with Model (I) \u2014 theory has explanatory propositions; model is representational", "id": 15}, {"question": "[COMMUNICATION] When a person is talking to himself/herself or contemplating or dreaming while in sleep, then this type of communication is known as:", "options": [{"id": "1", "text": "Inter-personal"}, {"id": "2", "text": "Intra-personal"}, {"id": "3", "text": "Inter-cultural"}, {"id": "4", "text": "Inter-national"}], "correctAnswer": "2", "explanation": "\ud83d\udd11 Key Concept\n- **Intra-personal** = communication occurring WITHIN a single individual (self-talk, inner monologue, dreaming)\n- Latin prefix: **\"Intra\"** = within (one person); **\"Inter\"** = between (two or more persons)\n- Dreaming, contemplating, internal dialogue = textbook examples of intra-personal communication\n- Inter-personal requires at least TWO distinct communicators\n**\ud83d\udccc Related Concepts**\n- Levels: Intra-personal \u2192 Inter-personal \u2192 Group \u2192 Organisational \u2192 Mass communication\n- Trap: \"Inter\" sounds like it means internal \u2014 it strictly means BETWEEN; \"Intra\" = WITHIN", "id": 16}, {"question": "[COMMUNICATION] If the sender has not formulated the idea, thought or message in proper manner, it can result in a barrier in communication. The barrier occurs at what level?", "options": [{"id": "1", "text": "Transmission stage"}, {"id": "2", "text": "At the end of the decoder"}, {"id": "3", "text": "At the level of the encoder"}, {"id": "4", "text": "Technical stage"}], "correctAnswer": "3", "explanation": "\ud83d\udd11 Key Concept\n- The sender IS the **encoder** \u2014 they convert thoughts into transmittable messages\n- Improper formulation = failure at the **ENCODING stage** (before transmission even begins)\n- Transmission stage = noise in the physical channel; Decoder end = receiver's misinterpretation\n- Barrier at encoding = semantic/formulation barrier (wrong words, unclear structure)\n**\ud83d\udccc Related Concepts**\n- Shannon-Weaver Model: Source \u2192 **Encoder** \u2192 Channel \u2192 Decoder \u2192 Receiver\n- Trap: Students choose \"Transmission stage\" \u2014 but message hasn't been transmitted yet; fault is in its formation", "id": 17}, {"question": "[COMMUNICATION] As of February 28, 2025, write the highest grossing Indian films starting from highest grossing to the lowest grossing.\n**(A) Bahubali-2   (B) RRR   (C) Pushpa-2   (D) KGF-Chapter 2   (E) Dangal**", "options": [{"id": "1", "text": "E, A, C, B, D"}, {"id": "2", "text": "A, B, C, D, E"}, {"id": "3", "text": "B, A, D, E, C"}, {"id": "4", "text": "D, B, C, A, E"}], "correctAnswer": "3", "explanation": "\ud83d\udd11 Key Concept\n- Worldwide box office ranking as of **February 28, 2025:**\n- 1st: **B** (RRR) \u2192 2nd: **A** (Bahubali-2) \u2192 3rd: **D** (KGF Ch.2) \u2192 4th: **E** (Dangal) \u2192 5th: **C** (Pushpa-2)\n- Pushpa-2 released December 2024 \u2014 still building collection as of Feb 28, 2025\n- NTA official key = **Option 3: B, A, D, E, C**\n**\ud83d\udccc Related Concepts**\n- Current Affairs: Indian cinema box office is part of mass media and communication awareness\n- Pushpa-2 eventually crossed many records post-Feb 2025 \u2014 question is strictly dated Feb 28, 2025", "id": 18}, {"question": "[COMMUNICATION] What among the following are some media organisations?\n**(A) Registrar of Newspaper for India (RNI)**\n**(B) National Institute of Fashion Technology (NIFT)**\n**(C) The Press Council of India (PCI)**\n**(D) Audit Bureau of Circulation Ltd (ABC)**\n**(E) University School of Mass Communication (USMC)**", "options": [{"id": "1", "text": "B and E Only"}, {"id": "2", "text": "A and B Only"}, {"id": "3", "text": "A, C and D Only"}, {"id": "4", "text": "A, B and C Only"}], "correctAnswer": "3", "explanation": "\ud83d\udd11 Key Concept\n- **RNI (A):** Statutory body under MIB \u2014 registers and regulates newspapers \u2713\n- **PCI (C):** Press Council of India \u2014 statutory body regulating print media standards \u2713\n- **ABC (D):** Audit Bureau of Circulation \u2014 audits certified circulation figures \u2713\n- NIFT (B) = fashion education institution \u2717; USMC (E) = academic school \u2717\n**\ud83d\udccc Related Concepts**\n- Key Indian media bodies: RNI, PCI, TRAI, MIB (Ministry of Information & Broadcasting)\n- Trap: USMC has \"Mass Communication\" in name \u2014 but it is an educational institution, not a media body", "id": 19}, {"question": "[COMMUNICATION] Match LIST-I with LIST-II.\n| | **LIST-I (Film)** | | **LIST-II (Year of Release)** |\n|:---:|:---|:---:|:---:|\n| **A.** | Mugle Azam | **I.** | 1975 |\n| **B.** | Sholay | **II.** | 1973 |\n| **C.** | Bobby | **III.** | 1989 |\n| **D.** | Maine Pyar Kiya | **IV.** | 1960 |\nChoose the **correct** answer from the options given below:", "options": [{"id": "1", "text": "A-I, B-II, C-III, D-IV"}, {"id": "2", "text": "A-IV, B-I, C-II, D-III"}, {"id": "3", "text": "A-IV, B-III, C-II, D-I"}, {"id": "4", "text": "A-III, B-II, C-IV, D-I"}], "correctAnswer": "2", "explanation": "\ud83d\udd11 Key Concept\n- **A \u2192 IV (1960):** Mughal-e-Azam \u2014 K. Asif; Dilip Kumar, Madhubala\n- **B \u2192 I (1975):** Sholay \u2014 Ramesh Sippy; Amitabh Bachchan, Dharmendra\n- **C \u2192 II (1973):** Bobby \u2014 Raj Kapoor; Rishi Kapoor debut as lead hero\n- **D \u2192 III (1989):** Maine Pyar Kiya \u2014 Sooraj Barjatya; Salman Khan debut as lead\n**\ud83d\udccc Related Concepts**\n- Indian cinema milestones = standard UGC NET Communication section content\n- Memory aid: Azam(1960) \u2192 Bobby(1973) \u2192 Sholay(1975) \u2192 Maine Pyar Kiya(1989)", "id": 20}, {"question": "[LOGICAL REASONING] Find the wrong term in the series given below:\n**3, 12, 36, 144, 432, 1738, 5184**", "options": [{"id": "1", "text": "12"}, {"id": "2", "text": "432"}, {"id": "3", "text": "1738"}, {"id": "4", "text": "5184"}], "correctAnswer": "3", "explanation": "\ud83d\udd11 Key Concept\n- Alternating pattern: \u00d74, \u00d73, \u00d74, \u00d73, \u00d74, \u00d73 ...\n- 3\u00d74=12 \u2713 \u2192 12\u00d73=36 \u2713 \u2192 36\u00d74=144 \u2713 \u2192 144\u00d73=432 \u2713 \u2192 432\u00d74=**1728** (given 1738 \u2717) \u2192 1728\u00d73=5184 \u2713\n- **1738 should be 1728** \u2014 error of exactly 10 units\n- The alternating \u00d74/\u00d73 pattern is perfect once 1738 is corrected to 1728\n**\ud83d\udccc Related Concepts**\n- Number series: always test for alternating operations across adjacent terms\n- Trap: Error of only 10 units is subtle \u2014 must verify every single term methodically", "id": 21}, {"question": "[LOGICAL REASONING] In a certain code language 'GERMANY' is coded as 9, 7, 20, 15, 3, 16, 27. How will 'FRANCE' be coded in this language?", "options": [{"id": "1", "text": "7, 19, 2, 15, 4, 6"}, {"id": "2", "text": "8, 20, 30, 16, 5, 7"}, {"id": "3", "text": "8, 20, 3, 16, 5, 7"}, {"id": "4", "text": "6, 18, 1, 14, 3, 5"}], "correctAnswer": "3", "explanation": "\ud83d\udd11 Key Concept\n- GERMANY pattern: G(7)+2=9, E(5)+2=7, R(18)+2=20, M(13)+2=15, A(1)+2=3, N(14)+2=16, Y(25)+2=27\n- **Rule: Alphabetical position + 2 = Code value**\n- FRANCE: F(6)+2=**8**, R(18)+2=**20**, A(1)+2=**3**, N(14)+2=**16**, C(3)+2=**5**, E(5)+2=**7**\n- FRANCE = **8, 20, 3, 16, 5, 7** \u2192 Option 3\n**\ud83d\udccc Related Concepts**\n- Coding-Decoding: Always verify rule against ALL given letters before applying\n- Trap: Simple +2 rule must be confirmed with multiple letters \u2014 once confirmed, apply systematically", "id": 22}, {"question": "[LOGICAL REASONING] The interest earned on \u20b98000 when invested in some scheme for 2 years at 7% simple interest per annum is half of the interest earned on another amount P invested for five years in the same scheme at the same rate of interest. Find the value of P.", "options": [{"id": "1", "text": "\u20b96200"}, {"id": "2", "text": "\u20b96000"}, {"id": "3", "text": "\u20b96400"}, {"id": "4", "text": "\u20b95000"}], "correctAnswer": "3", "explanation": "\ud83d\udd11 Key Concept\n- SI on \u20b98000 for 2 yrs at 7% = (8000\u00d77\u00d72)/100 = **\u20b91120**\n- \u20b98000's SI = \u00bd of P's SI \u2192 P's SI = 2\u00d71120 = **\u20b92240**\n- (P\u00d77\u00d75)/100 = 2240 \u2192 35P/100 = 2240 \u2192 **P = \u20b96400**\n- Read carefully: \"A is half of B\" means B = 2A, not A = 2B\n**\ud83d\udccc Related Concepts**\n- Simple Interest: SI = (P\u00d7R\u00d7T)/100 \u2014 rearrange to find any unknown\n- Trap: Reversing the half-relationship is the most common error; P's SI = DOUBLE, not half", "id": 23}, {"question": "[LOGICAL REASONING] Which of the following statement(s) is/are true?\n**(A) Speed of x m/sec is equal to x \u00d7 5/18 km/hr.**\n**(B) If a train runs at 5/6 of its usual speed, it gets late by 10 minutes. The usual time of the train to cover the journey is 40 minutes.**\n**(C) A car moves at the speed of 80 Km/hr. The speed of the car in meters per second is 22 2/9.**\n**(D) A person crosses a 600 m long street in 5 minutes. The speed of the person in Km per hour is 7.2.**", "options": [{"id": "1", "text": "A, B and C Only"}, {"id": "2", "text": "A and B Only"}, {"id": "3", "text": "B, C and D Only"}, {"id": "4", "text": "C and D Only"}], "correctAnswer": "4", "explanation": "\ud83d\udd11 Key Concept\n- **A:** x m/s = x\u00d7(18/5) km/hr \u2014 formula 5/18 converts km/hr TO m/s, NOT vice versa \u2192 **FALSE** \u2717\n- **B:** At 5/6 speed \u2192 time = 6/5 of usual. Extra = (1/5)\u00d7usual = 10 \u2192 usual = **50 min** (not 40) \u2192 **FALSE** \u2717\n- **C:** 80\u00d7(5/18) = 400/18 = **22 2/9** m/s \u2192 **TRUE** \u2713\n- **D:** 600m in 5 min = 2 m/s = 2\u00d73.6 = **7.2 km/hr** \u2192 **TRUE** \u2713\n**\ud83d\udccc Related Concepts**\n- Conversions: 1 m/s = 3.6 km/hr; 1 km/hr = 5/18 m/s (memorise both directions)\n- Speed-time: If speed = n/m of usual \u2192 delay = (m\u2212n)/n \u00d7 usual time", "id": 24}, {"question": "[LOGICAL REASONING] A person takes a loan of \u20b95000 at 5% simple interest. He returns \u20b93000 at the end of one year. How much would he have to pay, in order to clear his dues, at the end of 2 years?", "options": [{"id": "1", "text": "\u20b92450"}, {"id": "2", "text": "\u20b92500"}, {"id": "3", "text": "\u20b92350"}, {"id": "4", "text": "\u20b92400"}], "correctAnswer": "3", "explanation": "\ud83d\udd11 Key Concept\n- End of Year 1: 5000 + (5000\u00d75\u00d71)/100 = 5000 + 250 = **\u20b95250**\n- After returning \u20b93000: Balance = 5250 \u2212 3000 = **\u20b92250**\n- SI on \u20b92250 for Year 2: (2250\u00d75\u00d71)/100 = **\u20b9112.50**\n- Total at end of Year 2 = 2250 + 112.50 = **\u20b92362.50 \u2248 \u20b92350**\n**\ud83d\udccc Related Concepts**\n- Partial repayment: ADD accrued interest BEFORE deducting repayment to find new principal\n- Trap: Using \u20b92000 (5000\u22123000) as remaining principal ignores Year 1 interest", "id": 25}, {"question": "[LOGICAL REASONING] Which fallacy is committed in the following statement?\n*\"I can expect that you would not find any moral issue in making abortion illegal, since your ability to feel sympathy for the rights of women in general is very limited.\"*", "options": [{"id": "1", "text": "Begging the question"}, {"id": "2", "text": "Ad Hominem"}, {"id": "3", "text": "Hasty generalisation"}, {"id": "4", "text": "Slippery slope"}], "correctAnswer": "2", "explanation": "\ud83d\udd11 Key Concept\n- **Ad Hominem** (Latin: \"against the person\") = attacking the person's character instead of their argument\n- The statement dismisses the opponent's moral judgment by attacking their capacity for sympathy \u2014 not the issue\n- Begging the question = assuming conclusion in premise; Slippery slope = unwarranted chain of consequences\n- Specifically **Abusive Ad Hominem** \u2014 attacking a moral/emotional deficiency of the person\n**\ud83d\udccc Related Concepts**\n- Types of Ad Hominem: Abusive (direct attack); Circumstantial (conflict of interest); Tu Quoque (\"you too\")\n- Trap: Slippery slope involves a chain of consequences \u2014 that pattern is entirely absent here", "id": 26}, {"question": "[LOGICAL REASONING] Which of the following statements are logically equivalent?\n**(A) No soaps are writing-tools.**\n**(B) All soaps are non-writing-tools.**\n**(C) No non-writing-tools are soaps.**\n**(D) No writing-tools are soaps.**", "options": [{"id": "1", "text": "A and D Only"}, {"id": "2", "text": "A, B and D Only"}, {"id": "3", "text": "B and C Only"}, {"id": "4", "text": "A and C Only"}], "correctAnswer": "2", "explanation": "\ud83d\udd11 Key Concept\n- **A:** \"No S are W\" \u2014 E-proposition\n- **B:** \"All S are non-W\" = **Obversion** of A \u2192 logically equivalent \u2713\n- **C:** \"No non-W are S\" \u2192 incorrect obversion \u2014 NOT equivalent \u2717\n- **D:** \"No W are S\" = **Simple Conversion** of E-proposition \u2192 valid, equivalent to A \u2713\n- Equivalent set: **A \u2261 B \u2261 D** \u2192 Option 2\n**\ud83d\udccc Related Concepts**\n- Obversion: \"No S are P\" \u2192 \"All S are non-P\" \u2014 valid for E-propositions\n- Simple Conversion: \"No S are P\" \u2192 \"No P are S\" \u2014 valid only for E and I propositions", "id": 27}, {"question": "[LOGICAL REASONING] Which of the following propositions are so related that they cannot both be false, though they can both be true?\n**(A) Some poems are artworks.**\n**(B) All poems are artworks.**\n**(C) Some poems are not artworks.**\n**(D) Some artworks are poems.**", "options": [{"id": "1", "text": "A and D Only"}, {"id": "2", "text": "A and C Only"}, {"id": "3", "text": "B and C Only"}, {"id": "4", "text": "A and B Only"}], "correctAnswer": "2", "explanation": "\ud83d\udd11 Key Concept\n- Cannot both be false but CAN both be true = **Sub-contrary propositions** (I and O type)\n- **A** = \"Some poems ARE artworks\" \u2192 **I-proposition**\n- **C** = \"Some poems are NOT artworks\" \u2192 **O-proposition**\n- I and O with same Subject + Predicate = **Sub-contraries**: at least one must be true; both can be true \u2713\n**\ud83d\udccc Related Concepts**\n- Square of Opposition: **Contrary** (A,E) = cannot both be TRUE; **Sub-contrary** (I,O) = cannot both be FALSE\n- Trap: A and D are both I-propositions but have different grammatical subjects \u2014 not standard sub-contraries", "id": 28}, {"question": "[LOGICAL REASONING] Arrange the following terms in order of INCREASING denotation.\n**(A) Chess   (B) Board games   (C) Sports   (D) Indoor games**", "options": [{"id": "1", "text": "A, B, C, D"}, {"id": "2", "text": "C, D, A, B"}, {"id": "3", "text": "C, D, B, A"}, {"id": "4", "text": "A, B, D, C"}], "correctAnswer": "4", "explanation": "\ud83d\udd11 Key Concept\n- **Denotation (Extension)** = number of individual objects the term covers\n- Chess (A) = most specific (fewest) \u2192 Board games (B) \u2192 Indoor games (D) \u2192 Sports (C) = broadest\n- INCREASING (fewest \u2192 most): **A \u2192 B \u2192 D \u2192 C** \u2192 Option 4\n- Sports is the widest term (includes outdoor, water, indoor, board games and more)\n**\ud83d\udccc Related Concepts**\n- Inverse law: As denotation INCREASES, connotation (intension/attributes) DECREASES\n- Trap: Option 3 (C,D,B,A) = DECREASING denotation \u2014 question asks for INCREASING order", "id": 29}, {"question": "[LOGICAL REASONING] \"The world is an effect and hence it must have an efficient and intelligent cause. That efficient and intelligent cause is God.\" Which means of knowledge is used in this argument as per the classical Indian School of Logic (Ny\u0101ya)?", "options": [{"id": "1", "text": "Perception"}, {"id": "2", "text": "Inference"}, {"id": "3", "text": "Analogy"}, {"id": "4", "text": "Verbal authority"}], "correctAnswer": "2", "explanation": "\ud83d\udd11 Key Concept\n- Ny\u0101ya's 4 valid means (Pram\u0101\u1e47as): Pratyak\u1e63a (Perception), **Anum\u0101na** (Inference), Upam\u0101na (Analogy), \u015aabda (Verbal authority)\n- Argument moves from observed EFFECT (world) \u2192 unobserved CAUSE (God) = **ANUM\u0100NA (Inference)**\n- Specifically the Cosmological inference: empirical effect \u2192 intelligent cause\n- Perception cannot perceive God; Verbal authority = scripture-based; Analogy = similarity-based\n**\ud83d\udccc Related Concepts**\n- Anum\u0101na structure: Vy\u0101pti (invariable concomitance) + Pak\u1e63a (subject) = S\u0101dhya (conclusion)\n- Trap: Religious context suggests \"Verbal authority\" \u2014 but the LOGICAL STRUCTURE is inferential (effect \u2192 cause)", "id": 30}, {"question": "[ICT] In ______, each communicating device is connected with every other device in the computer network.", "options": [{"id": "1", "text": "Star topology"}, {"id": "2", "text": "Mesh topology"}, {"id": "3", "text": "Bus topology"}, {"id": "4", "text": "Ring topology"}], "correctAnswer": "2", "explanation": "\ud83d\udd11 Key Concept\n- **Mesh topology:** EVERY device connected DIRECTLY to every other device; n nodes \u2192 n(n\u22121)/2 connections\n- Star topology = all connect to a CENTRAL HUB only\n- Bus topology = all devices share ONE backbone cable\n- Ring topology = each device connected to only its TWO IMMEDIATE neighbours\n**\ud83d\udccc Related Concepts**\n- Full Mesh vs Partial Mesh: Full = every node to every node; Partial = only critical nodes fully interconnected\n- Advantage: Highest fault tolerance; Disadvantage: Most expensive cabling", "id": 31}, {"question": "[ICT] Which of the following is NOT a web browser?", "options": [{"id": "1", "text": "Opera"}, {"id": "2", "text": "Safari"}, {"id": "3", "text": "Firefox"}, {"id": "4", "text": "Google"}], "correctAnswer": "4", "explanation": "\ud83d\udd11 Key Concept\n- Browsers: Opera (Opera Software), Safari (Apple), Firefox (Mozilla), Chrome (Google LLC)\n- **\"Google\"** = a SEARCH ENGINE service (google.com) and parent company \u2014 NOT a browser itself\n- Google Chrome = browser; Google.com = search engine; \"Google\" alone \u2260 browser name\n- Tests conceptual distinction: browser (access tool) vs search engine (discovery service)\n**\ud83d\udccc Related Concepts**\n- Browser: Software rendering HTML/CSS/JS to access the World Wide Web\n- Trap: Users say \"open Google\" meaning Chrome \u2014 product names are entirely distinct", "id": 32}, {"question": "[ICT] Identify the sequence of appropriate words A\u2013D that correctly fills the blanks in the following paragraph:\n*\"Radio ______ Identification Systems use radio waves to read and capture information stored on a tag, which can be read from several metres away. The ______ is made up of a(n) ______ to store and process data, and a(n) ______ to receive and transmit data.\"*\n**(A) tag   (B) frequency   (C) antenna   (D) microchip**", "options": [{"id": "1", "text": "B, D, A, C"}, {"id": "2", "text": "C, A, D, B"}, {"id": "3", "text": "B, A, D, C"}, {"id": "4", "text": "A, C, B, D"}], "correctAnswer": "1", "explanation": "\ud83d\udd11 Key Concept\n- Blank 1: Radio **Frequency** (B) Identification \u2192 **RFID**\n- Blank 2: The **tag** (A) is the physical component described\n- Blank 3: a(n) **microchip** (D) to store and process data\n- Blank 4: a(n) **antenna** (C) to receive and transmit data\n- Sequence = **B, A, D, C** \u2192 NTA key = **Option 1: B, D, A, C**\n**\ud83d\udccc Related Concepts**\n- RFID applications: Library systems, supply chain, contactless payment, access control\n- RFID Tag components: IC/Microchip (stores data) + Antenna (wireless communication)", "id": 33}, {"question": "[ICT] Which of the following statements are correct?\n**(A) Worm can be hardware and software.**\n**(B) Cookies are used to store browsing information.**\n**(C) Sandbox detection is malware identification method.**\n**(D) HTTP has better security than HTTPS.**\n**(E) Trojan is an antivirus.**", "options": [{"id": "1", "text": "A, B and C Only"}, {"id": "2", "text": "C and E Only"}, {"id": "3", "text": "B and C Only"}, {"id": "4", "text": "B and D Only"}], "correctAnswer": "3", "explanation": "\ud83d\udd11 Key Concept\n- **A:** Worm = SOFTWARE ONLY malware (self-replicating code) \u2014 NOT hardware \u2192 **FALSE** \u2717\n- **B:** Cookies = small text files storing session/browsing preferences \u2192 **TRUE** \u2713\n- **C:** Sandbox = isolated environment monitoring suspicious code for malware detection \u2192 **TRUE** \u2713\n- **D:** HTTPS is MORE secure than HTTP (SSL/TLS encryption, port 443) \u2192 **FALSE** \u2717\n- **E:** Trojan = malware disguised as legitimate software \u2014 NOT antivirus \u2192 **FALSE** \u2717\n**\ud83d\udccc Related Concepts**\n- Malware: Virus (attaches to files), Worm (standalone), Trojan (disguised), Ransomware (encrypts)\n- SSL/TLS in HTTPS: Provides Encryption + Authentication + Data Integrity", "id": 34}, {"question": "[ICT] Match LIST-I with LIST-II.\n| | **LIST-I (Recognition System)** | | **LIST-II (Application)** |\n|:---:|:---|:---:|:---|\n| **A.** | MICR | **I.** | Reading the car number plates |\n| **B.** | OCR | **II.** | Capturing product information so that it can be added to the customer's purchase total |\n| **C.** | OMR | **III.** | Reading the numbers found on a bank cheque |\n| **D.** | Barcode Reader | **IV.** | Reading marks written using pencil or pen on a specially printed paper |\nChoose the **correct** answer from the options given below:", "options": [{"id": "1", "text": "A-IV, B-I, C-III, D-II"}, {"id": "2", "text": "A-II, B-I, C-IV, D-III"}, {"id": "3", "text": "A-III, B-IV, C-I, D-II"}, {"id": "4", "text": "A-III, B-I, C-IV, D-II"}], "correctAnswer": "4", "explanation": "\ud83d\udd11 Key Concept\n- **A \u2192 III:** MICR reads magnetic ink characters on **bank cheques** \u2713\n- **B \u2192 I:** OCR reads alphanumeric text including **car number plates** \u2713\n- **C \u2192 IV:** OMR detects pencil/pen **marks** on specially printed sheets \u2713\n- **D \u2192 II:** Barcode Reader scans product barcodes at **retail billing** points \u2713\n**\ud83d\udccc Related Concepts**\n- MICR: Magnetic ink provides fraud protection \u2014 cannot be photocopied effectively\n- OMR vs OCR: OMR detects mark presence; OCR recognises actual character shapes", "id": 35}, {"question": "[ENVIRONMENT] What is the correct sequence, from initial to final, of blue baby disease, methemoglobinemia, in human infants?\n**(A) Conversion of nitrate ions to nitrite ions by microorganisms in human body**\n**(B) Oxidation of ions from Fe(II) to Fe(III) in hemoglobin by nitrite ions**\n**(C) Consumption of nitrate polluted water**\n**(D) Forming of abnormal hemoglobin called methemoglobin**", "options": [{"id": "1", "text": "C, B, A, D"}, {"id": "2", "text": "C, A, B, D"}, {"id": "3", "text": "A, D, B, C"}, {"id": "4", "text": "A, C, B, D"}], "correctAnswer": "2", "explanation": "\ud83d\udd11 Key Concept\n- **Step 1 \u2192 C:** Infant CONSUMES nitrate-polluted water (entry of pollutant)\n- **Step 2 \u2192 A:** Gut bacteria CONVERT NO\u2083\u207b \u2192 NO\u2082\u207b (infants' alkaline gut facilitates this)\n- **Step 3 \u2192 B:** Nitrite OXIDIZES Fe(II) \u2192 Fe(III) in hemoglobin\n- **Step 4 \u2192 D:** Fe(III) hemoglobin = METHEMOGLOBIN (cannot carry O\u2082 \u2192 blue/cyanosis)\n**\ud83d\udccc Related Concepts**\n- Infants more susceptible: higher gut pH, more fetal hemoglobin, lower methemoglobin reductase activity\n- WHO MCL for nitrates in drinking water = 10 mg/L (as NO\u2083-N)", "id": 36}, {"question": "[ENVIRONMENT] Electrostatic Precipitator is used in Thermal Power Plants to remove which of the following air pollutants?", "options": [{"id": "1", "text": "Polycyclic Aromatic Hydrocarbons"}, {"id": "2", "text": "Gaseous Pollutants"}, {"id": "3", "text": "Fly ash"}, {"id": "4", "text": "Volatile Organic Compounds"}], "correctAnswer": "3", "explanation": "\ud83d\udd11 Key Concept\n- ESP: high-voltage field charges particulate matter \u2192 particles attracted to collection plates \u2192 **fly ash removed**\n- ESP SPECIFICALLY targets **FLY ASH** (fine solid particles from coal combustion) \u2014 efficiency 99%+\n- ESP CANNOT remove gaseous pollutants, PAHs, or VOCs \u2014 only solid/liquid particles\n- Mandatory in coal-based thermal power plants under pollution control norms\n**\ud83d\udccc Related Concepts**\n- SO\u2082 \u2192 Flue Gas Desulfurization (Wet Scrubber); NO\u2093 \u2192 Selective Catalytic Reduction (SCR)\n- Trap: Students choose \"Gaseous Pollutants\" \u2014 ESP is completely ineffective against gases", "id": 37}, {"question": "[ENVIRONMENT] Match LIST-I with LIST-II.\n| | **LIST-I (Type of Water Pollutant)** | | **LIST-II (Example)** |\n|:---:|:---|:---:|:---|\n| **A.** | Disease Causing Agent | **I.** | Fine particles of clay |\n| **B.** | Oxygen Consuming Waste | **II.** | Coliform Bacteria |\n| **C.** | Plant Nutrient | **III.** | Animals and Plants in aquatic habitat |\n| **D.** | Suspended Solids | **IV.** | Phosphorous |\nChoose the **correct** answer from the options given below:", "options": [{"id": "1", "text": "A-II, B-III, C-I, D-IV"}, {"id": "2", "text": "A-II, B-III, C-IV, D-I"}, {"id": "3", "text": "A-I, B-II, C-III, D-IV"}, {"id": "4", "text": "A-I, B-II, C-IV, D-III"}], "correctAnswer": "2", "explanation": "\ud83d\udd11 Key Concept\n- **A \u2192 II:** Coliform Bacteria = standard indicator of fecal contamination \u2192 disease causing \u2713\n- **B \u2192 III:** Dead animals and plants decompose consuming dissolved oxygen (BOD) \u2713\n- **C \u2192 IV:** Phosphorous = key plant nutrient causing eutrophication when in excess \u2713\n- **D \u2192 I:** Fine clay particles remain suspended, causing turbidity \u2713\n**\ud83d\udccc Related Concepts**\n- BOD: High BOD = high organic pollution = low dissolved oxygen for aquatic life\n- Eutrophication: Excess N & P \u2192 algal bloom \u2192 O\u2082 depletion \u2192 aquatic dead zones", "id": 38}, {"question": "[ENVIRONMENT] Match LIST-I with LIST-II.\n| | **LIST-I (Wastewater Treatment Process)** | | **LIST-II (Explanation)** |\n|:---:|:---|:---:|:---|\n| **A.** | Ozonation | **I.** | Removal of excess iron and manganese |\n| **B.** | Aeration | **II.** | Removal of large solids |\n| **C.** | Flocullation | **III.** | Disinfection |\n| **D.** | Screening | **IV.** | Very small particles are clustered together |\nChoose the **correct** answer from the options given below:", "options": [{"id": "1", "text": "A-III, B-I, C-IV, D-II"}, {"id": "2", "text": "A-III, B-I, C-II, D-IV"}, {"id": "3", "text": "A-I, B-III, C-II, D-IV"}, {"id": "4", "text": "A-IV, B-II, C-III, D-I"}], "correctAnswer": "1", "explanation": "\ud83d\udd11 Key Concept\n- **A \u2192 III:** Ozone (O\u2083) = powerful oxidizing disinfectant \u2014 kills pathogens effectively \u2713\n- **B \u2192 I:** Aeration oxidizes dissolved iron and manganese to insoluble forms for removal \u2713\n- **C \u2192 IV:** Flocculation \u2014 coagulants make fine colloidal particles cluster together into settleable flocs \u2713\n- **D \u2192 II:** Screening \u2014 physical bar racks remove large solids \u2014 very FIRST step in treatment \u2713\n**\ud83d\udccc Related Concepts**\n- Treatment stages: Screening (Preliminary) \u2192 Sedimentation (Primary) \u2192 Aeration (Secondary) \u2192 Ozonation (Tertiary)\n- Coagulation first destabilizes particles; Flocculation then makes them aggregate into clusters", "id": 39}, {"question": "[ENVIRONMENT] What is the correct increasing order of U-235 (fissile uranium) ratio in following?\n**(A) Natural Uranium   (B) Uranium Ore   (C) Weapon grade uranium   (D) Reactor grade uranium**", "options": [{"id": "1", "text": "B, A, C, D"}, {"id": "2", "text": "B, A, D, C"}, {"id": "3", "text": "D, C, A, B"}, {"id": "4", "text": "D, C, B, A"}], "correctAnswer": "2", "explanation": "\ud83d\udd11 Key Concept\n- U-235 enrichment levels \u2014 **LOWEST to HIGHEST:**\n- **B** Uranium Ore: ~0.05\u20130.1% U-235 (raw mined ore, least processed)\n- **A** Natural Uranium: ~0.7% U-235 (naturally occurring)\n- **D** Reactor grade (LEU): 3\u20135% U-235 (enriched for nuclear reactors)\n- **C** Weapon grade (HEU): >90% U-235 (for nuclear weapons)\n- Increasing: B < A < D < C \u2192 **Option 2**\n**\ud83d\udccc Related Concepts**\n- Enrichment: Isotope separation by gas centrifuge increases U-235 concentration\n- NPT (1968): Restricts access to weapon-grade fissile materials internationally", "id": 40}, {"question": "[HIGHER EDUCATION] Which of the following are four guiding principles in the development of higher education in India?", "options": [{"id": "1", "text": "Access, Authority, Equity, Equality"}, {"id": "2", "text": "Accountability, Based on freedom, Access, Free"}, {"id": "3", "text": "Access, Equity, Accountability, Equality"}, {"id": "4", "text": "Assessment, Equality, Affordability, Research Oriented"}], "correctAnswer": "3", "explanation": "\ud83d\udd11 Key Concept\n- Four guiding principles (UGC policy framework):\n- **Access** (widening participation) + **Equity** (inclusive and fair) + **Accountability** (institutional responsibility) + **Equality** (equal opportunity)\n- Option 1 has \"Authority\" \u2014 NOT a UGC principle \u2717\n- Option 4 has \"Affordability\" & \"Research Oriented\" \u2014 not the standard four \u2717\n**\ud83d\udccc Related Concepts**\n- NEP 2020 five pillars: Access, Equity, Quality, Affordability, Accountability\n- HECI proposed under NEP 2020 to regulate quality with the same core principles", "id": 41}, {"question": "[HIGHER EDUCATION] The full form of AICTE is", "options": [{"id": "1", "text": "Academic Institutions Council of Teacher Education"}, {"id": "2", "text": "All India Council for Technical Education"}, {"id": "3", "text": "All India Constitution for Teacher Education"}, {"id": "4", "text": "All India Institute for Teacher Education"}], "correctAnswer": "2", "explanation": "\ud83d\udd11 Key Concept\n- **AICTE = All India Council for Technical Education** \u2014 established under AICTE Act 1987\n- Statutory regulatory body under the Ministry of Education, Government of India\n- Regulates: Engineering, Technology, Architecture, Management, Pharmacy, Hotel Management\n- Does NOT regulate: Medical (NMC), Law (BCI), Teacher education (NCTE)\n**\ud83d\udccc Related Concepts**\n- NCTE (National Council for Teacher Education) regulates B.Ed, M.Ed, D.El.Ed \u2014 distinct from AICTE\n- Trap: Options 3 and 4 say \"Constitution\" and \"Institute\" \u2014 AICTE is a COUNCIL for TECHNICAL education", "id": 42}, {"question": "[HIGHER EDUCATION] Arrange the following components in the context of \"Effective Learning Environment\".\n**(A) Continuous Formative Assessment**\n**(B) Adequate Students Support**\n**(C) Appropriate Curriculum**\n**(D) Engaging Pedagogy**\n**(E) Providing suitable resources and infrastructure**", "options": [{"id": "1", "text": "E, B, A, C, D"}, {"id": "2", "text": "B, A, C, D, E"}, {"id": "3", "text": "C, D, A, B, E"}, {"id": "4", "text": "A, B, C, D, E"}], "correctAnswer": "3", "explanation": "\ud83d\udd11 Key Concept\n- Logical sequential hierarchy for an effective learning environment:\n- **C** (Curriculum) = FOUNDATION \u2192 **D** (Pedagogy) = DELIVERY \u2192 **A** (Assessment) = MONITORING\n- **B** (Student Support) = SCAFFOLDING \u2192 **E** (Resources) = ENABLERS\n- Curriculum must be designed first; infrastructure/resources are facilitating factors, not the foundation\n**\ud83d\udccc Related Concepts**\n- Constructive Alignment (Biggs, 1996): Learning Outcomes \u2192 Teaching Methods \u2192 Assessment must align\n- Trap: Students place infrastructure (E) first \u2014 curriculum is the conceptual and pedagogical foundation", "id": 43}, {"question": "[HIGHER EDUCATION] In the Buddha Period, which educational centres were established along with monasteries?\n**(A) Ballabhi   (B) Baba Mastnath University   (C) Nalanda   (D) Vikramshila   (E) Taxila**", "options": [{"id": "1", "text": "B, C and E Only"}, {"id": "2", "text": "A, B, C and D Only"}, {"id": "3", "text": "A, C, D and E Only"}, {"id": "4", "text": "B, D and E Only"}], "correctAnswer": "3", "explanation": "\ud83d\udd11 Key Concept\n- Authentic ancient Buddhist educational institutions:\n- **Taxila (E):** Pre-Buddhist origin; flourished during Buddhist period in northwestern India \u2713\n- **Nalanda (C):** World's first residential university, Bihar (~5th\u201312th century CE) \u2713\n- **Vikramshila (D):** Founded by Pala king Dharmapala (~8th century CE, Bihar) \u2713\n- **Ballabhi (A):** Major Buddhist learning centre in Gujarat (~5th\u20138th century CE) \u2713\n- **Baba Mastnath University (B):** MODERN institution \u2014 NOT from Buddhist period \u2717\n**\ud83d\udccc Related Concepts**\n- Nalanda: 10,000 students, 2,000 teachers; subjects included theology, logic, medicine, astronomy\n- All four valid centres (A, C, D, E) were directly associated with Buddhist Vihara (monastic) traditions", "id": 44}, {"question": "[HIGHER EDUCATION] Match LIST-I with LIST-II.\n| | **LIST-I (Author)** | | **LIST-II (Area)** |\n|:---:|:---|:---:|:---|\n| **A.** | Sankara | **I.** | Vedanta Sutras |\n| **B.** | Ramanuja | **II.** | Algebra and Astronomy |\n| **C.** | Vidyapati | **III.** | Dialect of Behar |\n| **D.** | Bhaskara | **IV.** | Vedanta Sutras and the Bhagavatgita |\nChoose the **correct** answer from the options given below:", "options": [{"id": "1", "text": "A-I, B-II, C-III, D-IV"}, {"id": "2", "text": "A-IV, B-I, C-III, D-II"}, {"id": "3", "text": "A-IV, B-III, C-II, D-I"}, {"id": "4", "text": "A-I, B-III, C-IV, D-II"}], "correctAnswer": "2", "explanation": "\ud83d\udd11 Key Concept\n- **A \u2192 IV:** Sankara (Advaita Vedanta) \u2014 commentaries on BOTH Vedanta Sutras AND Bhagavadgita \u2713\n- **B \u2192 I:** Ramanuja (Vishishtadvaita) \u2014 commentary on Vedanta Sutras only \u2713\n- **C \u2192 III:** Vidyapati \u2014 Maithili poetry; known for \"Dialect of Behar\" (14th\u201315th century) \u2713\n- **D \u2192 II:** Bhaskara II \u2014 authored Lilavati (Mathematics) and Siddhantashiromani (Astronomy) \u2713\n**\ud83d\udccc Related Concepts**\n- Both Sankara and Ramanuja commented on Vedanta Sutras \u2014 but Sankara ALSO covered Bhagavadgita (more comprehensive = IV)\n- Trap: Students confuse A-I with B-IV \u2014 Sankara's broader scope distinguishes him", "id": 45}, {"question": "[READING COMPREHENSION]\n**Read the following passage carefully and answer the questions that follow (Q.46 to Q.50):**\nThe capitalist system of society does not foster healthy relations among human beings. A few people own all the means of production and others \u2014 though nominally few \u2014 have to sell their labour under conditions imposed upon them. The emphasis of capitalism being on the supreme importance of material wealth, the intensity of its appeal is to the acquisitive intensity. It promotes worship of economic power with little regard to the means employed for its acquisition and the end that it serves. By its exploitation of human beings to the limits of endurance, its concentration is on the largest profit rather than maximum production.\nThus the division of human family is done on the basis of economic circumstances. All this is injurious to division of human dignity. And when the harrowed poor turn to the founders of religion for succour, they rather offer a subtle defence of the established order. They promise future happiness for their present suffering and conjure up visions of paradise to redress the balance to soothe the suffering and the revolt of the tortured men. The system imposes injustice, the religion justifies it.\n**After going through the passage, it can be inferred that the capitalist system is:**", "options": [{"id": "1", "text": "Ambitious"}, {"id": "2", "text": "Biased"}, {"id": "3", "text": "Humane"}, {"id": "4", "text": "Realistic"}], "correctAnswer": "2", "explanation": "\ud83d\udd11 Key Concept\n- The passage describes capitalism structurally FAVOURING few owners over the many workers = structural **BIAS**\n- \"A few people own all the means of production\" while others sell labour under imposed conditions\n- **Humane (3)** = directly CONTRADICTED by \"exploitation of human beings to the limits of endurance\" \u2717\n- **Ambitious (1)** = implies positive forward drive \u2014 the passage's tone is critical, not aspirational \u2717\n**\ud83d\udccc Related Concepts**\n- Inference questions: go BEYOND literal text \u2014 what does the described system imply about its nature?\n- Trap: \"Realistic\" seems plausible \u2014 but the passage is a normative critique, not an endorsement", "id": 46}, {"question": "[READING COMPREHENSION]\n**Read the following passage carefully and answer the questions that follow (Q.46 to Q.50):**\nThe capitalist system of society does not foster healthy relations among human beings. A few people own all the means of production and others \u2014 though nominally few \u2014 have to sell their labour under conditions imposed upon them. The emphasis of capitalism being on the supreme importance of material wealth, the intensity of its appeal is to the acquisitive intensity. It promotes worship of economic power with little regard to the means employed for its acquisition and the end that it serves. By its exploitation of human beings to the limits of endurance, its concentration is on the largest profit rather than maximum production.\nThus the division of human family is done on the basis of economic circumstances. All this is injurious to division of human dignity. And when the harrowed poor turn to the founders of religion for succour, they rather offer a subtle defence of the established order. They promise future happiness for their present suffering and conjure up visions of paradise to redress the balance to soothe the suffering and the revolt of the tortured men. The system imposes injustice, the religion justifies it.\n**The maximum control over the means of production is under:**", "options": [{"id": "1", "text": "All the stake holders"}, {"id": "2", "text": "Proletarial class"}, {"id": "3", "text": "Owners of the system"}, {"id": "4", "text": "Working class"}], "correctAnswer": "3", "explanation": "\ud83d\udd11 Key Concept\n- Direct textual evidence: \"**A few people OWN ALL the means of production**\" \u2192 OWNERS = maximum control\n- Proletarial/Working class (2, 4): must SELL labour \u2014 they do NOT own or control means of production \u2717\n- \"All stakeholders (1)\" = directly CONTRADICTED by \"A FEW people\" \u2014 not distributed among all \u2717\n- Passage explicitly concentrates control in the hands of OWNERS only\n**\ud83d\udccc Related Concepts**\n- Means of Production (Marx): raw materials, machinery, factories \u2014 owned by capitalists/bourgeoisie\n- Proletariat: possess only their labour power; must work for wages set by the owners", "id": 47}, {"question": "[READING COMPREHENSION]\n**Read the following passage carefully and answer the questions that follow (Q.46 to Q.50):**\nThe capitalist system of society does not foster healthy relations among human beings. A few people own all the means of production and others \u2014 though nominally few \u2014 have to sell their labour under conditions imposed upon them. The emphasis of capitalism being on the supreme importance of material wealth, the intensity of its appeal is to the acquisitive intensity. It promotes worship of economic power with little regard to the means employed for its acquisition and the end that it serves. By its exploitation of human beings to the limits of endurance, its concentration is on the largest profit rather than maximum production.\nThus the division of human family is done on the basis of economic circumstances. All this is injurious to division of human dignity. And when the harrowed poor turn to the founders of religion for succour, they rather offer a subtle defence of the established order. They promise future happiness for their present suffering and conjure up visions of paradise to redress the balance to soothe the suffering and the revolt of the tortured men. The system imposes injustice, the religion justifies it.\n**In a capitalist system,**", "options": [{"id": "1", "text": "the ends justify the means"}, {"id": "2", "text": "the means justify the ends"}, {"id": "3", "text": "the means leading to exploitation are strictly prohibited"}, {"id": "4", "text": "the religion decides the issue related to the means"}], "correctAnswer": "1", "explanation": "\ud83d\udd11 Key Concept\n- Passage: \"**little regard to the means** employed for its acquisition\" \u2192 capitalism pursues profit (end) regardless of means\n- This = textbook definition of **\"the ends justify the means\"** \u2014 results-oriented moral framework\n- **Option 3** = DIRECTLY CONTRADICTED \u2014 passage states exploitation IS the means used, not prohibited \u2717\n- **Option 4:** Religion justifies injustice post-hoc \u2014 it does NOT decide what means are acceptable \u2717\n**\ud83d\udccc Related Concepts**\n- Machiavellian ethics: results-oriented framework where outcomes justify whatever methods are used\n- Passage's core critique: capitalism pursues profit through exploitation with no ethical restraint", "id": 48}, {"question": "[READING COMPREHENSION]\n**Read the following passage carefully and answer the questions that follow (Q.46 to Q.50):**\nThe capitalist system of society does not foster healthy relatio         marked.setOptions({ breaks: true, gfm: true });

        const mathExtension = {
            name: 'math',
            level: 'inline',
            start(src) { return src.indexOf('$'); },
            tokenizer(src, tokens) {
                const blockRule = /^\$\$(.*?)\$\$/s;
                const inlineRule = /^\$([^$\n]+)\$/;
                let match;
                if ((match = blockRule.exec(src))) {
                    return { type: 'math', raw: match[0], text: match[1], displayMode: true };
                } else if ((match = inlineRule.exec(src))) {
                    return { type: 'math', raw: match[0], text: match[1], displayMode: false };
                }
            },
            renderer(token) {
                const safeText = token.text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                return token.displayMode ? `$$${safeText}$$` : `$${safeText}$`;
            }
        };
        marked.use({ extensions: [mathExtension] });

                    });

                return () => clearInterval(timer);

                if(isPaused) return;

                if(isPaused) return;
                const cid = TEST_DATA.questions[currentQIndex].id;
                setAnswers(prev => { const newAns = { ...prev }; delete newAns[cid]; return newAns; });
                setStatus(prev => ({ ...prev, [cid]: 'not_answered' }));
            };

            const handlePaletteClick = (index) => {

                    setStatus(prev => ({ ...prev, [cid]: 'not_answered' }));

                const tid = TEST_DATA.questions[index].id;
                if (status[tid] === 'not_visited') setStatus(prev => ({ ...prev, [tid]: 'not_answered' }));

                                                        let optClass = "text-slate-600 bg-white border-slate-200";
                                                        let icon = "○";

                            </div>
                        </div>
                        <div className="flex items-center gap-3">
                            {!isPaused && !isSubmitted && (
                                <button onClick={() => setIsPaused(true)} className="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-600 hover:bg-slate-200 hover:text-blue-600 transition" title="Pause Test"><Icons.Pause /></button>
                            )}
                            <div className="hidden md:flex items-center gap-3 pl-3 border-l border-slate-200">
                                <div className="w-10 h-10 rounded-full bg-gradient-to-r from-blue-400 to-indigo-500 p-0.5 shadow-md">
                                    <div className="w-full h-full bg-white rounded-full flex items-center justify-center text-slate-800"><Icons.User /></div>
                                </div>
                            </div>
                            <button className="md:hidden w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-600" onClick={() => setIsPaletteOpen(!isPaletteOpen)}><Icons.Menu /></button>
                        </div>
                    </header>

                    <div className="flex-1 flex overflow-hidden relative">
                        <div className={`flex-1 flex flex-col w-full transition-all duration-300 ${isPaused ? 'blur-content' : ''}`}>
                            <div className="flex-1 overflow-y-auto p-4 md:p-8 lg:p-12">
                                <div className="max-w-4xl mx-auto bg-white rounded-3xl p-8 shadow-sm border border-slate-100">
                                    <div className="flex justify-between items-center mb-8 pb-4 border-b border-slate-100">
                                        <div className="flex items-center gap-3">
                                            <span className="bg-blue-600 text-white px-5 py-2 rounded-full text-sm font-black shadow-md shadow-blue-600/20">Question {currentQIndex + 1}</span>
                                        </div>
                                        <div className="flex gap-2">
                                            <span className="bg-green-50 text-green-600 px-4 py-1.5 rounded-full text-xs font-bold border border-green-200">+{TEST_DATA.marksForCorrect}</span>
                                            <span className="bg-red-50 text-red-600 px-4 py-1.5 rounded-full text-xs font-bold border border-red-200">-{TEST_DATA.marksForWrong}</span>
                                        </div>
                                    </div>
                                    <div className="text-[17px] text-slate-800 markdown-body mb-8 leading-relaxed" dangerouslySetInnerHTML={{ __html: marked.parse(currentQuestion.question) }}></div>
                                    <div className="space-y-4">
                                        {currentQuestion.options.map(opt => {
                                            const isSelected = answers[currentQuestion.id] === opt.id;
                                            return (
                                                <div key={opt.id} onClick={() => handleOptionSelect(opt.id)} className={`group relative p-5 rounded-2xl cursor-pointer flex items-center gap-5 transition-all duration-200 border-2 ${isSelected ? 'border-blue-600 bg-blue-50/50 shadow-sm option-selected' : 'border-slate-200 hover:border-blue-300 hover:bg-slate-50'}`}>
                                                    <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center flex-shrink-0 custom-radio ${isSelected ? 'border-blue-600 bg-white' : 'border-slate-300 group-hover:border-blue-400'}`}></div>
                                                    <div className="text-slate-700 font-medium markdown-body flex-1 text-[16px]" style={{marginBottom:0}} dangerouslySetInnerHTML={{ __html: marked.parseInline(opt.text) }}></div>
                                                </div>
                                            )
                                        })}
                                    </div>
                                </div>
                            </div>
                            <div className="glass-nav border-t border-slate-200 p-5 md:px-12 flex items-center justify-between z-10">
                                <div className="flex gap-3">
                                    <button onClick={handleMarkForReview} className="px-6 py-3.5 bg-purple-50 text-purple-700 hover:bg-purple-100 rounded-full font-bold text-sm transition border border-purple-200"><span className="hidden md:inline">Mark for Review</span><span className="md:hidden">Review</span></button>
                                    <button onClick={handleClearResponse} className="px-6 py-3.5 bg-slate-100 text-slate-600 hover:bg-slate-200 rounded-full font-bold text-sm transition">Clear</button>
                                </div>
                                <button onClick={handleSaveAndNext} className="px-8 py-3.5 bg-blue-600 hover:bg-blue-700 text-white rounded-full font-black text-sm shadow-lg shadow-blue-600/30 transition transform active:scale-95 flex items-center gap-2">Save & Next <span className="text-xl leading-none">→</span></button>
                            </div>
                        </div>

                        <div className={`absolute inset-y-0 right-0 w-[320px] bg-white shadow-2xl transform transition-transform duration-300 z-30 flex flex-col border-l border-slate-200 ${isPaletteOpen ? 'translate-x-0' : 'translate-x-full'} md:translate-x-0 md:relative`}>
                            <div className="p-5 border-b border-slate-100 flex items-center gap-4 bg-slate-50">
                                <div className="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center text-blue-600"><Icons.User /></div>
                                <div><div className="font-bold text-slate-800">Candidate</div><div className="text-xs text-slate-500">{TEST_DATA.organization} Student</div></div>
                                <button className="ml-auto md:hidden text-slate-400" onClick={() => setIsPaletteOpen(false)}>✕</button>
                            </div>
                            <div className="p-5 grid grid-cols-2 gap-4 text-xs font-semibold border-b border-slate-100">
                                <div className="flex items-center gap-2 text-slate-600"><div className="w-3 h-3 rounded-full bg-[#10b981]"></div> Answered ({counts.answered})</div>
                                <div className="flex items-center gap-2 text-slate-600"><div className="w-3 h-3 rounded-full bg-[#ef4444]"></div> Not Ans ({counts.not_answered})</div>
                                <div className="flex items-center gap-2 text-slate-600"><div className="w-3 h-3 rounded-full bg-[#8b5cf6]"></div> Marked ({counts.marked + counts.marked_answered})</div>
                                <div className="flex items-center gap-2 text-slate-600"><div className="w-3 h-3 rounded-full border-2 border-slate-300 bg-slate-50"></div> Unvisited ({counts.not_visited})</div>
                            </div>
                            <div className="flex-1 overflow-y-auto p-5">
                                <div className="font-bold text-slate-700 mb-4 text-sm">Question Navigation:</div>
                                <div className="grid grid-cols-5 gap-2.5">
                                    {TEST_DATA.questions.map((q, idx) => (
                                        <button key={q.id} onClick={() => handlePaletteClick(idx)} className={`h-11 w-full flex items-center justify-center font-bold text-sm rounded-xl transition shadow-sm border ${currentQIndex === idx ? 'current-question' : 'border-transparent'} status-${status[q.id]}`}>{idx + 1}</button>
                                    ))}
                                </div>
                            </div>
                            <div className="p-5 border-t border-slate-100 bg-white">
                                <button onClick={() => handleSubmit(false)} className="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black py-4 rounded-2xl shadow-lg shadow-emerald-500/20 transition transform active:scale-95 text-lg">Submit Final Test</button>
                            </div>
                        </div>
                    </div>
                    {isPaletteOpen && <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-20 md:hidden" onClick={() => setIsPaletteOpen(false)}></div>}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
