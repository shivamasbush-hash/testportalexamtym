/* ══════════════════════════════════════
   DESIGN TOKENS
══════════════════════════════════════ */
:root {
  /* Brand */
  --blue:      #1D4ED8;
  --blue-dark: #1E40AF;
  --blue-mid:  #2563EB;
  --blue-lt:   #DBEAFE;
  --blue-glow: rgba(37,99,235,0.15);
  --green:     #059669;
  --green-lt:  #D1FAE5;
  --amber:     #D97706;
  --amber-lt:  #FEF3C7;
  --red:       #DC2626;
  --red-lt:    #FEE2E2;
  --purple:    #7C3AED;
  --purple-lt: #EDE9FE;

  /* Surface */
  --bg:        #F8FAFF;
  --surface:   #FFFFFF;
  --surface2:  #F1F5FF;
  --border:    #E2E8F0;
  --border2:   #CBD5E1;

  /* Text */
  --tx-1:  #0F172A;
  --tx-2:  #334155;
  --tx-3:  #64748B;
  --tx-4:  #94A3B8;

  /* Shadows */
  --sh-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --sh-md: 0 4px 12px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.04);
  --sh-lg: 0 10px 30px rgba(0,0,0,0.10), 0 4px 8px rgba(0,0,0,0.05);
  --sh-xl: 0 20px 50px rgba(0,0,0,0.12), 0 8px 16px rgba(0,0,0,0.06);
  --sh-blue: 0 4px 14px rgba(29,78,216,0.25);

  /* Layout */
  --sidebar-w: 260px;
  --topbar-h:  56px;
  --radius:    12px;
  --radius-sm: 8px;
  --radius-lg: 16px;
}

/* Dark Mode */
[data-theme=dark] {
  --bg:       #0B1120;
  --surface:  #111827;
  --surface2: #1E2A3A;
  --border:   #1E293B;
  --border2:  #334155;
  --tx-1:     #F1F5F9;
  --tx-2:     #CBD5E1;
  --tx-3:     #94A3B8;
  --tx-4:     #475569;
  --blue-lt:  rgba(37,99,235,0.15);
  --green-lt: rgba(5,150,105,0.15);
  --amber-lt: rgba(217,119,6,0.15);
  --red-lt:   rgba(220,38,38,0.15);
  --purple-lt:rgba(124,58,237,0.15);
  --sh-sm: 0 1px 3px rgba(0,0,0,0.3);
  --sh-md: 0 4px 12px rgba(0,0,0,0.4);
  --sh-lg: 0 10px 30px rgba(0,0,0,0.5);
}

/* ══════════════════════════════════════
   RESET & BASE
══════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--tx-1);
  min-height: 100vh;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
button, input, select, textarea { font-family: inherit; }
a { text-decoration: none; color: inherit; }
img { max-width: 100%; display: block; }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

/* ══════════════════════════════════════
   LOGIN SCREEN
══════════════════════════════════════ */
#loginScreen {
  position: fixed; inset: 0; z-index: 9000;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(160deg, #0F172A 0%, #1E3A8A 50%, #0F172A 100%);
  overflow: hidden;
}
#loginScreen::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 20% 30%, rgba(37,99,235,0.3) 0%, transparent 100%),
    radial-gradient(ellipse 50% 40% at 80% 70%, rgba(124,58,237,0.2) 0%, transparent 100%);
}
#loginScreen.hidden { display: none; }

.login-card {
  position: relative; z-index: 1;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.12);
  backdrop-filter: blur(40px);
  border-radius: 24px;
  padding: 2.5rem 2rem;
  width: min(420px, 92vw);
  text-align: center;
  animation: fadeUp .6s cubic-bezier(.22,1,.36,1) both;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(24px); }
  to   { opacity:1; transform:translateY(0); }
}
.login-logo {
  height: 48px; margin: 0 auto 1.5rem;
  background: white; border-radius: 10px;
  padding: 7px 16px; object-fit: contain;
}
.login-title {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 1.5rem; font-weight: 800;
  color: white; margin-bottom: .4rem;
}
.login-sub {
  font-size: .875rem; color: rgba(255,255,255,.55);
  margin-bottom: 2rem; line-height: 1.6;
}
.login-features {
  display: flex; justify-content: center;
  gap: 1.25rem; margin-bottom: 2rem; flex-wrap: wrap;
}
.lf { display: flex; align-items: center; gap: 5px;
  font-size: .75rem; font-weight: 600;
  color: rgba(255,255,255,.55); }
.lf i { font-size: .8rem; }
.btn-google {
  width: 100%; background: white; color: #1a202c;
  border: none; padding: .875rem 1.25rem;
  border-radius: var(--radius); font-size: .9375rem;
  font-weight: 600; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  box-shadow: 0 4px 20px rgba(0,0,0,.3);
  transition: transform .2s, box-shadow .2s;
}
.btn-google:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,.4); }
.btn-google img { width: 20px; height: 20px; }
.login-note { font-size: .72rem; color: rgba(255,255,255,.25); margin-top: 1rem; }

/* ══════════════════════════════════════
   EMAIL MODAL
══════════════════════════════════════ */
.modal-backdrop {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.6); z-index: 8000;
  align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-backdrop.open { display: flex; }
.em-card {
  background: var(--surface); border-radius: 20px;
  padding: 2rem; width: min(400px,92vw);
  box-shadow: var(--sh-xl);
  animation: popIn .3s cubic-bezier(.34,1.56,.64,1) both;
  text-align: center;
}
@keyframes popIn {
  from { transform:scale(.85); opacity:0; }
  to   { transform:scale(1); opacity:1; }
}
.em-logo { height: 38px; margin: 0 auto 1.25rem; object-fit: contain; }
.em-title {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 1.125rem; font-weight: 800;
  margin-bottom: .25rem; color: var(--tx-1);
}
.em-sub { font-size: .8125rem; color: var(--tx-3); margin-bottom: 1.25rem; }
.em-input-wrap { position: relative; margin-bottom: .625rem; }
.em-input-wrap i { position: absolute; left: .875rem; top: 50%; transform: translateY(-50%); color: var(--tx-4); }
#emailInput {
  width: 100%; padding: .8125rem .875rem .8125rem 2.5rem;
  border-radius: var(--radius); border: 1.5px solid var(--border);
  background: var(--surface2); color: var(--tx-1);
  font-size: .9375rem; outline: none;
  transition: border-color .2s, box-shadow .2s;
}
#emailInput:focus { border-color: var(--blue-mid); box-shadow: 0 0 0 3px var(--blue-glow); }
#emailErr { display: none; color: var(--red); font-size: .75rem; margin-bottom: .5rem; text-align: left; }
.btn-primary {
  width: 100%; background: var(--blue-mid); color: white;
  border: none; padding: .8125rem; border-radius: var(--radius);
  font-size: .9375rem; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: background .2s, transform .1s;
  margin-bottom: .625rem;
}
.btn-primary:hover { background: var(--blue-dark); }
.btn-primary:active { transform: scale(.98); }
.btn-ghost { background: none; border: none; color: var(--tx-3); font-size: .8125rem; cursor: pointer; }

/* ══════════════════════════════════════
   APP SHELL
══════════════════════════════════════ */
#app { display: none; }
.app-layout { display: flex; min-height: 100vh; }

/* ══════════════════════════════════════
   SIDEBAR
══════════════════════════════════════ */
.sidebar {
  width: var(--sidebar-w); background: var(--surface);
  border-right: 1px solid var(--border);
  position: fixed; top: 0; left: 0; height: 100vh;
  display: flex; flex-direction: column;
  z-index: 500; overflow-y: auto; overflow-x: hidden;
  transition: transform .3s cubic-bezier(.22,1,.36,1);
  scrollbar-width: none;
}
.sidebar::-webkit-scrollbar { display: none; }

.sb-brand {
  padding: 1rem 1.125rem;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  min-height: var(--topbar-h);
}
.sb-brand img { height: 32px; object-fit: contain; }

.sb-nav { flex: 1; padding: .75rem .75rem 0; }
.sb-section { margin-bottom: 1.25rem; }
.sb-label {
  font-size: .6875rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .08em;
  color: var(--tx-4); padding: 0 .5rem;
  margin-bottom: .375rem; display: block;
}
.sb-link {
  display: flex; align-items: center; gap: .625rem;
  padding: .5625rem .625rem; border-radius: var(--radius-sm);
  color: var(--tx-2); font-size: .875rem; font-weight: 500;
  cursor: pointer; transition: all .15s;
  margin-bottom: 1px; border: none; background: none;
  width: 100%; text-align: left;
}
.sb-link i { width: 18px; text-align: center; font-size: .875rem; flex-shrink: 0; color: var(--tx-4); }
.sb-link:hover { background: var(--surface2); color: var(--tx-1); }
.sb-link:hover i { color: var(--blue-mid); }
.sb-link.active { background: var(--blue-lt); color: var(--blue-mid); font-weight: 600; }
.sb-link.active i { color: var(--blue-mid); }
.sb-link.sub { padding-left: 2rem; font-size: .8125rem; color: var(--tx-3); }
.sb-link.sub.active { color: var(--blue-mid); }

.sb-chip {
  margin-left: auto; font-size: .625rem; font-weight: 700;
  padding: .15rem .4rem; border-radius: 99px;
  text-transform: uppercase; letter-spacing: .03em;
}
.chip-blue   { background: var(--blue-lt); color: var(--blue-mid); }
.chip-green  { background: var(--green-lt); color: var(--green); }
.chip-amber  { background: var(--amber-lt); color: var(--amber); }

.sb-footer {
  padding: .75rem;
  border-top: 1px solid var(--border);
  margin-top: auto;
}
.sb-user {
  display: flex; align-items: center; gap: .625rem;
  padding: .625rem; border-radius: var(--radius-sm);
  cursor: pointer; transition: background .15s;
}
.sb-user:hover { background: var(--surface2); }
.sb-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--blue-mid); color: white;
  display: flex; align-items: center; justify-content: center;
  font-size: .8125rem; font-weight: 700; flex-shrink: 0;
}
.sb-user-name { font-size: .8125rem; font-weight: 600; color: var(--tx-1); line-height: 1.2; }
.sb-user-email { font-size: .6875rem; color: var(--tx-3); }
.sb-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.5); z-index: 499;
}
.sb-overlay.open { display: block; }

/* ══════════════════════════════════════
   MAIN CONTENT
══════════════════════════════════════ */
.main {
  margin-left: var(--sidebar-w);
  flex: 1; display: flex; flex-direction: column;
  min-height: 100vh; min-width: 0;
}

/* ══════════════════════════════════════
   TOPBAR
══════════════════════════════════════ */
.topbar {
  height: var(--topbar-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 1.25rem;
  position: sticky; top: 0; z-index: 400;
}
.tb-left { display: flex; align-items: center; gap: .75rem; }
.tb-menu {
  display: none; background: none; border: none;
  color: var(--tx-2); font-size: 1.125rem; cursor: pointer;
  padding: .25rem; border-radius: var(--radius-sm);
}
.tb-title {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 1rem; font-weight: 700; color: var(--tx-1);
}
.tb-breadcrumb {
  display: flex; align-items: center; gap: .375rem;
  font-size: .8125rem; color: var(--tx-3);
}
.tb-breadcrumb .bc-sep { color: var(--border2); }
.tb-breadcrumb .bc-cur { color: var(--tx-1); font-weight: 600; }
.tb-breadcrumb span { cursor: pointer; }
.tb-breadcrumb span:hover { color: var(--blue-mid); }

.tb-right { display: flex; align-items: center; gap: .5rem; }
.pill-btn {
  display: flex; align-items: center; gap: .375rem;
  background: var(--surface2); border: 1.5px solid var(--border);
  color: var(--tx-2); padding: .375rem .75rem;
  border-radius: 99px; font-size: .75rem; font-weight: 600;
  cursor: pointer; transition: all .15s;
}
.pill-btn:hover { border-color: var(--blue-mid); color: var(--blue-mid); }
.sync-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green); flex-shrink: 0;
}
.sync-dot.busy { background: var(--amber); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

.icon-btn {
  width: 34px; height: 34px; border-radius: var(--radius-sm);
  background: none; border: 1.5px solid var(--border);
  color: var(--tx-2); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: .875rem; transition: all .15s;
}
.icon-btn:hover { background: var(--surface2); border-color: var(--border2); }

/* ══════════════════════════════════════
   EXAM COUNTDOWN BAR
══════════════════════════════════════ */
.cd-bar {
  background: #0F172A;
  padding: .5rem 1.25rem;
  display: flex; align-items: center; gap: .75rem;
  overflow-x: auto; scrollbar-width: none;
}
.cd-bar::-webkit-scrollbar { display: none; }
.cd-label {
  font-size: .625rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .1em;
  color: rgba(255,255,255,.3); white-space: nowrap; flex-shrink: 0;
}
.cd-sep { width: 1px; height: 16px; background: rgba(255,255,255,.1); flex-shrink: 0; }
.cd-chips { display: flex; gap: .5rem; }
.cd-chip {
  display: flex; align-items: center; gap: .5rem;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 8px; padding: .3rem .625rem;
  white-space: nowrap; flex-shrink: 0;
}
.cd-name { font-size: .6875rem; font-weight: 600; color: rgba(255,255,255,.8); }
.cd-time { display: flex; align-items: center; gap: 3px; }
.cd-unit { text-align: center; min-width: 26px; }
.cd-n {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: .75rem; font-weight: 800;
  color: white; display: block; line-height: 1;
  font-variant-numeric: tabular-nums;
}
.cd-u { font-size: .42rem; color: rgba(255,255,255,.35); text-transform: uppercase; }
.cd-colon { color: rgba(255,255,255,.3); font-size: .7rem; font-weight: 700; }
.cd-chip.urgent { border-color: rgba(239,68,68,.4); background: rgba(239,68,68,.08); }
.cd-chip.urgent .cd-n, .cd-chip.urgent .cd-name { color: #FCA5A5; }
.cd-chip.soon { border-color: rgba(245,158,11,.4); background: rgba(245,158,11,.06); }
.cd-chip.soon .cd-n, .cd-chip.soon .cd-name { color: #FCD34D; }
.cd-chip.ok .cd-n { color: #93C5FD; }
.cd-empty { color: rgba(255,255,255,.25); font-size: .75rem; font-style: italic; }
.cd-manage {
  margin-left: auto; flex-shrink: 0;
  background: rgba(37,99,235,.25); border: 1px solid rgba(37,99,235,.4);
  color: rgba(255,255,255,.7); border-radius: 6px;
  padding: .3rem .625rem; font-size: .6875rem; font-weight: 700;
  cursor: pointer; white-space: nowrap;
  display: flex; align-items: center; gap: 4px;
  transition: all .15s;
}
.cd-manage:hover { background: rgba(37,99,235,.4); color: white; }

/* ══════════════════════════════════════
   PAGE CONTAINER
══════════════════════════════════════ */
.page-wrap { padding: 1.5rem 1.25rem 5rem; }
.page { display: none; animation: slideUp .3s cubic-bezier(.22,1,.36,1) both; }
.page.active { display: block; }
@keyframes slideUp {
  from { opacity:0; transform:translateY(14px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ══════════════════════════════════════
   SECTION HEADER
══════════════════════════════════════ */
.sec-header { margin-bottom: 1.25rem; }
.sec-title {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 1.375rem; font-weight: 800;
  color: var(--tx-1); margin-bottom: .25rem;
}
.sec-sub { font-size: .875rem; color: var(--tx-3); }

a { text-decoration: none; color: inherit; }
img { max-width: 100%; display: block; }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

/* ══════════════════════════════════════
   LOGIN SCREEN
══════════════════════════════════════ */
#loginScreen {
  position: fixed; inset: 0; z-index: 9000;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(160deg, #0F172A 0%, #1E3A8A 50%, #0F172A 100%);
  overflow: hidden;
}
#loginScreen::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 20% 30%, rgba(37,99,235,0.3) 0%, transparent 100%),
    radial-gradient(ellipse 50% 40% at 80% 70%, rgba(124,58,237,0.2) 0%, transparent 100%);
}
#loginScreen.hidden { display: none; }

.login-card {
  position: relative; z-index: 1;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.12);
  backdrop-filter: blur(40px);
  border-radius: 24px;
  padding: 2.5rem 2rem;
  width: min(420px, 92vw);
  text-align: center;
  animation: fadeUp .6s cubic-bezier(.22,1,.36,1) both;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(24px); }
  to   { opacity:1; transform:translateY(0); }
}
.login-logo {
  height: 48px; margin: 0 auto 1.5rem;
  background: white; border-radius: 10px;
  padding: 7px 16px; object-fit: contain;
}
.login-title {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 1.5rem; font-weight: 800;
  color: white; margin-bottom: .4rem;
}
.login-sub {
  font-size: .875rem; color: rgba(255,255,255,.55);
  margin-bottom: 2rem; line-height: 1.6;
}
.login-features {
  display: flex; justify-content: center;
  gap: 1.25rem; margin-bottom: 2rem; flex-wrap: wrap;
}
.lf { display: flex; align-items: center; gap: 5px;
  font-size: .75rem; font-weight: 600;
  color: rgba(255,255,255,.55); }
.lf i { font-size: .8rem; }
.btn-google {
  width: 100%; background: white; color: #1a202c;
  border: none; padding: .875rem 1.25rem;
  border-radius: var(--radius); font-size: .9375rem;
  font-weight: 600; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  box-shadow: 0 4px 20px rgba(0,0,0,.3);
  transition: transform .2s, box-shadow .2s;
}
.btn-google:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,.4); }
.btn-google img { width: 20px; height: 20px; }
.login-note { font-size: .72rem; color: rgba(255,255,255,.25); margin-top: 1rem; }

/* ══════════════════════════════════════
   EMAIL MODAL
══════════════════════════════════════ */
.modal-backdrop {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.6); z-index: 8000;
  align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-backdrop.open { display: flex; }
.em-card {
  background: var(--surface); border-radius: 20px;
  padding: 2rem; width: min(400px,92vw);
  box-shadow: var(--sh-xl);
  animation: popIn .3s cubic-bezier(.34,1.56,.64,1) both;
  text-align: center;
}
@keyframes popIn {
  from { transform:scale(.85); opacity:0; }
  to   { transform:scale(1); opacity:1; }
}
.em-logo { height: 38px; margin: 0 auto 1.25rem; object-fit: contain; }
.em-title {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 1.125rem; font-weight: 800;
  margin-bottom: .25rem; color: var(--tx-1);
}
.em-sub { font-size: .8125rem; color: var(--tx-3); margin-bottom: 1.25rem; }
.em-input-wrap { position: relative; margin-bottom: .625rem; }
.em-input-wrap i { position: absolute; left: .875rem; top: 50%; transform: translateY(-50%); color: var(--tx-4); }
#emailInput {
  width: 100%; padding: .8125rem .875rem .8125rem 2.5rem;
  border-radius: var(--radius); border: 1.5px solid var(--border);
  background: var(--surface2); color: var(--tx-1);
  font-size: .9375rem; outline: none;
  transition: border-color .2s, box-shadow .2s;
}
#emailInput:focus { border-color: var(--blue-mid); box-shadow: 0 0 0 3px var(--blue-glow); }
#emailErr { display: none; color: var(--red); font-size: .75rem; margin-bottom: .5rem; text-align: left; }
.btn-primary {
  width: 100%; background: var(--blue-mid); color: white;
  border: none; padding: .8125rem; border-radius: var(--radius);
  font-size: .9375rem; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: background .2s, transform .1s;
  margin-bottom: .625rem;
}
.btn-primary:hover { background: var(--blue-dark); }
.btn-primary:active { transform: scale(.98); }
.btn-ghost { background: none; border: none; color: var(--tx-3); font-size: .8125rem; cursor: pointer; }

/* ══════════════════════════════════════
   APP SHELL
══════════════════════════════════════ */
#app { display: none; }
.app-layout { display: flex; min-height: 100vh; }

/* ══════════════════════════════════════
   SIDEBAR
══════════════════════════════════════ */
.sidebar {
  width: var(--sidebar-w); background: var(--surface);
  border-right: 1px solid var(--border);
  position: fixed; top: 0; left: 0; height: 100vh;
  display: flex; flex-direction: column;
  z-index: 500; overflow-y: auto; overflow-x: hidden;
  transition: transform .3s cubic-bezier(.22,1,.36,1);
  scrollbar-width: none;
}
.sidebar::-webkit-scrollbar { display: none; }

.sb-brand {
  padding: 1rem 1.125rem;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  min-height: var(--topbar-h);
}
.sb-brand img { height: 32px; object-fit: contain; }

.sb-nav { flex: 1; padding: .75rem .75rem 0; }
.sb-section { margin-bottom: 1.25rem; }
.sb-label {
  font-size: .6875rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .08em;
  color: var(--tx-4); padding: 0 .5rem;
  margin-bottom: .375rem; display: block;
}
.sb-link {
  display: flex; align-items: center; gap: .625rem;
  padding: .5625rem .625rem; border-radius: var(--radius-sm);
  color: var(--tx-2); font-size: .875rem; font-weight: 500;
  cursor: pointer; transition: all .15s;
  margin-bottom: 1px; border: none; background: none;
  width: 100%; text-align: left;
}
.sb-link i { width: 18px; text-align: center; font-size: .875rem; flex-shrink: 0; color: var(--tx-4); }
.sb-link:hover { background: var(--surface2); color: var(--tx-1); }
.sb-link:hover i { color: var(--blue-mid); }
.sb-link.active { background: var(--blue-lt); color: var(--blue-mid); font-weight: 600; }
.sb-link.active i { color: var(--blue-mid); }
.sb-link.sub { padding-left: 2rem; font-size: .8125rem; color: var(--tx-3); }
.sb-link.sub.active { color: var(--blue-mid); }

.sb-chip {
  margin-left: auto; font-size: .625rem; font-weight: 700;
  padding: .15rem .4rem; border-radius: 99px;
  text-transform: uppercase; letter-spacing: .03em;
}
.chip-blue   { background: var(--blue-lt); color: var(--blue-mid); }
.chip-green  { background: var(--green-lt); color: var(--green); }
.chip-amber  { background: var(--amber-lt); color: var(--amber); }

.sb-footer {
  padding: .75rem;
  border-top: 1px solid var(--border);
  margin-top: auto;
}
.sb-user {
  display: flex; align-items: center; gap: .625rem;
  padding: .625rem; border-radius: var(--radius-sm);
  cursor: pointer; transition: background .15s;
}
.sb-user:hover { background: var(--surface2); }
.sb-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--blue-mid); color: white;
  display: flex; align-items: center; justify-content: center;
  font-size: .8125rem; font-weight: 700; flex-shrink: 0;
}
.sb-user-name { font-size: .8125rem; font-weight: 600; color: var(--tx-1); line-height: 1.2; }
.sb-user-email { font-size: .6875rem; color: var(--tx-3); }
.sb-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.5); z-index: 499;
}
.sb-overlay.open { display: block; }

/* ══════════════════════════════════════
   MAIN CONTENT
══════════════════════════════════════ */
.main {
  margin-left: var(--sidebar-w);
  flex: 1; display: flex; flex-direction: column;
  min-height: 100vh; min-width: 0;
}

/* ══════════════════════════════════════
   TOPBAR
══════════════════════════════════════ */
.topbar {
  height: var(--topbar-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 1.25rem;
  position: sticky; top: 0; z-index: 400;
}
.tb-left { display: flex; align-items: center; gap: .75rem; }
.tb-menu {
  display: none; background: none; border: none;
  color: var(--tx-2); font-size: 1.125rem; cursor: pointer;
  padding: .25rem; border-radius: var(--radius-sm);
}
.tb-title {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 1rem; font-weight: 700; color: var(--tx-1);
}
.tb-breadcrumb {
  display: flex; align-items: center; gap: .375rem;
  font-size: .8125rem; color: var(--tx-3);
}
.tb-breadcrumb .bc-sep { color: var(--border2); }
.tb-breadcrumb .bc-cur { color: var(--tx-1); font-weight: 600; }
.tb-breadcrumb span { cursor: pointer; }
.tb-breadcrumb span:hover { color: var(--blue-mid); }

.tb-right { display: flex; align-items: center; gap: .5rem; }
.pill-btn {
  display: flex; align-items: center; gap: .375rem;
  background: var(--surface2); border: 1.5px solid var(--border);
  color: var(--tx-2); padding: .375rem .75rem;
  border-radius: 99px; font-size: .75rem; font-weight: 600;
  cursor: pointer; transition: all .15s;
}
.pill-btn:hover { border-color: var(--blue-mid); color: var(--blue-mid); }
.sync-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green); flex-shrink: 0;
}
.sync-dot.busy { background: var(--amber); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

.icon-btn {
  width: 34px; height: 34px; border-radius: var(--radius-sm);
  background: none; border: 1.5px solid var(--border);
  color: var(--tx-2); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: .875rem; transition: all .15s;
}
.icon-btn:hover { background: var(--surface2); border-color: var(--border2); }

/* ══════════════════════════════════════
   EXAM COUNTDOWN BAR
══════════════════════════════════════ */
.cd-bar {
  background: #0F172A;
  padding: .5rem 1.25rem;
  display: flex; align-items: center; gap: .75rem;
  overflow-x: auto; scrollbar-width: none;
}
.cd-bar::-webkit-scrollbar { display: none; }
.cd-label {
  font-size: .625rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .1em;
  color: rgba(255,255,255,.3); white-space: nowrap; flex-shrink: 0;
}
.cd-sep { width: 1px; height: 16px; background: rgba(255,255,255,.1); flex-shrink: 0; }
.cd-chips { display: flex; gap: .5rem; }
.cd-chip {
  display: flex; align-items: center; gap: .5rem;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 8px; padding: .3rem .625rem;
  white-space: nowrap; flex-shrink: 0;
}
.cd-name { font-size: .6875rem; font-weight: 600; color: rgba(255,255,255,.8); }
.cd-time { display: flex; align-items: center; gap: 3px; }
.cd-unit { text-align: center; min-width: 26px; }
.cd-n {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: .75rem; font-weight: 800;
  color: white; display: block; line-height: 1;
  font-variant-numeric: tabular-nums;
}
.cd-u { font-size: .42rem; color: rgba(255,255,255,.35); text-transform: uppercase; }
.cd-colon { color: rgba(255,255,255,.3); font-size: .7rem; font-weight: 700; }
.cd-chip.urgent { border-color: rgba(239,68,68,.4); background: rgba(239,68,68,.08); }
.cd-chip.urgent .cd-n, .cd-chip.urgent .cd-name { color: #FCA5A5; }
.cd-chip.soon { border-color: rgba(245,158,11,.4); background: rgba(245,158,11,.06); }
.cd-chip.soon .cd-n, .cd-chip.soon .cd-name { color: #FCD34D; }
.cd-chip.ok .cd-n { color: #93C5FD; }
.cd-empty { color: rgba(255,255,255,.25); font-size: .75rem; font-style: italic; }
.cd-manage {
  margin-left: auto; flex-shrink: 0;
  background: rgba(37,99,235,.25); border: 1px solid rgba(37,99,235,.4);
  color: rgba(255,255,255,.7); border-radius: 6px;
  padding: .3rem .625rem; font-size: .6875rem; font-weight: 700;
  cursor: pointer; white-space: nowrap;
  display: flex; align-items: center; gap: 4px;
  transition: all .15s;
}
.cd-manage:hover { background: rgba(37,99,235,.4); color: white; }

/* ══════════════════════════════════════
   PAGE CONTAINER
══════════════════════════════════════ */
.page-wrap { padding: 1.5rem 1.25rem 5rem; }
.page { display: none; animation: slideUp .3s cubic-bezier(.22,1,.36,1) both; }
.page.active { display: block; }
@keyframes slideUp {
  from { opacity:0; transform:translateY(14px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ══════════════════════════════════════
   SECTION HEADER
══════════════════════════════════════ */
.sec-header { margin-bottom: 1.25rem; }
.sec-title {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 1.375rem; font-weight: 800;
  color: var(--tx-1); margin-bottom: .25rem;
}
.sec-sub { font-size: .875rem; color: var(--tx-3); }

/* ══════════════════════════════════════
   STATS ROW
══════════════════════════════════════ */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: .75rem; margin-bottom: 1.5rem;
}
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1rem;
  transition: box-shadow .2s;
}
.stat-card:hover { box-shadow: var(--sh-md); }
.stat-icon {
  width: 36px; height: 36px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; margin-bottom: .75rem;
}
.stat-n {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 1.625rem; font-weight: 800;
  color: var(--tx-1); line-height: 1; display: block;
}
.stat-l { font-size: .75rem; color: var(--tx-3); font-weight: 500; margin-top: .25rem; }

/* ══════════════════════════════════════
   SUBJECT CARDS
══════════════════════════════════════ */
.subjects-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 1rem; margin-bottom: 1.5rem;
}
.subj-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); overflow: hidden;
  cursor: pointer; transition: all .2s;
  box-shadow: var(--sh-sm);
}
.subj-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--sh-lg);
  border-color: var(--border2);
}
.subj-card-top {
  padding: 1.25rem; display: flex; align-items: flex-start; gap: .875rem;
}
.subj-icon {
  width: 46px; height: 46px; border-radius: 11px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.25rem; flex-shrink: 0;
}
.subj-info { flex: 1; min-width: 0; }
.subj-name {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 1rem; font-weight: 800;
  color: var(--tx-1); margin-bottom: .25rem;
}
.subj-meta { font-size: .75rem; color: var(--tx-3); }
.subj-arrow { color: var(--tx-4); font-size: .875rem; align-self: center; }

.subj-stats {
  display: flex; border-top: 1px solid var(--border);
}
.subj-stat {
  flex: 1; padding: .75rem .5rem; text-align: center;
  border-right: 1px solid var(--border);
  transition: background .15s; cursor: pointer;
}
.subj-stat:last-child { border-right: none; }
.subj-stat:hover { background: var(--surface2); }
.subj-stat-n {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 1rem; font-weight: 800; display: block;
}
.subj-stat-l { font-size: .6rem; color: var(--tx-3); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }

.subj-prog { padding: .875rem 1.25rem; border-top: 1px solid var(--border); }
.prog-bar-wrap { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; }
.prog-bar-fill { height: 100%; border-radius: 99px; transition: width .8s cubic-bezier(.22,1,.36,1); }
.prog-labels { display: flex; justify-content: space-between; font-size: .6875rem; color: var(--tx-3); margin-top: .375rem; font-weight: 500; }

.subj-actions { padding: .875rem 1.25rem; display: flex; gap: .5rem; border-top: 1px solid var(--border); }
.btn-sm {
  flex: 1; padding: .5625rem; border-radius: var(--radius-sm);
  font-size: .8125rem; font-weight: 600; cursor: pointer;
  border: none; transition: all .15s;
  display: flex; align-items: center; justify-content: center; gap: 5px;
}
.btn-sm-primary { background: var(--blue-mid); color: white; }
.btn-sm-primary:hover { background: var(--blue-dark); }
.btn-sm-outline { background: var(--surface2); color: var(--tx-2); border: 1.5px solid var(--border); }
.btn-sm-outline:hover { border-color: var(--blue-mid); color: var(--blue-mid); }

/* ══════════════════════════════════════
   SUBJECT DETAIL PAGE
══════════════════════════════════════ */
.subj-page-header {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 1.25rem;
  display: flex; align-items: center; gap: 1rem;
  margin-bottom: 1.25rem; box-shadow: var(--sh-sm);
}
.subj-page-icon {
  width: 52px; height: 52px; border-radius: 13px;
  display: flex; align-items: center; justify-content: center;
  font-size:
