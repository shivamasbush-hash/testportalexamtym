    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const TEST_DATA = {"title": "Commerce December 2024 PYQ", "organization": "ExamTym", "durationMinutes": 120, "totalMarks": 200.0, "marksForCorrect": 2.0, "marksForWrong": 0.0, "passPercentage": 40, "shuffle": false, "strictMode": false, "questions": [{"question": "Which one of the following refers to the composition of long-term funds such as debentures, long term borrowing, preference shares, equity shares in the capitalization of the company?", "options": [{"id": "1", "text": "Cost of capital"}, {"id": "2", "text": "Capital budgeting"}, {"id": "3", "text": "Working Capital"}, {"id": "4", "text": "Capital Structure"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* Capital structure is the specific mix of long-term debt and equity financing.\n* It includes debentures, long-term borrowings, and equity/preference shares.\n* The goal is to minimize the firm's overall cost of capital.\n* It determines the financial risk profile of the organization.\n**Related Concepts:**\n* Trading on Equity.\n* Optimal Capital Structure Theories.", "id": 1}, {"question": "Arrange the following steps in the proper sequence to develop effective marketing communication.\nA. Design the communication\nB. Select the communication channel\nC. Identify the target audience\nD. Choose the communication mix\nE. Choose the communication objectives", "options": [{"id": "1", "text": "E, A, C, B, D"}, {"id": "2", "text": "C, A, B, D, E"}, {"id": "3", "text": "E, B, C, A, D"}, {"id": "4", "text": "C, E, A, B, D"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* The process begins with identifying the specific target audience (C).\n* Next, marketers establish clear communication objectives (E).\n* The actual message and communication are then designed (A).\n* Channels (personal or non-personal) are selected next (B).\n* Finally, the marketing communication mix is established (D).\n**Related Concepts:**\n* Integrated Marketing Communications (IMC).\n* Buyer-Readiness Stages.", "id": 2}, {"question": "A contract of Indemnity is a:", "options": [{"id": "1", "text": "Wagering Agreement"}, {"id": "2", "text": "Quasi contract"}, {"id": "3", "text": "Void contract"}, {"id": "4", "text": "Contingent contract"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* Indemnity promises to save the other party from loss caused by human conduct.\n* Its performance relies entirely on the happening of an uncertain future event.\n* Because it is conditional, it structurally qualifies as a contingent contract.\n* Unlike wagering, it is legally valid and enforceable.\n**Related Concepts:**\n* Contract of Guarantee.\n* Indian Contract Act, 1872 (Section 124).", "id": 3}, {"question": "Which of the following are the features of Treasury Bills?\nA. Negotiable securities\nB. Issued at par and are repaid at premium on maturity\nC. High liquidity on account of short tenure\nD. Assured Yield\nE. High transaction cost", "options": [{"id": "1", "text": "A, B, E Only"}, {"id": "2", "text": "A, C, D Only"}, {"id": "3", "text": "B, C, D Only"}, {"id": "4", "text": "A, C, D, E Only"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* Treasury Bills are short-term money market instruments issued by the government.\n* They are highly liquid and freely negotiable securities (A, C).\n* Backed by the sovereign, they carry zero default risk, offering assured yield (D).\n* They are issued at a discount and redeemed at par, not at a premium.\n**Related Concepts:**\n* Zero Coupon Bonds.\n* Money Market Operations.", "id": 4}, {"question": "Arrange the following stages of conflict process in the proper sequence.\nA. Outcomes\nB. Potential opposition or incompatibility\nC. Behavior\nD. Cognition and personalization\nE. Intentions", "options": [{"id": "1", "text": "D, B, E, C, A"}, {"id": "2", "text": "B, D, E, C, A"}, {"id": "3", "text": "A, B, E, D, C"}, {"id": "4", "text": "D, C, B, E, A"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* Stage 1 is the presence of conditions creating potential opposition (B).\n* Stage 2 involves cognition and personalization where conflict is perceived (D).\n* Stage 3 formulates intentions or decisions to act in a certain way (E).\n* Stage 4 is the observable behavior and reactions (C).\n* Stage 5 results in the final functional or dysfunctional outcomes (A).\n**Related Concepts:**\n* Conflict Handling Styles.\n* Organizational Behavior.", "id": 5}, {"question": "Which of the following is a situation of adverse balance of trade?", "options": [{"id": "1", "text": "Import more than exports"}, {"id": "2", "text": "Import equals exports"}, {"id": "3", "text": "Exports more than imports"}, {"id": "4", "text": "Exports Surplus"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* Balance of Trade (BOT) measures the difference in value of visible exports and imports.\n* An adverse or unfavorable balance means a country imports more than it exports.\n* This scenario leads to a net outflow of domestic currency.\n* Favorable trade occurs when export values exceed import values.\n**Related Concepts:**\n* Balance of Payments (BOP).\n* Current Account Deficit.", "id": 6}, {"question": "Prepaid Insurance is which type of account?", "options": [{"id": "1", "text": "Real Account"}, {"id": "2", "text": "Personal Account"}, {"id": "3", "text": "Nominal Account"}, {"id": "4", "text": "Real and Nominal Both"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* Traditional accounting classifies accounts into Real, Nominal, and Personal.\n* Prepaid insurance is not a tangible asset (Real) or a sunk expense (Nominal).\n* It represents an advance payment made to a specific insurance company or person.\n* Therefore, it is categorized as a \"Representative Personal Account\".\n**Related Concepts:**\n* Outstanding Expenses.\n* Golden Rules of Accounting.", "id": 7}, {"question": "Which one of the following is not a social network of social media platform?", "options": [{"id": "1", "text": "Facebook"}, {"id": "2", "text": "Blogs"}, {"id": "3", "text": "Twitter"}, {"id": "4", "text": "YouTube"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* Social networks (Facebook, Twitter, YouTube) are centralized platforms for peer-to-peer interaction.\n* They rely on algorithms, friends/follower graphs, and user-generated feeds.\n* Blogs are independently hosted informational websites or online journals.\n* While they allow comments, blogs lack the interconnected network structure of social media.\n**Related Concepts:**\n* Web 2.0.\n* Owned vs. Earned Media.", "id": 8}, {"question": "Which is the value of the Standard Deviation of the first seven natural numbers?", "options": [{"id": "1", "text": "$\\sqrt{48}$"}, {"id": "2", "text": "2"}, {"id": "3", "text": "$\\sqrt{8}$"}, {"id": "4", "text": "4"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* The standard deviation of the first 'n' natural numbers has a fixed mathematical formula.\n* Formula: $\\sqrt{(n^2 - 1) / 12}$.\n* For n = 7: $\\sqrt{(7^2 - 1) / 12} = \\sqrt{48 / 12}$.\n* The result is $\\sqrt{4}$, which equals exactly 2.\n**Related Concepts:**\n* Measures of Dispersion.\n* Variance Properties.", "id": 9}, {"question": "Match the LIST-I with LIST-II.\n| LIST-I (Conflict Handling intentions) | LIST-II (Description) |\n| :--- | :--- |\n| A. Competing | I. A situation in which each party in a conflict desire to satisfy fully the concerns of all participants. |\n| B. Collaborating | II. The willingness of one party in a conflict to place the negotiating partners interest above their own. |\n| C. Accommodating | III. A situation in which each party to a conflict is willing to give up something to resolve the conflict. |\n| D. Compromising | IV. A desire to satisfy one's interests regardless of the impact on the other party to the conflict. |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "A-I, B-IV, C-II, D-III"}, {"id": "2", "text": "A-IV, B-I, C-II, D-III"}, {"id": "3", "text": "A-IV, B-I, C-III, D-II"}, {"id": "4", "text": "A-IV, B-II, C-I, D-III"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* Competing prioritizes own interests over others (A-IV).\n* Collaborating seeks a win-win scenario satisfying all concerns (B-I).\n* Accommodating involves yielding and placing the partner's interests first (C-II).\n* Compromising requires both sides to give up something to reach an agreement (D-III).\n**Related Concepts:**\n* Thomas-Kilmann Conflict Instrument.\n* Assertiveness and Cooperativeness.", "id": 10}, {"question": "Arrange the organizational aspect of employees need hierarchy in the increasing order.\nA. Cohesive and supportive co-workers\nB. Work place conditions\nC. Work safety\nD. Responsibilities\nE. Job Challenge", "options": [{"id": "1", "text": "C, B, D, A, E"}, {"id": "2", "text": "B, C, A, D, E"}, {"id": "3", "text": "A, C, B, E, D"}, {"id": "4", "text": "B, A, C, D, E"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* Physiological needs map to basic Work place conditions (B).\n* Safety needs map to Work safety and security (C).\n* Social needs map to supportive co-workers and belonging (A).\n* Esteem needs are met through taking on Responsibilities (D).\n* Self-actualization is achieved through significant Job Challenges (E).\n**Related Concepts:**\n* Maslow's Hierarchy of Needs.\n* Motivation Theories.", "id": 11}, {"question": "Arrange the following steps in the logical sequence recording how to compute Net Present Value (NPV).\nA. Calculate Net Present Value (NPV) i.e., Present value of all cash inflows-present value of all cash outflows.\nB. Calculate all the cash outflows associated with the project\nC. Calculate all the cash inflows associated with the project\nD. Calculate the present value of all cash inflows associated with the project\nE. Calculate the present value of all cash outflows associated with the project", "options": [{"id": "1", "text": "A, B, C, E, D"}, {"id": "2", "text": "B, C, E, D, A"}, {"id": "3", "text": "A, C, B, E, D"}, {"id": "4", "text": "A, C, B, D, E"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* First, identify initial investments by calculating cash outflows (B).\n* Next, estimate the future returns by calculating cash inflows (C).\n* Discount the outflows to find their present value (E).\n* Discount the inflows to find their present value (D).\n* Finally, subtract PV of outflows from PV of inflows to get NPV (A).\n**Related Concepts:**\n* Discounted Cash Flow (DCF).\n* Capital Budgeting.", "id": 12}, {"question": "Arrange the practical steps involved in the preparation of the process account where there is work in progress.\nA. Prepare process account\nB. Prepare statement of Evaluation\nC. Prepare statement of cost per equivalent unit\nD. Prepare statement of equivalent production\nE. Determine and analyze the number of physical units in the form of inputs (transferred from previous process) and output", "options": [{"id": "1", "text": "A, B, C, D, E"}, {"id": "2", "text": "E, D, C, B, A"}, {"id": "3", "text": "C, D, E, A, B"}, {"id": "4", "text": "B, C, D, A, E"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* Begin by tracing the physical flow of input and output units (E).\n* Based on completion percentage, prepare the statement of equivalent production (D).\n* Calculate costs and prepare the statement of cost per equivalent unit (C).\n* Use these rates to value WIP and finished goods in an Evaluation statement (B).\n* Compile all figures into the final Process Account ledger (A).\n**Related Concepts:**\n* Equivalent Units (FIFO/Weighted Average).\n* Process Costing.", "id": 13}, {"question": "Which of the following statements are true regarding the buying dynamics of individual consumers?\nA. To successfully compete in the market and create customer value, managers must fully understand the reality rather than theory of consumer behavior.\nB. In marketing perceptions are more important than reality because they affect consumers actual behavior.\nC. People emerge with same perceptions of the same object.\nD. Consumers are constructive decision makers and are subject to many contextual influences.\nE. A consumer's buying behavior is influenced by cultural, social and personal tactics. Of these personal factors exerts the broadest and deepest influence on people's perception and desires.", "options": [{"id": "1", "text": "B, D Only"}, {"id": "2", "text": "A, B, D Only"}, {"id": "3", "text": "A, C, E Only"}, {"id": "4", "text": "B, C, D, E Only"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* Understanding the actual reality of consumer behavior is crucial for managers (A).\n* Perception dictates reality for a consumer, directly driving their purchasing actions (B).\n* Consumers make constructive decisions influenced heavily by environmental context (D).\n* Statement C is false due to selective perception; Statement E is false because cultural factors exert the deepest influence, not personal.\n**Related Concepts:**\n* Consumer Behavior Psychology.\n* Selective Perception.", "id": 14}, {"question": "Which of the following are true for Skewness?\nA. It is a measure of symmetry of a frequency distribution.\nB. For the right-skewed distribution, the mean is to the right of median.\nC. For the right-skewed distribution, the mean is to the right of mode.\nD. For the right-skewed distribution, the mean is to be left of median.\nE. For the right-skewed distribution, the mean is to be left of mode.", "options": [{"id": "1", "text": "A, B, C Only"}, {"id": "2", "text": "A, C, D Only"}, {"id": "3", "text": "A, D, E Only"}, {"id": "4", "text": "A, B, D Only"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* Skewness statistically measures the lack of symmetry in a distribution (A).\n* In a right-skewed (positive) distribution, extreme high values pull the mean upwards.\n* This results in the relationship: Mean > Median > Mode.\n* Therefore, the mean sits to the right of both the median (B) and the mode (C).\n**Related Concepts:**\n* Kurtosis.\n* Central Tendency Shifts.", "id": 15}, {"question": "The Securities Exchange Board of India (SEBI) regulates and supervises the securities through\nA. Regulations\nB. Rules\nC. Guidelines\nD. Scheme\nE. Orders", "options": [{"id": "1", "text": "A, B, E Only"}, {"id": "2", "text": "B, C, D Only"}, {"id": "3", "text": "A, B, C, D, E"}, {"id": "4", "text": "A, C, D, E Only"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* SEBI employs multiple administrative and legal tools to govern capital markets.\n* It frames statutory regulations and rules to mandate market behavior.\n* It issues guidelines and schemes to standardize procedures (e.g., ICDR guidelines).\n* It passes judicial orders to enforce compliance and penalize violations.\n**Related Concepts:**\n* Quasi-legislative powers.\n* SEBI Act, 1992.", "id": 16}, {"question": "Which of the following are the assumptions of the oligopoly?\nA. One seller and large number of buyers\nB. A few sellers and large number of buyers\nC. Large number of sellers and large number of buyers\nD. Entry of new seller is restricted\nE. Firms Interdependence", "options": [{"id": "1", "text": "C, D, E Only"}, {"id": "2", "text": "A, B, C Only"}, {"id": "3", "text": "B, D, C Only"}, {"id": "4", "text": "B, D, E Only"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* Oligopoly features a market dominated by \"a few\" large sellers serving many buyers (B).\n* Massive barriers to entry severely restrict new competitors from joining (D).\n* The small number of competitors creates high mutual interdependence regarding pricing (E).\n* A single seller defines a monopoly, completely distinct from oligopoly.\n**Related Concepts:**\n* Kinked Demand Curve.\n* Cartels and Price Rigidity.", "id": 17}, {"question": "Match the LIST-I with LIST-II\n| LIST-I (Accounting Convention) | LIST-II (Meaning) |\n| :--- | :--- |\n| A. Conservatism | I. Use of same accounting policies by a form from period to period. |\n| B. Dual aspect | II. Enterprise is treated as separate from owner and other persons associated with it. |\n| C. Separate Business entity | III. Every transaction has a two-fold effect. |\n| D. Consistency | IV. Anticipated no profit, but provide for all possible losses |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "A-IV, B-III, C-II, D-I"}, {"id": "2", "text": "A-I, B-II, C-III, D-IV"}, {"id": "3", "text": "A-II, B-III, C-I, D-IV"}, {"id": "4", "text": "A-III, B-IV, C-I, D-II"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* Conservatism (Prudence) dictates recording all anticipated losses but no unrealized gains (A-IV).\n* Dual Aspect is the foundation of double-entry, noting every transaction's two-fold effect (B-III).\n* Separate Entity establishes the business and owners as distinct legal/financial bodies (C-II).\n* Consistency requires applying the same accounting policies consistently over time (D-I).\n**Related Concepts:**\n* Generally Accepted Accounting Principles (GAAP).\n* Accounting Equation.", "id": 18}, {"question": "Arrange the following Institutions in ascending order of their year of establishment.\nA. SEBI\nB. Reserve Bank of India\nC. State Bank of India\nD. SIDBI\nE. NABARD", "options": [{"id": "1", "text": "C, B, E, A, D"}, {"id": "2", "text": "B, C, E, D, A"}, {"id": "3", "text": "B, C, A, E, D"}, {"id": "4", "text": "E, B, C, D, A"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* The Reserve Bank of India (RBI) was established first in 1935 (B).\n* State Bank of India (SBI) followed in 1955, succeeding the Imperial Bank (C).\n* NABARD was established in 1982 to support rural agriculture (E).\n* SIDBI was founded in 1990 to support MSMEs (D).\n* SEBI received its statutory powers in 1992 (A).\n**Related Concepts:**\n* Development Financial Institutions.\n* Indian Banking History.", "id": 19}, {"question": "Which section of the Income Tax Act 1961 mentions unilateral relief?", "options": [{"id": "1", "text": "90"}, {"id": "2", "text": "89"}, {"id": "3", "text": "91"}, {"id": "4", "text": "92"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* Relief from double taxation can be bilateral or unilateral.\n* Section 90 governs bilateral relief when a Double Taxation Avoidance Agreement (DTAA) exists.\n* Section 91 specifically outlines the provisions for unilateral relief.\n* Unilateral relief is granted by India even if no formal DTAA exists with the source country.\n**Related Concepts:**\n* Double Taxation Avoidance Agreement (DTAA).\n* Incidence of Tax.", "id": 20}, {"question": "In which one of the following the effectiveness of brainstorming as group decision making technique is high?", "options": [{"id": "1", "text": "Social Pressure"}, {"id": "2", "text": "Task Orientation"}, {"id": "3", "text": "Potential for interpersonal conflict"}, {"id": "4", "text": "Money Costs"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* Brainstorming requires a free-flowing, non-judgmental environment to generate ideas.\n* High task orientation focuses the group purely on solving the problem, enhancing effectiveness.\n* Social pressure suppresses unique or dissenting ideas due to conformity bias.\n* Interpersonal conflict destroys the psychological safety required for open sharing.\n**Related Concepts:**\n* Nominal Group Technique.\n* Groupthink.", "id": 21}, {"question": "Which of the following are taxes (GST) applicable in the case of supply of goods?\nI. From West Bengal to Chandigarh\nII. From Puducherry to Chennai", "options": [{"id": "1", "text": "I. CGST, II. IGST"}, {"id": "2", "text": "I. IGST, II. IGST"}, {"id": "3", "text": "I. UTGST, II. UTGST"}, {"id": "4", "text": "I. SGST, II. UTGST"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* GST levy depends strictly on whether the supply is intra-state or inter-state.\n* Supplying from West Bengal (State) to Chandigarh (UT) crosses borders, attracting IGST.\n* Supplying from Puducherry (UT) to Chennai (State) also crosses borders, attracting IGST.\n* CGST and SGST/UTGST are reserved strictly for sales within the same state/UT.\n**Related Concepts:**\n* Place of Supply Rules.\n* Inter-state vs Intra-state commerce.", "id": 22}, {"question": "Quasi contracts are based on the doctrine of:", "options": [{"id": "1", "text": "Unjust enrichment"}, {"id": "2", "text": "Just enrichment"}, {"id": "3", "text": "Unjust Richment"}, {"id": "4", "text": "Misrepresentation"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* Quasi-contracts are legal obligations imposed by law, not by mutual agreement.\n* They are fundamentally grounded in the equitable doctrine of \"Unjust Enrichment.\"\n* This principle dictates that no person should profit inequitably at another's expense.\n* If a person receives a benefit by mistake, they are legally bound to compensate the provider.\n**Related Concepts:**\n* Constructive Contracts.\n* Indian Contract Act (Sections 68-72).", "id": 23}, {"question": "Match the LIST-I with LIST-II.\n| LIST-I (Theory) | LIST-II (Author(s)) |\n| :--- | :--- |\n| A. Theory of Comparative Cost Advantage | I. Heckscher & Ohlin |\n| B. Theory of Opportunity Cost | II. David Ricardo |\n| C. Theory of Factor Endowment | III. Haberler |\n| D. Theory of Absolute Advantage | IV. Adam Smith |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "A-II, B-III, C-I, D-IV"}, {"id": "2", "text": "A-II, B-III, C-IV, D-I"}, {"id": "3", "text": "A-III, B-II, C-I, D-IV"}, {"id": "4", "text": "A-IV, B-III, C-II, D-I"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* David Ricardo developed the Theory of Comparative Cost Advantage (A-II).\n* Gottfried Haberler pioneered the Theory of Opportunity Cost in trade (B-III).\n* Heckscher and Ohlin introduced the Theory of Factor Endowment (C-I).\n* Adam Smith formulated the initial Theory of Absolute Advantage (D-IV).\n**Related Concepts:**\n* International Trade Theories.\n* Leontief Paradox.", "id": 24}, {"question": "Which of the following are the disadvantages of Graphics rating scale as an appraisal tool?\nA. Standards may be unclear\nB. Halo Effect\nC. Time consuming\nD. Difficult to develop\nE. Leniency", "options": [{"id": "1", "text": "A, B, E Only"}, {"id": "2", "text": "A, B, C Only"}, {"id": "3", "text": "B, C, E Only"}, {"id": "4", "text": "A, C, D, E Only"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* Graphic rating scales are highly subjective, leading to unclear rating standards (A).\n* They are heavily prone to the Halo Effect, where one positive trait skews all other ratings (B).\n* Evaluators often display leniency or strictness bias, rating everyone artificially high/low (E).\n* They are generally fast to use and easy to develop, contrary to options C and D.\n**Related Concepts:**\n* Central Tendency Bias.\n* Performance Appraisal Methods (BARS).", "id": 25}, {"question": "Arrange the following Securities Exchange Board of India (SEBI) regulations in the ascending year of their enactment.\nA. ICDR regulations\nB. Intermediaries regulations\nC. Real estate investment Trusts regulations\nD. Buy-Back of Securities by listed companies regulations\nE. Listing Obligations and Disclosures Requirements Regulations", "options": [{"id": "1", "text": "D, B, A, C, E"}, {"id": "2", "text": "D, A, E, C, B"}, {"id": "3", "text": "A, C, D, E, B"}, {"id": "4", "text": "B, A, E, D, C"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* Buy-Back of Securities regulations were originally introduced in 1998 (D).\n* Intermediaries regulations were enacted in 2008 (B).\n* ICDR (Issue of Capital and Disclosure Requirements) regulations came in 2009 (A).\n* Real Estate Investment Trusts (REITs) regulations were established in 2014 (C).\n* Listing Obligations and Disclosures Requirements (LODR) were enacted in 2015 (E).\n**Related Concepts:**\n* Capital Market Regulations.\n* SEBI Act.", "id": 26}, {"question": "Arrange the following levels of economic integration in increasing order.\nA. Political Union\nB. Free Trade Area\nC. Customs Union\nD. Common Market\nE. Economic Union", "options": [{"id": "1", "text": "B, C, D, E, A"}, {"id": "2", "text": "B, A, C, D, E"}, {"id": "3", "text": "B, A, D, C, E"}, {"id": "4", "text": "E, D, B, A, C"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* The lowest level is a Free Trade Area (B), removing tariffs among members.\n* Next is a Customs Union (C), which adds a common external tariff policy.\n* A Common Market (D) adds the free movement of labor and capital across borders.\n* An Economic Union (E) harmonizes macroeconomic policies and often currency.\n* A Political Union (A) is the ultimate integration, forming a unified political entity.\n**Related Concepts:**\n* Regional Trading Blocs (NAFTA, EU).\n* Trade Creation vs. Trade Diversion.", "id": 27}, {"question": "Which of the following points are considered as salient features of Limited Liability Partnership (LLP)?\nA. LLP is a body corporate\nB. LLP is a legal entity separate from its partners\nC. LLP does not enjoy a perpetual succession\nD. Partners of LLP have unlimited liability\nE. LLP is an artificial legal person", "options": [{"id": "1", "text": "A, B and E Only"}, {"id": "2", "text": "B, C and D Only"}, {"id": "3", "text": "C, D and E Only"}, {"id": "4", "text": "C and D Only"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* An LLP is structurally a body corporate functioning as an artificial legal person (A, E).\n* It is a separate legal entity distinct from its individual partners (B).\n* Unlike standard partnerships, it enjoys perpetual succession (C is false).\n* Crucially, the liability of partners is limited to their agreed contribution (D is false).\n**Related Concepts:**\n* LLP Act, 2008.\n* Corporate Veil.", "id": 28}, {"question": "Match the LIST-I with LIST-II\n| LIST-I (Concept) | LIST-II (Explanation) |\n| :--- | :--- |\n| A. Higher Indifference Curve | I. Higher Satisfaction |\n| B. Converse Indifference Curve | II. Diminishing Marginal rate of Substitution |\n| C. Price Line | III. Same satisfaction on the curve |\n| D. Indifference Curve | IV. Constant Price Ratio |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "A-I, B-II, C-III, D-IV"}, {"id": "2", "text": "A-I, B-II, C-IV, D-III"}, {"id": "3", "text": "A-I, B-III, C-IV, D-II"}, {"id": "4", "text": "A-IV, B-II, C-III, D-I"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* A higher indifference curve strictly represents a higher level of utility or satisfaction (A-I).\n* An indifference curve is convex to the origin due to the diminishing Marginal Rate of Substitution (B-II).\n* The Price Line (Budget Line) maintains a constant slope representing a constant price ratio (C-IV).\n* Every point along a single indifference curve yields the exact same satisfaction (D-III).\n**Related Concepts:**\n* Ordinal Utility Theory.\n* Consumer Equilibrium.", "id": 29}, {"question": "Beta Company Ltd issued 10% perpetual debt of \u20b91,00,000. The company's tax rate is 50%. Determine the cost of capital (before tax as well as after tax) assuming the debt is issued at 10 percent premium.", "options": [{"id": "1", "text": "Before tax cost = 9.09% and after tax cost = 4.54%"}, {"id": "2", "text": "Before tax cost = 4.54% and after tax cost = 9%"}, {"id": "3", "text": "Before tax cost = 9.90% and after tax cost = 4.45%"}, {"id": "4", "text": "Before tax cost = 10.09% and after tax cost = 5.54%"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* Interest = 10% of Face Value (1,00,000) = Rs. 10,000.\n* Net Proceeds = Face Value + Premium = 1,00,000 + 10,000 = Rs. 1,10,000.\n* Before Tax Cost (Kd) = (Interest / Net Proceeds) \u00d7 100 = (10,000 / 1,10,000) \u00d7 100 = 9.09%.\n* After Tax Cost = Kd \u00d7 (1 - Tax Rate) = 9.09% \u00d7 (1 - 0.50) = 4.545%.\n**Related Concepts:**\n* Cost of Debt Calculation.\n* Tax Shield on Interest.", "id": 30}, {"question": "Which of the following curves cannot be U-shaped?", "options": [{"id": "1", "text": "A.V.C Curve"}, {"id": "2", "text": "A.F.C Curve"}, {"id": "3", "text": "A.C. Curve"}, {"id": "4", "text": "M.C. Curve"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* The Average Fixed Cost (AFC) curve is calculated as Total Fixed Cost divided by quantity.\n* Because fixed costs are constant, spreading them over increasing output causes AFC to continuously decline.\n* Mathematically, the AFC curve forms a rectangular hyperbola and never turns upwards.\n* AVC, AC, and MC curves are U-shaped due to the Law of Variable Proportions.\n**Related Concepts:**\n* Short-run Cost Curves.\n* Law of Diminishing Returns.", "id": 31}, {"question": "Match the LIST-I with LIST-II\n| LIST-I (Concept) | LIST-II (Meaning) |\n| :--- | :--- |\n| A. Exchange Rate | I. It refers to the price of one unit of foreign currency in the terms of some units of home currency. |\n| B. Forward Market | II. It is the process of making risk less profits by exploiting price differences of assets in different market. |\n| C. Arbitrage | III. Where transactions are entered into for settlement on a future date |\n| D. Direct Quotation | IV. It is a price of one unit of a currency in terms of some units of another currency. |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "A-IV, B-III, C-II, D-I"}, {"id": "2", "text": "A-III, B-IV, C-II, D-I"}, {"id": "3", "text": "A-I, B-II, C-III, D-IV"}, {"id": "4", "text": "A-I, B-III, C-II, D-IV"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* Exchange Rate is broadly the price of one currency expressed in terms of another (A-IV).\n* Forward Market involves contracts agreed today for settlement on a specific future date (B-III).\n* Arbitrage is the exploitation of price differentials across markets to lock in riskless profit (C-II).\n* Direct Quotation specifies the amount of domestic currency required to buy one unit of foreign currency (D-I).\n**Related Concepts:**\n* Spot Market vs Forward Market.\n* Indirect Quotation.", "id": 32}, {"question": "Arrange the following actions of a manager in the increasing degree of control.\nA. Manager defines limits and asks for group decisions\nB. Manager offers tentative decisions to change\nC. Manager sells decisions\nD. Manager lets subordinates function within limits defined by him\nE. Manager presents problems, invites suggestions and makes decisions", "options": [{"id": "1", "text": "A, D, B, E, C"}, {"id": "2", "text": "C, B, E, A, D"}, {"id": "3", "text": "D, A, E, B, C"}, {"id": "4", "text": "D, A, B, E, C"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* This aligns with the Tannenbaum and Schmidt Continuum of Leadership.\n* Letting subordinates function within limits (D) represents the lowest degree of managerial control.\n* Defining limits and asking for a group decision (A) slightly increases managerial boundary-setting.\n* Presenting problems and taking suggestions before deciding (E) shifts control back toward the manager.\n* Offering tentative decisions (B) and firmly \"selling\" pre-made decisions (C) represent the highest managerial control.\n**Related Concepts:**\n* Autocratic vs. Democratic Leadership.\n* Situational Leadership Models.", "id": 33}, {"question": "Which one of the following conditions is not true as per IRDA Act, 1999, for entry of private players into the insurance market?", "options": [{"id": "1", "text": "The company's sole purpose is to carry on life insurance business or general insurance business or reinsurance business."}, {"id": "2", "text": "The minimum paid up equity capital for life insurance or general insurance business is 100 crore."}, {"id": "3", "text": "The minimum paid up capital for carrying reinsurance business is 300 crore."}, {"id": "4", "text": "Insurance companies are required to invest not less than 15 percent of their funds in infrastructure and social sectors."}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* The IRDA Act regulates the entry and capital requirements for private insurers in India.\n* Life and General insurance companies require a minimum paid-up capital of Rs. 100 crore.\n* For entities conducting exclusive Reinsurance business, the statutory minimum paid-up capital is Rs. 200 crore, not 300 crore.\n* Sectoral investment mandates in infrastructure are strictly enforced for all players.\n**Related Concepts:**\n* IRDAI Regulations.\n* Solvency Margin requirements.", "id": 34}, {"question": "Match the LIST-I with LIST-II\n| LIST-I (Economists) | LIST-II (Contribution) |\n| :--- | :--- |\n| A. Adam Smith | I. Principles of Economics |\n| B. A. Marshall | II. Value and Capital |\n| C. J.R. Hicks | III. The Wealth of Nations |\n| D. Wassily Leontief | IV. Input Output Economics |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "A-I, B-III, C-II, D-IV"}, {"id": "2", "text": "A-I, B-II, C-IV, D-III"}, {"id": "3", "text": "A-III, B-I, C-II, D-IV"}, {"id": "4", "text": "A-III, B-II, C-I, D-IV"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* Adam Smith authored the foundational capitalist text \"The Wealth of Nations\" (A-III).\n* Alfred Marshall wrote \"Principles of Economics,\" formalizing neoclassical economics (B-I).\n* J.R. Hicks authored \"Value and Capital,\" significantly advancing ordinal utility theory (C-II).\n* Wassily Leontief developed the \"Input-Output\" economic analysis model, winning a Nobel Prize (D-IV).\n**Related Concepts:**\n* Neoclassical vs. Classical Economics.\n* Indifference Curve Analysis.", "id": 35}, {"question": "Which of the following research designs is the most precise one?", "options": [{"id": "1", "text": "Experimental"}, {"id": "2", "text": "Exploratory"}, {"id": "3", "text": "Diagnostic"}, {"id": "4", "text": "Descriptive"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* Experimental research design offers the highest degree of precision and control.\n* It involves the deliberate manipulation of independent variables to observe effects on dependent variables.\n* Extraneous variables are strictly controlled to establish clear cause-and-effect relationships.\n* Descriptive and exploratory designs are observational and lack this rigorous variable control.\n**Related Concepts:**\n* Causal Research.\n* Hypothesis Testing.", "id": 36}, {"question": "When all the factors of production are changed in same proportion, it is called as:\nA. Long run production function\nB. Law of equal proportion\nC. Law of return to scale\nD. Law of return to a factor\nE. Law of Variable proportion", "options": [{"id": "1", "text": "A, B, C Only"}, {"id": "2", "text": "B, C, D Only"}, {"id": "3", "text": "C, D, E Only"}, {"id": "4", "text": "A, C Only"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* Changing all factors of production simultaneously is only possible in the long run.\n* Therefore, this describes a \"Long run production function\" (A).\n* The specific economic law governing proportional changes to all inputs is the \"Law of returns to scale\" (C).\n* Variable proportion applies to the short run where one factor is fixed.\n**Related Concepts:**\n* Increasing, Constant, and Decreasing Returns to Scale.\n* Isoquant Analysis.", "id": 37}, {"question": "Arrange the following management research questions in the ascending order.\nA. Management Question\nB. Measurement Question\nC. Management dilemma\nD. Research Question\nE. Investigative Question", "options": [{"id": "1", "text": "C, A, B, D, E"}, {"id": "2", "text": "C, A, D, E, B"}, {"id": "3", "text": "A, C, D, E, B"}, {"id": "4", "text": "B, C, A, D, E"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* The research process begins broadly with a general Management Dilemma (C).\n* This is refined into a specific Management Question (A) addressing what must be done.\n* It is further translated into a formal Research Question (D) guiding the study.\n* Investigative Questions (E) break the research down into specific analytical areas.\n* Finally, Measurement Questions (B) are the actual specific items asked in a survey or instrument.\n**Related Concepts:**\n* Hierarchy of Research Questions.\n* Problem Formulation.", "id": 38}, {"question": "Identify which of the following statements are True.\nA. Assessment Year means the period of 12 months commencing on the first day of April every year\nB. Rounding off of total income is defined under section 288B of the Income Tax Act, 1961\nC. Rounding off of tax is defined under section 288 A of the Income Tax Act, 1961\nD. Assesses always a person but a person may or may not be an assessed\nE. A person may not have assessable income but may still be an assessed", "options": [{"id": "1", "text": "B and C only"}, {"id": "2", "text": "A, D, E Only"}, {"id": "3", "text": "A, B, C Only"}, {"id": "4", "text": "B, C, D Only"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* Section 2(9) defines the Assessment Year as the 12-month period starting April 1st (A).\n* Every assessee is a \"person,\" but not every \"person\" is an assessee until they incur a tax liability (D).\n* A person can file a \"loss return\" and thus be an assessee despite having zero assessable income (E).\n* Statements B and C are reversed; Section 288A rounds off Income, and 288B rounds off Tax.\n**Related Concepts:**\n* Definitions under Income Tax Act, 1961.\n* Concept of Person (Section 2(31)).", "id": 39}, {"question": "Arrange the following channels in the increasing order of value-addition of sales.\nA. Retail Store\nB. Sales force\nC. Internet\nD. Value-added partners\nE. Distributors", "options": [{"id": "1", "text": "A, E, C, D, B"}, {"id": "2", "text": "C, A, E, B, D"}, {"id": "3", "text": "C, A, E, D, B"}, {"id": "4", "text": "B, C, A, E, D"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* The Internet (C) provides the lowest value-add regarding personal service but is highly cost-effective.\n* Retail stores (A) offer basic physical convenience and product display.\n* Distributors (E) manage logistics, warehousing, and broader market reach.\n* A direct Sales Force (B) provides high-value personalized consultation and relationship management.\n* Value-Added Partners/Resellers (D) customize the product entirely for specific complex client needs.\n**Related Concepts:**\n* Distribution Channel Costs vs. Value Add.\n* Multi-channel Marketing.", "id": 40}, {"question": "If new contract is substituted in place of an existing contract, it is called:", "options": [{"id": "1", "text": "Waiver"}, {"id": "2", "text": "Remission"}, {"id": "3", "text": "Novation"}, {"id": "4", "text": "Alteration"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* Novation occurs when a completely new contract replaces an existing one.\n* It often involves a change in the parties to the contract, discharging the original obligations.\n* Alteration changes the terms but keeps the original parties intact.\n* Remission is accepting a lesser performance, and Waiver is abandoning rights entirely.\n**Related Concepts:**\n* Discharge of Contract by Mutual Agreement.\n* Section 62 of the Indian Contract Act.", "id": 41}, {"question": "Which of the following are True for a random variable?\nA. A random variable is a certain quantity, whose value depends on chance.\nB. A continuous random variable can assume at most two countable number of values.\nC. A discrete random variable can assume at most a countable number of values.\nD. A random variable is a function of the simple space.\nE. A random variables is an uncertain quantity, whose value depends on chance.", "options": [{"id": "1", "text": "A, B, D Only"}, {"id": "2", "text": "A, B, C Only"}, {"id": "3", "text": "B, C, D Only"}, {"id": "4", "text": "C, D, E Only"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* A discrete random variable is characterized by having a finite or countably infinite number of values (C).\n* Mathematically, a random variable is a function mapping outcomes from a sample space to real numbers (D).\n* It represents an uncertain quantity inherently driven by the outcome of a random chance event (E).\n* Continuous variables assume uncountably infinite values, making B completely false.\n**Related Concepts:**\n* Probability Distributions.\n* Sample Space.", "id": 42}, {"question": "The Capital Adequacy Ratio (CAR) for Indian Public Sector banks set by RBI is:", "options": [{"id": "1", "text": "9%"}, {"id": "2", "text": "10%"}, {"id": "3", "text": "11%"}, {"id": "4", "text": "12%"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* Capital Adequacy Ratio (CAR) ensures banks have enough capital to absorb reasonable losses.\n* While the global Basel III norm mandates a minimum CAR of 8%, the Reserve Bank of India is stricter.\n* The RBI mandates a base minimum CAR of 9% for all Scheduled Commercial Banks in India.\n* Additional Capital Conservation Buffers (CCB) apply on top of this base rate.\n**Related Concepts:**\n* Basel Accords (Basel III).\n* Risk-Weighted Assets (RWA).", "id": 43}, {"question": "Current assets are Rs 4,00,000, Inventories are Rs 2,00,000, Working capital is Rs 2,40,000. Calculate Current Ratio.", "options": [{"id": "1", "text": "2:1"}, {"id": "2", "text": "2.5:1"}, {"id": "3", "text": "1.5:1"}, {"id": "4", "text": "1:2"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* Net Working Capital is defined as Current Assets minus Current Liabilities (WC = CA - CL).\n* Given WC = 2,40,000 and CA = 4,00,000.\n* Therefore, Current Liabilities (CL) = 4,00,000 - 2,40,000 = 1,60,000.\n* Current Ratio is calculated as CA / CL = 4,00,000 / 1,60,000 = 2.5.\n**Related Concepts:**\n* Liquidity Ratios.\n* Quick Ratio (Acid Test).", "id": 44}, {"question": "Arrange the following point (Section wise from Section 14 to 18) of the Indian Contract Act\nA. Definition of free consent\nB. Misrepresentation\nC. Fraud\nD. Undue influence\nE. Coercion", "options": [{"id": "1", "text": "E, D, C, B, A"}, {"id": "2", "text": "D, E, C, A, B"}, {"id": "3", "text": "B, D, E, A, C"}, {"id": "4", "text": "A, E, D, C, B"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* Section 14 lays the foundation by defining 'Free Consent' (A).\n* Section 15 defines 'Coercion', the physical threat to consent (E).\n* Section 16 outlines 'Undue Influence', the moral or mental pressure (D).\n* Section 17 categorizes intentional deception as 'Fraud' (C).\n* Section 18 defines unintentional false statements as 'Misrepresentation' (B).\n**Related Concepts:**\n* Flaws in Consent.\n* Voidable Contracts.", "id": 45}, {"question": "Match the LIST-I with LIST-II\n| LIST-I (Sections) | LIST-II (TDS) |\n| :--- | :--- |\n| A. Section 194 of the Income Tax Act, 1961 | I. Payment on account of repurchase of units by mutual fund |\n| B. Section 194C of the Income Tax Act, 1961 | II. Payment to the non-resident sportsman |\n| C. Section 194E of the Income Tax Act, 1961 | III. Payment to contractor and sub-contractor |\n| D. Section 194F of the Income Tax Act, 1961 | IV. Dividend |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "A-IV, B-III, C-II, D-I"}, {"id": "2", "text": "A-I, B-II, C-III, D-IV"}, {"id": "3", "text": "A-I, B-III, C-II, D-IV"}, {"id": "4", "text": "A-III, B-IV, C-I, D-II"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* Section 194 mandates TDS deduction on Dividend payments (A-IV).\n* Section 194C is strictly for TDS on payments made to Contractors/Sub-contractors (B-III).\n* Section 194E applies to TDS on payments to non-resident sportsmen or sports associations (C-II).\n* Section 194F covers TDS on repurchases of units by Mutual Funds (D-I).\n**Related Concepts:**\n* Tax Deducted at Source Rules.\n* Threshold limits for TDS.", "id": 46}, {"question": "Match the LIST-I with LIST-II\n| LIST-I (Key definition under IT Act 2000) | LIST-II (Sections) |\n| :--- | :--- |\n| A. Addressee | I. Section 2(1)(f) of the Information Technology Act 2000 |\n| B. Adjudicating Officer | II. Section 2(1)(d) of the Information Technology Act 2000 |\n| C. Affixing Electronic Signature | III. Section 2(1)(c) of Information Technology Act 2000 |\n| D. Asymmetric Crypto System | IV. Section 2(1)(b) of Information Technology Act 2000 |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "A-IV, B-III, C-II, D-I"}, {"id": "2", "text": "A-III, B-IV, C-I, D-II"}, {"id": "3", "text": "A-II, B-I, C-III, D-IV"}, {"id": "4", "text": "A-I, B-II, C-III, D-IV"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* Section 2(1)(b) defines \"Addressee\" as the intended receiver of an electronic record (A-IV).\n* Section 2(1)(c) defines the \"Adjudicating Officer\" appointed under the Act (B-III).\n* Section 2(1)(d) outlines the process of \"Affixing Electronic Signature\" (C-II).\n* Section 2(1)(f) details the \"Asymmetric Crypto System\" using public and private keys (D-I).\n**Related Concepts:**\n* Information Technology Act, 2000 framework.\n* Digital Signatures and Encryption.", "id": 47}, {"question": "Which of the following are the features of F.E.M.A?\nA. Central government can regulate payments to and from a person situated outside country.\nB. Holding of immovable property outside India is restricted.\nC. R.B.I can restrict the transaction from capital account even if it is done by authorized person.\nD. All foreign financial transactions are to be done through F.E.M.A authorized person.\nE. F.E.M.A applies to Indian citizens living abroad.", "options": [{"id": "1", "text": "A, B, C Only"}, {"id": "2", "text": "B, D, E Only"}, {"id": "3", "text": "A, B, E Only"}, {"id": "4", "text": "A, C, D Only"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* FEMA empowers the Central Government to strictly regulate cross-border payments (A).\n* The RBI holds explicit statutory power to regulate or restrict Capital Account transactions (C).\n* All legitimate foreign exchange dealings must be routed exclusively through an 'Authorized Person' (D).\n* FEMA applies universally to all residents of India, not strictly based on citizenship status abroad.\n**Related Concepts:**\n* Current vs. Capital Account Convertibility.\n* Foreign Exchange Management Act, 1999.", "id": 48}, {"question": "Match the LIST-I With LIST-II\n| LIST-I (Statistical Test) | LIST-II (Explanation) |\n| :--- | :--- |\n| A. Z-Test | I. Tests the significance of the associations between two attributes |\n| B. Chi-Square | II. Compares the difference in the mean values of two independent sample groups (non-parametric data) |\n| C. ANOVA | III. Tests the significance of the different between average of two large sized sample groups (Parametric data) |\n| D. Mann-Whitney Test (U-test) | IV. Compares the difference in the mean values of more than two sample groups (Parametric data) |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "A-I, B-II, C-III, D-IV"}, {"id": "2", "text": "A-III, B-I, C-IV, D-II"}, {"id": "3", "text": "A-II, B-III, C-I, D-IV"}, {"id": "4", "text": "A-IV, B-I, C-III, D-II"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* Z-Test is used parametrically for testing differences between means of large sample groups ($n > 30$) (A-III).\n* Chi-Square is a non-parametric test evaluating the association/independence between categorical attributes (B-I).\n* ANOVA (Analysis of Variance) evaluates mean differences simultaneously across three or more parametric groups (C-IV).\n* Mann-Whitney U-test is the non-parametric equivalent of the independent t-test for comparing two groups (D-II).\n**Related Concepts:**\n* Parametric vs. Non-parametric Testing.\n* Hypothesis Testing.", "id": 49}, {"question": "Which one of the following structures of the marketing department will be most suitable for the companies that produce many products for many markets?", "options": [{"id": "1", "text": "Geographic Organization"}, {"id": "2", "text": "Product or Brand Organization"}, {"id": "3", "text": "Functional Organization"}, {"id": "4", "text": "Matrix Organization"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* A functional organization is too rigid for complex, multi-product environments.\n* Geographic or product organizations alone cannot handle cross-functional complexities effectively.\n* A Matrix Organization overlays product management with market/geographic management.\n* This dual-reporting structure is optimal for handling a high diversity of both products and markets.\n**Related Concepts:**\n* Organizational Design.\n* Unity of Command constraints.", "id": 50}, {"question": "Which one of the following conditions is not true in case of marketing skimming as the pricing objectives?", "options": [{"id": "1", "text": "The market is highly price sensitive"}, {"id": "2", "text": "A sufficient number of buyers signal a high demand"}, {"id": "3", "text": "The high initial price does not attract more competitors to the market"}, {"id": "4", "text": "The high price communication the image of the superior product"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* Price skimming involves setting an artificially high initial price to maximize short-term profit.\n* It relies completely on a segment of buyers being price *insensitive* (inelastic demand).\n* Therefore, the condition that the market is \"highly price sensitive\" makes skimming impossible to execute.\n* Skimming is supported by high demand, superior brand image, and high barriers to entry.\n**Related Concepts:**\n* Penetration Pricing.\n* Product Life Cycle (Introduction stage).", "id": 51}, {"question": "Bret Lee, an Australian cricket player visits India for 100 days in every financial year. This has been his practice for the past 10 financial Years. Find out his residential status for the assessment Year 2023-24.", "options": [{"id": "1", "text": "Resident in India"}, {"id": "2", "text": "Resident and ordinarily resident in India"}, {"id": "3", "text": "Resident but not ordinarily resident in India"}, {"id": "4", "text": "Non resident in India"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* Basic Condition: Stay in India must be $\\ge 60$ days in current year AND $\\ge 365$ days in preceding 4 years. (100 days > 60; $4 \\times 100 = 400 > 365$). He is a Resident.\n* Additional Condition: Stay must be $\\ge 730$ days in the preceding 7 years to be 'Ordinarily Resident'.\n* His stay in 7 years is $7 \\times 100 = 700$ days, which is less than 730 days.\n* Therefore, he is Resident but Not Ordinarily Resident (RNOR).\n**Related Concepts:**\n* Section 6 of the Income Tax Act.\n* Incidence of Tax based on status.", "id": 52}, {"question": "Arrange the following points step by step regarding computation of Gross Total Income\nA. Computation of Gross Total Income\nB. Set off and carry forward of Losses\nC. Clubbing of Income of spouse, minor child etc.\nD. Computation of Income under each head of Income\nE. Determination of Residential Status", "options": [{"id": "1", "text": "E, D, C, B, A"}, {"id": "2", "text": "A, B, C, D, E"}, {"id": "3", "text": "C, D, E, A, B"}, {"id": "4", "text": "B, C, D, E, A"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* Taxation begins fundamentally by determining the assessee's Residential Status (E).\n* Income is then computed individually under the five specific heads of income (D).\n* Provisions for clubbing the income of spouses or minors are then applied (C).\n* Any eligible intra-head or inter-head losses are then set off against this income (B).\n* The final aggregate figure is declared as the Gross Total Income (A).\n**Related Concepts:**\n* Chapter VI-A Deductions.\n* Net Total Income computation.", "id": 53}, {"question": "Which of the following tool is used for projecting supply of personnel?", "options": [{"id": "1", "text": "Trend Analysis"}, {"id": "2", "text": "Ratio Analysis"}, {"id": "3", "text": "Markov Analysis"}, {"id": "4", "text": "Managerial Judgement"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* Human Resource Planning involves forecasting both labor demand and labor supply.\n* Markov Analysis is a quantitative tool specifically used for internal supply forecasting.\n* It tracks the historical movement of employees through various job states via a transition matrix.\n* Trend analysis and ratio analysis are primarily used to project future labor *demand*.\n**Related Concepts:**\n* HR Supply vs Demand Forecasting.\n* Succession Planning.", "id": 54}, {"question": "Determine the P/V ratio from the following particulars: Total Fixed Cost Rs 12,000; Actual Sales Rs 48,000; Margin of Safety Rs 8,000.", "options": [{"id": "1", "text": "20%"}, {"id": "2", "text": "25%"}, {"id": "3", "text": "30%"}, {"id": "4", "text": "40%"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* Margin of Safety (MOS) = Actual Sales - Break-Even Sales (BES).\n* $8,000 = 48,000 - BES \\implies BES = 40,000$.\n* Break-Even Sales formula: $BES = \\text{Fixed Cost} / \\text{P/V Ratio}$.\n* $40,000 = 12,000 / \\text{P/V Ratio} \\implies \\text{P/V Ratio} = 12,000 / 40,000 = 30\\%$.\n**Related Concepts:**\n* Cost-Volume-Profit (CVP) Analysis.\n* Contribution Margin.", "id": 55}, {"question": "is the result of the Bretton Wood Conference of nations held in 1944.", "options": [{"id": "1", "text": "WTO"}, {"id": "2", "text": "IMF"}, {"id": "3", "text": "IBRD"}, {"id": "4", "text": "ADB"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* The 1944 Bretton Woods Conference aimed to rebuild the post-WWII international economic system.\n* It resulted in the creation of two major institutions, colloquially known as the Bretton Woods twins.\n* These are the International Monetary Fund (IMF) and the International Bank for Reconstruction and Development (IBRD / World Bank).\n* In multiple-choice banking questions, the IMF is traditionally cited as the primary monetary result.\n**Related Concepts:**\n* Fixed Exchange Rate system.\n* World Bank Group.", "id": 56}, {"question": "Which of the following points are considered as essential characteristics of a Promissory Note?\nA. It must be in writing\nB. It must not contain an undertaking or promise to pay\nC. The promise to pay must be conditional\nD. A promissory note must be signed by the maker.\nE. Promise to pay money only", "options": [{"id": "1", "text": "A, D and E Only"}, {"id": "2", "text": "A, B and E Only"}, {"id": "3", "text": "B, C and D Only"}, {"id": "4", "text": "B and D Only"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* A Promissory Note is a financial instrument that must be unequivocally in writing (A).\n* It must contain an unconditional undertaking to pay; conditional promises render it invalid (C is false).\n* The instrument must be legally authenticated and signed by the maker (D).\n* The promise must be to pay a certain sum of money only, not goods or services (E).\n**Related Concepts:**\n* Negotiable Instruments Act, 1881.\n* Bill of Exchange vs Promissory Note.", "id": 57}, {"question": "Which of the following is correct?", "options": [{"id": "1", "text": "A firm under perfect competition is in equilibrium where AR=MR"}, {"id": "2", "text": "A firm under monopoly is in equilibrium where TR=MR"}, {"id": "3", "text": "A firm under monopolistic competition is in equilibrium where AC=MC"}, {"id": "4", "text": "A firm under oligopoly is in equilibrium where MR=MC"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* Economic theory mandates a universal rule for profit maximization across market structures.\n* A firm reaches equilibrium output when Marginal Revenue equals Marginal Cost ($MR=MC$).\n* Furthermore, the MC curve must cut the MR curve from below.\n* While specific demand curve shapes vary by market, the MR=MC equilibrium condition remains constant.\n**Related Concepts:**\n* Profit Maximization Conditions.\n* Market Structures.", "id": 58}, {"question": "Which of the following points are considered as factors determinating the working capital of a firm?\nA. Basic nature of Business\nB. Business cycle fluctuations\nC. Credit Policy of the firm\nD. Long term source of finance\nE. Employee Skills", "options": [{"id": "1", "text": "A, B and D Only"}, {"id": "2", "text": "B, C and D Only"}, {"id": "3", "text": "A, B and C Only"}, {"id": "4", "text": "D and E Only"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* The basic nature of a business (e.g., manufacturing vs. retail) severely impacts its inventory and cash cycle needs (A).\n* Economic boom and bust cycles (Business cycle fluctuations) alter sales volume and credit collections (B).\n* A firm's own credit policy dictates how fast debtors pay, directly impacting working capital requirements (C).\n* Long-term financing concerns *how* to fund the capital, not the operational *need* for the capital itself.\n**Related Concepts:**\n* Operating Cycle.\n* Working Capital Management.", "id": 59}, {"question": "Match the LIST-I with LIST-II\n| LIST-I (Financial Inclusion Yojana) | LIST-II (Year) |\n| :--- | :--- |\n| A. PM Jan Dhan | I. 2016 |\n| B. PM Mudra | II. 2014 |\n| C. Stand up India | III. 2017 |\n| D. Vaya Vandana | IV. 2015 |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "A-II, B-IV, C-I, D-III"}, {"id": "2", "text": "A-II, B-I, C-IV, D-III"}, {"id": "3", "text": "A-IV, B-I, C-III, D-II"}, {"id": "4", "text": "A-II, B-III, C-I, D-IV"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* PM Jan Dhan Yojana, the flagship financial inclusion program, launched in 2014 (A-II).\n* PM Mudra Yojana, aimed at funding micro-enterprises, was launched in 2015 (B-IV).\n* Stand Up India, promoting entrepreneurship among women and SC/STs, launched in 2016 (C-I).\n* PM Vaya Vandana Yojana, a pension scheme for senior citizens, launched in 2017 (D-III).\n**Related Concepts:**\n* Financial Inclusion Initiatives.\n* Microfinance.", "id": 60}, {"question": "Which one of the following is value added service of EXIM Bank?", "options": [{"id": "1", "text": "Export Facilitation"}, {"id": "2", "text": "Export product Development"}, {"id": "3", "text": "Workshops and Seminars"}, {"id": "4", "text": "Export Marketing"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* The Export-Import (EXIM) Bank of India provides financial assistance to exporters and importers.\n* Beyond basic financing, it offers strategic \"value-added services\" to enhance global competitiveness.\n* Export Marketing is a key advisory service, helping Indian firms identify overseas partners and markets.\n* This involves extensive market research, country risk analysis, and trade intelligence.\n**Related Concepts:**\n* Export Credit Agencies.\n* International Trade Finance.", "id": 61}, {"question": "Match the LIST-I with LIST-II\n| LIST-I (Direct Material Variance) | LIST-II (Formula) |\n| :--- | :--- |\n| A. Direct material cost variance | I. Standard price x (Revised standard quantity - Actual Quantity) |\n| B. Direct material price variance | II. Standard price x (Standard Quantity for Actual output - Actual Quantity) |\n| C. Direct material usage variance | III. Actual Quantity x (standard price - actual price) |\n| D. Direct material mix variance | IV. Standard cost for actual output - actual cost |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "A-I, B-II, C-III, D-IV"}, {"id": "2", "text": "A-IV, B-III, C-I, D-II"}, {"id": "3", "text": "A-IV, B-III, C-II, D-I"}, {"id": "4", "text": "A-III, B-IV, C-II, D-I"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* Cost Variance compares total Standard Cost with Total Actual Cost (A-IV).\n* Price Variance measures the difference in rates multiplied by the Actual Quantity (B-III).\n* Usage Variance measures the difference in quantities multiplied by the Standard Price (C-II).\n* Mix Variance deals with deviations in the standard material proportion/mix (D-I).\n**Related Concepts:**\n* Standard Costing.\n* Variance Analysis Framework.", "id": 62}, {"question": "Match the LIST-I with LIST-II\n| LIST-I (Institutions) | LIST-II (YEAR OF ESTABLISHMENT) |\n| :--- | :--- |\n| A. UNCTAD | I. 1967 |\n| B. WTO | II. 1994 |\n| C. NAFTA | III. 1964 |\n| D. ASEAN | IV. 1995 |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "A-I, B-II, C-III, D-IV"}, {"id": "2", "text": "A-III, B-IV, C-II, D-I"}, {"id": "3", "text": "A-I, B-III, C-IV, D-II"}, {"id": "4", "text": "A-I, B-II, C-IV, D-III"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* UNCTAD (UN Conference on Trade and Development) was established in 1964 to help developing nations (A-III).\n* The World Trade Organization (WTO) officially commenced operations on January 1, 1995 (B-IV).\n* NAFTA (North American Free Trade Agreement) came into force in 1994 (C-II).\n* ASEAN (Association of Southeast Asian Nations) was formed in 1967 via the Bangkok Declaration (D-I).\n**Related Concepts:**\n* Global Trade Organizations.\n* Regional Economic Blocs.", "id": 63}, {"question": "Which of the following statements are correct:\nA. Call - in - advance is the amount paid by the shareholders in excess of amount due from them.\nB. When the number of shares applied is more than the number of shares offered to the public for subscription, the issue is termed as under subscription.\nC. Section 49 of the Companies Act prohibits the issue of shares other than sweat equity shares at discount.\nD. Unless or until the fortified shares are re-issued, the balance on the shares fortified account will be deducted from the paid up capital.\nE. The securities premium is an amount in excess of nominal value of face value of the securities.", "options": [{"id": "1", "text": "A and E Only"}, {"id": "2", "text": "B, C and D Only"}, {"id": "3", "text": "A, B and C Only"}, {"id": "4", "text": "A, D and E Only"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* Calls-in-advance represents payments made by shareholders before the company formally calls for them (A).\n* Securities premium defines the excess amount collected over the share's base nominal/face value (E).\n* Statement B is false; applying for more shares than offered defines \"over-subscription.\"\n* Statement C is false; Section 53 (not 49) prohibits issuing shares at a discount.\n**Related Concepts:**\n* Issue of Share Capital.\n* Forfeiture of Shares.", "id": 64}, {"question": "Which one of the following is not a behavioral symptom of stress?", "options": [{"id": "1", "text": "Lower Job Satisfaction"}, {"id": "2", "text": "Lower Job Performance"}, {"id": "3", "text": "Higher Absenteeism"}, {"id": "4", "text": "Higher Labour Turnover"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* Stress manifests in physiological, psychological, and behavioral symptoms.\n* Behavioral symptoms involve observable actions, such as increased absenteeism, turnover, or drops in performance.\n* Lower job satisfaction is a cognitive and emotional state, classifying it strictly as a psychological symptom.\n* Addressing symptoms requires understanding their classification to apply appropriate HR interventions.\n**Related Concepts:**\n* Occupational Stress.\n* Organizational Behavior.", "id": 65}, {"question": "Which of the following are the characteristics of a high customer centric Organization?\nA. Market driven\nB. Process Oriented\nC. Value Driven\nD. Price Driven\nE. Making competitor irrelevant", "options": [{"id": "1", "text": "A, B, E Only"}, {"id": "2", "text": "A, C, E Only"}, {"id": "3", "text": "B, C, D Only"}, {"id": "4", "text": "C, D, E Only"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* A customer-centric organization focuses on external needs, making it highly market-driven (A).\n* It prioritizes delivering profound, tailored value to the consumer rather than just cutting costs (C).\n* By focusing entirely on unique customer value, it strives to make competitors irrelevant (E) (Blue Ocean Strategy).\n* Being purely process-oriented or price-driven reflects an internal, operational focus, not a customer focus.\n**Related Concepts:**\n* Customer Relationship Management (CRM).\n* Blue Ocean Strategy.", "id": 66}, {"question": "Match the LIST-I with LIST-II\n| LIST-I Product Life Cycle (PLC) Stage | LIST-II Distribution Strategy |\n| :--- | :--- |\n| A. Introduction | I. Phase out unprofitable outlets |\n| B. Growth | II. Build Selective Distribution |\n| C. Maturity | III. Build intensive distribution |\n| D. Decline | IV. Build more intensive distribution |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "A-III, B-II, C-IV, D-I"}, {"id": "2", "text": "A-III, B-II, C-I, D-IV"}, {"id": "3", "text": "A-II, B-III, C-IV, D-I"}, {"id": "4", "text": "A-IV, B-III, C-I, D-II"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* During Introduction, distribution is selective to build careful early market presence (A-II).\n* In Growth, the firm scales rapidly, building an intensive distribution network (B-III).\n* At Maturity, the market is saturated, requiring maximum, highly intensive distribution to maintain share (C-IV).\n* In Decline, companies cut costs by phasing out weak and unprofitable outlets (D-I).\n**Related Concepts:**\n* Product Life Cycle (PLC) Strategies.\n* Supply Chain scaling.", "id": 67}, {"question": "Which one of the following is the developmental role of RBI?", "options": [{"id": "1", "text": "Formulates, implements and monitors the monetary policy"}, {"id": "2", "text": "Prescribes broad parameters of banking operations"}, {"id": "3", "text": "Issues, exchanges end destroys currency notes"}, {"id": "4", "text": "Performs a wide range of promotional functions to support national objectives"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* The RBI has traditional central banking roles (regulatory, monetary) and developmental roles.\n* Formulating monetary policy and issuing currency are core, traditional macroeconomic functions.\n* Prescribing banking parameters falls strictly under its regulatory and supervisory purview.\n* Its developmental role involves promotional functions like setting up DFIs (NABARD, SIDBI) to support national economic objectives.\n**Related Concepts:**\n* Functions of the Central Bank.\n* Institutional Finance.", "id": 68}, {"question": "Standard Deviation of Sampling Distribution is called:", "options": [{"id": "1", "text": "Sampling Error"}, {"id": "2", "text": "Probable Error"}, {"id": "3", "text": "Standard Error"}, {"id": "4", "text": "Measurable Error"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* The sampling distribution represents the probability distribution of a given statistic based on a random sample.\n* The standard deviation of this entire sampling distribution is specifically termed the \"Standard Error.\"\n* It measures the accuracy with which a sample distribution represents a population.\n* A smaller standard error indicates a more precise sample statistic.\n**Related Concepts:**\n* Central Limit Theorem.\n* Hypothesis Testing and Confidence Intervals.", "id": 69}, {"question": "Identify correct statements from the following regarding Time Value of money.\nA. The interest which may be earned / saved on the money held at present underlines the concept of time value of money.\nB. The money which is receivable at present has less value than the money receivable in Future.\nC. The relationship that exists between the value of money receivable at present and the value of money receivable in future is referred as time value of the money.\nD. Value of money receivable at present = value of money receivable in future - Time value of money\nE. Future value of money is the value of money held presently at some given future time at a given rate of Interest.", "options": [{"id": "1", "text": "B and D Only"}, {"id": "2", "text": "A, C and E Only"}, {"id": "3", "text": "B, C and D Only"}, {"id": "4", "text": "C, D and E Only"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* The core premise is that a rupee today is worth more than a rupee tomorrow due to interest-earning potential (A).\n* It mathematically establishes the relationship between present values and future values (C).\n* Future value is calculated by compounding present money at a specific interest rate over time (E).\n* Statement B is fundamentally false; money today is worth *more*, not less, than future money.\n**Related Concepts:**\n* Discounting and Compounding.\n* Net Present Value (NPV).", "id": 70}, {"question": "Which of the following is a non probability method of selecting sample from a population?", "options": [{"id": "1", "text": "Simple Random Sampling"}, {"id": "2", "text": "Multi Stage Sampling"}, {"id": "3", "text": "Cluster Sampling"}, {"id": "4", "text": "Snow Ball Sampling"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* Snowball sampling is a non-probability sampling technique where existing study subjects recruit future subjects from among their acquaintances.\n* It is highly effective when the target population is hidden, marginalized, or hard to reach.\n* Probability sampling methods ensure every element in the population has a known, non-zero chance of selection.\n* Simple random, multi-stage, and cluster sampling are all statistically rigorous probability methods.\n**Related Concepts:**\n* Convenience and Quota Sampling.\n* Sampling Error.", "id": 71}, {"question": "When price of a good X rises, the demand for substitute good Y will:", "options": [{"id": "1", "text": "Rise"}, {"id": "2", "text": "Fall"}, {"id": "3", "text": "Remain unchanged"}, {"id": "4", "text": "Falls initially and then rises"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* Substitute goods are alternative products that satisfy the same consumer need (e.g., Tea and Coffee).\n* When the price of Good X rises, it becomes relatively more expensive, prompting consumers to switch to alternatives.\n* Consequently, the demand for the substitute Good Y will naturally rise.\n* This relationship is defined by a positive cross-price elasticity of demand.\n**Related Concepts:**\n* Complementary Goods (Negative cross-price elasticity).\n* Law of Demand.", "id": 72}, {"question": "Which one the following is not the behavioral factor of the customer profile involved in tactical targeting?", "options": [{"id": "1", "text": "Purchase Frequency"}, {"id": "2", "text": "Income"}, {"id": "3", "text": "Purchase Quantity"}, {"id": "4", "text": "Price Sensitivity"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* Behavioral segmentation divides consumers based on their knowledge of, attitude towards, use of, or response to a product.\n* Key behavioral factors include purchase frequency, usage rate, brand loyalty, and price sensitivity.\n* Income is a fundamental demographic factor, reflecting an individual's socioeconomic status, not their direct behavioral interaction with a product.\n* Marketers use both demographic and behavioral factors to build comprehensive customer profiles.\n**Related Concepts:**\n* Demographic and Psychographic Segmentation.\n* Target Market Strategies.", "id": 73}, {"question": "Match the LIST-I with LIST-II.\n| LIST-I (Personality Type) | LIST-II (Congruent Occupation) |\n| :--- | :--- |\n| A. Social | I. Mechanic |\n| B. Conventional | II. Mathematician |\n| C. Investigation | III. Corporate Manager |\n| D. Realistic | IV. Teacher |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "A-IV, B-III, C-II, D-I"}, {"id": "2", "text": "A-III, B-IV, C-II, D-I"}, {"id": "3", "text": "A-IV, B-II, C-III, D-I"}, {"id": "4", "text": "A-II, B-IV, C-I, D-III"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* Based on John Holland\u2019s Typology of Personality and Congruent Occupations (RIASEC model).\n* 'Social' personalities prefer helping and teaching others, aligning with the occupation of a Teacher (A-IV).\n* 'Conventional' personalities favor structured, rule-regulated, and orderly tasks, fitting roles like Corporate Manager, Accountant, or Clerk (B-III).\n* 'Investigative' types prefer analytical and intellectual activities, aligning with a Mathematician or Scientist (C-II).\n* 'Realistic' personalities prefer physical, hands-on tasks with tools and machines, fitting a Mechanic (D-I).\n**Related Concepts:**\n* Organizational Behavior.\n* Person-Job Fit Theory.", "id": 74}, {"question": "Which of the following refers to an attempt to avoid payment of taxes by using illegal means?", "options": [{"id": "1", "text": "Tax Management"}, {"id": "2", "text": "Tax Planning"}, {"id": "3", "text": "Tax Avoidance"}, {"id": "4", "text": "Tax Evasion"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* Tax Evasion is the deliberate and illegal non-payment or underpayment of tax liabilities.\n* It involves fraudulent practices such as hiding income, inflating deductions, or falsifying accounting records.\n* Tax Avoidance involves using legal loopholes to reduce tax burdens, though it may violate the spirit of the law.\n* Tax Planning is the completely legal, logical, and government-encouraged method of organizing finances to claim statutory exemptions and deductions.\n**Related Concepts:**\n* General Anti-Avoidance Rules (GAAR).\n* Penalties under the Income Tax Act.", "id": 75}, {"question": "Which of the following is not the characteristics of theory of comparative cost advantage?\nA. There is full employment of the factors of production\nB. There are two countries, two commodities and two factors of production\nC. There are two countries, two commodities and one factor of production\nD. There is absence of transportation cost\nE. The countries are capital intensive only.", "options": [{"id": "1", "text": "A, B, C Only"}, {"id": "2", "text": "B, C, D Only"}, {"id": "3", "text": "A, C, D Only"}, {"id": "4", "text": "A, B, E Only\n*(Note: In the original official exam, this question was dropped due to framing errors. Conceptually, David Ricardo's theory assumes a 2x2x1 model\u20142 countries, 2 commodities, and 1 factor of production (labor). Therefore, B and E are NOT characteristics. Assuming the question intended to ask for the TRUE characteristics, the answer would be A, C, and D).*"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* David Ricardo\u2019s Comparative Cost Advantage theory is based on the labor theory of value.\n* It operates strictly on a 2x2x1 model: two countries, two commodities, and exactly one factor of production (labor).\n* It assumes full employment of resources and perfect mobility of labor within the country.\n* It theoretically assumes a complete absence of transportation costs and free trade barriers between nations.\n**Related Concepts:**\n* Heckscher-Ohlin Theory (Factor Proportions).\n* Absolute Advantage Theory.", "id": 76}, {"question": "Which of the following is not a monetary measure for correcting disequilibrium in Balance of Payment?", "options": [{"id": "1", "text": "Monetary Contraction"}, {"id": "2", "text": "Devaluation"}, {"id": "3", "text": "Exchange Control"}, {"id": "4", "text": "Abolition of Export Duties"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* Monetary measures aim to correct BOP deficits by manipulating the money supply, interest rates, or currency values.\n* Monetary contraction (deflation), currency devaluation, and strict exchange controls are classic monetary interventions.\n* The abolition of export duties is a trade policy (or fiscal measure) designed to make exports cheaper and more competitive globally.\n* It does not directly manipulate the central banking or monetary system.\n**Related Concepts:**\n* Balance of Payments Deficit.\n* Fiscal Policy Tools.", "id": 77}, {"question": "The Consumer Protection Act came into force first on:", "options": [{"id": "1", "text": "14 June, 1986"}, {"id": "2", "text": "20 January, 1987"}, {"id": "3", "text": "24 December, 1986"}, {"id": "4", "text": "14 July, 1987"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* The Consumer Protection Act, 1986, is a cornerstone of consumer rights in India.\n* It formally received the assent of the President of India on 24th December 1986.\n* To commemorate this milestone, December 24th is officially observed annually as National Consumer Rights Day in India.\n* It established a three-tier quasi-judicial consumer dispute redressal machinery.\n**Related Concepts:**\n* Consumer Protection Act, 2019 (Updates).\n* Rights of a Consumer.", "id": 78}, {"question": "\"To what degree will there be rules and regulations to direct employees and managers\" is defined as:", "options": [{"id": "1", "text": "Departmentalization"}, {"id": "2", "text": "Centralization and decentralization"}, {"id": "3", "text": "Formalization"}, {"id": "4", "text": "Boundary Spanning"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* Formalization measures the extent to which an organization relies on written rules, standard operating procedures, and policies to govern behavior.\n* High formalization results in rigid job descriptions and little discretion for the employee (e.g., bureaucratic structures).\n* Centralization dictates *where* decision-making power lies (top management vs. lower levels).\n* Departmentalization relates to how jobs are
