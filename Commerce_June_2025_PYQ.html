    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const TEST_DATA = {"title": "Commerce June 2025 PYQ", "organization": "ExamTym", "durationMinutes": 120, "totalMarks": 200.0, "marksForCorrect": 2.0, "marksForWrong": 0.0, "passPercentage": 40, "shuffle": false, "strictMode": false, "questions": [{"question": "Match the LIST-I with LIST-II.\n| LIST-I (Components commonly present in reports) | LIST-II (Contents) |\n| :--- | :--- |\n| A. Prefatory Information | I. Executive Summary |\n| B. Introductory Information | II. Glossary |\n| C. Main Research Body | III. Problem Definition |\n| D. Supplementary Information | IV. Research Design |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "A-I, B-II, C-III, D-IV"}, {"id": "2", "text": "A-II, B-I, C-IV, D-III"}, {"id": "3", "text": "A-I, B-III, C-II, D-IV"}, {"id": "4", "text": "A-I, B-III, C-IV, D-II"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* Prefatory Information contains the executive summary, providing an initial overview of the research report.\n* Introductory Information sets the context and explicitly includes the problem definition.\n* The Main Research Body encompasses the core methodology, structure, and research design.\n* Supplementary Information is placed at the end and contains the glossary for technical terms.\n**Related Concepts:**\n* Report Writing Structure.\n* Research Methodology Formatting.", "id": 1}, {"question": "The term 'marketing myopia' was coined by:", "options": [{"id": "1", "text": "Philip Kotler"}, {"id": "2", "text": "Gary Armstrong"}, {"id": "3", "text": "Peter Drucker"}, {"id": "4", "text": "Theodore Levitt"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* Theodore Levitt introduced the concept of \"marketing myopia\" in 1960.\n* It describes a short-sighted, inward-looking approach to marketing.\n* Myopic firms focus primarily on selling products rather than fulfilling customer needs.\n* It highlights the danger of defining a business too narrowly based on its current product line.\n**Related Concepts:**\n* Product-Centric vs. Customer-Centric Strategy.\n* Strategic Vision Formulation.", "id": 2}, {"question": "Which of the following countries were part of NAFTA?\nA. United States\nB. Canada\nC. Mexico\nD. Brazil", "options": [{"id": "1", "text": "A, B Only"}, {"id": "2", "text": "A, B, C Only"}, {"id": "3", "text": "B, C, D Only"}, {"id": "4", "text": "B, C Only"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* NAFTA stands for the North American Free Trade Agreement.\n* The member nations were the United States, Canada, and Mexico.\n* The agreement aimed to eliminate trade barriers among these three North American nations.\n* Brazil is situated in South America and was not part of this specific trade bloc.\n**Related Concepts:**\n* Regional Economic Integration.\n* USMCA (The updated agreement replacing NAFTA).", "id": 3}, {"question": "A term loan becomes Non-Performing Asset (NPA) if its interest and/or instalment of principal remains overdue for a period of more than:", "options": [{"id": "1", "text": "30 days"}, {"id": "2", "text": "60 days"}, {"id": "3", "text": "75 days"}, {"id": "4", "text": "90 days"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* An asset is classified as a Non-Performing Asset (NPA) when it stops generating income for the bank.\n* For term loans, the standard threshold for NPA classification is an overdue period exceeding 90 days.\n* This applies to both the principal installment and the interest component.\n* These norms are strictly mandated and regulated by the Reserve Bank of India (RBI).\n**Related Concepts:**\n* Asset Classification Categories (Standard, Sub-standard, Doubtful, Loss).\n* Provisioning Requirements for NPAs.", "id": 4}, {"question": "Which of the following are part of micro economics?\nA. Product pricing\nB. Consumer behaviour\nC. Interest rate\nD. Factor pricing", "options": [{"id": "1", "text": "A, B and C Only"}, {"id": "2", "text": "A, B and D Only"}, {"id": "3", "text": "A and D Only"}, {"id": "4", "text": "A, B, C and D"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* Microeconomics studies the economic behavior of individual decision-making units (households, firms).\n* Product pricing is a microeconomic component analyzing how individual firms determine prices.\n* Consumer behavior explores individual choices regarding utility and consumption.\n* Factor pricing examines how the prices of land, labor, and capital are determined in individual markets.\n**Related Concepts:**\n* Macroeconomics (which covers aggregate phenomena like interest rates).\n* General Equilibrium vs. Partial Equilibrium.", "id": 5}, {"question": "The State Bank of India came into existence in the year:", "options": [{"id": "1", "text": "1947"}, {"id": "2", "text": "1950"}, {"id": "3", "text": "1955"}, {"id": "4", "text": "1969"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* The State Bank of India (SBI) was formally established on July 1, 1955.\n* It was created by the State Bank of India Act, 1955.\n* SBI was formed following the nationalization of the Imperial Bank of India.\n* Its creation aimed to extend banking facilities to rural and semi-urban areas.\n**Related Concepts:**\n* History of Indian Banking.\n* Nationalization of Commercial Banks in 1969.", "id": 6}, {"question": "What rights does an unpaid seller have against the goods?\nA. Right of lien\nB. Right to sue for specific performance\nC. Right of resale\nD. Right of stoppage of goods in transit\nE. Right to reorganise possession of goods", "options": [{"id": "1", "text": "A, B and C Only"}, {"id": "2", "text": "B, C and D Only"}, {"id": "3", "text": "C, D and E Only"}, {"id": "4", "text": "A, C and D Only"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* An unpaid seller has specific rights against the goods under the Sale of Goods Act.\n* The Right of Lien allows the seller to retain possession of the goods until payment.\n* The Right of Stoppage in Transit allows the seller to regain possession if the buyer becomes insolvent during transport.\n* The Right of Resale permits the seller to sell the goods to a third party to recover the due amount.\n**Related Concepts:**\n* Rights of an Unpaid Seller against the Buyer personally.\n* Sale of Goods Act, 1930.", "id": 7}, {"question": "The cross-price elasticity between two goods 'A' and 'B' is (-) 0.8. If the price of good 'B' rises by 20%, how will the demand for 'A' change?", "options": [{"id": "1", "text": "(-) 16%"}, {"id": "2", "text": "6%"}, {"id": "3", "text": "(-) 8%"}, {"id": "4", "text": "(-) 12%"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* Cross-price elasticity measures how demand for Good A responds to a price change in Good B.\n* Formula: `% Change in Demand of A = Cross Elasticity \u00d7 % Change in Price of B`.\n* Calculation: `-0.8 \u00d7 20% = -16%`.\n* A negative cross-price elasticity indicates that the two goods are complementary.\n**Related Concepts:**\n* Complementary Goods vs. Substitute Goods.\n* Price Elasticity of Demand.", "id": 8}, {"question": "Identify the factors that determine the demand.\nA. Price of the Commodity\nB. Income of the Consumer\nC. Taste and Preferences of Consumer\nD. Size of Population", "options": [{"id": "1", "text": "A and B Only"}, {"id": "2", "text": "A, B and C Only"}, {"id": "3", "text": "B, C and D Only"}, {"id": "4", "text": "A, B, C and D"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* The price of the commodity is the primary determinant causing movement along the demand curve.\n* Consumer income dictates purchasing power, directly shifting the demand curve.\n* Tastes and preferences reflect changing consumer desires influenced by trends or advertising.\n* The size of the population impacts the aggregate or market demand for a product.\n**Related Concepts:**\n* Law of Demand.\n* Shift in Demand vs. Movement along the Demand curve.", "id": 9}, {"question": "Match the LIST-I with LIST-II.\n| LIST-I (Stages of Product Life Cycle) | LIST-II (Types of Customers) |\n| :--- | :--- |\n| A. Introduction | I. Laggards |\n| B. Growth | II. Early adopters |\n| C. Maturity | III. Middle majority |\n| D. Decline | IV. Innovators |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "A-I, B-II, C-III, D-IV"}, {"id": "2", "text": "A-II, B-III, C-I, D-IV"}, {"id": "3", "text": "A-IV, B-II, C-III, D-I"}, {"id": "4", "text": "A-III, B-II, C-IV, D-I"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* In the Introduction stage, risk-taking 'Innovators' are the first to adopt the product.\n* During the Growth stage, 'Early Adopters' accept the product, driving wider market acceptance.\n* The Maturity stage captures the peak sales volume, driven largely by the 'Middle Majority'.\n* In the Decline stage, risk-averse 'Laggards' are the last to adopt the product.\n**Related Concepts:**\n* Diffusion of Innovation Theory.\n* Product Life Cycle Strategies.", "id": 10}, {"question": "Which of the following methods belong to the category of demand/market-based pricing?\nA. Surge pricing\nB. Premium pricing\nC. 'What the traffic can bear' pricing\nD. Discount pricing\nE. Parity pricing", "options": [{"id": "1", "text": "A, B, C and D Only"}, {"id": "2", "text": "B, C and D Only"}, {"id": "3", "text": "A, B and C Only"}, {"id": "4", "text": "C, D and E Only"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* Surge pricing is dynamically adjusted based on real-time spikes in consumer demand.\n* Premium pricing targets demand from quality-conscious or status-driven consumers willing to pay more.\n* 'What the traffic can bear' pricing maximizes revenue based purely on the highest amount customers will tolerate.\n* Discount pricing (cost/promotional based) and Parity pricing (competition-based) do not strictly fall under market-demand-driven pricing.\n**Related Concepts:**\n* Value-based Pricing.\n* Dynamic Pricing Models.", "id": 11}, {"question": "\"Active concealment of fact\" is associated with which one of the following?", "options": [{"id": "1", "text": "Misrepresentation"}, {"id": "2", "text": "Undue influence"}, {"id": "3", "text": "Fraud"}, {"id": "4", "text": "Mistake"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* Active concealment implies taking deliberate steps to hide a material fact from the other party.\n* It is done with an explicit intention to deceive the other contracting party.\n* Under the Indian Contract Act, active concealment constitutes a core element of Fraud.\n* Mere silence is not always fraud, but active concealment universally qualifies as fraud.\n**Related Concepts:**\n* Flaws in Free Consent.\n* Section 17 of the Indian Contract Act, 1872.", "id": 12}, {"question": "ABC ltd. issued 2,000, 10% preference shares of 100 each at 95. Calculate the cost of preference shares.", "options": [{"id": "1", "text": "8.50%"}, {"id": "2", "text": "10.53%"}, {"id": "3", "text": "12.35%"}, {"id": "4", "text": "15.25%"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* The cost of irredeemable preference capital is calculated as $K_p = (\\text{Preference Dividend} / \\text{Net Proceeds}) \\times 100$.\n* The preference dividend is 10% of the face value (100), which equals Rs. 10 per share.\n* The net proceeds represent the actual issue price after discount, which is Rs. 95.\n* Therefore, $K_p = (10 / 95) \\times 100 = 10.526\\%$, which rounds to 10.53%.\n**Related Concepts:**\n* Cost of Capital components.\n* Treatment of flotation costs and discounts.", "id": 13}, {"question": "Match the LIST-I with LIST-II.\n| LIST-I (Concept) | LIST-II (Formula) |\n| :--- | :--- |\n| A. Total Utility | I. $MU_1 + MU_2 + ... + MUn$ |\n| B. Marginal Utility | II. $TU_n - TU_{n-1}$ |\n| C. Average Fixed Cost | III. $\\Delta TC / \\Delta Q$ |\n| D. Marginal Cost | IV. $TFC / Q$ |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "A-IV, B-III, C-II, D-I"}, {"id": "2", "text": "A-II, B-I, C-III, D-IV"}, {"id": "3", "text": "A-I, B-II, C-IV, D-III"}, {"id": "4", "text": "A-III, B-II, C-I, D-IV"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* Total Utility is the aggregate satisfaction derived from consuming all units: $MU_1 + MU_2 + ... + MUn$.\n* Marginal Utility represents the addition to total utility from consuming one more unit: $TU_n - TU_{n-1}$.\n* Average Fixed Cost is the total fixed cost distributed over output units: $TFC / Q$.\n* Marginal Cost is the change in total cost resulting from a one-unit change in output: $\\Delta TC / \\Delta Q$.\n**Related Concepts:**\n* Law of Diminishing Marginal Utility.\n* Cost curves behavior in the short run.", "id": 14}, {"question": "Identify the correct sequence of Research Design Process.\nA. Measurement technique selection\nB. Research approach selection\nC. Data collection technique selection\nD. Sample design selection\nE. Data analysis method selection", "options": [{"id": "1", "text": "A, B, C, D, E"}, {"id": "2", "text": "B, A, D, C, E"}, {"id": "3", "text": "D, C, E, A, B"}, {"id": "4", "text": "C, E, D, B, A"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* Research Approach Selection (B) initiates the process (deciding between qualitative vs. quantitative).\n* Measurement Technique Selection (A) follows, deciding how variables will be quantified.\n* Sample Design Selection (D) determines the target population and sampling strategy.\n* Data Collection Technique Selection (C) dictates how the data will physically be gathered.\n* Data Analysis Method Selection (E) finalizes how the gathered data will be processed.\n**Related Concepts:**\n* Research Methodology Stages.\n* Sampling Techniques.", "id": 15}, {"question": "According to Levitt and Drucker, the essence of marketing is:", "options": [{"id": "1", "text": "Profit Orientation"}, {"id": "2", "text": "Product Orientation"}, {"id": "3", "text": "Market Orientation"}, {"id": "4", "text": "Customer Orientation"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* Theodore Levitt and Peter Drucker are seminal figures in modern management and marketing thought.\n* They argued that the fundamental purpose of a business is to create and keep a customer.\n* Therefore, the essence of marketing is not aggressive selling, but Customer Orientation.\n* True marketing focuses heavily on identifying, understanding, and satisfying customer needs.\n**Related Concepts:**\n* The Marketing Concept vs. The Selling Concept.\n* Value Creation.", "id": 16}, {"question": "Matrix Structure can be made more effective by following which of the guidelines given below?\nA. Collective learning, coordination and integration of skills for obtaining the streams of technology.\nB. Define the objectives of the project or task.\nC. Clarify the roles, authority and responsibilities of managers and team members.\nD. Ensure that influence is based on knowledge, information, rather than on rank.\nE. Balance the power of functional and project managers.", "options": [{"id": "1", "text": "A, B, C, D Only"}, {"id": "2", "text": "A, B, D and E Only"}, {"id": "3", "text": "B, C, D, and E Only"}, {"id": "4", "text": "A, B, C, E Only"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* Defining objectives (B) provides a clear unified direction for cross-functional teams.\n* Clarifying roles and authority (C) helps mitigate the confusion of dual reporting lines.\n* Basing influence on knowledge rather than rank (D) fosters genuine collaboration and credibility.\n* Balancing power between functional and project managers (E) prevents organizational conflict.\n**Related Concepts:**\n* Organizational Structure models.\n* Chain of Command principles.", "id": 17}, {"question": "Identify the correct order in which the assets of the firm shall be applied in case of dissolution of a partnership firm.\nA. Paying to each partner rateably what is due to him from the firm for advances as distinguished from capital.\nB. Paying the residues if any to partners in the proportion in which they were entitled to share profit.\nC. Paying the debts of the firm to third parties.\nD. Paying to each partner rateably what is due to him on account of capital.", "options": [{"id": "1", "text": "A, C, D, B"}, {"id": "2", "text": "C, A, B, D"}, {"id": "3", "text": "C, A, D, B"}, {"id": "4", "text": "A, B, C, D"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* Upon dissolution, the absolute first priority is clearing external liabilities and paying debts to third parties (C).\n* The second priority is repaying partner loans/advances (A) that are distinct from their capital.\n* The third step is to return the partners' respective capital contributions (D).\n* Finally, any remaining residue or surplus is distributed among partners in their profit-sharing ratio (B).\n**Related Concepts:**\n* Section 48 of the Indian Partnership Act, 1932.\n* Garner vs. Murray Rule.", "id": 18}, {"question": "Arrange the following steps of New Product Development in sequential order:\nA. Product Development\nB. Feasibility Analysis\nC. Concept Development and Testing\nD. Identifying Prospective customers\nE. Idea Generation", "options": [{"id": "1", "text": "A, B, C, E, D"}, {"id": "2", "text": "D, E, B, C, A"}, {"id": "3", "text": "E, D, C, B, A"}, {"id": "4", "text": "E, B, C, A, D"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* The process begins with Idea Generation (E) to brainstorm new product concepts.\n* Next, Identifying Prospective Customers (D) helps determine target market relevance.\n* This is followed by Concept Development and Testing (C) to validate ideas with consumers.\n* Feasibility Analysis (B) is then conducted to assess technical and commercial viability.\n* Finally, the actual Product Development (A) phase begins.\n**Related Concepts:**\n* Commercialization.\n* Innovation Management.", "id": 19}, {"question": "Match the LIST-I with LIST-II.\n| LIST-I | LIST-II |\n| :--- | :--- |\n| A. Deduction of Tax at source on fees for professional and technical services | I. Section 194 B |\n| B. Deduction of Tax at source from income by way of rent | II. Section 193 |\n| C. Deduction of Tax at source from winnings from lotteries or crossword puzzles, etc. | III. Section 194-I |\n| D. Deduction of Tax at source from interest on securities | IV. Section 194 J |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "A-I, B-II, C-III, D-IV"}, {"id": "2", "text": "A-IV, B-III, C-II, D-I"}, {"id": "3", "text": "A-IV, B-III, C-I, D-II"}, {"id": "4", "text": "A-II, B-I, C-IV, D-III"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* Section 194J explicitly governs TDS for professional and technical service fees.\n* Section 194-I mandates TDS deductions for rental income payments.\n* Section 194B is responsible for TDS on winnings from lotteries and puzzles.\n* Section 193 covers the rules for TDS deductions on interest from securities.\n**Related Concepts:**\n* Tax Deducted at Source (TDS) mechanics.\n* Provisions of the Income Tax Act, 1961.", "id": 20}, {"question": "Which of the following is NOT an element of Micro environment?", "options": [{"id": "1", "text": "Customers"}, {"id": "2", "text": "Suppliers"}, {"id": "3", "text": "Technology"}, {"id": "4", "text": "Competitors"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* The micro-environment refers to actors close to the company that directly affect its operational ability.\n* Key micro elements include customers, suppliers, competitors, and intermediaries.\n* The macro-environment consists of larger societal forces that affect the entire industry.\n* Technology is a macro-environmental force because its impact is broad and universal, not just specific to one firm's immediate operations.\n**Related Concepts:**\n* PESTLE Analysis.\n* Porter\u2019s Five Forces Framework.", "id": 21}, {"question": "Which of the following statement is incorrect for Management Audit?", "options": [{"id": "1", "text": "Management audit is a statutory requirement."}, {"id": "2", "text": "Management audit is a comprehensive and critical review of all aspects of management process."}, {"id": "3", "text": "Management audit covers wide area of management activities and may be for more than one financial year."}, {"id": "4", "text": "The shareholders or board of directors may appoint the management auditor."}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* A management audit is an independent and systematic appraisal of management processes.\n* It is a voluntary exercise designed to improve organizational efficiency and performance.\n* Unlike a financial audit, a management audit is NOT a statutory requirement under the law.\n* It offers a broad, comprehensive review that spans multiple functional areas and time periods.\n**Related Concepts:**\n* Statutory Audit vs. Internal Audit.\n* Performance Auditing.", "id": 22}, {"question": "Identify the areas of macro-economics:\nA. National Income\nB. Balance of Payments\nC. Level of savings and investment\nD. Location of industry\nE. Behaviour of firms", "options": [{"id": "1", "text": "A, B and C Only"}, {"id": "2", "text": "B, C and E Only"}, {"id": "3", "text": "B, C and D Only"}, {"id": "4", "text": "A, B, C, D and E"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* Macroeconomics deals with the structure, performance, and behavior of the aggregate economy.\n* National Income represents the total economic output of a nation.\n* Balance of Payments tracks aggregate international transactions.\n* Level of Savings and Investment reflects nationwide economic flows, distinct from individual firm behaviors (which are microeconomic).\n**Related Concepts:**\n* Aggregate Demand & Supply.\n* Microeconomics (firm behavior, pricing).", "id": 23}, {"question": "Match the LIST-I with LIST-II.\n| LIST-I | LIST-II |\n| :--- | :--- |\n| A. Perception | I. A descriptive thought that a person holds about something. |\n| B. Learning | II. A person's consistently favourable or unfavourable evaluations, feelings and tendencies toward an object or idea. |\n| C. Belief | III. Changes in an individual's behaviour arising from experience. |\n| D. Attitude | IV. The process by which people select, organise and interpret information to form a meaningful picture of the world. |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "A-I, B-II, C-III, D-IV"}, {"id": "2", "text": "A-III, B-IV, C-II, D-I"}, {"id": "3", "text": "A-IV, B-III, C-I, D-II"}, {"id": "4", "text": "A-II, B-III, C-I, D-IV"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* Perception is the cognitive process of selecting and interpreting sensory information.\n* Learning encompasses behavioral changes resulting from past experiences.\n* A Belief is a specific, descriptive cognitive formulation regarding a particular object.\n* An Attitude represents a consistent evaluative response (positive or negative) towards an entity.\n**Related Concepts:**\n* Consumer Behavior Psychology.\n* Cognitive Dissonance.", "id": 24}, {"question": "Match the LIST-I with LIST-II.\n| LIST-I (BOP) | LIST-II (Concept) |\n| :--- | :--- |\n| A. Balance of payment-current A/C | I. Inflow and outflow of capital |\n| B. Balance of payment-capital A/C | II. International Transactions of goods and services |\n| C. Balance of Trade | III. Import and export of goods only |\n| D. Balancing item | IV. Entry for net errors and omissions |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "A-I, B-II, C-III, D-IV"}, {"id": "2", "text": "A-III, B-II, C-IV, D-I"}, {"id": "3", "text": "A-IV, B-III, C-I, D-II"}, {"id": "4", "text": "A-II, B-I, C-III, D-IV"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* The Current Account tracks international transactions involving goods, services, and current transfers.\n* The Capital Account strictly records cross-border capital inflows and outflows (e.g., investments).\n* The Balance of Trade specifically measures the net difference between the export and import of physical goods.\n* The Balancing Item (Net Errors and Omissions) acts as an accounting plug to balance discrepancies in BOP records.\n**Related Concepts:**\n* Balance of Payments components.\n* Current Account Deficit (CAD).", "id": 25}, {"question": "Arm's length price as per section 92F is the price applied or proposed to be applied when:", "options": [{"id": "1", "text": "two unrelated persons enter into a transaction in uncontrolled conditions"}, {"id": "2", "text": "two related persons enter into a transaction in uncontrolled conditions"}, {"id": "3", "text": "two unrelated persons enter into a transaction in controlled conditions"}, {"id": "4", "text": "two related persons enter into a transaction in controlled conditions"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* Section 92F of the Income Tax Act relates to Transfer Pricing regulations.\n* The \"Arm's length price\" represents the true fair market value of a transaction.\n* It is established based on the hypothetical scenario of two completely unrelated parties transacting.\n* The transaction must theoretically take place in independent, uncontrolled market conditions.\n**Related Concepts:**\n* Transfer Pricing Rules.\n* Base Erosion and Profit Shifting (BEPS).", "id": 26}, {"question": "In case of transmission of shares, which of the following is correct?\nA. No instrument of transfer is required.\nB. Transmission of securities is generally made without any consideration.\nC. Shares continue to be subject to the original liabilities.\nD. Transmission takes place on death or insolvency of a holder of securities.\nE. Stamp duty is payable on transmission of securities.", "options": [{"id": "1", "text": "A, B, C and D Only"}, {"id": "2", "text": "B, C and D Only"}, {"id": "3", "text": "C, D and E Only"}, {"id": "4", "text": "A, B, C Only"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* Transmission occurs automatically by operation of law (e.g., due to death or insolvency).\n* Because it is a legal operation, a formal instrument of transfer is unnecessary.\n* It is not a commercial sale, meaning it typically occurs without financial consideration or stamp duty.\n* The legal inheritor receives the shares subject to all pre-existing original liabilities.\n**Related Concepts:**\n* Transfer vs. Transmission of Shares.\n* Legal heir rights under the Companies Act.", "id": 27}, {"question": "Keeping a record of uncommonly good or undesirable examples of an employee's work-related behaviour and reviewing it with the employee at pre-determined times is known as:", "options": [{"id": "1", "text": "Behaviourally Anchored Rating Scale"}, {"id": "2", "text": "Critical Incident Method"}, {"id": "3", "text": "Paired Comparison Method"}, {"id": "4", "text": "Mixed Standard Scales"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* The Critical Incident Method is an evaluative technique in performance appraisals.\n* Supervisors maintain ongoing logs of exceptionally positive or negative employee actions.\n* These documented \"critical incidents\" serve as factual evidence during appraisal reviews.\n* It prevents recency bias by ensuring incidents spanning the entire evaluation period are considered.\n**Related Concepts:**\n* Modern Performance Appraisal Techniques.\n* Halo and Horn Effects.", "id": 28}, {"question": "The ongoing process of systematically identifying, assessing and developing organisational leadership to enhance performance is known as:", "options": [{"id": "1", "text": "Strategy and Workforce planning"}, {"id": "2", "text": "Predictive Workforce Monitoring"}, {"id": "3", "text": "Succession Planning"}, {"id": "4", "text": "Managerial Judgement"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* Succession Planning is a proactive human resources strategy.\n* It focuses specifically on identifying internal talent to fill critical leadership roles in the future.\n* It involves continuous assessment, mentorship, and development to groom potential executives.\n* It ensures business continuity and mitigates risks associated with sudden managerial vacancies.\n**Related Concepts:**\n* Talent Management.\n* Replacement Charting.", "id": 29}, {"question": "In case the income of an individual includes the income of 25,000 of his minor child in terms of section 64(1A), such individual shall be entitled to an exemption under section 10 (32) of:", "options": [{"id": "1", "text": "25,000"}, {"id": "2", "text": "1,500"}, {"id": "3", "text": "2,500"}, {"id": "4", "text": "15,000"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* Section 64(1A) mandates clubbing the income of a minor child with the parent's income.\n* To provide partial relief, Section 10(32) offers an exemption against this clubbed income.\n* The statutory limit for this exemption is exactly Rs. 1,500 per minor child per year.\n* Regardless of the child's higher income (e.g., Rs. 25,000), the exemption remains capped at Rs. 1,500.\n**Related Concepts:**\n* Clubbing of Income Rules.\n* Exemptions under Section 10.", "id": 30}, {"question": "The parametric test that can be used for hypothesis testing of paired samples is:", "options": [{"id": "1", "text": "t test"}, {"id": "2", "text": "z test"}, {"id": "3", "text": "Chi-Square test"}, {"id": "4", "text": "Mann-Whitney test"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* Parametric tests assume the underlying data follows a normal distribution.\n* The paired sample t-test compares the means of two related or matched samples.\n* It is commonly used in \"before-and-after\" experimental designs on the same subjects.\n* It assesses whether the mean difference between the paired observations is statistically significant.\n**Related Concepts:**\n* Student's t-distribution.\n* Non-parametric alternatives (e.g., Wilcoxon signed-rank test).", "id": 31}, {"question": "Which of the following are the key objectives of WTO?\nA. To set rules for international trade\nB. To resolve trade disputes\nC. To resolve border disputes\nD. To provide a forum for negotiating trade liberalisation", "options": [{"id": "1", "text": "A, B, D Only"}, {"id": "2", "text": "A, C Only"}, {"id": "3", "text": "B, C, D Only"}, {"id": "4", "text": "A, B, C and D"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* The World Trade Organization (WTO) governs the rules of trade between nations.\n* Its primary objective is to set frameworks and rules to ensure fair global competition.\n* It acts as an authoritative, neutral body to resolve international trade disputes.\n* It facilitates forums for ongoing negotiations aimed at trade liberalization.\n* Resolving sovereign border disputes is a geopolitical issue, outside the WTO's economic mandate.\n**Related Concepts:**\n* General Agreement on Tariffs and Trade (GATT).\n* Most-Favored-Nation (MFN) Clause.", "id": 32}, {"question": "Which of the following are properties of regression coefficient?\nA. The coefficient of correlation and the two regression coefficients have the same signs.\nB. The coefficient of correlation is the harmonic mean between the regression coefficients.\nC. If one of the regression coefficient is greater than unity, the other must also be greater than unity.\nD. If one of the regression coefficient is greater than unity, the other must be less than unity.\nE. The regression coefficient are independent of change of origin but not of scale.", "options": [{"id": "1", "text": "A and D Only"}, {"id": "2", "text": "B, C and E Only"}, {"id": "3", "text": "A, B and C Only"}, {"id": "4", "text": "A, D and E Only"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* The algebraic signs of correlation ($r$) and regression coefficients ($b_{xy}$ and $b_{yx}$) are invariably identical.\n* Because correlation is the geometric mean of regression coefficients ($r = \\sqrt{b_{xy} \\cdot b_{yx}}$), and $r^2 \\leq 1$, if one coefficient $>1$, the other must be $<1$.\n* Regression coefficients are structurally independent of a change of origin.\n* However, they are mathematically dependent on a change of scale.\n**Related Concepts:**\n* Linear Regression Analysis.\n* Properties of Correlation Coefficient.", "id": 33}, {"question": "The type of market where few sellers are selling competing products to many buyers is known as:", "options": [{"id": "1", "text": "Monopoly"}, {"id": "2", "text": "Monopolistic Competition"}, {"id": "3", "text": "Oligopoly"}, {"id": "4", "text": "Perfect Competition"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* An oligopoly features market dominance by a small group of large sellers.\n* These few sellers cater to a vast base of consumer buyers.\n* The limited number of firms results in high mutual interdependence regarding pricing and strategy.\n* Classic examples include the telecommunications, aerospace, and automotive industries.\n**Related Concepts:**\n* Kinked Demand Curve (Price Rigidity).\n* Cartels and Collusive Behavior.", "id": 34}, {"question": "Which of the following statements are correct?\nA. If a company is an Indian company, it will automatically be considered as a domestic company.\nB. Foreign company means a company which is not a domestic company.\nC. The residential status of an Indian company can be non-resident in India.\nD. The residential status of a Foreign company can never be resident in India.\nE. Foreign income is taxable in the hands of company resident in India.", "options": [{"id": "1", "text": "A, B and C Only"}, {"id": "2", "text": "B, C and D Only"}, {"id": "3", "text": "A, C and E Only"}, {"id": "4", "text": "A, B and E Only"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* Under Indian tax laws, an Indian company is inherently classified as a domestic company and a resident.\n* A foreign company is explicitly defined by exclusion\u2014it is any entity that is not a domestic company.\n* Global income, including foreign-sourced income, is fully taxable for any company designated as a resident in India.\n* A foreign company *can* become a resident if its Place of Effective Management is located in India.\n**Related Concepts:**\n* Place of Effective Management (POEM).\n* Incidence of Tax based on Residency.", "id": 35}, {"question": "Which of the following statements are incorrect for amalgamation in the nature of merger?\nA. All the assets and liabilities of the transferor company are taken over by transferee company.\nB. Shareholders holding not less than 95% of the face value of the equity shares of the transferor company become equity shareholders of the transferee company.\nC. Payment of purchase consideration may be made in cash per share.\nD. Journal entries for recording the merger are passed by pooling of interest method.\nE. The business of the transferor company is not intended to be carried on by the transferee company.", "options": [{"id": "1", "text": "A, B, and C Only"}, {"id": "2", "text": "B, C and D Only"}, {"id": "3", "text": "A and D Only"}, {"id": "4", "text": "B, C and E Only"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* In a true merger, at least **90%** (not 95%) of the transferor's equity shareholders must transition to the transferee company.\n* Consideration must be paid entirely in equity shares, barring cash adjustments for fractional shares.\n* The fundamental intent of a merger is to *continue* the business of the transferor company.\n* Mergers are accounted for using the \"Pooling of Interest Method\" as per accounting standards.\n**Related Concepts:**\n* Amalgamation in the nature of Purchase.\n* Accounting Standard 14 (AS-14).", "id": 36}, {"question": "Match the LIST-I with LIST-II.\n| LIST-I (Term) | LIST-II (Explanation) |\n| :--- | :--- |\n| A. Nostro Account | I. Account held by a foreign bank with a local bank |\n| B. Vostro Account | II. An Indian Bank's Swiss Franc A/C with a bank in Switzerland. |\n| C. Bid | III. Price at which the dealer is willing to buy another currency. |\n| D. Offer | IV. Price at which the dealer is willing to sell another currency. |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "A-I, B-II, C-III, D-IV"}, {"id": "2", "text": "A-II, B-I, C-III, D-IV"}, {"id": "3", "text": "A-III, B-II, C-IV, D-I"}, {"id": "4", "text": "A-IV, B-III, C-I, D-II"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* \"Nostro\" translates to \"ours\" - it refers to \"our account maintained with you\" in a foreign country (e.g., an Indian bank's account in Switzerland).\n* \"Vostro\" translates to \"yours\" - it refers to \"your account maintained with us\" (e.g., a foreign bank's INR account in India).\n* The \"Bid\" is the quoted rate at which a forex dealer buys a currency.\n* The \"Offer\" (Ask) is the quoted rate at which the dealer sells the currency.\n**Related Concepts:**\n* Loro accounts.\n* Foreign Exchange Spreads.", "id": 37}, {"question": "Any assessee (except an eligible assessee in respect of an eligible business referred to in section 44 AD or 44 ADA) must pay upto 75 percent of advance tax payable:", "options": [{"id": "1", "text": "on or before June 15 of the previous year"}, {"id": "2", "text": "on or before September 15 of the previous year"}, {"id": "3", "text": "on or before December 15 of the previous year"}, {"id": "4", "text": "on or before March 15 of the previous year"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* Advance tax enforces a \"pay as you earn\" model to ensure steady government revenue.\n* The statutory installment timeline requires 15% to be paid by June 15 and 45% by September 15.\n* By December 15 of the previous year, the assessee must remit up to **75%** of the estimated tax liability.\n* The final 100% must be cleared by March 15.\n**Related Concepts:**\n* Presumptive Taxation (Sections 44AD, 44ADA).\n* Interest under Section 234C for shortfalls.", "id": 38}, {"question": "The questions that are actually asked from the respondent are known as:", "options": [{"id": "1", "text": "Management Questions"}, {"id": "2", "text": "Research Questions"}, {"id": "3", "text": "Investigative Questions"}, {"id": "4", "text": "Measurement Questions"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* Research formulation involves translating broad dilemmas into specific, actionable inquiries.\n* Measurement questions represent the lowest, most specific tier in the research hierarchy.\n* These are the actual, tangible questions presented to the respondent in surveys or interviews.\n* They are designed specifically to gather the raw data required to answer higher-level investigative questions.\n**Related Concepts:**\n* Primary Data Collection.\n* Questionnaire Design.", "id": 39}, {"question": "The scheme of partial integration of tax or non-agricultural income with income derived from agricultural is applicable if an individual has:", "options": [{"id": "1", "text": "Non-Agricultural income of more than the exemption limit or agricultural income exceeding 5000"}, {"id": "2", "text": "Non-Agricultural income of more than the exemption limit or agricultural income exceeding 2500"}, {"id": "3", "text": "Non-Agricultural income of more than the exemption limit and agricultural income exceeding 2500"}, {"id": "4", "text": "Non-Agricultural income of more than the exemption limit and agricultural income exceeding 5000"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* Agricultural income is technically exempt from taxation in India under Section 10(1).\n* However, \"Partial Integration\" is employed to increase the tax bracket on an individual's non-agricultural income.\n* Two strict conditions must be met simultaneously for this rule to trigger.\n* First, net agricultural income must exceed Rs. 5,000; second, non-agricultural income must surpass the basic maximum exemption limit.\n**Related Concepts:**\n* Progressive Taxation Framework.\n* Definition of Agricultural Income under Section 2(1A).", "id": 40}, {"question": "Identify the correct sequence of sampling design process:\nA. Determine the Sample size\nB. Select a sampling technique\nC. Selection of sampling frame\nD. Defining target population", "options": [{"id": "1", "text": "A, B, C, D"}, {"id": "2", "text": "B, A, D, C"}, {"id": "3", "text": "A, B, D, C"}, {"id": "4", "text": "D, C, B, A"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* The process begins with defining the exact target population (D) to be studied.\n* Next, a sampling frame (C) is constructed, which is the actual list from which elements are drawn.\n* Following this, an appropriate sampling technique (B) (like random or stratified sampling) is chosen.\n* Finally, the exact sample size (A) is calculated based on precision requirements.\n**Related Concepts:**\n* Probability vs. Non-Probability Sampling.\n* Sampling Error.", "id": 41}, {"question": "Which of the following types of FDI includes creation of new assets and production facilities in the country?", "options": [{"id": "1", "text": "Brownfield investment"}, {"id": "2", "text": "Merger and Acquisition"}, {"id": "3", "text": "Strategic alliances"}, {"id": "4", "text": "Greenfield investment"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* Greenfield FDI involves a parent company building its operations in a foreign country from the ground up (starting from \"green fields\").\n* It entails creating entirely new physical assets, factories, and production facilities.\n* Brownfield FDI, by contrast, involves acquiring or leasing existing facilities.\n* Mergers and Acquisitions are typical vehicles for brownfield, not greenfield, expansion.\n**Related Concepts:**\n* Foreign Direct Investment (FDI) modes of entry.\n* Multinational Enterprise Strategy.", "id": 42}, {"question": "A ltd makes plastic buckets. Selling price per bucket is 210 and variable cost per bucket is 60. Fixed cost of making buckets is 1,50,000 for the year. The number of buckets to be sold to get a profit of 90000 is:", "options": [{"id": "1", "text": "714 buckets"}, {"id": "2", "text": "428 buckets"}, {"id": "3", "text": "1000 buckets"}, {"id": "4", "text": "1600 buckets"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* Contribution per unit equals Selling Price minus Variable Cost ($210 - 60 = 150$).\n* Total required contribution equals Fixed Costs plus Desired Profit ($1,50,000 + 90,000 = 2,40,000$).\n* Required units to sell equals Total Required Contribution divided by Contribution per unit.\n* Calculation: $2,40,000 / 150 = 1,600 \\text{ buckets}$.\n**Related Concepts:**\n* Cost-Volume-Profit (CVP) Analysis.\n* Break-Even Point.", "id": 43}, {"question": "Match the LIST-I with LIST-II.\n| LIST-I (TRADE TARIFF) | LIST-II (Explanation) |\n| :--- | :--- |\n| A. Specific Tariff | I. Fixed percentage of the value of the commodity |\n| B. Ad valorem Tariff | II. Fixed amount of money per unit |\n| C. Compound Tariff | III. Duty fixed to bring the price of imported commodity to the level of domestic support price |\n| D. Variable Tariff | IV. Combination of Ad valorem and Specific Tariff |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "A-I, B-II, C-III, D-IV"}, {"id": "2", "text": "A-II, B-I, C-IV, D-III"}, {"id": "3", "text": "A-III, B-IV, C-II, D-I"}, {"id": "4", "text": "A-IV, B-III, C-II, D-I"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* Specific Tariffs levy a fixed monetary amount per physical unit of an imported good.\n* Ad valorem Tariffs are calculated as a fixed percentage of the imported product's assessed value.\n* Compound Tariffs merge both approaches, utilizing both specific and ad valorem components.\n* Variable Tariffs are flexible duties intended to match import prices with domestic support prices.\n**Related Concepts:**\n* International Trade Barriers.\n* Protectionism.", "id": 44}, {"question": "Which of the following Ind AS specifically deals with consolidated financial statements?", "options": [{"id": "1", "text": "Ind AS 29"}, {"id": "2", "text": "Ind AS 101"}, {"id": "3", "text": "Ind AS 110"}, {"id": "4", "text": "Ind AS 41"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* Ind AS 110 is the Indian Accounting Standard that prescribes the procedures for Consolidated Financial Statements.\n* It mandates that a parent entity must present consolidated accounts encompassing all its subsidiaries.\n* It establishes control as the singular basis for consolidation.\n* Ind AS 29 handles hyperinflation, Ind AS 101 handles first-time adoption, and Ind AS 41 deals with agriculture.\n**Related Concepts:**\n* Definition of \"Control\" under Ind AS.\n* Non-Controlling Interest (NCI).", "id": 45}, {"question": "Which of the following are the applications of the conservatism principle of accounting?\nA. Valuation of stock in trade at the lower of cost or market value\nB. Debiting drawings account and crediting purchases account when goods are withdrawn by the proprietor\nC. Making provision for bad and doubtful debts\nD. Making provision for discount on creditors\nE. Creation of investment fluctuation fund", "options": [{"id": "1", "text": "A and C Only"}, {"id": "2", "text": "A, B and D Only"}, {"id": "3", "text": "B, C and E Only"}, {"id": "4", "text": "A, C and E Only"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* The Conservatism (Prudence) principle dictates recognizing all probable losses but never anticipating unearned gains.\n* Valuing stock at lower of cost or market value prevents overstatement of assets (A).\n* Creating provisions for bad debts recognizes anticipated future losses (C).\n* Creating an investment fluctuation fund hedges against potential declines in asset value (E).\n* Discount on creditors anticipates a gain, which violates conservatism.\n**Related Concepts:**\n* Generally Accepted Accounting Principles (GAAP).\n* Principle of Prudence.", "id": 46}, {"question": "In which of the following year Investor Protection and Education Fund Regulations was issued by the Securities and Exchange Board of India?", "options": [{"id": "1", "text": "1992"}, {"id": "2", "text": "1999"}, {"id": "3", "text": "2003"}, {"id": "4", "text": "2009"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* SEBI initiated the Investor Protection and Education Fund (IPEF) to safeguard investor interests.\n* The formal regulations governing this fund were issued in the year 2003.\n* The fund's capital is utilized for organizing awareness programs and educational campaigns for retail investors.\n* It plays a crucial role in building confidence in the Indian securities market.\n**Related Concepts:**\n* Role of SEBI in capital markets.\n* Financial Literacy Initiatives.", "id": 47}, {"question": "What is the Harmonic Mean of two numbers whose Arithmetic Mean and Geometric Mean are 30 and 24 respectively?", "options": [{"id": "1", "text": "4.8"}, {"id": "2", "text": "9.6"}, {"id": "3", "text": "19.2"}, {"id": "4", "text": "76.8"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* In mathematics, a strict relationship exists between Arithmetic Mean (AM), Geometric Mean (GM), and Harmonic Mean (HM).\n* The relationship formula is: $AM \\times HM = GM^2$.\n* Substituting the values: $30 \\times HM = 24^2$, which gives $30 \\times HM = 576$.\n* Solving for HM: $HM = 576 / 30 = 19.2$.\n**Related Concepts:**\n* Measures of Central Tendency.\n* Mathematical properties of means.", "id": 48}, {"question": "The working of current Purchasing Power Accounting requires classification of balance sheet items into Monetary Items and Non-Monetary Items. Which of the following is a Non-Monetary Item as per current Purchasing Power Accounting?", "options": [{"id": "1", "text": "Cash"}, {"id": "2", "text": "Debentures"}, {"id": "3", "text": "Debtors"}, {"id": "4", "text": "Inventories"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* Current Purchasing Power Accounting (CPPA) adjusts financial statements for general inflation.\n* Monetary items have fixed nominal values irrespective of inflation (e.g., Cash, Debtors, Debentures).\n* Non-Monetary items lack a fixed nominal value; their specific value changes with the general price level.\n* Inventories and physical fixed assets are non-monetary and must be adjusted using a price index.\n**Related Concepts:**\n* Inflation Accounting.\n* General Price Level Index.", "id": 49}, {"question": "Which of the following formula correctly show the relationship Average Revenue (AR), Marginal Revenue (MR) and Price elasticity of demand?", "options": [{"id": "1", "text": "$MR = AR + e - 1$"}, {"id": "2", "text": "$AR = MR \\times (e - 1) / e$"}, {"id": "3", "text": "$MR = AR \\times (e - 1) / e$"}, {"id": "4", "text": "$MR = AR + (e - 1) / (e + 1)$"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* The mathematical relationship between MR, AR, and price elasticity ($e$) is a core concept in microeconomics.\n* The standard formula is: $MR = AR \\times ((e - 1) / e)$.\n* This equation proves that Marginal Revenue is generally lower than Average Revenue.\n* If elasticity $e = 1$, then MR becomes precisely 0, indicating revenue is maximized.\n**Related Concepts:**\n* Revenue Curves under different market structures.\n* Degrees of Price Elasticity.\nUnderstood. Here is the clean version of the next 50 questions (originally Q101 to Q150 from the paper, renumbered as Q51 to Q100), strictly following your format without any citations.", "id": 50}, {"question": "Arrange the following steps of incorporation of a new Limited Liability Partnership in proper sequence.\nA. Reserve LLP Name\nB. Preparation of Documents for Incorporation of LLP\nC. Procure Digital Signature Certificate\nD. LLP incorporation and DIN Application and apply for PAN and TAN\nE. Drafting and filling LLP Agreement", "options": [{"id": "1", "text": "B, A, C, D, E"}, {"id": "2", "text": "A, B, C, E, D"}, {"id": "3", "text": "C, A, B, D, E"}, {"id": "4", "text": "D, E, B, A, C"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* The process begins with Procuring a Digital Signature Certificate (C) for designated partners to digitally sign forms.\n* Next, the LLP Name must be reserved (A) using the RUN-LLP service.\n* This is followed by the Preparation of Documents for Incorporation (B) like ID proofs and consent forms.\n* Then comes LLP incorporation, DIN, PAN, and TAN applications (D) via the FILLIP form.\n**Related Concepts:**\n* Drafting and filing the LLP Agreement (E) within 30 days of incorporation.\n* Limited Liability Partnership Act, 2008.", "id": 51}, {"question": "Arrange the following examples of business cycles in chronological order. (Old to New)\nA. Dot Com bubble burst\nB. Great Depression\nC. Covid Pandemic\nD. Global Financial Crisis", "options": [{"id": "1", "text": "A, B, C, D"}, {"id": "2", "text": "B, A, D, C"}, {"id": "3", "text": "D, B, A, C"}, {"id": "4", "text": "C, D, A, B"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* The Great Depression (B) occurred first, beginning in 1929.\n* The Dot Com Bubble Burst (A) followed decades later, peaking and bursting around 2000.\n* The Global Financial Crisis (D) took place in 2008, affecting global markets.\n* The COVID Pandemic (C) is the most recent economic shock, occurring in 2020.\n**Related Concepts:**\n* Phases of Business Cycles (Expansion, Peak, Contraction, Trough).\n* Macroeconomic market crashes and recessions.", "id": 52}, {"question": "Which of the following requirements have to be satisfied in order that an assessee is entitled to claim deduction under section 91 for doubly taxed income?\nA. The assessee must have been non-resident in India in the relevant previous year.\nB. The assessee must have been resident in India in the relevant previous year.\nC. Income must have been accrued or arisen to him during that previous year in India.\nD. Income must have been accrued or arisen to him during that previous year outside India.\nE. In respect of that income which accrued or arouse outside India, he must have paid by deduction or otherwise tax under the law in force in the country in question.", "options": [{"id": "1", "text": "A and C Only"}, {"id": "2", "text": "B and D Only"}, {"id": "3", "text": "B, D and E Only"}, {"id": "4", "text": "A, C and E Only"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* Section 91 provides unilateral relief for doubly taxed income.\n* It strictly requires the assessee to be a resident in India during the relevant previous year (B).\n* The income in question must have accrued or arisen outside India (D).\n* The assessee must have actually paid tax on that income in the foreign country under its laws (E).\n**Related Concepts:**\n* Double Taxation Avoidance Agreements (DTAA) under Section 90.\n* Incidence of tax based on residential status.", "id": 53}, {"question": "Arrange the following steps of Multinational Capital Budgeting in correct order\nA. Estimate net cash flow from the project\nB. Determine net investment outlay\nC. Apply appropriate evaluation technique\nD. Identify appropriate discount rate", "options": [{"id": "1", "text": "A, B, C, D"}, {"id": "2", "text": "C, A, B, D"}, {"id": "3", "text": "D, C, B, A"}, {"id": "4", "text": "B, A, D, C"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* The first step is to Determine the net investment outlay (B) to understand initial and setup costs.\n* Next, managers must Estimate the net cash flow from the project (A) over its useful life.\n* Then, Identify the appropriate discount rate (D) adjusted for relevant country risks.\n* Finally, Apply the appropriate evaluation technique (C) like NPV or IRR.\n**Related Concepts:**\n* Risk-adjusted discount rates in international finance.\n* Exchange rate forecasting in capital budgeting.", "id": 54}, {"question": "In PESTLE framework, what does 'L' denotes?", "options": [{"id": "1", "text": "Labour"}, {"id": "2", "text": "Legal"}, {"id": "3", "text": "Land"}, {"id": "4", "text": "Latest"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* PESTLE is an analytical framework used for macro-environmental scanning.\n* It stands for Political, Economic, Social, Technological, Legal, and Environmental factors.\n* The 'L' specifically denotes Legal factors.\n* Legal factors include labor laws, consumer protection, and industry regulations that impact business.\n**Related Concepts:**\n* SWOT Analysis.\n* Strategic Management and Environmental Scanning.", "id": 55}, {"question": "Arrange the following Development Financial Institution in chronological order of their establishment (Old to New)\nA. IFCI\nB. IDBI\nC. NABARD\nD. SIDBI", "options": [{"id": "1", "text": "A, B, C, D"}, {"id": "2", "text": "B, A, C, D"}, {"id": "3", "text": "C, D, A, B"}, {"id": "4", "text": "D, C, B, A"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* IFCI (Industrial Finance Corporation of India) is the oldest, established in 1948.\n* IDBI (Industrial Development Bank of India) followed, established in 1964.\n* NABARD (National Bank for Agriculture and Rural Development) was established in 1982.\n* SIDBI (Small Industries Development Bank of India) is the newest among them, established in 1990.\n**Related Concepts:**\n* Role of DFIs in industrialization.\n* Agricultural and rural credit systems.", "id": 56}, {"question": "Match the LIST-I with LIST-II.\n| LIST-I | LIST-II |\n| :--- | :--- |\n| A. Job enlargement | I. A list of jobs 'human requirements', i.e. the requisite education, skills, personality etc. |\n| B. Job descriptions | II. A list of jobs duties, responsibilities, reporting relationships, working conditions and supervisory responsibilities. |\n| C. Job specifications | III. Assigning workers additional same level activities. |\n| D. Job enrichment | IV. Redesigning jobs in a way that increases the opportunities for the workers to experience feelings of responsibility, achievement, growth and recognition. |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "A-III, B-II, C-I, D-IV"}, {"id": "2", "text": "A-IV, B-II, C-I, D-III"}, {"id": "3", "text": "A-III, B-I, C-II, D-IV"}, {"id": "4", "text": "A-IV, B-II, C-III, D-I"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* Job Enlargement (A-III) involves assigning workers additional same-level activities to reduce monotony.\n* Job Descriptions (B-II) detail the duties, responsibilities, reporting relationships, and working conditions.\n* Job Specifications (C-I) outline the human requirements like education, skills, and personality needed for the job.\n* Job Enrichment (D-IV) redesigns jobs to increase depth, responsibility, and growth opportunities.\n**Related Concepts:**\n* Job Analysis components.\n* Herzberg's Two-Factor Theory.", "id": 57}, {"question": "Match the LIST-I with LIST-II.\n| LIST-I | LIST-II |\n| :--- | :--- |\n| A. Section 2 (85) | I. Associate Company |\n| B. Section 455 | II. Producer Company |\n| C. Section 378A | III. Dormant Company |\n| D. Section 2 (6) | IV. Small Company |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "A-I, B-II, C-III, D-IV"}, {"id": "2", "text": "A-I, B-III, C-II, D-IV"}, {"id": "3", "text": "A-II, B-III, C-I, D-IV"}, {"id": "4", "text": "A-IV, B-III, C-II, D-I"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* Section 2(85) of the Companies Act defines a Small Company based on prescribed capital and turnover limits.\n* Section 455 outlines the provisions for a Dormant Company, which is inactive or holding assets/IP.\n* Section 378A introduces the concept of a Producer Company for agricultural producers and farmers.\n* Section 2(6) defines an Associate Company as one where another company has significant influence.\n**Related Concepts:**\n* Types of Companies under the Companies Act, 2013.\n* Holding and Subsidiary Companies.", "id": 58}, {"question": "If a random variable X follows a Poisson distribution such that P(X=1) = 4P(X=2). The variance of X is:", "options": [{"id": "1", "text": "1/2"}, {"id": "2", "text": "1"}, {"id": "3", "text": "2"}, {"id": "4", "text": "1/4"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* In a Poisson distribution, the probability mass function is $P(X=x) = (e^{-\\lambda} \\times \\lambda^x) / x!$.\n* Given $P(X=1) = 4 \\times P(X=2)$.\n* Substituting into the formula: $(e^{-\\lambda} \\times \\lambda^1) / 1! = 4 \\times [(e^{-\\lambda} \\times \\lambda^2) / 2!]$.\n* Simplifying yields $\\lambda = 1/2$. For a Poisson distribution, Mean = Variance = $\\lambda$, so Variance = 1/2.\n**Related Concepts:**\n* Properties of Poisson Distribution.\n* Probability Mass Functions.", "id": 59}, {"question": "Arrange the following exchange rate arrangements of international monetary system in chronological order (Old to New)\nA. Gold Standard\nB. Commodity Specie Standard\nC. Fixed parity System\nD. Floating exchange Rate", "options": [{"id": "1", "text": "A, B, C, D"}, {"id": "2", "text": "B, A, C, D"}, {"id": "3", "text": "C, B, D, A"}, {"id": "4", "text": "B, C, A, D"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* The Commodity Specie Standard (B) is the oldest, relying on commodities like gold or silver before the 1870s.\n* The Gold Standard (A) emerged next in the 1870s, tying currencies directly to a fixed amount of gold.\n* The Fixed Parity System (C), or Bretton Woods system, was established in 1944.\n* The Floating Exchange Rate (D) system began after 1971 when market-driven currency values took over.\n**Related Concepts:**\n* International Monetary Fund (IMF) creation.\n* Evolution of Global Financial Systems.", "id": 60}, {"question": "Arrange the following stages of Adoption process in correct order:\nA. Interest\nB. Awareness\nC. Trial\nD. Evaluation\nE. Adoption", "options": [{"id": "1", "text": "A, D, C, B, E"}, {"id": "2", "text": "A, B, C, D, E"}, {"id": "3", "text": "B, C, A, E, D"}, {"id": "4", "text": "B, A, D, C, E"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* The adoption process begins with Awareness (B), where the consumer becomes aware of the product.\n* This is followed by Interest (A), where they show curiosity and seek information.\n* Evaluation (D) comes next, considering whether the product is worth trying.\n* The consumer then engages in a Trial (C) on a small scale.\n* Finally, Adoption (E) occurs with full and continued use of the product.\n**Related Concepts:**\n* Diffusion of Innovation.\n* Consumer Buying Decision Process.", "id": 61}, {"question": "A type of validity which demonstrates statistically a relationship between scores on a selection procedure and job performance is called:", "options": [{"id": "1", "text": "Test validity"}, {"id": "2", "text": "Criterion validity"}, {"id": "3", "text": "Content validity"}, {"id": "4", "text": "Construct validity"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* Criterion validity evaluates how well a test or selection procedure predicts actual job performance.\n* It relies on a statistical correlation between the test scores and the eventual job outcomes.\n* It helps ensure that hiring metrics genuinely reflect future success in the role.\n* It is divided into concurrent validity and predictive validity.\n**Related Concepts:**\n* Content vs. Construct Validity.\n* Reliability of Selection Tests.", "id": 62}, {"question": "Which of the following are the discounted cash flow techniques of capital budgeting?\nA. Payback Period\nB. Accounting rate of return (ARR)\nC. Net Present Value (NPV)\nD. Internal Rate of Return (IRR)\nE. Profitability Index", "options": [{"id": "1", "text": "A, C, D Only"}, {"id": "2", "text": "B, C, E Only"}, {"id": "3", "text": "C and D Only"}, {"id": "4", "text": "C, D and E Only"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* Discounted Cash Flow (DCF) techniques factor in the time value of money by discounting future cash flows.\n* Net Present Value (NPV) calculates the present value of inflows minus outflows.\n* Internal Rate of Return (IRR) is the discount rate where NPV equals zero.\n* Profitability Index (PI) is the ratio of the present value of inflows to outflows.\n* Payback Period and ARR ignore the time value of money and are non-discounted methods.\n**Related Concepts:**\n* Time Value of Money.\n* Capital Budgeting Decisions.", "id": 63}, {"question": "Arrange the following human needs as per Maslow's Hierarchy of needs.\nA. Social Needs\nB. Safety Needs\nC. Esteem Needs\nD. Physiological Needs\nE. Self-actualisation Needs", "options": [{"id": "1", "text": "D, B, A, C, E"}, {"id": "2", "text": "A, B, C, D, E"}, {"id": "3", "text": "B, D, C, E, A"}, {"id": "4", "text": "D, A, B, C, E"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* Maslow's hierarchy starts at the bottom with Physiological Needs (D) like food and water.\n* The second level is Safety Needs (B), focusing on security and protection.\n* The third level is Social Needs (A), covering love, friendship, and belonging.\n* The fourth level is Esteem Needs (C), encompassing respect and recognition.\n* The highest level is Self-actualisation Needs (E), focusing on personal growth and potential.\n**Related Concepts:**\n* Motivation Theories.\n* ERG Theory (Alderfer).", "id": 64}, {"question": "Which of the following statements are correct with regard to mathematical properties of standard deviation?\nA. Standard deviation is independent of change of origin and change of scale.\nB. Standard deviation is independent of change of origin but not of scale.\nC. The standard deviation of first n natural numbers is $\\sqrt{(n^2-1)/12}$\nD. The standard deviation of first n natural numbers is $\\sqrt{(n^2-1)/6}$\nE. For moderately skewed distributions standard deviation is 0.8 of mean deviation.", "options": [{"id": "1", "text": "B and C Only"}, {"id": "2", "text": "B, C, and E Only"}, {"id": "3", "text": "A and C Only"}, {"id": "4", "text": "B, D and E Only"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* Standard deviation is structurally independent of a change of origin (adding/subtracting a constant).\n* It is mathematically dependent on a change of scale (multiplying/dividing by a constant).\n* The formula for the standard deviation of the first n natural numbers is exactly $\\sqrt{(n^2-1)/12}$.\n* Statement E is incorrect as Mean Deviation is roughly 0.8 (or 4/5) of the Standard Deviation, not vice versa.\n**Related Concepts:**\n* Properties of Variance.\n* Measures of Dispersion.", "id": 65}, {"question": "The price of a product decreases from 100 to 60 per unit. If the price elasticity of demand is 1.5 and the original quantity demanded is 30 units, what will be the new quantity demanded?", "options": [{"id": "1", "text": "38"}, {"id": "2", "text": "48"}, {"id": "3", "text": "56"}, {"id": "4", "text": "62"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* The formula for Price Elasticity of Demand (Ed) is $(\\Delta Q / \\Delta P) \\times (P / Q)$.\n* Given Ed = 1.5, Original Price (P) = 100, New Price = 60 (so $\\Delta P = 40$).\n* Original Quantity (Q) = 30.\n* Calculation: $1.5 = (\\Delta Q / 40) \\times (100 / 30) \\Rightarrow 1.5 = (\\Delta Q \\times 100) / 1200 \\Rightarrow \\Delta Q = 18$.\n* The New Quantity is Original Quantity + $\\Delta Q = 30 + 18 = 48$ units.\n**Related Concepts:**\n* Degrees of Price Elasticity.\n* Law of Demand.", "id": 66}, {"question": "Geographical Price differentials include which of the following?\nA. F.O.B Factory Pricing\nB. Zone Pricing\nC. Loss Leader Pricing\nD. Postage Stamp Pricing\nE. Basing Point Pricing", "options": [{"id": "1", "text": "A, B, C and D Only"}, {"id": "2", "text": "B, C, D and E Only"}, {"id": "3", "text": "A, B, D and E Only"}, {"id": "4", "text": "B, D and E Only"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* Geographical pricing strategies adjust product prices based on customer location and shipping costs.\n* F.O.B. Factory Pricing means the buyer pays freight, so the final price varies with distance.\n* Zone Pricing involves charging different prices for different geographical zones.\n* Postage Stamp Pricing applies a uniform delivery price regardless of location.\n* Basing Point Pricing designates a base city and charges freight from that point.\n* Loss Leader Pricing is promotional (selling below cost to attract customers), not geographical.\n**Related Concepts:**\n* Pricing Strategies.\n* Distribution Channel Costs.", "id": 67}, {"question": "Match the LIST-I with LIST-II.\n| LIST-I | LIST-II |\n| :--- | :--- |\n| A. Ind AS 2 | I. Property, Plant and Equipment |\n| B. Ind AS 16 | II. Fair Value Measurement |\n| C. Ind AS 103 | III. Inventories |\n| D. Ind AS 113 | IV. Business Combinations |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "A-I, B-II, C-III, D-IV"}, {"id": "2", "text": "A-IV, B-III, C-II, D-I"}, {"id": "3", "text": "A-III, B-I, C-IV, D-II"}, {"id": "4", "text": "A-III, B-I, C-II, D-IV"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* Ind AS 2 dictates the valuation, recognition, and cost formulas for Inventories.\n* Ind AS 16 governs the accounting for tangible fixed assets like Property, Plant, and Equipment.\n* Ind AS 103 provides the rules for accounting for mergers and Business Combinations.\n* Ind AS 113 establishes how to measure Fair Value consistently across standards.\n**Related Concepts:**\n* Indian Accounting Standards (Ind AS) convergence with IFRS.\n* Asset Valuation principles.", "id": 68}, {"question": "Arrange the following theories of international trade in chronological order (old to new)\nA. Mercantilism Theory\nB. Comparative Advantage Theory\nC. Product Life Cycle Theory\nD. Hecksher-Ohlin Theory", "options": [{"id": "1", "text": "A, B, C, D"}, {"id": "2", "text": "A, B, D, C"}, {"id": "3", "text": "C, B, A, D"}, {"id": "4", "text": "B, A, C, D"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* The Mercantilism Theory (A) is the oldest (16th-18th century), focusing on wealth accumulation via trade surplus.\n* The Comparative Advantage Theory (B) was introduced by David Ricardo in 1817.\n* The Heckscher-Ohlin Theory (D) was developed in the early 20th century (1933), focusing on factor endowments.\n* The Product Life Cycle Theory (C) is the newest, introduced by Raymond Vernon in the 1960s.\n**Related Concepts:**\n* Absolute Advantage Theory (Adam Smith).\n* International Business Theories.", "id": 69}, {"question": "If the employee pays tax within the parameters of alternative tax regime under section 115 BAC then from assessment year 2025-26, standard deduction from salary income is:", "options": [{"id": "1", "text": "NIL"}, {"id": "2", "text": "50,000 or gross salary, whichever is lower"}, {"id": "3", "text": "75,000 or gross salary, whichever is lower"}, {"id": "4", "text": "40,000 or gross salary, whichever is lower"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* Section 115BAC of the Income Tax Act outlines the new alternative tax regime.\n* Recent budget updates have enhanced the standard deduction available to salaried employees under this regime.\n* From the assessment year 2025-26, the standard deduction has been increased to Rs. 75,000.\n* This deduction is capped at 75,000 or the gross salary, whichever is lower.\n**Related Concepts:**\n* Income from Salary head.\n* Deductions under Section 16(ia).", "id": 70}, {"question": "Which of the following is a horizontal agreement?", "options": [{"id": "1", "text": "Tie in arrangement"}, {"id": "2", "text": "Resale Price maintenance"}, {"id": "3", "text": "Cartel"}, {"id": "4", "text": "Exclusive Distribution"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* Horizontal agreements occur between enterprises operating at the same stage of the supply chain.\n* A Cartel is a classic horizontal agreement where competing firms collude to fix prices or limit production.\n* Tie-in Arrangements, Resale Price Maintenance, and Exclusive Distribution are vertical agreements.\n* Vertical agreements occur between firms at different stages (e.g., manufacturer and distributor).\n**Related Concepts:**\n* Competition Act, 2002.\n* Anti-competitive agreements.", "id": 71}, {"question": "Symbols, Icons, Rituals and values are the manifestations of:", "options": [{"id": "1", "text": "Social class"}, {"id": "2", "text": "Culture"}, {"id": "3", "text": "Sub-culture"}, {"id": "4", "text": "Social Factors"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* Culture represents the collective programming of the mind, comprising shared beliefs and practices.\n* Symbols, icons, and rituals are observable elements that manifest a culture's underlying values.\n* Values form the invisible, core foundation of any culture.\n* These elements collectively guide consumer behavior and societal norms within a group.\n**Related Concepts:**\n* Hofstede's Cultural Dimensions.\n* Cross-cultural Marketing.", "id": 72}, {"question": "Who can file petition to the Tribunal for the Winding up of a Limited Liability Partnership?\nA. Secured Creditors\nB. LLP or any of its Partners\nC. Registrar of Companies\nD. Any person authorised by the central Government\nE. Any Voluntary Association", "options": [{"id": "1", "text": "A, B, C Only"}, {"id": "2", "text": "A and B Only"}, {"id": "3", "text": "A, B, C and D Only"}, {"id": "4", "text": "B, C and E Only"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* The NCLT is the tribunal responsible for handling LLP winding-up petitions.\n* Secured Creditors (A) can file a petition if their dues remain unpaid.\n* The LLP itself or its Partners (B) can file for voluntary winding up or under special circumstances.\n* The Registrar of Companies (C) and authorized Central Government personnel (D) have statutory rights to file.\n* Voluntary Associations (E) have no legal standing to initiate such petitions.\n**Related Concepts:**\n* Limited Liability Partnership Act, 2008.\n* Insolvency and Bankruptcy Code (IBC).", "id": 73}, {"question": "A company produces and sells 10,000 toys. The selling price per toy is 500, variable cost is 200 per unit and fixed operating cost is 25,00,000. Calculate operating Leverage.", "options": [{"id": "1", "text": "4 times"}, {"id": "2", "text": "5 times"}, {"id": "3", "text": "6 times"}, {"id": "4", "text": "8 times"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* Operating Leverage is calculated as Contribution / EBIT.\n* Contribution = (Selling Price - Variable Cost) $\\times$ Units = (500 - 200) $\\times$ 10,000 = 30,00,000.\n* EBIT = Contribution - Fixed Cost = 30,00,000 - 25,00,000 = 5,00,000.\n* Operating Leverage = 30,00,000 / 5,00,000 = 6 times.\n**Related Concepts:**\n* Degree of Operating Leverage (DOL).\n* Financial Leverage and Combined Leverage.", "id": 74}, {"question": "An unsecured short-term promissory note, negotiable and transferable by endorsement and delivery with a fixed maturity period, issued at a discount by creditworthy corporates, primary dealers and all-India financial institutions is known as:", "options": [{"id": "1", "text": "Treasury Bill"}, {"id": "2", "text": "Commercial Paper"}, {"id": "3", "text": "Certificates of Deposit"}, {"id": "4", "text": "Repo"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* Commercial Paper (CP) is an unsecured money market instrument.\n* It takes the form of a promissory note and is highly negotiable.\n* It is issued at a discount to face value to meet short-term funding needs.\n* Only highly rated corporate borrowers, primary dealers, and financial institutions can issue CPs.\n**Related Concepts:**\n* Money Market Instruments.\n* Treasury Bills (issued by Government, not corporates).", "id": 75}, {"question": "In India, the term of every utility patent granted shall be of ____ years.", "options": [{"id": "1", "text": "10"}, {"id": "2", "text": "20"}, {"id": "3", "text": "30"}, {"id": "4", "text": "50"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* Under the Indian Patents Act, 1970, patents are granted to protect inventions (utility).\n* The statutory term for a granted utility patent is strictly 20 years.\n* This term is calculated directly from the date of filing the patent application.\n* Once the 20-year term expires, the invention enters the public domain.\n**Related Concepts:**\n* Intellectual Property Rights (IPR).\n* TRIPS Agreement compliance.", "id": 76}, {"question": "Arrange the following in chronological order of their establishment (Old to New)\nA. NAFTA\nB. European Union\nC. SAARC\nD. ASEAN", "options": [{"id": "1", "text": "A, B, C, D"}, {"id": "2", "text": "B, A, D, C"}, {"id": "3", "text": "D, C, B, A"}, {"id": "4", "text": "C, D, A, B"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* ASEAN (Association of Southeast Asian Nations) was established first in 1967.\n* SAARC (South Asian Association for Regional Cooperation) followed, established in 1985.\n* The European Union (EU) was formally established by the Treaty of Maastricht in 1993.\n* NAFTA (North American Free Trade Agreement) came into force in 1994.\n**Related Concepts:**\n* Regional Economic Integration.\n* Trade Blocs.", "id": 77}, {"question": "Match the LIST-I with LIST-II.\n| LIST-I (Relative measures of Skewness) | LIST-II (Formula) |\n| :--- | :--- |\n| A. Karl Pearson's coefficient of Skewness | I. $(\\mu_3)^2 / (\\mu_2)^3$ |\n| B. Bowley's coefficient of Skewness | II. $(P_{90} + P_{10} - 2\\text{Median}) / (P_{90} - P_{10})$ |\n| C. Kelly's coefficient of Skewness | III. $(Q_3 + Q_1 - 2\\text{Median}) / (Q_3 - Q_1)$ |\n| D. Moment coefficient of Skewness | IV. $(\\text{Mean} - \\text{Mode}) / \\text{Standard Deviation}$ |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "A-I, B-II, C-III, D-IV"}, {"id": "2", "text": "A-IV, B-III, C-II, D-I"}, {"id": "3", "text": "A-II, B-III, C-IV, D-I"}, {"id": "4", "text": "A-III, B-IV, C-I, D-II"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* Karl Pearson's coefficient of skewness utilizes the Mean, Mode, and Standard Deviation (A-IV).\n* Bowley's coefficient of skewness is based entirely on Quartiles ($Q_1, Q_3$, and Median) (B-III).\n* Kelly's coefficient of skewness utilizes Percentiles (specifically $P_{90}$ and $P_{10}$) (C-II).\n* The Moment coefficient of skewness relies on the central moments ($\\mu_3$ and $\\mu_2$) (D-I).\n**Related Concepts:**\n* Measures of Skewness and Kurtosis.\n* Descriptive Statistics.", "id": 78}, {"question": "A company has 10%, 20 lakh debentures. The EBIT of the company is 5,00,000 and the equity capitalisation rate is 16%. Calculate overall cost of capital.", "options": [{"id": "1", "text": "9.5%"}, {"id": "2", "text": "10.8%"}, {"id": "3", "text": "12.9%"}, {"id": "4", "text": "14.5%"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* Value of Debt (D) = Rs. 20,00,000. Interest (I) = 10% of 20,00,000 = Rs. 2,00,000.\n* EBIT = Rs. 5,00,000. Earnings available for equity (NI) = EBIT - I = 5,00,000 - 2,00,000 = Rs. 3,00,000.\n* Value of Equity (E) = NI / Ke = 3,00,000 / 0.16 = Rs. 18,75,000.\n* Total Value of Firm (V) = D + E = 20,00,000 + 18,75,000 = Rs. 38,75,000.\n* Overall Cost of Capital (Ko) = EBIT / V = 5,00,000 / 38,75,000 = 12.9%.\n**Related Concepts:**\n* Net Income (NI) Approach to Capital Structure.\n* Weighted Av
