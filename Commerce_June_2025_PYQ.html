erage Cost of Capital (WACC).", "id": 79}, {"question": "Match the LIST-I with LIST-II.\n| LIST-I (Item) | LIST-II (Section) |\n| :--- | :--- |\n| A. Deduction in respect of medical insurance premium | I. Section 80CCH |\n| B. Deduction in case of a person with disability | II. Section 80D |\n| C. Deduction in respect of interest on loan taken for higher education | III. Section 80U |\n| D. Deduction in respect contribution to Agnipath Scheme | IV. Section 80E |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "A-IV, B-I, C-II, D-III"}, {"id": "2", "text": "A-III, B-IV, C-I, D-II"}, {"id": "3", "text": "A-II, B-III, C-IV, D-I"}, {"id": "4", "text": "A-I, B-II, C-III, D-IV"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* Section 80D provides deductions for medical insurance premiums paid for self, family, and parents.\n* Section 80U allows a fixed deduction for an individual suffering from a disability.\n* Section 80E covers deductions for interest paid on higher education loans.\n* Section 80CCH provides deductions for contributions to the Agnipath Scheme (Agniveer Corpus Fund).\n**Related Concepts:**\n* Chapter VI-A Deductions.\n* Tax planning for individuals.", "id": 80}, {"question": "Match the LIST-I with LIST-II.\n| LIST-I (Concept) | LIST-II (Formula) |\n| :--- | :--- |\n| A. Production Function | I. $K (K, L)$ |\n| B. Average Product | II. $TP_n - TP_{n-1}$ |\n| C. Marginal Product | III. Total Product / No. of units of variable factor |\n| D. Constant Return to scale | IV. $Q = f(a,b,c,...,n)$ |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "A-I, B-II, C-III, D-IV"}, {"id": "2", "text": "A-II, B-I, C-IV, D-III"}, {"id": "3", "text": "A-I, B-II, C-IV, D-III"}, {"id": "4", "text": "A-IV, B-III, C-II, D-I"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* The Production Function (A-IV) mathematically expresses output (Q) as a function of various inputs $(a,b,c,...,n)$.\n* Average Product (B-III) is calculated by dividing Total Product (TP) by the number of variable input units.\n* Marginal Product (C-II) is the change in total product from using one additional input unit ($TP_n - TP_{n-1}$).\n* Constant Returns to Scale (D-I) indicates that doubling all inputs exactly doubles the output ($K(K, L)$).\n**Related Concepts:**\n* Law of Variable Proportions.\n* Returns to Scale (Long Run).", "id": 81}, {"question": "A company hold raw material for 60 days. It gets credit from suppliers for 15 days, production process takes 15 days, finished goods are held for 30 days and 30 days credit is given to debtors. Calculate the total working capital cycle.", "options": [{"id": "1", "text": "150 days"}, {"id": "2", "text": "120 days"}, {"id": "3", "text": "100 days"}, {"id": "4", "text": "90 days"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* The Operating Cycle represents the time taken to convert materials into cash.\n* Gross Operating Cycle = Raw Material Period + Work in Progress Period + Finished Goods Period + Debtors Period.\n* Gross Cycle = 60 + 15 + 30 + 30 = 135 days.\n* Net Working Capital Cycle = Gross Operating Cycle - Creditors Payment Period.\n* Net Cycle = 135 - 15 = 120 days.\n**Related Concepts:**\n* Cash Conversion Cycle.\n* Working Capital Management.", "id": 82}, {"question": "What is the primary liability of the drawer of a bill of exchange or cheque?", "options": [{"id": "1", "text": "Liability to compensate the holder in case of dishonour."}, {"id": "2", "text": "Liability to pay the amount at maturity."}, {"id": "3", "text": "Liability to provide sufficient funds to the drawee."}, {"id": "4", "text": "Liability to pay the holder without any condition."}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* The drawer is the party who creates the bill or cheque, directing the drawee to pay.\n* The drawee has the primary liability to pay upon maturity or presentation.\n* The drawer's liability is secondary and conditional upon the instrument's failure.\n* The drawer must compensate the holder ONLY if the instrument is dishonoured by the drawee.\n**Related Concepts:**\n* Negotiable Instruments Act, 1881.\n* Dishonour of Cheques (Section 138).", "id": 83}, {"question": "Which of the following is NOT the feature of business environment?", "options": [{"id": "1", "text": "Complex"}, {"id": "2", "text": "Dynamic"}, {"id": "3", "text": "Multi-faceted"}, {"id": "4", "text": "Static"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* The business environment is inherently complex as it involves multiple interconnected factors.\n* It is dynamic, continuously changing in response to internal and external influences.\n* It is multi-faceted, meaning these changes are perceived differently by different observers.\n* It is never static; stagnation does not exist in real-world evolving market environments.\n**Related Concepts:**\n* Environmental Scanning.\n* Macro vs. Micro Environment.", "id": 84}, {"question": "Which of the following statements are correct with regard to tax avoidance?\nA. Tax avoidance is legitimate arrangement of affairs in such a way so as to minimize tax liability.\nB. There is an element of malafide motive involved in tax avoidance.\nC. Tax avoidance takes into account the loop-holes of law.\nD. Tax avoidance is intentional attempt to avoid payment of tax after the liability to tax has arisen.\nE. Tax avoidance is same as tax omission.", "options": [{"id": "1", "text": "A and C Only"}, {"id": "2", "text": "A, B and C Only"}, {"id": "3", "text": "B, D and E Only"}, {"id": "4", "text": "A, C and E Only"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* Tax avoidance is the legally permissible arrangement of financial affairs to minimize tax liability.\n* It relies heavily on finding and exploiting loopholes within the legal framework (C).\n* It lacks the clear malafide, wrongful intent that is strictly associated with tax evasion.\n* Evading tax after liability arises (D) is illegal tax evasion, not avoidance.\n**Related Concepts:**\n* Tax Evasion vs. Tax Planning.\n* General Anti-Avoidance Rules (GAAR).", "id": 85}, {"question": "What is the amount of net cash from operating activities of A Ltd. if it has net profit before tax 5,90,000: Depreciation on Property, Plant and Equipment 4,30,000: Decrease in current Assets 30,000: Decrease in Current Liabilities 85000: and Tax Paid 80000", "options": [{"id": "1", "text": "9,65,000"}, {"id": "2", "text": "8,85,000"}, {"id": "3", "text": "10,75,000"}, {"id": "4", "text": "29,95,000"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* Operating Cash Flow (Indirect Method) begins with Net Profit Before Tax: 5,90,000.\n* Add back non-cash expenses like Depreciation: 5,90,000 + 4,30,000 = 10,20,000 (Operating profit before WC changes).\n* Add Decrease in Current Assets: 10,20,000 + 30,000 = 10,50,000.\n* Less Decrease in Current Liabilities: 10,50,000 - 85,000 = 9,65,000 (Cash generated from operations).\n* Less Tax Paid: 9,65,000 - 80,000 = 8,85,000 (Net cash from operating activities).\n**Related Concepts:**\n* Cash Flow Statement (AS 3).\n* Working Capital Adjustments.", "id": 86}, {"question": "Match the LIST-I with LIST-II.\n| LIST-I (Concept) | LIST-II (Formula) |\n| :--- | :--- |\n| A. Present Value | I. Cash flow $\\times (1+r)^t$ |\n| B. Future Value | II. Cash flow / $(1+r)^t$ |\n| C. Future Value of Annuity | III. R (PVIFi, n) |\n| D. Present Value of Annuity | IV. R (FVIFAi, n) |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "A-II, B-I, C-IV, D-III"}, {"id": "2", "text": "A-I, B-II, C-IV, D-III"}, {"id": "3", "text": "A-III, B-IV, C-I, D-II"}, {"id": "4", "text": "A-I, B-III, C-II, D-IV"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* Present Value (A-II) is determined by discounting future cash flows back to today: Cash flow / $(1+r)^t$.\n* Future Value (B-I) is found by compounding present cash flows forward: Cash flow $\\times (1+r)^t$.\n* Future Value of an Annuity (C-IV) utilizes the Future Value Interest Factor for an Annuity (FVIFA).\n* Present Value of an Annuity (D-III) utilizes the Present Value Interest Factor for an Annuity (PVIFA).\n**Related Concepts:**\n* Time Value of Money principles.\n* Annuities vs. Lump Sums.", "id": 87}, {"question": "Arrange the following steps involved in the process of Voluntary Liquidation of a Limited Liability Partnership in correct order.\nA. Declaration of Solvency\nB. Designated Partners' Meeting\nC. Partners' Meeting\nD. Identification of an Insolvency Professional as liquidator\nE. Filling of resolutions with registrar of Companies and Insolvency and Bankruptcy Board of India (IBBI)", "options": [{"id": "1", "text": "A, B, C, D, E"}, {"id": "2", "text": "C, B, D, A, E"}, {"id": "3", "text": "A, D, B, C, E"}, {"id": "4", "text": "E, D, C, B, A"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* The process strictly starts with a Declaration of Solvency (A) to ensure the firm can pay debts in full.\n* Then, an Insolvency Professional must be identified (D) to act as the liquidator for the LLP.\n* A Designated Partners' Meeting (B) is held to propose the voluntary liquidation.\n* A general Partners' Meeting (C) passes the formal resolution for liquidation.\n* Finally, the passed resolution is filed with the ROC and IBBI (E).\n**Related Concepts:**\n* LLP Act, 2008 Winding up rules.\n* Insolvency and Bankruptcy Code (IBC).", "id": 88}, {"question": "Arrange the following in chronological order of the Milestone achieved by the National Stock Exchange of India\nA. Commencement of Trading in Index options\nB. Launch of securities Lending and Borrowing Scheme\nC. Commencement of Derivatives Trading in Index Futures\nD. Launch of Mutual Fund Service System\nE. Launch of S & P CNX Nifty", "options": [{"id": "1", "text": "B, D, E, A, C"}, {"id": "2", "text": "A, C, E, B, D"}, {"id": "3", "text": "E, A, C, D, B"}, {"id": "4", "text": "E, C, A, B, D"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* The benchmark S&P CNX Nifty was launched first in 1996 (E).\n* Derivatives trading in Index Futures commenced in June 2000 (C).\n* Trading in Index Options commenced shortly after in June 2001 (A).\n* The Securities Lending and Borrowing Scheme (SLBS) was launched in 2008 (B).\n* The online Mutual Fund Service System (MFSS) was launched in 2009 (D).\n**Related Concepts:**\n* Capital Market Development in India.\n* Derivatives Market structure.", "id": 89}, {"question": "Which of the following types of audit report are termed together as modified reports as per standards on Auditing (SA) 705?\nA. Qualified Report\nB. Audit Report with an 'Emphasis of Matter' paragraph\nC. Disclaimer of opinion Report\nD. Adverse Report", "options": [{"id": "1", "text": "A and B Only"}, {"id": "2", "text": "A, B and C Only"}, {"id": "3", "text": "B and C Only"}, {"id": "4", "text": "A, C and D only"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* SA 705 governs modifications to the independent auditor's opinion.\n* A Qualified Report (A) states financial statements are true and fair except for certain non-pervasive issues.\n* An Adverse Report (D) states the financial statements have material and pervasive misstatements.\n* A Disclaimer of Opinion (C) is issued when the auditor cannot obtain sufficient evidence.\n* An 'Emphasis of Matter' paragraph does not modify the audit opinion; it merely draws attention to disclosures.\n**Related Concepts:**\n* Standard on Auditing (SA) 700 series.\n* Types of Audit Opinions.", "id": 90}, {"question": "A mid-sized IT firm in India is facing multiple HR challenges as it expands. The company recently hired 200 employees but is struggling with high attrition, lack of structured training program and a weak performance appraisal system. Employees often feel over worked and underappreciated, leading to low engagement and motivation. The HR manager Priya wants to improve HR practices by implementing a structured performance appraisal system launching employee wellness program and using HR technology for recruitment. However, she faces resistance from senior management, who think those initiative will increase cost without direct financial benefits. Additionally, employee feedback indicates dissatisfaction with work life balance and unclear career progression. Some employees also feel that promotions are biased and that the company lack a proper succession plan. Priya is considering introducing flexible work arrangements, setting up leadership development program and adopting Al- driven HR analytics to improve decision making. However, she needs to convince top management of the long-term benefits of these changes. <b>Which strategy would be most effective in retaining employees and reducing attrition rate?<\/b>", "options": [{"id": "1", "text": "Making the resignation process more difficult"}, {"id": "2", "text": "Increasing workload"}, {"id": "3", "text": "Offering voluntary retirement"}, {"id": "4", "text": "Offering increments and career growth opportunities"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* High attrition often stems from employees feeling underappreciated and stagnant in their roles.\n* Offering financial incentives (increments) directly addresses the feeling of being underappreciated.\n* Career growth opportunities directly solve the issue of unclear career progression paths.\n* These positive reinforcements enhance engagement and lower turnover rates.\n**Related Concepts:**\n* Employee Retention Strategies.\n* Motivation and Reward Systems.", "id": 91}, {"question": "A mid-sized IT firm in India is facing multiple HR challenges as it expands. The company recently hired 200 employees but is struggling with high attrition, lack of structured training program and a weak performance appraisal system. Employees often feel over worked and underappreciated, leading to low engagement and motivation. The HR manager Priya wants to improve HR practices by implementing a structured performance appraisal system launching employee wellness program and using HR technology for recruitment. However, she faces resistance from senior management, who think those initiative will increase cost without direct financial benefits. Additionally, employee feedback indicates dissatisfaction with work life balance and unclear career progression. Some employees also feel that promotions are biased and that the company lack a proper succession plan. Priya is considering introducing flexible work arrangements, setting up leadership development program and adopting Al- driven HR analytics to improve decision making. However, she needs to convince top management of the long-term benefits of these changes.  <b>Priya needs to address employee dissatisfaction with career progression. What should be her first step?<\/b>", "options": [{"id": "1", "text": "Encouraging employee to find new jobs"}, {"id": "2", "text": "Reducing training budgets"}, {"id": "3", "text": "Conducting skill gap analysis and creating career development plan"}, {"id": "4", "text": "Promoting only senior employee"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* Addressing career progression requires a structured approach to employee development.\n* Conducting a skill gap analysis helps identify the specific training needed for employees to advance.\n* Creating a career development plan provides a clear roadmap for employees within the organization.\n* This directly resolves the career ambiguity causing widespread dissatisfaction.\n**Related Concepts:**\n* Career Planning and Development.\n* Talent Management.", "id": 92}, {"question": "A mid-sized IT firm in India is facing multiple HR challenges as it expands. The company recently hired 200 employees but is struggling with high attrition, lack of structured training program and a weak performance appraisal system. Employees often feel over worked and underappreciated, leading to low engagement and motivation. The HR manager Priya wants to improve HR practices by implementing a structured performance appraisal system launching employee wellness program and using HR technology for recruitment. However, she faces resistance from senior management, who think those initiative will increase cost without direct financial benefits. Additionally, employee feedback indicates dissatisfaction with work life balance and unclear career progression. Some employees also feel that promotions are biased and that the company lack a proper succession plan. Priya is considering introducing flexible work arrangements, setting up leadership development program and adopting Al- driven HR analytics to improve decision making. However, she needs to convince top management of the long-term benefits of these changes. <b>Which HR strategy can help to develop future leaders in the organisation?<\/b>", "options": [{"id": "1", "text": "Implementing intensive employee development program"}, {"id": "2", "text": "Hiring only external candidates for leadership role"}, {"id": "3", "text": "Implementing performance linked bonus"}, {"id": "4", "text": "Promoting employees on seniority basis"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* Developing leaders internally requires proactive and structured capacity building.\n* Intensive employee development programs provide the necessary skills and grooming for leadership.\n* This initiative directly mitigates the lack of a proper succession plan mentioned in the organizational case.\n* Relying solely on external hires or seniority ignores long-term capability development.\n**Related Concepts:**\n* Succession Planning.\n* Leadership Development.", "id": 93}, {"question": "A mid-sized IT firm in India is facing multiple HR challenges as it expands. The company recently hired 200 employees but is struggling with high attrition, lack of structured training program and a weak performance appraisal system. Employees often feel over worked and underappreciated, leading to low engagement and motivation. The HR manager Priya wants to improve HR practices by implementing a structured performance appraisal system launching employee wellness program and using HR technology for recruitment. However, she faces resistance from senior management, who think those initiative will increase cost without direct financial benefits. Additionally, employee feedback indicates dissatisfaction with work life balance and unclear career progression. Some employees also feel that promotions are biased and that the company lack a proper succession plan. Priya is considering introducing flexible work arrangements, setting up leadership development program and adopting Al- driven HR analytics to improve decision making. However, she needs to convince top management of the long-term benefits of these changes. <b>If Priya wants to use HR analytics to predict labour turn over, Which data should she analyse?<\/b>", "options": [{"id": "1", "text": "Employees social media engagements"}, {"id": "2", "text": "Attrition trends and exit interview feedback"}, {"id": "3", "text": "The number of training program"}, {"id": "4", "text": "The number of leaves taken by employees"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* Predictive HR analytics requires highly relevant historical and qualitative data.\n* Attrition trends reveal statistical patterns in employee departures over time.\n* Exit interview feedback provides direct qualitative data on the exact reasons for leaving.\n* Combining these datasets enables the most accurate forecasting of future turnover.\n**Related Concepts:**\n* HR Analytics and Metrics.\n* Exit Management.", "id": 94}, {"question": "A mid-sized IT firm in India is facing multiple HR challenges as it expands. The company recently hired 200 employees but is struggling with high attrition, lack of structured training program and a weak performance appraisal system. Employees often feel over worked and underappreciated, leading to low engagement and motivation. The HR manager Priya wants to improve HR practices by implementing a structured performance appraisal system launching employee wellness program and using HR technology for recruitment. However, she faces resistance from senior management, who think those initiative will increase cost without direct financial benefits. Additionally, employee feedback indicates dissatisfaction with work life balance and unclear career progression. Some employees also feel that promotions are biased and that the company lack a proper succession plan. Priya is considering introducing flexible work arrangements, setting up leadership development program and adopting Al- driven HR analytics to improve decision making. However, she needs to convince top management of the long-term benefits of these changes. <b>To convince senior management about HR investments, Priya should highlight:<\/b>", "options": [{"id": "1", "text": "The number of training program conducted"}, {"id": "2", "text": "The positive feedback of customers"}, {"id": "3", "text": "The financial impact of HR initiatives on business growth"}, {"id": "4", "text": "The employees performance appraisal methods"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* Senior management typically resists HR investments due to perceived cost without direct returns.\n* Demonstrating the ROI (Return on Investment) of HR initiatives is crucial to winning support.\n* Highlighting how improved retention and productivity positively impact financial growth overcomes cost objections.\n* Business leaders require quantitative evidence linking HR practices directly to the bottom line.\n**Related Concepts:**\n* Strategic Human Resource Management (SHRM).\n* HR Scorecard.", "id": 95}, {"question": "A large real estate company in India is facing challenges in raising funds for expansion. Despite solid track record the company is struggling to attract investors due to increasing concern about liquidity in financial market. The company has earlier relied on bank loans and debt instruments for financing but now looking for other funding option. The CFO of the company is evaluating different option such as corporate bonds, Private equity, public deposit and securitization to raise capital. He is also looking at the evolving role of financial institution such as investment banks, development banks and insurance companies in providing finance. However, he is concerned about the volatility of the stock market and the risk of inflation affecting company's future cashflow. To address these challenges, the company plan to consult with financial advisors and explore new avenues of funding, including green bonds and venture capital. The CFO must navigate the complex world of financial markets to ensure that the company secures the right funding at the right cost. <b>Which of the following is a primary function of financial markets in the economy?<\/b>", "options": [{"id": "1", "text": "Facilitating buying and selling of financial instruments"}, {"id": "2", "text": "Offering financial advice to individual investors"}, {"id": "3", "text": "Providing loan without collateral"}, {"id": "4", "text": "Increasing revenues for the Government"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* Financial markets act as essential intermediaries between savers (investors) and borrowers (companies).\n* Their core function is to facilitate the seamless buying and selling of financial instruments like bonds and equities.\n* This liquidity creation is essential for capital flow and business expansion.\n* Advice or unsecured lending are secondary or specialized functions, not the primary market role.\n**Related Concepts:**\n* Functions of Financial Markets.\n* Capital Formation.", "id": 96}, {"question": "A large real estate company in India is facing challenges in raising funds for expansion. Despite solid track record the company is struggling to attract investors due to increasing concern about liquidity in financial market. The company has earlier relied on bank loans and debt instruments for financing but now looking for other funding option. The CFO of the company is evaluating different option such as corporate bonds, Private equity, public deposit and securitization to raise capital. He is also looking at the evolving role of financial institution such as investment banks, development banks and insurance companies in providing finance. However, he is concerned about the volatility of the stock market and the risk of inflation affecting company's future cashflow. To address these challenges, the company plan to consult with financial advisors and explore new avenues of funding, including green bonds and venture capital. The CFO must navigate the complex world of financial markets to ensure that the company secures the right funding at the right cost. <b>The Company is considering corporate bonds as a funding option. Which factor is most likely to affect the interest rate of bond?<\/b>", "options": [{"id": "1", "text": "The number of projects completed by the company"}, {"id": "2", "text": "The interest rate on Government securities"}, {"id": "3", "text": "The credit rating of the bond"}, {"id": "4", "text": "The level of Foreign Direct Investment"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* Corporate bonds carry an inherent default risk unlike sovereign government bonds.\n* The credit rating provided by independent rating agencies quantifies this specific default risk.\n* A lower credit rating forces the company to offer a higher interest rate to attract risk-averse investors.\n* It is the most direct and crucial determinant of the cost of debt when issuing corporate bonds.\n**Related Concepts:**\n* Credit Rating Agencies (CRAs).\n* Risk and Return Trade-off.", "id": 97}, {"question": "A large real estate company in India is facing challenges in raising funds for expansion. Despite solid track record the company is struggling to attract investors due to increasing concern about liquidity in financial market. The company has earlier relied on bank loans and debt instruments for financing but now looking for other funding option. The CFO of the company is evaluating different option such as corporate bonds, Private equity, public deposit and securitization to raise capital. He is also looking at the evolving role of financial institution such as investment banks, development banks and insurance companies in providing finance. However, he is concerned about the volatility of the stock market and the risk of inflation affecting company's future cashflow. To address these challenges, the company plan to consult with financial advisors and explore new avenues of funding, including green bonds and venture capital. The CFO must navigate the complex world of financial markets to ensure that the company secures the right funding at the right cost. <b>What is the main advantage of raising capital through venture capital?<\/b>", "options": [{"id": "1", "text": "To avoid giving up ownership or control"}, {"id": "2", "text": "To access expertise and guidance from investors"}, {"id": "3", "text": "To get the fund for a very long term"}, {"id": "4", "text": "To get a low-cost funding"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* Venture Capital (VC) provides \"smart money\" to growing firms.\n* Besides funding, VCs bring strategic expertise, industry connections, and mentorship.\n* This guidance helps companies navigate complex market challenges more sustainably than traditional debt.\n* VCs do demand equity (ownership), making option A incorrect.\n**Related Concepts:**\n* Venture Capital Financing.\n* Angel Investors vs. VCs.", "id": 98}, {"question": "A large real estate company in India is facing challenges in raising funds for expansion. Despite solid track record the company is struggling to attract investors due to increasing concern about liquidity in financial market. The company has earlier relied on bank loans and debt instruments for financing but now looking for other funding option. The CFO of the company is evaluating different option such as corporate bonds, Private equity, public deposit and securitization to raise capital. He is also looking at the evolving role of financial institution such as investment banks, development banks and insurance companies in providing finance. However, he is concerned about the volatility of the stock market and the risk of inflation affecting company's future cashflow. To address these challenges, the company plan to consult with financial advisors and explore new avenues of funding, including green bonds and venture capital. The CFO must navigate the complex world of financial markets to ensure that the company secures the right funding at the right cost. <b>In a volatile stock market, how the company can reduce financing risk when raising funds through equity?<\/b>", "options": [{"id": "1", "text": "Issue share only when market is at peak"}, {"id": "2", "text": "Raise funds through long term bonds only"}, {"id": "3", "text": "Reduce dividend pay-out to increase internal funds"}, {"id": "4", "text": "Diversify source of funds by combining debt and equity financing"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* Market volatility increases the cost and risk of relying solely on equity issuance.\n* Diversification of the capital structure mitigates exposure to a single market's fluctuations.\n* Combining debt and equity (mixing sources) balances the fixed cost of debt with the flexibility of equity.\n* This strategic mix minimizes overall reliance on one channel and reduces financing risk.\n**Related Concepts:**\n* Capital Structure Optimization.\n* Financial Risk Management.", "id": 99}, {"question": "A large real estate company in India is facing challenges in raising funds for expansion. Despite solid track record the company is struggling to attract investors due to increasing concern about liquidity in financial market. The company has earlier relied on bank loans and debt instruments for financing but now looking for other funding option. The CFO of the company is evaluating different option such as corporate bonds, Private equity, public deposit and securitization to raise capital. He is also looking at the evolving role of financial institution such as investment banks, development banks and insurance companies in providing finance. However, he is concerned about the volatility of the stock market and the risk of inflation affecting company's future cashflow. To address these challenges, the company plan to consult with financial advisors and explore new avenues of funding, including green bonds and venture capital. The CFO must navigate the complex world of financial markets to ensure that the company secures the right funding at the right cost. <b>What would be the main concern for the company if it has to issue green bonds for financing?<\/b>", "options": [{"id": "1", "text": "High interest rate"}, {"id": "2", "text": "Less repayment period"}, {"id": "3", "text": "Limited investor demand due to niche market"}, {"id": "4", "text": "Government restriction"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* Green bonds are specialized financial instruments earmarked specifically for climate or environmental projects.\n* While innovative, they still cater to a niche, environmentally conscious investor base.\n* This narrow focus can limit aggregate demand compared to standard corporate bonds.\n* Limited demand makes it highly challenging for a company to raise massive amounts of capital rapidly.\n**Related Concepts:**\n* Green Finance and ESG Investing.\n* Specialized Debt Instruments.", "id": 100}]};

        marked.setOptions({ breaks: true, gfm: true });

        const mathExtension = {
            name: 'math',
            level: 'inline',
            start(src) { return src.indexOf('$'); },
            tokenizer(src, tokens) {
                const blockRule = /^\$\$(.*?)\$\$/s;
                const inlineRule = /^\$([^$\n]+)\$/;
                let match;
                if ((match = blockRule.exec(src))) {
                    return { type: 'math', raw: match[0], text: match[1], displayMode: true };
                } else if ((match = inlineRule.exec(src))) {
                    return { type: 'math', raw: match[0], text: match[1], displayMode: false };
                }
            },
            renderer(token) {
                const safeText = token.text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                return token.displayMode ? `$$${safeText}$$` : `$${safeText}$`;
            }
        };
        marked.use({ extensions: [mathExtension] });

        const Icons = {
            Menu: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>,
            User: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            Alert: () => <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ef4444" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>,
            Printer: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>,
            Info: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>,
            Pause: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>,
            Play: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        };

        const DonutChart = ({ percentage, color, label }) => (
            <div className="flex flex-col items-center print-break-avoid">
                <svg viewBox="0 0 36 36" className="circular-chart w-28 h-28 mb-3">
                    <path className="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    <path className="circle" stroke={color} strokeDasharray={`${percentage}, 100`} d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    <text x="18" y="20.5" textAnchor="middle" className="text-3xl font-black fill-slate-800" style={{fontSize: "9px"}}>{percentage}%</text>
                </svg>
                <span className="font-bold text-slate-500 uppercase tracking-widest text-xs">{label}</span>
            </div>
        );

        const App = () => {
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [answers, setAnswers] = useState({}); 
            const [status, setStatus] = useState({});   
            const [timeLeft, setTimeLeft] = useState(TEST_DATA.durationMinutes * 60);
            const [isSubmitted, setIsSubmitted] = useState(false);
            const [isPaletteOpen, setIsPaletteOpen] = useState(false);
            const [isPaused, setIsPaused] = useState(false); 
            const [warnings, setWarnings] = useState(0);
            const [showWarning, setShowWarning] = useState(false);

            useEffect(() => {
                if (window.MathJax && window.MathJax.typesetPromise) {
                    window.MathJax.typesetPromise().catch((err) => console.log('MathJax error: ', err));
                }
            });

            useEffect(() => {
                if (!TEST_DATA.strictMode || isSubmitted) return;
                const handleVisibility = () => {
                    if (document.hidden) {
                        setWarnings(w => w + 1);
                        setShowWarning(true);
                    }
                };
                document.addEventListener("visibilitychange", handleVisibility);
                return () => document.removeEventListener("visibilitychange", handleVisibility);
            }, [isSubmitted]);

            useEffect(() => {
                if (isSubmitted || isPaused) return; 
                const timer = setInterval(() => {
                    setTimeLeft(prev => {
                        if (prev <= 0) { handleSubmit(true); return 0; }
                        return prev - 1;
                    });
                }, 1000);
                return () => clearInterval(timer);
            }, [isSubmitted, isPaused]); 

            const formatTime = (seconds) => {
                const h = Math.floor(seconds / 3600);
                const m = Math.floor((seconds % 3600) / 60);
                const s = seconds % 60;
                return `${h > 0 ? h + ':' : ''}${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            };

            const advanceQuestion = () => {
                if (currentQIndex < TEST_DATA.questions.length - 1) {
                    const nextQ = TEST_DATA.questions[currentQIndex + 1];
                    if (status[nextQ.id] === 'not_visited') setStatus(prev => ({ ...prev, [nextQ.id]: 'not_answered' }));
                    setCurrentQIndex(prev => prev + 1);
                }
            };

            const handleOptionSelect = (optId) => {
                if(isPaused) return;
                setAnswers(prev => ({ ...prev, [TEST_DATA.questions[currentQIndex].id]: optId }));
            };

            const handleSaveAndNext = () => {
                if(isPaused) return;
                const cid = TEST_DATA.questions[currentQIndex].id;
                setStatus(prev => ({ ...prev, [cid]: answers[cid] ? 'answered' : 'not_answered' }));
                advanceQuestion();
            };

            const handleMarkForReview = () => {
                if(isPaused) return;
                const cid = TEST_DATA.questions[currentQIndex].id;
                setStatus(prev => ({ ...prev, [cid]: answers[cid] ? 'marked_answered' : 'marked' }));
                advanceQuestion();
            };

            const handleClearResponse = () => {
                if(isPaused) return;
                const cid = TEST_DATA.questions[currentQIndex].id;
                setAnswers(prev => { const newAns = { ...prev }; delete newAns[cid]; return newAns; });
                setStatus(prev => ({ ...prev, [cid]: 'not_answered' }));
            };

            const handlePaletteClick = (index) => {
                if(isPaused) return;
                const cid = TEST_DATA.questions[currentQIndex].id;
                if (status[cid] === 'not_visited' || (status[cid] === 'not_answered' && !answers[cid])) {
                    setStatus(prev => ({ ...prev, [cid]: 'not_answered' }));
                }
                const tid = TEST_DATA.questions[index].id;
                if (status[tid] === 'not_visited') setStatus(prev => ({ ...prev, [tid]: 'not_answered' }));
                setCurrentQIndex(index);
                setIsPaletteOpen(false); 
            };

            const handleSubmit = (auto = false) => {
                if (auto || confirm("Are you sure you want to submit the test? No changes can be made after submission.")) {
                    setIsSubmitted(true);
                    setIsPaused(false);
                }
            };

            const counts = useMemo(() => {
                const c = { answered: 0, not_answered: 0, marked: 0, marked_answered: 0, not_visited: 0 };
                Object.values(status).forEach(s => { if (c[s] !== undefined) c[s]++; });
                return c;
            }, [status]);

            if (isSubmitted) {
                let score = 0, correct = 0, wrong = 0;
                TEST_DATA.questions.forEach(q => {
                    if (answers[q.id] === q.correctAnswer) { score += TEST_DATA.marksForCorrect; correct++; } 
                    else if (answers[q.id]) { score -= TEST_DATA.marksForWrong; wrong++; }
                });

                const attempted = correct + wrong;
                const accuracy = attempted > 0 ? Math.round((correct / attempted) * 100) : 0;
                const percentage = Math.max(0, Math.round((score / TEST_DATA.totalMarks) * 100));
                const isPass = percentage >= TEST_DATA.passPercentage;

                return (
                    <div className="h-full overflow-y-auto p-4 md:p-8 print:p-0 bg-slate-50 print:bg-white print:h-auto print:overflow-visible">
                        <div className="max-w-5xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100 print-border-none print:shadow-none">
                            <div className="bg-blue-600 text-white p-10 relative print:text-slate-900 print:bg-white print:border-b-2 print:border-slate-300 print:p-0 print:mb-8">
                                <div className="absolute top-0 right-0 w-64 h-64 bg-white opacity-5 rounded-full -mt-20 -mr-20 blur-2xl print-hidden"></div>
                                <div className="flex flex-col md:flex-row justify-between items-center gap-6 relative z-10 print:flex-row print:items-start">
                                    <div className="text-center md:text-left">
                                        <h1 className="text-4xl font-extrabold mb-2 tracking-tight">Performance Report</h1>
                                        <p className="opacity-90 font-semibold text-lg">{TEST_DATA.title}</p>
                                        <p className="opacity-70 text-sm mt-1">{TEST_DATA.organization}</p>
                                    </div>
                                    <div className="flex gap-6 items-center">
                                        <div className={`px-6 py-4 rounded-2xl border-2 backdrop-blur-md print:border-2 print:bg-transparent flex items-center justify-between gap-6 min-w-[200px] ${isPass ? 'bg-green-500/20 border-green-400 print:border-green-600 print:text-green-700' : 'bg-red-500/20 border-red-400 print:border-red-600 print:text-red-700'}`}>
                                            <div className="text-left">
                                                <div className="text-[10px] uppercase tracking-widest font-bold opacity-80 mb-0.5">Final Status</div>
                                                <div className="text-2xl font-black leading-none">{isPass ? 'PASSED' : 'FAILED'}</div>
                                            </div>
                                            <div className="text-4xl leading-none">{isPass ? '🎉' : '❌'}</div>
                                        </div>
                                    </div>
                                </div>
                                <button onClick={() => window.print()} className="print-hidden absolute right-6 top-6 bg-white/20 hover:bg-white/30 text-white px-5 py-2.5 rounded-full font-bold transition shadow-lg backdrop-blur-sm flex items-center gap-2">
                                    <Icons.Printer/> Save PDF
                                </button>
                            </div>

                            <div className="p-10 grid grid-cols-1 md:grid-cols-3 gap-8 border-b border-slate-100 bg-slate-50/50 print:bg-white print:border-b-0 print-break-avoid">
                                <DonutChart percentage={percentage} color="#2563eb" label="Score Percentage" />
                                <DonutChart percentage={accuracy} color="#10b981" label="Accuracy" />
                                <div className="flex flex-col justify-center space-y-4">
                                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center print:border-slate-300">
                                        <span className="text-slate-500 font-bold">Total Marks</span>
                                        <span className="text-3xl font-black text-blue-600">{score} <span className="text-lg text-slate-400 font-bold">/ {TEST_DATA.totalMarks}</span></span>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-green-50 p-4 rounded-2xl border border-green-100 text-center print:border-slate-300 print:bg-white">
                                            <div className="text-green-600 text-3xl font-black">{correct}</div>
                                            <div className="text-xs font-bold text-green-700 uppercase mt-1">Correct</div>
                                        </div>
                                        <div className="bg-red-50 p-4 rounded-2xl border border-red-100 text-center print:border-slate-300 print:bg-white">
                                            <div className="text-red-600 text-3xl font-black">{wrong}</div>
                                            <div className="text-xs font-bold text-red-700 uppercase mt-1">Wrong</div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="p-6 md:p-10">
                                <h2 className="text-2xl font-extrabold text-slate-800 mb-8 flex items-center gap-3 border-b border-slate-200 pb-4">
                                    Detailed Solutions
                                </h2>
                                <div className="space-y-8">
                                    {TEST_DATA.questions.map((q, i) => {
                                        const userAns = answers[q.id];
                                        const isCorrect = userAns === q.correctAnswer;
                                        const isSkipped = !userAns;
                                        let borderColor = isCorrect ? 'border-green-500' : (isSkipped ? 'border-slate-300' : 'border-red-500');
                                        let bgClass = isCorrect ? 'bg-green-50/50' : (isSkipped ? 'bg-white' : 'bg-red-50/50');

                                        return (
                                            <div key={q.id} className={`border-l-8 ${borderColor} ${bgClass} p-6 rounded-2xl shadow-sm border border-slate-100 print-break-avoid print:border print:border-l-8 print:shadow-none`}>
                                                <div className="flex gap-4 mb-6">
                                                    <span className="font-black text-slate-400 text-xl">Q{i+1}.</span>
                                                    <div className="flex-1 text-slate-800 markdown-body text-[16px]" dangerouslySetInnerHTML={{ __html: marked.parse(q.question) }}></div>
                                                </div>
                                                <div className="ml-10 space-y-3 mb-6">
                                                    {q.options.map(opt => {
                                                        const isUserOpt = opt.id === userAns;
                                                        const isCorrectOpt = opt.id === q.correctAnswer;
                                                        
                                                        let optClass = "text-slate-600 bg-white border-slate-200";
                                                        let icon = "○";
                                                        if (isCorrectOpt) { optClass = "text-green-800 bg-green-100 border-green-300 font-bold"; icon = "✓"; }
                                                        else if (isUserOpt) { optClass = "text-red-700 bg-red-100 border-red-300 line-through"; icon = "✗"; }

                                                        return (
                                                            <div key={opt.id} className={`flex items-start gap-3 p-3 rounded-xl border ${optClass} print:bg-transparent print:border-slate-300`}>
                                                                <span className="mt-0.5 font-bold">{icon}</span>
                                                                <div className="markdown-body" style={{marginBottom: 0}} dangerouslySetInnerHTML={{ __html: marked.parseInline(opt.text) }}></div>
                                                            </div>
                                                        )
                                                    })}
                                                </div>
                                                {q.explanation && (
                                                    <div className="ml-10 p-5 bg-blue-50/50 rounded-xl border border-blue-100 print:bg-slate-50 print:border-slate-200">
                                                        <strong className="block mb-2 flex items-center gap-2 text-blue-700"><Icons.Info/> Expert Explanation:</strong>
                                                        <div className="markdown-body text-sm text-slate-700" dangerouslySetInnerHTML={{ __html: marked.parse(q.explanation) }}></div>
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            const currentQuestion = TEST_DATA.questions[currentQIndex];

            return (
                <div className="flex flex-col h-full bg-slate-50 relative">
                    {showWarning && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-white p-8 rounded-3xl shadow-2xl max-w-md text-center border-2 border-red-500">
                                <div className="w-20 h-20 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4 animate-bounce"><Icons.Alert /></div>
                                <h2 className="text-2xl font-black text-slate-800 mb-2">Warning Recorded!</h2>
                                <p className="text-slate-600 mb-6 font-medium">You switched tabs or minimized the window. (Warning {warnings})</p>
                                <button onClick={() => setShowWarning(false)} className="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-4 rounded-full shadow-lg transition transform active:scale-95 text-lg">I Understand</button>
                            </div>
                        </div>
                    )}

                    {isPaused && (
                        <div className="fixed inset-0 z-[90] bg-white/80 backdrop-blur-md flex flex-col items-center justify-center p-4">
                            <div className="bg-white p-10 rounded-3xl shadow-2xl border border-slate-200 text-center max-w-sm w-full">
                                <div className="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-6"><Icons.Pause /></div>
                                <h2 className="text-3xl font-black text-slate-800 mb-3">Test Paused</h2>
                                <button onClick={() => setIsPaused(false)} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-full shadow-lg transition transform active:scale-95 flex items-center justify-center gap-3 text-lg">
                                    <Icons.Play /> Resume Test
                                </button>
                            </div>
                        </div>
                    )}

                    <header className="glass-nav border-b border-slate-200 h-20 flex items-center justify-between px-6 z-20 sticky top-0 shadow-sm">
                        <div className="flex items-center gap-4">
                            <div className="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center shadow-lg shadow-blue-600/30 text-white font-black text-xl">E</div>
                            <div className="hidden sm:block">
                                <h1 className="font-extrabold text-lg text-slate-800 leading-tight">{TEST_DATA.organization}</h1>
                                <p className="text-xs text-slate-500 font-medium truncate max-w-[200px]">{TEST_DATA.title}</p>
                            </div>
                        </div>
                        <div className="absolute left-1/2 top-1/2 transform -translate-x-1/2 -translate-y-1/2 flex items-center">
                            <div className="flex items-center bg-white rounded-full border border-slate-200 p-1 shadow-sm overflow-hidden">
                                <div className="px-4 py-1.5 bg-slate-100 rounded-full text-xs font-bold text-slate-500 flex items-center gap-2">
                                    <span className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> LIVE
                                </div>
                                <div className="px-6 font-mono font-black text-xl text-blue-600 tracking-widest">{formatTime(timeLeft)}</div>
                            </div>
                        </div>
                        <div className="flex items-center gap-3">
                            {!isPaused && !isSubmitted && (
                                <button onClick={() => setIsPaused(true)} className="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-600 hover:bg-slate-200 hover:text-blue-600 transition" title="Pause Test"><Icons.Pause /></button>
                            )}
                            <div className="hidden md:flex items-center gap-3 pl-3 border-l border-slate-200">
                                <div className="w-10 h-10 rounded-full bg-gradient-to-r from-blue-400 to-indigo-500 p-0.5 shadow-md">
                                    <div className="w-full h-full bg-white rounded-full flex items-center justify-center text-slate-800"><Icons.User /></div>
                                </div>
                            </div>
                            <button className="md:hidden w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-600" onClick={() => setIsPaletteOpen(!isPaletteOpen)}><Icons.Menu /></button>
                        </div>
                    </header>

                    <div className="flex-1 flex overflow-hidden relative">
                        <div className={`flex-1 flex flex-col w-full transition-all duration-300 ${isPaused ? 'blur-content' : ''}`}>
                            <div className="flex-1 overflow-y-auto p-4 md:p-8 lg:p-12">
                                <div className="max-w-4xl mx-auto bg-white rounded-3xl p-8 shadow-sm border border-slate-100">
                                    <div className="flex justify-between items-center mb-8 pb-4 border-b border-slate-100">
                                        <div className="flex items-center gap-3">
                                            <span className="bg-blue-600 text-white px-5 py-2 rounded-full text-sm font-black shadow-md shadow-blue-600/20">Question {currentQIndex + 1}</span>
                                        </div>
                                        <div className="flex gap-2">
                                            <span className="bg-green-50 text-green-600 px-4 py-1.5 rounded-full text-xs font-bold border border-green-200">+{TEST_DATA.marksForCorrect}</span>
                                            <span className="bg-red-50 text-red-600 px-4 py-1.5 rounded-full text-xs font-bold border border-red-200">-{TEST_DATA.marksForWrong}</span>
                                        </div>
                                    </div>
                                    <div className="text-[17px] text-slate-800 markdown-body mb-8 leading-relaxed" dangerouslySetInnerHTML={{ __html: marked.parse(currentQuestion.question) }}></div>
                                    <div className="space-y-4">
                                        {currentQuestion.options.map(opt => {
                                            const isSelected = answers[currentQuestion.id] === opt.id;
                                            return (
                                                <div key={opt.id} onClick={() => handleOptionSelect(opt.id)} className={`group relative p-5 rounded-2xl cursor-pointer flex items-center gap-5 transition-all duration-200 border-2 ${isSelected ? 'border-blue-600 bg-blue-50/50 shadow-sm option-selected' : 'border-slate-200 hover:border-blue-300 hover:bg-slate-50'}`}>
                                                    <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center flex-shrink-0 custom-radio ${isSelected ? 'border-blue-600 bg-white' : 'border-slate-300 group-hover:border-blue-400'}`}></div>
                                                    <div className="text-slate-700 font-medium markdown-body flex-1 text-[16px]" style={{marginBottom:0}} dangerouslySetInnerHTML={{ __html: marked.parseInline(opt.text) }}></div>
                                                </div>
                                            )
                                        })}
                                    </div>
                                </div>
                            </div>
                            <div className="glass-nav border-t border-slate-200 p-5 md:px-12 flex items-center justify-between z-10">
                                <div className="flex gap-3">
                                    <button onClick={handleMarkForReview} className="px-6 py-3.5 bg-purple-50 text-purple-700 hover:bg-purple-100 rounded-full font-bold text-sm transition border border-purple-200"><span className="hidden md:inline">Mark for Review</span><span className="md:hidden">Review</span></button>
                                    <button onClick={handleClearResponse} className="px-6 py-3.5 bg-slate-100 text-slate-600 hover:bg-slate-200 rounded-full font-bold text-sm transition">Clear</button>
                                </div>
                                <button onClick={handleSaveAndNext} className="px-8 py-3.5 bg-blue-600 hover:bg-blue-700 text-white rounded-full font-black text-sm shadow-lg shadow-blue-600/30 transition transform active:scale-95 flex items-center gap-2">Save & Next <span className="text-xl leading-none">→</span></button>
                            </div>
                        </div>

                        <div className={`absolute inset-y-0 right-0 w-[320px] bg-white shadow-2xl transform transition-transform duration-300 z-30 flex flex-col border-l border-slate-200 ${isPaletteOpen ? 'translate-x-0' : 'translate-x-full'} md:translate-x-0 md:relative`}>
                            <div className="p-5 border-b border-slate-100 flex items-center gap-4 bg-slate-50">
                                <div className="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center text-blue-600"><Icons.User /></div>
                                <div><div className="font-bold text-slate-800">Candidate</div><div className="text-xs text-slate-500">{TEST_DATA.organization} Student</div></div>
                                <button className="ml-auto md:hidden text-slate-400" onClick={() => setIsPaletteOpen(false)}>✕</button>
                            </div>
                            <div className="p-5 grid grid-cols-2 gap-4 text-xs font-semibold border-b border-slate-100">
                                <div className="flex items-center gap-2 text-slate-600"><div className="w-3 h-3 rounded-full bg-[#10b981]"></div> Answered ({counts.answered})</div>
                                <div className="flex items-center gap-2 text-slate-600"><div className="w-3 h-3 rounded-full bg-[#ef4444]"></div> Not Ans ({counts.not_answered})</div>
                                <div className="flex items-center gap-2 text-slate-600"><div className="w-3 h-3 rounded-full bg-[#8b5cf6]"></div> Marked ({counts.marked + counts.marked_answered})</div>
                                <div className="flex items-center gap-2 text-slate-600"><div className="w-3 h-3 rounded-full border-2 border-slate-300 bg-slate-50"></div> Unvisited ({counts.not_visited})</div>
                            </div>
                            <div className="flex-1 overflow-y-auto p-5">
                                <div className="font-bold text-slate-700 mb-4 text-sm">Question Navigation:</div>
                                <div className="grid grid-cols-5 gap-2.5">
                                    {TEST_DATA.questions.map((q, idx) => (
                                        <button key={q.id} onClick={() => handlePaletteClick(idx)} className={`h-11 w-full flex items-center justify-center font-bold text-sm rounded-xl transition shadow-sm border ${currentQIndex === idx ? 'current-question' : 'border-transparent'} status-${status[q.id]}`}>{idx + 1}</button>
                                    ))}
                                </div>
                            </div>
                            <div className="p-5 border-t border-slate-100 bg-white">
                                <button onClick={() => handleSubmit(false)} className="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black py-4 rounded-2xl shadow-lg shadow-emerald-500/20 transition transform active:scale-95 text-lg">Submit Final Test</button>
                            </div>
                        </div>
                    </div>
                    {isPaletteOpen && <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-20 md:hidden" onClick={() => setIsPaletteOpen(false)}></div>}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
