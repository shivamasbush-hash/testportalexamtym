            ],
            correctAnswer: "2",
            explanation: "(A) describes the objective shift (Conservation -> Management). (R) describes the legal nature shift (Criminal -> Civil). Both are true. However, the legal nature (Civil) is not the explanation for the objective shift. The objective shift happened because of Economic Liberalization (1991)."
        },
        {
            id: 29,
            question: "Which of the following sectors is PROHIBITED for FDI in India?",
            options: [
                { id: "1", text: "Tea Plantation" },
                { id: "2", text: "Chit Funds" },
                { id: "3", text: "Defence Industry" },
                { id: "4", text: "Pharmaceuticals" }
            ],
            correctAnswer: "2",
            explanation: "FDI is prohibited in: Chit Funds, Nidhi Companies, Lottery, Gambling/Betting, Real Estate Business (trading), and Manufacturing of Cigars/Tobacco."
        },
        {
            id: 30,
            question: "Match List I with List II regarding Legal Maxims/Concepts in Consumer Protection:\n\nList I (Concept):\n(A) Caveat Emptor\n(B) Caveat Venditor\n(C) Class Action Suit\n(D) Deficiency in Service\n\nList II (Meaning):\n(I) Let the seller beware.\n(II) Let the buyer beware.\n(III) A group of people with the same grievance filing a single suit.\n(IV) Fault, imperfection, shortcoming or inadequacy in quality/nature of service.",
            options: [
                { id: "1", text: "(A)-(I), (B)-(II), (C)-(III), (D)-(IV)" },
                { id: "2", text: "(A)-(II), (B)-(I), (C)-(III), (D)-(IV)" },
                { id: "3", text: "(A)-(II), (B)-(III), (C)-(I), (D)-(IV)" },
                { id: "4", text: "(A)-(I), (B)-(IV), (C)-(III), (D)-(II)" }
            ],
            correctAnswer: "2",
            explanation: "Caveat Emptor = Buyer beware (II). Caveat Venditor = Seller beware (I). Class Action = Group suit (III)."
        }
    ]
};

        // --- ICONS ---
        const Icons = {
            Menu: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>,
            Info: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>,
            User: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            Pause: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>,
            Play: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>,
        };

        // --- MAIN COMPONENT ---
        const App = () => {
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [answers, setAnswers] = useState({}); 
            const [status, setStatus] = useState({});   
            const [timeLeft, setTimeLeft] = useState(TEST_DATA.durationMinutes * 60);
            const [isSubmitted, setIsSubmitted] = useState(false);
            const [isPaletteOpen, setIsPaletteOpen] = useState(false);
            const [isPaused, setIsPaused] = useState(false); 

            // Initialize status
            useEffect(() => {
                const initStatus = {};
                TEST_DATA.questions.forEach((q, i) => {
                    initStatus[q.id] = i === 0 ? 'not_answered' : 'not_visited';
                });
                setStatus(initStatus);
            }, []);

            // Timer with Pause Logic
            useEffect(() => {
                if (isSubmitted || isPaused) return; 
                const timer = setInterval(() => {
                    setTimeLeft(prev => {
                        if (prev <= 0) {
                            handleSubmit();
                            return 0;
                        }
                        return prev - 1;
                    });
                }, 1000);
                return () => clearInterval(timer);
            }, [isSubmitted, isPaused]); 

            const formatTime = (seconds) => {
                const h = Math.floor(seconds / 3600);
                const m = Math.floor((seconds % 3600) / 60);
                const s = seconds % 60;
                return `${h > 0 ? h + ':' : ''}${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            };

            const updateStatus = (qid, newStatus) => {
                setStatus(prev => ({
                    ...prev,
                    [qid]: newStatus
                }));
            };

            const handleOptionSelect = (optId) => {
                if(isPaused) return;
                const currentQ = TEST_DATA.questions[currentQIndex];
                setAnswers(prev => ({ ...prev, [currentQ.id]: optId }));
            };

            const handleSaveAndNext = () => {
                if(isPaused) return;
                const currentQ = TEST_DATA.questions[currentQIndex];
                if (answers[currentQ.id]) {
                    updateStatus(currentQ.id, 'answered');
                } else {
                    updateStatus(currentQ.id, 'not_answered');
                }
                
                if (currentQIndex < TEST_DATA.questions.length - 1) {
                    const nextQ = TEST_DATA.questions[currentQIndex + 1];
                    if (status[nextQ.id] === 'not_visited') {
                         updateStatus(nextQ.id, 'not_answered');
                    }
                    setCurrentQIndex(prev => prev + 1);
                }
            };

            const handleMarkForReview = () => {
                if(isPaused) return;
                const currentQ = TEST_DATA.questions[currentQIndex];
                if (answers[currentQ.id]) {
                    updateStatus(currentQ.id, 'marked_answered');
                } else {
                    updateStatus(currentQ.id, 'marked');
                }
                
                if (currentQIndex < TEST_DATA.questions.length - 1) {
                    const nextQ = TEST_DATA.questions[currentQIndex + 1];
                    if (status[nextQ.id] === 'not_visited') {
                         updateStatus(nextQ.id, 'not_answered');
                    }
                    setCurrentQIndex(prev => prev + 1);
                }
            };

            const handleClearResponse = () => {
                if(isPaused) return;
                const currentQ = TEST_DATA.questions[currentQIndex];
                setAnswers(prev => {
                    const newAns = { ...prev };
                    delete newAns[currentQ.id];
                    return newAns;
                });
                updateStatus(currentQ.id, 'not_answered');
            };

            const handlePaletteClick = (index) => {
                if(isPaused) return;
                const currentQ = TEST_DATA.questions[currentQIndex];
                if (status[currentQ.id] === 'not_visited' || (status[currentQ.id] === 'not_answered' && !answers[currentQ.id])) {
                     updateStatus(currentQ.id, 'not_answered');
                }

                const targetQ = TEST_DATA.questions[index];
                if (status[targetQ.id] === 'not_visited') {
                    updateStatus(targetQ.id, 'not_answered');
                }
                
                setCurrentQIndex(index);
                setIsPaletteOpen(false); 
            };

            const handleSubmit = () => {
                if (confirm("Are you sure you want to submit the test?")) {
                    setIsSubmitted(true);
                    setIsPaused(false); 
                }
            };

            const counts = useMemo(() => {
                const c = { answered: 0, not_answered: 0, marked: 0, marked_answered: 0, not_visited: 0 };
                Object.values(status).forEach(s => {
                    if (c[s] !== undefined) c[s]++;
                });
                return c;
            }, [status]);

            // --- RENDER ---
            
            // RESULT SCREEN
            if (isSubmitted) {
                let score = 0, correct = 0, wrong = 0;
                TEST_DATA.questions.forEach(q => {
                    if (answers[q.id] === q.correctAnswer) {
                        score += TEST_DATA.marksForCorrect;
                        correct++;
                    } else if (answers[q.id]) {
                        score -= TEST_DATA.marksForWrong;
                        wrong++;
                    }
                });

                return (
                    <div className="h-full overflow-y-auto bg-gray-50 p-4 md:p-8">
                        <div className="max-w-4xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden">
                            <div className="bg-blue-600 text-white p-8 text-center">
                                <h1 className="text-3xl font-bold mb-2">Test Result</h1>
                                <p className="opacity-90 font-medium">{TEST_DATA.title}</p>
                            </div>
                            <div className="p-6 grid grid-cols-2 md:grid-cols-4 gap-4 border-b border-gray-100">
                                <div className="text-center p-4 bg-blue-50 rounded-lg">
                                    <div className="text-xs text-gray-500 uppercase font-bold">Total Score</div>
                                    <div className="text-2xl font-bold text-blue-600">{score} <span className="text-sm text-gray-400">/ {TEST_DATA.totalMarks}</span></div>
                                </div>
                                <div className="text-center p-4 bg-green-50 rounded-lg">
                                    <div className="text-xs text-green-700 uppercase font-bold">Correct</div>
                                    <div className="text-2xl font-bold text-green-600">{correct}</div>
                                </div>
                                <div className="text-center p-4 bg-red-50 rounded-lg">
                                    <div className="text-xs text-red-700 uppercase font-bold">Wrong</div>
                                    <div className="text-2xl font-bold text-red-600">{wrong}</div>
                                </div>
                                <div className="text-center p-4 bg-gray-100 rounded-lg">
                                    <div className="text-xs text-gray-600 uppercase font-bold">Attempted</div>
                                    <div className="text-2xl font-bold text-gray-700">{correct + wrong}</div>
                                </div>
                            </div>
                            <div className="p-6 bg-gray-50">
                                <h2 className="text-xl font-bold text-gray-800 mb-4">Detailed Solutions</h2>
                                <div className="space-y-4">
                                    {TEST_DATA.questions.map((q, i) => {
                                        const userAns = answers[q.id];
                                        const isCorrect = userAns === q.correctAnswer;
                                        const isSkipped = !userAns;
                                        let borderColor = isCorrect ? 'border-green-500' : (isSkipped ? 'border-gray-300' : 'border-red-500');
                                        let bgClass = isCorrect ? 'bg-green-50' : (isSkipped ? 'bg-white' : 'bg-red-50');

                                        return (
                                            <div key={q.id} className={`border-l-4 ${borderColor} ${bgClass} p-4 rounded shadow-sm bg-white`}>
                                                <div className="flex gap-2 mb-2">
                                                    <span className="font-bold text-gray-500">Q{i+1}.</span>
                                                    <div className="flex-1 font-medium text-gray-800 whitespace-pre-line">{q.question}</div>
                                                </div>
                                                <div className="ml-6 space-y-1 text-sm mb-3">
                                                    {q.options.map(opt => (
                                                        <div key={opt.id} className={`flex items-center gap-2 ${opt.id === q.correctAnswer ? 'text-green-700 font-bold' : (opt.id === userAns ? 'text-red-600 line-through' : 'text-gray-500')}`}>
                                                            {opt.id === q.correctAnswer ? "✓" : (opt.id === userAns ? "✗" : "○")} {opt.text}
                                                        </div>
                                                    ))}
                                                </div>
                                                <div className="ml-6 p-3 bg-blue-50 text-blue-900 text-sm rounded border border-blue-100">
                                                    <strong className="block mb-1 flex items-center gap-2"><Icons.Info/> Explanation:</strong>
                                                    <div className="whitespace-pre-line">{q.explanation}</div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            const currentQuestion = TEST_DATA.questions[currentQIndex];

            // 2. TEST INTERFACE
            return (
                <div className="flex flex-col h-full">
                    {/* Header */}
                    <header className="bg-blue-600 text-white h-16 flex items-center justify-between px-4 shadow z-20 relative">
                        {/* Left: Title & Org */}
                        <div className="flex flex-col">
                            <h1 className="font-bold text-lg leading-none">{TEST_DATA.organization}</h1>
                            <p className="text-xs opacity-90 font-medium mt-1 truncate max-w-[150px] md:max-w-md">{TEST_DATA.title}</p>
                        </div>

                        {/* Center: Marks Indicator (Absolute on desktop to be true center) */}
                        <div className="hidden md:flex absolute left-1/2 top-1/2 transform -translate-x-1/2 -translate-y-1/2 items-center gap-6 bg-blue-700/50 px-6 py-1.5 rounded-full border border-blue-400/30">
                            <div className="flex items-center gap-2">
                                <div className="w-8 h-8 rounded-full bg-green-500 border-2 border-white flex items-center justify-center font-bold shadow-sm">+2</div>
                                <span className="text-xs font-semibold uppercase tracking-wider opacity-80">Correct</span>
                            </div>
                            <div className="flex items-center gap-2">
                                <div className="w-8 h-8 rounded-full bg-red-500 border-2 border-white flex items-center justify-center font-bold shadow-sm">0</div>
                                <span className="text-xs font-semibold uppercase tracking-wider opacity-80">Negative</span>
                            </div>
                        </div>

                        {/* Right: Timer & Controls */}
                        <div className="flex items-center gap-3">
                            {/* Timer */}
                            <div className={`flex items-center gap-2 px-3 py-1.5 rounded-md border border-white/20 transition-colors ${isPaused ? 'bg-yellow-500 text-black border-yellow-600' : 'bg-blue-700'}`}>
                                <span className="text-xs uppercase font-bold opacity-70 hidden sm:inline">Time Left</span>
                                <span className="font-mono font-bold text-xl">{formatTime(timeLeft)}</span>
                            </div>

                            {/* Pause Button */}
                            {!isPaused && !isSubmitted && (
                                <button 
                                    onClick={() => setIsPaused(true)}
                                    className="bg-white/10 hover:bg-white/20 text-white p-2 rounded-md transition border border-transparent hover:border-white/30"
                                    title="Pause Test"
                                >
                                    <Icons.Pause />
                                </button>
                            )}

                            {/* Mobile Menu Toggle */}
                            <button className="md:hidden ml-1" onClick={() => setIsPaletteOpen(!isPaletteOpen)}>
                                <Icons.Menu />
                            </button>
                        </div>
                    </header>

                    {/* Main Body */}
                    <div className="flex-1 flex overflow-hidden relative">
                        
                        {/* Pause Overlay */}
                        {isPaused && (
                            <div className="absolute inset-0 z-50 bg-white/80 backdrop-blur-sm flex flex-col items-center justify-center p-4">
                                <div className="bg-white p-8 rounded-2xl shadow-2xl border border-gray-200 text-center max-w-sm w-full">
                                    <div className="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
                                        <Icons.Pause />
                                    </div>
                                    <h2 className="text-2xl font-bold text-gray-800 mb-2">Test Paused</h2>
                                    <p className="text-gray-500 mb-6">The timer has been stopped. Click Resume to continue your attempt.</p>
                                    <button 
                                        onClick={() => setIsPaused(false)}
                                        className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg transition transform active:scale-95 flex items-center justify-center gap-2"
                                    >
                                        <Icons.Play /> Resume Test
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* Question Area (Left) - Blurred when paused */}
                        <div className={`flex-1 flex flex-col bg-white w-full transition-all duration-300 ${isPaused ? 'blur-content' : ''}`}>
                            {/* Question Content */}
                            <div className="flex-1 overflow-y-auto p-4 md:p-8">
                                <div className="max-w-4xl mx-auto">
                                    <div className="flex gap-4 mb-6">
                                        <span className="font-bold text-lg text-gray-500 pt-1">Q{currentQIndex + 1}.</span>
                                        <div className="text-lg font-medium text-gray-800 leading-relaxed whitespace-pre-line">
                                            {currentQuestion.question}
                                        </div>
                                    </div>

                                    <div className="space-y-3 ml-0 md:ml-10">
                                        {currentQuestion.options.map(opt => (
                                            <div 
                                                key={opt.id}
                                                onClick={() => handleOptionSelect(opt.id)}
                                                className={`p-3 md:p-4 border-2 rounded-lg cursor-pointer flex items-start gap-3 transition-all hover:bg-gray-50 ${answers[currentQuestion.id] === opt.id ? 'border-blue-600 bg-blue-50' : 'border-gray-200'}`}
                                            >
                                                <div className={`mt-0.5 w-5 h-5 rounded-full border-2 flex items-center justify-center flex-shrink-0 ${answers[currentQuestion.id] === opt.id ? 'border-blue-600' : 'border-gray-400'}`}>
                                                    {answers[currentQuestion.id] === opt.id && <div className="w-2.5 h-2.5 bg-blue-600 rounded-full"></div>}
                                                </div>
                                                <span className="text-gray-700">{opt.text}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            {/* Footer Buttons */}
                            <div className="h-16 bg-white border-t flex items-center justify-between px-4 md:px-8 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-10">
                                <div className="flex gap-2">
                                    <button onClick={handleMarkForReview} className="px-3 py-2 md:px-4 md:py-2 bg-purple-600 hover:bg-purple-700 text-white rounded font-medium text-xs md:text-sm transition">
                                        <span className="hidden md:inline">Mark for Review & Next</span>
                                        <span className="md:hidden">Review</span>
                                    </button>
                                    <button onClick={handleClearResponse} className="px-3 py-2 md:px-4 md:py-2 border border-gray-300 text-gray-600 rounded hover:bg-gray-100 font-medium text-xs md:text-sm transition">
                                        <span className="hidden md:inline">Clear Response</span>
                                        <span className="md:hidden">Clear</span>
                                    </button>
                                </div>
                                <button onClick={handleSaveAndNext} className="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded font-bold text-sm md:text-base shadow-md transition transform active:scale-95">
                                    Save & Next
                                </button>
                            </div>
                        </div>

                        {/* Palette Sidebar (Right) */}
                        <div className={`absolute inset-y-0 right-0 w-80 bg-white shadow-2xl transform transition-transform duration-300 z-30 flex flex-col border-l ${isPaletteOpen ? 'translate-x-0' : 'translate-x-full'} md:translate-x-0 md:relative`}>
                            
                            {/* User Info */}
                            <div className="bg-blue-50 p-4 border-b flex items-center gap-3">
                                <div className="w-10 h-10 bg-gray-300 rounded-full flex items-center justify-center text-gray-600"><Icons.User /></div>
                                <div>
                                    <div className="font-bold text-sm text-gray-800">Candidate Name</div>
                                    <div className="text-xs text-gray-500">ExamTym Student</div>
                                </div>
                                <button className="ml-auto md:hidden" onClick={() => setIsPaletteOpen(false)}>✕</button>
                            </div>

                            {/* Legend */}
                            <div className="p-3 grid grid-cols-2 gap-2 text-xs bg-white border-b">
                                <div className="flex items-center gap-2"><div className="w-4 h-4 rounded status-answered flex items-center justify-center"></div> Answered</div>
                                <div className="flex items-center gap-2"><div className="w-4 h-4 rounded status-not_answered flex items-center justify-center"></div> Not Answered</div>
                                <div className="flex items-center gap-2"><div className="w-4 h-4 rounded status-not_visited border flex items-center justify-center"></div> Not Visited</div>
                                <div className="flex items-center gap-2"><div className="w-4 h-4 rounded status-marked flex items-center justify-center"></div> Marked for Review</div>
                                <div className="flex items-center gap-2 col-span-2"><div className="w-4 h-4 rounded status-marked_answered flex items-center justify-center"></div> Ans & Marked for Review (Evaluated)</div>
                            </div>

                            {/* Counts */}
                            <div className="bg-gray-100 p-2 grid grid-cols-4 gap-1 text-center text-xs border-b">
                                <div className="bg-green-100 text-green-800 rounded p-1"><strong>{counts.answered}</strong><br/>Ans</div>
                                <div className="bg-red-100 text-red-800 rounded p-1"><strong>{counts.not_answered}</strong><br/>Not Ans</div>
                                <div className="bg-purple-100 text-purple-800 rounded p-1"><strong>{counts.marked + counts.marked_answered}</strong><br/>Marked</div>
                                <div className="bg-white text-gray-600 border rounded p-1"><strong>{counts.not_visited}</strong><br/>Visit</div>
                            </div>

                            {/* Grid */}
                            <div className="flex-1 overflow-y-auto p-4 content-start">
                                <div className="font-bold text-gray-700 mb-2 text-sm">Choose a Question:</div>
                                <div className="grid grid-cols-4 gap-2">
                                    {TEST_DATA.questions.map((q, idx) => (
                                        <button 
                                            key={q.id}
                                            onClick={() => handlePaletteClick(idx)}
                                            className={`h-9 w-full flex items-center justify-center font-semibold text-sm border rounded hover:opacity-80 transition ${currentQIndex === idx ? 'current-question' : ''} status-${status[q.id]}`}
                                        >
                                            {idx + 1}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* Submit Button */}
                            <div className="p-4 border-t bg-gray-50">
                                <button onClick={handleSubmit} className="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded shadow transition transform active:scale-95">
                                    Submit Test
                                </button>
                            </div>
                        </div>

                    </div>
                    
                    {/* Mobile Overlay */}
                    {isPaletteOpen && <div className="fixed inset-0 bg-black/50 z-20 md:hidden" onClick={() => setIsPaletteOpen(false)}></div>}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
