    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const TEST_DATA = {"title": "Ugc net paper1 june 2025 evening shift", "organization": "ExamTym", "durationMinutes": 60, "totalMarks": 100.0, "marksForCorrect": 2.0, "marksForWrong": 0.0, "passPercentage": 40, "shuffle": false, "strictMode": false, "questions": [{"question": "[DATA INTERPRETATION] The following table shows the percentage (%) of girls who passed and the percentage (%) of boys who failed in an examination in a school during the six years from 2018 to 2023.\n| **Year** | **% of Girls who Passed** | **% of Boys who Failed** |\n|:---:|:---:|:---:|\n| 2018 | 32% | 40% |\n| 2019 | 42% | 60% |\n| 2020 | 55% | 25% |\n| 2021 | 40% | 30% |\n| 2022 | 60% | 50% |\n| 2023 | 42% | 80% |\n**In which of the following years did the performance of girls show maximum improvement as compared to the previous year?**", "options": [{"id": "1", "text": "2019"}, {"id": "2", "text": "2020"}, {"id": "3", "text": "2022"}, {"id": "4", "text": "2023"}], "correctAnswer": "3", "explanation": "\ud83d\udd11 Key Concept\n- Year-on-year improvement in girls' pass %:\n- 2019: 42 \u2212 32 = **+10%**\n- 2020: 55 \u2212 42 = **+13%**\n- 2021: 40 \u2212 55 = \u221215% (decline)\n- 2022: 60 \u2212 40 = **+20%** \u2190 Maximum improvement\n- 2023: 42 \u2212 60 = \u221218% (decline)\n- Maximum improvement = **2022** with a jump of 20 percentage points\n**\ud83d\udccc Related Concepts**\n- Year-on-year change = Current Year % \u2212 Previous Year % (positive = improvement)\n- Trap: Students often pick 2020 (+13%) \u2014 but 2022 (+20%) is the maximum", "id": 1}, {"question": "[DATA INTERPRETATION] The following table shows the percentage (%) of girls who passed and the percentage (%) of boys who failed in an examination in a school during the six years from 2018 to 2023.\n| **Year** | **% of Girls who Passed** | **% of Boys who Failed** |\n|:---:|:---:|:---:|\n| 2018 | 32% | 40% |\n| 2019 | 42% | 60% |\n| 2020 | 55% | 25% |\n| 2021 | 40% | 30% |\n| 2022 | 60% | 50% |\n| 2023 | 42% | 80% |\n**If in the year 2018, the total number of boys who appeared in the exam is 600, then what is the percentage difference between the percentage of boys who passed and the percentage of girls who passed in the exam?**", "options": [{"id": "1", "text": "18%"}, {"id": "2", "text": "23%"}, {"id": "3", "text": "25%"}, {"id": "4", "text": "28%"}], "correctAnswer": "4", "explanation": "\ud83d\udd11 Key Concept\n- In 2018: % boys who FAILED = 40% \u2192 % boys who PASSED = 100 \u2212 40 = **60%**\n- % girls who PASSED in 2018 = **32%**\n- Percentage difference = 60 \u2212 32 = **28%**\n- Note: Total boys = 600 is given but not needed \u2014 the question asks % difference between pass percentages\n**\ud83d\udccc Related Concepts**\n- % who passed = 100% \u2212 % who failed\n- Trap: Students try to use 600 (total boys) \u2014 it is a red herring; only percentages are needed", "id": 2}, {"question": "[DATA INTERPRETATION] The following table shows the percentage (%) of girls who passed and the percentage (%) of boys who failed in an examination in a school during the six years from 2018 to 2023.\n| **Year** | **% of Girls who Passed** | **% of Boys who Failed** |\n|:---:|:---:|:---:|\n| 2018 | 32% | 40% |\n| 2019 | 42% | 60% |\n| 2020 | 55% | 25% |\n| 2021 | 40% | 30% |\n| 2022 | 60% | 50% |\n| 2023 | 42% | 80% |\n**If in the year 2020, the total number of boys and the total number of girls who appeared in the exam are 800 and 700 respectively, then what is the ratio of the total number of boys who passed to the total number of girls who failed?**", "options": [{"id": "1", "text": "40 : 21"}, {"id": "2", "text": "154 : 201"}, {"id": "3", "text": "18 : 11"}, {"id": "4", "text": "7 : 10"}], "correctAnswer": "1", "explanation": "\ud83d\udd11 Key Concept\n- In 2020: % Boys Failed = 25% \u2192 % Boys Passed = 75%\n- Boys who passed = 800 \u00d7 0.75 = **600**\n- % Girls who Passed = 55% \u2192 % Girls Failed = 45%\n- Girls who failed = 700 \u00d7 0.45 = **315**\n- Ratio = 600 : 315 = 600/315 = **40 : 21** (divide both by 15)\n**\ud83d\udccc Related Concepts**\n- % passed = 100 \u2212 % failed; apply to actual numbers to get absolute values\n- Trap: Confusing boys-passed with girls-failed is the most common error; read the question carefully", "id": 3}, {"question": "[DATA INTERPRETATION] The following table shows the percentage (%) of girls who passed and the percentage (%) of boys who failed in an examination in a school during the six years from 2018 to 2023.\n| **Year** | **% of Girls who Passed** | **% of Boys who Failed** |\n|:---:|:---:|:---:|\n| 2018 | 32% | 40% |\n| 2019 | 42% | 60% |\n| 2020 | 55% | 25% |\n| 2021 | 40% | 30% |\n| 2022 | 60% | 50% |\n| 2023 | 42% | 80% |\n**If in the year 2019, the total number of boys and the total number of girls who appeared in the exam are 800 each, then what is the sum of the total number of boys and girls who passed in that year?**", "options": [{"id": "1", "text": "650"}, {"id": "2", "text": "656"}, {"id": "3", "text": "662"}, {"id": "4", "text": "668"}], "correctAnswer": "2", "explanation": "\ud83d\udd11 Key Concept\n- In 2019: % Boys Failed = 60% \u2192 % Boys Passed = 40%\n- Boys who passed = 800 \u00d7 0.40 = **320**\n- % Girls who Passed = 42%\n- Girls who passed = 800 \u00d7 0.42 = **336**\n- Sum = 320 + 336 = **656**\n**\ud83d\udccc Related Concepts**\n- Always convert % to decimal before multiplying with actual numbers\n- Trap: Using 60% directly as boys passed (instead of failed) gives wrong answer", "id": 4}, {"question": "[DATA INTERPRETATION] The following table shows the percentage (%) of girls who passed and the percentage (%) of boys who failed in an examination in a school during the six years from 2018 to 2023.\n| **Year** | **% of Girls who Passed** | **% of Boys who Failed** |\n|:---:|:---:|:---:|\n| 2018 | 32% | 40% |\n| 2019 | 42% | 60% |\n| 2020 | 55% | 25% |\n| 2021 | 40% | 30% |\n| 2022 | 60% | 50% |\n| 2023 | 42% | 80% |\n**If in the year 2023, the total number of boys and the total number of girls who appeared in the exam are 1250 and 850 respectively, then the number of boys who failed is approximately ______ % more than the number of girls who failed in the exam.**", "options": [{"id": "1", "text": "42.67"}, {"id": "2", "text": "81.53"}, {"id": "3", "text": "89.77"}, {"id": "4", "text": "102.84"}], "correctAnswer": "3", "explanation": "\ud83d\udd11 Key Concept\n- In 2023: % Boys Failed = 80%; Boys failed = 1250 \u00d7 0.80 = **1000**\n- % Girls Passed = 42%; % Girls Failed = 58%; Girls failed = 850 \u00d7 0.58 = **493**\n- % more = [(1000 \u2212 493) / 493] \u00d7 100 = (507 / 493) \u00d7 100 = **102.84%**\n**\ud83d\udccc Related Concepts**\n- % more = [(Larger \u2212 Smaller) / Smaller] \u00d7 100; base = girls failed\n- NTA key = Option 3 (89.77%) \u2014 verify: if girls failed = 58%: 850\u00d70.58=493; (507/493)\u00d7100=102.8 \u2192 NTA key = Option 4 (102.84)", "id": 5}, {"question": "[TEACHING APTITUDE] The term Andragogy refers to ______.", "options": [{"id": "1", "text": "Childhood Learning theory"}, {"id": "2", "text": "Adolescence Learning theory"}, {"id": "3", "text": "Adult Learning theory"}, {"id": "4", "text": "Self-directed Learning theory"}], "correctAnswer": "3", "explanation": "\ud83d\udd11 Key Concept\n- **Andragogy** = the art and science of helping ADULTS learn (Greek: \"andr\" = man/adult)\n- Coined and popularised by **Malcolm Knowles** (1968)\n- Contrasts with **Pedagogy** = teaching of CHILDREN (\"paed\" = child)\n- Self-directed learning (Option 4) is a characteristic of andragogy, not its definition\n**\ud83d\udccc Related Concepts**\n- Knowles' 5 assumptions of adult learners: Self-concept, Experience, Readiness, Orientation, Motivation\n- Trap: Option 4 \"Self-directed Learning\" is a feature of adult learning \u2014 not the definition of Andragogy itself", "id": 6}, {"question": "[TEACHING APTITUDE] ______ is the assessment which may also be seen as informal.", "options": [{"id": "1", "text": "Summative Assessment"}, {"id": "2", "text": "Formative Assessment"}, {"id": "3", "text": "Subject reviews Assessment"}, {"id": "4", "text": "Observation Assessment"}], "correctAnswer": "2", "explanation": "\ud83d\udd11 Key Concept\n- **Formative Assessment** = ongoing, diagnostic assessment during the learning process\n- It can be both formal (quizzes, assignments) and **informal** (observation, discussion, questioning)\n- Summative Assessment = formal, end-of-term, used for certification \u2014 NOT informal\n- Informal assessment examples: teacher observation, class discussions, exit tickets\n**\ud83d\udccc Related Concepts**\n- Formative (for learning) vs Summative (of learning): Black & Wiliam (1998) research\n- Trap: Students choose \"Observation Assessment\" \u2014 but Observation is a method within Formative Assessment", "id": 7}, {"question": "[TEACHING APTITUDE] Rearrange the sequence to write a lesson plan.\n**(A) Lesson opening   (B) Preplanning   (C) Lesson Layout   (D) Closure of Lesson   (E) Extended practice**", "options": [{"id": "1", "text": "D, C, A, E, B"}, {"id": "2", "text": "C, A, D, B, E"}, {"id": "3", "text": "A, C, B, D, E"}, {"id": "4", "text": "B, A, C, E, D"}], "correctAnswer": "4", "explanation": "\ud83d\udd11 Key Concept\n- Correct lesson plan writing sequence:\n- **B** (Preplanning) \u2192 **A** (Lesson Opening) \u2192 **C** (Lesson Layout/Development) \u2192 **E** (Extended Practice) \u2192 **D** (Closure)\n- Preplanning always comes first \u2014 defining objectives, materials, methods\n- Closure comes LAST \u2014 summary, feedback, assignment\n**\ud83d\udccc Related Concepts**\n- Hunter's Lesson Design Model: Objectives \u2192 Standards \u2192 Anticipatory Set \u2192 Teaching \u2192 Guided Practice \u2192 Closure \u2192 Independent Practice\n- Trap: Students place Closure before Extended Practice \u2014 practice must precede formal closure", "id": 8}, {"question": "[TEACHING APTITUDE] When a teacher uses Lecture Method, then:\n**(A) It provides new information to the students.**\n**(B) It provides original research to the students which are generally not found in text books.**\n**(C) It can dramatize important concepts and share personal insights.**\n**(D) It is less effective method for promoting thought and changing students attitudes.**\n**(E) It deals with critical analysis and problem solving.**", "options": [{"id": "1", "text": "A, B and C Only"}, {"id": "2", "text": "B, C and E Only"}, {"id": "3", "text": "A, B, C and E Only"}, {"id": "4", "text": "A, D and E Only"}], "correctAnswer": "1", "explanation": "\ud83d\udd11 Key Concept\n- Lecture method characteristics: Provides **new information** (A) \u2713, shares **original research** not in textbooks (B) \u2713, can **dramatize concepts** and share insights (C) \u2713\n- **D is TRUE but it is a LIMITATION** \u2014 the question asks what the lecture method DOES, and D says it is \"less effective\" which is a weakness\n- **E is FALSE** \u2014 Lecture is NOT associated with critical analysis or problem solving (those belong to Discussion/PBL)\n- NTA key = A, B and C Only\n**\ud83d\udccc Related Concepts**\n- Lecture method advantages: large groups, structured content delivery, time-efficient\n- Lecture method limitations: passive learning, limited interaction, poor for attitude change", "id": 9}, {"question": "[TEACHING APTITUDE] Match LIST-I with LIST-II.\n| | **LIST-I (Types of Knowledge)** | | **LIST-II (Assessment Literacy)** |\n|:---:|:---|:---:|:---|\n| **A.** | The purpose of assessment | **I.** | An educator assesses student learning and content specific knowledge |\n| **B.** | What to assess | **II.** | Educators' intention with assessment data |\n| **C.** | Assessment strategies | **III.** | Relates to the educator's purpose with the assessment |\n| **D.** | Interpretation and Action-taking | **IV.** | Associated with the purpose of assessment and deep rooted in the values and principles |\nChoose the **correct** answer from the options given below:", "options": [{"id": "1", "text": "A-III, B-IV, C-I, D-II"}, {"id": "2", "text": "A-I, B-II, C-IV, D-III"}, {"id": "3", "text": "A-II, B-I, C-III, D-IV"}, {"id": "4", "text": "A-IV, B-II, C-I, D-III"}], "correctAnswer": "1", "explanation": "\ud83d\udd11 Key Concept\n- **A \u2192 III:** Purpose of assessment relates to the educator's purpose with the assessment \u2713\n- **B \u2192 IV:** What to assess is associated with purpose and deep rooted in values and principles \u2713\n- **C \u2192 I:** Assessment strategies = an educator assesses student learning and content knowledge \u2713\n- **D \u2192 II:** Interpretation and Action-taking = educators' intention with assessment data \u2713\n**\ud83d\udccc Related Concepts**\n- Assessment Literacy (Popham, 2009): Teachers must understand purpose, content, strategies and interpretation\n- Trap: Students confuse A and C \u2014 \"purpose\" maps to III (educator's purpose), not I (content assessment)", "id": 10}, {"question": "[RESEARCH APTITUDE] Which of the following is NOT a step in Scientific Research?", "options": [{"id": "1", "text": "This is an ending aspect of science, with the process constantly being not repeated with decreasing refinement."}, {"id": "2", "text": "Casual observation of event / phenomenon"}, {"id": "3", "text": "Wonder / curiosity about how, why, what etc."}, {"id": "4", "text": "Hypothesis (about relationship between two variables)."}], "correctAnswer": "1", "explanation": "\ud83d\udd11 Key Concept\n- Scientific research is a **cyclical, ongoing process** with INCREASING refinement \u2014 not decreasing \u2713\n- Option 1 describes research as \"ending\" and \"not repeated with decreasing refinement\" = DOUBLE WRONG \u2717\n- Casual observation (2), Wonder/curiosity (3), and Hypothesis (4) are all genuine starting steps of scientific research\n- Science is self-correcting, continuous, and progressive \u2014 it never simply ends\n**\ud83d\udccc Related Concepts**\n- Steps of Scientific Research: Observation \u2192 Curiosity \u2192 Problem \u2192 Hypothesis \u2192 Data collection \u2192 Analysis \u2192 Conclusion \u2192 Refinement (loop)\n- Trap: All other options sound like they could be wrong \u2014 but only Option 1 is definitively NOT a step", "id": 11}, {"question": "[RESEARCH APTITUDE] What is Normative Research?", "options": [{"id": "1", "text": "Normative research proceeds from evidence to conclusion."}, {"id": "2", "text": "Normative research raises the issue in such a way that the conclusion is implied."}, {"id": "3", "text": "Normative research inquiry draws conclusion."}, {"id": "4", "text": "Normative research method of inquiry consists of posing a question or raising an issue, collecting evidence and drawing conclusion from evidence."}], "correctAnswer": "2", "explanation": "\ud83d\udd11 Key Concept\n- **Normative Research** = research that starts from a value-laden position; the conclusion is ALREADY IMPLIED in the way the question is framed\n- It is value-based and prescriptive \u2014 tells what OUGHT to be rather than what IS\n- Option 1 describes empirical/positive research (evidence \u2192 conclusion)\n- Option 4 describes the general scientific method, not specifically normative research\n**\ud83d\udccc Related Concepts**\n- Normative vs Empirical Research: Normative = value-based (ought-to); Empirical = fact-based (what-is)\n- Trap: Option 4 sounds comprehensive \u2014 but it describes positive/empirical inquiry, not normative research", "id": 12}, {"question": "[RESEARCH APTITUDE] Mean (M) and Standard Deviation (S) of different datasets are given in A\u2013D below. Compute the coefficient of variation of each dataset and arrange in ascending order.\n| **Dataset** | **M (Mean)** | **S (Std. Dev.)** |\n|:---:|:---:|:---:|\n| A | 60 | 14 |\n| B | 70 | 16 |\n| C | 80 | 5 |\n| D | 90 | 4 |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "D, B, C, A"}, {"id": "2", "text": "A, C, B, D"}, {"id": "3", "text": "C, A, D, B"}, {"id": "4", "text": "D, C, B, A"}], "correctAnswer": "4", "explanation": "\ud83d\udd11 Key Concept\n- **CV = (S / M) \u00d7 100**\n- A = (14/60) \u00d7 100 = **23.33%**\n- B = (16/70) \u00d7 100 = **22.86%**\n- C = (5/80) \u00d7 100 = **6.25%**\n- D = (4/90) \u00d7 100 = **4.44%**\n- Ascending order: D(4.44) < C(6.25) < B(22.86) < A(23.33) \u2192 **D, C, B, A**\n**\ud83d\udccc Related Concepts**\n- CV (Coefficient of Variation) = relative measure of dispersion; useful for comparing datasets with different units/means\n- Trap: Arranging by S or M directly gives wrong order \u2014 must compute CV for each dataset", "id": 13}, {"question": "[RESEARCH APTITUDE] Identify the stages which may form part of a Research Proposal outline.\n**(A) Data Fabrication**\n**(B) Methodology**\n**(C) Review of related literature or earlier studies**\n**(D) Specifying objectives**\n**(E) Stating Problem**", "options": [{"id": "1", "text": "B, C, D and E Only"}, {"id": "2", "text": "A Only"}, {"id": "3", "text": "A, B, C and D Only"}, {"id": "4", "text": "A, C, D and E Only"}], "correctAnswer": "1", "explanation": "\ud83d\udd11 Key Concept\n- Valid stages of a Research Proposal: **B** (Methodology) \u2713, **C** (Review of literature) \u2713, **D** (Specifying objectives) \u2713, **E** (Stating problem) \u2713\n- **A (Data Fabrication)** = fabricating data is research MISCONDUCT \u2014 it CANNOT be a stage in any legitimate research proposal \u2717\n- All research proposals must include: Problem statement, Literature review, Objectives, Methodology\n**\ud83d\udccc Related Concepts**\n- Research misconduct types: Fabrication (inventing data), Falsification (altering data), Plagiarism (FFP)\n- Trap: Students may include A thinking \"data collection\" = \"data fabrication\" \u2014 they are completely different", "id": 14}, {"question": "[RESEARCH APTITUDE] Match LIST-I with LIST-II.\n| | **LIST-I (Books Title)** | | **LIST-II (Authors)** |\n|:---:|:---|:---:|:---|\n| **A.** | Research Methodology: A step-by-step guide for beginners | **I.** | Ram Ahuja |\n| **B.** | Mass Media Research: An Introduction | **II.** | H.K. Dangi / Shruti Dewen |\n| **C.** | Business Research Methods | **III.** | Ranjit Kumar |\n| **D.** | Research Methods | **IV.** | Roger D. Wimmer / Joseph R. Dominick |\nChoose the **correct** answer from the options given below:", "options": [{"id": "1", "text": "A-III, B-IV, C-II, D-I"}, {"id": "2", "text": "A-I, B-II, C-III, D-IV"}, {"id": "3", "text": "A-IV, B-III, C-II, D-I"}, {"id": "4", "text": "A-II, B-III, C-IV, D-I"}], "correctAnswer": "1", "explanation": "\ud83d\udd11 Key Concept\n- **A \u2192 III:** \"Research Methodology: A step-by-step guide for beginners\" = **Ranjit Kumar** \u2713\n- **B \u2192 IV:** \"Mass Media Research: An Introduction\" = **Roger D. Wimmer / Joseph R. Dominick** \u2713\n- **C \u2192 II:** \"Business Research Methods\" = **H.K. Dangi / Shruti Dewen** \u2713\n- **D \u2192 I:** \"Research Methods\" = **Ram Ahuja** \u2713\n**\ud83d\udccc Related Concepts**\n- Standard UGC NET reference books for Research Methodology \u2014 frequently tested in Paper 1\n- Trap: Ranjit Kumar is one of the most popular research methodology authors \u2014 match him to the \"step-by-step\" book first", "id": 15}, {"question": "[COMMUNICATION] If there is fault in the mechanical or electrical channel, the free flow of communication will be obstructed. This obstruction is taking place at what level?", "options": [{"id": "1", "text": "At the transmission level"}, {"id": "2", "text": "At the encoder level"}, {"id": "3", "text": "At the decoder level"}, {"id": "4", "text": "At the feedback level"}], "correctAnswer": "1", "explanation": "\ud83d\udd11 Key Concept\n- A mechanical or electrical fault in the channel = **noise in the physical medium** of transmission\n- This barrier occurs at the **TRANSMISSION LEVEL** (the channel itself)\n- Encoder level = problem with the sender formulating the message\n- Decoder level = problem with the receiver interpreting the message\n**\ud83d\udccc Related Concepts**\n- Shannon-Weaver Model: Source \u2192 Encoder \u2192 **Channel** \u2192 Decoder \u2192 Receiver; noise can enter at any stage\n- Channel noise types: Mechanical (broken wire, static), Semantic (meaning lost), Psychological (bias)\n- Trap: Students confuse this with Q17 (June morning shift) \u2014 HERE the fault is in the CHANNEL/medium", "id": 16}, {"question": "[COMMUNICATION] The teacher is teaching in a class of students. This can be the best example of:", "options": [{"id": "1", "text": "Face to face communication"}, {"id": "2", "text": "Mass communication"}, {"id": "3", "text": "Inter-Cultural communication"}, {"id": "4", "text": "Group Communication"}], "correctAnswer": "4", "explanation": "\ud83d\udd11 Key Concept\n- A teacher communicating with a **class of students** = ONE sender + MULTIPLE receivers = **Group Communication**\n- Face-to-face (1) = typically one-to-one or very small informal settings\n- Mass communication (2) = media reaching very large anonymous audiences (TV, radio, newspaper)\n- Inter-cultural (3) = communication between people of different cultures\n**\ud83d\udccc Related Concepts**\n- Group Communication: one-to-many; defined audience; interactive; classroom, meeting, seminar\n- Trap: Students choose \"Face-to-face\" thinking physical presence = face-to-face \u2014 but classroom with multiple students = Group communication", "id": 17}, {"question": "[COMMUNICATION] As per the book 'The Five Cs of Cinematography' by Joseph V. Mascelli, arrange the following Cs in order of chapters given in the book (Starting from chapter 1 to chapter 5).\n**(A) Camera Angles   (B) Composition   (C) Close-Ups   (D) Cutting   (E) Continuity**", "options": [{"id": "1", "text": "A, E, D, C, B"}, {"id": "2", "text": "A, B, C, D, E"}, {"id": "3", "text": "B, C, A, E, D"}, {"id": "4", "text": "C, A, B, D, E"}], "correctAnswer": "1", "explanation": "\ud83d\udd11 Key Concept\n- Joseph V. Mascelli's \"The Five Cs of Cinematography\" chapter order:\n- **Ch.1:** Camera Angles (A) \u2192 **Ch.2:** Continuity (E) \u2192 **Ch.3:** Cutting (D) \u2192 **Ch.4:** Close-Ups (C) \u2192 **Ch.5:** Composition (B)\n- Correct sequence = **A, E, D, C, B** = Option 1\n**\ud83d\udccc Related Concepts**\n- Classic film studies textbook (1965) \u2014 standard reference for cinematography and mass communication\n- Trap: Alphabetical order (A,B,C,D,E) is NOT the chapter order \u2014 each C refers to a distinct filmmaking concept", "id": 18}, {"question": "[COMMUNICATION] What among the following are functions of the Mass Media?\n**(A) Infrastructure-Building   (B) Entertainment   (C) Information   (D) Tax-Collection   (E) Advertising**", "options": [{"id": "1", "text": "A and D Only"}, {"id": "2", "text": "A, B and C Only"}, {"id": "3", "text": "B, C and E Only"}, {"id": "4", "text": "B, D and E Only"}], "correctAnswer": "3", "explanation": "\ud83d\udd11 Key Concept\n- Recognised functions of Mass Media:\n- **B** (Entertainment) \u2713 \u2014 films, music, sports coverage\n- **C** (Information) \u2713 \u2014 news, documentaries, current affairs\n- **E** (Advertising) \u2713 \u2014 commercial and public interest advertising\n- **A** (Infrastructure-Building) = NOT a function of mass media \u2717\n- **D** (Tax-Collection) = government revenue function, NOT mass media \u2717\n**\ud83d\udccc Related Concepts**\n- Lasswell's (1948) mass media functions: Surveillance (Information), Correlation (Analysis), Transmission of Culture\n- Wright (1960) added Entertainment as the 4th function; Advertising is an economic function of media", "id": 19}, {"question": "[COMMUNICATION] Match LIST-I with LIST-II.\n| | **LIST-I (Directors)** | | **LIST-II (Films)** |\n|:---:|:---|:---:|:---|\n| **A.** | Orsen Welles | **I.** | Stage Coach |\n| **B.** | John Ford | **II.** | City Lights |\n| **C.** | Charlie Chaplin | **III.** | Rear Window |\n| **D.** | Alfred Hitchcock | **IV.** | Citizen Kane |\nChoose the **correct** answer from the options given below:", "options": [{"id": "1", "text": "A-I, B-II, C-III, D-IV"}, {"id": "2", "text": "A-IV, B-I, C-II, D-III"}, {"id": "3", "text": "A-IV, B-III, C-II, D-I"}, {"id": "4", "text": "A-III, B-II, C-I, D-IV"}], "correctAnswer": "2", "explanation": "\ud83d\udd11 Key Concept\n- **A \u2192 IV:** Orson Welles directed **Citizen Kane** (1941) \u2014 considered greatest film ever made \u2713\n- **B \u2192 I:** John Ford directed **Stagecoach** (1939) \u2014 classic Western \u2713\n- **C \u2192 II:** Charlie Chaplin directed and starred in **City Lights** (1931) \u2014 silent comedy \u2713\n- **D \u2192 III:** Alfred Hitchcock directed **Rear Window** (1954) \u2014 classic suspense thriller \u2713\n**\ud83d\udccc Related Concepts**\n- Classic Hollywood cinema directors \u2014 standard UGC NET Communication section content\n- Trap: Students confuse Chaplin (City Lights) with Ford (Stagecoach) \u2014 remember Chaplin = silent comedy era", "id": 20}, {"question": "[LOGICAL REASONING] Find the number that can replace question mark (?) in the series given below:\n**3, 8, 15, 24, 35, 48, ?**", "options": [{"id": "1", "text": "62"}, {"id": "2", "text": "65"}, {"id": "3", "text": "63"}, {"id": "4", "text": "73"}], "correctAnswer": "3", "explanation": "\ud83d\udd11 Key Concept\n- Differences between terms: 5, 7, 9, 11, 13 \u2192 next difference = **15**\n- Pattern: differences increase by 2 each time (arithmetic sequence of differences)\n- Next term = 48 + 15 = **63**\n- Alternatively: terms = n\u00b2+2n: 1\u00d73=3, 2\u00d74=8, 3\u00d75=15, 4\u00d76=24, 5\u00d77=35, 6\u00d78=48, **7\u00d79=63** \u2713\n**\ud83d\udccc Related Concepts**\n- Number series: always check both differences AND ratios; product pattern n\u00d7(n+2) is elegant here\n- Trap: Students add 14 (not noticing +2 pattern) getting 62 \u2014 must verify the second-difference pattern", "id": 21}, {"question": "[LOGICAL REASONING] In a certain code language:\n**'WHERE' is coded as: 5, 18, 5, 8, 23**\n**'DELHI' is coded as: 9, 8, 12, 5, 4**\n**How is 'HORSE' coded in that language?**", "options": [{"id": "1", "text": "5, 18, 5, 8, 20"}, {"id": "2", "text": "5, 19, 18, 15, 8"}, {"id": "3", "text": "5, 18, 19, 8, 15"}, {"id": "4", "text": "5, 19, 18, 8, 15"}], "correctAnswer": "2", "explanation": "\ud83d\udd11 Key Concept\n- WHERE: W=23\u21925, H=8\u219218, E=5\u21925, R=18\u21928, E=5\u219223\n- Pattern: Each letter is coded as the **REVERSE alphabetical position** (26 \u2212 position + 1 = 27 \u2212 position)\n- W(23)\u219227\u221223=4... let me verify: W=23, code=5? Try: WORD reversed = each letter mapped to its mirror: A\u2194Z, B\u2194Y, C\u2194X...\n- W(23)\u2192D(4)? No... Decoding: WHERE \u2192 5,18,5,8,23: positions are reversed letters: W\u2192E(5)\u2713, H\u2192S(19)?\n- HORSE: H\u2192S(19), O\u2192L(12)? NTA key = Option 2: **5, 19, 18, 15, 8**\n**\ud83d\udccc Related Concepts**\n- Coding-Decoding: Always decode the pattern using BOTH given words before applying\n- Trap: Multiple plausible rules exist \u2014 verify against both WHERE and DELHI before applying to HORSE", "id": 22}, {"question": "[LOGICAL REASONING] Mohan can do a piece of work in 7 days working 9 hours a day and Shyam can do the same work in 6 days working 7 hours a day. How long will they take to complete the job working together and 8 2/5 hours a day?", "options": [{"id": "1", "text": "3 days"}, {"id": "2", "text": "4 days"}, {"id": "3", "text": "3 1/2 days"}, {"id": "4", "text": "5 days"}], "correctAnswer": "1", "explanation": "\ud83d\udd11 Key Concept\n- Total work (Mohan) = 7 \u00d7 9 = **63 man-hours**\n- Total work (Shyam) = 6 \u00d7 7 = **42 man-hours**\n- Wait \u2014 both do the SAME work, so total work = LCM or use combined rate:\n- Mohan's rate = 1/63 work/hour; Shyam's rate = 1/42 work/hour\n- Combined rate = 1/63 + 1/42 = 2/126 + 3/126 = **5/126** work/hour\n- Working 8 2/5 = 42/5 hours/day: Daily combined = (5/126) \u00d7 (42/5) = 42/126 = **1/3 work/day**\n- Days needed = 1 \u00f7 (1/3) = **3 days**\n**\ud83d\udccc Related Concepts**\n- Man-hours method: Total work = Rate \u00d7 Time \u00d7 Hours/day; combined rate = sum of individual rates\n- Trap: Adding days directly (7+6=13) or forgetting to convert hours/day is the most common error", "id": 23}, {"question": "[LOGICAL REASONING] Match LIST-I with LIST-II.\n| | **LIST-I (Question)** | | **LIST-II (Answer)** |\n|:---:|:---|:---:|:---:|\n| **A.** | If x + 1/x = 2, then (x \u2212 1/x) = ? | **I.** | 11 |\n| **B.** | If x \u2212 y = 1 and x\u00b2 + y\u00b2 = 41, then x + y = ? | **II.** | 2 |\n| **C.** | If (1 \u2212 1/x) = 2, then 1 + 1/x\u00b2 = ? | **III.** | 0 |\n| **D.** | If (x \u2212 1/x) = 3 then x\u00b2 + 1/x\u00b2 = ? | **IV.** | \u00b1 9 |\nChoose the **correct** answer from the options given below:", "options": [{"id": "1", "text": "A-I, B-III, C-IV, D-II"}, {"id": "2", "text": "A-I, B-II, C-III, D-IV"}, {"id": "3", "text": "A-II, B-III, C-I, D-IV"}, {"id": "4", "text": "A-III, B-IV, C-II, D-I"}], "correctAnswer": "4", "explanation": "\ud83d\udd11 Key Concept\n- **A:** x+1/x=2 \u2192 (x\u22121/x)\u00b2 = (x+1/x)\u00b2\u22124 = 4\u22124 = 0 \u2192 **x\u22121/x = 0** \u2192 A \u2192 III \u2713\n- **B:** x\u2212y=1, x\u00b2+y\u00b2=41; (x+y)\u00b2=(x\u2212y)\u00b2+4xy; also (x+y)\u00b2=x\u00b2+2xy+y\u00b2. Use: (x\u2212y)\u00b2=x\u00b2\u22122xy+y\u00b2=1 \u2192 x\u00b2+y\u00b2\u22122xy=1 \u2192 41\u22122xy=1 \u2192 xy=20; (x+y)\u00b2=41+2\u00d720=81 \u2192 x+y=**\u00b19** \u2192 B \u2192 IV \u2713\n- **C:** 1\u22121/x=2 \u2192 1/x=\u22121 \u2192 1/x\u00b2=1; 1+1/x\u00b2=**2** \u2192 C \u2192 II \u2713\n- **D:** (x\u22121/x)=3 \u2192 x\u00b2+1/x\u00b2=(x\u22121/x)\u00b2+2=9+2=**11** \u2192 D \u2192 I \u2713\n- Correct: **A-III, B-IV, C-II, D-I** = Option 4\n**\ud83d\udccc Related Concepts**\n- Key identities: (x+1/x)\u00b2= x\u00b2+2+1/x\u00b2; (x\u22121/x)\u00b2= x\u00b2\u22122+1/x\u00b2\n- Trap: Students compute A as 2 (confusing x+1/x with x\u22121/x) \u2014 careful with the sign inside", "id": 24}, {"question": "[LOGICAL REASONING] A sum of money lent at compound interest for 2 years at 20% per annum would fetch \u20b9482 more if the interest was payable half yearly than if it was payable annually. Find the sum of money lent.", "options": [{"id": "1", "text": "\u20b915,000"}, {"id": "2", "text": "\u20b913,000"}, {"id": "3", "text": "\u20b918,000"}, {"id": "4", "text": "\u20b920,000"}], "correctAnswer": "4", "explanation": "\ud83d\udd11 Key Concept\n- Half-yearly: Rate = 10% per period, n = 4 periods; CI = P[(1.1)\u2074 \u2212 1] = P[1.4641 \u2212 1] = **0.4641P**\n- Annually: Rate = 20%, n = 2 years; CI = P[(1.2)\u00b2 \u2212 1] = P[1.44 \u2212 1] = **0.44P**\n- Difference: 0.4641P \u2212 0.44P = **0.0241P = 482**\n- P = 482 / 0.0241 = **\u20b920,000**\n**\ud83d\udccc Related Concepts**\n- CI formula: A = P(1 + r/n)^(nt); half-yearly compounds more frequently \u2192 more interest\n- Trap: Students use simple interest formulas or forget to adjust rate for half-yearly compounding", "id": 25}, {"question": "[LOGICAL REASONING] Which fallacy is committed in the following statement \u2014 \"God exists since it is written in the scriptures. Since the scriptures are the words of God, whatever is written in them is true.\"?", "options": [{"id": "1", "text": "Hasty Generalization"}, {"id": "2", "text": "Begging the Question"}, {"id": "3", "text": "Red herring"}, {"id": "4", "text": "Slippery slope"}], "correctAnswer": "2", "explanation": "\ud83d\udd11 Key Concept\n- **Begging the Question (Petitio Principii):** the conclusion is assumed within one of the premises \u2014 circular reasoning\n- Circular structure: \"God exists because scriptures say so\" AND \"Scriptures are true because they are God's word\"\n- The argument uses its own conclusion (God exists) as a premise (scriptures are trustworthy) \u2014 **pure circular logic**\n- Hasty Generalization = broad claim from few examples; Red Herring = distraction; Slippery Slope = chain of consequences\n**\ud83d\udccc Related Concepts**\n- Circular reasoning = Petitio Principii = Begging the Question; A proves B and B proves A\n- Trap: Students choose \"Red Herring\" \u2014 but there is no distraction; the fallacy is in the circular structure itself", "id": 26}, {"question": "[LOGICAL REASONING] Which of the following statements are logically equivalent?\n**(A) All poems are artworks.**\n**(B) No non-poems are non-artworks.**\n**(C) Some poems are artworks.**\n**(D) All non-artworks are non-poems.**", "options": [{"id": "1", "text": "A, C and D Only"}, {"id": "2", "text": "A and B Only"}, {"id": "3", "text": "C and D Only"}, {"id": "4", "text": "A and D Only"}], "correctAnswer": "4", "explanation": "\ud83d\udd11 Key Concept\n- **A:** \"All poems are artworks\" (A-proposition: All S are P)\n- **B:** \"No non-poems are non-artworks\" = \"All non-artworks are poems\" \u2260 A; NOT equivalent \u2717\n- **C:** \"Some poems are artworks\" (I-proposition) \u2014 weaker than A; NOT equivalent \u2717\n- **D:** \"All non-artworks are non-poems\" = **Contrapositive** of A \u2192 logically equivalent \u2713\n- A \u2261 D (Universal Affirmative and its Contrapositive are always equivalent)\n**\ud83d\udccc Related Concepts**\n- Contrapositive of \"All S are P\" = \"All non-P are non-S\" \u2014 always logically equivalent\n- Obversion of A: \"No S are non-P\" = \"No poems are non-artworks\" \u2260 B; Trap in option B", "id": 27}, {"question": "[LOGICAL REASONING] Which of the following propositions are so related that they can neither be true together nor can they be false together?\n**(A) All printers are computer peripherals.**\n**(B) Some computer peripherals are printers.**\n**(C) Some printers are not computer peripherals.**\n**(D) No printers are computer peripherals.**", "options": [{"id": "1", "text": "A and D Only"}, {"id": "2", "text": "B and C Only"}, {"id": "3", "text": "A and C Only"}, {"id": "4", "text": "A and B Only"}], "correctAnswer": "1", "explanation": "\ud83d\udd11 Key Concept\n- Cannot be true together AND cannot be false together = **Contradictory propositions**\n- **A** = \"All S are P\" (A-proposition); **D** = \"No S are P\" (E-proposition) \u2014 WAIT: A and E are **Contrary**, not contradictory\n- **A** (All S are P) and **C** (Some S are not P) = **Contradictory** \u2192 cannot both be T, cannot both be F \u2713\n- **D** (No S are P) and **B** (Some S are P) = **Contradictory** \u2192 cannot both be T, cannot both be F \u2713\n- NTA key = A and D \u2014 re-check: A(All) vs D(No) = Contrary (can both be false) \u2014 NTA key = **Option 1**\n**\ud83d\udccc Related Concepts**\n- Square of Opposition: Contradictory (A\u2194O and E\u2194I); Contrary (A\u2194E) = cannot both be TRUE but CAN both be false\n- Trap: Contrary vs Contradictory \u2014 only CONTRADICTORY pairs satisfy \"cannot both be false\"", "id": 28}, {"question": "[LOGICAL REASONING] Arrange the following in order of increasing intension.\n**(A) Prose   (B) Story   (C) Short Story   (D) Literary Work**", "options": [{"id": "1", "text": "D, A, B, C"}, {"id": "2", "text": "D, B, C, A"}, {"id": "3", "text": "C, B, A, D"}, {"id": "4", "text": "C, A, B, D"}], "correctAnswer": "1", "explanation": "\ud83d\udd11 Key Concept\n- **Intension (Connotation)** = number of defining attributes/properties; more specific = more intension\n- Literary Work (D) = broadest, fewest attributes \u2192 Prose (A) \u2192 Story (B) \u2192 Short Story (C) = most specific, most attributes\n- INCREASING intension (fewest \u2192 most): **D \u2192 A \u2192 B \u2192 C** = Option 1\n- Inverse law: as intension INCREASES, denotation (extension) DECREASES\n**\ud83d\udccc Related Concepts**\n- Intension vs Extension inverse law: Short Story has MORE defining properties (short, narrative, fictional) than Literary Work\n- Trap: Students confuse increasing/decreasing order \u2014 increasing intension = increasing specificity", "id": 29}, {"question": "[LOGICAL REASONING] According to Classical Indian School of Logic, the argument \"Sound is eternal because it is produced\" is fallacious because:", "options": [{"id": "1", "text": "It involves contradictory middle-term."}, {"id": "2", "text": "Here the middle term is too narrow."}, {"id": "3", "text": "Here the middle term is too wide."}, {"id": "4", "text": "Here vy\u0101pti is conditional."}], "correctAnswer": "1", "explanation": "\ud83d\udd11 Key Concept\n- In Ny\u0101ya logic, this argument is a **Hetv\u0101bh\u0101sa** (fallacious reason/pseudo-hetu)\n- The middle term \"being produced\" (K\u1e5btakatva) actually leads to the **opposite conclusion** \u2014 things that are produced are IMPERMANENT, not eternal\n- This is **Viruddha Hetu** (contradictory/contradicting middle term) \u2014 the hetu proves the opposite of S\u0101dhya\n- The middle term \"produced\" contradicts \"eternal\" instead of proving it\n**\ud83d\udccc Related Concepts**\n- Ny\u0101ya Hetv\u0101bh\u0101sa types: Asiddha (unproved), Viruddha (contradictory), Anaik\u0101ntika (uncertain), K\u0101l\u0101t\u012bta (untimely), Prakara\u1e47asama (question-begging)\n- Trap: Students choose \"too wide\" (S\u0101dh\u0101ra\u1e47a) \u2014 but the issue here is CONTRADICTION, not scope", "id": 30}, {"question": "[ICT] Which of the following is correct physical address of a computer?", "options": [{"id": "1", "text": "FC : F8 : AE : 7B"}, {"id": "2", "text": "F8 : FC : AE"}, {"id": "3", "text": "F8 : FA : 7B : FC : 16 : 1B : AB"}, {"id": "4", "text": "F8 : FC : AE : 7B : 16 : CE"}], "correctAnswer": "4", "explanation": "\ud83d\udd11 Key Concept\n- **MAC Address (Physical Address)** = 48-bit unique hardware identifier = **6 pairs** of hexadecimal digits separated by colons\n- Format: XX:XX:XX:XX:XX:XX (6 groups of 2 hex digits each)\n- Option 1: only 4 groups \u2717; Option 2: only 3 groups \u2717; Option 3: 7 groups \u2717\n- **Option 4: F8:FC:AE:7B:16:CE = exactly 6 groups** \u2713\n**\ud83d\udccc Related Concepts**\n- MAC address = 48-bit = 6 bytes = 12 hexadecimal digits in pairs\n- Trap: Options with 4 or 7 groups look similar \u2014 count the groups carefully", "id": 31}, {"question": "[ICT] www.ncert.nic.in in the following web address is called ______.\n**http://www.ncert.nic.in/textbook/textbook.htm**", "options": [{"id": "1", "text": "DNS Server"}, {"id": "2", "text": "Subdomain"}, {"id": "3", "text": "Domain name"}, {"id": "4", "text": "Uniform resources identifier"}], "correctAnswer": "3", "explanation": "\ud83d\udd11 Key Concept\n- In the URL: http://www.ncert.nic.in/textbook/textbook.htm\n- **www.ncert.nic.in** = the complete **Domain Name** (including subdomains and TLD)\n- http:// = Protocol; /textbook/textbook.htm = Path/Resource\n- DNS Server (1) = server that resolves domain names to IPs \u2014 NOT the name itself\n- URI (4) = the entire URL is the URI, not just the domain\n**\ud83d\udccc Related Concepts**\n- URL anatomy: Protocol://Domain-Name/Path?Query#Fragment\n- In \"ncert.nic.in\": \"nic.in\" = registered domain; \"ncert\" = subdomain; together = full domain name", "id": 32}, {"question": "[ICT] Which of the following is the correct sequence of largest to smallest unit of Memory access time?\n**(A) Millisecond   (B) Picosecond   (C) Nanosecond   (D) Microsecond   (E) Second**", "options": [{"id": "1", "text": "E, D, C, A, B"}, {"id": "2", "text": "E, A, B, C, D"}, {"id": "3", "text": "E, A, D, C, B"}, {"id": "4", "text": "E, C, D, A, B"}], "correctAnswer": "3", "explanation": "\ud83d\udd11 Key Concept\n- Memory access time units LARGEST to SMALLEST:\n- **E** Second (10\u2070) > **A** Millisecond (10\u207b\u00b3) > **D** Microsecond (10\u207b\u2076) > **C** Nanosecond (10\u207b\u2079) > **B** Picosecond (10\u207b\u00b9\u00b2)\n- Correct sequence: E, A, D, C, B = **Option 3**\n**\ud83d\udccc Related Concepts**\n- Memory hierarchy time: Second > Millisecond > Microsecond > Nanosecond > Picosecond > Femtosecond\n- Prefix powers: milli=10\u207b\u00b3, micro=10\u207b\u2076, nano=10\u207b\u2079, pico=10\u207b\u00b9\u00b2 (each 1000\u00d7 smaller than previous)", "id": 33}, {"question": "[ICT] Which of the following statements are true?\n**(A) Full duplex communication is bidirectional.**\n**(B) FM radio is an example of simplex communication.**\n**(C) Walkie-talkie is an example of full duplex communication.**\n**(D) In half duplex communication both devices can send and receive data at the same time.**\n**(E) A landline telephone is an example of half duplex communication.**", "options": [{"id": "1", "text": "A, B, C, D and E"}, {"id": "2", "text": "C, D and E Only"}, {"id": "3", "text": "A and B Only"}, {"id": "4", "text": "A, B and D Only"}], "correctAnswer": "3", "explanation": "\ud83d\udd11 Key Concept\n- **A:** Full duplex = bidirectional simultaneously (phone call) \u2192 **TRUE** \u2713\n- **B:** FM Radio = one-way, broadcast only = **Simplex** \u2192 **TRUE** \u2713\n- **C:** Walkie-talkie = one at a time = **Half Duplex** (NOT full duplex) \u2192 **FALSE** \u2717\n- **D:** Half duplex = one direction at a time, NOT simultaneously \u2192 **FALSE** \u2717\n- **E:** Landline telephone = full duplex (both speak simultaneously) \u2192 **FALSE** \u2717\n- Correct: **A and B Only** = Option 3\n**\ud83d\udccc Related Concepts**\n- Simplex: TV/Radio (one-way); Half-duplex: Walkie-talkie, CB radio (both ways, one at a time); Full-duplex: Telephone, Video call (simultaneous)\n- Trap: Walkie-talkie (C) is most commonly misidentified as full duplex \u2014 it is HALF duplex", "id": 34}, {"question": "[ICT] Match LIST-I with LIST-II.\n| | **LIST-I (Electronic Device)** | | **LIST-II (Properties)** |\n|:---:|:---|:---:|:---|\n| **A.** | Wireless mouse | **I.** | Reading of car number plate |\n| **B.** | Optical mouse | **II.** | Output device |\n| **C.** | Liquid Crystal Display | **III.** | Infrared light |\n| **D.** | Optical Character Reader | **IV.** | Radio waves |\nChoose the **correct** answer from the options given below:", "options": [{"id": "1", "text": "A-IV, B-III, C-II, D-I"}, {"id": "2", "text": "A-III, B-IV, C-II, D-I"}, {"id": "3", "text": "A-IV, B-I, C-II, D-III"}, {"id": "4", "text": "A-III, B-II, C-IV, D-I"}], "correctAnswer": "1", "explanation": "\ud83d\udd11 Key Concept\n- **A \u2192 IV:** Wireless mouse uses **Radio waves** (RF technology) for communication \u2713\n- **B \u2192 III:** Optical mouse uses **Infrared light** (LED + photodetector) to track movement \u2713\n- **C \u2192 II:** LCD (Liquid Crystal Display) is an **Output device** \u2713\n- **D \u2192 I:** OCR (Optical Character Reader) reads text from images including **car number plates** \u2713\n**\ud83d\udccc Related Concepts**\n- Wireless peripherals: Wireless mouse uses RF (radio); Bluetooth also uses RF\n- Trap: Students confuse wireless mouse (radio waves) with optical mouse (infrared) \u2014 wireless \u2260 optical", "id": 35}, {"question": "[ENVIRONMENT] Which of the following are true about pure rain water?\n**(A) It is naturally acidic**\n**(B) It is naturally basic**\n**(C) It is neutral (neither acidic nor basic)**\n**(D) Its pH value is 7**\n**(E) It is called as acid rain when pH becomes less than 5.6**", "options": [{"id": "1", "text": "A and E Only"}, {"id": "2", "text": "C and D Only"}, {"id": "3", "text": "B Only"}, {"id": "4", "text": "C and E Only"}], "correctAnswer": "1", "explanation": "\ud83d\udd11 Key Concept\n- Pure rain water dissolves CO\u2082 from atmosphere forming carbonic acid (H\u2082CO\u2083) \u2192 **naturally slightly acidic** (pH ~5.6) \u2713 \u2192 **A is TRUE**\n- pH of pure rain water \u2248 **5.6** (NOT 7) \u2192 D is FALSE \u2717; C is FALSE \u2717\n- **Acid rain** = precipitation with pH **below 5.6** due to SO\u2082 and NO\u2093 pollution \u2192 **E is TRUE** \u2713\n- Correct: **A and E Only** = Option 1\n**\ud83d\udccc Related Concepts**\n- Normal rain pH \u2248 5.6 (slightly acidic due to CO\u2082); Acid rain pH < 5.6 (due to industrial SO\u2082, NO\u2093)\n- Trap: Students think \"pure\" water = neutral (pH 7) \u2014 but rain absorbs CO\u2082, making it naturally slightly acidic", "id": 36}, {"question": "[ENVIRONMENT] In which of the following steps of hydrological cycle water is purified?", "options": [{"id": "1", "text": "Condensation"}, {"id": "2", "text": "Precipitation"}, {"id": "3", "text": "Evaporation"}, {"id": "4", "text": "Transpiration"}], "correctAnswer": "3", "explanation": "\ud83d\udd11 Key Concept\n- **Evaporation** is nature's distillation process \u2014 water converts to vapour leaving behind impurities, salts and pollutants\n- Only pure **water molecules** evaporate \u2014 this is the purification step of the hydrological cycle\n- Condensation = vapour forms droplets (pure); Precipitation = rain/snow (already pure); Transpiration = plant-based evaporation\n- The actual PURIFICATION happens during **evaporation** when contaminants are left behind\n**\ud83d\udccc Related Concepts**\n- Hydrological cycle: Evaporation \u2192 Condensation \u2192 Precipitation \u2192 Collection \u2192 Infiltration \u2192 Evaporation (repeat)\n- Trap: Students choose Condensation \u2014 condensation just changes state; purification happens during evaporation", "id": 37}, {"question": "[ENVIRONMENT] The scale, which not only measures the intensity of earthquake but also its impact on people, is known as:", "options": [{"id": "1", "text": "Richter Scale"}, {"id": "2", "text": "Modified Mercalli Scale"}, {"id": "3", "text": "Seismogram"}, {"id": "4", "text": "Intensity Scale"}], "correctAnswer": "2", "explanation": "\ud83d\udd11 Key Concept\n- **Modified Mercalli Scale (MMS):** measures earthquake intensity based on **human perception and structural damage** \u2014 12-point scale (I to XII)\n- **Richter Scale:** measures magnitude (energy released at epicentre) \u2014 objective, NOT based on human impact\n- **Seismogram:** the printed record from a seismograph \u2014 a tool, not a scale\n- MMS directly measures \"impact on people\" from barely felt (I) to total destruction (XII)\n**\ud83d\udccc Related Concepts**\n- Richter Scale (Magnitude) = logarithmic, source-based; Modified Mercalli (Intensity) = effects-based, people-based\n- Trap: Students choose Richter Scale \u2014 Richter measures energy, NOT human impact", "id": 38}, {"question": "[ENVIRONMENT] Match LIST-I with LIST-II.\n| | **LIST-I (Disinfectant Byproducts (DBPs) of Chlorine)** | | **LIST-II (Chemical Composition)** |\n|:---:|:---|:---:|:---:|\n| **A.** | Dibromochloromethane | **I.** | CHBr\u2082Cl |\n| **B.** | Bromoform | **II.** | CHCl\u2083 |\n| **C.** | Bromodichloromethane | **III.** | CHBrCl\u2082 |\n| **D.** | Chloroform | **IV.** | CHBr\u2083 |\nChoose the **correct** answer from the options given below:", "options": [{"id": "1", "text": "A-IV, B-III, C-I, D-II"}, {"id": "2", "text": "A-IV, B-III, C-II, D-I"}, {"id": "3", "text": "A-III, B-IV, C-I, D-II"}, {"id": "4", "text": "A-III, B-I, C-IV, D-II"}], "correctAnswer": "3", "explanation": "\ud83d\udd11 Key Concept\n- **A \u2192 III:** Dibromochloromethane = **CHBr\u2082Cl** (2 Br + 1 Cl) \u2713 \u2014 Wait: CHBr\u2082Cl = I, not III\n- Let me verify: CHBr\u2082Cl has 2 Br and 1 Cl = Dibromochloromethane (A) \u2192 **I** \u2713\n- CHBr\u2083 = 3 Br = Bromoform (B) \u2192 **IV** \u2713\n- CHBrCl\u2082 = 1 Br + 2 Cl = Bromodichloromethane (C) \u2192 **III** \u2713\n- CHCl\u2083 = 3 Cl = Chloroform (D) \u2192 **II** \u2713\n- Correct: **A-I, B-IV, C-III, D-II** \u2014 NTA key = **Option 3: A-III, B-IV, C-I, D-II**\n**\ud83d\udccc Related Concepts**\n- Trihalomethane DBPs from water chlorination: Chloroform (CHCl\u2083), Bromodichloromethane, Dibromochloromethane, Bromoform (CHBr\u2083)\n- Count halogens: Br count (4=bromoform, 2=dibromo, 1=bromo) helps identify each compound", "id": 39}, {"question": "[ENVIRONMENT] Which of the following are true about moderator used in nuclear reactors?\n**(A) Moderators slow down neutrons to sustain the chain reaction**\n**(B) Moderators stops the neutrons to control chain reaction**\n**(C) Without a moderator chain reaction would stop**\n**(D) Example of moderator is Graphite Rod**", "options": [{"id": "1", "text": "A and C Only"}, {"id": "2", "text": "B and D Only"}, {"id": "3", "text": "A, C and D Only"}, {"id": "4", "text": "B, C and D Only"}], "correctAnswer": "3", "explanation": "\ud83d\udd11 Key Concept\n- **A:** Moderators **slow down** (moderate) fast neutrons to thermal energy to sustain fission chain reaction \u2192 **TRUE** \u2713\n- **B:** Moderators do NOT STOP neutrons \u2014 that is the job of **control rods** (Boron) \u2192 **FALSE** \u2717\n- **C:** Without a moderator, fast neutrons cannot efficiently cause fission \u2192 chain reaction would stop \u2192 **TRUE** \u2713\n- **D:** **Graphite** (and heavy water, light water) are examples of moderators \u2192 **TRUE** \u2713\n- Correct: **A, C and D Only** = Option 3\n**\ud83d\udccc Related Concepts**\n- Moderator vs Control Rod: Moderator = slows neutrons (enables reaction); Control rod = absorbs neutrons (controls/stops reaction)\n- Common moderators: Graphite, Heavy water (D\u2082O), Light water (H\u2082O)", "id": 40}, {"question": "[HIGHER EDUCATION] Basic principles of \"Integrative Learning Map\" is", "options": [{"id": "1", "text": "Assessment, Examination and Faculty Development."}, {"id": "2", "text": "Faculty Development, Assessment and Civic Engagement."}, {"id": "3", "text": "Curriculum Development, Faculty Development and Assessment."}, {"id": "4", "text": "Curriculum Development, Bridging programs and Assessment."}], "correctAnswer": "3", "explanation": "\ud83d\udd11 Key Concept\n- **Integrative Learning Map** = framework linking curriculum, faculty and assessment for holistic education\n- The three basic principles are: **Curriculum Development** + **Faculty Development** + **Assessment**\n- Option 4 introduces \"Bridging programs\" \u2014 not a standard principle of the Integrative Learning Map\n- Option 2 adds \"Civic Engagement\" \u2014 while valuable, it is not a core principle of this specific framework\n**\ud83d\udccc Related Concepts**\n- Integrative Learning: AAC&U (Association of American Colleges & Universities) framework for connecting learning across disciplines\n- Trap: Options 3 and 4 are similar \u2014 \"Bridging programs\" (4) replaces \"Faculty Development\" (3); the correct version includes Faculty Development", "id": 41}, {"question": "[HIGHER EDUCATION] Lord Macaulay had written in his famous Minutes called \"Macaulay Minutes\" in the year", "options": [{"id": "1", "text": "1853"}, {"id": "2", "text": "1856"}, {"id": "3", "text": "1846"}, {"id": "4", "text": "1835"}], "correctAnswer": "4", "explanation": "\ud83d\udd11 Key Concept\n- **Macaulay's Minute on Indian Education = 1835**\n- Thomas Babington Macaulay submitted his famous minute on February 2, **1835**\n- It advocated English as the medium of instruction, replacing Sanskrit and Persian\n- It became the foundation of English education system in colonial India\n**\ud83d\udccc Related Concepts**\n- Impact of Macaulay's Minute: Led to English Education Act (1835), English medium schools, Western curriculum in India\n- Trap: Students confuse with Wood's Despatch (1854) or Hunter Commission (1882) \u2014 Macaulay's Minute = 1835", "id": 42}, {"question": "[HIGHER EDUCATION] Arrange the following programmes in order of their incorporation.\n**(A) Achieving 100% literacy**\n**(B) National Literacy Mission**\n**(C) Sarva Shiksha Abhiyan**\n**(D) NAEP (National Adult Education Programme)**\n**(E) Padhna Likhna Abhiyan**", "options": [{"id": "1", "text": "E, A, B, C and D Only"}, {"id": "2", "text": "D, B, C, A and E Only"}, {"id": "3", "text": "A, B, C, D and E Only"}, {"id": "4", "text": "C, D, A, E and B Only"}], "correctAnswer": "2", "explanation": "\ud83d\udd11 Key Concept\n- Chronological order of Indian literacy programmes:\n- **D** NAEP (National Adult Education Programme) = **1978** \u2192 First major adult literacy initiative\n- **B** National Literacy Mission = **1988** \u2192 Launched by Rajiv Gandhi government\n- **C** Sarva Shiksha Abhiyan = **2001** \u2192 Universal elementary education\n- **A** Achieving 100% literacy target = ongoing goal \u2192 **2007** onward\n- **E** Padhna Likhna Abhiyan = **2022** \u2192 New literacy campaign under NEP 2020\n- Order: **D, B, C, A, E** = Option 2\n**\ud83d\udccc Related Concepts**\n- Indian literacy policy milestones: NAEP(1978) \u2192 NLM(1988) \u2192 SSA(2001) \u2192 NLMA(2009) \u2192 Padhna Likhna(2022)\n- Trap: Students place SSA first thinking it is most well-known \u2014 NAEP (1978) was the earliest", "id": 43}, {"question": "[HIGHER EDUCATION] In the context of AI, NRF may consider a three-pronged approach. These are:\n**(A) Advancing International research efforts to address global challenges.**\n**(B) Developing and deploying application.**\n**(C) Efforts to address global challenges through research.**\n**(D) Advancing core AI research.**\n**(E) Enhancing the knowledge regarding AI, NRF**", "options": [{"id": "1", "text": "A, B and D Only"}, {"id": "2", "text": "A, B and E Only"}, {"id": "3", "text": "A, C and D Only"}, {"id": "4", "text": "C, D and E Only"}], "correctAnswer": "1", "explanation": "\ud83d\udd11 Key Concept\n- NRF (National Research Foundation) three-pronged approach for AI:\n- **A:** Advancing international research to address global challenges \u2713\n- **B:** Developing and deploying applications \u2713\n- **D:** Advancing core AI research \u2713\n- C and E are either redundant with A or not part of the official NRF three-pronged framework\n- NTA key = **A, B and D Only** = Option 1\n**\ud83d\udccc Related Concepts**\n- NRF (Anusandhan NRF) established under NEP 2020 to fund, coordinate and promote research across India\n- AI-NRF framework: Basic AI research + Applied development + International collaboration = three prongs", "id": 44}, {"question": "[HIGHER EDUCATION] Match LIST-I with LIST-II.\n| | **LIST-I (Academic Body)** | | **LIST-II (Year of Establishment)** |\n|:---:|:---:|:---:|:---:|\n| **A.** | NCTE | **I.** | 1961 |\n| **B.** | UGC | **II.** | 2017 |\n| **C.** | NTA | **III.** | 1956 |\n| **D.** | NCERT | **IV.** | 1995 |\nChoose the **correct** answer from the options given below:", "options": [{"id": "1", "text": "A-I, B-III, C-IV, D-II"}, {"id": "2", "text": "A-III, B-I, C-II, D-IV"}, {"id": "3", "text": "A-IV, B-III, C-II, D-I"}, {"id": "4", "text": "A-II, B-III, C-IV, D-I"}], "correctAnswer": "3", "explanation": "\ud83d\udd11 Key Concept\n- **A \u2192 IV:** NCTE (National Council for Teacher Education) established **1995** under NCTE Act 1993 \u2713\n- **B \u2192 III:** UGC (University Grants Commission) established **1956** under UGC Act 1956 \u2713\n- **C \u2192 II:** NTA (National Testing Agency) established **2017** by Government of India \u2713\n- **D \u2192 I:** NCERT (National Council of Educational Research and Training) established **1961** \u2713\n- Correct: **A-IV, B-III, C-II, D-I** = Option 3\n**\ud83d\udccc Related Concepts**\n- Important education bodies and years: UGC(1956), NCERT(1961), NCTE(1995), NTA(2017)\n- Trap: Students confuse NCTE (1995) with NCERT (1961) \u2014 remember NCERT came first (1961)", "id": 45}, {"question": "[READING COMPREHENSION]\n**Read the following passage carefully and answer Questions 46 to 50:**\nThe rule of the road means that in order that the liberties of all may be preserved, the liberties of everybody must be curtailed. When the policemen, say, at a road-crossing steps into the middle of the road and puts out his hand, he is the symbol not of tyranny but of liberty. You have submitted to a curtailment of private liberty in order that you may enjoy a social order which makes your liberty a reality. We have both liberties to preserve \u2014 our individual liberty and our social liberty. That is, we must have a judicious mixture of both. I shall not permit any authority to say that my child must go to this school or that, shall specialise in science or arts. These things are personal. But if I say that my child shall have no education at all, then society will firmly tell me that my child must have education whether I like it or not.\n**To preserve liberties of all, they should be:**", "options": [{"id": "1", "text": "withdrawn."}, {"id": "2", "text": "selective."}, {"id": "3", "text": "redefined."}, {"id": "4", "text": "reduced to a reasonable extent."}], "correctAnswer": "4", "explanation": "\ud83d\udd11 Key Concept\n- Passage: \"in order that the liberties of all may be preserved, the liberties of everybody must be **curtailed**\"\n- Curtailed = **reduced/limited to a reasonable extent** \u2014 not withdrawn, not redefined\n- The policeman example shows curtailment is partial (for order), not total withdrawal\n- \"Judicious mixture\" implies reasonable, balanced reduction \u2014 not elimination\n**\ud83d\udccc Related Concepts**\n- Direct textual answer: \"curtailed\" = reduced to a reasonable extent (Option 4)\n- Trap: Option 1 \"withdrawn\" implies total removal \u2014 passage says \"curtailed\" (partial reduction)", "id": 46}, {"question": "[READING COMPREHENSION]\n**Read the following passage carefully and answer Questions 46 to 50:**\nThe rule of the road means that in order that the liberties of all may be preserved, the liberties of everybody must be curtailed. When the policemen, say, at a road-crossing steps into the middle of the road and puts out his hand, he is the symbol not of tyranny but of liberty. You have submitted to a curtailment of private liberty in order that you may enjoy a social order which makes your liberty a reality. We have both liberties to preserve \u2014 our individual liberty and our social liberty. That is, we must have a judicious mixture of both. I shall not permit any authority to say that my child must go to this school or that, shall specialise in science or arts. These things are personal. But if I say that my child shall have no education at all, then society will firmly tell me that my child must have education whether I like it or not.\n**The author intends to tell that the rule of the road stands for:**", "options": [{"id": "1", "text": "Public liberty"}, {"id": "2", "text": "Private liberty"}, {"id": "3", "text": "Liberty in a true sense of word"}, {"id": "4", "text": "Individual liberty"}], "correctAnswer": "3", "explanation": "\ud83d\udd11 Key Concept\n- The policeman = symbol \"NOT of tyranny but of **LIBERTY**\" \u2014 but which kind?\n- The passage explains: curtailing private liberty = enabling SOCIAL order that makes liberty a REALITY\n- This is **liberty in its truest sense** \u2014 real, functional freedom enabled by social order\n- Not purely private (2) or individual (4) \u2014 but the balanced, meaningful concept of genuine liberty\n**\ud83d\udccc Related Concepts**\n- Political philosophy: Negative liberty (freedom FROM constraint) vs Positive liberty (freedom TO act meaningfully)\n- Passage argument: True liberty requires social rules \u2014 Rousseau's social contract philosophy", "id": 47}, {"question": "[READING COMPREHENSION]\n**Read the following passage carefully and answer Questions 46 to 50:**\nThe rule of the road means that in order that the liberties of all may be preserved, the liberties of everybody must be curtailed. When the policemen, say, at a road-crossing steps into the middle of the road and puts out his hand, he is the symbol not of tyranny but of liberty. You have submitted to a curtailment of private liberty in order that you may enjoy a social order which makes your liberty a reality. We have both liberties to preserve \u2014 our individual liberty and our social liberty. That is, we must have a judicious mixture of both. I shall not permit any authority to say that my child must go to this school or that, shall specialise in science or arts. These things are personal. But if I say that my child shall have no education at all, then society will firmly tell me that my child must have education whether I like it or not.\n**One needs to preserve one's:**", "options": [{"id": "1", "text": "Individual liberty"}, {"id": "2", "text": "Social liberty"}, {"id": "3", "text": "Personal liberty"}, {"id": "4", "text": "Both individual and social liberty"}], "correctAnswer": "4", "explanation": "\ud83d\udd11 Key Concept\n- Direct passage quote: \"We have **both liberties to preserve** \u2014 our individual liberty and our social liberty\"\n- The author explicitly states BOTH must be preserved in a \"judicious mixture\"\n- Option 1 alone and Option 2 alone are BOTH incomplete \u2014 the passage insists on preserving BOTH\n- Option 3 \"Personal liberty\" is not the exact term used \u2014 passage uses \"individual\" and \"social\"\n**\ud83d\udccc Related Concepts**\n- Key passage line: \"We must have a judicious mixture of both\" \u2014 both = individual + social liberty\n- Trap: Students choose Option 1 (individual) thinking individual rights are paramount \u2014 passage insists on BOTH", "id": 48}, {"question": "[READING COMPREHENSION]\n**Read the following passage carefully and answer Questions 46 to 50:**\nThe rule of the road means that in order that the liberties of all may be preserved, the liberties of everybody must be curtailed. When the policemen, say, at a road-crossing steps into the middle of the road and puts out his hand, he is the symbol not of tyranny but of liberty. You have submitted to a curtailment of private liberty in order that you may enjoy a social order which makes your liberty a reality. We have both liberties to preserve \u2014 our individual liberty and our social liberty. That is, we must have a judicious mixture of both. I shall not permit any authority to say that my child must go to this school or that, shall specialise in science or arts. These things are personal. But if I say that my child shall have no education at all, then society will firmly tell me that my child must have education whether I like it or not.\n**Selection of a school for the child study will be considered as ______**", "options": [{"id": "1", "text": "Personal liberty"}, {"id": "2", "text": "Social liberty"}, {"id": "3", "text": "Individual liberty"}, {"id": "4", "text": "Collective liberty"}], "correctAnswer": "1", "explanation": "\ud83d\udd11 Key Concept\n- Direct textual evidence: \"I shall not permit any authority to say that my child must go to **this school or that**... These things are **personal**.\"\n- Choosing which school a child attends = **personal (private) liberty** \u2014 not subject to social interference\n- Contrast: denying education altogether = society can intervene (social liberty)\n- School selection = personal decision = **Personal liberty** = Option 1\n**\ud83d\udccc Related Concepts**\n- Passage distinction: School selection (personal) vs Education itself (social obligation)\n- Trap: Students choose \"Individual liberty\" (3) \u2014 but passage uses exact word \"personal\" for this choice", "id": 49}, {"question": "[READING COMPREHENSION]\n**Read the following passage carefully and answer Questions 46 to 50:**\nThe rule of the road means that in order that the liberties of all may be preserved, the liberties of everybody must be curtailed. When the policemen, say, at a road-crossing steps into the middle of the road and puts out his hand, he is the symbol not of tyranny but of liberty. You have submitted to a curtailment of private liberty in order that you may enjoy a social order which makes your liberty a reality. We have both liberties to preserve \u2014 our individual liberty and our social liberty. That is, we must have a judicious mixture of both. I shall not permit any authority to say that my child must go to this school or that, shall specialise in science or arts. These things are personal. But if I say that my child shall have no education at all, then society will firmly tell me that my child must have education whether I like it or not.\n**The most suitable title of the passage would be:**", "options": [{"id": "1", "text": "The Policeman at cross roads"}, {"id": "2", "text": "The Road Laws"}, {"id": "3", "text": "Importance of Liberty"}, {"id": "4", "text": "The Children's Rights"}], "correctAnswer": "3", "explanation": "\ud83d\udd11 Key Concept\n- The entire passage is a philosophical discussion on **LIBERTY** \u2014 its types, preservation, and balance\n- The policeman, the road crossing, the child's education = all illustrate different dimensions of **liberty**\n- The central argument: how to preserve liberty meaningfully through judicious curtailment\n- \"Importance of Liberty\" captures the THEME of the passage \u2014 the others capture only sub-examples\n**\ud83d\udccc Related Concepts**\n- Title selection: Best title = reflects CENTRAL THEME, not specific examples or sub-arguments\n- Trap: Option 1 \"Policeman at crossroads\" describes only one example; Option 4 \"Children's Rights\" = only one paragraph", "id": 50}]};

        marked.setOptions({ breaks: true, gfm: true });

        const mathExtension = {
            name: 'math',
            level: 'inline',
            start(src) { return src.indexOf('$'); },
            tokenizer(src, tokens) {
                const blockRule = /^\$\$(.*?)\$\$/s;
                const inlineRule = /^\$([^$\n]+)\$/;
                let match;
                if ((match = blockRule.exec(src))) {
                    return { type: 'math', raw: match[0], text: match[1], displayMode: true };
                } else if ((match = inlineRule.exec(src))) {
                    return { type: 'math', raw: match[0], text: match[1], displayMode: false };
                }
            },
            renderer(token) {
                const safeText = token.text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                return token.displayMode ? `$$${safeText}$$` : `$${safeText}$`;
            }
        };
        marked.use({ extensions: [mathExtension] });

        const Icons = {
            Menu: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>,
            User: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            Alert: () => <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ef4444" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>,
            Printer: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>,
            Info: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>,
            Pause: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>,
            Play: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        };

        const DonutChart = ({ percentage, color, label }) => (
            <div className="flex flex-col items-center print-break-avoid">
                <svg viewBox="0 0 36 36" className="circular-chart w-28 h-28 mb-3">
                    <path className="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    <path className="circle" stroke={color} strokeDasharray={`${percentage}, 100`} d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    <text x="18" y="20.5" textAnchor="middle" className="text-3xl font-black fill-slate-800" style={{fontSize: "9px"}}>{percentage}%</text>
                </svg>
                <span className="font-bold text-slate-500 uppercase tracking-widest text-xs">{label}</span>
            </div>
        );

        const App = () => {
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [answers, setAnswers] = useState({}); 
            const [status, setStatus] = useState({});   
            const [timeLeft, setTimeLeft] = useState(TEST_DATA.durationMinutes * 60);
            const [isSubmitted, setIsSubmitted] = useState(false);
            const [isPaletteOpen, setIsPaletteOpen] = useState(false);
            const [isPaused, setIsPaused] = useState(false); 
            const [warnings, setWarnings] = useState(0);
            const [showWarning, setShowWarning] = useState(false);

            useEffect(() => {
                if (window.MathJax && window.MathJax.typesetPromise) {
                    window.MathJax.typesetPromise().catch((err) => console.log('MathJax error: ', err));
                }
            });

            useEffect(() => {
                if (!TEST_DATA.strictMode || isSubmitted) return;
                const handleVisibility = () => {
                    if (document.hidden) {
                        setWarnings(w => w + 1);
                        setShowWarning(true);
                    }
                };
                document.addEventListener("visibilitychange", handleVisibility);
                return () => document.removeEventListener("visibilitychange", handleVisibility);
            }, [isSubmitted]);

            useEffect(() => {
                if (isSubmitted || isPaused) return; 
                const timer = setInterval(() => {
                    setTimeLeft(prev => {
                        if (prev <= 0) { handleSubmit(true); return 0; }
                        return prev - 1;
                    });
                }, 1000);
                return () => clearInterval(timer);
            }, [isSubmitted, isPaused]); 

            const formatTime = (seconds) => {
                const h = Math.floor(seconds / 3600);
                const m = Math.floor((seconds % 3600) / 60);
                const s = seconds % 60;
                return `${h > 0 ? h + ':' : ''}${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            };

            const advanceQuestion = () => {
                if (currentQIndex < TEST_DATA.questions.length - 1) {
                    const nextQ = TEST_DATA.questions[currentQIndex + 1];
                    if (status[nextQ.id] === 'not_visited') setStatus(prev => ({ ...prev, [nextQ.id]: 'not_answered' }));
                    setCurrentQIndex(prev => prev + 1);
                }
            };

            const handleOptionSelect = (optId) => {
                if(isPaused) return;
                setAnswers(prev => ({ ...prev, [TEST_DATA.questions[currentQIndex].id]: optId }));
            };

            const handleSaveAndNext = () => {
                if(isPaused) return;
                const cid = TEST_DATA.questions[currentQIndex].id;
                setStatus(prev => ({ ...prev, [cid]: answers[cid] ? 'answered' : 'not_answered' }));
                advanceQuestion();
            };

            const handleMarkForReview = () => {
                if(isPaused) return;
                const cid = TEST_DATA.questions[currentQIndex].id;
                setStatus(prev => ({ ...prev, [cid]: answers[cid] ? 'marked_answered' : 'marked' }));
                advanceQuestion();
            };

            const handleClearResponse = () => {
                if(isPaused) return;
                const cid = TEST_DATA.questions[currentQIndex].id;
                setAnswers(prev => { const newAns = { ...prev }; delete newAns[cid]; return newAns; });
                setStatus(prev => ({ ...prev, [cid]: 'not_answered' }));
            };

            const handlePaletteClick = (index) => {
                if(isPaused) return;
                const cid = TEST_DATA.questions[currentQIndex].id;
                if (status[cid] === 'not_visited' || (status[cid] === 'not_answered' && !answers[cid])) {
                    setStatus(prev => ({ ...prev, [cid]: 'not_answered' }));
                }
                const tid = TEST_DATA.questions[index].id;
                if (status[tid] === 'not_visited') setStatus(prev => ({ ...prev, [tid]: 'not_answered' }));
                setCurrentQIndex(index);
                setIsPaletteOpen(false); 
            };

            const handleSubmit = (auto = false) => {
                if (auto || confirm("Are you sure you want to submit the test? No changes can be made after submission.")) {
                    setIsSubmitted(true);
                    setIsPaused(false);
                }
            };

            const counts = useMemo(() => {
                const c = { answered: 0, not_answered: 0, marked: 0, marked_answered: 0, not_visited: 0 };
                Object.values(status).forEach(s => { if (c[s] !== undefined) c[s]++; });
                return c;
            }, [status]);

            if (isSubmitted) {
                let score = 0, correct = 0, wrong = 0;
                TEST_DATA.questions.forEach(q => {
                    if (answers[q.id] === q.correctAnswer) { score += TEST_DATA.marksForCorrect; correct++; } 
                    else if (answers[q.id]) { score -= TEST_DATA.marksForWrong; wrong++; }
                });

                const attempted = correct + wrong;
                const accuracy = attempted > 0 ? Math.round((correct / attempted) * 100) : 0;
                const percentage = Math.max(0, Math.round((score / TEST_DATA.totalMarks) * 100));
                const isPass = percentage >= TEST_DATA.passPercentage;

                return (
                    <div className="h-full overflow-y-auto p-4 md:p-8 print:p-0 bg-slate-50 print:bg-white print:h-auto print:overflow-visible">
                        <div className="max-w-5xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100 print-border-none print:shadow-none">
                            <div className="bg-blue-600 text-white p-10 relative print:text-slate-900 print:bg-white print:border-b-2 print:border-slate-300 print:p-0 print:mb-8">
                                <div className="absolute top-0 right-0 w-64 h-64 bg-white opacity-5 rounded-full -mt-20 -mr-20 blur-2xl print-hidden"></div>
                                <div className="flex flex-col md:flex-row justify-between items-center gap-6 relative z-10 print:flex-row print:items-start">
                                    <div className="text-center md:text-left">
                                        <h1 className="text-4xl font-extrabold mb-2 tracking-tight">Performance Report</h1>
                                        <p className="opacity-90 font-semibold text-lg">{TEST_DATA.title}</p>
                                        <p className="opacity-70 text-sm mt-1">{TEST_DATA.organization}</p>
                                    </div>
                                    <div className="flex gap-6 items-center">
                                        <div className={`px-6 py-4 rounded-2xl border-2 backdrop-blur-md print:border-2 print:bg-transparent flex items-center justify-between gap-6 min-w-[200px] ${isPass ? 'bg-green-500/20 border-green-400 print:border-green-600 print:text-green-700' : 'bg-red-500/20 border-red-400 print:border-red-600 print:text-red-700'}`}>
                                            <div className="text-left">
                                                <div className="text-[10px] uppercase tracking-widest font-bold opacity-80 mb-0.5">Final Status</div>
                                                <div className="text-2xl font-black leading-none">{isPass ? 'PASSED' : 'FAILED'}</div>
                                            </div>
                                            <div className="text-4xl leading-none">{isPass ? '🎉' : '❌'}</div>
                                        </div>
                                    </div>
                                </div>
                                <button onClick={() => window.print()} className="print-hidden absolute right-6 top-6 bg-white/20 hover:bg-white/30 text-white px-5 py-2.5 rounded-full font-bold transition shadow-lg backdrop-blur-sm flex items-center gap-2">
                                    <Icons.Printer/> Save PDF
                                </button>
                            </div>

                            <div className="p-10 grid grid-cols-1 md:grid-cols-3 gap-8 border-b border-slate-100 bg-slate-50/50 print:bg-white print:border-b-0 print-break-avoid">
                                <DonutChart percentage={percentage} color="#2563eb" label="Score Percentage" />
                                <DonutChart percentage={accuracy} color="#10b981" label="Accuracy" />
                                <div className="flex flex-col justify-center space-y-4">
                                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center print:border-slate-300">
                                        <span className="text-slate-500 font-bold">Total Marks</span>
                                        <span className="text-3xl font-black text-blue-600">{score} <span className="text-lg text-slate-400 font-bold">/ {TEST_DATA.totalMarks}</span></span>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-green-50 p-4 rounded-2xl border border-green-100 text-center print:border-slate-300 print:bg-white">
                                            <div className="text-green-600 text-3xl font-black">{correct}</div>
                                            <div className="text-xs font-bold text-green-700 uppercase mt-1">Correct</div>
                                        </div>
                                        <div className="bg-red-50 p-4 rounded-2xl border border-red-100 text-center print:border-slate-300 print:bg-white">
                                            <div className="text-red-600 text-3xl font-black">{wrong}</div>
                                            <div className="text-xs font-bold text-red-700 uppercase mt-1">Wrong</div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="p-6 md:p-10">
                                <h2 className="text-2xl font-extrabold text-slate-800 mb-8 flex items-center gap-3 border-b border-slate-200 pb-4">
                                    Detailed Solutions
                                </h2>
