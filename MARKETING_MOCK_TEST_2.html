    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const TEST_DATA = {"title": "MARKETING MOCK TEST 2", "organization": "ExamTym", "durationMinutes": 60, "totalMarks": 100.0, "marksForCorrect": 2.0, "marksForWrong": 0.0, "passPercentage": 40, "shuffle": false, "strictMode": false, "questions": [{"question": "\nAccording to Theodore Levitt\u2019s concept of \"Marketing Myopia,\" a company is most likely to fail if it:", "options": [{"id": "1", "text": "Rapidly diversifies into unrelated markets without adequate portfolio analysis"}, {"id": "2", "text": "Defines its business in terms of the physical product rather than the underlying customer need"}, {"id": "3", "text": "Focuses excessively on customer needs rather than product quality and engineering"}, {"id": "4", "text": "Relies strictly on value-based pricing instead of cost-based pricing"}], "correctAnswer": "2", "explanation": "Key Concept:\nIntroduced by Theodore Levitt in his classic 1960 Harvard Business Review article.\nRefers to a short-sighted, inward-looking approach to strategic marketing.\nOccurs when a firm becomes product-oriented rather than customer-oriented, ignoring changing consumer needs.\nClassic example: Railway companies declining because they assumed they were in the 'train' business, not the 'transportation' business.\nRelated Concepts:\nThe Product Concept vs. The Marketing Concept.\nStrategic, market-oriented corporate mission statements.", "id": 1}, {"question": "\nGiven below are two statements regarding marketing philosophies:\nStatement I: The Selling Concept takes an \"outside-in\" perspective, starting with a well-defined market and focusing on customer needs.\nStatement II: The Societal Marketing Concept questions whether satisfying consumer short-term wants is always aligned with society's long-run welfare.\nIdentify the correct option:", "options": [{"id": "1", "text": "Both Statement I and Statement II are true"}, {"id": "2", "text": "Both Statement I and Statement II are false"}, {"id": "3", "text": "Statement I is true but Statement II is false"}, {"id": "4", "text": "Statement I is false but Statement II is true"}], "correctAnswer": "4", "explanation": "Key Concept:\nThe Selling Concept relies on an \"inside-out\" perspective, focusing on clearing factory inventory through aggressive promotion.\nThe Marketing Concept is the one that utilizes the \"outside-in\" perspective to satisfy target market needs.\nThe Societal Marketing Concept adds a third dimension to the marketing concept: society's long-term well-being.\nIt balances company profits, consumer wants, and environmental/social health.\nRelated Concepts:\nEvolution of Marketing Philosophies.\nSustainable Marketing and Green Marketing.", "id": 2}, {"question": "\nMatch the Marketing Scholars (List I) with their corresponding contributions (List II):\nList I\n(a) Neil Borden\n(b) E. Jerome McCarthy\n(c) Booms and Bitner\n(d) Kevin Lane Keller\n(i) Formalized the 4Ps of the Marketing Mix\n(ii) Expanded the Marketing Mix to 7Ps for Services\n(iii) Coined the term \"Marketing Mix\"\n(iv) Popularized Points-of-Parity (POP) and Points-of-Difference (POD)", "options": [{"id": "1", "text": "(a)-(iii), (b)-(i), (c)-(ii), (d)-(iv)"}, {"id": "2", "text": "(a)-(i), (b)-(iii), (c)-(ii), (d)-(iv)"}, {"id": "3", "text": "(a)-(iii), (b)-(ii), (c)-(i), (d)-(iv)"}, {"id": "4", "text": "(a)-(ii), (b)-(iv), (c)-(i), (d)-(iii)"}], "correctAnswer": "1", "explanation": "Key Concept:\nNeil Borden originally coined the term \"Marketing Mix\" in 1953, describing the marketer as a \"mixer of ingredients.\"\nE. Jerome McCarthy grouped these ingredients into the definitive 4Ps (Product, Price, Place, Promotion) in 1960.\nBooms and Bitner (1981) recognized the intangibility of services and added People, Process, and Physical Evidence to create the 7Ps.\nKevin Lane Keller formulated the framework for brand positioning using POP and POD.\nRelated Concepts:\nThe 4Cs of Marketing (Robert Lauterborn).\nMarket Positioning strategies.", "id": 3}, {"question": "\nRead the following Assertion (A) and Reason (R):\nAssertion (A): In the BCG Matrix, 'Cash Cows' generate more cash than they consume and are typically used to fund other SBUs.\nReason (R): Cash Cows operate in high-growth markets and command a high relative market share, requiring massive ongoing investments.", "options": [{"id": "1", "text": "Both (A) and (R) are true and (R) is the correct explanation of (A)"}, {"id": "2", "text": "Both (A) and (R) are true but (R) is NOT the correct explanation of (A)"}, {"id": "3", "text": "(A) is true but (R) is false"}, {"id": "4", "text": "(A) is false but (R) is true"}], "correctAnswer": "3", "explanation": "Key Concept:\nThe BCG Growth-Share Matrix classifies SBUs based on Market Growth Rate (Y-axis) and Relative Market Share (X-axis).\nCash Cows have a high relative market share in a low-growth market, meaning they require minimal investment to maintain.\nBecause they dominate mature markets, they generate a massive surplus of cash used to fund 'Stars' and 'Question Marks'.\nReason (R) describes a 'Star', not a 'Cash Cow', making it a false statement.\nRelated Concepts:\nPortfolio Analysis and Strategic Business Units (SBUs).\nBuild, Hold, Harvest, and Divest strategies.", "id": 4}, {"question": "\nIf an Indian FMCG company decides to introduce a completely new line of organic health supplements to its existing urban consumer base, which strategy of the Ansoff Matrix is it executing?", "options": [{"id": "1", "text": "Market Penetration"}, {"id": "2", "text": "Market Development"}, {"id": "3", "text": "Product Development"}, {"id": "4", "text": "Diversification"}], "correctAnswer": "3", "explanation": "Key Concept:\nAnsoff's Product-Market Expansion Grid evaluates future growth opportunities across two variables: Markets and Products.\nProduct Development involves creating new or modified products to sell to the company's existing market segments.\nThe company already serves the urban consumer base (Existing Market) but is introducing health supplements (New Product).\nThis carries medium risk compared to diversification, as the firm already understands the consumer base.\nRelated Concepts:\nMarket Penetration (Existing Product / Existing Market).\nDiversification (New Product / New Market).", "id": 5}, {"question": "\nAccording to Michael Porter's Generic Strategies, a firm that targets a broad market and aims to achieve the lowest production and distribution costs is pursuing a strategy of:", "options": [{"id": "1", "text": "Cost Focus"}, {"id": "2", "text": "Differentiation"}, {"id": "3", "text": "Cost Leadership"}, {"id": "4", "text": "Differentiation Focus"}], "correctAnswer": "3", "explanation": "Key Concept:\nMichael Porter argued that a firm must choose a clear strategic positioning to gain a competitive advantage.\nCost Leadership involves operating across a broad target market while maintaining the lowest cost structure in the industry.\nThis allows the firm to price lower than competitors and still generate high volume profits (e.g., Walmart, D-Mart).\nFirms failing to choose between cost and differentiation end up \"stuck in the middle.\"\nRelated Concepts:\nFocus Strategy (Niche market targeting).\nValue Chain Analysis for cost reduction.", "id": 6}, {"question": "\nArrange the standard steps of the Target Market Selection and Strategy (STP) process in their correct sequential order:\n(I) Evaluating the attractiveness of each segment.\n(II) Developing the marketing mix (4Ps) for the targeted segment.\n(III) Identifying distinct groups of buyers with varying needs (Bases of segmentation).\n(IV) Selecting one or more market segments to enter.\n(V) Establishing the brand's distinctive place in the mind of the consumer.", "options": [{"id": "1", "text": "(III), (I), (V), (IV), (II)"}, {"id": "2", "text": "(III), (I), (IV), (V), (II)"}, {"id": "3", "text": "(I), (III), (IV), (V), (II)"}, {"id": "4", "text": "(III), (IV), (I), (V), (II)"}], "correctAnswer": "2", "explanation": "Key Concept:\nThe STP framework is a strictly sequential, three-step macro process for market alignment.\nStep 1: Segmentation involves identifying the bases to divide the market into distinct groups (III).\nStep 2: Targeting involves evaluating segment attractiveness (I) and then selecting the segments to enter (IV).\nStep 3: Positioning involves establishing the brand's image in the consumer's mind (V), followed by tactical execution via the 4Ps (II).\nRelated Concepts:\nTarget Market Selection Patterns (Abell).\nBases of Market Segmentation.", "id": 7}, {"question": "\nWhich of the following segmentation variables is an example of \"Psychographic Segmentation\"?", "options": [{"id": "1", "text": "Age and Life-cycle stage"}, {"id": "2", "text": "Geographic density (Urban/Rural)"}, {"id": "3", "text": "Lifestyle and Personality traits"}, {"id": "4", "text": "Brand Loyalty status"}], "correctAnswer": "3", "explanation": "Key Concept:\nMarket segmentation divides broad markets into actionable subgroups based on shared characteristics.\nPsychographic segmentation looks at the psychological aspects of consumer behavior.\nIt primarily utilizes AIO dimensions (Activities, Interests, and Opinions) to map out consumer Lifestyles, Social Class, and Personality traits.\nUnlike demographics, which provide statistical data, psychographics explain why consumers buy.\nRelated Concepts:\nDemographic Segmentation (Age, Income, Gender).\nBehavioral Segmentation (Usage rate, Loyalty status).", "id": 8}, {"question": "\nGiven below are two statements regarding brand positioning:\nStatement I: Points-of-Difference (PODs) are attributes that are shared with competing brands to negate their competitive advantage.\nStatement II: Points-of-Parity (POPs) are attributes that consumers strongly associate with a specific brand and believe they cannot find to the same extent with a competing brand.\nIdentify the correct option:", "options": [{"id": "1", "text": "Both Statement I and Statement II are true"}, {"id": "2", "text": "Both Statement I and Statement II are false"}, {"id": "3", "text": "Statement I is true but Statement II is false"}, {"id": "4", "text": "Statement I is false but Statement II is true"}], "correctAnswer": "2", "explanation": "Key Concept:\nKevin Lane Keller established these two crucial dimensions for defining a competitive frame of reference.\nPoints-of-Difference (PODs) are unique, desirable attributes that set a brand apart from its competitors (Statement I is false).\nPoints-of-Parity (POPs) are shared, \"must-have\" attributes necessary for a brand to even be considered in a specific category (Statement II is false).\nA brand must establish POPs to neutralize competitors before heavily promoting its unique PODs.\nRelated Concepts:\nBrand Equity Framework.\nPerceptual mapping in positioning.", "id": 9}, {"question": "\nA hotel provides a comfortable bed, a clean bathroom, and fresh towels. Under Philip Kotler's \"Levels of a Product\" model, this physical manifestation represents the:", "options": [{"id": "1", "text": "Core Customer Value"}, {"id": "2", "text": "Actual Product"}, {"id": "3", "text": "Potential Product"}, {"id": "4", "text": "Augmented Product"}], "correctAnswer": "2", "explanation": "Key Concept:\nPhilip Kotler defined a product in layers, moving from abstract needs to tangible offerings.\nThe \"Core Customer Value\" is the fundamental need being fulfilled (e.g., the need for rest and sleep).\nThe \"Actual Product\" is the physical item or direct service that delivers the core value (the bed, the room, the towels, the brand name).\nThe \"Augmented Product\" includes additional, non-essential consumer services that exceed basic expectations (e.g., a free spa voucher).\nRelated Concepts:\nThe Five Product Levels (Core, Basic, Expected, Augmented, Potential).\nProduct Mix vs. Product Line.", "id": 10}, {"question": "\nIf Hindustan Unilever (HUL) sells multiple brands like Surf Excel, Rin, and Wheel under its 'Detergents' category, the total number of these brands refers to the ________ of the product mix.", "options": [{"id": "1", "text": "Width"}, {"id": "2", "text": "Length"}, {"id": "3", "text": "Depth"}, {"id": "4", "text": "Consistency"}], "correctAnswer": "2", "explanation": "Key Concept:\nA company's product mix (assortment) has four vital, measurable dimensions.\nWidth refers to the number of entirely different product categories (e.g., Soaps, Detergents, Foods).\nLength refers to the total number of items or brands carried within a specific product line (e.g., Surf, Rin, Wheel).\nDepth refers to the number of variants (sizes, flavors, formulations) offered for each individual product brand.\nRelated Concepts:\nProduct Line Stretching (Upward/Downward).\nProduct Line Filling.", "id": 11}, {"question": "\nRead the following Assertion (A) and Reason (R):\nAssertion (A): In the Maturity stage of the Product Life Cycle (PLC), companies primarily focus on creating basic product awareness and trial.\nReason (R): The Maturity stage is characterized by peak sales, saturated markets, and intense competition, prompting companies to engage in market and product modification.", "options": [{"id": "1", "text": "Both (A) and (R) are true and (R) is the correct explanation of (A)"}, {"id": "2", "text": "Both (A) and (R) are true but (R) is NOT the correct explanation of (A)"}, {"id": "3", "text": "(A) is true but (R) is false"}, {"id": "4", "text": "(A) is false but (R) is true"}], "correctAnswer": "4", "explanation": "Key Concept:\nThe Product Life Cycle (PLC) dictates different marketing objectives for each of its four stages.\nAssertion (A) is false because creating basic product awareness and encouraging trial is the primary objective of the Introduction stage.\nReason (R) is true; the Maturity stage is the longest phase, marked by saturated demand and fierce competition to defend market share.\nTo survive maturity, firms use strategies like Market Modification (finding new users) and Product Modification (adding features).\nRelated Concepts:\nPromotional objectives (Inform, Persuade, Remind).\nPricing strategies across the PLC.", "id": 12}, {"question": "\nWhich of the following exceptions to the standard Product Life Cycle represents a basic and distinctive mode of expression that experiences several periods of renewed interest over decades (forming a wavy curve)?", "options": [{"id": "1", "text": "Fad"}, {"id": "2", "text": "Fashion"}, {"id": "3", "text": "Style"}, {"id": "4", "text": "Augmented Product"}], "correctAnswer": "3", "explanation": "Key Concept:\nNot all products follow the classic bell-shaped PLC curve; trends vary significantly based on consumer sociology.\nA Style is a basic and distinctive mode of expression (like formal wear or art deco) that cycles in and out of popularity over long periods, creating a wavy curve.\nA Fashion is a currently accepted popular style that grows slowly, peaks, and declines slowly (a standard bell curve).\nA Fad is a temporary period of unusually high sales that spikes rapidly and drops instantly.\nRelated Concepts:\nConsumer lifestyle trends.\nProduct Life Cycle analysis.", "id": 13}, {"question": "\nArrange the following core stages of the New Product Development (NPD) process in the correct chronological order:\n(I) Business Analysis\n(II) Concept Development and Testing\n(III) Idea Screening\n(IV) Commercialization\n(V) Product Development", "options": [{"id": "1", "text": "(III), (I), (II), (V), (IV)"}, {"id": "2", "text": "(III), (II), (I), (V), (IV)"}, {"id": "3", "text": "(II), (III), (I), (V), (IV)"}, {"id": "4", "text": "(III), (II), (V), (I), (IV)"}], "correctAnswer": "2", "explanation": "Key Concept:\nThe NPD process (formalized by Booz, Allen, & Hamilton) consists of 8 sequential steps to mitigate the high failure rate of new products.\nIt begins with Idea Generation, followed by Idea Screening (III) to drop bad ideas early.\nThe idea is then turned into a testable concept (II), leading to a marketing strategy plan.\nBefore building the actual item, the firm checks the math in Business Analysis (I). If viable, physical Product Development (V) begins, ending with Full Commercialization (IV).\nRelated Concepts:\nTest Marketing formats (Standard, Controlled, Simulated).\nCrowdsourcing in Idea Generation.", "id": 14}, {"question": "\nAccording to Everett Rogers' Diffusion of Innovation Theory, which group of consumers makes up 34% of the market, adopts new ideas before the average person, but are rarely opinion leaders?", "options": [{"id": "1", "text": "Innovators"}, {"id": "2", "text": "Early Adopters"}, {"id": "3", "text": "Early Majority"}, {"id": "4", "text": "Late Majority"}], "correctAnswer": "3", "explanation": "Key Concept:\nRogers' theory classifies consumers into five categories based on their readiness to adopt new products, forming a normal distribution.\nThe Early Majority (34%) are deliberate buyers who bridge the gap from early adoption to mass-market acceptance but rely on the guidance of opinion leaders.\nThe Early Adopters (13.5%) are the actual opinion leaders in their communities.\nThe Innovators (2.5%) are venturesome risk-takers who try products first, regardless of social validation.\nRelated Concepts:\nLate Majority (Skeptical buyers).\nCharacteristics influencing adoption rate (Relative Advantage, Complexity).", "id": 15}, {"question": "\nMatch the Pricing Strategies (List I) with their correct descriptions (List II):\nList I\n(a) Market-Skimming Pricing\n(b) Market-Penetration Pricing\n(c) Captive-Product Pricing\n(d) Loss-Leader Pricing\n(i) Setting a low initial price to rapidly capture high market share.\n(ii) Temporarily pricing below cost to stimulate store traffic.\n(iii) Setting a high initial price to maximize short-term profit margins.\n(iv) Pricing main products low and setting high markups on necessary supplies.", "options": [{"id": "1", "text": "(a)-(iii), (b)-(i), (c)-(iv), (d)-(ii)"}, {"id": "2", "text": "(a)-(i), (b)-(iii), (c)-(iv), (d)-(ii)"}, {"id": "3", "text": "(a)-(iii), (b)-(ii), (c)-(i), (d)-(iv)"}, {"id": "4", "text": "(a)-(iv), (b)-(i), (c)-(ii), (d)-(iii)"}], "correctAnswer": "1", "explanation": "Key Concept:\nSkimming (iii) requires high barriers to entry and captures early adopters with high willingness to pay.\nPenetration (i) relies on highly elastic demand to drive massive volume.\nCaptive-Product (iv) is the \"razor and blades\" model, hooking consumers on a cheap primary unit to sell high-margin consumables.\nLoss-Leader (ii) is a promotional pricing tactic used by retailers to increase footfall.\nRelated Concepts:\nProduct Bundle Pricing.\nPsychological Pricing (Reference prices).", "id": 16}, {"question": "\nGiven below are two statements regarding pricing approaches:\nStatement I: Value-based pricing is a product-driven approach that starts by determining the cost of manufacturing and adds a standard markup.\nStatement II: Market-penetration pricing requires a highly price-elastic market and decreasing production costs as sales volume increases (economies of scale).\nIdentify the correct option:", "options": [{"id": "1", "text": "Both Statement I and Statement II are true"}, {"id": "2", "text": "Both Statement I and Statement II are false"}, {"id": "3", "text": "Statement I is true but Statement II is false"}, {"id": "4", "text": "Statement I is false but Statement II is true"}], "correctAnswer": "4", "explanation": "Key Concept:\nStatement I is false because Cost-based pricing is product-driven (factory \u2192 cost \u2192 price). Value-based pricing is customer-driven (customer needs \u2192 target value \u2192 acceptable cost).\nStatement II is perfectly true; Market-penetration demands that a lower price significantly boosts volume (elasticity) and that the resulting high volume drives down per-unit costs (economies of scale).\nPenetration also requires low prices to act as an entry barrier to competitors.\nValue pricing heavily relies on the consumer's perception of utility.\nRelated Concepts:\nPrice Elasticity of Demand.\nCompetition-based (Going-rate) pricing.", "id": 17}, {"question": "\nA channel arrangement where a manufacturer, wholesaler, and retailer act as a unified system under single ownership (e.g., Bata India) is termed as a:", "options": [{"id": "1", "text": "Contractual Vertical Marketing System"}, {"id": "2", "text": "Corporate Vertical Marketing System"}, {"id": "3", "text": "Administered Vertical Marketing System"}, {"id": "4", "text": "Horizontal Marketing System"}], "correctAnswer": "2", "explanation": "Key Concept:\nA Vertical Marketing System (VMS) integrates channel members to resolve conflict and maximize efficiency.\nA Corporate VMS combines successive stages of production and distribution under single ownership (e.g., Bata making shoes and selling them exclusively in Bata-owned stores).\nA Contractual VMS unites independent firms via legal agreements (e.g., Franchises like McDonald's).\nAn Administered VMS achieves coordination through the sheer power and size of one member (e.g., Walmart dictating terms to suppliers).\nRelated Concepts:\nConventional distribution channels.\nHorizontal Marketing Systems.", "id": 18}, {"question": "\nRead the following Assertion (A) and Reason (R):\nAssertion (A): Direct marketing is technically defined in distribution logic as a Zero-Level distribution channel.\nReason (R): Direct marketing bypasses all wholesalers and retailers, allowing the manufacturer to sell products directly to the final consumer.", "options": [{"id": "1", "text": "Both (A) and (R) are true and (R) is the correct explanation of (A)"}, {"id": "2", "text": "Both (A) and (R) are true but (R) is NOT the correct explanation of (A)"}, {"id": "3", "text": "(A) is true but (R) is false"}, {"id": "4", "text": "(A) is false but (R) is true"}], "correctAnswer": "1", "explanation": "Key Concept:\nA channel level is defined by the number of intermediary layers between the producer and the consumer.\nBecause Direct Marketing (e.g., D2C websites, telemarketing, direct mail) utilizes zero intermediaries, it is structurally a Zero-Level Channel (Assertion is true).\nThe removal of these intermediaries to connect directly with consumers (Disintermediation) is the exact functional logic that makes it zero-level (Reason perfectly explains Assertion).\nDirect marketing offers higher control and precise measurability of ROI.\nRelated Concepts:\nOne-Level and Two-Level consumer channels.\nOnline Marketing vs Direct Marketing.", "id": 19}, {"question": "\nWhich of the following scenarios is an example of Horizontal Channel Conflict?", "options": [{"id": "1", "text": "A manufacturer protesting against a wholesaler's high margins and poor promotional support."}, {"id": "2", "text": "Two authorized car dealers in the same city aggressively cutting prices to steal each other's customers."}, {"id": "3", "text": "Offline brick-and-mortar retailers complaining about heavy discounts offered on the brand's official D2C website."}, {"id": "4", "text": "A fast-food franchise owner refusing to follow the corporate menu guidelines set by the parent company."}], "correctAnswer": "2", "explanation": "Key Concept:\nChannel conflict arises from disagreements over goals, roles, and rewards within a distribution network.\nHorizontal conflict occurs among firms at the same hierarchical level of the channel (e.g., dealer fighting dealer, or retailer fighting retailer over geographic territory).\nOptions A and D describe Vertical conflict, occurring between different levels (manufacturer vs. wholesaler/franchisee).\nOption C describes Multichannel conflict, where a brand's direct channel undercuts its indirect channels.\nRelated Concepts:\nChannel Management Dynamics.\nDisintermediation friction.", "id": 20}, {"question": "\nWhich element of the promotion mix is characterized as an \"unpaid\" form of non-personal presentation that typically enjoys higher credibility among consumers than traditional advertising?", "options": [{"id": "1", "text": "Sales Promotion"}, {"id": "2", "text": "Personal Selling"}, {"id": "3", "text": "Direct Marketing"}, {"id": "4", "text": "Publicity (Public Relations)"}], "correctAnswer": "4", "explanation": "Key Concept:\nThe Promotion Mix consists of five distinct tactical tools.\nPublicity/PR relies on generating news coverage or media interest. It is distinctly \"unpaid\" (unlike advertising where space is bought).\nBecause the message appears as objective, third-party editorial content (like a journalist reviewing a car), consumers view it with much higher credibility than sponsored ads.\nHowever, the firm surrenders control over the exact narrative and timing to the media.\nRelated Concepts:\nAdvertising (Paid, Identified sponsor, Mass reach).\nIntegrated Marketing Communications (IMC).", "id": 21}, {"question": "\nMatch the Promotion Strategy concepts (List I) with their definitions (List II):\nList I\n(a) Push Strategy\n(b) Pull Strategy\n(c) Advertising\n(d) Sales Promotion\n(i) Directing marketing activities toward final consumers to induce them to demand the product.\n(ii) A paid, non-personal communication by an identified sponsor aiming for long-term brand building.\n(iii) Using the sales force and trade promotions to move the product through intermediaries to consumers.\n(iv) Short-term incentives to encourage an immediate purchase response.", "options": [{"id": "1", "text": "(a)-(iii), (b)-(i), (c)-(ii), (d)-(iv)"}, {"id": "2", "text": "(a)-(i), (b)-(iii), (c)-(ii), (d)-(iv)"}, {"id": "3", "text": "(a)-(iii), (b)-(i), (c)-(iv), (d)-(ii)"}, {"id": "4", "text": "(a)-(ii), (b)-(i), (c)-(iii), (d)-(iv)"}], "correctAnswer": "1", "explanation": "Key Concept:\nPush Strategy (iii) targets the distribution channel, offering margins and 'push money' so intermediaries aggressively sell the product.\nPull Strategy (i) targets the end consumer heavily, creating a demand vacuum that forces intermediaries to stock the product.\nAdvertising (ii) provides a reason to buy (long-term).\nSales Promotion (iv) provides an incentive to buy right now (short-term).\nRelated Concepts:\nTrade vs Consumer sales promotion tools.\nB2B (leans Push) vs B2C (leans Pull) promotional focus.", "id": 22}, {"question": "\nThe AIDA model, which outlines the sequential psychological states a consumer goes through when responding to a marketing message, stands for:", "options": [{"id": "1", "text": "Awareness, Interest, Decision, Action"}, {"id": "2", "text": "Attention, Interest, Desire, Action"}, {"id": "3", "text": "Awareness, Involvement, Desire, Action"}, {"id": "4", "text": "Attention, Interest, Demonstration, Action"}], "correctAnswer": "2", "explanation": "Key Concept:\nDeveloped by E. St. Elmo Lewis in 1898, the AIDA model is a foundational hierarchy of effects model.\nIt maps the cognitive (thinking), affective (feeling), and behavioral (doing) stages.\nThe exact sequence is to first grab Attention, then hold Interest, arouse emotional Desire, and finally prompt physical Action.\nNTA frequently creates traps by replacing \"Attention\" with \"Awareness\" or \"Desire\" with \"Decision\".\nRelated Concepts:\nThe DAGMAR Approach.\nAdvertising communication objectives.", "id": 23}, {"question": "\nArrange the following steps of the Personal Selling process in the correct chronological order:\n(I) Pre-approach\n(II) Closing\n(III) Prospecting and Qualifying\n(IV) Handling Objections\n(V) Presentation and Demonstration", "options": [{"id": "1", "text": "(III), (I), (V), (IV), (II)"}, {"id": "2", "text": "(I), (III), (V), (IV), (II)"}, {"id": "3", "text": "(III), (V), (I), (IV), (II)"}, {"id": "4", "text": "(III), (I), (IV), (V), (II)"}], "correctAnswer": "1", "explanation": "Key Concept:\nPersonal Selling involves a highly structured, 7-step interactive process to build relationships and secure sales.\nStep 1: Prospecting (III) - Identifying viable leads.\nStep 2: Pre-approach (I) - Doing background research before the first meeting.\nSteps 3-5: Approach, Presentation (V), and Handling Objections (IV).\nSteps 6-7: Closing the sale (II) and ultimately Follow-up.\nRelated Concepts:\nCost per contact in promotion mix elements.\nB2B marketing communication dynamics.", "id": 24}, {"question": "\nAccording to Russell Colley's DAGMAR approach, advertising goals should focus on specific communication tasks rather than raw sales metrics. Which of the following is the correct sequence of the DAGMAR communication process?", "options": [{"id": "1", "text": "Attention \u2192 Interest \u2192 Desire \u2192 Action"}, {"id": "2", "text": "Awareness \u2192 Comprehension \u2192 Conviction \u2192 Action"}, {"id": "3", "text": "Need \u2192 Search \u2192 Evaluation \u2192 Purchase"}, {"id": "4", "text": "Exposure \u2192 Reception \u2192 Response \u2192 Behavior"}], "correctAnswer": "2", "explanation": "Key Concept:\nDAGMAR stands for Defining Advertising Goals for Measured Advertising Results (Russell Colley, 1961).\nColley argued that sales are influenced by the entire marketing mix (Price, Place, Product), so advertising must be judged purely on communication objectives.\nThe model dictates the ACCA hierarchy: creating Awareness, ensuring Comprehension of benefits, building mental Conviction, and leading to final Action.\nIt requires goals to be specific, measurable, and time-bound.\nRelated Concepts:\nThe AIDA Model comparison.\nIntegrated Marketing Communications (IMC).", "id": 25}, {"question": "\nGiven below are two statements regarding consumer behavior:\nStatement I: Selective distortion is a psychological perception variable where people interpret information in a way that supports their pre-existing beliefs.\nStatement II: Social classes are relatively permanent divisions in a society whose members share similar values, and they are determined exclusively by annual income levels.\nIdentify the correct option:", "options": [{"id": "1", "text": "Both Statement I and Statement II are true"}, {"id": "2", "text": "Both Statement I and Statement II are false"}, {"id": "3", "text": "Statement I is true but Statement II is false"}, {"id": "4", "text": "Statement I is false but Statement II is true"}], "correctAnswer": "3", "explanation": "Key Concept:\nStatement I correctly defines Selective Distortion, which, along with selective attention and selective retention, governs human perception (Psychological factor).\nStatement II is false because Social Class (a Cultural factor) is determined by a complex combination of multiple variables.\nThese variables include occupation, education, wealth, and family background\u2014not solely by annual income.\nSocial classes exhibit distinct product and brand preferences across categories like clothing and leisure.\nRelated Concepts:\nSubcultures in Consumer Behavior.\nPersonal Factors (Lifestyle, Occupation).", "id": 26}, {"question": "\nLeon Festinger's theory of \"Cognitive Dissonance\" primarily occurs during which stage of the consumer buying decision process?", "options": [{"id": "1", "text": "Need Recognition"}, {"id": "2", "text": "Evaluation of Alternatives"}, {"id": "3", "text": "Purchase Decision"}, {"id": "4", "text": "Post-Purchase Behavior"}], "correctAnswer": "4", "explanation": "Key Concept:\nThe consumer buying process concludes with Post-Purchase Behavior, where the buyer compares expected performance with perceived performance.\nCognitive Dissonance (Leon Festinger, 1957) is the psychological tension, anxiety, or regret a consumer feels after making a difficult purchase decision.\nIt stems from acquiring the drawbacks of the chosen brand while losing the benefits of the rejected brands.\nMarketers send follow-up emails, welcome kits, and warranties to reassure buyers and minimize this dissonance.\nRelated Concepts:\nThe 5-Stage Consumer Buying Decision Process.\nCustomer Satisfaction and Retention.", "id": 27}, {"question": "\nWhich comprehensive consumer behavior model focuses heavily on three specific levels of learning (Extensive Problem Solving, Limited Problem Solving, and Routinized Response Behavior) and categorizes variables into Inputs, Constructs, Outputs, and Exogenous factors?", "options": [{"id": "1", "text": "Nicosia Model"}, {"id": "2", "text": "Howard-Sheth Model"}, {"id": "3", "text": "Engel-Kollat-Blackwell (EKB) Model"}, {"id": "4", "text": "Maslow's Motivation Model"}], "correctAnswer": "2", "explanation": "Key Concept:\nAdvanced Consumer Behavior models try to map the complex interaction of variables inside the consumer's mind.\nThe Howard-Sheth Model (1969) is uniquely identifiable by its four structural elements: Inputs (stimuli), Perceptual/Learning Constructs (internal processing), Outputs (purchase intent), and Exogenous Variables.\nIt explicitly categorizes consumer decision-making into three learning tiers based on the complexity of the purchase.\nThe Nicosia model, by contrast, focuses on a circular communication flowchart between the firm and consumer.\nRelated Concepts:\nNicosia Model (Four fields).\nEKB Model (Information processing focus).", "id": 28}, {"question": "\nRead the following Assertion (A) and Reason (R):\nAssertion (A): In services marketing, the challenge of 'Inseparability' is primarily solved by standardizing service procedures and implementing rigorous employee training programs.\nReason (R): Inseparability means that a service cannot be separated from its provider, making the direct provider-client interaction a critical determinant of perceived service quality.", "options": [{"id": "1", "text": "Both (A) and (R) are true and (R) is the correct explanation of (A)"}, {"id": "2", "text": "Both (A) and (R) are true but (R) is NOT the correct explanation of (A)"}, {"id": "3", "text": "(A) is true but (R) is false"}, {"id": "4", "text": "(A) is false but (R) is true"}], "correctAnswer": "4", "explanation": "Key Concept:\nServices have four unique characteristics: Intangibility, Inseparability, Inconsistency (Variability), and Inventory (Perishability).\nReason (R) accurately defines Inseparability. The service provider and consumer must be present together.\nAssertion (A) is false because standardization and rigorous employee training are strategies used to mitigate Inconsistency (the reality that service quality varies heavily depending on who provides it and when), not Inseparability.\nInseparability is usually managed by expanding provider networks or utilizing self-service technology.\nRelated Concepts:\nIntangibility (managed by adding physical evidence).\nPerishability (managed by differential pricing).", "id": 29}, {"question": "\nMatch the SERVQUAL (RATER) dimensions (List I) with their correct practical descriptions (List II):\nList I\n(a) Reliability\n(b) Assurance\n(c) Tangibles\n(d) Empathy\n(i) The appearance of physical facilities, equipment, and staff uniforms.\n(ii) Caring, individualized, and customized attention provided to customers.\n(iii) The ability to perform the promised service dependably, accurately, and right the first time.\n(iv) The knowledge and courtesy of employees and their ability to convey trust and confidence.", "options": [{"id": "1", "text": "(a)-(iii), (b)-(iv), (c)-(i), (d)-(ii)"}, {"id": "2", "text": "(a)-(iv), (b)-(iii), (c)-(ii), (d)-(i)"}, {"id": "3", "text": "(a)-(iii), (b)-(i), (c)-(iv), (d)-(ii)"}, {"id": "4", "text": "(a)-(i), (b)-(iv), (c)-(iii), (d)-(ii)"}], "correctAnswer": "1", "explanation": "Key Concept:\nDeveloped by Parasuraman, Zeithaml, and Berry, SERVQUAL measures the gap between expected and perceived service using the RATER acronym.\nReliability (iii) is about consistency and accuracy.\nAssurance (iv) is about employee competence inspiring trust.\nTangibles (i) represent the physical evidence of the service.\nEmpathy (ii) requires understanding the customer's specific emotional/personal needs.\nRelated Concepts:\nThe Gaps Model of Service Quality.\nThe 7Ps of Services Marketing.", "id": 30}, {"question": "\nIn Parasuraman's \"Gaps Model of Service Quality,\" Gap 4 represents the specific discrepancy between:", "options": [{"id": "1", "text": "The overall expected service and the actual perceived service by the consumer."}, {"id": "2", "text": "Management perceptions of customer expectations and what customers actually expect."}, {"id": "3", "text": "The actual service delivery and what is communicated to the customer externally via advertising."}, {"id": "4", "text": "The theoretical service quality specifications and the actual physical service delivered."}], "correctAnswer": "3", "explanation": "Key Concept:\nThe Gaps Model identifies five areas where service quality can fail.\nGap 4 (Communication Gap) occurs when a firm over-promises in its external promotional campaigns, creating artificially high expectations that the operational team fails to deliver.\nGap 1 is the Knowledge Gap (Management misunderstands expectations).\nGap 3 is the Delivery Gap (Employees fail to meet established standards).\nGap 5 is the ultimate Customer Gap, representing the total accumulated failure of Gaps 1-4.\nRelated Concepts:\nSERVQUAL Application.\nIMC (Integrated Marketing Communications) consistency.", "id": 31}, {"question": "\nA multinational corporation packages its premium shampoo in highly affordable 50-paisa micro-sachets to generate massive sales volume among the poorest demographics in rural India. This strategic paradigm was famously articulated by C.K. Prahalad as:", "options": [{"id": "1", "text": "The Societal Marketing Concept"}, {"id": "2", "text": "Bottom of the Pyramid (BoP) Strategy"}, {"id": "3", "text": "Penetration De-marketing"}, {"id": "4", "text": "Micro-Niche Specialization"}], "correctAnswer": "2", "explanation": "Key Concept:\nC.K. Prahalad's \"Bottom of the Pyramid\" (BoP) approach argues that immense corporate profitability and poverty eradication can be achieved simultaneously.\nMNCs traditionally target the top of the economic pyramid, ignoring billions of low-income consumers.\nBy innovating distribution and packaging (e.g., single-use sachets), companies can tap into the massive aggregate purchasing power of the BoP.\nThe strategy relies on ultra-low profit margins multiplied by massive sales volume.\nRelated Concepts:\nRural Marketing Innovations.\nThe 4 As of Rural Marketing.", "id": 32}, {"question": "\nWhich of the following is NOT one of the \"4 As\" of Rural Marketing proposed by Prof. Jagdish Sheth to replace the traditional 4Ps?", "options": [{"id": "1", "text": "Affordability"}, {"id": "2", "text": "Awareness"}, {"id": "3", "text": "Advertising"}, {"id": "4", "text": "Acceptability"}], "correctAnswer": "3", "explanation": "Key Concept:\nProf. Jagdish Sheth proposed that the traditional 4Ps fail in rural India due to poor infrastructure, low literacy, and daily-wage economies.\nHe proposed the 4 As framework:\nAffordability (Priced for daily disposable income), Awareness (Reaching dark-media zones), Availability (Overcoming poor distribution roads), and Acceptability (Suiting the rural lifestyle).\nAdvertising is a component of the traditional 4Ps, not the 4 As framework.\nRelated Concepts:\nRural distribution challenges (Project Shakti).\nSachet marketing logic.", "id": 33}, {"question": "\nGiven below are two statements regarding emerging trends in marketing:\nStatement I: Greenwashing is an ethical corporate practice where a company transparently reports its sustainability metrics to the public to build trust.\nStatement II: Social marketing utilizes commercial marketing principles to influence behavior for societal benefit, such as nationwide anti-smoking campaigns.\nIdentify the correct option:", "options": [{"id": "1", "text": "Both Statement I and Statement II are true"}, {"id": "2", "text": "Both Statement I and Statement II are false"}, {"id": "3", "text": "Statement I is true but Statement II is false"}, {"id": "4", "text": "Statement I is false but Statement II is true"}], "correctAnswer": "4", "explanation": "Key Concept:\nStatement I is false; Greenwashing is a highly unethical and deceptive practice where companies make false or unsubstantiated claims about the environmental benefits of their products to exploit eco-conscious consumers.\nStatement II is factually accurate. Social Marketing (coined by Kotler and Zaltman) applies the 4Ps to \"sell\" a positive behavior to society.\nSocial Marketing must never be confused with Social Media Marketing (which uses digital platforms for commercial sales).\nRelated Concepts:\nSustainable and Green Marketing.\nSocietal Marketing Concept.", "id": 34}, {"question": "\nIn Customer Relationship Management (CRM), marketers frequently use RFM analysis to segment their database and identify the most valuable customers. What does the acronym RFM stand for?", "options": [{"id": "1", "text": "Retention, Frequency, Margins"}, {"id": "2", "text": "Reach, Frequency, Monetary Value"}, {"id": "3", "text": "Recency, Frequency, Monetary Value"}, {"id": "4", "text": "Reliability, Features, Motivation"}], "correctAnswer": "3", "explanation": "Key Concept:\nCRM relies heavily on data analytics to categorize customers based on historical purchasing behavior.\nRecency: How recently did the customer make a purchase? (Recent buyers are more likely to respond to new offers).\nFrequency: How often do they buy? (High frequency indicates brand loyalty).\nMonetary Value: How much do they spend in total? (Indicates profit potential).\nScoring customers on these three metrics allows firms to identify their \"Champions\" and \"At-Risk\" segments.\nRelated Concepts:\nCustomer Lifetime Value (CLV).\nAcquisition vs. Retention costs.", "id": 35}, {"question": "\nA government temporarily raising heavy taxes on private diesel vehicles to discourage their purchase and reduce severe environmental pollution is an application of:", "options": [{"id": "1", "text": "Synchromarketing"}, {"id": "2", "text": "Remarketing"}, {"id": "3", "text": "Demarketing"}, {"id": "4", "text": "Counter-marketing"}], "correctAnswer": "3", "explanation": "Key Concept:\nIntroduced by Kotler and Levy, Demarketing is the strategic effort to reduce demand for a product temporarily or permanently.\nIt is not meant to destroy the product entirely (that is counter-marketing), but rather to manage overfull demand or address societal/health hazards.\nExamples include raising tobacco prices, restricting water usage during droughts, or odd-even car rules.\nMarketers achieve this by raising prices, reducing promotion, or increasing barriers to purchase.\nRelated Concepts:\nSocial Marketing intersections.\nTypes of demand states.", "id": 36}, {"question": "\nAccording to Philip Kotler's Holistic Marketing Concept, ensuring that a firm's pricing, product features, distribution channels, and promotional messages all project a single, unified brand image is the primary objective of:", "options": [{"id": "1", "text": "Internal Marketing"}, {"id": "2", "text": "Integrated Marketing"}, {"id": "3", "text": "Relationship Marketing"}, {"id": "4", "text": "Performance Marketing"}], "correctAnswer": "2", "explanation": "Key Concept:\nThe Holistic Marketing concept asserts that \"everything matters\" in marketing. It consists of four broad pillars.\nIntegrated Marketing ensures that all tactical elements of the marketing mix work seamlessly together to communicate a consistent message (e.g., IMC).\nInternal Marketing focuses on training and motivating employees. Relationship Marketing focuses on long-term ties with partners. Performance Marketing evaluates financial and ethical returns.\nIf the TV ad promises high quality, the physical packaging and price must reflect that same quality.\nRelated Concepts:\nIntegrated Marketing Communications (IMC).\nThe expanded Marketing Mix.", "id": 37}, {"question": "\nMatch the Pricing terms (List I) with their appropriate scenarios (List II):\nList I\n(a) Value-based Pricing\n(b) Going-rate Pricing\n(c) Loss-leader Pricing\n(d) Cost-plus Pricing\n(i) An oligopoly cement manufacturer matching the price set by the market leader.\n(ii) Adding a standard 20% markup to the total manufacturing cost of a product.\n(iii) Setting a high price for a luxury watch based entirely on the consumer's perception of prestige.\n(iv) A supermarket selling milk below its actual cost to draw heavy retail traffic inside the store.", "options": [{"id": "1", "text": "(a)-(iii), (b)-(i), (c)-(iv), (d)-(ii)"}, {"id": "2", "text": "(a)-(iv), (b)-(i), (c)-(iii), (d)-(ii)"}, {"id": "3", "text": "(a)-(iii), (b)-(ii), (c)-(i), (d)-(iv)"}, {"id": "4", "text": "(a)-(ii), (b)-(i), (c)-(iv), (d)-(iii)"}], "correctAnswer": "1", "explanation": "Key Concept:\nValue-based pricing (iii) reverses the standard factory process by setting prices based on customer perception and psychology.\nGoing-rate pricing (i) is competition-based, standard in oligopolies where firms avoid price wars.\nLoss-leader pricing (iv) is a promotional adjustment strategy meant to sacrifice short-term margin on one item to sell complementary items.\nCost-plus pricing (ii) is the simplest product-driven approach, ignoring market demand.\nRelated Concepts:\nPsychological Pricing.\nMarket-Skimming nuances.", "id": 38}, {"question": "\nRead the following Assertion (A) and Reason (R):\nAssertion (A): Modern CRM strategies allocate substantially more resources toward customer retention programs rather than endlessly focusing solely on acquiring new customers.\nReason (R): According to marketing economics, it generally costs 5 to 25 times more to acquire a new customer than to retain an existing one, making retention highly profitable.", "options": [{"id": "1", "text": "Both (A) and (R) are true and (R) is the correct explanation of (A)"}, {"id": "2", "text": "Both (A) and (R) are true but (R) is NOT the correct explanation of (A)"}, {"id": "3", "text": "(A) is true but (R) is false"}, {"id": "4", "text": "(A) is false but (R) is true"}], "correctAnswer": "1", "explanation": "Key Concept:\nBoth statements are factually accurate and deeply interconnected.\nThe extreme cost disparity between acquisition (which requires heavy advertising and discount incentives) and retention (Reason) is the foundational economic logic that drives the existence of CRM loyalty programs (Assertion).\nA 5% increase in retention can boost profits by up to 95% because loyal customers buy more frequently and are less price-sensitive.\nCRM shifts the focus from single transactions to lifetime relationships.\nRelated Concepts:\nCustomer Lifetime Value (CLV).\nThe shift from the Selling Concept to the Marketing Concept.", "id": 39}, {"question": "\nWhich of the following is specifically considered a 'Trade Sales Promotion' tool, primarily designed to push the product through distribution channels rather than targeting the end buyer?", "options": [{"id": "1", "text": "Digital discount coupons sent via email"}, {"id": "2", "text": "Free product sample sachets distributed at malls"}, {"id": "3", "text": "Cash rebates upon submission of a purchase receipt"}, {"id": "4", "text": "Display allowances and Push Money given to retailers"}], "correctAnswer": "4", "explanation": "Key Concept:\nThe Sales Promotion mix is split into Consumer Promotions (Pull strategy) and Trade Promotions (Push strategy).\nTrade promotions are directed exclusively at wholesalers and retailers to induce them to stock, prominently display, and aggressively sell the manufacturer's products.\nDisplay allowances (paying for premium shelf space) and Push Money (cash bonuses to the retailer's sales staff) are classic trade tools.\nCoupons, samples, and rebates are Consumer sales promotion tools.\nRelated Concepts:\nPush vs. Pull promotional strategies.\nChannel management dynamics.", "id": 40}, {"question": "\nIn Consumer Behavior, Maslow's Hierarchy of Needs is frequently utilized to understand underlying buying motives. Purchasing a comprehensive life insurance policy or a premium car equipped with advanced multi-stage airbags primarily satisfies which level of the hierarchy?", "options": [{"id": "1", "text": "Physiological Needs"}, {"id": "2", "text": "Safety Needs"}, {"id": "3", "text": "Social Needs"}, {"id": "4", "text": "Esteem Needs"}], "correctAnswer": "2", "explanation": "Key Concept:\nAbraham Maslow argued that human needs are arranged in a strict hierarchy, and lower-level needs must be met before higher-level needs emerge.\nThe second tier is Safety Needs, which involve physical security, financial protection, and stability.\nProducts like life insurance, mutual funds, home security systems, and cars marketed heavily on crash-test safety ratings directly appeal to this psychological motivation.\nThe first tier (Physiological) relates to basic survival (food/water).\nRelated Concepts:\nEsteem needs (appealed to by luxury goods/Rolex).\nSocial needs (appealed to by grooming products to fit in).", "id": 41}, {"question": "\nIf a consumer relies heavily on the opinions, approvals, and usage habits of their close friends and family members before purchasing a high-end laptop, these influential social groups are technically referred to in marketing sociology as:", "options": [{"id": "1", "text": "Subcultures"}, {"id": "2", "text": "Reference Groups"}, {"id": "3", "text": "Aspirational Groups"}, {"id": "4", "text": "Early Adopters"}], "correctAnswer": "2", "explanation": "Key Concept:\nConsumer behavior is heavily dictated by Social Factors.\nReference Groups are any groups that serve as direct (face-to-face) or indirect points of comparison or reference in forming a person's attitudes, beliefs, or behaviors.\nPrimary reference groups (family, close friends) exert the highest, most continuous influence on everyday purchases.\nAspirational groups are those a person wishes to belong to (e.g., buying the same sports shoes as a famous athlete).\nRelated Concepts:\nCultural Factors (Culture, Social Class).\nThe Role of Opinion Leaders.", "id": 42}, {"question": "\nWhich component of the marketing mix is uniquely characterized as the only element that generates revenue for the firm?", "options": [{"id": "1", "text": "Product"}, {"id": "2", "text": "Price"}, {"id": "3", "text": "Place"}, {"id": "4", "text": "Promotion"}], "correctAnswer": "2", "explanation": "Key Concept:\nThe 4Ps (Product, Price, Place, Promotion) constitute the tactical marketing toolkit.\nPrice stands out fundamentally because it is the sole revenue-generating mechanism in the entire mix.\nDeveloping the Product, designing the Place (Logistics/Distribution), and executing Promotion (Advertising/Selling) all represent significant costs to the organization.\nPrice is also strategically distinct because it is the most highly flexible element, capable of being altered overnight.\nRelated Concepts:\nValue-based pricing dynamics.\nMarketing objectives determining price floors/ceilings.", "id": 43}, {"question": "\nA company utilizing a \"Three-Level\" consumer distribution channel operates with which specific intermediary sequence before the physical product reaches the final end-user?", "options": [{"id": "1", "text": "Manufacturer \u2192 Retailer \u2192 Consumer"}, {"id": "2", "text": "Manufacturer \u2192 Wholesaler \u2192 Retailer \u2192 Consumer"}, {"id": "3", "text": "Manufacturer \u2192 Agent \u2192 Wholesaler \u2192 Retailer \u2192 Consumer"}, {"id": "4", "text": "Manufacturer \u2192 Consumer"}], "correctAnswer": "3", "explanation": "Key Concept:\nChannel levels are strictly defined by the number of distinct intermediary layers involved in the transaction flow.\nA Three-Level Channel contains three intermediaries. The sequence is Manufacturer to Agent/Distributor (Level 1), to Wholesaler (Level 2), to Retailer (Level 3), and finally the Consumer.\nThis extensive structure is highly common in fragmented markets, particularly in Indian FMCG rural distribution where a master agent coordinates thousands of small wholesalers.\nOption D represents a Zero-Level (Direct) channel.\nRelated Concepts:\nDirect Marketing disintermediation.\nLogistics and Warehousing.", "id": 44}, {"question": "\nWhich of the following descriptions accurately defines a \"Differentiated (Segmented)\" market targeting strategy within the STP framework?", "options": [{"id": "1", "text": "Offering a single, basic product to the entire market, completely ignoring segment differences."}, {"id": "2", "text": "Tailoring products and marketing programs to the specific, precise needs of individual local customers."}, {"id": "3", "text": "Going after a massive share of one specific, highly narrow niche segment."}, {"id": "4", "text": "Targeting several distinct market segments and designing separate product offers and marketing mixes for each."}], "correctAnswer": "4", "explanation": "Key Concept:\nOnce a market is segmented, a firm must select a targeting strategy (pattern) based on its resources and goals.\nDifferentiated marketing involves operating in several distinct segments and creating separate offerings for each (Option D). Example: Tata Motors offering the entry-level Tiago, the mid-range Nexon, and the premium Safari.\nOption A is Undifferentiated (Mass) marketing.\nOption C is Concentrated (Niche) marketing.\nOption B is Micromarketing (Local/Individual).\nRelated Concepts:\nTarget Market Selection Patterns (Abell).\nMarket Segmentation bases.\nCOMPREHENSION / CASE STUDY (Questions 46-50)\nRead the following analytical passage and answer the questions strictly based on marketing concepts:\nNovaTech Inc. recently developed a revolutionary, AI-powered smart home security system. Holding exclusive international patents, NovaTech launched the product at a steep premium price of \u20b950,000, deliberately targeting wealthy tech-enthusiasts. However, initial market research revealed that consumers were hesitant to buy it purely online because they could not physically inspect or interact with the complex AI hardware. To overcome this hurdle, NovaTech partnered with 'Reliance Digital' retail stores across India. NovaTech provided rigorous, specialized training to the Reliance sales staff to ensure they could explain the AI features confidently and politely. Furthermore, NovaTech utilized an intensive integrated promotional campaign: it started with showing shocking statistics on home burglaries on TV to grab public attention, followed by detailed digital brochures to build product interest, leading up to a strong 'Buy Now' discount code sent via SMS. Post-launch, NovaTech's CRM managers tracked how recently, how frequently, and how much money customers spent on cloud-storage subscriptions for the cameras in order to identify and reward their most profitable users.", "id": 45}, {"question": "\nNovaTech's initial strategic decision to launch the patented AI system at \u20b950,000 to specifically target wealthy tech-enthusiasts is an application of:", "options": [{"id": "1", "text": "Market-Penetration Pricing"}, {"id": "2", "text": "Market-Skimming Pricing"}, {"id": "3", "text": "Value-Based Pricing"}, {"id": "4", "text": "Going-Rate Pricing"}], "correctAnswer": "2", "explanation": "Key Concept:\nMarket-Skimming involves setting a very high initial price for a new product to \"skim\" maximum revenues layer by layer.\nIt is highly effective when a product is highly innovative and protected by patents (high entry barriers).\nThe target audience must be \"Innovators\" or \"Early Adopters\" who possess inelastic demand and high willingness to pay.\nThe strategy sacrifices initial high volume for massive short-term profit margins.\nRelated Concepts:\nMarket-Penetration (Low price, high volume).\nPrice Elasticity of Demand.", "id": 46}, {"question": "\nThe consumers' initial hesitation to purchase the security system online because they could not physically inspect, touch, or feel the complex hardware before paying highlights which inherent characteristic of services/technology?", "options": [{"id": "1", "text": "Inseparability"}, {"id": "2", "text": "Perishability"}, {"id": "3", "text": "Inconsistency"}, {"id": "4", "text": "Intangibility"}], "correctAnswer": "4", "explanation": "Key Concept:\nIntangibility implies that an offering cannot be seen, tasted, felt, or smelled before it is purchased.\nThis lack of physical evidence creates high perceived financial and psychological risk for the buyer, especially for complex or expensive items.\nTo overcome this, marketers must \"tangibilize the intangible\" by utilizing physical stores, mockups, or strong brand guarantees.\nNovaTech partnered with physical retailers specifically to combat this intangibility barrier.\nRelated Concepts:\nThe 4 Characteristics of Services.\nPhysical Evidence in the 7Ps mix.", "id": 47}, {"question": "\nNovaTech's decision to provide rigorous training to the Reliance Digital staff to ensure they could explain the complex AI features confidently and politely aims to satisfy which specific dimension of the SERVQUAL (RATER) model?", "options": [{"id": "1", "text": "Tangibles"}, {"id": "2", "text": "Empathy"}, {"id": "3", "text": "Assurance"}, {"id": "4", "text": "Reliability"}], "correctAnswer": "3", "explanation": "Key Concept:\nThe SERVQUAL model measures service quality across five dimensions.\nAssurance is specifically defined as the knowledge and courtesy of employees and their ability to convey trust and confidence to the customer.\nWhen dealing with highly technical products, knowledgeable staff who can confidently answer questions are crucial to closing the sale.\nEmpathy would involve caring for an individual's unique emotional problem, while Reliability is about doing the job correctly.\nRelated Concepts:\nThe Gaps Model of Service Quality.\nInternal Marketing (training employees).", "id": 48}, {"question": "\nNovaTech\u2019s promotional campaign\u2014moving systematically from shocking burglary statistics, to detailed brochures, and finally to a 'Buy Now' SMS code\u2014strictly follows the psychological sequence of which theoretical marketing model?", "options": [{"id": "1", "text": "AIDA Model"}, {"id": "2", "text": "DAGMAR Approach"}, {"id": "3", "text": "Howard-Sheth Model"}, {"id": "4", "text": "BCG Matrix"}], "correctAnswer": "1", "explanation": "Key Concept:\nThe AIDA model maps the sequential psychological steps of a consumer's journey toward purchase.\nAttention: Grabbed by the shocking burglary statistics on TV.\nInterest: Held by providing deeper information via detailed digital brochures.\nDesire: Aroused as the consumer realizes the product solves the security problem.\nAction: Triggered finally by the 'Buy Now' discount code.\nRelated Concepts:\nHierarchy of Effects models.\nSales Promotion vs. Advertising objectives.", "id": 49}, {"question": "\nNovaTech tracking their cloud-storage subscribers based on how recently they engaged, how often they paid their fees, and the total monetary amount they spent is a textbook application of:", "options": [{"id": "1", "text": "STP Analysis"}, {"id": "2", "text": "RFM Analysis"}, {"id": "3", "text": "Value Chain Analysis"}, {"id": "4", "text": "Cognitive Dissonance Tracking"}], "correctAnswer": "2", "explanation": "Key Concept:\nIn Customer Relationship Management (CRM), data analytics are used to evaluate customer profitability.\nRFM Analysis stands precisely for Recency (how recently they engaged), Frequency (how often they paid), and Monetary value (how much they spent).\nThis technique allows NovaTech to segment their database, isolating the \"Champions\" who drive the most recurring revenue via subscriptions.\nIdentifying these users lowers retention costs and maximizes Customer Lifetime Value (CLV).\nRelated Concepts:\nCRM Acquisition vs. Retention.\nCustomer Lifetime Value (CLV) economics.", "id": 50}]};

        marked.setOptions({ breaks: true, gfm: true });

        const mathExtension = {
            name: 'math',
            level: 'inline',
            start(src) { return src.indexOf('$'); },
            tokenizer(src, tokens) {
                const blockRule = /^\$\$(.*?)\$\$/s;
                const inlineRule = /^\$([^$\n]+)\$/;
                let match;
                if ((match = blockRule.exec(src))) {
                    return { type: 'math', raw: match[0], text: match[1], displayMode: true };
                } else if ((match = inlineRule.exec(src))) {
                    return { type: 'math', raw: match[0], text: match[1], displayMode: false };
                }
            },
            renderer(token) {
                const safeText = token.text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                return token.displayMode ? `$$${safeText}$$` : `$${safeText}$`;
            }
        };
        marked.use({ extensions: [mathExtension] });

        const Icons = {
            Menu: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>,
            User: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            Alert: () => <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ef4444" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>,
            Printer: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>,
            Info: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>,
            Pause: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>,
            Play: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        };

        const DonutChart = ({ percentage, color, label }) => (
            <div className="flex flex-col items-center print-break-avoid">
                <svg viewBox="0 0 36 36" className="circular-chart w-28 h-28 mb-3">
                    <path className="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    <path className="circle" stroke={color} strokeDasharray={`${percentage}, 100`} d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    <text x="18" y="20.5" textAnchor="middle" className="text-3xl font-black fill-slate-800" style={{fontSize: "9px"}}>{percentage}%</text>
                </svg>
                <span className="font-bold text-slate-500 uppercase tracking-widest text-xs">{label}</span>
            </div>
        );

        const App = () => {
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [answers, setAnswers] = useState({}); 
            const [status, setStatus] = useState({});   
            const [timeLeft, setTimeLeft] = useState(TEST_DATA.durationMinutes * 60);
            const [isSubmitted, setIsSubmitted] = useState(false);
            const [isPaletteOpen, setIsPaletteOpen] = useState(false);
            const [isPaused, setIsPaused] = useState(false); 
            const [warnings, setWarnings] = useState(0);
            const [showWarning, setShowWarning] = useState(false);

            useEffect(() => {
                if (window.MathJax && window.MathJax.typesetPromise) {
                    window.MathJax.typesetPromise().catch((err) => console.log('MathJax error: ', err));
                }
            });

            useEffect(() => {
                if (!TEST_DATA.strictMode || isSubmitted) return;
                const handleVisibility = () => {
                    if (document.hidden) {
                        setWarnings(w => w + 1);
                        setShowWarning(true);
                    }
                };
                document.addEventListener("visibilitychange", handleVisibility);
                return () => document.removeEventListener("visibilitychange", handleVisibility);
            }, [isSubmitted]);

            useEffect(() => {
                if (isSubmitted || isPaused) return; 
                const timer = setInterval(() => {
                    setTimeLeft(prev => {
                        if (prev <= 0) { handleSubmit(true); return 0; }
                        return prev - 1;
                    });
                }, 1000);
                return () => clearInterval(timer);
            }, [isSubmitted, isPaused]); 

            const formatTime = (seconds) => {
                const h = Math.floor(seconds / 3600);
                const m = Math.floor((seconds % 3600) / 60);
                const s = seconds % 60;
                return `${h > 0 ? h + ':' : ''}${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            };

            const advanceQuestion = () => {
                if (currentQIndex < TEST_DATA.questions.length - 1) {
                    const nextQ = TEST_DATA.questions[currentQIndex + 1];
                    if (status[nextQ.id] === 'not_visited') setStatus(prev => ({ ...prev, [nextQ.id]: 'not_answered' }));
                    setCurrentQIndex(prev => prev + 1);
                }
            };

            const handleOptionSelect = (optId) => {
                if(isPaused) return;
                setAnswers(prev => ({ ...prev, [TEST_DATA.questions[currentQIndex].id]: optId }));
            };

            const handleSaveAndNext = () => {
                if(isPaused) return;
                const cid = TEST_DATA.questions[currentQIndex].id;
                setStatus(prev => ({ ...prev, [cid]: answers[cid] ? 'answered' : 'not_answered' }));
                advanceQuestion();
            };

            const handleMarkForReview = () => {
                if(isPaused) return;
                const cid = TEST_DATA.questions[currentQIndex].id;
                setStatus(prev => ({ ...prev, [cid]: answers[cid] ? 'marked_answered' : 'marked' }));
                advanceQuestion();
            };

            const handleClearResponse = () => {
                if(isPaused) return;
                const cid = TEST_DATA.questions[currentQIndex].id;
                setAnswers(prev => { const newAns = { ...prev }; delete newAns[cid]; return newAns; });
                setStatus(prev => ({ ...prev, [cid]: 'not_answered' }));
            };

            const handlePaletteClick = (index) => {
                if(isPaused) return;
                const cid = TEST_DATA.questions[currentQIndex].id;
                if (status[cid] === 'not_visited' || (status[cid] === 'not_answered' && !answers[cid])) {
                    setStatus(prev => ({ ...prev, [cid]: 'not_answered' }));
                }
                const tid = TEST_DATA.questions[index].id;
                if (status[tid] === 'not_visited') setStatus(prev => ({ ...prev, [tid]: 'not_answered' }));
                setCurrentQIndex(index);
                setIsPaletteOpen(false); 
            };

            const handleSubmit = (auto = false) => {
                if (auto || confirm("Are you sure you want to submit the test? No changes can be made after submission.")) {
                    setIsSubmitted(true);
                    setIsPaused(false);
                }
            };

            const counts = useMemo(() => {
                const c = { answered: 0, not_answered: 0, marked: 0, marked_answered: 0, not_visited: 0 };
                Object.values(status).forEach(s => { if (c[s] !== undefined) c[s]++; });
                return c;
            }, [status]);

            if (isSubmitted) {
                let score = 0, correct = 0, wrong = 0;
                TEST_DATA.questions.forEach(q => {
                    if (answers[q.id] === q.correctAnswer) { score += TEST_DATA.marksForCorrect; correct++; } 
                    else if (answers[q.id]) { score -= TEST_DATA.marksForWrong; wrong++; }
                });

                const attempted = correct + wrong;
                const accuracy = attempted > 0 ? Math.round((correct / attempted) * 100) : 0;
                const percentage = Math.max(0, Math.round((score / TEST_DATA.totalMarks) * 100));
                const isPass = percentage >= TEST_DATA.passPercentage;

                return (
                    <div className="h-full overflow-y-auto p-4 md:p-8 print:p-0 bg-slate-50 print:bg-white print:h-auto print:overflow-visible">
                        <div className="max-w-5xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100 print-border-none print:shadow-none">
                            <div className="bg-blue-600 text-white p-10 relative print:text-slate-900 print:bg-white print:border-b-2 print:border-slate-300 print:p-0 print:mb-8">
                                <div className="absolute top-0 right-0 w-64 h-64 bg-white opacity-5 rounded-full -mt-20 -mr-20 blur-2xl print-hidden"></div>
                                <div className="flex flex-col md:flex-row justify-between items-center gap-6 relative z-10 print:flex-row print:items-start">
                                    <div className="text-center md:text-left">
                                        <h1 className="text-4xl font-extrabold mb-2 tracking-tight">Performance Report</h1>
                                        <p className="opacity-90 font-semibold text-lg">{TEST_DATA.title}</p>
                                        <p className="opacity-70 text-sm mt-1">{TEST_DATA.organization}</p>
                                    </div>
                                    <div className="flex gap-6 items-center">
                                        <div className={`px-6 py-4 rounded-2xl border-2 backdrop-blur-md print:border-2 print:bg-transparent flex items-center justify-between gap-6 min-w-[200px] ${isPass ? 'bg-green-500/20 border-green-400 print:border-green-600 print:text-green-700' : 'bg-red-500/20 border-red-400 print:border-red-600 print:text-red-700'}`}>
                                            <div className="text-left">
                                                <div className="text-[10px] uppercase tracking-widest font-bold opacity-80 mb-0.5">Final Status</div>
                                                <div className="text-2xl font-black leading-none">{isPass ? 'PASSED' : 'FAILED'}</div>
                                            </div>
                                            <div className="text-4xl leading-none">{isPass ? '🎉' : '❌'}</div>
                                        </div>
                                    </div>
                                </div>
                                <button onClick={() => window.print()} className="print-hidden absolute right-6 top-6 bg-white/20 hover:bg-white/30 text-white px-5 py-2.5 rounded-full font-bold transition shadow-lg backdrop-blur-sm flex items-center gap-2">
                                    <Icons.Printer/> Save PDF
                                </button>
                            </div>

                            <div className="p-10 grid grid-cols-1 md:grid-cols-3 gap-8 border-b border-slate-100 bg-slate-50/50 print:bg-white print:border-b-0 print-break-avoid">
                                <DonutChart percentage={percentage} color="#2563eb" label="Score Percentage" />
                                <DonutChart percentage={accuracy} color="#10b981" label="Accuracy" />
                                <div className="flex flex-col justify-center space-y-4">
                                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center print:border-slate-300">
                                        <span className="text-slate-500 font-bold">Total Marks</span>
                                        <span className="text-3xl font-black text-blue-600">{score} <span className="text-lg text-slate-400 font-bold">/ {TEST_DATA.totalMarks}</span></span>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-green-50 p-4 rounded-2xl border border-green-100 text-center print:border-slate-300 print:bg-white">
                                            <div className="text-green-600 text-3xl font-black">{correct}</div>
                                            <div className="text-xs font-bold text-green-700 uppercase mt-1">Correct</div>
                                        </div>
                                        <div className="bg-red-50 p-4 rounded-2xl border border-red-100 text-center print:border-slate-300 print:bg-white">
                                            <div className="text-red-600 text-3xl font-black">{wrong}</div>
                                            <div className="text-xs font-bold text-red-700 uppercase mt-1">Wrong</div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="p-6 md:p-10">
                                <h2 className="text-2xl font-extrabold text-slate-800 mb-8 flex items-center gap-3 border-b border-slate-200 pb-4">
                                    Detailed Solutions
                                </h2>
                                <div className="space-y-8">
                                    {TEST_DATA.questions.map((q, i) => {
                                        const userAns = answers[q.id];
                                        const isCorrect = userAns === q.correctAnswer;
                                        const isSkipped = !userAns;
                                        let borderColor = isCorrect ? 'border-green-500' : (isSkipped ? 'border-slate-300' : 'border-red-500');
                                        let bgClass = isCorrect ? 'bg-green-50/50' : (isSkipped ? 'bg-white' : 'bg-red-50/50');

                                        return (
                                            <div key={q.id} className={`border-l-8 ${borderColor} ${bgClass} p-6 rounded-2xl shadow-sm border border-slate-100 print-break-avoid print:border print:border-l-8 print:shadow-none`}>
                                                <div className="flex gap-4 mb-6">
                                                    <span className="font-black text-slate-400 text-xl">Q{i+1}.</span>
                                                    <div className="flex-1 text-slate-800 markdown-body text-[16px]" dangerouslySetInnerHTML={{ __html: marked.parse(q.question) }}></div>
                                                </div>
                                                <div className="ml-10 space-y-3 mb-6">
                                                    {q.options.map(opt => {
                                                        const isUserOpt = opt.id === userAns;
                                                        const isCorrectOpt = opt.id === q.correctAnswer;
                                                        
                                                        let optClass = "text-slate-600 bg-white border-slate-200";
                                                        let icon = "○";
                                                        if (isCorrectOpt) { optClass = "text-green-800 bg-green-100 border-green-300 font-bold"; icon = "✓"; }
                                                        else if (isUserOpt) { optClass = "text-red-700 bg-red-100 border-red-300 line-through"; icon = "✗"; }

                                                        return (
                                                            <div key={opt.id} className={`flex items-start gap-3 p-3 rounded-xl border ${optClass} print:bg-transparent print:border-slate-300`}>
                                                                <span className="mt-0.5 font-bold">{icon}</span>
                                                                <div className="markdown-body" style={{marginBottom: 0}} dangerouslySetInnerHTML={{ __html: marked.parseInline(opt.text) }}></div>
                                                            </div>
                                                        )
                                                    })}
                                                </div>
                                                {q.explanation && (
                                                    <div className="ml-10 p-5 bg-blue-50/50 rounded-xl border border-blue-100 print:bg-slate-50 print:border-slate-200">
                                                        <strong className="block mb-2 flex items-center gap-2 text-blue-700"><Icons.Info/> Expert Explanation:</strong>
                                                        <div className="markdown-body text-sm text-slate-700" dangerouslySetInnerHTML={{ __html: marked.parse(q.explanation) }}></div>
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            const currentQuestion = TEST_DATA.questions[currentQIndex];

            return (
                <div className="flex flex-col h-full bg-slate-50 relative">
                    {showWarning && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-white p-8 rounded-3xl shadow-2xl max-w-md text-center border-2 border-red-500">
                                <div className="w-20 h-20 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4 animate-bounce"><Icons.Alert /></div>
                                <h2 className="text-2xl font-black text-slate-800 mb-2">Warning Recorded!</h2>
                                <p className="text-slate-600 mb-6 font-medium">You switched tabs or minimized the window. (Warning {warnings})</p>
