    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const TEST_DATA = {"title": "Business Finance 2024 PYQs", "organization": "ExamTym", "durationMinutes": 40, "totalMarks": 68.0, "marksForCorrect": 2.0, "marksForWrong": 0.0, "passPercentage": 40, "shuffle": false, "strictMode": false, "questions": [{"question": "Which of the following are the assumptions of Gordon's Dividend Model?\nA. No taxes\nB. Cost of capital is greater than the growth rate\nC. No external financing\nD. Constant retention ratio\nE. Constant cost of capital", "options": [{"id": "1", "text": "A, B & D only"}, {"id": "2", "text": "B, C & E only"}, {"id": "3", "text": "A, C & D only"}, {"id": "4", "text": "A, B, D & E only"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* **Gordon's Dividend Discount Model** calculates the intrinsic value of a firm based on the present value of its future dividends, assuming they grow at a constant rate into perpetuity.\n* The model mathematically requires the **Cost of Capital ($K_e$) to be strictly greater than the growth rate ($g$) (B)**; otherwise, the formula ($P_0 = D_1 / (K_e - g)$) would yield an impossible negative or infinite stock price.\n* It assumes a perfectly **Constant retention ratio (D)** and a **Constant cost of capital (E)**, explicitly forbidding any variables from shifting over the firm's perpetual lifespan.\n* It relies on idealized market conditions, specifically assuming **No corporate taxes (A)** and strictly **No external financing** (meaning all investments are funded purely through retained earnings).\n**Related Concepts:**\n* **Retention Ratio ($b$):** The proportion of earnings kept within the company, which dictates the constant growth rate ($g = b \\times r$).\n* **Dividend Yield:** The expected cash return on the stock based on the next period's dividend relative to its current price.\n* **Bird-in-the-Hand Theory:** Gordon's core argument that investors prefer the certainty of current dividend payouts over the risk of future capital gains.", "id": 1}, {"question": "Match the List-I with List-II\n| LIST I (Concept) | LIST II (Meaning) |\n| :--- | :--- |\n| A. Profitability Index | I. Rate that equates the investment outlay with the present value of cash inflow |\n| B. Accounting Rate of Return (ARR) | II. Compound average annual rate that is calculated with a reinvestment rate different than the project's IRR |\n| C. Internal Rate of Return (IRR) | III. Rate that is computed by dividing the average profit after tax with the average investment |\n| D. Modified Internal Rate of Return (MIRR) | IV. Ratio of the present value of cash inflows, at the required rate of return, to the initial cash outflow of the investment |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "A-IV, B-III, C-I, D-II"}, {"id": "2", "text": "A-I, B-IV, C-II, D-III"}, {"id": "3", "text": "A-II, B-I, C-III, D-IV"}, {"id": "4", "text": "A-III, B-II, C-IV, D-I"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* The **Profitability Index (A)** is a relative efficiency metric calculated as the ratio of the present value of future cash inflows directly divided by the initial cash outflow **(IV)**.\n* The **Accounting Rate of Return (B)** evaluates profitability strictly using accounting numbers, dividing average Earnings After Tax (profit) by the average capital invested **(III)**.\n* The **Internal Rate of Return (C)** is the exact, specific discount rate that mathematically equates the present value of inflows with the initial investment outlay, forcing NPV to zero **(I)**.\n* The **Modified Internal Rate of Return (D)** corrects traditional IRR's mathematical flaw by utilizing a safer, more realistic reinvestment rate (usually the Cost of Capital) for intermediate cash flows **(II)**.\n**Related Concepts:**\n* **Net Present Value (NPV):** The absolute dollar difference between present value inflows and outflows; the ultimate standard for capital budgeting.\n* **Capital Rationing:** A constraint scenario where the Profitability Index becomes the optimal metric to rank and select projects.\n* **Time Value of Money:** The critical financial principle that ARR completely ignores, rendering it inferior to DCF methods.", "id": 2}, {"question": "Arrange the following sequentially with respect to the operating cycle of a manufacturing firm -\nA. Payables Deferral Period\nB. Finished Goods Conversion Period\nC. Raw Material Conversion Period\nD. Receivables Conversion Period\nE. Work-in-progress Conversion Period", "options": [{"id": "1", "text": "A, D, C, E, B"}, {"id": "2", "text": "C, E, B, D, A"}, {"id": "3", "text": "B, D, A, E, C"}, {"id": "4", "text": "D, B, E, A, C"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* The **Operating Cycle** represents the chronological sequence of events required to convert raw materials into final cash collections.\n* **Phase 1 (C):** The physical cycle begins with the **Raw Material Conversion Period**, the time materials sit in the warehouse before entering the factory.\n* **Phase 2 & 3 (E & B):** Materials enter production during the **Work-in-progress Conversion Period**, and then sit as completed inventory during the **Finished Goods Conversion Period**.\n* **Phase 4 (D):** Once sold on credit, the firm waits out the **Receivables Conversion Period** to collect cash. \n* **Phase 5 (A):** The **Payables Deferral Period** (the time the firm delays paying its own suppliers) operates concurrently, and is mathematically subtracted at the end to calculate the net Cash Conversion Cycle.\n**Related Concepts:**\n* **Cash Conversion Cycle (CCC):** The net amount of time a firm's capital is locked up in the operating cycle before returning as cash.\n* **Just-In-Time (JIT):** An inventory management strategy that attempts to compress the raw material and WIP conversion periods to near zero.\n* **Working Capital Management:** The overarching financial discipline focused on optimizing the speed and efficiency of this entire cycle.", "id": 3}, {"question": "The price of a company's share is Rs. 80 and the value of growth opportunities is 20. If the company's capitalisation rate is 15%, how much is the EPS?", "options": [{"id": "1", "text": "20"}, {"id": "2", "text": "12"}, {"id": "3", "text": "3"}, {"id": "4", "text": "9"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* The **Present Value of Growth Opportunities (PVGO)** model explicitly divides a stock's total market price into two distinct components: the value of its current operations and the value of its future growth.\n* The formal equation is: $P_0 = \\frac{EPS}{K_e} + PVGO$, where $EPS/K_e$ represents the no-growth value (treating the firm as a cash-cow paying 100% of earnings as dividends).\n* **Step 1:** Isolate the no-growth value. $P_0$ (80) - PVGO (20) = Rs. 60. This means Rs. 60 of the stock price is derived from its current, static earning power.\n* **Step 2:** Solve for EPS. The no-growth value formula is $60 = \\frac{EPS}{0.15}$. Therefore, $EPS = 60 \\times 0.15 = \\text{Rs. } 9$.\n**Related Concepts:**\n* **Capitalisation Rate ($K_e$):** Another term for the Cost of Equity, the discount rate used by investors to value the firm's earnings.\n* **Price-to-Earnings (P/E) Ratio:** A valuation multiple heavily driven by PVGO; firms with massive growth opportunities trade at mathematically higher P/E ratios.\n* **Growth Firm:** A firm where PVGO represents a substantial majority of the total stock price, indicating high internal return on investment.", "id": 4}, {"question": "Match the List-I with List-II\n| LIST I (Concept) | LIST II (Meaning) |\n| :--- | :--- |\n| A. Systematic risk | I. Compensation for time |\n| B. Beta | II. Increase in corporate tax rate |\n| C. Risk-free rate | III. Sensitivity coefficient |\n| D. Unsystematic risk | IV. Competitor enters the market |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "A-I, B-IV, C-III, D-II"}, {"id": "2", "text": "A-IV, B-I, C-II, D-III"}, {"id": "3", "text": "A-III, B-II, C-IV, D-I"}, {"id": "4", "text": "A-II, B-III, C-I, D-IV"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* **Systematic Risk (A)** is macroeconomic, undiversifiable risk that impacts the entire market simultaneously, such as a sweeping **Increase in corporate tax rates (II)**.\n* **Beta (B)** is the statistical **Sensitivity coefficient (III)** that specifically measures an individual stock's volatility relative to that macroeconomic systematic risk.\n* The **Risk-free rate (C)** (like the yield on a Treasury bond) provides baseline **Compensation for time (I)**, purely rewarding the investor for delaying consumption, without any risk premium attached.\n* **Unsystematic Risk (D)** is microeconomic, firm-specific risk that can be diversified away, such as a sudden **Competitor entering the local market (IV)**.\n**Related Concepts:**\n* **Capital Asset Pricing Model (CAPM):** The financial equation that explicitly unites the risk-free rate, beta, and systematic risk to determine expected returns.\n* **Modern Portfolio Theory (MPT):** The academic framework proving that investors are only rewarded for bearing systematic risk, as unsystematic risk can be mathematically eliminated.\n* **Alpha ($\\alpha$):** A measure of an investment's active return compared to a market index, representing performance above or below its beta-predicted expected return.", "id": 5}, {"question": "Which of the following is NOT the assumption of Baumol's model of cash management?", "options": [{"id": "1", "text": "The firm is unable to forecast its cash needs with certainty"}, {"id": "2", "text": "The opportunity cost of holding cash is known"}, {"id": "3", "text": "The firm will incur the same transaction cost whenever it converts securities to cash"}, {"id": "4", "text": "The firm's cash payments occur uniformly over a period of time"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* **Baumol's Model of Cash Management** is a direct adaptation of the Economic Order Quantity (EOQ) inventory model, applied to liquid cash balances instead of physical raw materials.\n* A massive, foundational assumption of the model is that the firm **IS able to forecast its cash needs with absolute certainty**. Therefore, statement (1) is demonstrably false and is the correct answer.\n* The model strictly assumes a perfectly **uniform, steady rate of cash outflow (4)**, acting as a perfectly smooth downward slope until the cash hits zero.\n* It assumes a fixed, **known opportunity cost (2)** (the interest lost by not investing the cash) and a fixed **transaction cost (3)** incurred every time marketable securities are liquidated to replenish the cash pool.\n**Related Concepts:**\n* **Miller-Orr Model:** The modern, stochastic alternative to Baumol's model that *does* assume cash flows are entirely random and cannot be forecasted with certainty.\n* **Optimal Cash Balance:** The mathematically calculated amount of cash a firm should transfer from investments at one time to minimize total costs.\n* **Marketable Securities:** Highly liquid, short-term debt instruments (like Treasury Bills) where a firm parks excess cash to earn the opportunity cost yield.", "id": 6}, {"question": "Compute the after-tax cost of capital of a company in case a perpetual bond (face value is 100) is sold as well as redeemed at par having coupon rate of interest being 7% and corporate tax rate is 30%.", "options": [{"id": "1", "text": "2.1%"}, {"id": "2", "text": "4.9%"}, {"id": "3", "text": "7%"}, {"id": "4", "text": "10%"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* The **Cost of Debt ($K_d$)** calculation requires two specific adjustments: accounting for the issuance price and applying the corporate tax shield.\n* **Step 1 (Pre-tax Cost):** Because the bond is both issued at par (Rs. 100) and redeemed at par (Rs. 100) with zero mention of floatation costs, the pre-tax cost of debt is mathematically identical to the stated coupon rate of **7%**.\n* **Step 2 (Tax Shield):** Debt is the only component of capital structure where interest payments are legally tax-deductible, creating a massive financial shield that effectively lowers the firm's true borrowing cost.\n* **Execution:** $\\text{After-Tax } K_d = \\text{Pre-Tax } K_d \\times (1 - T)$. Therefore, $7\\% \\times (1 - 0.30) = 7\\% \\times 0.70 = 4.9\\%$.\n**Related Concepts:**\n* **Net Proceeds ($NP$):** If the bond were sold at a discount (e.g., Rs. 95), the pre-tax cost would rise significantly because the firm receives less capital upfront while still paying the full Rs. 7 coupon.\n* **Floatation Costs:** Underwriting fees that would reduce Net Proceeds, driving up the true cost of the debt.\n* **Weighted Average Cost of Capital (WACC):** The overall hurdle rate of the firm, where this 4.9% figure would be heavily weighted based on the firm's target debt ratio.", "id": 7}, {"question": "Which one of the following theory of capital structure discusses Arbitrage Process?", "options": [{"id": "1", "text": "Traditional Approach"}, {"id": "2", "text": "Modigliani and Miller (MM) Approach"}, {"id": "3", "text": "Net Operating Income (NOI) Approach"}, {"id": "4", "text": "Net Income (NI) Approach"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* The **Modigliani and Miller (MM) Approach** is entirely distinct from all other capital structure theories because its proofs rely exclusively on behavioral market mechanics, specifically the **Arbitrage Process**.\n* MM Proposition I argues that two identical firms (one with debt, one without) cannot possibly trade at different total market values in a perfect market.\n* If a price discrepancy exists, rational investors will engage in **arbitrage**\u2014simultaneously selling the overvalued firm's stock and buying the undervalued firm's stock.\n* This relentless buying and selling pressure mathematically forces the market values of both firms back into perfect equilibrium, proving that leverage itself does not intrinsically create value.\n**Related Concepts:**\n* **Homemade Leverage:** The crucial assumption enabling this arbitrage; investors can substitute corporate debt with personal debt by borrowing money at the exact same risk-free interest rate as the firm.\n* **Law of One Price:** The economic theory arbitrage enforces, stating that assets generating the exact same future cash flows must sell for the exact same price today.\n* **Perfect Capital Markets:** A strict assumption requiring zero transaction costs and zero taxes for the arbitrage process to function smoothly.", "id": 8}, {"question": "For the purpose of taking Capital Budgeting Decisions in respect of a company in India, following are taken into consideration in computing cash flows in the terminal year of the project:\nA. Tax paid on short-term capital gains\nB. Tax loss on short-term capital loss\nC. Release of net working capital\nD. Tax saving on short-term capital loss\nE. Tax saving on short-term capital gains", "options": [{"id": "1", "text": "A, C & D only"}, {"id": "2", "text": "B, C & E only"}, {"id": "3", "text": "C & E only"}, {"id": "4", "text": "B & E only"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* **Terminal Cash Flow** represents the massive, final infusion of cash generated at the very end of a project's useful life when it is formally decommissioned.\n* **Release of Net Working Capital (C)** is a major component; the inventory and cash buffers tied up during Year 0 are liquidated and fully recovered at the end of the project.\n* The physical asset is sold for a salvage value, triggering tax implications. If the asset is sold for *more* than its depreciated book value, the firm pays a **Tax on the short-term capital gain (A)**, which is an outflow.\n* If the asset is sold for *less* than its book value, the firm recognizes a loss, creating a valuable **Tax saving on the short-term capital loss (D)**, which acts as a positive cash inflow. (Tax savings on gains is a contradiction, making E false). *(Note: OCR typo \"Tax loss\" in A typically maps to \"Tax paid\" in standard NTA keys).*\n**Related Concepts:**\n* **Salvage Value:** The estimated residual market value of the physical machinery when it is sold at the end of the project.\n* **Sunk Costs:** Past, unrecoverable costs that must be strictly ignored when calculating any stage of project cash flows.\n* **Block of Assets:** Under the Indian Income Tax Act, depreciation and capital gains are technically calculated on the entire \"block\" of similar assets rather than individual machines.", "id": 9}, {"question": "Which of the following discount capital budgeting Techniques follows the criteria?\nA. Net Present Value\nB. Benefit-cost Ratio\nC. Accounting Rate of Return\nD. Internal Rate of Return\nE. Payback Period", "options": [{"id": "1", "text": "A, B, C, D Only"}, {"id": "2", "text": "B, C, D Only"}, {"id": "3", "text": "A, B, D Only"}, {"id": "4", "text": "A, C, D Only"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* Capital budgeting techniques are strictly divided into two categories: **Discounted Cash Flow (DCF)** methods (modern) and Non-Discounted methods (traditional).\n* **Net Present Value (A)** is the gold standard of discounted techniques, applying the firm's exact cost of capital to shrink future cash flows into present-day dollars.\n* The **Benefit-Cost Ratio (B)** (formally known as the Profitability Index) is purely a discounted metric, dividing the *present value* of inflows by the initial outlay.\n* The **Internal Rate of Return (D)** is inherently a discounted technique, mathematically solving for the specific discount rate that drives NPV to zero.\n* Accounting Rate of Return (C) and Payback Period (E) are strictly traditional, non-discounted methods that completely ignore the time value of money.\n**Related Concepts:**\n* **Time Value of Money (TVM):** The foundational financial concept that a rupee received today is worth more than a rupee received next year, which DCF methods explicitly account for.\n* **Discounted Payback Period:** A modernized version of the payback period that actually does discount cash flows before determining the recovery time.\n* **Modified Internal Rate of Return (MIRR):** An advanced DCF technique designed to fix the flawed reinvestment assumption inherent in traditional IRR.", "id": 10}, {"question": "Match the List-I with List-II\n| LIST I (Instruments) | LIST II (Market) |\n| :--- | :--- |\n| A. Forwards | I. Primary Market |\n| B. Certificate of Deposits | II. Money Market |\n| C. FPO | III. Derivative Market |\n| D. IPO | IV. Stock Market |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "A-I, B-III, C-II, D-IV"}, {"id": "2", "text": "A-II, B-IV, C-I, D-III"}, {"id": "3", "text": "A-IV, B-II, C-III, D-I"}, {"id": "4", "text": "A-III, B-II, C-IV, D-I"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* **Forwards (A)** are customized, over-the-counter financial contracts used to hedge future price movements, placing them strictly in the **Derivative Market (III)**.\n* **Certificate of Deposits (CDs) (B)** are highly liquid, short-term, unsecured debt instruments issued by banks, acting as a staple of the **Money Market (II)**.\n* An **FPO (Follow-on Public Offer) (C)** occurs when an already-listed, public company issues new shares to investors, heavily utilizing the infrastructure of the secondary **Stock Market (IV)** to execute the offering.\n* An **IPO (Initial Public Offering) (D)** is the process where a private company raises capital by selling equity to the public for the absolute first time, explicitly defining the function of the **Primary Market (I)**.\n**Related Concepts:**\n* **Secondary Market:** The platform (like the NSE/BSE) where previously issued securities are actively traded among investors without providing fresh capital to the issuing company.\n* **Commercial Paper:** Another major short-term, unsecured Money Market instrument, issued by large corporations rather than banks.\n* **Options:** Standardized contracts in the Derivative Market that, unlike Forwards, provide a right but not an obligation to execute a trade.", "id": 11}, {"question": "According to Proposition II of Modigliani-Miller theory of capital structure, which of the following statement is true?", "options": [{"id": "1", "text": "Financial Leverage has no effect on the wealth of shareholders."}, {"id": "2", "text": "Financial Leverage increases with wealth of shareholders."}, {"id": "3", "text": "Rate of return expected by shareholders increases with the increase in equity financing."}, {"id": "4", "text": "Rate of return expected by shareholders increases with financial leverage."}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* Modigliani-Miller (MM) Proposition I states that a firm's overall value is completely unaffected by its capital structure. **Proposition II** mathematically explains *why* this happens.\n* MM Proposition II states that as a firm replaces expensive equity with cheaper debt (increasing **financial leverage**), the financial risk to the remaining equity shareholders drastically increases.\n* To mathematically compensate for this heightened risk of bankruptcy, the **rate of return expected by shareholders (Cost of Equity, $K_e$) increases in direct, linear proportion to the debt-to-equity ratio**.\n* Therefore, the mathematical benefit of using cheaper debt is instantly, perfectly neutralized by the rising cost of equity, leaving the overall Weighted Average Cost of Capital (WACC) completely flat.\n**Related Concepts:**\n* **Financial Risk:** The specific additional risk placed on equity shareholders entirely due to the presence of fixed-cost debt in the capital structure.\n* **Business Risk:** The inherent operational risk of the firm's industry, which dictates the baseline required return on an unlevered (zero debt) firm.\n* **Homemade Leverage:** The assumption that investors can borrow on their own to achieve desired leverage, rendering corporate leverage decisions moot.", "id": 12}, {"question": "Which of the following are included in Foreign Direct Investment?\nA. Wholly owned subsidiary\nB. Joint venture\nC. Investment in GDR.\nD. Acquisition\nE. Investment by FIIs", "options": [{"id": "1", "text": "A & B Only"}, {"id": "2", "text": "B, C & D Only"}, {"id": "3", "text": "C, D & E Only"}, {"id": "4", "text": "A, B & D Only"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* **Foreign Direct Investment (FDI)** occurs when a firm establishes a lasting, physical operational interest in a foreign country, involving significant managerial control and technology transfer.\n* Establishing a **Wholly owned subsidiary (A)** (building a new factory from scratch in a foreign country) is the purest form of greenfield FDI.\n* A **Joint Venture (B)**, where the firm partners with a local company to build a shared facility, is a standard market-entry FDI strategy.\n* Cross-border **Acquisitions (D)** (buying a controlling stake in an existing foreign firm) are known as brownfield FDI, granting immediate operational control.\n* Global Depository Receipts (C) and investments by Foreign Institutional Investors (E) are strictly Foreign *Portfolio* Investments (FPI); they are passive, short-term equity buys with zero managerial control.\n**Related Concepts:**\n* **Greenfield Investment:** A type of FDI where a parent company builds its operations in a foreign country from the ground up.\n* **Brownfield Investment:** A type of FDI where a company purchases or leases existing production facilities to launch a new production activity.\n* **Hot Money:** Portfolio investments are heavily volatile and prone to sudden capital flight during a crisis, unlike deeply rooted FDI.", "id": 13}, {"question": "Arrange the steps of Capital Budgeting Process in correct sequence.\nA. Preparation of Capital Budget and Appropriation\nB. Performance Review\nC. Assembling of Investment proposals\nD. Identification of investment opportunities\nE. Decision making", "options": [{"id": "1", "text": "D, C, E, A, B"}, {"id": "2", "text": "A, C, D, B, E"}, {"id": "3", "text": "A, D, C, B, E"}, {"id": "4", "text": "B, D, C, E, A"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* The Capital Budgeting Process is a rigorous, multi-stage chronological framework for allocating corporate funds to long-term projects.\n* **Step 1 (D):** The foundation is the continuous **Identification of investment opportunities**, where various departments brainstorm potential growth projects or cost-saving machinery.\n* **Step 2 (C):** Next is the formal **Assembling of Investment proposals**, where analysts rigorously forecast the exact cash inflows and outflows required.\n* **Step 3 (E):** Management executes strict **Decision making**, mathematically applying DCF metrics like NPV or IRR to accept or reject the proposals.\n* **Step 4 (A):** Approved projects trigger the **Preparation of the Capital Budget**, formally allocating the actual cash resources for implementation.\n* **Step 5 (B):** The final step is the post-audit **Performance Review**, comparing actual cash flows against initial forecasts to improve future accuracy.\n**Related Concepts:**\n* **Incremental Cash Flows:** The strict financial guideline applied during Step 2, ensuring only *new*, project-specific cash flows are modeled.\n* **Capital Rationing:** A severe constraint encountered during Step 3, where a lack of total funding forces management to reject otherwise profitable projects.\n* **Hurdle Rate:** The minimum required rate of return (Cost of Capital) used to evaluate proposals during the Decision Making phase.", "id": 14}, {"question": "Arrange the following phases of International Monetary System in chronological order (old to new).\nA. Gold Bullion Standard\nB. Gold Specie Standard\nC. Floating Exchange Rate\nD. Gold Exchange Standard\nE. Bretton Woods System", "options": [{"id": "1", "text": "A, B, E, D, C"}, {"id": "2", "text": "A, D, E, C, B"}, {"id": "3", "text": "B, A, D, E, C"}, {"id": "4", "text": "B, D, A, C, E"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* The International Monetary System has evolved through several distinct structural paradigms over the last 150 years.\n* **1. Gold Specie Standard (B):** The oldest system (late 1800s to WWI), where physical gold coins actively circulated as actual currency in the global economy.\n* **2. Gold Bullion Standard (A):** Following WWI, physical gold coins were withdrawn from daily circulation; paper money was used, backed by massive gold bars (bullion) held in central vaults.\n* **3. Gold Exchange Standard (D):** A hybrid 1930s system where smaller nations pegged their currency to a larger nation's currency (like the Pound), which was in turn backed by gold.\n* **4. Bretton Woods System (E):** Established in 1944, this pegged all global currencies directly to the US Dollar, while the Dollar alone was convertible to gold at $35/ounce.\n* **5. Floating Exchange Rate (C):** Initiated in 1971 (the Nixon Shock) when the US abandoned gold convertibility, leaving currency values to be dictated purely by market supply and demand.\n**Related Concepts:**\n* **Mint Parity:** The legally defined exchange rate between two currencies under the original gold standard, determined strictly by their respective physical gold weights.\n* **Triffin Dilemma:** The fatal structural flaw that destroyed the Bretton Woods system; the US had to run massive deficits to supply global liquidity, which destroyed global confidence in its gold backing.\n* **Managed Float:** The modern reality of the floating system, where central banks occasionally intervene to prevent catastrophic volatility.", "id": 15}, {"question": "Which of the following are the rights of the equity shareholders?\nA. Right to Income\nB. Right to Control\nC. Right to Pre-emption\nD. Right to Transfer Shares\nE. Right in Liquidation", "options": [{"id": "1", "text": "A, B, C, D & E"}, {"id": "2", "text": "B, C & E Only"}, {"id": "3", "text": "A, B, C & D Only"}, {"id": "4", "text": "A, C, D & E Only"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* Equity shareholders are the ultimate legal owners of a corporation, possessing a comprehensive suite of statutory rights.\n* **Right to Income (A):** The right to receive a proportional share of distributed profits in the form of dividends.\n* **Right to Control (B):** The powerful right to vote at Annual General Meetings to elect the Board of Directors and approve major corporate actions.\n* **Right to Pre-emption (C):** The right to be offered newly issued shares *before* the general public, allowing existing owners to protect their proportional control from dilution.\n* **Right to Transfer (D):** In a public limited company, shares are freely transferable on the open market without requiring management approval.\n* **Right in Liquidation (E):** If the company goes bankrupt, equity holders hold the ultimate residual claim on any assets remaining *after* all debts and preference shares have been paid. *(Note: Standard business law recognizes all five as fundamental equity rights).*\n**Related Concepts:**\n* **Residual Claimants:** The defining financial characteristic of equity; they take the absolute highest risk because they are always paid last.\n* **Proxy Voting:** A mechanism allowing shareholders to delegate their voting power to another party if they cannot attend a meeting.\n* **Rights Issue:** The specific corporate action that satisfies the preemptive right requirement.", "id": 16}, {"question": "According to Dividend Growth Model, the cost of Equity is equal to:", "options": [{"id": "1", "text": "Retained Earning + Dividend yield"}, {"id": "2", "text": "Dividend yield + Expected Growth in Dividend"}, {"id": "3", "text": "Retained Earning + Expected Growth in Dividend"}, {"id": "4", "text": "Dividend yield + Intrinsic value"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* The **Dividend Growth Model** (Gordon Growth Model) calculates the intrinsic value of a stock based on future dividends growing at a constant rate.\n* To determine the required rate of return for shareholders, the formula is algebraically rearranged to solve for the **Cost of Equity ($K_e$)**: $K_e = \\frac{D_1}{P_0} + g$.\n* The first component, $\\frac{D_1}{P_0}$, mathematically represents the **Dividend Yield**, which is the immediate, cash-in-hand return generated over the next year relative to the current stock price.\n* The second component, $g$, mathematically represents the **Expected Growth in Dividend**, which acts as a direct proxy for the expected annual capital appreciation of the stock price itself.\n* Therefore, total return is the sum of cash yield and growth yield.\n**Related Concepts:**\n* **Cost of Retained Earnings ($K_r$):** The opportunity cost of keeping profits internal rather than paying them out; mathematically identical to $K_e$ minus any floatation costs.\n* **Capital Asset Pricing Model (CAPM):** An alternative, risk-based method for calculating the Cost of Equity using beta and the risk-free rate, entirely ignoring dividends.\n* **Constant Growth Assumption:** The severe limitation of this model, as real-world corporate dividends rarely grow at a perfectly stable, perpetual rate.", "id": 17}, {"question": "Which of the following are the assumptions underlying MM Theory of capital structure?\nA. Perfect capital Market\nB. Heterogeneous Expectations\nC. Absence of Taxes\nD. 100% Dividend Payout\nE. Equivalent Risk Class", "options": [{"id": "1", "text": "A, C, & E Only"}, {"id": "2", "text": "B, C & E Only"}, {"id": "3", "text": "A, C, D, & E Only"}, {"id": "4", "text": "B, C, D & E Only"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* The foundational **Modigliani and Miller (MM) Proposition I** mathematically proves that a firm's capital structure is irrelevant, but relies on a severely restrictive, idealized universe.\n* It strictly requires **Perfect Capital Markets (A)** where there are zero transaction costs, zero floatation costs, and where individuals can borrow at the exact same risk-free rate as massive corporations.\n* It requires an **Absence of Corporate Taxes (C)** to prevent debt from creating a tax shield that artificially alters firm value.\n* It groups firms into **Equivalent Risk Classes (E)**, assuming firms with identical business risk profiles must be valued identically by the market.\n* It strictly relies on *Homogeneous* expectations (everyone agrees on the firm's future), making \"Heterogeneous Expectations\" (B) a false distractor. *(Note: While 100% payout is often assumed to separate investment from financing, NTA formally keyed A, C, E as the defining triad for this specific question's options).*\n**Related Concepts:**\n* **Arbitrage Process:** The mechanism that enforces MM theory; investors buy and sell identical firms across risk classes to exploit and eliminate mispricings.\n* **Homemade Leverage:** The assumption that retail investors can synthetically replicate corporate debt by leveraging their personal portfolios.\n* **MM Proposition with Taxes:** The later revision by MM acknowledging that real-world corporate tax shields make 100% debt the mathematically optimal structure.", "id": 18}, {"question": "What is the valuation formula based on the Walter's model if:\nP: Price per equity share\nD: Dividend per share\nE: Earnings per share\nr: Rate of return on investment\nk: Cost of equity", "options": [{"id": "1", "text": "$P = \\frac{D + (E - k)/r}{r}$"}, {"id": "2", "text": "$P = \\frac{E + (D - E)r/k}{k}$"}, {"id": "3", "text": "$P = \\frac{D + (E - D)r/k}{k}$"}, {"id": "4", "text": "$P = \\frac{E + (E - D)r/k}{k}$"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* **Walter's Model** is a prominent dividend relevance theory that mathematically links a firm's stock price to its dividend payout ratio and its internal profitability.\n* The formula calculates the present value of two distinct streams of cash flow, discounted by the Cost of Equity ($k$).\n* **Stream 1:** The present value of the infinite stream of constant dividends, mathematically represented by $\\frac{D}{k}$.\n* **Stream 2:** The present value of the returns generated by the retained earnings $(E - D)$ reinvested at the internal rate of return $(r)$.\n* The combined, simplified algebraic formula universally taught is: **$P = \\frac{D + \\frac{r}{k}(E - D)}{k}$**, which perfectly matches Option 3.\n**Related Concepts:**\n* **Growth Firm:** A company where internal return ($r$) is greater than the cost of equity ($k$); Walter's model dictates they should retain 100% of earnings to maximize price.\n* **Declining Firm:** A company where $r < k$; Walter's model dictates they should distribute 100% of earnings as dividends to maximize price.\n* **Normal Firm:** A company where $r = k$; Walter's model shows that dividend policy becomes completely irrelevant to the stock price.", "id": 19}, {"question": "The management of Vibgyor Fabrics subscribes to the NOI approach and believes that its cost of debt and overall cost of capital will remain at 9% and 12% respectively. If the debt-equity ratio is 0.8, what is the cost of equity?", "options": [{"id": "1", "text": "16.4%"}, {"id": "2", "text": "12.4%"}, {"id": "3", "text": "14.4%"}, {"id": "4", "text": "8.12%"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* The **Net Operating Income (NOI) Approach** asserts that a firm's total market value and its overall Weighted Average Cost of Capital ($K_o$) remain perfectly constant regardless of leverage.\n* However, to keep $K_o$ constant while adding cheaper debt, the **Cost of Equity ($K_e$) must linearly increase** to compensate shareholders for the added financial risk.\n* The formal equation derived from NOI to find the Cost of Equity is: **$K_e = K_o + (K_o - K_d) \\times \\frac{D}{E}$**.\n* **Step 1:** Identify variables. Overall Cost ($K_o$) = 12% (0.12). Cost of Debt ($K_d$) = 9% (0.09). Debt-to-Equity Ratio ($D/E$) = 0.8.\n* **Step 2:** Execution. $K_e = 0.12 + (0.12 - 0.09) \\times 0.8 = 0.12 + (0.03 \\times 0.8) = 0.12 + 0.024 = 0.144$, which equates strictly to **14.4%**.\n**Related Concepts:**\n* **Financial Risk Premium:** The $(K_o - K_d) \\times \\frac{D}{E}$ portion of the equation represents the exact premium investors demand for bearing bankruptcy risk.\n* **Net Income (NI) Approach:** The exact opposite theory, which assumes $K_e$ remains constant, meaning adding debt actively lowers the overall $K_o$.\n* **Modigliani-Miller Proposition II:** An advanced academic expansion that uses this exact same NOI mathematical mechanism to prove equity costs rise with debt.", "id": 20}, {"question": "The Bretton Woods monetary system was based on the fixed rate monetary system. It lasted between the years:", "options": [{"id": "1", "text": "1946 To 1974"}, {"id": "2", "text": "1944 To 1974"}, {"id": "3", "text": "1940 To 1974"}, {"id": "4", "text": "1944 To 1971"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* The **Bretton Woods System** was a landmark international monetary agreement established during a massive 44-nation conference in **1944** in New Hampshire, USA.\n* It established a \"gold-exchange standard\" where all global currencies were pegged at a fixed exchange rate to the US Dollar, and the US Dollar was the only currency directly convertible to physical gold (at a fixed rate of \\$35 per ounce).\n* The system functioned effectively for two decades, but the US government was forced to print massive amounts of unbacked dollars to fund the Vietnam War and global liquidity needs.\n* The system collapsed abruptly in August **1971** (an event known as the \"Nixon Shock\") when US President Richard Nixon unilaterally suspended the convertibility of the dollar into gold.\n**Related Concepts:**\n* **International Monetary Fund (IMF):** Created concurrently at the Bretton Woods conference to monitor global exchange rates and provide emergency loans to nations facing balance-of-payments crises.\n* **World Bank:** The sister institution created at the conference, initially tasked with rebuilding war-torn Europe.\n* **Triffin Dilemma:** The economic paradox that predicted the exact collapse of the system; the nation issuing the global reserve currency must run dangerous deficits to supply the world with liquidity.", "id": 21}, {"question": "Match the List-I with List-II\n| LIST I | LIST II |\n| :--- | :--- |\n| A. Capital Asset Pricing Model | I. $\\frac{E}{V}r_E + \\frac{D}{V}r_D(1-T_C)$ |\n| B. Gordon Model | II. $R_E = R_f + \\beta_E(R_M - R_f)$ |\n| C. Weighted Average Cost of Capital | III. $P = m(D + \\frac{E}{3})$ |\n| D. Traditional Model | IV. $P_0 = \\frac{E_1(1-b)}{k-br}$ |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "A-IV, B-I, C-II, D-III"}, {"id": "2", "text": "A-II, B-I, C-I, D-IV"}, {"id": "3", "text": "A-I, B-II, C-III, D-IV"}, {"id": "4", "text": "A-II, B-IV, C-I, D-III"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* **CAPM (A)** determines the required return on equity by adding a risk premium to a baseline rate, explicitly formalized as **$R_E = R_f + \\beta_E(R_M - R_f)$ (II)**.\n* The **Gordon Growth Model (B)** calculates intrinsic stock value based on a perpetually growing dividend stream. The dividend ($D_1$) is often expanded algebraically to Earnings $\\times$ Payout Ratio $[E_1(1-b)]$, over $(k - g)$ where $g = br$. Thus, **$P_0 = \\frac{E_1(1-b)}{k-br}$ (IV)**.\n* The **Weighted Average Cost of Capital (C)** blends the cost of equity and the after-tax cost of debt based on their market value weights in the firm: **$\\frac{E}{V}r_E + \\frac{D}{V}r_D(1-T_C)$ (I)**.\n* The **Traditional Dividend Model (D)** (specifically the Graham and Dodd multiplier formula) values a stock by applying an industry multiplier ($m$) to the dividend plus one-third of the earnings: **$P = m(D + \\frac{E}{3})$ (III)**.\n**Related Concepts:**\n* **Beta ($\\beta$):** The systematic risk multiplier central to the CAPM formula.\n* **Tax Shield:** Represented by the $(1-T_C)$ component in the WACC formula, highlighting the tax deductibility of corporate debt.\n* **Retention Ratio ($b$):** The portion of earnings kept internal, driving the growth variable ($br$) in the Gordon model.", "id": 22}, {"question": "What will be the expected Dividend per share of Rohtas Industries for the year 2024 given the following information about the company?\nEPS for 2024 = 3\nDPS for 2023 = 1.2\nTarget Payout Ratio = 0.6\nAdjustment Rate = 0.7", "options": [{"id": "1", "text": "1.8"}, {"id": "2", "text": "1.62"}, {"id": "3", "text": "1.52"}, {"id": "4", "text": "1.72"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* This problem requires the application of **Lintner's Dividend Adjustment Model**, which argues that firms prefer to maintain a stable dividend policy and only adjust payouts gradually toward a long-term target to avoid negative market signaling.\n* The formal equation is: $DPS_1 = DPS_0 + [ \\text{Adjustment Rate} \\times (\\text{Target } DPS_1 - DPS_0) ]$.\n* **Step 1:** Calculate the theoretical \"Target DPS\" for the new year. Target DPS = Current EPS $\\times$ Target Payout Ratio $= 3 \\times 0.6 = \\text{Rs. } 1.80$.\n* **Step 2:** Calculate the difference between the target and last year's payout. $1.80 - 1.20 = 0.60$. The firm wants to increase the dividend by 0.60, but will only do a fraction of it to maintain stability.\n* **Step 3:** Apply the Adjustment Rate (0.7). $0.60 \\times 0.7 = 0.42$.\n* **Step 4:** Execution. New DPS = Old DPS (1.20) + Actual Adjustment (0.42) = **Rs. 1.62**.\n**Related Concepts:**\n* **Information Asymmetry:** The underlying reason for Lintner's model; managers fear that cutting a dividend in a bad year will send a catastrophic signal to investors, so they keep payouts artificially stable.\n* **Target Payout Ratio:** The ideal, long-term percentage of earnings a firm desires to distribute, regardless of short-term fluctuations.\n* **Speed of Adjustment:** Another term for the adjustment rate, representing management's confidence in the permanence of their new earnings level.", "id": 23}, {"question": "Match the List-I with List-II\n| LIST I (Trader) | LIST II (Function/Activity) |\n| :--- | :--- |\n| A. Hedger | I. Buying and selling shares quickly |\n| B. Speculator | II. Reducing investment Risk |\n| C. Arbitrageur | III. Taking increased Risk willingly |\n| D. Scalper | IV. Taking advantage of the mismatch of the prices in two markets |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "A-I, B-II, C-III, D-IV"}, {"id": "2", "text": "A-II, B-I, C-II, D-IV"}, {"id": "3", "text": "A-II, B-III, C-IV, D-I"}, {"id": "4", "text": "A-III, B-IV, C-II, D-I"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* A **Hedger (A)** utilizes the derivatives market purely defensively, taking a financial position explicitly designed for **Reducing investment Risk (II)** associated with their core physical business (like an airline hedging jet fuel prices).\n* A **Speculator (B)** is the opposite; they possess no physical commodity but enter the market **Taking increased Risk willingly (III)**, attempting to generate massive profits by correctly guessing directional price movements.\n* An **Arbitrageur (C)** operates complex algorithms to exploit tiny, fleeting price discrepancies for the exact same asset across different global exchanges, **Taking advantage of the mismatch of the prices in two markets (IV)** to lock in a riskless profit.\n* A **Scalper (D)** is an ultra-high-frequency day trader specializing in **Buying and selling shares quickly (I)**, holding positions for mere seconds to capture tiny bid-ask spread profits on massive volumes.\n**Related Concepts:**\n* **Law of One Price:** The economic reality enforced by Arbitrageurs, ensuring global markets remain perfectly synchronized.\n* **Zero-Sum Game:** The nature of the derivatives market; for a hedger to shed risk, a speculator must exist on the opposite side of the contract to absorb it.\n* **Liquidity Providers:** Both speculators and scalpers play a crucial macroeconomic role by ensuring there is always a buyer or seller available in the market.", "id": 24}, {"question": "Arrange the following steps of securitisation in a correct sequence.\nA. Forming SPV\nB. Transfer to SPV\nC. Credit Enhancement\nD. Origination (Implied creation of asset pool)\nE. Issuance of securities", "options": [{"id": "1", "text": "A, B, C, D, E"}, {"id": "2", "text": "B, C, A, D, E"}, {"id": "3", "text": "D, C, A, B, E"}, {"id": "4", "text": "D, A, B, C, E"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* **Securitisation** is a rigorous structured finance process converting illiquid debt (like mortgages) into highly liquid, tradable bonds.\n* **Step 1 (D):** The entire process begins with **Origination**, where a bank issues thousands of individual loans to consumers, creating the raw asset pool. *(Note: While 'D' was missing in the raw OCR text, context mapping confirms it as the origination phase).*\n* **Step 2 (A):** The bank then executes the **Forming of an SPV** (Special Purpose Vehicle), a legally distinct, bankruptcy-remote \"orphan\" entity.\n* **Step 3 (B):** The bank executes a true sale and completes the **Transfer to SPV**, moving the loans entirely off its own balance sheet.\n* **Step 4 (C):** To make the pool attractive to institutional investors, the SPV applies **Credit Enhancement** (like overcollateralization or securing a third-party guarantee) to achieve an AAA rating.\n* **Step 5 (E):** Finally, the SPV completes the **Issuance of securities** (Asset-Backed Securities) to the capital markets, using the proceeds to pay the originating bank.\n**Related Concepts:**\n* **Asset-Backed Securities (ABS):** The final financial products created in Step 5, whose coupon payments are funded by the monthly loan payments of the original borrowers.\n* **Off-Balance Sheet Financing:** The primary motivation for the originating bank, allowing them to free up capital and bypass strict central bank reserve requirements.\n* **Subprime Crisis (2008):** A historic global financial collapse caused by catastrophic failures in the Credit Enhancement (Step 4) and underwriting (Step 1) phases of securitisation.", "id": 25}, {"question": "The effect of exchange rate fluctuations on a firm's future cost and revenues is termed as:-", "options": [{"id": "1", "text": "Transaction Exposure"}, {"id": "2", "text": "Translation Exposure"}, {"id": "3", "text": "Accounting Exposure"}, {"id": "4", "text": "Operating Exposure"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* **Operating Exposure** (also heavily classified under the broader umbrella of Economic Exposure) measures the extent to which a firm's long-term competitive position and future cash flows are permanently altered by unexpected exchange rate shifts.\n* Unlike transaction exposure (which only affects existing, signed invoices), operating exposure affects **uncommitted future costs and revenues**.\n* For example, if the Indian Rupee drastically appreciates against the Euro, an Indian software firm will suddenly find its future labor costs effectively more expensive for European clients, devastating its future revenue pipeline even before contracts are signed.\n* It is the most dangerous and difficult exposure to manage, as it requires massive strategic shifts in business operations rather than simple financial hedging.\n**Related Concepts:**\n* **Transaction Exposure:** Short-term risk dealing exclusively with the settlement of specific, existing foreign currency obligations (like a payable due in 60 days).\n* **Translation (Accounting) Exposure:** The paper-only risk generated when consolidating the financial statements of foreign subsidiaries into the parent company's home currency.\n* **Natural Hedging:** The primary defense against operating exposure, involving physically relocating production facilities or sourcing raw materials in the target market to organically align revenues and expenses.", "id": 26}, {"question": "Match the LIST-I with LIST-II\n| LIST-I (Concept) | LIST-II (Meaning) |\n| :--- | :--- |\n| A. Exchange Rate | I. It refers to the price of one unit of foreign currency in terms of some units of home currency |\n| B. Forward market | II. It is the process of making risk less profits by exploiting price differences of assets in different market. |\n| C. Arbitrage | III. Where transactions are entered into for settlement on a future date |\n| D. Direct Quotation | IV. It is a price of one unit of a currency in terms of some units of another currency |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "A-IV, B-III, C-II, D-I"}, {"id": "2", "text": "A-III, B-IV, C-II, D-I"}, {"id": "3", "text": "A-I, B-II, C-III, D-IV"}, {"id": "4", "text": "A-I, B-III, C-II, D-IV"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* A generic **Exchange Rate (A)** is broadly defined as the exact market price of one unit of any currency expressed **in terms of some units of another currency (IV)**.\n* The **Forward Market (B)** is the specific financial arena where binding currency contracts are legally entered into today, but the physical delivery and **settlement occur on a specific future date (III)** to hedge against volatility.\n* **Arbitrage (C)** is the strict algorithmic **process of making risk-less profits (II)** by simultaneously buying an asset in a cheap market and selling it in an expensive one.\n* A **Direct Quotation (D)** is a specific forex convention expressing the **price of exactly one unit of foreign currency directly in terms of the home currency (I)** (e.g., in India, \\$1 = Rs. 83).\n**Related Concepts:**\n* **Indirect Quotation:** The inverse of a direct quote, expressing one unit of domestic currency in terms of foreign currency (e.g., Re. 1 = \\$0.012).\n* **Spot Market:** The contrasting arena to the forward market, where currency trades are executed and settled almost immediately (usually within T+2 days).\n* **Law of One Price:** The economic baseline that arbitrageurs enforce across global currency exchanges.", "id": 27}, {"question": "Which one of the following refers to the firms investment in the current assets?", "options": [{"id": "1", "text": "Gross Working Capital"}, {"id": "2", "text": "Net Working Capital"}, {"id": "3", "text": "Gross Current liabilities"}, {"id": "4", "text": "Operating cycle"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* In corporate finance, working capital concepts are distinctly split into two definitions: a quantitative (balance sheet) view and a qualitative (liquidity) view.\n* The purely quantitative view is **Gross Working Capital**, which is strictly defined as the total, absolute monetary value of all of the firm's **investment in current assets** (Cash, Inventory, Accounts Receivable, Marketable Securities).\n* It entirely ignores liabilities, focusing solely on the aggregate amount of short-term capital tied up in the daily operations of the business.\n* Conversely, *Net* Working Capital is the qualitative difference between current assets and current liabilities, acting as a true metric of short-term solvency.\n**Related Concepts:**\n* **Current Assets:** Assets expected to be liquidated, sold, or consumed entirely within one standard operating cycle or one year.\n* **Liquidity Crisis:** A scenario where a firm might have massive Gross Working Capital (tied up entirely in unsellable dead inventory), but a negative Net Working Capital, leading to bankruptcy.\n* **Current Ratio:** A standard liquidity metric calculated by dividing Gross Working Capital (Current Assets) by Current Liabilities.", "id": 28}, {"question": "Identify correct statements from the following regarding Time Value of money.\nA. The interest which may be earned/saved on the money held at present underlines the concept of time value of money.\nB. The money which is receivable at present has less value than the money receivable in future.\nC. The relationship that exists between the value of money receivable at present and the value of money receivable in future is referred as time value of the money.\nD. Value of money receivable at present = value of money receivable in future - Time value of money\nE. Future value of money is the value of money held presently at some given future time at a given rate of Interest.", "options": [{"id": "1", "text": "B and D Only"}, {"id": "2", "text": "A, C and E Only"}, {"id": "3", "text": "B, C and D Only"}, {"id": "4", "text": "C, D and E Only"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* The **Time Value of Money (TVM)** is the foundational financial principle dictating that a rupee held today is worth intrinsically more than a rupee promised in the future.\n* This is driven by **opportunity cost (A)**; money held today can immediately be invested to earn interest, mathematically increasing its total future value.\n* Therefore, statement (B) is aggressively false; money today has *more* value, not less.\n* The formal mathematical **relationship bridging present and future values (C)** via compounding or discounting is the literal definition of TVM.\n* **Future Value (E)** is accurately defined as the mathematically compounded value of present money projected forward using a specific interest rate. *(Note: While D is a clumsy algebraic approximation of discounting ($PV = FV - \\text{Interest}$), A, C, and E represent the core, unambiguous theoretical pillars of TVM).*\n**Related Concepts:**\n* **Discounting:** The mathematical process of stripping away the \"Time Value\" (interest) from a future cash flow to determine its Present Value.\n* **Compounding:** The inverse process of adding accumulated interest to a present sum to determine its Future Value.\n* **Inflation Risk:** The macroeconomic factor (alongside pure opportunity cost) that severely erodes the purchasing power of future cash, further reinforcing TVM.", "id": 29}, {"question": "Beta Company Ltd issued 10% perpetual debt of \u20b91,00,000. The company's tax rate is 50%. Determine the cost of capital (before tax as well as after tax) assuming the debt is issued at 10 percent premium.", "options": [{"id": "1", "text": "Before tax cost = 9.09% and after tax cost = 4.54%"}, {"id": "2", "text": "Before tax cost = 4.54% and after tax cost = 9%"}, {"id": "3", "text": "Before tax cost = 9.90% and after tax cost = 4.45%"}, {"id": "4", "text": "Before tax cost 10.09% and after tax cost 5.54%"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* The **Cost of Perpetual Debt ($K_d$)** evaluates the effective interest burden on non-redeemable bonds, heavily accounting for the issue price and the corporate tax shield.\n* **Step 1 (Pre-tax Calculation):** The formula is $K_d (\\text{pre-tax}) = \\frac{\\text{Annual Interest}}{\\text{Net Proceeds}}$.\n  * Annual Interest = 10% of Face Value (1,00,000) = \u20b910,000.\n  * Net Proceeds = Issued at a 10% premium = 1,00,000 + 10,000 = \u20b91,10,000.\n  * Execution: $\\frac{10,000}{1,10,000} = 0.090909$, or **9.09%**.\n* **Step 2 (Post-tax Calculation):** Corporate debt generates a massive tax shield. The formula is $K_d (\\text{post-tax}) = K_d (\\text{pre-tax}) \\times (1 - \\text{Tax Rate})$.\n  * Execution: $9.09\\% \\times (1 - 0.50) = 9.09\\% \\times 0.50 = \\text{4.545\\%}$.\n* This perfectly matches option 1.\n**Related Concepts:**\n* **Tax Shield:** The massive structural advantage of debt financing over equity financing; interest is paid *before* taxes, effectively forcing the government to subsidize the borrowing cost.\n* **Net Proceeds:** If floatation costs (underwriting fees) existed, they would be subtracted from the \u20b91,10,000, lowering the denominator and drastically increasing the true cost of debt.\n* **Yield to Maturity:** A more complex calculation required for *redeemable* debt with a fixed lifespan, adjusting for the eventual repayment of principal.", "id": 30}, {"question": "Which term refers to the composition of long-term funds such as debentures, long-term borrowing, preference shares, and equity shares in the capitalization of a company?", "options": [{"id": "1", "text": "Cost of capital"}, {"id": "2", "text": "Capital budgeting"}, {"id": "3", "text": "Working capital"}, {"id": "4", "text": "Capital structure"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* **Capital Structure** refers to the exact, strategic mathematical composition or \"mix\" of long-term financing sources a firm utilizes to permanently fund its operations and asset growth.\n* It exclusively focuses on the right side of the balance sheet, specifically dealing with long-term liabilities (debentures, term loans) and total shareholder's equity (common stock, preference shares, retained earnings).\n* A highly \"leveraged\" capital structure is heavily weighted toward debt, while a \"conservative\" structure relies almost entirely on equity.\n* Management's ultimate goal is to design an \"Optimal Capital Structure\" that mathematically minimizes the overall cost of funding, thereby maximizing total firm value.\n**Related Concepts:**\n* **Financial Structure:** A broader concept than capital structure, encompassing *every* item on the liability side of the balance sheet, including short-term current liabilities.\n* **Capital Budgeting:** The completely separate process (left side of the balance sheet) of deciding exactly *where* to invest the funds raised by the capital structure.\n* **Weighted Average Cost of Capital (WACC):** The overall hurdle rate generated directly by the specific proportions of the capital structure.", "id": 31}, {"question": "Arrange the following steps in logical sequence regarding how to compute Net Present Value (NPV):\nA. Calculate Net Present Value (NPV) i.e. Present Value of all cash inflows - present value of all cash outflows\nB. Calculate all the cash outflows associated with the project\nC. Calculate all the cash inflows associated with the project\nD. Calculate the present value of all cash inflows associated with the project\nE. Calculate the present value of all cash outflows associated with the project", "options": [{"id": "1", "text": "A, B, C, E, D"}, {"id": "2", "text": "B, C, E, D, A"}, {"id": "3", "text": "A, C, B, E, D"}, {"id": "4", "text": "A, C, B, D, E"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* The computation of **Net Present Value (NPV)** follows a rigid, mathematically necessary chronological sequence.\n* **Step 1 & 2 (B & C):** Before any discounting can occur, analysts must first rigorously forecast and map out the raw, undiscounted **cash outflows (B)** (initial investments) and operational **cash inflows (C)**.\n* **Step 3 & 4 (E & D):** Once the raw cash flow timeline is established, analysts apply the firm's required discount rate (WACC) to shrink those future figures into today's terms, calculating the **Present Value of Outflows (E)** and **Present Value of Inflows (D)**.\n* **Step 5 (A):** The absolute final, concluding step is to calculate the final **Net Present Value (A)** by subtracting the PV of Outflows from the PV of Inflows. (By logical elimination, Option 2 is the only sequence ending with the final calculation step 'A').\n**Related Concepts:**\n* **Discount Factor:** The mathematical formula ($1 / (1+r)^t$) applied heavily during Steps 3 and 4 to execute the present value translation.\n* **Incremental Cash Flows:** The rule applied during Steps 1 and 2 ensuring that sunk costs are strictly ignored.\n* **Value Additivity:** The unique mathematical property that allows the final NPV (Step 5) of multiple projects to be simply added together.", "id": 32}, {"question": "Which of the following points are considered as factors determining the working capital of a firm?\nA. Basic nature of Business\nB. Business cycle fluctuations\nC. Credit Policy of the firm\nD. Long term source of finance\nE. Employee Skills", "options": [{"id": "1", "text": "A, B and D Only"}, {"id": "2", "text": "B, C and D Only"}, {"id": "3", "text": "A, B and C Only"}, {"id": "4", "text": "D and E Only"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* A firm's structural requirement for Working Capital (the cash needed to run daily operations) is dictated by several immovable operational realities.\n* The **Basic nature of business (A)** is the primary driver; a massive manufacturing plant requires millions tied up in raw inventory, whereas a consulting firm requires practically zero inventory.\n* **Business cycle fluctuations (B)** dictate safety buffers; during an economic boom, a firm must massively expand its working capital to stockpile inventory and support surging credit sales.\n* The **Credit Policy (C)** directly controls Accounts Receivable; a firm offering 90-day interest-free credit to customers will require vastly more working capital to survive than a cash-and-carry retail store.\n* (Long term source of finance (D) refers to *how* working capital is funded, not what determines the required *size*. Employee skills (E) is entirely irrelevant).\n**Related Concepts:**\n* **Operating Cycle:** The underlying metric combining inventory storage time and credit collection time that mathematically quantifies working capital needs.\n* **Aggressive Financing Strategy:** A high-risk method of funding this working capital need using cheap, short-term debt.\n* **Liquidity Risk:** The danger a firm faces if it underestimates these determining factors and runs out of operational cash.", "id": 33}, {"question": "A proposal requires a cash outflow of \u20b918,500 and is expected to generate cash inflows of \u20b98,000, \u20b96,000, \u20b94,000, \u20b92,000 and \u20b92,000 over next 5 years respectively. The payback period is:", "options": [{"id": "1", "text": "4 Years"}, {"id": "2", "text": "3.25 Years"}, {"id": "3", "text": "3.50 Years"}, {"id": "4", "text": "4.25 Years"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* The **Payback Period** method calculates the exact amount of time (in years and fractions of a year) required for a project's cumulative cash inflows to equal and recover the initial cash outflow.\n* **Step 1:** Create a cumulative cash flow timeline against the \u20b918,500 target.\n  * Year 1: \u20b98,000 (Remaining to recover: 10,500)\n  * Year 2: \u20b98,000 + 6,000 = \u20b914,000 (Remaining to recover: 4,500)\n  * Year 3: \u20b914,000 + 4,000 = \u20b918,000 (Remaining to recover: 500)\n* **Step 2:** At the end of Year 3, the firm is exactly \u20b9500 short of full recovery. During Year 4, the project generates \u20b92,000 total.\n* **Step 3:** Calculate the fraction of Year 4 required. Assuming steady inflow throughout the year, fraction = $\\frac{\\text{Amount needed}}{\\text{Total inflow during the year}} = \\frac{500}{2000} = 0.25$.\n* **Step 4:** Total Payback Period = 3 full years + 0.25 of a year = **3.25 Years**.\n**Related Concepts:**\n* **Time Value of Money:** The catastrophic flaw of the traditional payback method, as it completely fails to discount the future cash flows before calculating recovery time.\n* **Cut-off Period:** The arbitrary maximum timeframe set by management; if a project's payback exceeds this limit, it is automatically rejected.\n* **Discounted Payback Period:** A modernized version of this calculation that translates the inflows into present-day dollars before running the cumulative timeline.", "id": 34}]};

        marked.setOptions({ breaks: true, gfm: true });

        const mathExtension = {
            name: 'math',
            level: 'inline',
            start(src) { return src.indexOf('$'); },
            tokenizer(src, tokens) {
                const blockRule = /^\$\$(.*?)\$\$/s;
                const inlineRule = /^\$([^$\n]+)\$/;
                let match;
                if ((match = blockRule.exec(src))) {
                    return { type: 'math', raw: match[0], text: match[1], displayMode: true };
                } else if ((match = inlineRule.exec(src))) {
                    return { type: 'math', raw: match[0], text: match[1], displayMode: false };
                }
            },
            renderer(token) {
                const safeText = token.text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                return token.displayMode ? `$$${safeText}$$` : `$${safeText}$`;
            }
        };
        marked.use({ extensions: [mathExtension] });

        const Icons = {
            Menu: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>,
            User: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            Alert: () => <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ef4444" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>,
            Printer: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>,
            Info: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>,
            Pause: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>,
            Play: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        };

        const DonutChart = ({ percentage, color, label }) => (
            <div className="flex flex-col items-center print-break-avoid">
                <svg viewBox="0 0 36 36" className="circular-chart w-28 h-28 mb-3">
                    <path className="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    <path className="circle" stroke={color} strokeDasharray={`${percentage}, 100`} d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    <text x="18" y="20.5" textAnchor="middle" className="text-3xl font-black fill-slate-800" style={{fontSize: "9px"}}>{percentage}%</text>
                </svg>
                <span className="font-bold text-slate-500 uppercase tracking-widest text-xs">{label}</span>
            </div>
        );

        const App = () => {
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [answers, setAnswers] = useState({}); 
            const [status, setStatus] = useState({});   
            const [timeLeft, setTimeLeft] = useState(TEST_DATA.durationMinutes * 60);
            const [isSubmitted, setIsSubmitted] = useState(false);
            const [isPaletteOpen, setIsPaletteOpen] = useState(false);
            const [isPaused, setIsPaused] = useState(false); 
            const [warnings, setWarnings] = useState(0);
            const [showWarning, setShowWarning] = useState(false);

            useEffect(() => {
                if (window.MathJax && window.MathJax.typesetPromise) {
                    window.MathJax.typesetPromise().catch((err) => console.log('MathJax error: ', err));
                }
            });

            useEffect(() => {
                if (!TEST_DATA.strictMode || isSubmitted) return;
                const handleVisibility = () => {
                    if (document.hidden) {
                        setWarnings(w => w + 1);
                        setShowWarning(true);
                    }
                };
                document.addEventListener("visibilitychange", handleVisibility);
                return () => document.removeEventListener("visibilitychange", handleVisibility);
            }, [isSubmitted]);

            useEffect(() => {
                if (isSubmitted || isPaused) return; 
                const timer = setInterval(() => {
                    setTimeLeft(prev => {
                        if (prev <= 0) { handleSubmit(true); return 0; }
                        return prev - 1;
                    });
                }, 1000);
                return () => clearInterval(timer);
            }, [isSubmitted, isPaused]); 

            const formatTime = (seconds) => {
                const h = Math.floor(seconds / 3600);
                const m = Math.floor((seconds % 3600) / 60);
                const s = seconds % 60;
                return `${h > 0 ? h + ':' : ''}${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            };

            const advanceQuestion = () => {
                if (currentQIndex < TEST_DATA.questions.length - 1) {
                    const nextQ = TEST_DATA.questions[currentQIndex + 1];
                    if (status[nextQ.id] === 'not_visited') setStatus(prev => ({ ...prev, [nextQ.id]: 'not_answered' }));
                    setCurrentQIndex(prev => prev + 1);
                }
            };

            const handleOptionSelect = (optId) => {
                if(isPaused) return;
                setAnswers(prev => ({ ...prev, [TEST_DATA.questions[currentQIndex].id]: optId }));
            };

            const handleSaveAndNext = () => {
                if(isPaused) return;
                const cid = TEST_DATA.questions[currentQIndex].id;
                setStatus(prev => ({ ...prev, [cid]: answers[cid] ? 'answered' : 'not_answered' }));
                advanceQuestion();
            };

            const handleMarkForReview = () => {
                if(isPaused) return;
                const cid = TEST_DATA.questions[currentQIndex].id;
                setStatus(prev => ({ ...prev, [cid]: answers[cid] ? 'marked_answered' : 'marked' }));
                advanceQuestion();
            };

            const handleClearResponse = () => {
                if(isPaused) return;
                const cid = TEST_DATA.questions[currentQIndex].id;
                setAnswers(prev => { const newAns = { ...prev }; delete newAns[cid]; return newAns; });
                setStatus(prev => ({ ...prev, [cid]: 'not_answered' }));
            };

            const handlePaletteClick = (index) => {
                if(isPaused) return;
                const cid = TEST_DATA.questions[currentQIndex].id;
                if (status[cid] === 'not_visited' || (status[cid] === 'not_answered' && !answers[cid])) {
                    setStatus(prev => ({ ...prev, [cid]: 'not_answered' }));
                }
                const tid = TEST_DATA.questions[index].id;
                if (status[tid] === 'not_visited') setStatus(prev => ({ ...prev, [tid]: 'not_answered' }));
                setCurrentQIndex(index);
                setIsPaletteOpen(false); 
            };

            const handleSubmit = (auto = false) => {
                if (auto || confirm("Are you sure you want to submit the test? No changes can be made after submission.")) {
                    setIsSubmitted(true);
                    setIsPaused(false);
                }
            };

            const counts = useMemo(() => {
                const c = { answered: 0, not_answered: 0, marked: 0, marked_answered: 0, not_visited: 0 };
                Object.values(status).forEach(s => { if (c[s] !== undefined) c[s]++; });
                return c;
            }, [status]);

            if (isSubmitted) {
                let score = 0, correct = 0, wrong = 0;
                TEST_DATA.questions.forEach(q => {
                    if (answers[q.id] === q.correctAnswer) { score += TEST_DATA.marksForCorrect; correct++; } 
                    else if (answers[q.id]) { score -= TEST_DATA.marksForWrong; wrong++; }
                });

                const attempted = correct + wrong;
                const accuracy = attempted > 0 ? Math.round((correct / attempted) * 100) : 0;
                const percentage = Math.max(0, Math.round((score / TEST_DATA.totalMarks) * 100));
                const isPass = percentage >= TEST_DATA.passPercentage;

                return (
                    <div className="h-full overflow-y-auto p-4 md:p-8 print:p-0 bg-slate-50 print:bg-white print:h-auto print:overflow-visible">
                        <div className="max-w-5xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100 print-border-none print:shadow-none">
                            <div className="bg-blue-600 text-white p-10 relative print:text-slate-900 print:bg-white print:border-b-2 print:border-slate-300 print:p-0 print:mb-8">
                                <div className="absolute top-0 right-0 w-64 h-64 bg-white opacity-5 rounded-full -mt-20 -mr-20 blur-2xl print-hidden"></div>
                                <div className="flex flex-col md:flex-row justify-between items-center gap-6 relative z-10 print:flex-row print:items-start">
                                    <div className="text-center md:text-left">
                                        <h1 className="text-4xl font-extrabold mb-2 tracking-tight">Performance Report</h1>
                                        <p className="opacity-90 font-semibold text-lg">{TEST_DATA.title}</p>
                                        <p className="opacity-70 text-sm mt-1">{TEST_DATA.organization}</p>
                                    </div>
                                    <div className="flex gap-6 items-center">
                                        <div className={`px-6 py-4 rounded-2xl border-2 backdrop-blur-md print:border-2 print:bg-transparent flex items-center justify-between gap-6 min-w-[200px] ${isPass ? 'bg-green-500/20 border-green-400 print:border-green-600 print:text-green-700' : 'bg-red-500/20 border-red-400 print:border-red-600 print:text-red-700'}`}>
                                            <div className="text-left">
                                                <div className="text-[10px] uppercase tracking-widest font-bold opacity-80 mb-0.5">Final Status</div>
                                                <div className="text-2xl font-black leading-none">{isPass ? 'PASSED' : 'FAILED'}</div>
                                            </div>
                                            <div className="text-4xl leading-none">{isPass ? '🎉' : '❌'}</div>
                                        </div>
                                    </div>
                                </div>
                                <button onClick={() => window.print()} className="print-hidden absolute right-6 top-6 bg-white/20 hover:bg-white/30 text-white px-5 py-2.5 rounded-full font-bold transition shadow-lg backdrop-blur-sm flex items-center gap-2">
                                    <Icons.Printer/> Save PDF
                                </button>
                            </div>

                            <div className="p-10 grid grid-cols-1 md:grid-cols-3 gap-8 border-b border-slate-100 bg-slate-50/50 print:bg-white print:border-b-0 print-break-avoid">
                                <DonutChart percentage={percentage} color="#2563eb" label="Score Percentage" />
                                <DonutChart percentage={accuracy} color="#10b981" label="Accuracy" />
                                <div className="flex flex-col justify-center space-y-4">
                                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center print:border-slate-300">
                                        <span className="text-slate-500 font-bold">Total Marks</span>
                                        <span className="text-3xl font-black text-blue-600">{score} <span className="text-lg text-slate-400 font-bold">/ {TEST_DATA.totalMarks}</span></span>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-green-50 p-4 rounded-2xl border border-green-100 text-center print:border-slate-300 print:bg-white">
                                            <div className="text-green-600 text-3xl font-black">{correct}</div>
                                            <div className="text-xs font-bold text-green-700 uppercase mt-1">Correct</div>
                                        </div>
                                        <div className="bg-red-50 p-4 rounded-2xl border border-red-100 text-center print:border-slate-300 print:bg-white">
                                            <div className="text-red-600 text-3xl font-black">{wrong}</div>
                                            <div className="text-xs font-bold text-red-700 uppercase mt-1">Wrong</div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="p-6 md:p-10">
                                <h2 className="text-2xl font-extrabold text-slate-800 mb-8 flex items-center gap-3 border-b border-slate-200 pb-4">
                                    Detailed Solutions
                                </h2>
                                <div className="space-y-8">
                                    {TEST_DATA.questions.map((q, i) => {
                                        const userAns = answers[q.id];
                                        const isCorrect = userAns === q.correctAnswer;
                                        const isSkipped = !userAns;
                                        let borderColor = isCorrect ? 'border-green-500' : (isSkipped ? 'border-slate-300' : 'border-red-500');
                                        let bgClass = isCorrect ? 'bg-green-50/50' : (isSkipped ? 'bg-white' : 'bg-red-50/50');

                                        return (
                                            <div key={q.id} className={`border-l-8 ${borderColor} ${bgClass} p-6 rounded-2xl shadow-sm border border-slate-100 print-break-avoid print:border print:border-l-8 print:shadow-none`}>
                                                <div className="flex gap-4 mb-6">
                                                    <span className="font-black text-slate-400 text-xl">Q{i+1}.</span>
