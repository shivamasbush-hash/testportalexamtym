ee\nC. Verma Committee\nD. Saraf Committee\nE. Rashid Jilani Committee", "options": [{"id": "1", "text": "A, B, C, D, E"}, {"id": "2", "text": "A, E, D, B, C"}, {"id": "3", "text": "A, E, B, D, C"}, {"id": "4", "text": "A, D, E, B, C"}], "correctAnswer": "2", "explanation": "Key Concept:** Chronological timeline of pivotal committees formed to reform the Indian banking sector.\n* Phase A: Narsimham Committee I (1991).\n* Phase B: Rashid Jilani Committee (1993).\n* Phase C: Saraf Committee (1994).\n* Phase D: Padmanabhan Committee (1995).\n* Phase E: Verma Committee (1999).", "id": 82}, {"question": "Suppose a production function is given as $Q = -L^3 + 5L^2 + 10L$. Which law of production is revealed by this production function:", "options": [{"id": "1", "text": "Law of diminishing return"}, {"id": "2", "text": "Law of increasing return"}, {"id": "3", "text": "Law of constant return"}, {"id": "4", "text": "Law of return to scale"}], "correctAnswer": "1", "explanation": "Key Concept:** Analyzing mathematical production functions to determine short-run economic behaviors based on a single variable input (Labor).\n* Since only Labor ($L$) is varying, this is strictly a short-run production function.\n* \"Returns to Scale\" only applies in the long run when all inputs vary.\n* The negative cubic term mathematically guarantees that as Labor increases indefinitely, Marginal Product will eventually fall, revealing the Law of Variable Proportions (broadly known as the law of diminishing returns).", "id": 83}, {"question": "Which one of the followings is not a component of formal (organized) financial system?", "options": [{"id": "1", "text": "Financial Markets"}, {"id": "2", "text": "Financial Instruments"}, {"id": "3", "text": "Chit-fund Companies"}, {"id": "4", "text": "Financial Services"}], "correctAnswer": "3", "explanation": "Key Concept:** Distinguishing between the highly regulated formal financial sector and the loosely regulated informal sector.\n* The formal financial system comprises Financial Institutions, Financial Markets, Financial Instruments, and Financial Services.\n* Chit-funds, indigenous bankers, and local money lenders belong strictly to the informal or unorganized financial system.", "id": 84}, {"question": "Non-receipt of dividend by Investors is categorised in which type of complaints received by the SEBI?", "options": [{"id": "1", "text": "Type I"}, {"id": "2", "text": "Type II"}, {"id": "3", "text": "Type III"}, {"id": "4", "text": "Type IV"}], "correctAnswer": "2", "explanation": "Key Concept:** The categorization structure used by SEBI's SCORES platform to process investor grievances.\n* Type I: Primary Market issues (refund orders/allotment).\n* Type II: Non-receipt of declared dividends.\n* Type III: Non-receipt of physical share certificates/bonus shares.\n* Type IV: Debenture issues and interest.", "id": 85}, {"question": "The right of the insurer to stand in the place of insured after the settlement of a claim and it gives the insurer right to recover from an alternative source, the principle involved in this case is called:", "options": [{"id": "1", "text": "Principle of Insurable Interest"}, {"id": "2", "text": "Principle of Subrogation"}, {"id": "3", "text": "Principle of Causa Proxima"}, {"id": "4", "text": "Principle of Contribution"}], "correctAnswer": "2", "explanation": "Key Concept:** Subrogation is a legal doctrine in insurance that allows an insurer, after paying out a claim, to legally pursue the third party who caused the damage to recover the funds.\n* It prevents the insured from collecting twice.\n* Causa Proxima relates to finding the most direct cause of the loss.\n* Contribution applies when multiple policies cover the same asset.", "id": 86}, {"question": "Match List - I with List - II.\n| List - I | List - II |\n| :--- | :--- |\n| A. Occurs when a true null hypothesis is rejected | I. Type II Error |\n| B. Occurs when false null hypothesis does not get rejected | II. Type I Error |\n| C. Used for data from interval or ratio scales | III. Nonparametric Tests |\n| D. Used to test hypotheses with nominal and ordinal data | IV. Parametric Tests |", "options": [{"id": "1", "text": "A-I, B-II, C-III, D-IV"}, {"id": "2", "text": "A-I, B-II, C-IV, D-III"}, {"id": "3", "text": "A-II, B-I, C-IV, D-III"}, {"id": "4", "text": "A-II, B-I, C-III, D-IV"}], "correctAnswer": "3", "explanation": "Key Concept:** Fundamental definitions related to hypothesis testing errors and statistical test classifications.\n* Rejecting a true null hypothesis is a Type I Error.\n* Failing to reject a false null hypothesis is a Type II Error.\n* Interval/ratio scale data utilizes Parametric Tests.\n* Nominal/ordinal data utilizes Nonparametric Tests.", "id": 87}, {"question": "If the first quartile is 48 and quartile deviation is 6, the value of median assuming the distribution to be symmetrical is:", "options": [{"id": "1", "text": "50"}, {"id": "2", "text": "52"}, {"id": "3", "text": "54"}, {"id": "4", "text": "56"}], "correctAnswer": "3", "explanation": "Key Concept:** The mathematical relationship between quartiles, quartile deviation, and the median in a perfectly symmetrical distribution.\n* Step A: The formula for Quartile Deviation (QD) is $QD = \\frac{Q_3 - Q_1}{2}$.\n* Step B: Substitute the known values ($6 = \\frac{Q_3 - 48}{2}$).\n* Step C: Solve for the third quartile ($12 = Q_3 - 48 \\Rightarrow Q_3 = 60$).\n* Step D: In a symmetrical distribution, the Median lies exactly halfway between the quartiles ($\\frac{48 + 60}{2} = 54$).", "id": 88}, {"question": "Which one of the followings is not a type of conflict?", "options": [{"id": "1", "text": "Task Conflict"}, {"id": "2", "text": "Relationship Conflict"}, {"id": "3", "text": "Process Conflict"}, {"id": "4", "text": "Product Conflict"}], "correctAnswer": "4", "explanation": "Key Concept:** Organizational Behavior categorizes workplace conflicts into three primary functional types.\n* Task Conflict relates to the content and goals of the work.\n* Relationship Conflict focuses on interpersonal friction and hostility.\n* Process Conflict deals with how the work gets done and delegated.\n* \"Product Conflict\" is not a recognized OB classification.", "id": 89}, {"question": "Arm's length price as per section 92 F of the Income Tax Act is the price applied or proposed to be applied when:", "options": [{"id": "1", "text": "two related persons enter into a transaction in uncontrolled conditions."}, {"id": "2", "text": "two unrelated persons enter into a transaction in controlled conditions."}, {"id": "3", "text": "two related persons enter into a transaction in controlled conditions."}, {"id": "4", "text": "two unrelated persons enter into a transaction in uncontrolled conditions."}], "correctAnswer": "4", "explanation": "Key Concept:** Transfer pricing regulations aim to prevent corporations from shifting profits to low-tax jurisdictions.\n* \"Arm's length price\" dictates that internal transactions must be priced identically to what would occur if two entirely independent, competitive entities were trading on the open market.\n* \"Unrelated persons\" ensures there is no mutual interest in tax evasion.\n* \"Uncontrolled conditions\" means normal market forces dictate the price.\n**Comprehension Passage: Read the following passage and answer the questions (91-95)**\nAn application was sent to registrar of companies to obtain the certificate of incorporation on 30 June 2024. One of the promotors, Raj, made the allotment of shares of the company on 28 June 2024. He also made a contract to buy a certain machinery from Pooja by representing himself as an agent of the company on 20 June 2024.\nRaj also signed the Memorandum of Association (MOA) of the company on behalf of all seven members to obtain the certificate of incorporation.\nInspite of all these, the certificate of incorporation was issued in respect of ABC company but wrongly dated as 25 June 2024.\nAfter sometimes, it is also found that two of the members out of seven members named in MOA were minors.\nHe also entered into a contract after the incorporation of company to buy a building from Prakash for Rs. 1,00,00,000 but before obtaining the certificate of commencement of business.", "id": 90}, {"question": "The certificate of incorporation of ABC is:", "options": [{"id": "1", "text": "Void as it is obtained by forged document"}, {"id": "2", "text": "Void as it is obtained by including minor promotors"}, {"id": "3", "text": "Valid, even if irregular, cannot be cancelled"}, {"id": "4", "text": "Valid, but from 30th June 2024 and not from 25th June"}], "correctAnswer": "3", "explanation": "Key Concept:** The Doctrine of Conclusiveness states that once a Certificate of Incorporation is issued by the ROC, it is conclusive legal evidence that all requirements for registration have been fully complied with.\n* Even if there are massive irregularities (like minor signatories), the incorporation itself cannot be instantly voided or cancelled by third parties.", "id": 91}, {"question": "The allotment of shares was challenged as it was done before sending the application to the Registrar of Companies. Choose the correct answer:", "options": [{"id": "1", "text": "The allotment of shares is void as the certificate of incorporation is not valid"}, {"id": "2", "text": "The allotment of shares is valid as it is made after obtaining the certificate of incorporation"}, {"id": "3", "text": "The allotment of shares is void as application to obtain certificate was sent on 30th June"}, {"id": "4", "text": "The allotment of shares is void as the certificate was obtained by forged document"}], "correctAnswer": "2", "explanation": "Key Concept:** Legal fiction created by the conclusive nature of the incorporation date.\n* The certificate is wrongly dated June 25, 2024. Legally, the company was \"born\" on this date.\n* Raj allotted the shares on June 28. Because June 28 falls after the legal incorporation date, the actions of the company are considered legally valid. Courts cannot look behind the certificate.", "id": 92}, {"question": "The contract to buy a building from Prakash for \u20b91,00,00,000 will be called:", "options": [{"id": "1", "text": "Pre-incorporation Contract"}, {"id": "2", "text": "Provisional Contract"}, {"id": "3", "text": "Preliminary Contract"}, {"id": "4", "text": "Void Contract"}], "correctAnswer": "2", "explanation": "Key Concept:** A Provisional Contract is an agreement entered into by a public company after it receives its certificate of incorporation but before it receives its certificate of commencement of business.\n* These contracts are not legally binding on the company until the commencement certificate is acquired.", "id": 93}, {"question": "The contract made with Pooja on 20 June 2024 will be called:", "options": [{"id": "1", "text": "Pre-incorporation Contract"}, {"id": "2", "text": "Provisional Contract"}, {"id": "3", "text": "Preliminary Contract"}, {"id": "4", "text": "Standard Contract"}], "correctAnswer": "1", "explanation": "Key Concept:** Contracts entered into by promoters on behalf of a proposed company before it is officially registered and brought into legal existence are formally classified as pre-incorporation contracts.", "id": 94}, {"question": "Which of the followings is correct?", "options": [{"id": "1", "text": "Pooja can claim payment of machinery from the company as Raj acted on behalf of the company."}, {"id": "2", "text": "Pooja can claim the payment from Raj, who will be personally liable as she is considering that it is a provisional contract."}, {"id": "3", "text": "Raj will be personally liable as for all pre-incorporation contracts, promotors are personally liable"}, {"id": "4", "text": "Raj will not be liable as the machinery was used by the company not by Raj for his personal benefits."}], "correctAnswer": "3", "explanation": "Key Concept:** The absolute personal liability of promoters for contracts they sign before the company exists as a separate legal entity.\n* Since the company did not exist on June 20, Raj could not legally act as its agent.\n* The law holds the promoter personally liable to protect third parties who provide goods or services prior to formation.\n**Comprehension Passage: Read the following passage and answer the questions (96-100)**\nEcofresh Pvt. Ltd, a startup in India, produces eco-friendly home cleaning products such as liquid detergents, floor cleaners and dishwashing liquids. The company follows a green marketing approach and highlights its products as biodegradable, safe and affordable.\nTo reach its customers, Ecofresh sells through online Platforms, retail stores and direct sales agents. The firm has designed its marketing mix carefully. Pricing is slightly above competitors due to its ecofriendly positioning but promotions include digital campaigns, social media advertising and discounts on bulk purchases.\nRecently Ecofresh launched a new product; a herbal air freshener. During its product life cycle's introduction stage, the firm invested heavily in promotion and awareness building activities. The company also engages in customer relationship management by offering loyalty points and personalised recommendation to repeat buyers.", "id": 95}, {"question": "Ecofresh use of digital campaigns, social media and discounts reflects decisions related to:", "options": [{"id": "1", "text": "Distribution Mix"}, {"id": "2", "text": "Promotion Mix"}, {"id": "3", "text": "Product Mix"}, {"id": "4", "text": "Pricing Policy"}], "correctAnswer": "2", "explanation": "Key Concept:** The Promotion Mix represents the specific blend of advertising, public relations, personal selling, and sales promotion tools.\n* Digital campaigns and social media fall strictly under Advertising.\n* Discounts on bulk purchases fall strictly under Sales Promotion.", "id": 96}, {"question": "The use of loyalty points is an example of:", "options": [{"id": "1", "text": "Advertising"}, {"id": "2", "text": "Sales Promotion"}, {"id": "3", "text": "Personal Selling"}, {"id": "4", "text": "Sponsorship"}], "correctAnswer": "2", "explanation": "Key Concept:** Sales promotions are short-to-medium term incentives explicitly designed to encourage immediate purchase or repeat business.\n* Loyalty programs act as a consumer promotion tool to guarantee repeat business and reduce churn.", "id": 97}, {"question": "By selling through online platforms, retail stores and direct sales agents, Ecofresh is focusing on:", "options": [{"id": "1", "text": "Pricing Strategies"}, {"id": "2", "text": "Promotional Mix"}, {"id": "3", "text": "Service Marketing"}, {"id": "4", "text": "Multi Channel distribution"}], "correctAnswer": "4", "explanation": "Key Concept:** Multi-channel distribution occurs when a single firm sets up two or more distinct marketing channels to reach customer segments.\n* An online platform is a direct digital channel.\n* Retail stores represent an indirect channel.\n* Direct sales agents represent personal selling channels.", "id": 98}, {"question": "Ecofresh's emphasis on biodegradable safe product reflects which marketing approach?", "options": [{"id": "1", "text": "Production approach"}, {"id": "2", "text": "Selling approach"}, {"id": "3", "text": "Societal marketing approach"}, {"id": "4", "text": "Product approach"}], "correctAnswer": "3", "explanation": "Key Concept:** The Societal Marketing Concept holds that a company's marketing decisions should balance consumers' immediate wants, the company's financial requirements, and society's long-term well-being.\n* Green marketing (biodegradable, eco-friendly) is the prime example of the societal marketing approach.", "id": 99}, {"question": "The launch of herbal air freshener during its introduction stage of the product life cycle primarily requires heavy investment in promotion and awareness building activity. It will lead to (in short run):", "options": [{"id": "1", "text": "High Profit"}, {"id": "2", "text": "Low/Negative Profit"}, {"id": "3", "text": "High Revenue, low cost"}, {"id": "4", "text": "High Revenue, High cost"}], "correctAnswer": "2", "explanation": "**Key Concept:** During the Introduction stage of the Product Life Cycle (PLC), massive upfront costs combined with low initial sales volume inevitably result in financial losses.\n* Promotion expenses are at their absolute peak ratio compared to sales because the primary objective is to build awareness.\n* Profitability generally only begins during the subsequent \"Growth\" stage.", "id": 100}]};

        marked.setOptions({ breaks: true, gfm: true });

        const mathExtension = {
            name: 'math',
            level: 'inline',
            start(src) { return src.indexOf('$'); },
            tokenizer(src, tokens) {
                const blockRule = /^\$\$(.*?)\$\$/s;
                const inlineRule = /^\$([^$\n]+)\$/;
                let match;
                if ((match = blockRule.exec(src))) {
                    return { type: 'math', raw: match[0], text: match[1], displayMode: true };
                } else if ((match = inlineRule.exec(src))) {
                    return { type: 'math', raw: match[0], text: match[1], displayMode: false };
                }
            },
            renderer(token) {
                const safeText = token.text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                return token.displayMode ? `$$${safeText}$$` : `$${safeText}$`;
            }
        };
        marked.use({ extensions: [mathExtension] });

            Alert: () => <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ef4444" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>,
            Printer: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>,
            Info: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>,
            Pause: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>,
            Play: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        };

        const DonutChart = ({ percentage, color, label }) => (
            <div className="flex flex-col items-center print-break-avoid">
                <svg viewBox="0 0 36 36" className="circular-chart w-28 h-28 mb-3">
                    <path className="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    <path className="circle" stroke={color} strokeDasharray={`${percentage}, 100`} d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    <text x="18" y="20.5" textAnchor="middle" className="text-3xl font-black fill-slate-800" style={{fontSize: "9px"}}>{percentage}%</text>
                </svg>
                <span className="font-bold text-slate-500 uppercase tracking-widest text-xs">{label}</span>
            </div>
        );

        const App = () => {
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [answers, setAnswers] = useState({}); 
            const [status, setStatus] = useState({});   
            const [timeLeft, setTimeLeft] = useState(TEST_DATA.durationMinutes * 60);
            const [isSubmitted, setIsSubmitted] = useState(false);
            const [isPaletteOpen, setIsPaletteOpen] = useState(false);
            const [isPaused, setIsPaused] = useState(false); 
            const [warnings, setWarnings] = useState(0);
            const [showWarning, setShowWarning] = useState(false);

            useEffect(() => {
                if (window.MathJax && window.MathJax.typesetPromise) {
                    window.MathJax.typesetPromise().catch((err) => console.log('MathJax error: ', err));
                }
            });

            useEffect(() => {
                if (!TEST_DATA.strictMode || isSubmitted) return;
                const handleVisibility = () => {
                    if (document.hidden) {
                        setWarnings(w => w + 1);
                        setShowWarning(true);
                    }
                };
                document.addEventListener("visibilitychange", handleVisibility);
                return () => document.removeEventListener("visibilitychange", handleVisibility);
            }, [isSubmitted]);

            useEffect(() => {
                if (isSubmitted || isPaused) return; 
                const timer = setInterval(() => {
                    setTimeLeft(prev => {
                        if (prev <= 0) { handleSubmit(true); return 0; }
                        return prev - 1;
                    });
                }, 1000);
                return () => clearInterval(timer);
            }, [isSubmitted, isPaused]); 

            const formatTime = (seconds) => {
                const h = Math.floor(seconds / 3600);
                const m = Math.floor((seconds % 3600) / 60);
                const s = seconds % 60;
                return `${h > 0 ? h + ':' : ''}${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            };

            const advanceQuestion = () => {
                if (currentQIndex < TEST_DATA.questions.length - 1) {
                    const nextQ = TEST_DATA.questions[currentQIndex + 1];
                    if (status[nextQ.id] === 'not_visited') setStatus(prev => ({ ...prev, [nextQ.id]: 'not_answered' }));
                    setCurrentQIndex(prev => prev + 1);
                }
            };

            const handleOptionSelect = (optId) => {
                if(isPaused) return;
                setAnswers(prev => ({ ...prev, [TEST_DATA.questions[currentQIndex].id]: optId }));
            };

            const handleSaveAndNext = () => {
                if(isPaused) return;
                const cid = TEST_DATA.questions[currentQIndex].id;
                setStatus(prev => ({ ...prev, [cid]: answers[cid] ? 'answered' : 'not_answered' }));
                advanceQuestion();
            };

            const handleMarkForReview = () => {
                if(isPaused) return;
                const cid = TEST_DATA.questions[currentQIndex].id;
                setStatus(prev => ({ ...prev, [cid]: answers[cid] ? 'marked_answered' : 'marked' }));
                advanceQuestion();
            };

            const handleClearResponse = () => {
                if(isPaused) return;
                const cid = TEST_DATA.questions[currentQIndex].id;
                setAnswers(prev => { const newAns = { ...prev }; delete newAns[cid]; return newAns; });
                setStatus(prev => ({ ...prev, [cid]: 'not_answered' }));
            };

            const handlePaletteClick = (index) => {
                if(isPaused) return;
                const cid = TEST_DATA.questions[currentQIndex].id;
                if (status[cid] === 'not_visited' || (status[cid] === 'not_answered' && !answers[cid])) {
                    setStatus(prev => ({ ...prev, [cid]: 'not_answered' }));
                }
                const tid = TEST_DATA.questions[index].id;
                if (status[tid] === 'not_visited') setStatus(prev => ({ ...prev, [tid]: 'not_answered' }));
                setCurrentQIndex(index);
                setIsPaletteOpen(false); 
            };

            const handleSubmit = (auto = false) => {
                if (auto || confirm("Are you sure you want to submit the test? No changes can be made after submission.")) {
                    setIsSubmitted(true);
                    setIsPaused(false);
                }
            };

            const counts = useMemo(() => {
                const c = { answered: 0, not_answered: 0, marked: 0, marked_answered: 0, not_visited: 0 };
                Object.values(status).forEach(s => { if (c[s] !== undefined) c[s]++; });
                return c;
            }, [status]);

            if (isSubmitted) {
                let score = 0, correct = 0, wrong = 0;
                TEST_DATA.questions.forEach(q => {
                    if (answers[q.id] === q.correctAnswer) { score += TEST_DATA.marksForCorrect; correct++; } 
                    else if (answers[q.id]) { score -= TEST_DATA.marksForWrong; wrong++; }
                });

                const attempted = correct + wrong;
                const accuracy = attempted > 0 ? Math.round((correct / attempted) * 100) : 0;
                const percentage = Math.max(0, Math.round((score / TEST_DATA.totalMarks) * 100));
                const isPass = percentage >= TEST_DATA.passPercentage;

                return (
                    <div className="h-full overflow-y-auto p-4 md:p-8 print:p-0 bg-slate-50 print:bg-white print:h-auto print:overflow-visible">
                        <div className="max-w-5xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100 print-border-none print:shadow-none">
                            <div className="bg-blue-600 text-white p-10 relative print:text-slate-900 print:bg-white print:border-b-2 print:border-slate-300 print:p-0 print:mb-8">
                                <div className="absolute top-0 right-0 w-64 h-64 bg-white opacity-5 rounded-full -mt-20 -mr-20 blur-2xl print-hidden"></div>
                                <div className="flex flex-col md:flex-row justify-between items-center gap-6 relative z-10 print:flex-row print:items-start">
                                    <div className="text-center md:text-left">
                                        <h1 className="text-4xl font-extrabold mb-2 tracking-tight">Performance Report</h1>
                                        <p className="opacity-90 font-semibold text-lg">{TEST_DATA.title}</p>
                                        <p className="opacity-70 text-sm mt-1">{TEST_DATA.organization}</p>
                                    </div>
                                    <div className="flex gap-6 items-center">
                                        <div className={`px-6 py-4 rounded-2xl border-2 backdrop-blur-md print:border-2 print:bg-transparent flex items-center justify-between gap-6 min-w-[200px] ${isPass ? 'bg-green-500/20 border-green-400 print:border-green-600 print:text-green-700' : 'bg-red-500/20 border-red-400 print:border-red-600 print:text-red-700'}`}>
                                            <div className="text-left">
                                                <div className="text-[10px] uppercase tracking-widest font-bold opacity-80 mb-0.5">Final Status</div>
                                                <div className="text-2xl font-black leading-none">{isPass ? 'PASSED' : 'FAILED'}</div>
                                            </div>
                                            <div className="text-4xl leading-none">{isPass ? '🎉' : '❌'}</div>
                                        </div>
                                    </div>
                                </div>
                                <button onClick={() => window.print()} className="print-hidden absolute right-6 top-6 bg-white/20 hover:bg-white/30 text-white px-5 py-2.5 rounded-full font-bold transition shadow-lg backdrop-blur-sm flex items-center gap-2">
                                    <Icons.Printer/> Save PDF
                                </button>
                            </div>

                            <div className="p-10 grid grid-cols-1 md:grid-cols-3 gap-8 border-b border-slate-100 bg-slate-50/50 print:bg-white print:border-b-0 print-break-avoid">
                                <DonutChart percentage={percentage} color="#2563eb" label="Score Percentage" />
                                <DonutChart percentage={accuracy} color="#10b981" label="Accuracy" />
                                <div className="flex flex-col justify-center space-y-4">
                                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center print:border-slate-300">
                                        <span className="text-slate-500 font-bold">Total Marks</span>
                                        <span className="text-3xl font-black text-blue-600">{score} <span className="text-lg text-slate-400 font-bold">/ {TEST_DATA.totalMarks}</span></span>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-green-50 p-4 rounded-2xl border border-green-100 text-center print:border-slate-300 print:bg-white">
                                            <div className="text-green-600 text-3xl font-black">{correct}</div>
                                            <div className="text-xs font-bold text-green-700 uppercase mt-1">Correct</div>
                                        </div>
                                        <div className="bg-red-50 p-4 rounded-2xl border border-red-100 text-center print:border-slate-300 print:bg-white">
                                            <div className="text-red-600 text-3xl font-black">{wrong}</div>
                                            <div className="text-xs font-bold text-red-700 uppercase mt-1">Wrong</div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="p-6 md:p-10">
                                <h2 className="text-2xl font-extrabold text-slate-800 mb-8 flex items-center gap-3 border-b border-slate-200 pb-4">
                                    Detailed Solutions
                                </h2>
                                <div className="space-y-8">
                                    {TEST_DATA.questions.map((q, i) => {
                                        const userAns = answers[q.id];
                                        const isCorrect = userAns === q.correctAnswer;
                                        const isSkipped = !userAns;
                                        let borderColor = isCorrect ? 'border-green-500' : (isSkipped ? 'border-slate-300' : 'border-red-500');
                                        let bgClass = isCorrect ? 'bg-green-50/50' : (isSkipped ? 'bg-white' : 'bg-red-50/50');

                                        return (
                                            <div key={q.id} className={`border-l-8 ${borderColor} ${bgClass} p-6 rounded-2xl shadow-sm border border-slate-100 print-break-avoid print:border print:border-l-8 print:shadow-none`}>
                                                <div className="flex gap-4 mb-6">
                                                    <span className="font-black text-slate-400 text-xl">Q{i+1}.</span>
                                                    <div className="flex-1 text-slate-800 markdown-body text-[16px]" dangerouslySetInnerHTML={{ __html: marked.parse(q.question) }}></div>
                                                </div>
                                                <div className="ml-10 space-y-3 mb-6">
                                                    {q.options.map(opt => {
                                                        const isUserOpt = opt.id === userAns;
                                                        const isCorrectOpt = opt.id === q.correctAnswer;
                                                        
                                                        let optClass = "text-slate-600 bg-white border-slate-200";
                                                        let icon = "○";
                                                        if (isCorrectOpt) { optClass = "text-green-800 bg-green-100 border-green-300 font-bold"; icon = "✓"; }
                                                        else if (isUserOpt) { optClass = "text-red-700 bg-red-100 border-red-300 line-through"; icon = "✗"; }

                                                        return (
                                                            <div key={opt.id} className={`flex items-start gap-3 p-3 rounded-xl border ${optClass} print:bg-transparent print:border-slate-300`}>
                                                                <span className="mt-0.5 font-bold">{icon}</span>
                                                                <div className="markdown-body" style={{marginBottom: 0}} dangerouslySetInnerHTML={{ __html: marked.parseInline(opt.text) }}></div>
                                                            </div>
                                                        )
                                                    })}
                                                </div>
                                                {q.explanation && (
                                                    <div className="ml-10 p-5 bg-blue-50/50 rounded-xl border border-blue-100 print:bg-slate-50 print:border-slate-200">
                                                        <strong className="block mb-2 flex items-center gap-2 text-blue-700"><Icons.Info/> Expert Explanation:</strong>
                                                        <div className="markdown-body text-sm text-slate-700" dangerouslySetInnerHTML={{ __html: marked.parse(q.explanation) }}></div>
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            const currentQuestion = TEST_DATA.questions[currentQIndex];

            return (
                <div className="flex flex-col h-full bg-slate-50 relative">
                    {showWarning && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-white p-8 rounded-3xl shadow-2xl max-w-md text-center border-2 border-red-500">
                                <div className="w-20 h-20 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4 animate-bounce"><Icons.Alert /></div>
                                <h2 className="text-2xl font-black text-slate-800 mb-2">Warning Recorded!</h2>
                                <p className="text-slate-600 mb-6 font-medium">You switched tabs or minimized the window. (Warning {warnings})</p>
                                <button onClick={() => setShowWarning(false)} className="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-4 rounded-full shadow-lg transition transform active:scale-95 text-lg">I Understand</button>
                            </div>
                        </div>
                    )}

                    {isPaused && (
                        <div className="fixed inset-0 z-[90] bg-white/80 backdrop-blur-md flex flex-col items-center justify-center p-4">
                            <div className="bg-white p-10 rounded-3xl shadow-2xl border border-slate-200 text-center max-w-sm w-full">
                                <div className="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-6"><Icons.Pause /></div>
                                <h2 className="text-3xl font-black text-slate-800 mb-3">Test Paused</h2>
                                <button onClick={() => setIsPaused(false)} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-full shadow-lg transition transform active:scale-95 flex items-center justify-center gap-3 text-lg">
                                    <Icons.Play /> Resume Test
                                </button>
                            </div>
                        </div>
                    )}

                    <header className="glass-nav border-b border-slate-200 h-20 flex items-center justify-between px-6 z-20 sticky top-0 shadow-sm">
                        <div className="flex items-center gap-4">
                            <div className="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center shadow-lg shadow-blue-600/30 text-white font-black text-xl">E</div>
                            <div className="hidden sm:block">
                                <h1 className="font-extrabold text-lg text-slate-800 leading-tight">{TEST_DATA.organization}</h1>
                                <p className="text-xs text-slate-500 font-medium truncate max-w-[200px]">{TEST_DATA.title}</p>
                            </div>
                        </div>
                        <div className="absolute left-1/2 top-1/2 transform -translate-x-1/2 -translate-y-1/2 flex items-center">
                            <div className="flex items-center bg-white rounded-full border border-slate-200 p-1 shadow-sm overflow-hidden">
                                <div className="px-4 py-1.5 bg-slate-100 rounded-full text-xs font-bold text-slate-500 flex items-center gap-2">
                                    <span className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> LIVE
                                </div>
                                <div className="px-6 font-mono font-black text-xl text-blue-600 tracking-widest">{formatTime(timeLeft)}</div>
                            </div>
                        </div>
                        <div className="flex items-center gap-3">
                            {!isPaused && !isSubmitted && (
                                <button onClick={() => setIsPaused(true)} className="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-600 hover:bg-slate-200 hover:text-blue-600 transition" title="Pause Test"><Icons.Pause /></button>
                            )}
                            <div className="hidden md:flex items-center gap-3 pl-3 border-l border-slate-200">
                                <div className="w-10 h-10 rounded-full bg-gradient-to-r from-blue-400 to-indigo-500 p-0.5 shadow-md">
                                    <div className="w-full h-full bg-white rounded-full flex items-center justify-center text-slate-800"><Icons.User /></div>
                                </div>
                            </div>
                            <button className="md:hidden w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-600" onClick={() => setIsPaletteOpen(!isPaletteOpen)}><Icons.Menu /></button>
                        </div>
                    </header>

                    <div className="flex-1 flex overflow-hidden relative">
                        <div className={`flex-1 flex flex-col w-full transition-all duration-300 ${isPaused ? 'blur-content' : ''}`}>
                            <div className="flex-1 overflow-y-auto p-4 md:p-8 lg:p-12">
                                <div className="max-w-4xl mx-auto bg-white rounded-3xl p-8 shadow-sm border border-slate-100">
                                    <div className="flex justify-between items-center mb-8 pb-4 border-b border-slate-100">
                                        <div className="flex items-center gap-3">
                                            <span className="bg-blue-600 text-white px-5 py-2 rounded-full text-sm font-black shadow-md shadow-blue-600/20">Question {currentQIndex + 1}</span>
                                        </div>
                                        <div className="flex gap-2">
                                            <span className="bg-green-50 text-green-600 px-4 py-1.5 rounded-full text-xs font-bold border border-green-200">+{TEST_DATA.marksForCorrect}</span>
                                            <span className="bg-red-50 text-red-600 px-4 py-1.5 rounded-full text-xs font-bold border border-red-200">-{TEST_DATA.marksForWrong}</span>
                                        </div>
                                    </div>
                                    <div className="text-[17px] text-slate-800 markdown-body mb-8 leading-relaxed" dangerouslySetInnerHTML={{ __html: marked.parse(currentQuestion.question) }}></div>
                                    <div className="space-y-4">
                                        {currentQuestion.options.map(opt => {
                                            const isSelected = answers[currentQuestion.id] === opt.id;
                                            return (
                                                <div key={opt.id} onClick={() => handleOptionSelect(opt.id)} className={`group relative p-5 rounded-2xl cursor-pointer flex items-center gap-5 transition-all duration-200 border-2 ${isSelected ? 'border-blue-600 bg-blue-50/50 shadow-sm option-selected' : 'border-slate-200 hover:border-blue-300 hover:bg-slate-50'}`}>
                                                    <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center flex-shrink-0 custom-radio ${isSelected ? 'border-blue-600 bg-white' : 'border-slate-300 group-hover:border-blue-400'}`}></div>
                                                    <div className="text-slate-700 font-medium markdown-body flex-1 text-[16px]" style={{marginBottom:0}} dangerouslySetInnerHTML={{ __html: marked.parseInline(opt.text) }}></div>
                                                </div>
                                            )
                                        })}
                                    </div>
                                </div>
                            </div>
                            <div className="glass-nav border-t border-slate-200 p-5 md:px-12 flex items-center justify-between z-10">
                                <div className="flex gap-3">
                                    <button onClick={handleMarkForReview} className="px-6 py-3.5 bg-purple-50 text-purple-700 hover:bg-purple-100 rounded-full font-bold text-sm transition border border-purple-200"><span className="hidden md:inline">Mark for Review</span><span className="md:hidden">Review</span></button>
                                    <button onClick={handleClearResponse} className="px-6 py-3.5 bg-slate-100 text-slate-600 hover:bg-slate-200 rounded-full font-bold text-sm transition">Clear</button>
                                </div>
                                <button onClick={handleSaveAndNext} className="px-8 py-3.5 bg-blue-600 hover:bg-blue-700 text-white rounded-full font-black text-sm shadow-lg shadow-blue-600/30 transition transform active:scale-95 flex items-center gap-2">Save & Next <span className="text-xl leading-none">→</span></button>
                            </div>
                        </div>

                        <div className={`absolute inset-y-0 right-0 w-[320px] bg-white shadow-2xl transform transition-transform duration-300 z-30 flex flex-col border-l border-slate-200 ${isPaletteOpen ? 'translate-x-0' : 'translate-x-full'} md:translate-x-0 md:relative`}>
                            <div className="p-5 border-b border-slate-100 flex items-center gap-4 bg-slate-50">
                                <div className="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center text-blue-600"><Icons.User /></div>
                                <div><div className="font-bold text-slate-800">Candidate</div><div className="text-xs text-slate-500">{TEST_DATA.organization} Student</div></div>
                                <button className="ml-auto md:hidden text-slate-400" onClick={() => setIsPaletteOpen(false)}>✕</button>
                            </div>
                            <div className="p-5 grid grid-cols-2 gap-4 text-xs font-semibold border-b border-slate-100">
                                <div className="flex items-center gap-2 text-slate-600"><div className="w-3 h-3 rounded-full bg-[#10b981]"></div> Answered ({counts.answered})</div>
                                <div className="flex items-center gap-2 text-slate-600"><div className="w-3 h-3 rounded-full bg-[#ef4444]"></div> Not Ans ({counts.not_answered})</div>
                                <div className="flex items-center gap-2 text-slate-600"><div className="w-3 h-3 rounded-full bg-[#8b5cf6]"></div> Marked ({counts.marked + counts.marked_answered})</div>
                                <div className="flex items-center gap-2 text-slate-600"><div className="w-3 h-3 rounded-full border-2 border-slate-300 bg-slate-50"></div> Unvisited ({counts.not_visited})</div>
                            </div>
                            <div className="flex-1 overflow-y-auto p-5">
                                <div className="font-bold text-slate-700 mb-4 text-sm">Question Navigation:</div>
                                <div className="grid grid-cols-5 gap-2.5">
                                    {TEST_DATA.questions.map((q, idx) => (
                                        <button key={q.id} onClick={() => handlePaletteClick(idx)} className={`h-11 w-full flex items-center justify-center font-bold text-sm rounded-xl transition shadow-sm border ${currentQIndex === idx ? 'current-question' : 'border-transparent'} status-${status[q.id]}`}>{idx + 1}</button>
                                    ))}
                                </div>
                            </div>
                            <div className="p-5 border-t border-slate-100 bg-white">
                                <button onClick={() => handleSubmit(false)} className="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black py-4 rounded-2xl shadow-lg shadow-emerald-500/20 transition transform active:scale-95 text-lg">Submit Final Test</button>
                            </div>
                        </div>
                    </div>
                    {isPaletteOpen && <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-20 md:hidden" onClick={() => setIsPaletteOpen(false)}></div>}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
