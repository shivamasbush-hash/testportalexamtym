    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const TEST_DATA = {"title": "Commerce December 2025 PYQ", "organization": "ExamTym", "durationMinutes": 120, "totalMarks": 200.0, "marksForCorrect": 2.0, "marksForWrong": 0.0, "passPercentage": 40, "shuffle": false, "strictMode": false, "questions": [{"question": "Process of ensuring access to appropriate financial products and services needed by all sections of the society in general and vulnerable group such as weaker sections and low-income groups in particular at an affordable cost in a fair and transparent manner by mainstream institutional players is referred to as:", "options": [{"id": "1", "text": "Financial Integration"}, {"id": "2", "text": "Financial Instability"}, {"id": "3", "text": "Financial Inclusion"}, {"id": "4", "text": "Monetary Instability"}], "correctAnswer": "3", "explanation": "Key Concept:** Financial inclusion refers to the delivery of banking, credit, and financial services at affordable costs to the disadvantaged and low-income segments of society.\n**Related Concepts:**\n* Pradhan Mantri Jan Dhan Yojana (PMJDY) is a flagship initiative for this.\n* It aims to eliminate reliance on unorganized, exploitative money lenders.\n* The RBI uses priority sector lending (PSL) mandates to promote inclusion.\n* Payment banks and small finance banks were specifically created to boost rural and semi-urban access.\n* It comprehensively covers access to credit, insurance, and pension facilities.", "id": 1}, {"question": "Given below are two statements: one is labelled as Assertion (A) and the other is labelled as Reason (R).\nAssertion (A): The skimming price policy is adopted where close substitute of a new product are not available.\nReason (R): This policy requires fixing a lower initial price designed to penetrate the market as quickly as possible and is intended to maximize the profit in the long run.\nIn the light of the above statements, choose the most appropriate answer from the options given below:", "options": [{"id": "1", "text": "Both (A) and (R) are correct and (R) is the correct explanation of (A)"}, {"id": "2", "text": "Both (A) and (R) are correct but (R) is not the correct explanation of (A)"}, {"id": "3", "text": "(A) is correct but (R) is not correct"}, {"id": "4", "text": "(A) is not correct but (R) is correct"}], "correctAnswer": "3", "explanation": "Key Concept:** Price Skimming involves setting a high initial price to target early adopters, whereas Penetration Pricing involves setting a low initial price to gain market share quickly.\n**Assertion-Reason Analysis:** The Assertion is correct because skimming works best for highly differentiated, innovative products without immediate competition. The Reason is completely incorrect as it perfectly defines \"Penetration Pricing,\" which is the exact opposite of the skimming policy mentioned in the assertion.", "id": 2}, {"question": "Given below are two statements: one is labelled as Assertion (A) and the other is labelled as Reason (R).\nAssertion (A): Heckscher and Ohlin developed a theory to explain the reasons for differences in relative commodity prices and competitive advantages between two nations. According to this theory, a nation will export the commodity whose production requires intensive use of nation's relatively abundant and cheap factors and import the commodity whose production requires intensive use of the nation's scarce and expensive factors.\nReason (R): Thus, a country with an abundance of cheap labour would import labour intensive products and export capital intensive goods and vice-versa.\nIn the light of the above statements, choose the most appropriate answer from the options given below:", "options": [{"id": "1", "text": "Both (A) and (R) are correct and (R) is the correct explanation of (A)"}, {"id": "2", "text": "Both (A) and (R) are correct but (R) is not the correct explanation of (A)"}, {"id": "3", "text": "(A) is correct but (R) is not correct"}, {"id": "4", "text": "(A) is not correct but (R) is correct"}], "correctAnswer": "3", "explanation": "Key Concept:** The Heckscher-Ohlin (H-O) Factor Endowment Theory states that a country possesses comparative advantage in and will export goods that intensely utilize its locally abundant factors of production.\n**Assertion-Reason Analysis:** The Assertion accurately defines the H-O theory's core premise. The Reason is factually incorrect because a labor-abundant country would *export* labor-intensive products, not import them.", "id": 3}, {"question": "For assessment year 2025-26, 'Health and Education Cess' shall be levied at the rate of:", "options": [{"id": "1", "text": "1% on Income Tax"}, {"id": "2", "text": "2% on Income Tax"}, {"id": "3", "text": "3% on Income Tax"}, {"id": "4", "text": "4% on Income Tax"}], "correctAnswer": "4", "explanation": "Key Concept:** The Health and Education Cess is a dedicated additional tax levied on the basic income tax liability (plus applicable surcharge) to fund specific government social initiatives.\n* It replaced the earlier 3% Education Cess.\n* It is applicable to all categories of taxpayers (individuals, HUFs, firms, companies).\n* It was introduced in the Finance Act, 2018.", "id": 4}, {"question": "A possible cost of FDI to the host country is:", "options": [{"id": "1", "text": "Employment opportunities may increase in the short run but long run competitiveness will be reduced."}, {"id": "2", "text": "Technology transfer always leads to dependency and no local innovation gets encouraged."}, {"id": "3", "text": "Repatriation of profits may lead to capital outflows."}, {"id": "4", "text": "FDI inflows always worsen the host country's BoP position."}], "correctAnswer": "3", "explanation": "Key Concept:** While Foreign Direct Investment brings initial capital into a host country, multinational corporations eventually send their generated profits and dividends back to their home country (repatriation), which exerts negative pressure on the host's Balance of Payments.\n* FDI brings valuable technology, capital, and managerial expertise initially.\n* High repatriation can weaken the host country's currency exchange rate.", "id": 5}, {"question": "The probability that a leap year selected at random contains either 53 Sundays or 53 Mondays is:", "options": [{"id": "1", "text": "1/7"}, {"id": "2", "text": "2/7"}, {"id": "3", "text": "3/7"}, {"id": "4", "text": "4/7"}], "correctAnswer": "3", "explanation": "Key Concept:** Probability calculation based on the extra days remaining in a leap year.\n**Step-by-Step Solution:**\n* Step A: A leap year consists of 366 days, which divides exactly into 52 weeks and 2 extra days.\n* Step B: These 2 extra consecutive days form the sample space: (Sun, Mon), (Mon, Tue), (Tue, Wed), (Wed, Thu), (Thu, Fri), (Fri, Sat), (Sat, Sun). Total possible outcomes = 7.\n* Step C: We need outcomes containing either a Sunday or a Monday: (Sat, Sun), (Sun, Mon), and (Mon, Tue).\n* Step D: Total favorable outcomes = 3.\n* Step E: Required Probability = 3/7.", "id": 6}, {"question": "Which of the followings are the myths about Rural Market?\nA. All Villages are equally populated\nB. Rural Consumers are a hetrogeneous lot\nC. Being illiterate, rural consumer is not able to discriminate between products and brands\nD. Only low priced products will sell in rural India\nE. Rural markets are the consumer durable markets", "options": [{"id": "1", "text": "A, B, C and D Only"}, {"id": "2", "text": "A, C and D Only"}, {"id": "3", "text": "C, D and E Only"}, {"id": "4", "text": "B, C, D and E Only"}], "correctAnswer": "2", "explanation": "Key Concept:** Distinguishing between outdated stereotypes (myths) and the factual reality of modern rural consumer behavior and market dynamics in India.\n* Statement B is a fact, not a myth; rural markets are highly heterogeneous culturally and economically.\n* Rural consumers are increasingly brand-conscious and value-driven, not easily fooled (C is a myth).\n* Aspiration levels have risen, meaning premium products also find rural buyers (D is a myth).", "id": 7}, {"question": "Identify the correct equation of Cobb-Douglas production function:", "options": [{"id": "1", "text": "Q = A + L^\u03b1 K^\u03b2"}, {"id": "2", "text": "Q = A \u00d7 L^\u03b1 K^\u03b2"}, {"id": "3", "text": "Q = A \u00f7 L^\u03b1 K^\u03b2"}, {"id": "4", "text": "Q = A \u2212 L^\u03b1 K^\u03b2"}], "correctAnswer": "2", "explanation": "Key Concept:** The Cobb-Douglas mathematical function is a specific functional form of the production function, widely used to represent the technological relationship between the amounts of two or more inputs and the amount of output.\n* $Q$ stands for total production/output.\n* $L$ is labor input, and $K$ is capital input.\n* $A$ represents total factor productivity, often indicating the level of technology.\n* $\\alpha$ and $\\beta$ represent the output elasticities of labor and capital, respectively.", "id": 8}, {"question": "Which statement best captures the difference between FDI and FPI?", "options": [{"id": "1", "text": "FDI is investment with lasting interest and managerial control; FPI is passive investment without control."}, {"id": "2", "text": "FDI involves only equity investment; FPI involves both equity and debt security."}, {"id": "3", "text": "FDI is recorded in current account; FPI is recorded in capital account."}, {"id": "4", "text": "Both FDI and FPI give investors voting rights in the host country."}], "correctAnswer": "1", "explanation": "Key Concept:** Foreign Direct Investment (FDI) involves establishing operational control and a long-term presence, whereas Foreign Portfolio Investment (FPI) consists of purchasing financial assets purely for financial returns without management influence.\n* FPI is highly liquid, making it susceptible to quick withdrawal (\"hot money\").\n* An equity stake of 10% or more in a foreign enterprise is traditionally classified as FDI.", "id": 9}, {"question": "Arrange the followings in the correct sequence in which they are computed for determining Net Cash from operating activities as per AS-3 (Revised):\nA. Operating profit before Working Capital Changes\nB. Cash flow before extra ordinary items\nC. Cash generated from operations\nD. Net Profit before taxation and extra ordinary items", "options": [{"id": "1", "text": "A, B, C, D"}, {"id": "2", "text": "D, B, A, C"}, {"id": "3", "text": "C, D, B, A"}, {"id": "4", "text": "D, A, C, B"}], "correctAnswer": "4", "explanation": "Key Concept:** The indirect method format mandated by Accounting Standard 3 (AS-3) for calculating cash flows from operating activities.\n**Sequence Reasoning:** * First: Start with **Net Profit before taxation and extra ordinary items (D)**.\n* Second: Adjust for non-cash and non-operating items to arrive at **Operating profit before Working Capital Changes (A)**.\n* Third: Adjust for changes in current assets and liabilities to calculate **Cash generated from operations (C)**.\n* Fourth: Deduct income taxes paid to determine **Cash flow before extra ordinary items (B)**.", "id": 10}, {"question": "Which one of the followings is not an external technique of Foreign Exchange Risk Management?", "options": [{"id": "1", "text": "Forward Contracts"}, {"id": "2", "text": "Currency Futures"}, {"id": "3", "text": "Netting"}, {"id": "4", "text": "Swaps"}], "correctAnswer": "3", "explanation": "Key Concept:** Foreign exchange risk management techniques are divided into internal strategies (policies within a firm's operational control) and external techniques (contractual financial agreements with third parties).\n* Netting is an internal technique where a firm consolidates and offsets payables and receivables in the same currency to minimize exchange volume.\n* Forward contracts, futures, and swaps are all external agreements.", "id": 11}, {"question": "Match List - I with List - II.\n| List I (Ind AS) | List II (Subject) |\n| :--- | :--- |\n| A. Ind AS 7 | I. Impairment of Assets |\n| B. Ind AS 24 | II. Related Party Disclosures |\n| C. Ind AS 36 | III. Consolidated Financial Statement |\n| D. Ind AS 110 | IV. Statement of Cash Flows |", "options": [{"id": "1", "text": "A-I, B-II, C-III, D-IV"}, {"id": "2", "text": "A-IV, B-II, C-I, D-III"}, {"id": "3", "text": "A-III, B-IV, C-I, D-II"}, {"id": "4", "text": "A-IV, B-III, C-II, D-I"}], "correctAnswer": "2", "explanation": "Key Concept:** Matching specific Indian Accounting Standards (Ind AS) with their respective regulatory subject matters.\n* Ind AS 7: Statement of Cash Flows\n* Ind AS 24: Related Party Disclosures\n* Ind AS 36: Impairment of Assets\n* Ind AS 110: Consolidated Financial Statement", "id": 12}, {"question": "Which of the following sections of research reports contains Executive Summary?", "options": [{"id": "1", "text": "Prefatory Information"}, {"id": "2", "text": "Introductory Information"}, {"id": "3", "text": "Main Research Body"}, {"id": "4", "text": "Supplementary Information"}], "correctAnswer": "1", "explanation": "Key Concept:** The structural layout of a formal research report, where preliminary sections establish the context before the main methodology and findings are presented.\n* Prefatory (or preliminary) parts include the title page, letter of transmittal, and the Executive Summary.\n* The Executive Summary is designed to give busy decision-makers a quick overview without reading the main body.", "id": 13}, {"question": "Given below are two statements: one is labelled as Assertion (A) and the other is labelled as Reason (R).\nAssertion (A): A gentlemen died leaving a young widow. The relatives of the deceased threatened the widow to adopt a boy otherwise they would not allow her to remove the dead body of her husband for cremation. The widow adopted the boy.\nReason (R): The widow subsequently cancelled the adoption. The court held her consent was not free due to coercion.\nIn the light of the above statements, choose the most appropriate answer from the options given below:", "options": [{"id": "1", "text": "Both (A) and (R) are correct and (R) is the correct explanation of (A)"}, {"id": "2", "text": "Both (A) and (R) are correct but (R) is not the correct explanation of (A)"}, {"id": "3", "text": "(A) is correct but (R) is not correct"}, {"id": "4", "text": "(A) is not correct but (R) is correct"}], "correctAnswer": "1", "explanation": "Key Concept:** Under Section 15 of the Indian Contract Act, consent is not \"free\" if obtained through coercion, defined as threatening to commit acts forbidden by the Indian Penal Code (IPC).\n**Assertion-Reason Analysis:** The Assertion outlines a scenario where relatives threaten to prevent lawful cremation. The Reason correctly identifies this threat as \"coercion\", voiding the free consent required for the contract.", "id": 14}, {"question": "Given below are two statements: one is labelled as Assertion (A) and the other is labelled as Reason (R).\nAssertion (A): RTGS system is a funds transfer mechanism where transfer of money takes place from one bank to another on a real time and on gross basis.\nReason (R): There is no minimum ceiling for the RTGS transactions.\nIn the light of the above statements, choose the most appropriate answer from the options given below:", "options": [{"id": "1", "text": "Both (A) and (R) are correct and (R) is the correct explanation of (A)"}, {"id": "2", "text": "Both (A) and (R) are correct but (R) is not the correct explanation of (A)"}, {"id": "3", "text": "(A) is correct but (R) is not correct"}, {"id": "4", "text": "(A) is not correct but (R) is correct"}], "correctAnswer": "3", "explanation": "Key Concept:** Real-Time Gross Settlement (RTGS) is an electronic network designated strictly for continuous, high-value interbank funds transfers.\n**Assertion-Reason Analysis:** The Assertion is factually correct. The Reason is false because the RBI mandates a strict minimum transaction limit of \u20b92,00,000 for RTGS; it is not meant for small-value transfers (which use NEFT or IMPS).", "id": 15}, {"question": "Arrange the following institutions as per their year of establishment in ascending order:\nA. NAFTA\nB. EU\nC. ASEAN\nD. UNCTAD", "options": [{"id": "1", "text": "A, B, C, D"}, {"id": "2", "text": "D, A, C, B"}, {"id": "3", "text": "B, D, C, A"}, {"id": "4", "text": "B, C, A, D"}], "correctAnswer": "3", "explanation": "Key Concept:** Historical timeline of the formation of major international economic organizations.\n* EU (European Union): Formed originally as the EEC in 1957.\n* UNCTAD: Established in 1964.\n* ASEAN: Formed in 1967.\n* NAFTA: Came into effect in 1994.", "id": 16}, {"question": "Which of the followings are the properties of Indifference Curve?\nA. Indifference curve slopes downward to right\nB. Indifference curve is concave to origin\nC. Indifference curve is convex to origin\nD. Indifference curves cannot intersect each other but can be tangent to each other\nE. Higher indifference curve represents higher level of satisfaction", "options": [{"id": "1", "text": "A, B, D and E Only"}, {"id": "2", "text": "A, C, D and E Only"}, {"id": "3", "text": "A, C and E Only"}, {"id": "4", "text": "A, B, C and D Only"}], "correctAnswer": "3", "explanation": "Key Concept:** An indifference curve is a graph showing different bundles of two goods that give a consumer equal satisfaction and utility.\n* It slopes downward (A is correct) because increasing one good requires sacrificing another.\n* It is strictly convex to the origin (C is correct) due to the diminishing marginal rate of substitution.\n* Two curves can never intersect or be tangent (D is wrong).\n* A higher curve represents higher satisfaction (E is correct).", "id": 17}, {"question": "Match List - I with List - II.\n| List - I | List - II |\n| :--- | :--- |\n| A. Making provision for bad/doubtful debts | I. Cost Concept |\n| B. Expenses matched with associated revenue | II. Going Concern |\n| C. Assets are not shown at realisable value | III. Matching Concept |\n| D. Internally generated goodwill not recorded | IV. Conservatism |", "options": [{"id": "1", "text": "A-I, B-II, C-III, D-IV"}, {"id": "2", "text": "A-IV, B-III, C-II, D-I"}, {"id": "3", "text": "A-IV, B-II, C-III, D-I"}, {"id": "4", "text": "A-II, B-I, C-IV, D-III"}], "correctAnswer": "2", "explanation": "Key Concept:** Fundamental accounting concepts and conventions.\n* Conservatism (IV): Anticipate all losses (provisions) but no gains.\n* Matching Concept (III): Match expenses with revenues for a period.\n* Going Concern (II): Assume business runs indefinitely; liquidation value is irrelevant.\n* Cost Concept (I): Record assets at acquisition price (no internal goodwill).", "id": 18}, {"question": "Which of the followings is/are the part of external environment (macro) of Business?\nA. Customers\nB. Economic factors\nC. Natural factors\nD. Marketing Intermediaries\nE. Competitors", "options": [{"id": "1", "text": "B and D Only"}, {"id": "2", "text": "B and C Only"}, {"id": "3", "text": "A, B, C and D Only"}, {"id": "4", "text": "B, C, D and E Only"}], "correctAnswer": "2", "explanation": "Key Concept:** The macro-environment consists of broad societal forces affecting the entire industry, often analyzed using the PESTLE framework.\n* Customers, Competitors, and Intermediaries (A, D, E) constitute the Micro-environment.\n* Economic factors (B) and Natural factors (C) are uncontrollable Macro forces.", "id": 19}, {"question": "Arrange the following steps of Sampling Design Process in correct order:\nA. Determine the sample size\nB. Select a sampling technique\nC. Selection of sampling frame\nD. Target Population definitions", "options": [{"id": "1", "text": "A, B, C, D"}, {"id": "2", "text": "D, C, B, A"}, {"id": "3", "text": "C, D, B, A"}, {"id": "4", "text": "B, D, C, A"}], "correctAnswer": "2", "explanation": "Key Concept:** The logical methodology a researcher uses to select a representative subset.\n* Step A: Identify the **Target Population (D)**.\n* Step B: Obtain a list/source for that population, the **Sampling frame (C)**.\n* Step C: Choose the statistical method, the **Sampling technique (B)**.\n* Step D: Calculate the required **Sample size (A)**.", "id": 20}, {"question": "Match List - I with List - II.\n| List - I | List - II |\n| :--- | :--- |\n| A. Operating Leverage | I. Contribution/EBT |\n| B. Combined Leverage | II. Contribution/EBIT |\n| C. Earning Per Share | III. EBIT/EBT |\n| D. Financial Leverage | IV. EAT/No. of Equity Shares |", "options": [{"id": "1", "text": "A-I, B-II, C-IV, D-III"}, {"id": "2", "text": "A-II, B-I, C-IV, D-III"}, {"id": "3", "text": "A-II, B-I, C-III, D-IV"}, {"id": "4", "text": "A-I, B-II, C-III, D-IV"}], "correctAnswer": "2", "explanation": "Key Concept:** Leverage ratios quantify a firm's fixed costs and measure how they amplify profits and risks.\n* Operating Leverage: Contribution / EBIT\n* Combined Leverage: Contribution / EBT\n* Earning Per Share: EAT / No. of Equity Shares\n* Financial Leverage: EBIT / EBT", "id": 21}, {"question": "Arrange the following steps of Selection Process in correct order:\nA. Selection Tests\nB. Reference and Background Analysis\nC. Preliminary Interview\nD. Employment Interview\nE. Job Offer", "options": [{"id": "1", "text": "A, B, C, D, E"}, {"id": "2", "text": "C, A, B, D, E"}, {"id": "3", "text": "C, A, D, B, E"}, {"id": "4", "text": "A, C, B, D, E"}], "correctAnswer": "3", "explanation": "Key Concept:** The standard Human Resources sequence designed to systematically filter applicants.\n* Stage A: **Preliminary Interview (C)** to eliminate obvious mismatches.\n* Stage B: **Selection Tests (A)** to measure aptitude/skills.\n* Stage C: **Employment Interview (D)** with shortlisted candidates.\n* Stage D: **Reference and Background Analysis (B)**.\n* Stage E: **Job Offer (E)**.", "id": 22}, {"question": "Match List - I with List - II.\n| List - I | List - II |\n| :--- | :--- |\n| A. Doctrine of Caveat Emptor | I. Special Contract |\n| B. Bailment and Pledge | II. Limited Liability Partnership |\n| C. Holder in due Course | III. Sales of Goods Act |\n| D. DPIN | IV. Negotiable Instrument |", "options": [{"id": "1", "text": "A-IV, B-I, C-II, D-III"}, {"id": "2", "text": "A-I, B-II, C-IV, D-III"}, {"id": "3", "text": "A-II, B-I, C-III, D-IV"}, {"id": "4", "text": "A-III, B-I, C-IV, D-II"}], "correctAnswer": "4", "explanation": "Key Concept:** Mapping legal doctrines and roles to their governing Indian statutes.\n* Caveat Emptor (Let the buyer beware) aligns with the Sales of Goods Act.\n* Bailment and Pledge align with Special Contracts (Indian Contract Act).\n* Holder in due Course aligns with the Negotiable Instrument Act.\n* DPIN (Designated Partner Identification Number) aligns with the LLP Act.", "id": 23}, {"question": "Match List - I with List - II.\n| List - I (TDS Subject) | List - II (Section) |\n| :--- | :--- |\n| A. Fees for Professional/Technical Services | I. Section 194A |\n| B. Payment of life Insurance Policy | II. Section 194B |\n| C. Winnings from Lotteries | III. Section 194DA |\n| D. Interest other than Interest on Securities | IV. Section 194J |", "options": [{"id": "1", "text": "A-I, B-II, C-III, D-IV"}, {"id": "2", "text": "A-IV, B-III, C-II, D-I"}, {"id": "3", "text": "A-I, B-II, C-IV, D-III"}, {"id": "4", "text": "A-II, B-I, C-III, D-IV"}], "correctAnswer": "2", "explanation": "Key Concept:** Sections of the Income Tax Act that mandate Tax Deducted at Source (TDS).\n* Section 194J: Professional Fees.\n* Section 194DA: Life Insurance Payments.\n* Section 194B: Lottery Winnings (30% flat).\n* Section 194A: Interest other than securities.", "id": 24}, {"question": "Which of the following types of audit report is issued when the auditor concludes that the financial statements are prepared, in all material respects, in accordance with the applicable financial reporting framework?", "options": [{"id": "1", "text": "Audit report with an 'emphasis of matter' paragraph"}, {"id": "2", "text": "Qualified report"}, {"id": "3", "text": "Disclaimer of opinion report"}, {"id": "4", "text": "Unmodified opinion report"}], "correctAnswer": "4", "explanation": "Key Concept:** An unmodified opinion (often called a \"clean report\") indicates the financial statements are transparent, free from material misstatements, and adhere to accounting standards. A qualified report is issued when there is a specific, limited exception.", "id": 25}, {"question": "An empirical test was carried out in 1951 on Heckscher Ohlin model to find out whether or not the US, which has abundant capital resources, exports capital intensive goods and imports labour intensive goods. But, it was found that the US exported more labour-intensive commodities and imported more capital intensive products, which was contrary to the result of Heckscher-Ohlin model. Who has conducted the test?", "options": [{"id": "1", "text": "Staffan B Linder"}, {"id": "2", "text": "David Ricardo"}, {"id": "3", "text": "J. B. Say"}, {"id": "4", "text": "Wassily Leontief"}], "correctAnswer": "4", "explanation": "Key Concept:** The Leontief Paradox represents the first rigorous empirical challenge to the Heckscher-Ohlin factor endowment theory, demonstrating that real-world trade didn't always fit the mathematical model. Leontief utilized complex input-output tables of the US economy to conduct his statistical analysis.", "id": 26}, {"question": "Arrange the following steps of process of consumer buying in proper sequence:\nA. Evaluation of Alternatives\nB. Search for Alternatives\nC. Need Recognitions\nD. Decision\nE. Development of Decision Criteria", "options": [{"id": "1", "text": "C, B, A, E, D"}, {"id": "2", "text": "C, A, B, E, D"}, {"id": "3", "text": "C, E, B, A, D"}, {"id": "4", "text": "B, A, C, E, D"}], "correctAnswer": "3", "explanation": "Key Concept:** The standard psychological framework detailing the stages a consumer progresses through.\n* Phase A: **Need Recognition (C)**\n* Phase B: **Development of Decision Criteria (E)**\n* Phase C: **Search for Alternatives (B)**\n* Phase D: **Evaluation of Alternatives (A)**\n* Phase E: **Decision (D)**", "id": 27}, {"question": "Which one of the followings is not a type of organizational culture?", "options": [{"id": "1", "text": "Non-Entrepreneurial Culture"}, {"id": "2", "text": "Power Culture"}, {"id": "3", "text": "Role Culture"}, {"id": "4", "text": "Task Culture"}], "correctAnswer": "1", "explanation": "Key Concept:** Charles Handy\u2019s renowned model of organizational culture classifies work environments into four distinct archetypes: Power culture, Role culture, Task culture, and Person culture. \"Non-Entrepreneurial\" is not a recognized category in established frameworks.", "id": 28}, {"question": "Which of the followings are properties of Normal Distribution?\nA. The normal curve approaches the x-axis asymptotically as we proceed in either direction away from the mean.\nB. The normal curve has its points of inflection at X\u0304 \u00b1 2\u03c3\nC. Irrespective of the shape, the total area under the normal curve and above the horizontal axis is always equal to 1\nD. About 68.27% of the total area under the normal curve is covered from \u03bc\u22122\u03c3 to \u03bc+2\u03c3.\nE. The normal distribution is unimodal.", "options": [{"id": "1", "text": "A, B and E Only"}, {"id": "2", "text": "B, C and D Only"}, {"id": "3", "text": "C, D and E Only"}, {"id": "4", "text": "A, C and E Only"}], "correctAnswer": "4", "explanation": "Key Concept:** The mathematical properties that define the Gaussian (normal) probability distribution curve.\n* Statement A is true: It is asymptotic to the x-axis.\n* Statement C is true: Total probability area must always equal exactly 1.\n* Statement E is true: It has only one peak (unimodal).\n* Statement B is false: Inflection points are at $\\pm 1\\sigma$.\n* Statement D is false: $\\pm 2\\sigma$ covers ~95.45%.", "id": 29}, {"question": "Karl Pearson's Coefficient of Skewness for a distribution having mean of 6.82, median of 6.8 and standard Deviation of 1.4 is:", "options": [{"id": "1", "text": "0.014"}, {"id": "2", "text": "0.028"}, {"id": "3", "text": "0.043"}, {"id": "4", "text": "0.056"}], "correctAnswer": "3", "explanation": "Key Concept:** Skewness measures the degree of asymmetry.\n**Step-by-Step Solution:**\n* First: Formula using the Median is $Sk = \\frac{3(\\text{Mean} - \\text{Median})}{\\text{Standard Deviation}}$\n* Second: Substitute values to get $Sk = \\frac{3(6.82 - 6.80)}{1.4}$\n* Third: Calculate the difference inside the parenthesis ($6.82 - 6.80 = 0.02$)\n* Fourth: Multiply by three ($3 \\times 0.02 = 0.06$)\n* Fifth: Divide by the standard deviation ($\\frac{0.06}{1.4} \\approx 0.04285$), which rounds to **0.043**.", "id": 30}, {"question": "An assessee who declares his business/professional income in accordance with the provisions of Section 44 AD(1) or Section 44 ADA(1), must pay up to 100 percent of advance tax payable on or before:", "options": [{"id": "1", "text": "December 15 of the previous year"}, {"id": "2", "text": "January 15 of the previous year"}, {"id": "3", "text": "February 15 of the previous year"}, {"id": "4", "text": "March 15 of the previous year"}], "correctAnswer": "4", "explanation": "Key Concept:** Advance tax payment deadlines specifically tailored for taxpayers opting for the presumptive taxation scheme.\n* Section 44AD is for small businesses (turnover up to \u20b92/\u20b93 Crore).\n* Section 44ADA is for specified professionals (gross receipts up to \u20b950/\u20b975 Lakhs).\n* Normal taxpayers pay advance tax in four installments (June, Sept, Dec, March).\n* Presumptive taxpayers are given the relief of paying their entire advance tax in a single installment by March 15.", "id": 31}, {"question": "Which of the followings are the types of decentralisation in an organisation?\nA. Profit Centres\nB. Service Centres\nC. Cost Centres\nD. Investment Centres", "options": [{"id": "1", "text": "A, B and C Only"}, {"id": "2", "text": "A, C and D Only"}, {"id": "3", "text": "A, B and D Only"}, {"id": "4", "text": "B, C and D Only"}], "correctAnswer": "2", "explanation": "Key Concept:** Responsibility Accounting divides a decentralized organization into specific functional units (responsibility centers) to measure performance and allocate accountability.\n* A **Cost Centre** is responsible only for keeping costs within budget (e.g., HR, Maintenance).\n* A **Profit Centre** is responsible for generating revenue and controlling costs.\n* An **Investment Centre** is responsible for revenues, costs, and the capital invested in its operations.\n* \"Service Centres\" are functional departments but are typically categorized under cost centers.", "id": 32}, {"question": "Given below are two statements: one is labelled as Assertion (A) and the other is labelled as Reason (R).\nAssertion (A): An effective appraisal system can contribute to competitive advantage by improving employee job performance.\nReason (R): One serious challenge facing the performance appraisal relates to assessment of self-managed teams.\nIn the light of the above statements, choose the most appropriate answer from the options given below:", "options": [{"id": "1", "text": "Both (A) and (R) are correct and (R) is the correct explanation of (A)"}, {"id": "2", "text": "Both (A) and (R) are correct but (R) is not the correct explanation of (A)"}, {"id": "3", "text": "(A) is correct but (R) is not correct"}, {"id": "4", "text": "(A) is not correct but (R) is correct"}], "correctAnswer": "2", "explanation": "Key Concept:** Performance appraisal dynamics and their impact on organizational strategy.\n**Assertion-Reason Analysis:** The Assertion is correct; aligning employee goals with strategic objectives via appraisals boosts productivity and competitive advantage. The Reason is also a correct, standalone factual statement; evaluating self-managed teams is difficult because standard top-down appraisals do not apply well. However, the difficulty in assessing teams (Reason) does not explain why appraisals create competitive advantage (Assertion).", "id": 33}, {"question": "Arrange the following steps of Control Process in the correct order:\nA. Measurement of Actual Performance\nB. Establishment of Standards\nC. Corrective action where required\nD. Comparison of actual performance with the standards", "options": [{"id": "1", "text": "B, A, C, D"}, {"id": "2", "text": "B, A, D, C"}, {"id": "3", "text": "A, B, C, D"}, {"id": "4", "text": "A, B, D, C"}], "correctAnswer": "2", "explanation": "Key Concept:** The management control process is a systematic loop ensuring that organizational activities align with established plans and goals.\n* Stage A: Have a baseline by **Establishment of Standards (B)**.\n* Stage B: Track what is actually happening via **Measurement of Actual Performance (A)**.\n* Stage C: Identify deviations through **Comparison of actual performance with the standards (D)**.\n* Stage D: Fix significant deviations by taking **Corrective action where required (C)**.", "id": 34}, {"question": "Arrange the following steps of Personal Selling in sequence:\nA. Pre approach\nB. Presentation and Demonstration\nC. Approach\nD. Prospecting and Qualifying\nE. Handling Objections", "options": [{"id": "1", "text": "A, D, C, E, B"}, {"id": "2", "text": "A, C, D, E, B"}, {"id": "3", "text": "C, A, D, B, E"}, {"id": "4", "text": "D, A, C, B, E"}], "correctAnswer": "4", "explanation": "Key Concept:** The standard sales process framework detailing how a salesperson converts a potential lead into a buyer.\n* First: Identify potential leads via **Prospecting and Qualifying (D)**.\n* Second: Gather information before contacting via **Pre approach (A)**.\n* Third: Make initial contact via the **Approach (C)**.\n* Fourth: Pitch the product through **Presentation and Demonstration (B)**.\n* Fifth: Address concerns through **Handling Objections (E)**.", "id": 35}, {"question": "Match List - I with List - II.\n| List - I | List - II |\n| :--- | :--- |\n| A. EXIM Bank | I. Advancing Credit for agriculture and other economic activities in rural area |\n| B. NHB | II. Financing Exports and Imports |\n| C. IDBI | III. Promoting Housing Finance Institution |\n| D. NABARD | IV. Financing, Promoting and Developing industries |", "options": [{"id": "1", "text": "A-I, B-II, C-III, D-IV"}, {"id": "2", "text": "A-II, B-I, C-IV, D-III"}, {"id": "3", "text": "A-II, B-III, C-IV, D-I"}, {"id": "4", "text": "A-II, B-III, C-I, D-IV"}], "correctAnswer": "3", "explanation": "Key Concept:** Matching apex Indian financial institutions with their core developmental and regulatory mandates.\n* EXIM Bank focuses on Financing Exports and Imports.\n* NHB (National Housing Bank) promotes Housing Finance.\n* IDBI develops and finances industrial growth.\n* NABARD advances credit for agriculture and rural development.", "id": 36}, {"question": "The Break Even point expressed in amount of sales in rupees of X Ltd having selling Price of \u20b920 per unit, variable cost of \u20b914 per unit and fixed cost of \u20b97,92,000 is:", "options": [{"id": "1", "text": "\u20b911,28,571"}, {"id": "2", "text": "\u20b91,32,000"}, {"id": "3", "text": "\u20b939,600"}, {"id": "4", "text": "\u20b926,40,000"}], "correctAnswer": "4", "explanation": "**Key Concept:** Calculating the Break-Even Point (BEP) in sales value using marginal costing principles.\n* Step A: Calculate Contribution per unit ($20 - 14 = 6$).\n* Step B: Calculate the Profit Volume (P/V) Ratio ($\\frac{6}{20} = 0.30$ or 30%).\n* Step C: Calculate BEP in Sales ($\\frac{7,92,000}{0.30} = 26,40,000$).", "id": 37}, {"question": "Match List - I with List - II.\n| List - I | List - II |\n| :--- | :--- |\n| A. Managerial Grid | I. Charles Bird |\n| B. Hawthorne Experiments | II. Alderfer |\n| C. Trait Theory | III. Blake and Mouton |\n| D. ERG Theory | IV. Elton Mayo |", "options": [{"id": "1", "text": "A-I, B-II, C-III, D-IV"}, {"id": "2", "text": "A-III, B-IV, C-I, D-II"}, {"id": "3", "text": "A-I, B-III, C-II, D-IV"}, {"id": "4", "text": "A-III, B-IV, C-II, D-I"}], "correctAnswer": "2", "explanation": "Key Concept:** Associating foundational organizational behavior and leadership theories with their original proponents.\n* The Managerial Grid was developed by Blake and Mouton.\n* Hawthorne Experiments were led by Elton Mayo.\n* Trait Theory is often associated with Charles Bird.\n* ERG Theory (Existence, Relatedness, Growth) was proposed by Alderfer.", "id": 38}, {"question": "Given below are two statements: one is labelled as Assertion (A) and the other is labelled as Reason (R).\nAssertion (A): The minimum level of service the customer expects represents the threshold level of expectations.\nReason (R): The gap between the desired and adequate service has been called as the zone of intolerance.\nIn the light of the above statements, choose the most appropriate answer from the options given below:", "options": [{"id": "1", "text": "Both (A) and (R) are correct and (R) is the correct explanation of (A)"}, {"id": "2", "text": "Both (A) and (R) are correct but (R) is not the correct explanation of (A)"}, {"id": "3", "text": "(A) is correct but (R) is not correct"}, {"id": "4", "text": "(A) is not correct but (R) is correct"}], "correctAnswer": "3", "explanation": "Key Concept:** Service marketing concepts mapping customer expectations and satisfaction levels.\n**Assertion-Reason Analysis:** The Assertion is correct; the baseline acceptable service is indeed the threshold or \"adequate service\" expectation. The Reason is factually incorrect because the gap between desired service and adequate service is formally termed the **Zone of Tolerance**, not the \"zone of intolerance.\"", "id": 39}, {"question": "Which of the followings are the techniques of Monetary Control adopted by RBI?\nA. Loans and Advances to the Industries\nB. Cash Reserve Ratio\nC. Open Market Operations\nD. Statutory Liquidity Ratio\nE. Repo Rates", "options": [{"id": "1", "text": "A, B, C, D Only"}, {"id": "2", "text": "A, B, D, E Only"}, {"id": "3", "text": "B, C, D, E Only"}, {"id": "4", "text": "A, C, D, E Only"}], "correctAnswer": "3", "explanation": "Key Concept:** Quantitative instruments of monetary policy utilized by the Reserve Bank of India to control credit and money supply.\n* The RBI is a bankers' bank; it does not provide direct commercial loans to industries (Option A is incorrect).\n* Cash Reserve Ratio (CRR), Statutory Liquidity Ratio (SLR), Open Market Operations (OMO), and Repo Rates are all core quantitative tools.", "id": 40}, {"question": "Arrange the following steps of research process in correct order:\nA. Developing an approach to the problem\nB. Problem definition\nC. Data Collection, Preparation and analysis\nD. Research design formulation\nE. Report writing and presentation", "options": [{"id": "1", "text": "A, B, C, D, E"}, {"id": "2", "text": "B, A, D, C, E"}, {"id": "3", "text": "D, B, A, E, C"}, {"id": "4", "text": "A, B, D, E, C"}], "correctAnswer": "2", "explanation": "Key Concept:** The standard chronological framework for conducting rigorous academic or business research.\n* Phase A: **Problem definition (B)**.\n* Phase B: **Developing an approach to the problem (A)**.\n* Phase C: **Research design formulation (D)**.\n* Phase D: **Data Collection, Preparation and analysis (C)**.\n* Phase E: **Report writing and presentation (E)**.", "id": 41}, {"question": "If demand equation is given by D = 10,000 \u2212 P and the supply equation is given by S = 1000 + 4P, the equilibrium price would be:", "options": [{"id": "1", "text": "1600"}, {"id": "2", "text": "1800"}, {"id": "3", "text": "1700"}, {"id": "4", "text": "2000"}], "correctAnswer": "2", "explanation": "**Key Concept:** Market equilibrium in microeconomics occurs exactly where the quantity demanded equals the quantity supplied.\n* Step A: Set Demand equal to Supply ($D = S$).\n* Step B: Substitute the given equations ($10,000 - P = 1000 + 4P$).\n* Step C: Group the variables ($9000 = 5P$).\n* Step D: Solve for price ($P = 1800$).", "id": 42}, {"question": "Match List - I with List - II.\n| List - I | List - II |\n| :--- | :--- |\n| A. Standard Deduction under Section 16(ia) | I. Income under the head Capital Gains |\n| B. Standard Deduction under Section 24 | II. Income under the head Profits and Gains of Business or Profession |\n| C. Depreciation Allowance under Section 32 | III. Income Under the Head Income from House Property |\n| D. Exemption Under Section 54 for Profit on transfer of house property used for residence | IV. Income Under the Head Salaries |", "options": [{"id": "1", "text": "A-I, B-II, C-III, D-IV"}, {"id": "2", "text": "A-IV, B-III, C-II, D-I"}, {"id": "3", "text": "A-III, B-IV, C-II, D-I"}, {"id": "4", "text": "A-III, B-IV, C-I, D-II"}], "correctAnswer": "2", "explanation": "Key Concept:** Aligning specific tax deductions and exemptions with their respective heads of income.\n* Section 16(ia) provides a standard deduction against Salaries.\n* Section 24 provides a standard deduction for House Property.\n* Section 32 provides depreciation against Business or Profession.\n* Section 54 provides exemptions under Capital Gains.", "id": 43}, {"question": "Which of the following statements are incorrect?\nA. Management audit is not compulsory under any law.\nB. Vouching is concerned only with items of balance sheet.\nC. Section 148 of the Companies Act, 2013 has made Cost Audit mandatory for some limited companies\nD. The object of vouching is to satisfy the auditor as to existence, ownership, possession, completeness, valuation and disclosure of items mentioned in the Balance Sheet.\nE. Independent financial audit has been made compulsory for many entities established under respective Acts.", "options": [{"id": "1", "text": "B, C and E Only"}, {"id": "2", "text": "A, B and C Only"}, {"id": "3", "text": "B and D Only"}, {"id": "4", "text": "A, C and E Only"}], "correctAnswer": "3", "explanation": "Key Concept:** Differentiating between standard auditing terms and practices, specifically vouching versus verification.\n* Statement B is incorrect because vouching primarily concerns examining documentary evidence for items in the Profit & Loss Account.\n* Statement D is incorrect because checking the existence and ownership of Balance Sheet items is defined strictly as **Verification**, not vouching.", "id": 44}, {"question": "Which one of the followings are not the Objectives of HRM?", "options": [{"id": "1", "text": "Societal Objectives"}, {"id": "2", "text": "Organizational Objectives"}, {"id": "3", "text": "Functional Objectives"}, {"id": "4", "text": "Group Objectives"}], "correctAnswer": "4", "explanation": "Key Concept:** Human Resource Management (HRM) objectives are broadly classified into four standardized categories.\n* Societal Objectives ensure the firm complies with ethical standards.\n* Organizational Objectives aid the company in achieving primary goals.\n* Functional Objectives maintain the department's contribution level.\n* Personal Objectives assist employees in career growth.\n* \"Group Objectives\" is not a formally recognized primary category.", "id": 45}, {"question": "What are the GST rates applicable after 22nd September 2025?\nA. 5%\nB. 12%\nC. 18%\nD. 28%\nE. 40%", "options": [{"id": "1", "text": "A, B, C and D Only"}, {"id": "2", "text": "B, C, D and E Only"}, {"id": "3", "text": "A, C and E Only"}, {"id": "4", "text": "B, C and E Only"}], "correctAnswer": "1", "explanation": "Key Concept:** The active, multi-tiered standard tax slab structure of the Goods and Services Tax (GST) regime in India.\n* The four primary active slabs for standard goods and services are 5%, 12%, 18%, and 28%.\n* While the GST law permits a maximum statutory cap of 40%, it is not currently an active operational tax slab for standard goods.", "id": 46}, {"question": "Match List - I with List - II.\n| List - I (Human Resource Valuation Approaches) | List - II (Propounders) |\n| :--- | :--- |\n| A. Historical Cost Approach | I. Brummet, Flamholtz and Plye |\n| B. Opportunity Cost approach | II. Hekimian and Jones |\n| C. Standard Cost Approach | III. David Watson |\n| D. Present Value of Future Earning Model | IV. Lav and Schwartz |", "options": [{"id": "1", "text": "A-I, B-II, C-III, D-IV"}, {"id": "2", "text": "A-II, B-I, C-IV, D-III"}, {"id": "3", "text": "A-III, B-IV, C-I, D-II"}, {"id": "4", "text": "A-IV, B-III, C-I, D-II"}], "correctAnswer": "1", "explanation": "Key Concept:** Identifying the researchers who developed various models for Human Resource Accounting (HRA).\n* Historical Cost was proposed by Brummet, Flamholtz, and Pyle.\n* Opportunity Cost was proposed by Hekimian and Jones.\n* Standard Cost was proposed by David Watson.\n* Present Value of Future Earnings was modeled by Lev and Schwartz.", "id": 47}, {"question": "Which one of the followings is not a category under Balance of Payments?", "options": [{"id": "1", "text": "Current Account"}, {"id": "2", "text": "Capital Account"}, {"id": "3", "text": "Drawings Account"}, {"id": "4", "text": "Official Reserve Account"}], "correctAnswer": "3", "explanation": "Key Concept:** The structural components of a nation's Balance of Payments (BoP), which records all economic transactions.\n* The Current Account tracks exports, imports, and remittances.\n* The Capital Account tracks foreign investments and loans.\n* The Official Reserve Account tracks changes in central bank reserves.\n* \"Drawings Account\" is a term used in sole proprietorship accounting for personal withdrawals, not international trade.", "id": 48}, {"question": "Given below are two statements: one is labelled as Assertion (A) and the other is labelled as Reason (R).\nAssertion (A): Section 91 provides for grant of unilateral relief in the case of resident taxpayers on income which has been taxed in India as well as in the country with which there is no Double Taxation Avoidance Agreement.\nReason (R): The relief under section 91 is granted by allowing to the tax payer a deduction from tax liability of an amount equal to the tax calculated at the average Indian rate of tax or the amount of tax calculated at the rate of tax of that other country on the doubly taxed income, whichever is higher.\nIn the light of the above statements, choose the most appropriate answer from the options given below:", "options": [{"id": "1", "text": "Both (A) and (R) are correct and (R) is the correct explanation of (A)"}, {"id": "2", "text": "Both (A) and (R) are correct but (R) is not the correct explanation of (A)"}, {"id": "3", "text": "(A) is correct but (R) is not correct"}, {"id": "4", "text": "(A) is not correct but (R) is correct"}], "correctAnswer": "3", "explanation": "Key Concept:** Provisions for Unilateral Double Taxation Relief under the Income Tax Act.\n**Assertion-Reason Analysis:** The Assertion is absolutely correct; Section 91 offers relief when India does not have a DTAA with the foreign country. The Reason is incorrect regarding the calculation mechanism. Relief is granted at the Indian rate of tax or the rate of tax of the foreign country, whichever is **LOWER**, not higher.", "id": 49}, {"question": "Match List - I with List - II.\n| List - I (Theories of Profit) | List - II (Propounders) |\n| :--- | :--- |\n| A. Risk theory of Profit | I. Joseph A Schumpeter |\n| B. Dynamic theory of Profit | II. F. A. Waker |\n| C. Innovation theory of Profit | III. F. B. Hawley |\n| D. Profit as rent of ability | IV. J. B. Clark |", "options": [{"id": "1", "text": "A-III, B-II, C-I, D-IV"}, {"id": "2", "text": "A-III, B-IV, C-I, D-II"}, {"id": "3", "text": "A-II, B-III, C-I, D-IV"}, {"id": "4", "text": "A-IV, B-II, C-I, D-III"}], "correctAnswer": "2", "explanation": "Key Concept:** Matching classical and modern economic theories of profit generation.\n* Risk theory was posited by F. B. Hawley.\n* Dynamic theory was developed by J. B. Clark.\n* Innovation theory was famously championed by Joseph A. Schumpeter.\n* Profit as rent of ability aligns with F. A. Walker.", "id": 50}, {"question": "Which of the followings is not a core function of WTO?", "options": [{"id": "1", "text": "Providing a forum for trade negotiation"}, {"id": "2", "text": "Administering agreement such as GATS, TRIPS and TRIMS"}, {"id": "3", "text": "Monitoring trade policies"}, {"id": "4", "text": "Providing Concessional loans and financial aid to developing countries"}], "correctAnswer": "4", "explanation": "Key Concept:** Distinguishing the regulatory mandate of the World Trade Organization (WTO) from global financial institutions.\n* The WTO regulates global trade rules, provides a forum for negotiations, and resolves trade disputes.\n* Providing concessional loans and financial aid is strictly the core function of the World Bank and the International Monetary Fund (IMF).", "id": 51}, {"question": "Arrange the following in ascending order of sections of Income Tax Act related to permissible deduction from Gross Total Income:\nA. Deduction in respect of Medical Insurance Premia\nB. Deduction in respect of Royalty Income of Author\nC. Deduction in respect of Payment of Interest on Loan taken for Higher Education\nD. Deduction in respect of Interest on Deposits in Saving Accounts\nE. Deduction in respect of Donations to Certain Funds, charitable Institutions, etc.", "options": [{"id": "1", "text": "A, B, C, D, E"}, {"id": "2", "text": "E, D, C, B, A"}, {"id": "3", "text": "A, C, E, D, B"}, {"id": "4", "text": "A, C, E, B, D"}], "correctAnswer": "4", "explanation": "Key Concept:** Numerical arrangement of Chapter VI-A deduction sections of the Income Tax Act.\n* First: Medical Insurance is Section 80D.\n* Second: Higher Education Loan Interest is Section 80E.\n* Third: Donations to Charities is Section 80G.\n* Fourth: Royalty Income of Authors is Section 80QQB.\n* Fifth: Savings Account Interest is Section 80TTA.", "id": 52}, {"question": "Mr. A, a resident in India, aged 60 years, earned agricultural income of \u20b95,00,000 and non-agricultural income of \u20b93,80,000 for assessment year 2025-26. The tax liability of Mr. A assuming that he does not opt to be taxed under the old tax regime is:", "options": [{"id": "1", "text": "\u20b938,000"}, {"id": "2", "text": "\u20b93,640"}, {"id": "3", "text": "\u20b98,000"}, {"id": "4", "text": "Nil"}], "correctAnswer": "2", "explanation": "Key Concept:** Calculating tax liability utilizing the method of partial integration of agricultural income. Note the question specifies the old regime logic implicitly due to the phrasing \"assuming he does not opt... old tax regime\" but the calculation reflects standard old regime slab limits for a senior citizen.\n* Step A: Tax on total income (3,80,000 + 5,00,000 = 8,80,000). Exemption limit is 3L. Tax = 10,000 (for next 2L at 5%) + 76,000 (for remaining 3.8L at 20%) = \u20b986,000.\n* Step B: Tax on agricultural income + exemption limit (5,00,000 + 3,00,000 = 8,00,000). Tax = 10,000 + 60,000 = \u20b970,000.\n* Step C: Gross tax is the difference (86,000 - 70,000 = \u20b916,000).\n* Step D: Apply Section 87A rebate since net income (3.8L) is below 5L. Rebate is up to 12,500. New tax = \u20b93,500.\n* Step E: Add 4% Health and Education Cess to get the final liability of \u20b93,640.", "id": 53}, {"question": "A, B and C were partners in a firm sharing profits and losses in the ratio of 4:3:2. A died on September 15, 2025. At that time, the capitals of B and C after all the adjustments were \u20b93,56,000 and \u20b92,44,000 respectively. B and C decided to adjust their capitals according to their new profit sharing ratio by opening current accounts. The new capital of B is:", "options": [{"id": "1", "text": "\u20b91,33,333"}, {"id": "2", "text": "\u20b92,00,000"}, {"id": "3", "text": "\u20b92,40,000"}, {"id": "4", "text": "\u20b93,60,000"}], "correctAnswer": "4", "explanation": "Key Concept:** Capital adjustment among remaining partners based on their new profit-sharing ratio following a partner's death.\n* Step A: Determine the new profit-sharing ratio for B and C, which becomes 3:2.\n* Step B: Calculate the total capital of the newly constituted firm (3,56,000 + 2,44,000 = 6,00,000).\n* Step C: Allocate this total capital based on B's new share ($6,00,000 \\times \\frac{3}{5} = 3,60,000$).", "id": 54}, {"question": "Match List - I with List - II.\n| List - I | List - II |\n| :--- | :--- |\n| A. Greenfield Investment | I. Direct Investment overseas aimed to sell the output of a firm's domestic production process |\n| B. Foreign Portfolio Investment | II. Overseas investment to acquire existing facilities |\n| C. Forward Vertical FDI | III. Overseas investment to create new facilities from the ground up |\n| D. Brownfield Investment | IV. Investment in foreign financial instruments such as foreign stock, government bonds etc. |", "options": [{"id": "1", "text": "A-III, B-IV, C-II, D-I"}, {"id": "2", "text": "A-I, B-II, C-III, D-IV"}, {"id": "3", "text": "A-IV, B-III, C-I, D-II"}, {"id": "4", "text": "A-III, B-IV, C-I, D-II"}], "correctAnswer": "4", "explanation": "Key Concept:** Classifying different modes and strategies of cross-border investments.\n* Greenfield Investment creates new facilities from the ground up.\n* Foreign Portfolio Investment focuses on financial instruments.\n* Forward Vertical FDI sets up operations closer to the end consumer.\n* Brownfield Investment acquires existing facilities.", "id": 55}, {"question": "Which of the following statements are correct for tax Evasion?\nA. All methods by which tax liability is illegally avoided is termed as tax evasion\nB. Tax evasion takes into account loopholes of Law\nC. Tax evasion is tax godging within framework of Law\nD. Tax evasion has legal sanction\nE. Tax evasion is intentional attempt to avoid payment of tax after the liability to tax has arisen", "options": [{"id": "1", "text": "B and D Only"}, {"id": "2", "text": "B, C and D Only"}, {"id": "3", "text": "A, E and C Only"}, {"id": "4", "text": "A and E Only"}], "correctAnswer": "4", "explanation": "Key Concept:** Differentiating between the illegal act of Tax Evasion and the legal act of Tax Avoidance.\n* Statement A and E define tax evasion perfectly: it is an illegal, intentional, and fraudulent act to hide income or avoid taxes.\n* Statement B and C describe tax avoidance (exploiting legal loopholes).\n* Statement D is entirely false as evasion carries severe legal penalties and imprisonment.", "id": 56}, {"question": "Arrange the following Acts in ascending order as per their year of enactment:\nA. RTI (Rights to Information Act)\nB. Competitions Act\nC. Information Technology Act\nD. Negotiable Instrument Act\nE. Indian Contract Act", "options": [{"id": "1", "text": "E, D, C, B, A"}, {"id": "2", "text": "A, B, C, D, E"}, {"id": "3", "text": "A, B, E, D, C"}, {"id": "4", "text": "E, D, C, A, B"}], "correctAnswer": "1", "explanation": "Key Concept:** Chronology of landmark commercial, civil, and technological legislation in India.\n* Phase A: Indian Contract Act (1872).\n* Phase B: Negotiable Instrument Act (1881).\n* Phase C: Information Technology Act (2000).\n* Phase D: Competitions Act (2002).\n* Phase E: Right to Information Act (2005).", "id": 57}, {"question": "Select the correct option from the followings. The Balance of payment (BoP):", "options": [{"id": "1", "text": "Includes only exports and imports of goods and services."}, {"id": "2", "text": "Is always balanced because every credit entry has a corresponding debit entry."}, {"id": "3", "text": "Excludes unilateral transfers like remittance."}, {"id": "4", "text": "Shows only the financial account of transactions."}], "correctAnswer": "2", "explanation": "Key Concept:** The Balance of Payments is a systematic record governed by the principles of double-entry bookkeeping.\n* In a strict accounting sense, the BoP always balances. Any surplus or deficit in the current or capital accounts is perfectly offset by adjustments in the Official Reserves account.\n* Unilateral transfers are included (Current Account), making Option 3 incorrect.", "id": 58}, {"question": "Which of the followings is not valid for ordinal school of consumer preferences?", "options": [{"id": "1", "text": "Consumer preferences can be plotted on an indifference curve"}, {"id": "2", "text": "Ranking of Utility is important"}, {"id": "3", "text": "Magnitude of Utility is important"}, {"id": "4", "text": "Utility is not additive"}], "correctAnswer": "3", "explanation": "Key Concept:** The Ordinal Utility approach rejects the idea that utility can be measured in absolute mathematical numbers.\n* The ordinal theory insists consumers can only rank their preferences (e.g., 1st choice, 2nd choice), making ranking important.\n* Measuring the exact \"magnitude\" or absolute volume of satisfaction belongs strictly to the older Cardinal school.", "id": 59}, {"question": "Arrange the following types of motivating needs as identified by Maslow in ascending order:\nA. Physiological Needs\nB. Social Needs\nC. Self-actualization Needs\nD. Safety Needs\nE. Esteem Needs", "options": [{"id": "1", "text": "A, D, B, C, E"}, {"id": "2", "text": "A, D, B, E, C"}, {"id": "3", "text": "A, B, D, E, C"}, {"id": "4", "text": "A, B, C, D, E"}], "correctAnswer": "2", "explanation": "**Key Concept:** Abraham Maslow's foundational Hierarchy of Needs, which posits that humans are motivated to fulfill basic lower-order needs before progressing to complex higher-order needs.\n* Level One: Physiological Needs (A).\n* Level Two: Safety Needs (D).\n* Level Three: Social Needs (B).\n* Level Four: Esteem Needs (E).\n* Level Five: Self-actualization Needs (C).\nHere is the final **Part 3 (Q.61 to Q.100)** to complete your UGC NET Commerce mock test. It is perfectly formatted with the \"Sequence Break\" parser in mind, completely free of numbered lists in the explanations so your portal will count exactly 100 total questions!\n***Copy everything below this line and paste it directly into your ExamTym Portal Generator:***", "id": 60}, {"question": "According to Walter's Model of Dividend, market value of the share of a declining firm (having $r < k_e$) will be maximum at:", "options": [{"id": "1", "text": "0% Dividend Payout"}, {"id": "2", "text": "100% Dividend Payout"}, {"id": "3", "text": "50% Dividend Payout"}, {"id": "4", "text": "75% Dividend Payout"}], "correctAnswer": "2", "explanation": "Key Concept:** James E. Walter's model relates a firm's dividend policy to its valuation based on the relationship between its internal rate of return ($r$) and its cost of equity capital ($k_e$).\n* For a declining firm ($r < k_e$), the firm earns less on investments than shareholders expect.\n* Therefore, to maximize shareholder wealth, the firm should distribute all earnings as dividends (100% payout).\n* For a growth firm ($r > k_e$), the optimum payout is 0% (retain all earnings).\n* For a normal firm ($r = k_e$), dividend policy is irrelevant to the firm's value.", "id": 61}, {"question": "Arrange the following in descending order on the basis of number of sellers in the Market.\nA. Duopoly\nB. Oligopoly\nC. Monopolistic Competition\nD. Perfect Competition", "options": [{"id": "1", "text": "D, C, B, A"}, {"id": "2", "text": "B, A, C, D"}, {"id": "3", "text": "A, B, C, D"}, {"id": "4", "text": "B, D, A, C"}], "correctAnswer": "1", "explanation": "Key Concept:** Market structures are defined primarily by the number of competing sellers and the degree of product differentiation.\n* First: **Perfect Competition (D)** has an infinite or very large number of sellers.\n* Second: **Monopolistic Competition (C)** has many sellers, but fewer than perfect competition.\n* Third: **Oligopoly (B)** has a few dominant sellers.\n* Fourth: **Duopoly (A)** has exactly two sellers.", "id": 62}, {"question": "What will be the value of AR, if elasticity of demand is unit elastic and the value of MR is 5?", "options": [{"id": "1", "text": "2.5"}, {"id": "2", "text": "5"}, {"id": "3", "text": "1"}, {"id": "4", "text": "10"}], "correctAnswer": "4", "explanation": "Key Concept:** The mathematical relationship between Average Revenue (AR), Marginal Revenue (MR), and Price Elasticity of Demand ($e$).\n* Step A: The fundamental formula is $MR = AR \\times (1 - \\frac{1}{e})$.\n* Step B: If elasticity is strictly unit elastic ($e = 1$), the formula results in $MR = 0$. However, the question states $MR = 5$. This indicates a typographical error in the original UGC NET paper, where \"unit elastic\" was intended to be $e = 2$.\n* Step C: Assuming the intended $e = 2$, substitute the values: $5 = AR \\times (1 - \\frac{1}{2})$.\n* Step D: Simplify the equation: $5 = AR \\times 0.5$.\n* Step E: Solve for AR: $AR = \\frac{5}{0.5} = 10$.", "id": 63}, {"question": "Where a company incurs any expenditure (not being expenditure in the nature of cost of any land or building) on any notified skill development project, then such company can claim as deduction under section 35CCD:", "options": [{"id": "1", "text": "Only 25% of such expenditure"}, {"id": "2", "text": "Only 50% of such expenditure"}, {"id": "3", "text": "Only 75% of such expenditure"}, {"id": "4", "text": "100% of such expenditure"}], "correctAnswer": "4", "explanation": "Key Concept:** Section 35CCD of the Income Tax Act provides incentives for companies investing in the skill development of their workforce or the general public.\n* Previously, this section offered a weighted deduction of 150%.\n* The Finance Act, 2020 restricted the deduction to exactly 100% of the expenditure incurred from Assessment Year 2021-22 onwards.\n* Expenditure on purchasing land or buildings is explicitly excluded.", "id": 64}, {"question": "Arrange the following steps of Capital Budgeting Process in correct order:\nA. Preliminary Screening Process\nB. Project Generation\nC. Detailed Project Evaluation\nD. Control of Capital Expenditure\nE. Project Selection and its implementation", "options": [{"id": "1", "text": "A, B, C, D, E"}, {"id": "2", "text": "B, A, C, E, D"}, {"id": "3", "text": "A, B, C, E, D"}, {"id": "4", "text": "B, A, C, D, E"}], "correctAnswer": "2", "explanation": "Key Concept:** The systematic procedural framework a company uses to evaluate and select long-term investment projects.\n* Phase A: Create ideas via **Project Generation (B)**.\n* Phase B: Weed out unviable ideas via the **Preliminary Screening Process (A)**.\n* Phase C: Rigorously analyze survivors via **Detailed Project Evaluation (C)**.\n* Phase D: Make the final choice via **Project Selection and its implementation (E)**.\n* Phase E: Monitor the project post-execution via **Control of Capital Expenditure (D)**.", "id": 65}, {"question": "Given below are two statements: one is labelled as Assertion (A) and the other is labelled as Reason (R).\nAssertion (A): New Issue of Capital is costlier than Retained Earnings.\nReason (R): The cost of Retained Earnings is the return foregone by the shareholders on the dividend income.\nIn the light of the above statements, choose the most appropriate answer from the options given below:", "options": [{"id": "1", "text": "Both (A) and (R) are correct and (R) is the correct explanation of (A)"}, {"id": "2", "text": "Both (A) and (R) are correct but (R) is not the correct explanation of (A)"}, {"id": "3", "text": "(A) is correct but (R) is not correct"}, {"id": "4", "text": "(A) is not correct but (R) is correct"}], "correctAnswer": "2", "explanation": "Key Concept:** Understanding the components that differentiate the Cost of Equity from the Cost of Retained Earnings.\n**Assertion-Reason Analysis:** The Assertion is correct; issuing new equity involves flotation costs (brokerage, underwriting fees), making it more expensive than using internal funds. The Reason is also a correct factual statement. However, the Reason does not explain *why* new capital is costlier. It is costlier precisely due to the presence of flotation costs, which are absent in retained earnings.", "id": 66}, {"question": "Which of the followings are the approaches of determining the financing mix for working capital:\nA. Matching Approach\nB. Conservative Approach\nC. Operating Cycle Approach\nD. Aggressive Approach", "options": [{"id": "1", "text": "B, C and D Only"}, {"id": "2", "text": "A, B and D Only"}, {"id": "3", "text": "A, C and D Only"}, {"id": "4", "text": "A, B and C Only"}], "correctAnswer": "2", "explanation": "Key Concept:** Financial strategies used to balance the funding of temporary versus permanent working capital.\n* Matching Approach (Hedging): Funds long-term assets with long-term debt, and short-term assets with short-term debt.\n* Conservative Approach: Uses long-term financing for all permanent and a portion of temporary current assets.\n* Aggressive Approach: Uses short-term financing for all temporary and a portion of permanent current assets.\n* The \"Operating Cycle\" is a duration metric, not a financing mix strategy.", "id": 67}, {"question": "Given below are two statements: one is labelled as Assertion (A) and the other is labelled as Reason (R).\nAssertion (A): Filter questions in questionnaire measure the familiarity of the respondents with the topic of research.\nReason (R): Questions that try to capture multiple information at once are referred to as leading questions.\nIn the light of the above statements, choose the most appropriate answer from the options given below:", "options": [{"id": "1", "text": "Both (A) and (R) are correct and (R) is the correct explanation of (A)"}, {"id": "2", "text": "Both (A) and (R) are correct but (R) is not the correct explanation of (A)"}, {"id": "3", "text": "(A) is correct but (R) is not correct"}, {"id": "4", "text": "(A) is not correct but (R) is correct"}], "correctAnswer": "3", "explanation": "Key Concept:** Questionnaire design mechanics, specifically the phrasing and flow of survey questions.\n**Assertion-Reason Analysis:** The Assertion is correct; filter (screening) questions ensure the respondent has the requisite knowledge before proceeding. The Reason is incorrect because a question trying to capture multiple pieces of information at once is defined as a **\"Double-Barreled\"** question, not a \"Leading\" question.", "id": 68}, {"question": "Given below are two statements: one is labelled as Assertion (A) and the other is labelled as Reason (R).\nAssertion (A): Minority interest is that part of the net assets of a subsidiary attributable to interest which is held by outsiders.\nReason (R): Minority interest should be presented in the consolidated balance sheet as a part of equity of the parent's shareholders.\nIn the light of the above statements, choose the most appropriate answer from the options given below:", "options": [{"id": "1", "text": "Both (A) and (R) are correct and (R) is the correct explanation of (A)"}, {"id": "2", "text": "Both (A) and (R) are correct but (R) is not the correct explanation of (A)"}, {"id": "3", "text": "(A) is correct but (R) is not correct"}, {"id": "4", "text": "(A) is not correct but (R) is correct"}], "correctAnswer": "3", "explanation": "Key Concept:** The treatment and presentation of Non-Controlling Interest in consolidated corporate financial statements.\n**Assertion-Reason Analysis:** The Assertion is perfectly correct; minority interest represents the portion of a subsidiary not owned by the parent company. The Reason is factually incorrect because it must be presented **separately** from the equity of the parent's shareholders to ensure transparency.", "id": 69}, {"question": "Arrange the followings on the basis of Sections of Indian Contract Act, 1872 in ascending order:\nA. Agreement in restraint of Marriage\nB. Agreement made without consideration\nC. Agreement with unlawful objects or consideration\nD. Agreement in restraint of Trade\nE. Agreement by way of wager", "options": [{"id": "1", "text": "C, B, A, D, E"}, {"id": "2", "text": "C, A, D, B, E"}, {"id": "3", "text": "A, B, C, E, D"}, {"id": "4", "text": "D, B, A, C, E"}], "correctAnswer": "1", "explanation": "Key Concept:** The numerical sequence of specific sections in the Indian Contract Act that declare certain types of agreements void.\n* Section 23: Unlawful objects/consideration (C).\n* Section 25: Without consideration (B).\n* Section 26: Restraint of Marriage (A).\n* Section 27: Restraint of Trade (D).\n* Section 30: Wager (E).", "id": 70}, {"question": "Match List - I with List - II.\n| List - I | List - II |\n| :--- | :--- |\n| A. Highest Reach | I. Publicity |\n| B. Most Persuasive | II. Advertising |\n| C. Immediate Effect on Sales | III. Personal Selling |\n| D. No Cost Involved | IV. Sales Promotion |", "options": [{"id": "1", "text": "A-I, B-II, C-III, D-IV"}, {"id": "2", "text": "A-II, B-I, C-III, D-IV"}, {"id": "3", "text": "A-II, B-III, C-IV, D-I"}, {"id": "4", "text": "A-IV, B-I, C-II, D-III"}], "correctAnswer": "3", "explanation": "Key Concept:** The distinct characteristics of the four primary elements of the promotional mix.\n* Advertising offers the highest mass reach.\n* Personal Selling is the most customized and persuasive.\n* Sales Promotion creates an immediate, short-term effect on sales.\n* Publicity involves no direct media purchasing costs.", "id": 71}, {"question": "Under which of the following, a firm well publicized changes in price and price changes are generally followed by the rival firms. This kind of price leadership may not necessarily come from the largest firm of the industry.", "options": [{"id": "1", "text": "Biometric Price Leadership"}, {"id": "2", "text": "Barometric Price Leadership"}, {"id": "3", "text": "Price Leadership by low cost firm"}, {"id": "4", "text": "Price Leadership by dominant firm"}], "correctAnswer": "2", "explanation": "Key Concept:** Oligopolistic pricing strategies where one firm initiates price changes that others follow.\n* In **Barometric** leadership, a firm acts as a \"barometer,\" accurately reflecting changing market conditions. Other firms trust its judgment, even if it isn't the biggest firm.\n* Dominant firm leadership occurs when a single massive firm dictates prices.\n* Low-cost leadership occurs when the most efficient firm sets the pace.", "id": 72}, {"question": "An infinite series of equal cash flow occurring at regular time interval is known as:", "options": [{"id": "1", "text": "An Annuity"}, {"id": "2", "text": "An Annuity Due"}, {"id": "3", "text": "Perpetuity"}, {"id": "4", "text": "Future Value"}], "correctAnswer": "3", "explanation": "Key Concept:** Time value of money terminology regarding infinite cash flow streams.\n* A **Perpetuity** is a constant stream of identical cash flows with no end date (e.g., preferred stock dividends).\n* An Annuity is a series of equal cash flows for a fixed, finite period.\n* Future value cannot be mathematically calculated for a perpetuity because it never ends.", "id": 73}, {"question": "Match List - I with List - II.\n| List - I | List - II |\n| :--- | :--- |\n| A. Probable Error of Correlation Coefficient | I. Explained Variation / Total Variation |\n| B. Standard Error of Correlation Coefficient | II. Unexplained Variation / Total Variation |\n| C. Coefficient of Determination | III. $(1 - r^2) / \\sqrt{n}$ |\n| D. Coefficient of Alienation | IV. $0.6745 [(1 - r^2) / \\sqrt{n}]$ |", "options": [{"id": "1", "text": "A-I, B-II, C-III, D-IV"}, {"id": "2", "text": "A-IV, B-III, C-II, D-I"}, {"id": "3", "text": "A-III, B-IV, C-I, D-II"}, {"id": "4", "text": "A-IV, B-III, C-I, D-II"}], "correctAnswer": "4", "explanation": "Key Concept:** Statistical formulas and definitions related to correlation and regression analysis.\n* Probable Error aligns with Formula IV.\n* Standard Error aligns with Formula III.\n* Coefficient of Determination aligns with the ratio of Explained Variation to Total Variation.\n* Coefficient of Alienation relates to Unexplained Variation.", "id": 74}, {"question": "Which of the following is a measure of relative risk and is calculated by dividing the standard deviation by its expected value?", "options": [{"id": "1", "text": "Variance"}, {"id": "2", "text": "Coefficient of Variance"}, {"id": "3", "text": "Co-Variance"}, {"id": "4", "text": "Geometric Mean"}], "correctAnswer": "2", "explanation": "Key Concept:** The Coefficient of Variation normalizes the measure of dispersion, allowing comparison of volatility between assets with entirely different expected returns or scales.\n* The formula is Standard Deviation divided by the Mean.\n* Variance is an absolute measure of risk, not relative.\n* Covariance measures how two distinct variables move together.", "id": 75}, {"question": "Which of the following statements is incorrect for Amalgamation in the nature of merger?", "options": [{"id": "1", "text": "All assets and liabilities of the transferor company taken over by the transferee company"}, {"id": "2", "text": "Shareholders of the transferor company need not become equity shareholders of the transferee company"}, {"id": "3", "text": "Payment of purchase consideration is made in cash only for fractional shares, if any."}, {"id": "4", "text": "The business of Transferor Company is intended to be carried on, after amalgamation, by the transferee company"}], "correctAnswer": "2", "explanation": "Key Concept:** Accounting Standard 14 (AS-14) outlines five strict conditions for an amalgamation in the nature of a merger (pooling of interests method).\n* Statement 2 is incorrect because AS-14 strictly requires that shareholders holding at least 90% of the face value of equity shares of the transferor company *must* become equity shareholders in the transferee company.", "id": 76}, {"question": "Match List - I with List - II.\n| List - I | List - II |\n| :--- | :--- |\n| A. NPV | I. Which equates the aggregate present value of the net cash Inflows with the aggregate present value of cash outflows. |\n| B. IRR | II. Dividing the average annual profit after tax by average investment over the life of the project. |\n| C. ARR | III. Summation of the present values of cash proceeds in each year minus the summation of the present values of the net cash outflow in each year. |\n| D. PI | IV. Dividing the present value of future cash inflow by the present value of cash outflow. |", "options": [{"id": "1", "text": "A-I, B-III, C-II, D-IV"}, {"id": "2", "text": "A-III, B-II, C-IV, D-I"}, {"id": "3", "text": "A-III, B-I, C-II, D-IV"}, {"id": "4", "text": "A-I, B-II, C-III, D-IV"}], "correctAnswer": "3", "explanation": "Key Concept:** Definitions of standard capital budgeting evaluation techniques.\n* NPV: Sum of PV inflows minus sum of PV outflows.\n* IRR: Discount rate where PV of Inflows equals PV of Outflows (NPV=0).\n* ARR: Average annual profit divided by average investment.\n* PI: PV of future cash inflows divided by PV of outflows.", "id": 77}, {"question": "Charge collected from the investors by a Mutual Fund Scheme when it sells its units to investors is called:", "options": [{"id": "1", "text": "Exit Load"}, {"id": "2", "text": "Entry Load"}, {"id": "3", "text": "Switch"}, {"id": "4", "text": "Sale Price"}], "correctAnswer": "2", "explanation": "Key Concept:** Fees levied by mutual fund asset management companies (AMCs) to cover distribution and administrative costs.\n* An **Entry Load** is deducted from the investor's initial capital at the time of purchase. (SEBI formally abolished entry loads in India to protect investors).\n* An Exit Load is charged when an investor redeems their units before a lock-in period.", "id": 78}, {"question": "Which one of the followings is not a method of New Issues?", "options": [{"id": "1", "text": "Public Issue through Prospectus"}, {"id": "2", "text": "Right Issue"}, {"id": "3", "text": "Bonus Issue"}, {"id": "4", "text": "Book Building"}], "correctAnswer": "3", "explanation": "Key Concept:** Methods of raising fresh capital in the primary financial market.\n* A **Bonus Issue** simply converts existing company reserves into share capital. No new cash is raised from the market, making it an accounting adjustment rather than a true \"new issue\" of capital.\n* Public Issues, Rights Issues, and Book Building mechanisms all generate fresh capital.", "id": 79}, {"question": "India's participation in SAARC and ASEAN trade pacts primarily reflects which level of Regional Economic Integration?", "options": [{"id": "1", "text": "Customs Union"}, {"id": "2", "text": "Free Trade Area"}, {"id": "3", "text": "Economic Union"}, {"id": "4", "text": "Common Market"}], "correctAnswer": "2", "explanation": "Key Concept:** The stages of regional economic integration, which classify the depth of economic cooperation between neighboring states.\n* A **Free Trade Area (FTA)** eliminates internal tariffs between member countries, but each country maintains its own external tariffs against non-members.\n* A Customs Union adds a common external tariff.\n* An Economic Union harmonizes monetary and fiscal policies.", "id": 80}, {"question": "Which one of the followings is not a type of Organisation charts?", "options": [{"id": "1", "text": "Vertical Chart"}, {"id": "2", "text": "Circular Chart"}, {"id": "3", "text": "Diagonal Chart"}, {"id": "4", "text": "Horizontal Chart"}], "correctAnswer": "3", "explanation": "Key Concept:** Visual representations of an organization's internal structure, detailing hierarchy and reporting relationships.\n* Vertical Charts show top-down hierarchy.\n* Horizontal Charts emphasize process flowing left-to-right.\n* Circular Charts place leadership in the center radiating outward.\n* \"Diagonal\" is not a recognized format for structuring organization charts.", "id": 81}, {"question": "Arrange the following committees as per their year of formation in ascending order:\nA. Narsimham Committee - I\nB. Padmanabhan Committ
