    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const TEST_DATA = {"title": "Business Management and HRM 2022 PYQ", "organization": "Examtym", "durationMinutes": 60, "totalMarks": 90.0, "marksForCorrect": 2.0, "marksForWrong": 0.0, "passPercentage": 40, "shuffle": false, "strictMode": false, "questions": [{"question": "Through which one of the following influences of workers' participation in management regarding 'safety and welfare and work-related' issues are resolved?", "options": [{"id": "1", "text": "Information sharing"}, {"id": "2", "text": "Bargaining"}, {"id": "3", "text": "Consultation"}, {"id": "4", "text": "Co-determination"}], "correctAnswer": "3", "explanation": "Consultation involves workers being asked for their views on safety, welfare, and work-related issues before decisions are taken. It goes beyond mere information sharing but stops short of joint decision-making (co-determination).\n**Key Concepts:**\n- Workers' participation has multiple levels: information sharing \u2192 consultation \u2192 bargaining \u2192 co-determination (increasing intensity).\n- Consultation is the appropriate level for safety/welfare issues \u2014 management seeks worker input but retains final authority.\n- Co-determination implies joint decision-making authority, typically used for strategic/policy-level decisions.\n**Related Concepts:**\n- Works Committees and Joint Management Councils in India operate primarily at the consultation level.\n- ILO conventions on workers' participation recommend consultation as minimum standard for safety and welfare matters.", "id": 1}, {"question": "Arrange the time spent in administration in increasing order by the following personnel:\n(A) Works Manager\n(B) President\n(C) Foreman\n(D) Board of Directors\n(E) General Manager", "options": [{"id": "1", "text": "(C), (A), (E), (B), (D)"}, {"id": "2", "text": "(D), (B), (E), (A), (C)"}, {"id": "3", "text": "(D), (E), (B), (A), (C)"}, {"id": "4", "text": "(E), (C), (A), (D), (B)"}], "correctAnswer": "1", "explanation": "Time spent in administration increases as we move up the hierarchy. Foreman (C) spends least time in administration and most in technical/supervisory work; Works Manager (A) > General Manager (E) > President (B) > Board of Directors (D) spend progressively more time in administrative functions.\n**Key Concepts:**\n- Lower-level managers (foremen, supervisors) spend most time on technical/operative supervision and least on administration.\n- Top-level management (Board, President) are almost exclusively engaged in administrative/policy-level decisions.\n- This reflects the classic management level pyramid \u2014 administrative content rises with hierarchical level.\n**Related Concepts:**\n- Fayol's concept of relative importance of managerial vs. technical skills at different levels supports this pattern.\n- Katz's three managerial skills: technical (dominant at lower levels), human (middle), conceptual (dominant at top).", "id": 2}, {"question": "Which one of the following tests measures the applicant's capacity to learn the skill required for a job?", "options": [{"id": "1", "text": "Aptitude test"}, {"id": "2", "text": "Interest test"}, {"id": "3", "text": "Intelligence test"}, {"id": "4", "text": "Personality test"}], "correctAnswer": "1", "explanation": "Aptitude tests measure an individual's potential or capacity to learn specific skills \u2014 they assess latent ability rather than current knowledge or existing performance.\n**Key Concepts:**\n- Aptitude tests are predictive \u2014 they forecast how well a candidate can develop required job skills with training.\n- Intelligence tests measure general mental ability (IQ); achievement tests measure existing knowledge/skill.\n- Interest tests measure preferences and inclinations \u2014 not capacity to learn.\n**Related Concepts:**\n- Mechanical aptitude, clerical aptitude, and spatial aptitude tests are common examples used in selection.\n- Achievement test (Q100 pair) measures current skill level \u2014 opposite end of the spectrum from aptitude.", "id": 3}, {"question": "Match List I with List II:\n| List I (Management Style) | List II (Approach) |\n|---|---|\n| (A) Task Management | (I) Love conquers all approach |\n| (B) Country Club Management | (II) One plus one can add up to three approach |\n| (C) Impoverished Management | (III) Authority-obedience approach |\n| (D) Team Management | (IV) Speak no evil, hear no evil, see no evil approach |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "(A)-(I), (B)-(III), (C)-(IV), (D)-(II)"}, {"id": "2", "text": "(A)-(I), (B)-(IV), (C)-(II), (D)-(III)"}, {"id": "3", "text": "(A)-(III), (B)-(I), (C)-(IV), (D)-(II)"}, {"id": "4", "text": "(A)-(III), (B)-(IV), (C)-(II), (D)-(I)"}], "correctAnswer": "3", "explanation": "Blake & Mouton's Managerial Grid \u2014 Task Management (9,1) = authority-obedience (III); Country Club (1,9) = love conquers all \u2014 people first (I); Impoverished (1,1) = speak/hear/see no evil \u2014 minimum effort (IV); Team Management (9,9) = synergy/one plus one equals three (II).\n**Key Concepts:**\n- Blake & Mouton's Managerial Grid plots concern for production (X-axis) vs. concern for people (Y-axis).\n- Impoverished Management (1,1) represents minimum effort in both task and people dimensions \u2014 hence \"see no evil.\"\n- Team Management (9,9) achieves synergy through integration of task and people concerns \u2014 \"1+1=3.\"\n**Related Concepts:**\n- Middle-of-the-Road Management (5,5) seeks compromise but achieves mediocrity in both dimensions.\n- The Grid was later expanded to include Paternalistic and Opportunistic styles in later editions.", "id": 4}, {"question": "According to the Stewardship Theory of Corporate Governance, which of the following statements are relevant?\n(A) Governance approach is sociological and psychological\n(B) Behaviour pattern is trustworthy\n(C) The role of management is to monitor and control\n(D) Owners' attitude is to take risks\n(E) Interests of the managers and principals converge", "options": [{"id": "1", "text": "(A), (D), (E)"}, {"id": "2", "text": "(A), (B), (D), (E)"}, {"id": "3", "text": "(B), (C), (D)"}, {"id": "4", "text": "(A), (B), (C), (D), (E)"}], "correctAnswer": "2", "explanation": "Stewardship Theory holds that managers are inherently trustworthy stewards (B), their interests align with owners (E), the governance approach is sociological/psychological (A), and owners can take risks because they trust management (D). Monitoring and control (C) belongs to Agency Theory, not Stewardship Theory.\n**Key Concepts:**\n- Stewardship Theory (Davis, Schoorman & Donaldson, 1997) assumes managers are motivated by collective organizational goals.\n- Unlike Agency Theory, Stewardship Theory does not assume opportunistic manager behavior \u2014 trust replaces control.\n- Owners adopt a risk-taking attitude because they believe managers will act as stewards of their interests.\n**Related Concepts:**\n- Agency Theory (Q8 below) contrasts sharply \u2014 assumes opportunism, requires monitoring mechanisms.\n- Stakeholder Theory extends beyond owner-manager relationship to include all stakeholder interests.", "id": 5}, {"question": "Which one of the following is a determinant of Organisational Climate or Culture (OC)?", "options": [{"id": "1", "text": "Leadership style"}, {"id": "2", "text": "Decision-making"}, {"id": "3", "text": "Innovation and change"}, {"id": "4", "text": "Trust"}], "correctAnswer": "1", "explanation": "Leadership style is identified as a primary determinant (causal factor) that shapes organizational climate. Decision-making, innovation, and trust are dimensions/components of organizational climate, not determinants.\n**Key Concepts:**\n- Determinants of OC include: leadership style, organizational structure, individual characteristics, work group, and HR policies.\n- Leadership style directly influences norms, values, communication patterns and risk orientation in an organization.\n- Trust, innovation, and decision-making are outcomes/dimensions of OC, not its determinants.\n**Related Concepts:**\n- Likert's four management systems (exploitative authoritative to participative) define climate through leadership approach.\n- Tagiuri & Litwin identified ecology, milieu, social system, and culture as dimensions of organizational climate.", "id": 6}, {"question": "Sequence correctly the following steps in PERT/CPM analysis:\n(A) Identify the critical path\n(B) Draw the network diagram\n(C) Establish dependencies across activities\n(D) Estimate the completion time of an activity\n(E) Define the activities in the network", "options": [{"id": "1", "text": "(B), (C), (D), (E), (A)"}, {"id": "2", "text": "(E), (C), (B), (D), (A)"}, {"id": "3", "text": "(C), (B), (E), (A), (D)"}, {"id": "4", "text": "(A), (B), (D), (E), (C)"}], "correctAnswer": "2", "explanation": "Correct PERT/CPM sequence: Define activities (E) \u2192 Establish dependencies/sequence (C) \u2192 Draw network diagram (B) \u2192 Estimate completion time (D) \u2192 Identify critical path (A).\n**Key Concepts:**\n- Activities must be defined before dependencies can be established \u2014 you cannot sequence undefined tasks.\n- Network diagram is drawn after dependencies are established, visually representing the project flow.\n- Critical path identification is the final analytical step \u2014 it requires all durations to be estimated first.\n**Related Concepts:**\n- Critical Path Method (CPM) uses deterministic time estimates; PERT uses three-point estimates (optimistic, most likely, pessimistic).\n- Float/slack calculation is done after critical path identification to determine scheduling flexibility.", "id": 7}, {"question": "Which of the following common difficulties are faced in making decisions and implementing?\n(A) Non-actionable information\n(B) Unsupporting environment\n(C) Easy acceptance by subordinates\n(D) Ineffective communication\n(E) Incorrect timing", "options": [{"id": "1", "text": "(A), (B) Only"}, {"id": "2", "text": "(C), (D), (E) Only"}, {"id": "3", "text": "(A), (B), (D), (E) Only"}, {"id": "4", "text": "(A), (B), (C), (D) Only"}], "correctAnswer": "3", "explanation": "Non-actionable information (A), unsupportive environment (B), ineffective communication (D), and incorrect timing (E) are all real barriers to decision-making and implementation. Easy acceptance by subordinates (C) is not a difficulty \u2014 resistance, not acceptance, is the problem.\n**Key Concepts:**\n- Non-actionable information means data exists but cannot be translated into implementable decisions.\n- Incorrect timing is a critical implementation difficulty \u2014 even good decisions fail if executed at the wrong time.\n- Easy acceptance (C) is actually desirable and therefore not a difficulty \u2014 its opposite (resistance) is the challenge.\n**Related Concepts:**\n- Implementation gap refers to the distance between a decision being made and it being effectively executed.\n- Communication barriers (semantic, channel, perceptual) directly impede decision implementation.", "id": 8}, {"question": "Which of the following statements are true in case of delegation of authority?\n(A) It slows down decision-making\n(B) It leads to better decisions\n(C) It relieves the manager of heavy work load\n(D) It helps create an informal organisation structure\n(E) It helps train subordinates", "options": [{"id": "1", "text": "(A), (D), (E) Only"}, {"id": "2", "text": "(A), (B), (C) Only"}, {"id": "3", "text": "(B), (C), (E) Only"}, {"id": "4", "text": "(B), (D), (E) Only"}], "correctAnswer": "3", "explanation": "Delegation leads to better decisions (B) because those closest to the work decide, relieves managerial overload (C), and develops subordinates' competence (E). It speeds up (not slows) decision-making, and creates formal (not informal) delegation structures.\n**Key Concepts:**\n- Delegation accelerates decision-making by pushing authority to the point of action \u2014 contradicting option A.\n- Better decisions result because subordinates with direct knowledge of situations make more informed choices.\n- Delegation is a formal process \u2014 it builds formal organizational structure, not informal networks.\n**Related Concepts:**\n- Decentralization is systematic delegation across the organization; delegation is person-to-person authority transfer.\n- The principle of parity of authority and responsibility must hold for effective delegation.", "id": 9}, {"question": "As per the Agency Theory of Corporate Governance, which of the following statements are relevant?\n(A) Governance approach is materialistic.\n(B) Managers are motivated by the principal's objectives.\n(C) Interests of the managers and principals converge.\n(D) Behaviour pattern is opportunistic.\n(E) Owner's attitude is to avoid risks.", "options": [{"id": "1", "text": "(A), (C), (E) only"}, {"id": "2", "text": "(B), (C), (D) only"}, {"id": "3", "text": "(B), (D), (E) only"}, {"id": "4", "text": "(A), (D), (E) only"}], "correctAnswer": "4", "explanation": "Agency Theory assumes materialistic governance (A), opportunistic manager behavior (D), and risk-averse owners who therefore need monitoring mechanisms (E). Managers are self-interested \u2014 NOT motivated by principal's objectives (B false); interests diverge \u2014 NOT converge (C false).\n**Key Concepts:**\n- Agency Theory (Jensen & Meckling, 1976) sees managers (agents) as self-interested \u2014 diverging from owner (principal) goals.\n- Materialistic governance means economic/financial incentives drive all behavior \u2014 monitoring costs are incurred.\n- Owners are risk-averse \u2014 they invest in governance mechanisms (boards, audits) to control agent opportunism.\n**Related Concepts:**\n- Agency costs = monitoring costs + bonding costs + residual loss.\n- Stewardship Theory (Q5 above) is the theoretical antithesis of Agency Theory.", "id": 10}, {"question": "Given below are two statements:\n**Statement I:** Policies are guides to action, rather than to thinking.\n**Statement II:** Policies define an area within which a decision is to be made.\nChoose the most appropriate answer from the options given below:", "options": [{"id": "1", "text": "Both Statement I and Statement II are correct"}, {"id": "2", "text": "Both Statement I and Statement II are incorrect"}, {"id": "3", "text": "Statement I is correct but Statement II is incorrect"}, {"id": "4", "text": "Statement I is incorrect but Statement II is correct"}], "correctAnswer": "4", "explanation": "Statement I is incorrect \u2014 policies are guides to thinking (not to action). Procedures are guides to action. Statement II is correct \u2014 policies define the boundary/area within which managers exercise discretion in decision-making.\n**Key Concepts:**\n- Policies are guides to managerial thinking and decision-making \u2014 they set limits, not prescribed actions.\n- Procedures are step-by-step action guides; policies are broader, principle-level guidelines for decisions.\n- Statement II precisely captures Koontz & O'Donnell's classic definition of a policy.\n**Related Concepts:**\n- Hierarchy of plans: Mission \u2192 Objectives \u2192 Strategies \u2192 Policies \u2192 Procedures \u2192 Rules \u2192 Programs \u2192 Budgets.\n- Rules prescribe specific required actions; policies leave room for managerial judgment within defined limits.", "id": 11}, {"question": "Which one of the following is NOT an advantage of organisation structure by territory?", "options": [{"id": "1", "text": "Makes control easy for top management"}, {"id": "2", "text": "Places responsibility at a lower level"}, {"id": "3", "text": "Improves coordination in a region"}, {"id": "4", "text": "Takes advantage of economies of local operations"}], "correctAnswer": "1", "explanation": "Territorial/geographic organization actually makes control MORE DIFFICULT for top management because authority is dispersed across regions. Options 2, 3, and 4 are genuine advantages of geographic departmentation.\n**Key Concepts:**\n- Geographic structure pushes decision-making to regional managers \u2014 this decentralizes control, not centralizes it.\n- Local coordination (3) and local economies (4) are its primary advantages \u2014 proximity to regional markets/resources.\n- Placing responsibility at lower levels (2) is a key benefit \u2014 regional managers own their territory's performance.\n**Related Concepts:**\n- Product-based structure vs. geographic structure trade-off is common in multinational organizations.\n- Matrix structure attempts to combine geographic and functional/product advantages.", "id": 12}, {"question": "Arrange the stages of delegation in the correct sequence:\n(A) Establish proper controls.\n(B) Select the person in light of the job to be done.\n(C) Reward effective delegation and successful assumption of authority.\n(D) Define assignments and delegate authority in light of results expected.\n(E) Maintain open lines of communication.", "options": [{"id": "1", "text": "(A), (B), (C), (E), (D)"}, {"id": "2", "text": "(B), (D), (E), (A), (C)"}, {"id": "3", "text": "(D), (B), (E), (A), (C)"}, {"id": "4", "text": "(C), (D), (B), (E), (A)"}], "correctAnswer": "2", "explanation": "Correct sequence: Select the person (B) \u2192 Define assignment and delegate authority (D) \u2192 Maintain open communication (E) \u2192 Establish controls (A) \u2192 Reward effective delegation (C).\n**Key Concepts:**\n- Person selection (B) must precede task assignment \u2014 you match the right person to the right responsibility.\n- Controls (A) are established before execution begins but after the assignment is defined \u2014 not after completion.\n- Reward (C) is the final reinforcement step that sustains the delegation culture going forward.\n**Related Concepts:**\n- Koontz's principles of delegation: clarity of assignment, unity of command, authority level principle, and scalar principle.\n- Hersey-Blanchard's situational leadership informs which delegation style fits which subordinate readiness level.", "id": 13}, {"question": "Economists' adjustment to reality limited by individual consumers' preferences, intelligence, and environmental factors is called:", "options": [{"id": "1", "text": "Rationality"}, {"id": "2", "text": "Homo economicus"}, {"id": "3", "text": "Bounded rationality"}, {"id": "4", "text": "Consumer sovereignty"}], "correctAnswer": "3", "explanation": "Bounded rationality (Herbert Simon) refers to the idea that human decision-making is rational but constrained by cognitive limitations, available information, and environmental factors \u2014 not perfectly rational as classical economics assumes.\n**Key Concepts:**\n- Simon's bounded rationality: humans intend to be rational but are limited by information, cognition, and time.\n- Homo economicus is the classical economics model of a perfectly rational, self-interested decision-maker \u2014 the ideal, not reality.\n- Satisficing (Simon) is the behavioral outcome of bounded rationality \u2014 choosing \"good enough\" over optimal.\n**Related Concepts:**\n- Kahneman's System 1 (fast, intuitive) and System 2 (slow, deliberate) thinking elaborates on bounded rationality mechanisms.\n- Administrative man (Simon) vs. economic man (classical theory) is a key theoretical distinction in decision-making.", "id": 14}, {"question": "From which of the following, employees derive authority?\n(A) Position\n(B) Experience\n(C) Moral worth\n(D) Past service\n(E) Intelligence", "options": [{"id": "1", "text": "(A), (B) only"}, {"id": "2", "text": "(A), (E) only"}, {"id": "3", "text": "(B), (C), (E) only"}, {"id": "4", "text": "(A), (B), (C), (D), (E)"}], "correctAnswer": "4", "explanation": "According to acceptance theory and broader management literature, authority can be derived from all five sources: formal position (A), experience/expertise (B), moral worth/character (C), past service/track record (D), and intelligence/competence (E).\n**Key Concepts:**\n- Formal authority flows from position in hierarchy (A) \u2014 the most recognized source in classical theory.\n- Functional authority derives from expertise (B) and intelligence (E) \u2014 recognized in staff/functional relationships.\n- Moral worth (C) and past service (D) contribute to informal authority and personal credibility.\n**Related Concepts:**\n- French & Raven's five bases of power: legitimate, reward, coercive, expert, referent \u2014 map onto these sources.\n- Chester Barnard's acceptance theory: authority exists only when subordinates choose to accept it.", "id": 15}, {"question": "According to Herzberg's Two Factor Theory, which one of the following is NOT a maintenance factor?", "options": [{"id": "1", "text": "Affiliation or Acceptance"}, {"id": "2", "text": "Esteem or Status"}, {"id": "3", "text": "Security or Safety"}, {"id": "4", "text": "Physiological Needs"}], "correctAnswer": "2", "explanation": "Esteem or Status is a higher-order need (Maslow) but in Herzberg's framework it functions as a motivator (recognition, achievement), NOT a hygiene/maintenance factor. Physiological needs, security, and affiliation are maintenance/hygiene factors.\n**Key Concepts:**\n- Herzberg's hygiene factors (maintenance): salary, security, working conditions, company policy, interpersonal relations, physiological needs.\n- Motivators (satisfiers): achievement, recognition, work itself, responsibility, advancement, growth.\n- Esteem/status crosses into the motivator category when expressed as recognition and advancement.\n**Related Concepts:**\n- Maslow-Herzberg mapping: lower-order needs (physiological, safety, social) \u2248 hygiene; higher-order (esteem, self-actualization) \u2248 motivators.\n- Herzberg's theory led to job enrichment as a practical HRM intervention for motivation.", "id": 16}, {"question": "Match List I with List II:\n| List I (Personality Factor \u2014 Cattell's 16PF) | List II (Bipolar Dimension) |\n|---|---|\n| (A) Warmth | (I) Imaginative vs Practical |\n| (B) Abstractedness | (II) Controlled vs Casual |\n| (C) Openness to change | (III) Outgoing vs Reserved |\n| (D) Perfectionism | (IV) Experimental vs Conservative |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "(A)-(II), (B)-(I), (C)-(IV), (D)-(III)"}, {"id": "2", "text": "(A)-(III), (B)-(I), (C)-(IV), (D)-(II)"}, {"id": "3", "text": "(A)-(I), (B)-(IV), (C)-(III), (D)-(II)"}, {"id": "4", "text": "(A)-(III), (B)-(II), (C)-(IV), (D)-(I)"}], "correctAnswer": "2", "explanation": "Cattell's 16PF factors \u2014 Warmth (III): outgoing vs reserved; Abstractedness (I): imaginative vs practical; Openness to change (IV): experimental vs conservative; Perfectionism (II): controlled vs casual.\n**Key Concepts:**\n- Cattell's 16 Personality Factor (16PF) model identifies bipolar trait dimensions describing the full personality spectrum.\n- Warmth (Factor A) describes social orientation \u2014 outgoing/reserved polarity is directly interpersonal.\n- Perfectionism (Factor Q3) reflects self-control and orderliness \u2014 controlled vs. casual bipolar dimension.\n**Related Concepts:**\n- The Big Five personality model can be derived from Cattell's 16PF through factor analysis.\n- Abstractedness vs. practicality in 16PF aligns with Openness dimension of the Big Five.", "id": 17}, {"question": "Which one of the following tools is NOT used for forecasting personnel needs (Labour Demand) by an organization?", "options": [{"id": "1", "text": "Trend Analysis"}, {"id": "2", "text": "Markov Analysis"}, {"id": "3", "text": "Ratio Analysis"}, {"id": "4", "text": "Scatter Plot"}], "correctAnswer": "2", "explanation": "Markov Analysis is a supply forecasting tool (internal supply \u2014 tracking employee movement across positions over time), NOT a demand forecasting tool. Trend analysis, ratio analysis, and scatter plot are all demand forecasting techniques.\n**Key Concepts:**\n- Demand forecasting tools: trend analysis (historical data extrapolation), ratio analysis (staffing ratios), scatter plot (correlation between activity and headcount).\n- Markov Analysis forecasts internal labor supply by calculating transition probabilities between job categories over time.\n- This distinction between demand forecasting and supply forecasting is a high-frequency NTA exam trap.\n**Related Concepts:**\n- HR planning involves both demand forecasting (how many needed) and supply forecasting (how many available).\n- Replacement charts and succession planning are also supply-side tools \u2014 not demand forecasting.", "id": 18}, {"question": "Which one of the following motives characterizes the dominant organizational climate of university teaching departments/scientific organizations?", "options": [{"id": "1", "text": "Affiliation"}, {"id": "2", "text": "Extension"}, {"id": "3", "text": "Expert power"}, {"id": "4", "text": "Achievement"}], "correctAnswer": "3", "explanation": "In university teaching and scientific organizations, the dominant climate is driven by expert power motive \u2014 knowledge, expertise, and intellectual authority define relationships and organizational functioning.\n**Key Concepts:**\n- Pareek's organizational climate types are linked to dominant motives: clubs (affiliation), task forces (achievement), scientific orgs (expert power).\n- Expert power climate values technical competence and knowledge-based authority over position or personal relationships.\n- Achievement motive dominates in entrepreneurial/task-oriented organizations, not academic/scientific ones.\n**Related Concepts:**\n- McClelland's three motives: need for achievement (nAch), power (nPow), and affiliation (nAff) underlie organizational climate types.\n- Extension motive (concern for others beyond self) typically characterizes social service/welfare organizations.", "id": 19}, {"question": "Which one of the following is NOT true for Authority?", "options": [{"id": "1", "text": "It is the legitimate right of a superior to command and compel his subordinates to perform a certain act."}, {"id": "2", "text": "It is mostly well-defined, conspicuous and finite."}, {"id": "3", "text": "It can be delegated."}, {"id": "4", "text": "It serves as a basis of both formal and informal organizations."}], "correctAnswer": "4", "explanation": "Authority is the basis of formal organization only. Informal organizations are based on influence, personal relationships, and group norms \u2014 not formal authority. Options 1, 2, and 3 are correct characteristics of authority.\n**Key Concepts:**\n- Formal authority flows through the scalar chain/hierarchy and is the foundation of formal organizational structure.\n- Informal organizations emerge from interpersonal relationships, shared interests, and social dynamics \u2014 authority is irrelevant here.\n- Authority can be delegated (3) \u2014 but responsibility cannot be fully delegated (parity principle).\n**Related Concepts:**\n- Power vs. authority distinction: power is broader (includes informal influence); authority is formal and position-based.\n- Chester Barnard's informal organization theory explains how informal groups operate independently of formal authority.", "id": 20}, {"question": "Which one of the following aims at the Task Dimension of organizational change?", "options": [{"id": "1", "text": "Broadening or narrowing span of control"}, {"id": "2", "text": "Diversifying into additional businesses"}, {"id": "3", "text": "Improving the efficiency of machines"}, {"id": "4", "text": "Reallocating authority"}], "correctAnswer": "2", "explanation": "Diversifying into additional businesses targets the task/purpose dimension of the organization \u2014 what the organization does. Span of control (1) and reallocating authority (4) are structural changes; improving machine efficiency (3) is a technological change.\n**Key Concepts:**\n- Leavitt's Diamond identifies four organizational change dimensions: task, structure, technology, and people.\n- Task dimension = what the organization does \u2014 its goals, products, services, and business scope.\n- Diversification changes the task/purpose by adding new lines of business \u2014 directly targeting the task dimension.\n**Related Concepts:**\n- Burke-Litwin model distinguishes transformational (task/mission) change from transactional (structure/process) change.\n- Structural change (span, authority reallocation) addresses how work is coordinated, not what work is done.", "id": 21}, {"question": "Which one of the tests measures the applicant's level of knowledge and skill in a particular job in which one he will be appointed?", "options": [{"id": "1", "text": "Personality test"}, {"id": "2", "text": "Achievement test"}, {"id": "3", "text": "Interest test"}, {"id": "4", "text": "Aptitude test"}], "correctAnswer": "2", "explanation": "Achievement tests measure current, existing knowledge and skill levels in a specific job domain \u2014 they assess what a candidate already knows and can do, not their potential.\n**Key Concepts:**\n- Achievement tests (also called proficiency/trade tests) directly measure job-relevant knowledge and skills acquired through education or experience.\n- Aptitude tests measure potential/capacity to learn; achievement tests measure current attainment \u2014 key distinction.\n- Used for positions requiring demonstrable existing expertise (e.g., typing test for data entry, technical test for engineers).\n**Related Concepts:**\n- Work sample tests are a form of achievement test with high content validity.\n- Criterion validity is typically assessed by correlating achievement test scores with actual job performance.", "id": 22}, {"question": "Match List I with List II (MBTI Framework):\n| List I (MBTI Characteristic) | List II (Jungian Aspects) |\n|---|---|\n| A. Sensing | I. Relies more on personal values than on impersonal analysis and logic |\n| B. Thinking | II. Would work with known facts than look for possibilities and relationships |\n| C. Feeling | III. Likes a flexible, spontaneous way rather than a planned and orderly way of life |\n| D. Perceiving | IV. Relies more on interpersonal analysis and logic than on personal values |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "A-II, B-I, C-IV, D-III"}, {"id": "2", "text": "A-II, B-IV, C-I, D-III"}, {"id": "3", "text": "A-III, B-IV, C-I, D-II"}, {"id": "4", "text": "A-II, B-I, C-III, D-IV"}], "correctAnswer": "2", "explanation": "MBTI \u2014 Sensing (II): prefers concrete facts over abstract possibilities; Thinking (IV): uses impersonal logic and analysis; Feeling (I): relies on personal values over logic; Perceiving (III): prefers flexibility and spontaneity over planned order.\n**Key Concepts:**\n- MBTI is based on Jung's psychological types and measures four dichotomies: E/I, S/N, T/F, J/P.\n- Sensing vs. Intuition: sensing types prefer facts/details; intuitive types see patterns and possibilities.\n- Judging vs. Perceiving: judging types prefer structure/plans; perceiving types prefer flexibility/spontaneity (III).\n**Related Concepts:**\n- Thinking-Feeling dimension in MBTI directly parallels the head-heart decision dichotomy in management contexts.\n- MBTI is widely used in team building and leadership development despite ongoing debates about its psychometric reliability.", "id": 23}, {"question": "Which of the following forces push up the productivity of employees in an organisation?\n(A) Difficulty of work\n(B) Fear of working self out of job\n(C) Egoistic drive to accomplish\n(D) Desire for promotion\n(E) Motive towards doing work", "options": [{"id": "1", "text": "A and B only"}, {"id": "2", "text": "B, C and D only"}, {"id": "3", "text": "A, D and E only"}, {"id": "4", "text": "C, D and E only"}], "correctAnswer": "4", "explanation": "Egoistic drive (C), desire for promotion (D), and intrinsic motive (E) are positive forces that push productivity upward. Difficulty of work (A) creates resistance; fear of working oneself out of a job (B) actually suppresses productivity \u2014 workers deliberately slow down to preserve employment.\n**Key Concepts:**\n- Positive productivity drivers include intrinsic motivation (E), achievement motive (C), and extrinsic incentives like promotion (D).\n- Restriction of output (working slowly to avoid job loss) is a documented group norm \u2014 fear of B actively reduces productivity.\n- Difficulty of work (A) is a constraint/barrier to productivity, not a motivating force in most contexts.\n**Related Concepts:**\n- Taylor's scientific management identified soldiering (deliberate work restriction) as a major productivity barrier.\n- Vroom's Expectancy Theory: effort \u2192 performance \u2192 reward chain explains why promotion desire (D) drives productivity.", "id": 24}, {"question": "According to the Contingency Approach, the factors governing the Span of Management are:\n(A) Type of work\n(B) Ability of the manager\n(C) Ability of the employees\n(D) Level of management\n(E) Geographic location", "options": [{"id": "1", "text": "B and C only"}, {"id": "2", "text": "B, C and D only"}, {"id": "3", "text": "A, D and E only"}, {"id": "4", "text": "A, B, C, D and E"}], "correctAnswer": "4", "explanation": "The contingency approach recognizes all five as factors determining appropriate span: nature of work (A), managerial capability (B), subordinate competence (C), hierarchical level (D), and geographic dispersion (E) \u2014 no single universal span applies.\n**Key Concepts:**\n- Classical theory proposed ideal spans (Graicunas: 5-6); contingency theory rejects this in favor of situational determination.\n- Geographic dispersion (E) reduces effective span \u2014 managing dispersed teams requires more managerial time per subordinate.\n- Level of management (D) matters: lower levels can have wider spans (routine work) vs. top levels (complex decisions, narrow spans).\n**Related Concepts:**\n- Graicunas' mathematical formula showed how supervisor-subordinate relationships increase geometrically with span.\n- Flat vs. tall organizational structures reflect wide vs. narrow span choices \u2014 both have contingency-dependent trade-offs.", "id": 25}, {"question": "Which one of the following is the referent source of power?", "options": [{"id": "1", "text": "Perception or belief that the manager has some special knowledge"}, {"id": "2", "text": "Manager's desire to identify with or imitate the subordinate"}, {"id": "3", "text": "Ability of the manager to reward the subordinate for obeying orders"}, {"id": "4", "text": "Ability of the manager to punish the subordinate for not obeying orders"}], "correctAnswer": "2", "explanation": "Referent power arises when subordinates identify with, admire, or want to emulate the leader \u2014 it is based on personal attraction and charisma. Option 1 = expert power; 3 = reward power; 4 = coercive power.\n**Key Concepts:**\n- French & Raven's five power bases: legitimate, reward, coercive, expert, referent.\n- Referent power is based on identification \u2014 subordinates comply because they respect and want to be like the leader.\n- It is the most durable form of power and the foundation of charismatic leadership.\n**Related Concepts:**\n- Charismatic leadership (Weber, House) is built primarily on referent power.\n- Expert power (option 1) and referent power together are considered personal power sources vs. position-based (reward, coercive, legitimate).", "id": 26}, {"question": "Which one of the following is NOT an advantage of the line organization?", "options": [{"id": "1", "text": "It ensures excellent discipline"}, {"id": "2", "text": "It fixes responsibility for the performance of tasks"}, {"id": "3", "text": "It is suitable for big organizations"}, {"id": "4", "text": "It is not expensive"}], "correctAnswer": "3", "explanation": "Line organization is NOT suitable for big/complex organizations \u2014 it is best for small, simple firms. It lacks specialization and becomes overloaded at the top as size increases. Options 1, 2, and 4 are genuine advantages.\n**Key Concepts:**\n- Line organization advantages: simple, clear authority, strict discipline, fixed responsibility, economical, quick decisions.\n- Limitation: scalar chain becomes too long in large organizations; lack of specialization creates bottlenecks.\n- \"Unity of command\" is fully maintained in line organization \u2014 but specialist expertise is absent.\n**Related Concepts:**\n- Line and staff organization was developed to address the specialization weakness of pure line organization.\n- Taylor criticized line organization precisely for concentrating too much in one manager without functional expertise.", "id": 27}, {"question": "A scale that measures a fair sample of the tasks and skills actually needed for the job in question is known as:", "options": [{"id": "1", "text": "Test validity"}, {"id": "2", "text": "Criterion validity"}, {"id": "3", "text": "Content validity"}, {"id": "4", "text": "Construct validity"}], "correctAnswer": "3", "explanation": "Content validity refers to the degree to which a test adequately samples the full domain of knowledge, skills, and tasks relevant to the job \u2014 it asks \"does this test cover what the job actually requires?\"\n**Key Concepts:**\n- Content validity is established through systematic job analysis \u2014 ensuring test items represent the actual job content.\n- Criterion validity correlates test scores with an external performance criterion (concurrent or predictive).\n- Construct validity measures whether a test truly measures the theoretical construct it claims to measure (e.g., intelligence).\n**Related Concepts:**\n- Face validity is the superficial appearance of validity \u2014 lowest form; content validity is more rigorous.\n- Work sample tests typically have high content validity because they directly replicate job tasks.", "id": 28}, {"question": "Training technique which teaches the importance of resolving matters is known as:", "options": [{"id": "1", "text": "Built-in-Tension"}, {"id": "2", "text": "Shadowing"}, {"id": "3", "text": "Tag Teams"}, {"id": "4", "text": "Mirroring"}], "correctAnswer": "1", "explanation": "Built-in-Tension is a training technique that deliberately creates conflict or tension situations to teach trainees the importance and skills of resolving issues before they escalate.\n**Key Concepts:**\n- Built-in-Tension creates artificial conflict situations where trainees must practice conflict resolution and problem-solving.\n- Shadowing involves following an experienced worker to observe and learn from their behavior \u2014 a passive technique.\n- Mirroring involves reflecting the other person's behavior/posture \u2014 used in communication/interpersonal skills training.\n**Related Concepts:**\n- Tag Teams training involves pairs or groups alternating roles in a simulated scenario \u2014 builds teamwork.\n- Sensitivity training (T-group) and role-playing are related experiential techniques for interpersonal skill development.", "id": 29}, {"question": "Which of the following attributes are true in systems approach to performance appraisal?\n(A) Low degree of formality\n(B) Occasional appraisal frequency\n(C) Individual-oriented reward practices\n(D) Facilitative leadership practices\n(E) Problem solving as primary goal", "options": [{"id": "1", "text": "A, D and E only"}, {"id": "2", "text": "A, B and D only"}, {"id": "3", "text": "B, C and E only"}, {"id": "4", "text": "A, C, D and E only"}], "correctAnswer": "1", "explanation": "Systems approach to appraisal features: low formality (A \u2014 flexible, non-bureaucratic), facilitative leadership (D \u2014 developmental focus), and problem-solving as the goal (E \u2014 future improvement vs. past judgment). Occasional frequency (B) and individual rewards (C) belong to traditional appraisal approaches.\n**Key Concepts:**\n- Systems approach views appraisal as a continuous, developmental, problem-solving process \u2014 not a periodic formal event.\n- Individual-oriented rewards (C) reflect traditional appraisal philosophy; systems approach emphasizes team/systemic factors.\n- Facilitative leadership (D) in systems appraisal means managers coach and support rather than judge.\n**Related Concepts:**\n- Traditional vs. systems appraisal: traditional = high formality, annual, individual-focused, past-oriented; systems = low formality, continuous, collaborative, future-oriented.\n- Deming criticized traditional performance appraisal for ignoring systemic causes of poor performance.", "id": 30}, {"question": "Which of the following are the distinct features of the Principles of Management?\n(A) Flexibility\n(B) Universal application\n(C) Principles are absolute, not relative\n(D) Based on situation\n(E) Derived out of experience", "options": [{"id": "1", "text": "A, C and E only"}, {"id": "2", "text": "A, B and D only"}, {"id": "3", "text": "B, C, D and E only"}, {"id": "4", "text": "A, B, D and E only"}], "correctAnswer": "4", "explanation": "Features of management principles include flexibility (A), universal application (B), situational basis (D), and being derived from experience (E). Option C is incorrect \u2014 principles are RELATIVE, not absolute; they depend on the situation.\n**Key Concepts:**\n- Management principles are NOT absolute \u2014 they are relative and context-dependent (C is a trap option).\n- They are derived from practice and experience (E) \u2014 unlike natural science laws which are discovered through experiment.\n- Universal application (B) means applicable across all types of organizations, not that they apply uniformly in all situations.\n**Related Concepts:**\n- Compare with 2021 Q1 \u2014 this is a deliberate NTA repeat pattern with a reversed trap (C changed from correct to incorrect).\n- Fayol emphasized that his principles are flexible guidelines, not rigid laws.", "id": 31}, {"question": "According to Henri Fayol, which of the following are the Principles of Management?\n(A) Discipline\n(B) Decentralization\n(C) Unity of Command\n(D) Equity\n(E) Instability of Tenure", "options": [{"id": "1", "text": "A, C, D only"}, {"id": "2", "text": "A, B, C, E only"}, {"id": "3", "text": "A, B, D only"}, {"id": "4", "text": "B, C, E only"}], "correctAnswer": "1", "explanation": "Fayol's 14 principles include Discipline (A), Unity of Command (C), and Equity (D). Fayol's actual principle is \"Stability of Tenure\" \u2014 NOT \"Instability\" (E is a trap). Decentralization is Fayol's principle but the exact term is \"Centralisation and Decentralisation\" \u2014 however given NTA answer key, A, C, D is the accepted answer.\n**Key Concepts:**\n- Fayol's 14 Principles: Division of work, Authority, Discipline, Unity of command, Unity of direction, Subordination, Remuneration, Centralisation, Scalar chain, Order, Equity, Stability of tenure, Initiative, Esprit de corps.\n- \"Instability of Tenure\" (E) is a deliberate distortion \u2014 Fayol advocated STABILITY of tenure for efficiency.\n- Discipline (A), Unity of Command (C), and Equity (D) are unambiguously among Fayol's 14 principles.\n**Related Concepts:**\n- Taylor's principles of scientific management differ: science not rule of thumb, harmony, cooperation, maximum output, development of workers.\n- Urwick extended Fayol's principles; Koontz & O'Donnell further systematized administrative management theory.", "id": 32}, {"question": "Match List I with List II:\n| List I (Characteristic) | List II (Leadership Mode) |\n|---|---|\n| A. Source of power | I. Power extension |\n| B. Concept of power | II. Empowerment |\n| C. Dominant need | III. Building culture |\n| D. Managing style | IV. Multiplying |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "A-II, B-IV, C-I, D-III"}, {"id": "2", "text": "A-IV, B-II, C-I, D-III"}, {"id": "3", "text": "A-II, B-IV, C-III, D-I"}, {"id": "4", "text": "A-II, B-III, C-I, D-IV"}], "correctAnswer": "1", "explanation": "In Level 5/transformational leadership framework \u2014 Source of power = Empowerment (II, power comes from empowering others); Concept of power = Multiplying (IV, power grows by being shared); Dominant need = Power extension (I, extending influence through others); Managing style = Building culture (III).\n**Key Concepts:**\n- Empowerment as source of power reflects post-heroic leadership \u2014 leaders gain power by giving it away.\n- Multiplying concept of power contrasts with zero-sum power view \u2014 sharing power creates more total power.\n- Building culture as managing style reflects that great leaders institutionalize values, not just manage tasks.\n**Related Concepts:**\n- Servant leadership (Greenleaf) similarly views power as derived from empowering and serving others.\n- Burns' transformational leadership and Bass's elaboration both emphasize power multiplication through follower development.", "id": 33}, {"question": "Arrange the following examples of human needs in the hierarchy of their increasing importance:\n(A) Insurance for accidents\n(B) Recognition and respect from others\n(C) Food and shelter provisions\n(D) Accomplishing distinction in chosen area by maximising potential\n(E) Developing meaningful relations with others", "options": [{"id": "1", "text": "A, C, E, B, D"}, {"id": "2", "text": "C, A, B, E, D"}, {"id": "3", "text": "A, C, E, D, B"}, {"id": "4", "text": "C, A, E, B, D"}], "correctAnswer": "4", "explanation": "Maslow's hierarchy ascending: Food/shelter (C) = physiological \u2192 Insurance/accidents (A) = safety \u2192 Meaningful relations (E) = social/belonging \u2192 Recognition/respect (B) = esteem \u2192 Maximizing potential (D) = self-actualization.\n**Key Concepts:**\n- Physiological (C) \u2192 Safety (A) \u2192 Social (E) \u2192 Esteem (B) \u2192 Self-actualization (D) is the classic Maslow sequence.\n- \"Accomplishing distinction by maximizing potential\" (D) precisely describes self-actualization \u2014 the peak need.\n- Insurance (A) clearly maps to safety/security needs \u2014 protection from risk and physical harm.\n**Related Concepts:**\n- Alderfer's ERG theory (Existence, Relatedness, Growth) compresses Maslow's five levels into three.\n- Herzberg's hygiene factors broadly correspond to Maslow's lower-order needs; motivators to higher-order needs.", "id": 34}, {"question": "Which one of the following theories of attitude change states that changes in opinions can result in an attitude change?", "options": [{"id": "1", "text": "Balance Theory"}, {"id": "2", "text": "Cognitive Consistency Theory"}, {"id": "3", "text": "Reinforcement Theory"}, {"id": "4", "text": "Cognitive Dissonance Theory"}], "correctAnswer": "2", "explanation": "Cognitive Consistency Theory holds that attitudes, beliefs, and opinions must be consistent \u2014 when opinions change (through persuasion or new information), the attitude shifts to restore cognitive consistency.\n**Key Concepts:**\n- Cognitive Consistency Theory (Heider, Newcomb) posits that people seek harmony among their cognitions.\n- Opinion change precedes attitude change \u2014 when a new opinion is adopted, attitude adjusts to maintain consistency.\n- Cognitive Dissonance (Festinger) involves discomfort from inconsistency \u2014 but focuses on behavior-attitude mismatch, not opinion-attitude.\n**Related Concepts:**\n- Balance Theory (Heider's P-O-X model) describes triadic relationships and attitude change within social networks.\n- Reinforcement Theory of attitude change (Staats) holds that attitudes change when associated stimuli are rewarded or punished.", "id": 35}, {"question": "Which one of the following motives characterizes the dominant organizational climate of clubs?", "options": [{"id": "1", "text": "Extension"}, {"id": "2", "text": "Affiliation"}, {"id": "3", "text": "Dependency"}, {"id": "4", "text": "Achievement"}], "correctAnswer": "2", "explanation": "Clubs are characterized by affiliation motive \u2014 the dominant concern is belonging, social bonding, and maintaining relationships. Membership and social interaction are the primary drivers.\n**Key Concepts:**\n- Pareek's organizational climate typology: clubs = affiliation; task forces/competitive firms = achievement; bureaucracies = dependency; social welfare orgs = extension.\n- Affiliation motive (nAff, McClelland) drives behavior in club environments where relationships matter more than tasks.\n- Extension motive (concern for others, community) characterizes NGOs and social welfare organizations.\n**Related Concepts:**\n- McClelland's three needs theory: nAch, nAff, nPow \u2014 different organizations attract and cultivate different dominant motives.\n- Dependency motive characterizes highly bureaucratic/hierarchical organizations where members wait for direction.", "id": 36}, {"question": "Which one of the following is the description of Ego Regression Mechanism?", "options": [{"id": "1", "text": "Returning to a previous stage of psyche development"}, {"id": "2", "text": "Avoiding unacceptable emotions by focusing on the intellectual aspects"}, {"id": "3", "text": "Taking out impulses on a less threatening target"}, {"id": "4", "text": "Pulling into the unconscious situation"}], "correctAnswer": "1", "explanation": "Regression is reverting to an earlier, more childlike stage of psychological development when faced with stress or anxiety. Option 2 = intellectualization; Option 3 = displacement; Option 4 = repression.\n**Key Concepts:**\n- Regression (Freud): under stress, adults revert to earlier developmental behaviors (e.g., throwing tantrums, excessive dependency).\n- Intellectualization (option 2): detaching emotions by over-analyzing \u2014 avoiding feelings through abstract thinking.\n- Displacement (option 3): redirecting impulses toward a safer substitute target (e.g., kicking a chair after a bad meeting).\n**Related Concepts:**\n- Repression (option 4) is the primary defense mechanism \u2014 painful memories/impulses are pushed into the unconscious.\n- Reaction formation is another defense where unacceptable impulses are expressed as their opposite.", "id": 37}, {"question": "Which one of the following is NOT an advantage of organisation structure by product in a manufacturing company?", "options": [{"id": "1", "text": "Places attention and effort on product line"}, {"id": "2", "text": "Requires less persons with general managerial abilities"}, {"id": "3", "text": "Improves coordination of functional activities"}, {"id": "4", "text": "Permits growth and diversity of products"}], "correctAnswer": "2", "explanation": "Product-based structure actually REQUIRES MORE people with general managerial ability \u2014 each product division needs a general manager with broad skills. Options 1, 3, and 4 are genuine advantages.\n**Key Concepts:**\n- Product divisional structure creates mini-businesses, each requiring a general manager \u2014 this INCREASES demand for generalists.\n- Functional coordination improvement (3) is an advantage because all functions for a product are under one roof.\n- Product focus (1) and growth/diversity (4) are classic advantages cited for product-based departmentation.\n**Related Concepts:**\n- Functional structure, by contrast, develops functional specialists \u2014 requires fewer generalists.\n- Conglomerate diversification relies on product/divisional structure to manage unrelated business units.", "id": 38}, {"question": "Which one of the following is NOT an assumption under McGregor's Theory Y?", "options": [{"id": "1", "text": "The degree of commitment to objectives is in proportion to the size of the rewards associated with their achievement."}, {"id": "2", "text": "Under the conditions of modern industrial life, the intellectual potentialities of the average human being are only partially utilized."}, {"id": "3", "text": "External control and the threat of punishment are the only means for producing effort toward organizational objectives."}, {"id": "4", "text": "Average human beings learn, under proper conditions, not only to accept responsibility but also to seek it."}], "correctAnswer": "3", "explanation": "Option 3 is an assumption of Theory X, not Theory Y. Theory Y holds the opposite \u2014 that self-direction and self-control are possible, and external control is not the only means of achieving objectives.\n**Key Concepts:**\n- Theory X assumptions: people dislike work, avoid responsibility, prefer direction, must be coerced/controlled.\n- Theory Y assumptions: work is natural, people seek responsibility, are creative, capable of self-direction.\n- Option 3 (\"external control and punishment are the only means\") is the defining Theory X statement.\n**Related Concepts:**\n- McGregor's Theory X and Y are not personality types but managerial assumptions that create self-fulfilling prophecies.\n- Ouchi's Theory Z (Japanese management) extends Theory Y \u2014 adds trust, collective decision-making, and long-term employment.", "id": 39}, {"question": "The knowledge and courtesy of employees and their ability to convey trust and confidence indicate which of the following?", "options": [{"id": "1", "text": "Responsiveness"}, {"id": "2", "text": "Assurance"}, {"id": "3", "text": "Empathy"}, {"id": "4", "text": "Reliability"}], "correctAnswer": "2", "explanation": "Assurance in the SERVQUAL model refers to the knowledge and courtesy of employees and their ability to inspire trust and confidence in customers.\n**Key Concepts:**\n- SERVQUAL (Parasuraman, Zeithaml, Berry) measures service quality across 5 dimensions: Tangibles, Reliability, Responsiveness, Assurance, Empathy (RATER).\n- Assurance specifically covers competence, courtesy, credibility, and security \u2014 all trust-building attributes.\n- Responsiveness (option 1) = willingness to help customers promptly; Empathy (option 3) = caring individualized attention.\n**Related Concepts:**\n- Reliability in SERVQUAL = performing the promised service dependably and accurately (not the same as general reliability).\n- GAP model of service quality identifies five gaps between customer expectations and perceptions.", "id": 40}, {"question": "Which of the following are distinctive characteristics of the Performing stage of the Group Building Process?\n(A) The Group gains its identity\n(B) Leadership is shared\n(C) Disengagement from relationships\n(D) Group morale is high\n(E) Group loyalty is intense", "options": [{"id": "1", "text": "A and B only"}, {"id": "2", "text": "B and C only"}, {"id": "3", "text": "A, D, and E only"}, {"id": "4", "text": "C, D, and E only"}], "correctAnswer": "3", "explanation": "The Performing stage is characterized by: group identity established (A), high morale (D), and intense group loyalty (E). Shared leadership (B) is a Norming feature; disengagement (C) characterizes Adjourning stage.\n**Key Concepts:**\n- Tuckman's Performing stage: fully functional, high productivity, strong group cohesion, identity, morale, and loyalty.\n- Adjourning (5th stage): disengagement from tasks and relationships as the group prepares to dissolve.\n- Norming stage sees shared leadership emerge as roles are clarified and group norms are established.\n**Related Concepts:**\n- Group cohesiveness is highest in Performing stage \u2014 it is both a cause and consequence of high morale and loyalty.\n- Groupthink risk is highest in highly cohesive, loyal groups \u2014 a potential downside of the Performing stage.", "id": 41}, {"question": "The following tools are used for forecasting the supply of inside candidates for human resource planning:\n(A) Scatter Plot\n(B) Personnel replacement charts\n(C) Managerial judgement\n(D) Markov Analysis\n(E) Trend Analysis", "options": [{"id": "1", "text": "A and C only"}, {"id": "2", "text": "C, D, and E only"}, {"id": "3", "text": "B, C, and E only"}, {"id": "4", "text": "B and D only"}], "correctAnswer": "4", "explanation": "Internal supply forecasting tools are Personnel replacement charts (B) \u2014 showing backup candidates for each position, and Markov Analysis (D) \u2014 tracking movement probability of employees across positions. Scatter plot, managerial judgment, and trend analysis are demand forecasting tools.\n**Key Concepts:**\n- Personnel/position replacement charts visually map current position holders and their ready successors.\n- Markov Analysis uses historical transition matrices to forecast where current employees will be in future periods.\n- Scatter plot and trend analysis forecast labor demand based on business activity levels \u2014 not internal supply.\n**Related Concepts:**\n- Skills inventories and succession planning databases are additional internal supply forecasting tools.\n- HR planning gap = forecasted demand minus forecasted supply \u2014 determines recruitment or downsizing needs.", "id": 42}, {"question": "Match List I with List II (Blake & Mouton Leadership Styles):\n| List I (Leadership Style) | List II (Description) |\n|---|---|\n| A. Impoverished management | I. Work accomplished is from committed people with interdependence through common stake and trust/respect |\n| B. Team managers | II. Exertion of minimum effort to get work done and sustain morale |\n| C. Country club management | III. Efficiency results from arranging work so human elements have little effect |\n| D. Autocratic task managers | IV. Thoughtful attention to people's needs leads to comfortable atmosphere |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "A-I, B-II, C-IV, D-III"}, {"id": "2", "text": "A-II, B-I, C-III, D-IV"}, {"id": "3", "text": "A-II, B-I, C-IV, D-III"}, {"id": "4", "text": "A-IV, B-I, C-III, D-II"}], "correctAnswer": "3", "explanation": "Impoverished (1,1) = minimum effort (II); Team management (9,9) = committed interdependent people with trust (I); Country Club (1,9) = focus on people's comfort (IV); Autocratic/Task management (9,1) = efficiency through controlling human elements (III).\n**Key Concepts:**\n- Blake & Mouton Grid (1964) \u2014 four extreme positions: (1,1), (9,1), (1,9), (9,9) plus middle-of-road (5,5).\n- Impoverished management (A) = lowest effort in both task and people = minimum organizational survival mode.\n- Team management (B) = highest on both dimensions = synergistic, trust-based, committed high performance.\n**Related Concepts:**\n- This is a repeated NTA match with Q4 (June 2022) using different description language \u2014 know all four styles thoroughly.\n- Paternalistic style was added later: high task + high people but reward-compliance based, not trust-based.", "id": 43}, {"question": "Arrange the following steps of employee training in the proper sequence:\n(A) Familiarize the employee with equipment, materials, tools, and trade terms\n(B) Create interest and find out what the employee already knows about the job\n(C) Explain why the employee is being trained\n(D) Place the trainee/employee as close to the normal working position as possible\n(E) Explain the whole job and relate it to some other job which the employee already knows", "options": [{"id": "1", "text": "C, E, B, A, D"}, {"id": "2", "text": "C, B, E, D, A"}, {"id": "3", "text": "B, E, C, D, A"}, {"id": "4", "text": "E, A, C, D, B"}], "correctAnswer": "2", "explanation": "Correct training sequence: Explain why training is happening (C) \u2192 Create interest/assess prior knowledge (B) \u2192 Explain whole job with familiar connections (E) \u2192 Place in work position (D) \u2192 Familiarize with tools/equipment (A).\n**Key Concepts:**\n- Motivation (C) precedes assessment (B) \u2014 the trainee must understand the purpose before engagement is possible.\n- Prior knowledge assessment (B) enables the trainer to connect new learning to existing knowledge (E).\n- Physical positioning (D) and hands-on familiarization (A) are the final practical steps after conceptual understanding.\n**Related Concepts:**\n- Gagn\u00e9's nine events of instruction: attention \u2192 inform objectives \u2192 prior knowledge \u2192 new content \u2192 guidance \u2192 practice \u2192 feedback \u2192 assessment \u2192 retention.\n- On-the-job training (OJT) follows this sequence informally in apprenticeship and job instruction training (JIT).", "id": 44}, {"question": "Arrange the following purchases made by a customer as per Maslow's hierarchy of needs theory starting with the lower-order needs:\n(A) Purchase of House\n(B) Purchase of an expensive car\n(C) Taking a club membership\n(D) Enrolling in a learn-by-yourself course\n(E) Purchase of bathing soap", "options": [{"id": "1", "text": "E, A, B, C, D"}, {"id": "2", "text": "A, E, C, B, D"}, {"id": "3", "text": "E, A, C, B, D"}, {"id": "4", "text": "A, E, B, C, D"}], "correctAnswer": "3", "explanation": "Maslow hierarchy mapped to purchases: Bathing soap (E) = physiological \u2192 House (A) = safety/shelter \u2192 Club membership (C) = social/belonging \u2192 Expensive car (B) = esteem/status \u2192 Self-learning course (D) = self-actualization.\n**Key Concepts:**\n- Physiological needs \u2192 daily essentials (soap, food); Safety needs \u2192 shelter and security (house).\n- Esteem needs \u2192 status symbols and social recognition (expensive car as conspicuous consumption).\n- Self-actualization \u2192 personal growth and development (self-directed learning course).\n**Related Concepts:**\n- Veblen goods (expensive car) demonstrate esteem/status consumption \u2014 price signals social standing.\n- Marketing applications of Maslow: positioning products at the appropriate need level for the target segment.", "id": 45}]};

        marked.setOptions({ breaks: true, gfm: true });

        const mathExtension = {
            name: 'math',
            level: 'inline',
            start(src) { return src.indexOf('$'); },
            tokenizer(src, tokens) {
                const blockRule = /^\$\$(.*?)\$\$/s;
                const inlineRule = /^\$([^$\n]+)\$/;
                let match;
                if ((match = blockRule.exec(src))) {
                    return { type: 'math', raw: match[0], text: match[1], displayMode: true };
                } else if ((match = inlineRule.exec(src))) {
                    return { type: 'math', raw: match[0], text: match[1], displayMode: false };
                }
            },
            renderer(token) {
                const safeText = token.text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                return token.displayMode ? `$$${safeText}$$` : `$${safeText}$`;
            }
        };
        marked.use({ extensions: [mathExtension] });

        const Icons = {
            Menu: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>,
            User: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            Alert: () => <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ef4444" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>,
            Printer: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>,
            Info: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>,
            Pause: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>,
            Play: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        };

        const DonutChart = ({ percentage, color, label }) => (
            <div className="flex flex-col items-center print-break-avoid">
                <svg viewBox="0 0 36 36" className="circular-chart w-28 h-28 mb-3">
                    <path className="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    <path className="circle" stroke={color} strokeDasharray={`${percentage}, 100`} d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    <text x="18" y="20.5" textAnchor="middle" className="text-3xl font-black fill-slate-800" style={{fontSize: "9px"}}>{percentage}%</text>
                </svg>
                <span className="font-bold text-slate-500 uppercase tracking-widest text-xs">{label}</span>
            </div>
        );

        const App = () => {
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [answers, setAnswers] = useState({}); 
            const [status, setStatus] = useState({});   
            const [timeLeft, setTimeLeft] = useState(TEST_DATA.durationMinutes * 60);
            const [isSubmitted, setIsSubmitted] = useState(false);
            const [isPaletteOpen, setIsPaletteOpen] = useState(false);
            const [isPaused, setIsPaused] = useState(false); 
            const [warnings, setWarnings] = useState(0);
            const [showWarning, setShowWarning] = useState(false);

            useEffect(() => {
                if (window.MathJax && window.MathJax.typesetPromise) {
                    window.MathJax.typesetPromise().catch((err) => console.log('MathJax error: ', err));
                }
            });

            useEffect(() => {
                if (!TEST_DATA.strictMode || isSubmitted) return;
                const handleVisibility = () => {
                    if (document.hidden) {
                        setWarnings(w => w + 1);
                        setShowWarning(true);
                    }
                };
                document.addEventListener("visibilitychange", handleVisibility);
                return () => document.removeEventListener("visibilitychange", handleVisibility);
            }, [isSubmitted]);

            useEffect(() => {
                if (isSubmitted || isPaused) return; 
                const timer = setInterval(() => {
                    setTimeLeft(prev => {
                        if (prev <= 0) { handleSubmit(true); return 0; }
                        return prev - 1;
                    });
                }, 1000);
                return () => clearInterval(timer);
            }, [isSubmitted, isPaused]); 

            const formatTime = (seconds) => {
                const h = Math.floor(seconds / 3600);
                const m = Math.floor((seconds % 3600) / 60);
                const s = seconds % 60;
                return `${h > 0 ? h + ':' : ''}${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            };

            const advanceQuestion = () => {
                if (currentQIndex < TEST_DATA.questions.length - 1) {
                    const nextQ = TEST_DATA.questions[currentQIndex + 1];
                    if (status[nextQ.id] === 'not_visited') setStatus(prev => ({ ...prev, [nextQ.id]: 'not_answered' }));
                    setCurrentQIndex(prev => prev + 1);
                }
            };

            const handleOptionSelect = (optId) => {
                if(isPaused) return;
                setAnswers(prev => ({ ...prev, [TEST_DATA.questions[currentQIndex].id]: optId }));
            };

            const handleSaveAndNext = () => {
                if(isPaused) return;
                const cid = TEST_DATA.questions[currentQIndex].id;
                setStatus(prev => ({ ...prev, [cid]: answers[cid] ? 'answered' : 'not_answered' }));
                advanceQuestion();
            };

            const handleMarkForReview = () => {
                if(isPaused) return;
                const cid = TEST_DATA.questions[currentQIndex].id;
                setStatus(prev => ({ ...prev, [cid]: answers[cid] ? 'marked_answered' : 'marked' }));
                advanceQuestion();
            };

            const handleClearResponse = () => {
                if(isPaused) return;
                const cid = TEST_DATA.questions[currentQIndex].id;
                setAnswers(prev => { const newAns = { ...prev }; delete newAns[cid]; return newAns; });
                setStatus(prev => ({ ...prev, [cid]: 'not_answered' }));
            };

            const handlePaletteClick = (index) => {
                if(isPaused) return;
                const cid = TEST_DATA.questions[currentQIndex].id;
                if (status[cid] === 'not_visited' || (status[cid] === 'not_answered' && !answers[cid])) {
                    setStatus(prev => ({ ...prev, [cid]: 'not_answered' }));
                }
                const tid = TEST_DATA.questions[index].id;
                if (status[tid] === 'not_visited') setStatus(prev => ({ ...prev, [tid]: 'not_answered' }));
                setCurrentQIndex(index);
                setIsPaletteOpen(false); 
            };

            const handleSubmit = (auto = false) => {
                if (auto || confirm("Are you sure you want to submit the test? No changes can be made after submission.")) {
                    setIsSubmitted(true);
                    setIsPaused(false);
                }
            };

            const counts = useMemo(() => {
                const c = { answered: 0, not_answered: 0, marked: 0, marked_answered: 0, not_visited: 0 };
                Object.values(status).forEach(s => { if (c[s] !== undefined) c[s]++; });
                return c;
            }, [status]);

            if (isSubmitted) {
                let score = 0, correct = 0, wrong = 0;
                TEST_DATA.questions.forEach(q => {
                    if (answers[q.id] === q.correctAnswer) { score += TEST_DATA.marksForCorrect; correct++; } 
                    else if (answers[q.id]) { score -= TEST_DATA.marksForWrong; wrong++; }
                });

                const attempted = correct + wrong;
                const accuracy = attempted > 0 ? Math.round((correct / attempted) * 100) : 0;
                const percentage = Math.max(0, Math.round((score / TEST_DATA.totalMarks) * 100));
                const isPass = percentage >= TEST_DATA.passPercentage;

                return (
                    <div className="h-full overflow-y-auto p-4 md:p-8 print:p-0 bg-slate-50 print:bg-white print:h-auto print:overflow-visible">
                        <div className="max-w-5xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100 print-border-none print:shadow-none">
                            <div className="bg-blue-600 text-white p-10 relative print:text-slate-900 print:bg-white print:border-b-2 print:border-slate-300 print:p-0 print:mb-8">
                                <div className="absolute top-0 right-0 w-64 h-64 bg-white opacity-5 rounded-full -mt-20 -mr-20 blur-2xl print-hidden"></div>
                                <div className="flex flex-col md:flex-row justify-between items-center gap-6 relative z-10 print:flex-row print:items-start">
                                    <div className="text-center md:text-left">
                                        <h1 className="text-4xl font-extrabold mb-2 tracking-tight">Performance Report</h1>
                                        <p className="opacity-90 font-semibold text-lg">{TEST_DATA.title}</p>
                                        <p className="opacity-70 text-sm mt-1">{TEST_DATA.organization}</p>
                                    </div>
                                    <div className="flex gap-6 items-center">
                                        <div className={`px-6 py-4 rounded-2xl border-2 backdrop-blur-md print:border-2 print:bg-transparent flex items-center justify-between gap-6 min-w-[200px] ${isPass ? 'bg-green-500/20 border-green-400 print:border-green-600 print:text-green-700' : 'bg-red-500/20 border-red-400 print:border-red-600 print:text-red-700'}`}>
                                            <div className="text-left">
                                                <div className="text-[10px] uppercase tracking-widest font-bold opacity-80 mb-0.5">Final Status</div>
                                                <div className="text-2xl font-black leading-none">{isPass ? 'PASSED' : 'FAILED'}</div>
                                            </div>
                                            <div className="text-4xl leading-none">{isPass ? '🎉' : '❌'}</div>
                                        </div>
                                    </div>
                                </div>
                                <button onClick={() => window.print()} className="print-hidden absolute right-6 top-6 bg-white/20 hover:bg-white/30 text-white px-5 py-2.5 rounded-full font-bold transition shadow-lg backdrop-blur-sm flex items-center gap-2">
                                    <Icons.Printer/> Save PDF
                                </button>
                            </div>

                            <div className="p-10 grid grid-cols-1 md:grid-cols-3 gap-8 border-b border-slate-100 bg-slate-50/50 print:bg-white print:border-b-0 print-break-avoid">
                                <DonutChart percentage={percentage} color="#2563eb" label="Score Percentage" />
                                <DonutChart percentage={accuracy} color="#10b981" label="Accuracy" />
                                <div className="flex flex-col justify-center space-y-4">
                                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center print:border-slate-300">
                                        <span className="text-slate-500 font-bold">Total Marks</span>
                                        <span className="text-3xl font-black text-blue-600">{score} <span className="text-lg text-slate-400 font-bold">/ {TEST_DATA.totalMarks}</span></span>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-green-50 p-4 rounded-2xl border border-green-100 text-center print:border-slate-300 print:bg-white">
                                            <div className="text-green-600 text-3xl font-black">{correct}</div>
                                            <div className="text-xs font-bold text-green-700 uppercase mt-1">Correct</div>
                                        </div>
                                        <div className="bg-red-50 p-4 rounded-2xl border border-red-100 text-center print:border-slate-300 print:bg-white">
                                            <div className="text-red-600 text-3xl font-black">{wrong}</div>
                                            <div className="text-xs font-bold text-red-700 uppercase mt-1">Wrong</div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="p-6 md:p-10">
                                <h2 className="text-2xl font-extrabold text-slate-800 mb-8 flex items-center gap-3 border-b border-slate-200 pb-4">
                                    Detailed Solutions
                                </h2>
                                <div className="space-y-8">
                                    {TEST_DATA.questions.map((q, i) => {
                                        const userAns = answers[q.id];
                                        const isCorrect = userAns === q.correctAnswer;
                                        const isSkipped = !userAns;
                                        let borderColor = isCorrect ? 'border-green-500' : (isSkipped ? 'border-slate-300' : 'border-red-500');
                                        let bgClass = isCorrect ? 'bg-green-50/50' : (isSkipped ? 'bg-white' : 'bg-red-50/50');

                                        return (
                                            <div key={q.id} className={`border-l-8 ${borderColor} ${bgClass} p-6 rounded-2xl shadow-sm border border-slate-100 print-break-avoid print:border print:border-l-8 print:shadow-none`}>
                                                <div className="flex gap-4 mb-6">
                                                    <span className="font-black text-slate-400 text-xl">Q{i+1}.</span>
                                                    <div className="flex-1 text-slate-800 markdown-body text-[16px]" dangerouslySetInnerHTML={{ __html: marked.parse(q.question) }}></div>
                                                </div>
                                                <div className="ml-10 space-y-3 mb-6">
                                                    {q.options.map(opt => {
                                                        const isUserOpt = opt.id === userAns;
                                                        const isCorrectOpt = opt.id === q.correctAnswer;
                                                        
                                                        let optClass = "text-slate-600 bg-white border-slate-200";
                                                        let icon = "○";
                                                        if (isCorrectOpt) { optClass = "text-green-800 bg-green-100 border-green-300 font-bold"; icon = "✓"; }
                                                        else if (isUserOpt) { optClass = "text-red-700 bg-red-100 border-red-300 line-through"; icon = "✗"; }

                                                        return (
                                                            <div key={opt.id} className={`flex items-start gap-3 p-3 rounded-xl border ${optClass} print:bg-transparent print:border-slate-300`}>
                                                                <span className="mt-0.5 font-bold">{icon}</span>
                                                                <div className="markdown-body" style={{marginBottom: 0}} dangerouslySetInnerHTML={{ __html: marked.parseInline(opt.text) }}></div>
                                                            </div>
                                                        )
                                                    })}
                                                </div>
                                                {q.explanation && (
                                                    <div className="ml-10 p-5 bg-blue-50/50 rounded-xl border border-blue-100 print:bg-slate-50 print:border-slate-200">
