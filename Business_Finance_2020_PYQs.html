    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const TEST_DATA = {"title": "Business Finance 2020 PYQs", "organization": "ExamTym", "durationMinutes": 30, "totalMarks": 36.0, "marksForCorrect": 2.0, "marksForWrong": 0.0, "passPercentage": 40, "shuffle": false, "strictMode": false, "questions": [{"question": "In continuous compounding, the time it takes to double the sum grossly follow 'Rule of 69'. If it is changed to discrete compounding, the relevant rule of thumb is", "options": [{"id": "1", "text": "Rule of 69.3"}, {"id": "2", "text": "Rule of 72"}, {"id": "3", "text": "Rule of 84"}, {"id": "4", "text": "Rule of 64"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* The Rule of 72 is a mathematical heuristic used to estimate the number of years required to double an investment at a fixed annual discrete compounding rate.\n* It is calculated by dividing the integer 72 by the annual percentage interest rate.\n* While the Rule of 69 (based on the natural logarithm of 2) is highly accurate for continuous compounding, 72 is chosen for discrete compounding due to its high number of divisors.\n* The slight inaccuracy of 72 compensates for the fact that discrete compounding generates interest slower than continuous compounding over the same period.\n**Related Concepts:**\n* **Time Value of Money (TVM):** The financial principle that a sum of money is worth more now than the same sum in the future due to its earning capacity.\n* **Compound Interest:** The process where the interest earned on an initial principal is reinvested, generating \"interest on interest.\"\n* **Rule of 114:** A similar mathematical shortcut used to calculate the time required to triple an investment.", "id": 1}, {"question": "Arrange the following financing choices in order of preference suggested by the pecking order theory\n(A) Reinvestment of earnings\n(B) New issue of equity\n(C) Issue of debt", "options": [{"id": "1", "text": "(A), (B), (C)"}, {"id": "2", "text": "(A), (C), (B)"}, {"id": "3", "text": "(B), (C), (A)"}, {"id": "4", "text": "(B), (A), (C)"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* The Pecking Order Theory postulates that managers favor internal financing over external financing to avoid issuing undervalued equity and to bypass information asymmetry.\n* Reinvestment of earnings (retained earnings) is always the first preference because it involves no floatation costs and requires no public disclosure.\n* If internal funds are exhausted, firms will prefer to issue debt (C) because debt is less sensitive to information asymmetry than equity and has tax advantages.\n* Issuing new equity (B) is treated strictly as a last resort because it signals to the market that the stock might be overvalued, often leading to a drop in share price.\n**Related Concepts:**\n* **Information Asymmetry:** A situation where company management holds superior information regarding the firm's true value and risks compared to outside investors.\n* **Floatation Costs:** The costs incurred by a publicly-traded company when it issues new securities, which are avoided by using retained earnings.\n* **Capital Structure:** The specific mix of debt and equity used to finance a company's operations and growth.", "id": 2}, {"question": "In which of the following situations, the payback period method is advised for evaluation of investment opportunities?\n(A) Overleveraged businesses\n(B) Cash rich businesses\n(C) Uncertain market conditions\n(D) Stable market conditions", "options": [{"id": "1", "text": "(A) and (B) only"}, {"id": "2", "text": "(A) and (C) only"}, {"id": "3", "text": "(B) and (C) only"}, {"id": "4", "text": "(C) and (D) only"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* The Payback Period represents the exact amount of time required to recover the initial cash outlay of a project.\n* It is highly prioritized by overleveraged businesses (A) because they face liquidity crunches and desperately need quick cash inflows to service existing heavy debts.\n* In highly uncertain market conditions (C), distant future cash flows are incredibly risky and unpredictable, making rapid recovery of principal the safest metric.\n* The method inherently ignores the time value of money and cash flows occurring after the payback period, making it a measure of liquidity and risk rather than pure profitability.\n**Related Concepts:**\n* **Capital Budgeting:** The overarching process a business uses to evaluate potential major projects or investments.\n* **Discounted Payback Period:** A modified version of the payback period that accounts for the time value of money by discounting future cash inflows.\n* **Liquidity Risk:** The danger that a company will not be able to meet its short-term financial obligations due to tied-up capital.", "id": 3}, {"question": "Given below are two statements: One is labelled as Assertion (A) and the other is labelled as Reason (R).\nAssertion (A): Firms opt for buying an asset if the equivalent annual cost of ownership and operation is less than the best lease rate it can get.\nReason (R): Operating leases are attractive to equipment users if the lease payment is less than the user's equivalent annual cost of buying the equipment.\nIn the light of the above statements, choose the most appropriate answer from the options given below:", "options": [{"id": "1", "text": "Both (A) and (R) are correct and (R) is the correct explanation of (A)"}, {"id": "2", "text": "Both (A) and (R) are correct but (R) is NOT the correct explanation of (A)"}, {"id": "3", "text": "(A) is correct but (R) is not correct"}, {"id": "4", "text": "(A) is not correct but (R) is correct"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* The Equivalent Annual Cost (EAC) metric translates the cost of owning, operating, and maintaining an asset over its lifespan into an annualized figure.\n* A rational firm will always compare the EAC of purchasing against the annual rate of leasing; choosing to buy if EAC is lower makes perfect financial sense (Assertion A is true).\n* Operating leases offer benefits like obsolescence protection; if the lease rate beats the purchasing EAC, the firm will lease (Reason R is true).\n* However, while both statements illustrate the same economic logic from opposite angles, (R) does not explain the root cause of (A); they are simply parallel applications of the cost-minimization rule.\n**Related Concepts:**\n* **Lease vs. Buy Decision:** A core corporate finance analysis evaluating whether purchasing an asset or leasing it yields a higher Net Present Value.\n* **Operating Lease:** A lease where the lessor retains the risks and rewards of ownership, often keeping the asset off the lessee's balance sheet.\n* **Capital Cost Allowance:** Depreciation allowances that generate tax shields, which must be factored into the EAC of buying an asset.", "id": 4}, {"question": "Which of the following is a long-term source of finance?", "options": [{"id": "1", "text": "Commercial Paper (CP)"}, {"id": "2", "text": "External Commercial Borrowings (ECB)"}, {"id": "3", "text": "Factoring"}, {"id": "4", "text": "Line of Credit (LOC)"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* External Commercial Borrowings (ECB) encompass commercial bank loans, buyers' credit, and bonds raised by eligible resident entities from recognized non-resident entities, generally carrying maturity periods of 3 years or more.\n* Commercial Papers (CP) are unsecured, short-term promissory notes used primarily to fund immediate working capital needs, maturing within a year.\n* Factoring is a working capital management tool where a business sells its accounts receivable at a discount to a third party to generate immediate short-term cash.\n* A Line of Credit (LOC) is an arrangement establishing a maximum loan balance a bank permits a borrower to maintain, utilized exclusively for short-term operational liquidity.\n**Related Concepts:**\n* **Money Market vs. Capital Market:** Money markets deal with short-term finance (like CPs), while capital markets handle long-term finance (like Equity and ECBs).\n* **Foreign Exchange Risk:** A critical factor associated with ECBs, as borrowing in a foreign currency exposes the domestic firm to exchange rate fluctuations.\n* **Working Capital Financing:** Short-term funding strategies intended to cover the operational cycle gaps, contrasting with long-term capital investments.", "id": 5}, {"question": "Match List I with List II\n| List I Capital Structure Proposition(s) | List II Description(s) |\n| :--- | :--- |\n| (A) Target Capital Structure | (I) Expected yield on the equity capital is equal to the pure equity return plus a premium for financial risk. |\n| (B) Optimum Capital Structure | (II) It refers to the perceived costs due to increased ratio of debt in the firm. |\n| (C) Cost of financial distress | (III) It is the debt ratio the firm strives to achieve. |\n| (D) MM proposition-II | (IV) It is the debt-equity ratio that maximises the value of the firm. |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "(A)-(II), (B)-(III), (C)-(I), (D)-(IV)"}, {"id": "2", "text": "(A)-(III), (B)-(IV), (C)-(II), (D)-(I)"}, {"id": "3", "text": "(A)-(IV), (B)-(II), (C)-(III), (D)-(I)"}, {"id": "4", "text": "(A)-(I), (B)-(III), (C)-(II), (D)-(IV)"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* The **Target Capital Structure** is an internal, dynamic benchmark ratio of debt and equity that a company actively attempts to maintain over time to balance risk and return.\n* The **Optimum Capital Structure** is a theoretical ideal point where the Weighted Average Cost of Capital (WACC) is minimized, thereby maximizing the total value of the firm.\n* **Costs of Financial Distress** represent the direct (legal) and indirect (lost sales, disrupted operations) penalties a firm suffers when its heavy debt load pushes it near bankruptcy.\n* **Modigliani-Miller (MM) Proposition II** states that the cost of equity increases linearly with the debt-to-equity ratio, reflecting the higher financial risk borne by shareholders.\n**Related Concepts:**\n* **Trade-off Theory:** The theory that firms balance the tax advantages of borrowing against the costs of financial distress to find their optimum structure.\n* **Financial Leverage:** The degree to which a company utilizes fixed-income securities (debt) to finance its assets.\n* **WACC:** The average rate a firm pays to finance its assets, serving as the discount rate for capital budgeting.", "id": 6}, {"question": "Match List I with List II\n| List I | List II |\n| :--- | :--- |\n| (A) Mezzanine Capital | (I) It is the speedy source of finance less regulated by the regulatory environment of debt and capital markets. |\n| (B) Private Equity | (II) It is long term capital embraced by the high networth and high risk appetite investors. |\n| (C) Global Depository Receipts | (III) It is an equity instrument issued in overseas markets and is listed and traded on bourses on an OTC basis. |\n| (D) Venture Capital | (IV) It refers to subordinated debt or preferred equity that allows firms to borrow additional capital beyond the levels lenders are willing to finance through the bank loans. |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "A - II, B - IV, C - I, D - III"}, {"id": "2", "text": "A - I, B - III, C - IV, D - II"}, {"id": "3", "text": "A - IV, B - I, C - III, D - II"}, {"id": "4", "text": "A - III, B - II, C - I, D - IV"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* **Mezzanine Capital** bridges the gap between senior debt and equity; it is highly subordinated debt (or preferred stock) that carries warrants, offering high returns to compensate for the lack of strong collateral.\n* **Private Equity** is a broad asset class consisting of equity securities in operating companies not publicly traded on a stock exchange, making it a faster, less regulated capital injection path.\n* **GDRs (Global Depository Receipts)** are bank certificates issued in more than one country representing shares in a foreign company, facilitating international investment.\n* **Venture Capital** is a specialized subset of private equity specifically targeting early-stage, high-risk, high-potential startups, relying heavily on high-net-worth individuals and institutional risk-takers.\n**Related Concepts:**\n* **Subordinated Debt:** A loan or security that ranks below other loans and securities with regard to claims on assets or earnings.\n* **OTC (Over-The-Counter) Market:** A decentralized market where financial instruments are traded directly between two parties without a central exchange or broker.\n* **Angel Investors:** Individuals who provide initial seed capital for startups, acting as precursors to formal venture capital funding.", "id": 7}, {"question": "Net Present Value (NPV) and Internal Rate of Return (IRR) methods yield conflicting outcomes due to\n(A) Unconventional cash flows\n(B) Investment size disparity\n(C) Investment life disparity\n(D) Cash flow pattern disparity", "options": [{"id": "1", "text": "(A) and (B) only"}, {"id": "2", "text": "(A) and (C) only"}, {"id": "3", "text": "(A), (B) and (C) only"}, {"id": "4", "text": "(B), (C) and (D) only"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* Conflicts between NPV and IRR typically occur exclusively when evaluating *mutually exclusive* projects.\n* **Investment Size Disparity:** A small project might yield a high percentage IRR but generate low absolute dollar value (low NPV), whereas a massive project might have a lower IRR but create massive absolute wealth (high NPV).\n* **Life Disparity:** A short-term project frees up cash quickly (boosting IRR), but a long-term project might generate more total value over its extended horizon (boosting NPV).\n* **Cash Flow Pattern Disparity:** If one project's cash flows are front-loaded and another's are back-loaded, the crossover rate of the discount curves will cause NPV and IRR to rank them differently depending on the firm's cost of capital.\n**Related Concepts:**\n* **Reinvestment Rate Assumption:** NPV assumes intermediate cash flows are reinvested at the Cost of Capital, while IRR assumes they are reinvested at the project's own IRR (often unrealistic).\n* **Modified Internal Rate of Return (MIRR):** A metric developed specifically to resolve the flawed reinvestment rate assumption of traditional IRR.\n* **Unconventional Cash Flows:** Cash flows that change signs more than once. This creates *multiple* IRRs, rendering the metric useless, but it is a mathematical anomaly rather than a standard ranking conflict.", "id": 8}, {"question": "When foreign currency assets and liabilities match in terms of amount of exposure and timing of maturities, it is described as:", "options": [{"id": "1", "text": "Financial hedge"}, {"id": "2", "text": "Natural hedge"}, {"id": "3", "text": "Perfect hedge"}, {"id": "4", "text": "Netting"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* A **Natural Hedge** is an operational strategy where a company mitigates financial risk by aligning its revenues and expenses in the same foreign currency.\n* By matching the timing and amount of foreign currency assets (receivables) with liabilities (payables), the firm automatically neutralizes exchange rate volatility without needing external financial instruments.\n* Unlike financial hedges, this arises organically from the firm's normal business operations, such as locating production facilities in the country where the products are sold.\n* It is a highly cost-effective risk management tool because it bypasses the transaction costs and premiums associated with purchasing derivatives.\n**Related Concepts:**\n* **Financial Hedge:** Utilizing market instruments like forward contracts, futures, or options to lock in exchange rates and protect against currency fluctuations.\n* **Netting:** A technique used by multinational corporations to consolidate and offset inter-subsidiary payables and receivables, transferring only the net balance.\n* **Transaction Exposure:** The risk that the value of a firm's future cash flows will be impacted by unexpected changes in exchange rates.", "id": 9}, {"question": "The portfolio theory articulates diversification to reduce which of the following risks?", "options": [{"id": "1", "text": "Market risk"}, {"id": "2", "text": "Financial risk"}, {"id": "3", "text": "Unsystematic risk"}, {"id": "4", "text": "Business risk"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* **Modern Portfolio Theory (MPT)**, pioneered by Harry Markowitz, demonstrates that an investor can construct a portfolio of multiple assets to maximize expected return for a given level of risk.\n* **Unsystematic Risk** (also known as specific, diversifiable, or idiosyncratic risk) is the localized risk inherent to a specific company or industry (e.g., a management strike, supply chain failure).\n* MPT proves that by combining assets that are not perfectly positively correlated (correlation coefficient $< 1$), unsystematic risk can be mathematically eliminated through diversification.\n* Systematic risk (market risk), such as inflation or interest rate changes, affects the entire market and *cannot* be diversified away, regardless of how many securities are in the portfolio.\n**Related Concepts:**\n* **Beta ($\\beta$):** The standard metric used to measure a stock's systematic risk relative to the overall market volatility.\n* **Capital Asset Pricing Model (CAPM):** A pricing model that establishes the relationship between systematic risk and expected return, entirely ignoring unsystematic risk.\n* **Efficient Frontier:** A graphical curve representing the set of optimal portfolios that offer the highest expected return for a defined level of risk.", "id": 10}, {"question": "Arrange the following steps in logical sequence of operation of the Arbitrage Pricing Theory (APT).\n(A) Estimate the Factor Sensitivities\n(B) Estimate the Risk Premium for Factor(s)\n(C) Identify the Macroeconomic Factors", "options": [{"id": "1", "text": "(A), (B), (C)"}, {"id": "2", "text": "(B), (A), (C)"}, {"id": "3", "text": "(C), (B), (A)"}, {"id": "4", "text": "(C), (A), (B)"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* The Arbitrage Pricing Theory (APT) is a multi-factor asset pricing model developed by Stephen Ross, which assumes that an asset's returns can be predicted using a linear relationship with various macroeconomic variables.\n* **Step 1:** The first operational step is to **Identify the Macroeconomic Factors (C)** that systemically affect asset prices, such as inflation rates, GDP growth, or interest rate spreads.\n* **Step 2:** The next step is to **Estimate the Factor Sensitivities (A)** (often called factor betas), which measure how much a specific asset's return moves in response to a 1% change in each identified macroeconomic factor.\n* **Step 3:** Finally, analysts **Estimate the Risk Premium for Factors (B)**, determining the extra return investors demand for bearing the risk associated with each specific macroeconomic factor.\n**Related Concepts:**\n* **Capital Asset Pricing Model (CAPM):** A single-factor model (relying only on market risk) that APT seeks to improve upon by adding multiple systematic risk factors.\n* **Arbitrage:** The simultaneous purchase and sale of an asset to profit from an imbalance in the price.\n* **Systematic vs. Unsystematic Risk:** APT solely prices systematic (macro) risk, assuming that unsystematic (firm-specific) risk has already been diversified away.", "id": 11}, {"question": "A manufacturing enterprise monthly consumes 1,350 units of raw material at the cost of Rs. 20 per unit. Determine its economic order quantity given the ordering cost of Rs. 2,400 and carrying cost of inventory being 30 percent of the price paid.", "options": [{"id": "1", "text": "3,600 units"}, {"id": "2", "text": "2,400 units"}, {"id": "3", "text": "4,800 units"}, {"id": "4", "text": "2,700 units"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* The Economic Order Quantity (EOQ) formula minimizes the total costs of inventory management (holding costs vs. ordering costs).\n* The formula is: $EOQ = \\sqrt{\\frac{2 \\cdot A \\cdot O}{C}}$, where $A$ = Annual Demand, $O$ = Ordering Cost per order, and $C$ = Carrying Cost per unit per year.\n* First, convert monthly demand to Annual Demand ($A$): $1,350 \\cdot 12 = 16,200$ units.\n* Next, calculate Carrying Cost ($C$): $30\\%$ of $Rs. 20 = Rs. 6$.\n* Execution: $\\sqrt{\\frac{2 \\cdot 16,200 \\cdot 2,400}{6}} = \\sqrt{12,960,000} = 3,600$ units.\n**Related Concepts:**\n* **Holding/Carrying Costs:** Expenses tied to storing unsold goods, including warehousing, insurance, and opportunity cost of locked capital.\n* **Ordering Costs:** Fixed administrative expenses incurred every time an order is placed, regardless of order size.\n* **Just-in-Time (JIT):** An alternative inventory strategy that aligns raw-material orders directly with production schedules.", "id": 12}, {"question": "Political risk management comes in the ambit of which of the following financial decisions?", "options": [{"id": "1", "text": "Non - conventional capital budgeting"}, {"id": "2", "text": "International currency arbitrage"}, {"id": "3", "text": "Foreign exchange market"}, {"id": "4", "text": "Multinational capital budgeting"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* **Multinational Capital Budgeting** evaluates the viability of long-term investments across international borders, specifically tailored for Multinational Corporations (MNCs).\n* Unlike domestic budgeting, MNC budgeting must rigorously account for **Political Risk** (Sovereign Risk), which includes the danger of expropriation, asset freezing, or sudden changes in foreign tax laws.\n* Analysts manage this by heavily discounting the projected foreign cash flows or adding a significant risk premium to the project's Cost of Capital.\n* It also evaluates the risk of \"blockage of funds,\" where a host country prevents the MNC from repatriating its profits back to the parent company.\n**Related Concepts:**\n* **Foreign Direct Investment (FDI):** An investment made by a firm in one country into business interests located in another country, heavily subjected to political risk.\n* **Exchange Rate Risk:** Another unique variable in multinational capital budgeting where forecasted cash flows must be converted using projected future spot rates.\n* **Country Risk Analysis:** The comprehensive assessment of the political, economic, and financial risks associated with doing business in a specific foreign nation.", "id": 13}, {"question": "The following information is available for Ravi corporation\nEPS - Rs 4 \nROI - 18% \nRate of return required by shareholders - 15%\nWhat will the price per share as per Walter model if the payout ratio is 40%?", "options": [{"id": "1", "text": "Rs. 29.87"}, {"id": "2", "text": "Rs. 29.33"}, {"id": "3", "text": "Rs. 28.80"}, {"id": "4", "text": "Rs. 30.63"}], "correctAnswer": "1", "explanation": "**Key Concepts:**\n* The **Walter Model** calculates the theoretical market price of a share based on the premise that dividend policy is highly relevant to firm valuation.\n* The formula is: $P = \\frac{D + \\frac{r}{k_e}(E - D)}{k_e}$, where $D$ is Dividend per share, $E$ is Earnings per share, $r$ is Return on Investment, and $k_e$ is the cost of equity.\n* **Step 1:** Calculate Dividend ($D$). With a 40% payout ratio and $E = 4$, $D = 4 \\times 0.40 = 1.6$.\n* **Step 2:** Apply the formula: $P = \\frac{1.6 + \\frac{0.18}{0.15}(4 - 1.6)}{0.15} = \\frac{1.6 + 1.2(2.4)}{0.15} = \\frac{1.6 + 2.88}{0.15} = \\frac{4.48}{0.15} = 29.866...$ which rounds to **Rs. 29.87**.\n**Related Concepts:**\n* **Growth Firm:** According to Walter, when a firm's internal return on investment ($r$) exceeds its cost of capital ($k_e$), it is a growth firm, and its optimal payout ratio should be 0%.\n* **Gordon Growth Model:** An alternative dividend discount model that assumes dividends grow at a constant rate into perpetuity.\n* **Dividend Irrelevance Theory:** Modigliani and Miller's contrasting theory arguing that under perfect market conditions, dividend policy has zero impact.", "id": 14}, {"question": "Sequence the following in the capital budgeting process\nA. Cash flow estimation\nB. Identify discounting rate\nC. Project selection decision\nD. Determination of NPV", "options": [{"id": "1", "text": "A, B, C and D"}, {"id": "2", "text": "A, B, D and C"}, {"id": "3", "text": "D, A, B and C"}, {"id": "4", "text": "B, A, D and C"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* The Capital Budgeting process follows a rigid chronological framework to ensure resources are allocated to projects that maximize shareholder wealth.\n* **Phase 1: Cash Flow Estimation (A)**. The firm must project the initial capital outlay, the intermediate operating cash flows, and the terminal salvage value of the project.\n* **Phase 2: Identify Discounting Rate (B)**. The firm calculates its Weighted Average Cost of Capital (WACC), which acts as the hurdle rate to discount future cash flows.\n* **Phase 3 & 4: Determination of NPV (D) and Selection (C)**. The discounted cash flows are subtracted from the initial outlay to find the Net Present Value; the firm then selects projects where NPV > 0.\n**Related Concepts:**\n* **Incremental Cash Flows:** Capital budgeting relies strictly on the additional cash flows generated *by the project itself*, ignoring sunk costs.\n* **Capital Rationing:** A scenario where a firm has limited funds and must select a combination of positive NPV projects rather than accepting all of them.\n* **Post-Audit Review:** The final, often overlooked stage of capital budgeting where actual project outcomes are compared against the initial estimates to improve future forecasting.", "id": 15}, {"question": "Which one of the following is the most pervasive and sustaining objectives of financial decision making?", "options": [{"id": "1", "text": "Profit maximization"}, {"id": "2", "text": "Earnings maximization"}, {"id": "3", "text": "Value maximization"}, {"id": "4", "text": "Cost minimization"}], "correctAnswer": "3", "explanation": "**Key Concepts:**\n* **Value Maximization** (or Wealth Maximization) is universally accepted as the ultimate, overriding goal of corporate financial management.\n* It aims to maximize the net present worth of the firm, which directly translates to maximizing the current market price of the company's equity shares.\n* Unlike Profit Maximization, Value Maximization inherently accounts for the **Time Value of Money** (recognizing that cash today is worth more than cash tomorrow) and the **Risk** associated with future cash flows.\n* Profit maximization is considered a narrow, short-term objective that can be easily manipulated through accounting policies and ignores the timing and uncertainty of returns.\n**Related Concepts:**\n* **Agency Theory:** The conflict of interest that arises when corporate managers prioritize their own personal goals (perks, empire building) over the shareholders' goal of value maximization.\n* **Economic Value Added (EVA):** A modern financial performance metric that calculates true economic profit by deducting the cost of capital from operating profit, perfectly aligning with value maximization.\n* **Dividend Policy:** The decision framework regarding how much earnings to distribute vs. retain, completely driven by which action will maximize the stock's market value.", "id": 16}, {"question": "Suppose that a firm has 20% debts and 80% equity in its capital structure. The cost of debts and cost of equity are assumed to be 10% and 15% respectively, What is the overall cost of capital?", "options": [{"id": "1", "text": "11%"}, {"id": "2", "text": "12%"}, {"id": "3", "text": "13%"}, {"id": "4", "text": "14%"}], "correctAnswer": "4", "explanation": "**Key Concepts:**\n* The Overall Cost of Capital is determined using the Weighted Average Cost of Capital (WACC) formula.\n* WACC calculates the blended cost of a firm's financing by weighting the specific cost of each capital component by its proportion in the total capital structure.\n* Formula: $WACC = (W_d \\cdot K_d) + (W_e \\cdot K_e)$, assuming debt is already expressed post-tax.\n* Execution: $(0.20 \\cdot 10\\%) + (0.80 \\cdot 15\\%) = 2\\% + 12\\% = 14\\%$.\n**Related Concepts:**\n* **Cost of Equity ($K_e$):** The rate of return a firm must theoretically pay to equity investors to compensate for the risk they undertake.\n* **Cost of Debt ($K_d$):** The effective interest rate a company pays on its borrowed funds, usually benefiting from a tax shield.\n* **Capital Asset Pricing Model (CAPM):** A widely utilized formula to accurately calculate the standalone Cost of Equity by incorporating a stock's Beta risk.\n--", "id": 17}, {"question": "Which of the following narratives describe the Fisher (Irving) effect?\nA. Nominal interest rate is equal to a real interest rate plus an expected inflation rate\nB. Real interest rate is equal to nominal interest rate minus expected rate of inflation\nC. Exchange rate differential between two currencies is explained by interest - inflation rate differential\nD. Exchange rate differential between two currencies is explained by comparative cost advantage and purchasing power parity", "options": [{"id": "1", "text": "A, B and C only"}, {"id": "2", "text": "A and B only"}, {"id": "3", "text": "C and D only"}, {"id": "4", "text": "B, C and D only"}], "correctAnswer": "2", "explanation": "**Key Concepts:**\n* The **Fisher Effect**, developed by economist Irving Fisher, outlines the strict relationship between inflation and both real and nominal interest rates.\n* The core formula is: $(1 + \\text{Nominal Rate}) = (1 + \\text{Real Rate}) \\times (1 + \\text{Inflation Rate})$.\n* For quick approximations, this simplifies to **Statement A**: The Nominal Interest Rate $\\approx$ Real Interest Rate + Expected Inflation Rate.\n* By simple algebraic rearrangement, this validates **Statement B**: The Real Interest Rate $\\approx$ Nominal Interest Rate - Expected Inflation Rate. \n**Related Concepts:**\n* **International Fisher Effect (IFE):** An extension of the Fisher effect stating that the estimated change in the exchange rate between two currencies is directly proportional to the difference in their nominal interest rates.\n* **Purchasing Power Parity (PPP):** An economic theory comparing different countries' currencies through a \"basket of goods\" approach, linking inflation differentials directly to exchange rate shifts.\n* **Real Return:** The actual purchasing power gained on an investment after the erosive effects of inflation have been stripped away from the nominal return.", "id": 18}]};

        marked.setOptions({ breaks: true, gfm: true });

        const mathExtension = {
            name: 'math',
            level: 'inline',
            start(src) { return src.indexOf('$'); },
            tokenizer(src, tokens) {
                const blockRule = /^\$\$(.*?)\$\$/s;
                const inlineRule = /^\$([^$\n]+)\$/;
                let match;
                if ((match = blockRule.exec(src))) {
                    return { type: 'math', raw: match[0], text: match[1], displayMode: true };
                } else if ((match = inlineRule.exec(src))) {
                    return { type: 'math', raw: match[0], text: match[1], displayMode: false };
                }
            },
            renderer(token) {
                const safeText = token.text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                return token.displayMode ? `$$${safeText}$$` : `$${safeText}$`;
            }
        };
        marked.use({ extensions: [mathExtension] });

        const Icons = {
            Menu: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>,
            User: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            Alert: () => <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ef4444" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>,
            Printer: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>,
            Info: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>,
            Pause: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>,
            Play: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        };

        const DonutChart = ({ percentage, color, label }) => (
            <div className="flex flex-col items-center print-break-avoid">
                <svg viewBox="0 0 36 36" className="circular-chart w-28 h-28 mb-3">
                    <path className="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    <path className="circle" stroke={color} strokeDasharray={`${percentage}, 100`} d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    <text x="18" y="20.5" textAnchor="middle" className="text-3xl font-black fill-slate-800" style={{fontSize: "9px"}}>{percentage}%</text>
                </svg>
                <span className="font-bold text-slate-500 uppercase tracking-widest text-xs">{label}</span>
            </div>
        );

        const App = () => {
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [answers, setAnswers] = useState({}); 
            const [status, setStatus] = useState({});   
            const [timeLeft, setTimeLeft] = useState(TEST_DATA.durationMinutes * 60);
            const [isSubmitted, setIsSubmitted] = useState(false);
            const [isPaletteOpen, setIsPaletteOpen] = useState(false);
            const [isPaused, setIsPaused] = useState(false); 
            const [warnings, setWarnings] = useState(0);
            const [showWarning, setShowWarning] = useState(false);

            useEffect(() => {
                if (window.MathJax && window.MathJax.typesetPromise) {
                    window.MathJax.typesetPromise().catch((err) => console.log('MathJax error: ', err));
                }
            });

            useEffect(() => {
                if (!TEST_DATA.strictMode || isSubmitted) return;
                const handleVisibility = () => {
                    if (document.hidden) {
                        setWarnings(w => w + 1);
                        setShowWarning(true);
                    }
                };
                document.addEventListener("visibilitychange", handleVisibility);
                return () => document.removeEventListener("visibilitychange", handleVisibility);
            }, [isSubmitted]);

            useEffect(() => {
                if (isSubmitted || isPaused) return; 
                const timer = setInterval(() => {
                    setTimeLeft(prev => {
                        if (prev <= 0) { handleSubmit(true); return 0; }
                        return prev - 1;
                    });
                }, 1000);
                return () => clearInterval(timer);
            }, [isSubmitted, isPaused]); 

            const formatTime = (seconds) => {
                const h = Math.floor(seconds / 3600);
                const m = Math.floor((seconds % 3600) / 60);
                const s = seconds % 60;
                return `${h > 0 ? h + ':' : ''}${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            };

            const advanceQuestion = () => {
                if (currentQIndex < TEST_DATA.questions.length - 1) {
                    const nextQ = TEST_DATA.questions[currentQIndex + 1];
                    if (status[nextQ.id] === 'not_visited') setStatus(prev => ({ ...prev, [nextQ.id]: 'not_answered' }));
                    setCurrentQIndex(prev => prev + 1);
                }
            };

            const handleOptionSelect = (optId) => {
                if(isPaused) return;
                setAnswers(prev => ({ ...prev, [TEST_DATA.questions[currentQIndex].id]: optId }));
            };

            const handleSaveAndNext = () => {
                if(isPaused) return;
                const cid = TEST_DATA.questions[currentQIndex].id;
                setStatus(prev => ({ ...prev, [cid]: answers[cid] ? 'answered' : 'not_answered' }));
                advanceQuestion();
            };

            const handleMarkForReview = () => {
                if(isPaused) return;
                const cid = TEST_DATA.questions[currentQIndex].id;
                setStatus(prev => ({ ...prev, [cid]: answers[cid] ? 'marked_answered' : 'marked' }));
                advanceQuestion();
            };

            const handleClearResponse = () => {
                if(isPaused) return;
                const cid = TEST_DATA.questions[currentQIndex].id;
                setAnswers(prev => { const newAns = { ...prev }; delete newAns[cid]; return newAns; });
                setStatus(prev => ({ ...prev, [cid]: 'not_answered' }));
            };

            const handlePaletteClick = (index) => {
                if(isPaused) return;
                const cid = TEST_DATA.questions[currentQIndex].id;
                if (status[cid] === 'not_visited' || (status[cid] === 'not_answered' && !answers[cid])) {
                    setStatus(prev => ({ ...prev, [cid]: 'not_answered' }));
                }
                const tid = TEST_DATA.questions[index].id;
                if (status[tid] === 'not_visited') setStatus(prev => ({ ...prev, [tid]: 'not_answered' }));
                setCurrentQIndex(index);
                setIsPaletteOpen(false); 
            };

            const handleSubmit = (auto = false) => {
                if (auto || confirm("Are you sure you want to submit the test? No changes can be made after submission.")) {
                    setIsSubmitted(true);
                    setIsPaused(false);
                }
            };

            const counts = useMemo(() => {
                const c = { answered: 0, not_answered: 0, marked: 0, marked_answered: 0, not_visited: 0 };
                Object.values(status).forEach(s => { if (c[s] !== undefined) c[s]++; });
                return c;
            }, [status]);

            if (isSubmitted) {
                let score = 0, correct = 0, wrong = 0;
                TEST_DATA.questions.forEach(q => {
                    if (answers[q.id] === q.correctAnswer) { score += TEST_DATA.marksForCorrect; correct++; } 
                    else if (answers[q.id]) { score -= TEST_DATA.marksForWrong; wrong++; }
                });

                const attempted = correct + wrong;
                const accuracy = attempted > 0 ? Math.round((correct / attempted) * 100) : 0;
                const percentage = Math.max(0, Math.round((score / TEST_DATA.totalMarks) * 100));
                const isPass = percentage >= TEST_DATA.passPercentage;

                return (
                    <div className="h-full overflow-y-auto p-4 md:p-8 print:p-0 bg-slate-50 print:bg-white print:h-auto print:overflow-visible">
                        <div className="max-w-5xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100 print-border-none print:shadow-none">
                            <div className="bg-blue-600 text-white p-10 relative print:text-slate-900 print:bg-white print:border-b-2 print:border-slate-300 print:p-0 print:mb-8">
                                <div className="absolute top-0 right-0 w-64 h-64 bg-white opacity-5 rounded-full -mt-20 -mr-20 blur-2xl print-hidden"></div>
                                <div className="flex flex-col md:flex-row justify-between items-center gap-6 relative z-10 print:flex-row print:items-start">
                                    <div className="text-center md:text-left">
                                        <h1 className="text-4xl font-extrabold mb-2 tracking-tight">Performance Report</h1>
                                        <p className="opacity-90 font-semibold text-lg">{TEST_DATA.title}</p>
                                        <p className="opacity-70 text-sm mt-1">{TEST_DATA.organization}</p>
                                    </div>
                                    <div className="flex gap-6 items-center">
                                        <div className={`px-6 py-4 rounded-2xl border-2 backdrop-blur-md print:border-2 print:bg-transparent flex items-center justify-between gap-6 min-w-[200px] ${isPass ? 'bg-green-500/20 border-green-400 print:border-green-600 print:text-green-700' : 'bg-red-500/20 border-red-400 print:border-red-600 print:text-red-700'}`}>
                                            <div className="text-left">
                                                <div className="text-[10px] uppercase tracking-widest font-bold opacity-80 mb-0.5">Final Status</div>
                                                <div className="text-2xl font-black leading-none">{isPass ? 'PASSED' : 'FAILED'}</div>
                                            </div>
                                            <div className="text-4xl leading-none">{isPass ? '🎉' : '❌'}</div>
                                        </div>
                                    </div>
                                </div>
                                <button onClick={() => window.print()} className="print-hidden absolute right-6 top-6 bg-white/20 hover:bg-white/30 text-white px-5 py-2.5 rounded-full font-bold transition shadow-lg backdrop-blur-sm flex items-center gap-2">
                                    <Icons.Printer/> Save PDF
                                </button>
                            </div>

                            <div className="p-10 grid grid-cols-1 md:grid-cols-3 gap-8 border-b border-slate-100 bg-slate-50/50 print:bg-white print:border-b-0 print-break-avoid">
                                <DonutChart percentage={percentage} color="#2563eb" label="Score Percentage" />
                                <DonutChart percentage={accuracy} color="#10b981" label="Accuracy" />
                                <div className="flex flex-col justify-center space-y-4">
                                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center print:border-slate-300">
                                        <span className="text-slate-500 font-bold">Total Marks</span>
                                        <span className="text-3xl font-black text-blue-600">{score} <span className="text-lg text-slate-400 font-bold">/ {TEST_DATA.totalMarks}</span></span>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-green-50 p-4 rounded-2xl border border-green-100 text-center print:border-slate-300 print:bg-white">
                                            <div className="text-green-600 text-3xl font-black">{correct}</div>
                                            <div className="text-xs font-bold text-green-700 uppercase mt-1">Correct</div>
                                        </div>
                                        <div className="bg-red-50 p-4 rounded-2xl border border-red-100 text-center print:border-slate-300 print:bg-white">
                                            <div className="text-red-600 text-3xl font-black">{wrong}</div>
                                            <div className="text-xs font-bold text-red-700 uppercase mt-1">Wrong</div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="p-6 md:p-10">
                                <h2 className="text-2xl font-extrabold text-slate-800 mb-8 flex items-center gap-3 border-b border-slate-200 pb-4">
                                    Detailed Solutions
                                </h2>
                                <div className="space-y-8">
                                    {TEST_DATA.questions.map((q, i) => {
                                        const userAns = answers[q.id];
                                        const isCorrect = userAns === q.correctAnswer;
                                        const isSkipped = !userAns;
                                        let borderColor = isCorrect ? 'border-green-500' : (isSkipped ? 'border-slate-300' : 'border-red-500');
                                        let bgClass = isCorrect ? 'bg-green-50/50' : (isSkipped ? 'bg-white' : 'bg-red-50/50');

                                        return (
                                            <div key={q.id} className={`border-l-8 ${borderColor} ${bgClass} p-6 rounded-2xl shadow-sm border border-slate-100 print-break-avoid print:border print:border-l-8 print:shadow-none`}>
                                                <div className="flex gap-4 mb-6">
                                                    <span className="font-black text-slate-400 text-xl">Q{i+1}.</span>
                                                    <div className="flex-1 text-slate-800 markdown-body text-[16px]" dangerouslySetInnerHTML={{ __html: marked.parse(q.question) }}></div>
                                                </div>
                                                <div className="ml-10 space-y-3 mb-6">
                                                    {q.options.map(opt => {
                                                        const isUserOpt = opt.id === userAns;
                                                        const isCorrectOpt = opt.id === q.correctAnswer;
                                                        
                                                        let optClass = "text-slate-600 bg-white border-slate-200";
                                                        let icon = "○";
                                                        if (isCorrectOpt) { optClass = "text-green-800 bg-green-100 border-green-300 font-bold"; icon = "✓"; }
                                                        else if (isUserOpt) { optClass = "text-red-700 bg-red-100 border-red-300 line-through"; icon = "✗"; }

                                                        return (
                                                            <div key={opt.id} className={`flex items-start gap-3 p-3 rounded-xl border ${optClass} print:bg-transparent print:border-slate-300`}>
                                                                <span className="mt-0.5 font-bold">{icon}</span>
                                                                <div className="markdown-body" style={{marginBottom: 0}} dangerouslySetInnerHTML={{ __html: marked.parseInline(opt.text) }}></div>
                                                            </div>
                                                        )
                                                    })}
                                                </div>
                                                {q.explanation && (
                                                    <div className="ml-10 p-5 bg-blue-50/50 rounded-xl border border-blue-100 print:bg-slate-50 print:border-slate-200">
                                                        <strong className="block mb-2 flex items-center gap-2 text-blue-700"><Icons.Info/> Expert Explanation:</strong>
                                                        <div className="markdown-body text-sm text-slate-700" dangerouslySetInnerHTML={{ __html: marked.parse(q.explanation) }}></div>
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            const currentQuestion = TEST_DATA.questions[currentQIndex];

            return (
                <div className="flex flex-col h-full bg-slate-50 relative">
                    {showWarning && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-white p-8 rounded-3xl shadow-2xl max-w-md text-center border-2 border-red-500">
                                <div className="w-20 h-20 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4 animate-bounce"><Icons.Alert /></div>
                                <h2 className="text-2xl font-black text-slate-800 mb-2">Warning Recorded!</h2>
                                <p className="text-slate-600 mb-6 font-medium">You switched tabs or minimized the window. (Warning {warnings})</p>
                                <button onClick={() => setShowWarning(false)} className="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-4 rounded-full shadow-lg transition transform active:scale-95 text-lg">I Understand</button>
                            </div>
                        </div>
                    )}

                    {isPaused && (
                        <div className="fixed inset-0 z-[90] bg-white/80 backdrop-blur-md flex flex-col items-center justify-center p-4">
                            <div className="bg-white p-10 rounded-3xl shadow-2xl border border-slate-200 text-center max-w-sm w-full">
                                <div className="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-6"><Icons.Pause /></div>
                                <h2 className="text-3xl font-black text-slate-800 mb-3">Test Paused</h2>
                                <button onClick={() => setIsPaused(false)} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-full shadow-lg transition transform active:scale-95 flex items-center justify-center gap-3 text-lg">
                                    <Icons.Play /> Resume Test
                                </button>
                            </div>
                        </div>
                    )}

                    <header className="glass-nav border-b border-slate-200 h-20 flex items-center justify-between px-6 z-20 sticky top-0 shadow-sm">
                        <div className="flex items-center gap-4">
                            <div className="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center shadow-lg shadow-blue-600/30 text-white font-black text-xl">E</div>
                            <div className="hidden sm:block">
                                <h1 className="font-extrabold text-lg text-slate-800 leading-tight">{TEST_DATA.organization}</h1>
                                <p className="text-xs text-slate-500 font-medium truncate max-w-[200px]">{TEST_DATA.title}</p>
                            </div>
                        </div>
                        <div className="absolute left-1/2 top-1/2 transform -translate-x-1/2 -translate-y-1/2 flex items-center">
                            <div className="flex items-center bg-white rounded-full border border-slate-200 p-1 shadow-sm overflow-hidden">
                                <div className="px-4 py-1.5 bg-slate-100 rounded-full text-xs font-bold text-slate-500 flex items-center gap-2">
                                    <span className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> LIVE
                                </div>
                                <div className="px-6 font-mono font-black text-xl text-blue-600 tracking-widest">{formatTime(timeLeft)}</div>
                            </div>
                        </div>
                        <div className="flex items-center gap-3">
                            {!isPaused && !isSubmitted && (
                                <button onClick={() => setIsPaused(true)} className="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-600 hover:bg-slate-200 hover:text-blue-600 transition" title="Pause Test"><Icons.Pause /></button>
                            )}
                            <div className="hidden md:flex items-center gap-3 pl-3 border-l border-slate-200">
                                <div className="w-10 h-10 rounded-full bg-gradient-to-r from-blue-400 to-indigo-500 p-0.5 shadow-md">
                                    <div className="w-full h-full bg-white rounded-full flex items-center justify-center text-slate-800"><Icons.User /></div>
                                </div>
                            </div>
                            <button className="md:hidden w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-600" onClick={() => setIsPaletteOpen(!isPaletteOpen)}><Icons.Menu /></button>
                        </div>
                    </header>

                    <div className="flex-1 flex overflow-hidden relative">
                        <div className={`flex-1 flex flex-col w-full transition-all duration-300 ${isPaused ? 'blur-content' : ''}`}>
                            <div className="flex-1 overflow-y-auto p-4 md:p-8 lg:p-12">
                                <div className="max-w-4xl mx-auto bg-white rounded-3xl p-8 shadow-sm border border-slate-100">
                                    <div className="flex justify-between items-center mb-8 pb-4 border-b border-slate-100">
                                        <div className="flex items-center gap-3">
                                            <span className="bg-blue-600 text-white px-5 py-2 rounded-full text-sm font-black shadow-md shadow-blue-600/20">Question {currentQIndex + 1}</span>
                                        </div>
                                        <div className="flex gap-2">
                                            <span className="bg-green-50 text-green-600 px-4 py-1.5 rounded-full text-xs font-bold border border-green-200">+{TEST_DATA.marksForCorrect}</span>
                                            <span className="bg-red-50 text-red-600 px-4 py-1.5 rounded-full text-xs font-bold border border-red-200">-{TEST_DATA.marksForWrong}</span>
                                        </div>
                                    </div>
                                    <div className="text-[17px] text-slate-800 markdown-body mb-8 leading-relaxed" dangerouslySetInnerHTML={{ __html: marked.parse(currentQuestion.question) }}></div>
                                    <div className="space-y-4">
                                        {currentQuestion.options.map(opt => {
                                            const isSelected = answers[currentQuestion.id] === opt.id;
                                            return (
                                                <div key={opt.id} onClick={() => handleOptionSelect(opt.id)} className={`group relative p-5 rounded-2xl cursor-pointer flex items-center gap-5 transition-all duration-200 border-2 ${isSelected ? 'border-blue-600 bg-blue-50/50 shadow-sm option-selected' : 'border-slate-200 hover:border-blue-300 hover:bg-slate-50'}`}>
                                                    <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center flex-shrink-0 custom-radio ${isSelected ? 'border-blue-600 bg-white' : 'border-slate-300 group-hover:border-blue-400'}`}></div>
                                                    <div className="text-slate-700 font-medium markdown-body flex-1 text-[16px]" style={{marginBottom:0}} dangerouslySetInnerHTML={{ __html: marked.parseInline(opt.text) }}></div>
                                                </div>
                                            )
                                        })}
                                    </div>
                                </div>
                            </div>
                            <div className="glass-nav border-t border-slate-200 p-5 md:px-12 flex items-center justify-between z-10">
                                <div className="flex gap-3">
                                    <button onClick={handleMarkForReview} className="px-6 py-3.5 bg-purple-50 text-purple-700 hover:bg-purple-100 rounded-full font-bold text-sm transition border border-purple-200"><span className="hidden md:inline">Mark for Review</span><span className="md:hidden">Review</span></button>
                                    <button onClick={handleClearResponse} className="px-6 py-3.5 bg-slate-100 text-slate-600 hover:bg-slate-200 rounded-full font-bold text-sm transition">Clear</button>
                                </div>
                                <button onClick={handleSaveAndNext} className="px-8 py-3.5 bg-blue-600 hover:bg-blue-700 text-white rounded-full font-black text-sm shadow-lg shadow-blue-600/30 transition transform active:scale-95 flex items-center gap-2">Save & Next <span className="text-xl leading-none">→</span></button>
                            </div>
                        </div>

                        <div className={`absolute inset-y-0 right-0 w-[320px] bg-white shadow-2xl transform transition-transform duration-300 z-30 flex flex-col border-l border-slate-200 ${isPaletteOpen ? 'translate-x-0' : 'translate-x-full'} md:translate-x-0 md:relative`}>
                            <div className="p-5 border-b border-slate-100 flex items-center gap-4 bg-slate-50">
                                <div className="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center text-blue-600"><Icons.User /></div>
                                <div><div className="font-bold text-slate-800">Candidate</div><div className="text-xs text-slate-500">{TEST_DATA.organization} Student</div></div>
                                <button className="ml-auto md:hidden text-slate-400" onClick={() => setIsPaletteOpen(false)}>✕</button>
                            </div>
                            <div className="p-5 grid grid-cols-2 gap-4 text-xs font-semibold border-b border-slate-100">
                                <div className="flex items-center gap-2 text-slate-600"><div className="w-3 h-3 rounded-full bg-[#10b981]"></div> Answered ({counts.answered})</div>
                                <div className="flex items-center gap-2 text-slate-600"><div className="w-3 h-3 rounded-full bg-[#ef4444]"></div> Not Ans ({counts.not_answered})</div>
                                <div className="flex items-center gap-2 text-slate-600"><div className="w-3 h-3 rounded-full bg-[#8b5cf6]"></div> Marked ({counts.marked + counts.marked_answered})</div>
                                <div className="flex items-center gap-2 text-slate-600"><div className="w-3 h-3 rounded-full border-2 border-slate-300 bg-slate-50"></div> Unvisited ({counts.not_visited})</div>
                            </div>
                            <div className="flex-1 overflow-y-auto p-5">
                                <div className="font-bold text-slate-700 mb-4 text-sm">Question Navigation:</div>
                                <div className="grid grid-cols-5 gap-2.5">
                                    {TEST_DATA.questions.map((q, idx) => (
                                        <button key={q.id} onClick={() => handlePaletteClick(idx)} className={`h-11 w-full flex items-center justify-center font-bold text-sm rounded-xl transition shadow-sm border ${currentQIndex === idx ? 'current-question' : 'border-transparent'} status-${status[q.id]}`}>{idx + 1}</button>
                                    ))}
                                </div>
                            </div>
                            <div className="p-5 border-t border-slate-100 bg-white">
                                <button onClick={() => handleSubmit(false)} className="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black py-4 rounded-2xl shadow-lg shadow-emerald-500/20 transition transform active:scale-95 text-lg">Submit Final Test</button>
                            </div>
                        </div>
                    </div>
                    {isPaletteOpen && <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-20 md:hidden" onClick={() => setIsPaletteOpen(false)}></div>}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
