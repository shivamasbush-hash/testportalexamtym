    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        
        body { font-family: 'Inter', sans-serif; user-select: none; background-color: #f8fafc; color: #0f172a; }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }
        ::-webkit-scrollbar-thumb:hover { background: #3b82f6; }
        
        .status-answered { background-color: #10b981; color: white; border-color: #10b981; } 
        .status-not_answered { background-color: #ef4444; color: white; border-color: #ef4444; } 
        .status-marked { background-color: #8b5cf6; color: white; border-color: #8b5cf6; } 
        .status-marked_answered { background-color: #8b5cf6; color: white; border-color: #8b5cf6; position: relative; } 
        .status-marked_answered::after { content: '✔'; position: absolute; bottom: -4px; right: -4px; font-size: 10px; color: #10b981; background: white; border-radius: 50%; padding: 0 2px; border: 1px solid #e2e8f0;}
        .status-not_visited { background-color: #f1f5f9; color: #64748b; border-color: #cbd5e1; } 
        
        .current-question { border: 2px solid #2563eb !important; transform: scale(1.15); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); z-index: 10;}
        
        .markdown-body img { 
            max-width: 100%; max-height: 400px; object-fit: contain; border-radius: 8px; 
            margin: 15px 0; border: 1px solid #e2e8f0; background: white; padding: 5px; display: block;
        }
        .markdown-body table { width: 100%; border-collapse: separate; border-spacing: 0; margin: 15px 0; border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0; }
        .markdown-body thead tr { background-color: #eff6ff; color: #1e3a8a; }
        .markdown-body th, .markdown-body td { padding: 12px 15px; border-bottom: 1px solid #e2e8f0; border-right: 1px solid #e2e8f0;}
        .markdown-body th:last-child, .markdown-body td:last-child { border-right: none; }
        .markdown-body tbody tr:last-child td { border-bottom: none; }
        .markdown-body p { margin-bottom: 0.75rem; }
        .markdown-body strong { font-weight: 700; color: #0f172a; }
        .markdown-body ul { list-style-type: disc; margin-left: 20px; margin-bottom: 10px; }

        .glass-nav { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        .blur-content { filter: blur(8px); pointer-events: none; user-select: none; }
        .custom-radio { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .option-selected .custom-radio { border-width: 6px; border-color: #2563eb; }

        @keyframes dash { to { stroke-dashoffset: 0; } }
        .circular-chart { display: block; margin: 0 auto; max-width: 80%; max-height: 250px; }
        .circle-bg { fill: none; stroke: #e2e8f0; stroke-width: 3.8; }
        .circle { fill: none; stroke-width: 2.8; stroke-linecap: round; animation: progress 1s ease-out forwards; }
        @keyframes progress { 0% { stroke-dasharray: 0 100; } }

        @media print {
            @page { margin: 15mm; size: auto; }
            html, body { height: auto !important; min-height: 100% !important; overflow: visible !important; background-color: white !important; color: black !important; position: static !important; width: 100% !important; display: block !important; }
            #root, .h-\[100dvh\], .h-full, .overflow-hidden, .overflow-y-auto, .flex-1, .flex-col { height: auto !important; overflow: visible !important; display: block !important; position: static !important; }
            .glass-nav, header, .fixed, .absolute, button, .print-hidden, .h-20, .h-16 { display: none !important; }
            .max-w-5xl, .max-w-4xl { max-width: 100% !important; width: 100% !important; margin: 0 !important; padding: 0 !important; box-shadow: none !important; border: none !important; }
            .print-break-avoid { break-inside: avoid !important; page-break-inside: avoid !important; display: block !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .grid-cols-3 { display: flex !important; justify-content: space-between !important; gap: 20px !important; }
        }
    </style>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const TEST_DATA = {"title": "Banking 2020 PYQs", "organization": "ExamTym", "durationMinutes": 20, "totalMarks": 22.0, "marksForCorrect": 2.0, "marksForWrong": 0.0, "passPercentage": 40, "shuffle": false, "strictMode": false, "questions": [{"question": "Arrange the following initiatives taken by the Government of India to tackle the Non-performing assets in their ascending order of chronology:\n(A) Corporate Debt Restructuring\n(B) Compromise Settlement\n(C) The Debt Recovery Tribunals (DRTs)\n(D) Credit Information Bureau\n(E) SARFAESI Act", "options": [{"id": "1", "text": "(C), (D), (A), (B), (E)"}, {"id": "2", "text": "(A), (B), (E), (C), (D)"}, {"id": "3", "text": "(C), (D), (B), (E), (A)"}, {"id": "4", "text": "(D), (C), (B), (E), (A)"}], "correctAnswer": "1", "explanation": "Key Concept:\n* **The Debt Recovery Tribunals (DRTs)** were established in 1993 to facilitate the speedy recovery of debt payable to banks and financial institutions.\n* **Credit Information Bureau (India) Limited (CIBIL)** was incorporated in 2000 to maintain records of credit histories.\n* **Corporate Debt Restructuring (CDR)** and **Compromise Settlements** were introduced around 2001, followed by the **SARFAESI Act** in 2002, allowing banks to auction properties to recover loans without court intervention.\n**Related Concepts:**\n* **Non-Performing Assets (NPA):** Loans or advances where principal or interest payments remain overdue for a period of 90 days.\n* **Insolvency and Bankruptcy Code (IBC):** Introduced in 2016 to consolidate existing laws and handle corporate insolvency in a strict, time-bound manner.", "id": 1}, {"question": "What is a 'Repo Rate'?", "options": [{"id": "1", "text": "Is the rate at which RBI lends to State Government"}, {"id": "2", "text": "Is the rate at which International aid agencies lends to RBI"}, {"id": "3", "text": "Is the rate at which the RBI lends to Banks in case of short term needs"}, {"id": "4", "text": "Is the rate at which RBI borrows funds from the Commercial Banks in the country"}], "correctAnswer": "3", "explanation": "Key Concept:\n* **Repo Rate (Repurchase Agreement Rate)** is the key monetary policy rate of interest at which the Reserve Bank of India (RBI) lends short-term money to commercial banks against government securities.\n* It is a primary tool used by the RBI to control inflation and regulate the money supply in the economy.\n* When the RBI wants to reduce liquidity (to curb inflation), it increases the Repo Rate, making borrowing expensive for banks.\n**Related Concepts:**\n* **Reverse Repo Rate:** The rate at which the RBI borrows money from commercial banks within the country, used to absorb excess liquidity.\n* **Marginal Standing Facility (MSF):** The rate at which scheduled banks can borrow overnight funds from the RBI against approved government securities.", "id": 2}, {"question": "Which of the following financial institution(s) got merged with their subsidiary?\n(A) UTI\n(B) IFCI\n(C) ICICI\n(D) IDBI\n(E) Global Trust Bank", "options": [{"id": "1", "text": "(A), (B) only"}, {"id": "2", "text": "(B), (C) only"}, {"id": "3", "text": "(C), (D) only"}, {"id": "4", "text": "(C), (E) only"}], "correctAnswer": "3", "explanation": "Key Concept:\n* **ICICI (Industrial Credit and Investment Corporation of India):** Originally formed as a development financial institution, it underwent a reverse merger with its subsidiary, ICICI Bank, in 2002.\n* **IDBI (Industrial Development Bank of India):** Followed a similar path, transforming from a development finance institution and eventually merging with its commercial banking subsidiary, IDBI Bank, in 2004.\n* Both moves were driven by the need to access low-cost current and savings account (CASA) deposits and offer universal banking services.\n**Related Concepts:**\n* **Universal Banking:** A banking system that provides a wide variety of financial services, including commercial banking and investment banking.\n* **Development Financial Institutions (DFIs):** Specialized institutions established to provide long-term finance for industrial and agricultural development.", "id": 3}, {"question": "Which among the followings are correct statements with regard to NBFC in India?\n(A) All NBFCs should be registered with RBI.\n(B) NBFCs cannot accept demand deposits.\n(C) NBFCs do not form part of the payment and settlement system and cannot issue cheques drawn on itself.\n(D) Deposit insurance facility of Deposit Insurance and Credit Guarantee Corporation is not available to depositors of NBFCs.", "options": [{"id": "1", "text": "(A), (B), (C) only"}, {"id": "2", "text": "(A), (B), (C), (D) only"}, {"id": "3", "text": "(A), (B), (D) only"}, {"id": "4", "text": "(A), (C), (D) only"}], "correctAnswer": "2", "explanation": "Key Concept:\n* **Demand Deposits vs. Term Deposits:** Unlike commercial banks, NBFCs are strictly prohibited from accepting demand deposits (CASA) because they do not form part of the payment and settlement system (cannot issue self-drawn cheques).\n* **DICGC Coverage:** The deposit insurance facility provided by DICGC (which covers bank deposits up to \u20b95 Lakhs) is exclusively for bank depositors and is not extended to NBFC depositors.\n* **Registration:** As a general rule under Section 45-IA of the RBI Act, 1934, NBFCs must be registered with the RBI (though certain specific types like Venture Capital Funds are regulated by SEBI, in the context of standard UGC exams, statement A is treated as structurally correct).\n**Related Concepts:**\n* **Shadow Banking:** Activities performed by financial institutions that operate outside the traditional, highly regulated banking sector, a category which includes NBFCs.\n* **Systemically Important NBFCs (NBFC-ND-SI):** Non-deposit taking NBFCs with asset sizes of \u20b9500 crore or more that are subject to stricter RBI prudential norms.", "id": 4}, {"question": "Objectives of IMPS (Immediate Payment Service) are:\n(A) To enable bank customers to use mobile instruments as a channel for accessing their bank accounts and remit funds 24x7.\n(B) Making payments simpler just with the mobile number of the beneficiary.\n(C) To build the foundation for a full range of mobile based banking services.\n(D) To create competition with NEFT and RTGS.", "options": [{"id": "1", "text": "(A), (B), (C) only"}, {"id": "2", "text": "(B), (C), (D) only"}, {"id": "3", "text": "(A), (B), (D) only"}, {"id": "4", "text": "(B), (D) only"}], "correctAnswer": "1", "explanation": "Key Concept:\n* **IMPS (Immediate Payment Service)** is an instant interbank electronic fund transfer service managed by the National Payments Corporation of India (NPCI).\n* It was designed to facilitate 24x7x365 fund transfers using mobile numbers (MMID), making retail payments vastly simpler and foundational for future mobile banking (like UPI).\n* Statement (D) is a conceptual trap: IMPS was created to *complement* NEFT and RTGS by targeting lower-value, instant mobile transfers, not to artificially create \"competition\" against RBI's own systems.\n**Related Concepts:**\n* **NEFT (National Electronic Funds Transfer):** A nationwide payment system facilitating one-to-one funds transfer which previously operated in batches (now 24x7).\n* **RTGS (Real Time Gross Settlement):** A system intended for large-value transactions (minimum \u20b92 Lakhs) where settlement happens in real-time.", "id": 5}, {"question": "Reverse Repo Rate is a tool used by the Reserve Bank of India primarily to", "options": [{"id": "1", "text": "Inject liquidity"}, {"id": "2", "text": "Absorb liquidity"}, {"id": "3", "text": "Protect bank credit"}, {"id": "4", "text": "Build reserve"}], "correctAnswer": "2", "explanation": "Key Concept:\n* The **Reverse Repo Rate** is the interest rate at which the RBI borrows funds from commercial banks for a short duration.\n* It is a direct tool used by the central bank to **absorb excess liquidity** from the banking system, usually deployed when inflation is high.\n* By offering a lucrative Reverse Repo Rate, the RBI incentivizes banks to park their surplus funds with the central bank rather than lending it out to the public, cooling down the money supply.\n**Related Concepts:**\n* **Liquidity Adjustment Facility (LAF):** A monetary policy tool which allows banks to borrow money through repurchase agreements (repos) or make loans to the RBI through reverse repo agreements.\n* **Open Market Operations (OMO):** The buying and selling of government securities in the open market by a central bank to control liquidity.", "id": 6}, {"question": "Identify on which of the three mutually reinforcing pillars Basel-III capital regulations are based?\nA. Minimum capital standards\nB. Supervisory review of capital adequacy\nC. Credit risk management\nD. Market discipline\nE. Management control", "options": [{"id": "1", "text": "A, B and C only"}, {"id": "2", "text": "A, B and D only"}, {"id": "3", "text": "C, D and E only"}, {"id": "4", "text": "A, C and D only"}], "correctAnswer": "2", "explanation": "Key Concept:\n* **Pillar 1: Minimum Capital Requirements:** Ensures banks maintain a minimum ratio of capital to risk-weighted assets (improving upon Basel II to emphasize Tier 1 equity).\n* **Pillar 2: Supervisory Review Process:** Requires banks to have an internal capital adequacy assessment process and allows regulators to mandate holding capital above the minimum.\n* **Pillar 3: Market Discipline:** Mandates rigorous disclosure requirements to allow market participants to assess the bank's capital adequacy and risk profile.\n**Related Concepts:**\n* **Capital Adequacy Ratio (CAR):** A measurement of a bank's available capital expressed as a percentage of a bank's risk-weighted credit exposures.\n* **Countercyclical Capital Buffer:** A Basel III requirement for banks to accumulate capital during economic expansions that can be drawn down during recessions.", "id": 7}, {"question": "In order to calculate capital adequacy ratio, the banks are required to take into consideration, which of the following risks?\nA. Credit risk\nB. Market risk\nC. Operational risk", "options": [{"id": "1", "text": "A and C only"}, {"id": "2", "text": "A and B only"}, {"id": "3", "text": "B and C only"}, {"id": "4", "text": "A, B and C only"}], "correctAnswer": "4", "explanation": "Key Concept:\n* Under Basel regulations, the denominator for calculating the Capital Adequacy Ratio (CAR) is the sum of **Risk-Weighted Assets (RWA)**.\n* **Credit Risk:** The risk of default by borrowers.\n* **Market Risk & Operational Risk:** The risk of losses in on/off-balance sheet positions arising from movements in market prices, and the risk of loss from inadequate internal processes, people, and systems. All three must be capitalized against.\n**Related Concepts:**\n* **Tier 1 Capital:** The core measure of a bank's financial strength from a regulator's point of view (composed of core equity capital and disclosed reserves).\n* **Tier 2 Capital:** Supplementary bank capital that includes items such as revaluation reserves, undisclosed reserves, and subordinated debt.", "id": 8}, {"question": "Match the item of List I with the items of List II and suggest the correct code:\n| List I | List II |\n| :--- | :--- |\n| A. Relationship Banking | I. Dealing in hundis and acceptance of deposits |\n| B. Merchant Banking | II. Widening the entrepreneurial base and assist in a rapid rate of industrial growth |\n| C. Indigenous Banking | III. Engaged in the business of capital issue management |\n| D. Development Banking | IV. Creating, maintaining and enhancing strong relationship with customers |\nChoose the correct code:", "options": [{"id": "1", "text": "A-IV, B-II, C-I, D-III"}, {"id": "2", "text": "A-II, B-III, C-I, D-IV"}, {"id": "3", "text": "A-IV, B-III, C-I, D-II"}, {"id": "4", "text": "A-II, B-I, C-IV, D-III"}], "correctAnswer": "3", "explanation": "Key Concept:\n* **Relationship Banking:** Focuses heavily on building long-term, customized relationships with clients rather than treating them as single-transaction entities (A -> IV).\n* **Merchant Banking:** Specifically deals with corporate finance, underwriting, and capital issue management (IPOs, FPOs) rather than general public deposits (B -> III).\n* **Indigenous Banking:** Traditional banking in India relying on native instruments like 'Hundis' (bills of exchange) and local lending practices (C -> I).\n* **Development Banking:** Institutions aimed at providing long-term capital for industrial projects to fuel macroeconomic growth (D -> II).\n**Related Concepts:**\n* **Retail Banking:** Direct dealing of commercial banks with individual consumers (mass market banking).\n* **Wholesale Banking:** Banking services offered to large clients, such as corporate clients, mid-sized companies, and real estate developers.", "id": 9}, {"question": "Assertion A: Credit flows to agriculture and SME sector have increased in recent years.\n**Reasoning R: Reserve Bank of India has gradually relaxed various controls in credit market.**\nChoose the correct code:", "options": [{"id": "1", "text": "A and R both are correct and R is the right explanation of A"}, {"id": "2", "text": "A and R both are correct but R is NOT the right explanation of A"}, {"id": "3", "text": "A is correct but R is incorrect"}, {"id": "4", "text": "Both A and R are incorrect"}], "correctAnswer": "2", "explanation": "Key Concept:\n* **Assertion (A) is correct:** Due to strict Priority Sector Lending (PSL) guidelines and government push, the credit volume to agriculture and SMEs has indeed seen an upward trajectory.\n* **Reasoning (R) is correct individually:** Over the past few decades (post-1991), the RBI has deregulated interest rates and relaxed various rigid, archaic controls in the general credit market.\n* **Conceptual Trap:** R is *not* the primary explanation for A. The increase in agricultural/SME credit is mainly due to *targeted mandates* (like the 40% PSL target banks must hit) and government schemes (like MUDRA), rather than a general \"relaxation\" of credit controls.\n**Related Concepts:**\n* **Priority Sector Lending (PSL):** Sectors designated by the RBI that require specialized credit attention, ensuring adequate flow of funds to vulnerable sectors of the economy.\n* **Financial Inclusion:** Delivery of financial services at affordable costs to sections of disadvantaged and low-income segments of society.", "id": 10}, {"question": "\"Skimming\" in e-banking refers to:", "options": [{"id": "1", "text": "Identifying fraudsters copying vital information from credit cards"}, {"id": "2", "text": "Multiple transactions by one credit card"}, {"id": "3", "text": "Conversion of a debit card into credit card"}, {"id": "4", "text": "Excessive charge for online services"}], "correctAnswer": "1", "explanation": "Key Concept:\n* **Skimming** is an illegal financial activity where fraudsters capture a victim's personal and payment data using a small device (a skimmer) surreptitiously attached to an ATM or POS machine.\n* The skimmer reads the magnetic stripe on the credit/debit card, while a hidden camera or fake keypad captures the PIN.\n* This copied vital information is then cloned onto blank cards to drain the victim's account.\n**Related Concepts:**\n* **Phishing:** Fraudulent attempts to obtain sensitive information by disguising oneself as a trustworthy entity via email or text.\n* **Vishing (Voice Phishing):** The phone equivalent of phishing, where scammers trick victims into revealing financial data over a phone call.", "id": 11}]};

        marked.setOptions({ breaks: true, gfm: true });

        const mathExtension = {
            name: 'math',
            level: 'inline',
            start(src) { return src.indexOf('$'); },
            tokenizer(src, tokens) {
                const blockRule = /^\$\$(.*?)\$\$/s;
                const inlineRule = /^\$([^$\n]+)\$/;
                let match;
                if ((match = blockRule.exec(src))) {
                    return { type: 'math', raw: match[0], text: match[1], displayMode: true };
                } else if ((match = inlineRule.exec(src))) {
                    return { type: 'math', raw: match[0], text: match[1], displayMode: false };
                }
            },
            renderer(token) {
                const safeText = token.text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                return token.displayMode ? `$$${safeText}$$` : `$${safeText}$`;
            }
        };
        marked.use({ extensions: [mathExtension] });

        const Icons = {
            Menu: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>,
            User: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            Alert: () => <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ef4444" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>,
            Printer: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>,
            Info: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>,
            Pause: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>,
            Play: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        };

        const DonutChart = ({ percentage, color, label }) => (
            <div className="flex flex-col items-center print-break-avoid">
                <svg viewBox="0 0 36 36" className="circular-chart w-28 h-28 mb-3">
                    <path className="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    <path className="circle" stroke={color} strokeDasharray={`${percentage}, 100`} d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    <text x="18" y="20.5" textAnchor="middle" className="text-3xl font-black fill-slate-800" style={{fontSize: "9px"}}>{percentage}%</text>
                </svg>
                <span className="font-bold text-slate-500 uppercase tracking-widest text-xs">{label}</span>
            </div>
        );

        const App = () => {
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [answers, setAnswers] = useState({}); 
            const [status, setStatus] = useState({});   
            const [timeLeft, setTimeLeft] = useState(TEST_DATA.durationMinutes * 60);
            const [isSubmitted, setIsSubmitted] = useState(false);
            const [isPaletteOpen, setIsPaletteOpen] = useState(false);
            const [isPaused, setIsPaused] = useState(false); 
            const [warnings, setWarnings] = useState(0);
            const [showWarning, setShowWarning] = useState(false);

            useEffect(() => {
                if (window.MathJax && window.MathJax.typesetPromise) {
                    window.MathJax.typesetPromise().catch((err) => console.log('MathJax error: ', err));
                }
            });

            useEffect(() => {
                if (!TEST_DATA.strictMode || isSubmitted) return;
                const handleVisibility = () => {
                    if (document.hidden) {
                        setWarnings(w => w + 1);
                        setShowWarning(true);
                    }
                };
                document.addEventListener("visibilitychange", handleVisibility);
                return () => document.removeEventListener("visibilitychange", handleVisibility);
            }, [isSubmitted]);

            useEffect(() => {
                if (isSubmitted || isPaused) return; 
                const timer = setInterval(() => {
                    setTimeLeft(prev => {
                        if (prev <= 0) { handleSubmit(true); return 0; }
                        return prev - 1;
                    });
                }, 1000);
                return () => clearInterval(timer);
            }, [isSubmitted, isPaused]); 

            const formatTime = (seconds) => {
                const h = Math.floor(seconds / 3600);
                const m = Math.floor((seconds % 3600) / 60);
                const s = seconds % 60;
                return `${h > 0 ? h + ':' : ''}${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            };

            const advanceQuestion = () => {
                if (currentQIndex < TEST_DATA.questions.length - 1) {
                    const nextQ = TEST_DATA.questions[currentQIndex + 1];
                    if (status[nextQ.id] === 'not_visited') setStatus(prev => ({ ...prev, [nextQ.id]: 'not_answered' }));
                    setCurrentQIndex(prev => prev + 1);
                }
            };

            const handleOptionSelect = (optId) => {
                if(isPaused) return;
                setAnswers(prev => ({ ...prev, [TEST_DATA.questions[currentQIndex].id]: optId }));
            };

            const handleSaveAndNext = () => {
                if(isPaused) return;
                const cid = TEST_DATA.questions[currentQIndex].id;
                setStatus(prev => ({ ...prev, [cid]: answers[cid] ? 'answered' : 'not_answered' }));
                advanceQuestion();
            };

            const handleMarkForReview = () => {
                if(isPaused) return;
                const cid = TEST_DATA.questions[currentQIndex].id;
                setStatus(prev => ({ ...prev, [cid]: answers[cid] ? 'marked_answered' : 'marked' }));
                advanceQuestion();
            };

            const handleClearResponse = () => {
                if(isPaused) return;
                const cid = TEST_DATA.questions[currentQIndex].id;
                setAnswers(prev => { const newAns = { ...prev }; delete newAns[cid]; return newAns; });
                setStatus(prev => ({ ...prev, [cid]: 'not_answered' }));
            };

            const handlePaletteClick = (index) => {
                if(isPaused) return;
                const cid = TEST_DATA.questions[currentQIndex].id;
                if (status[cid] === 'not_visited' || (status[cid] === 'not_answered' && !answers[cid])) {
                    setStatus(prev => ({ ...prev, [cid]: 'not_answered' }));
                }
                const tid = TEST_DATA.questions[index].id;
                if (status[tid] === 'not_visited') setStatus(prev => ({ ...prev, [tid]: 'not_answered' }));
                setCurrentQIndex(index);
                setIsPaletteOpen(false); 
            };

            const handleSubmit = (auto = false) => {
                if (auto || confirm("Are you sure you want to submit the test? No changes can be made after submission.")) {
                    setIsSubmitted(true);
                    setIsPaused(false);
                }
            };

            const counts = useMemo(() => {
                const c = { answered: 0, not_answered: 0, marked: 0, marked_answered: 0, not_visited: 0 };
                Object.values(status).forEach(s => { if (c[s] !== undefined) c[s]++; });
                return c;
            }, [status]);

            if (isSubmitted) {
                let score = 0, correct = 0, wrong = 0;
                TEST_DATA.questions.forEach(q => {
                    if (answers[q.id] === q.correctAnswer) { score += TEST_DATA.marksForCorrect; correct++; } 
                    else if (answers[q.id]) { score -= TEST_DATA.marksForWrong; wrong++; }
                });

                const attempted = correct + wrong;
                const accuracy = attempted > 0 ? Math.round((correct / attempted) * 100) : 0;
                const percentage = Math.max(0, Math.round((score / TEST_DATA.totalMarks) * 100));
                const isPass = percentage >= TEST_DATA.passPercentage;

                return (
                    <div className="h-full overflow-y-auto p-4 md:p-8 print:p-0 bg-slate-50 print:bg-white print:h-auto print:overflow-visible">
                        <div className="max-w-5xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100 print-border-none print:shadow-none">
                            <div className="bg-blue-600 text-white p-10 relative print:text-slate-900 print:bg-white print:border-b-2 print:border-slate-300 print:p-0 print:mb-8">
                                <div className="absolute top-0 right-0 w-64 h-64 bg-white opacity-5 rounded-full -mt-20 -mr-20 blur-2xl print-hidden"></div>
                                <div className="flex flex-col md:flex-row justify-between items-center gap-6 relative z-10 print:flex-row print:items-start">
                                    <div className="text-center md:text-left">
                                        <h1 className="text-4xl font-extrabold mb-2 tracking-tight">Performance Report</h1>
                                        <p className="opacity-90 font-semibold text-lg">{TEST_DATA.title}</p>
                                        <p className="opacity-70 text-sm mt-1">{TEST_DATA.organization}</p>
                                    </div>
                                    <div className="flex gap-6 items-center">
                                        <div className={`px-6 py-4 rounded-2xl border-2 backdrop-blur-md print:border-2 print:bg-transparent flex items-center justify-between gap-6 min-w-[200px] ${isPass ? 'bg-green-500/20 border-green-400 print:border-green-600 print:text-green-700' : 'bg-red-500/20 border-red-400 print:border-red-600 print:text-red-700'}`}>
                                            <div className="text-left">
                                                <div className="text-[10px] uppercase tracking-widest font-bold opacity-80 mb-0.5">Final Status</div>
                                                <div className="text-2xl font-black leading-none">{isPass ? 'PASSED' : 'FAILED'}</div>
                                            </div>
                                            <div className="text-4xl leading-none">{isPass ? '🎉' : '❌'}</div>
                                        </div>
                                    </div>
                                </div>
                                <button onClick={() => window.print()} className="print-hidden absolute right-6 top-6 bg-white/20 hover:bg-white/30 text-white px-5 py-2.5 rounded-full font-bold transition shadow-lg backdrop-blur-sm flex items-center gap-2">
                                    <Icons.Printer/> Save PDF
                                </button>
                            </div>

                            <div className="p-10 grid grid-cols-1 md:grid-cols-3 gap-8 border-b border-slate-100 bg-slate-50/50 print:bg-white print:border-b-0 print-break-avoid">
                                <DonutChart percentage={percentage} color="#2563eb" label="Score Percentage" />
                                <DonutChart percentage={accuracy} color="#10b981" label="Accuracy" />
                                <div className="flex flex-col justify-center space-y-4">
                                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center print:border-slate-300">
                                        <span className="text-slate-500 font-bold">Total Marks</span>
                                        <span className="text-3xl font-black text-blue-600">{score} <span className="text-lg text-slate-400 font-bold">/ {TEST_DATA.totalMarks}</span></span>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-green-50 p-4 rounded-2xl border border-green-100 text-center print:border-slate-300 print:bg-white">
                                            <div className="text-green-600 text-3xl font-black">{correct}</div>
                                            <div className="text-xs font-bold text-green-700 uppercase mt-1">Correct</div>
                                        </div>
                                        <div className="bg-red-50 p-4 rounded-2xl border border-red-100 text-center print:border-slate-300 print:bg-white">
                                            <div className="text-red-600 text-3xl font-black">{wrong}</div>
                                            <div className="text-xs font-bold text-red-700 uppercase mt-1">Wrong</div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="p-6 md:p-10">
                                <h2 className="text-2xl font-extrabold text-slate-800 mb-8 flex items-center gap-3 border-b border-slate-200 pb-4">
                                    Detailed Solutions
                                </h2>
                                <div className="space-y-8">
                                    {TEST_DATA.questions.map((q, i) => {
                                        const userAns = answers[q.id];
                                        const isCorrect = userAns === q.correctAnswer;
                                        const isSkipped = !userAns;
                                        let borderColor = isCorrect ? 'border-green-500' : (isSkipped ? 'border-slate-300' : 'border-red-500');
                                        let bgClass = isCorrect ? 'bg-green-50/50' : (isSkipped ? 'bg-white' : 'bg-red-50/50');

                                        return (
                                            <div key={q.id} className={`border-l-8 ${borderColor} ${bgClass} p-6 rounded-2xl shadow-sm border border-slate-100 print-break-avoid print:border print:border-l-8 print:shadow-none`}>
                                                <div className="flex gap-4 mb-6">
                                                    <span className="font-black text-slate-400 text-xl">Q{i+1}.</span>
                                                    <div className="flex-1 text-slate-800 markdown-body text-[16px]" dangerouslySetInnerHTML={{ __html: marked.parse(q.question) }}></div>
                                                </div>
                                                <div className="ml-10 space-y-3 mb-6">
                                                    {q.options.map(opt => {
                                                        const isUserOpt = opt.id === userAns;
                                                        const isCorrectOpt = opt.id === q.correctAnswer;
                                                        
                                                        let optClass = "text-slate-600 bg-white border-slate-200";
                                                        let icon = "○";
                                                        if (isCorrectOpt) { optClass = "text-green-800 bg-green-100 border-green-300 font-bold"; icon = "✓"; }
                                                        else if (isUserOpt) { optClass = "text-red-700 bg-red-100 border-red-300 line-through"; icon = "✗"; }

                                                        return (
                                                            <div key={opt.id} className={`flex items-start gap-3 p-3 rounded-xl border ${optClass} print:bg-transparent print:border-slate-300`}>
                                                                <span className="mt-0.5 font-bold">{icon}</span>
                                                                <div className="markdown-body" style={{marginBottom: 0}} dangerouslySetInnerHTML={{ __html: marked.parseInline(opt.text) }}></div>
                                                            </div>
                                                        )
                                                    })}
                                                </div>
                                                {q.explanation && (
                                                    <div className="ml-10 p-5 bg-blue-50/50 rounded-xl border border-blue-100 print:bg-slate-50 print:border-slate-200">
                                                        <strong className="block mb-2 flex items-center gap-2 text-blue-700"><Icons.Info/> Expert Explanation:</strong>
                                                        <div className="markdown-body text-sm text-slate-700" dangerouslySetInnerHTML={{ __html: marked.parse(q.explanation) }}></div>
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            const currentQuestion = TEST_DATA.questions[currentQIndex];

            return (
                <div className="flex flex-col h-full bg-slate-50 relative">
                    {showWarning && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-white p-8 rounded-3xl shadow-2xl max-w-md text-center border-2 border-red-500">
                                <div className="w-20 h-20 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4 animate-bounce"><Icons.Alert /></div>
                                <h2 className="text-2xl font-black text-slate-800 mb-2">Warning Recorded!</h2>
                                <p className="text-slate-600 mb-6 font-medium">You switched tabs or minimized the window. (Warning {warnings})</p>
                                <button onClick={() => setShowWarning(false)} className="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-4 rounded-full shadow-lg transition transform active:scale-95 text-lg">I Understand</button>
                            </div>
                        </div>
                    )}

                    {isPaused && (
                        <div className="fixed inset-0 z-[90] bg-white/80 backdrop-blur-md flex flex-col items-center justify-center p-4">
                            <div className="bg-white p-10 rounded-3xl shadow-2xl border border-slate-200 text-center max-w-sm w-full">
                                <div className="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-6"><Icons.Pause /></div>
                                <h2 className="text-3xl font-black text-slate-800 mb-3">Test Paused</h2>
                                <button onClick={() => setIsPaused(false)} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-full shadow-lg transition transform active:scale-95 flex items-center justify-center gap-3 text-lg">
                                    <Icons.Play /> Resume Test
                                </button>
                            </div>
                        </div>
                    )}

                    <header className="glass-nav border-b border-slate-200 h-20 flex items-center justify-between px-6 z-20 sticky top-0 shadow-sm">
                        <div className="flex items-center gap-4">
                            <div className="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center shadow-lg shadow-blue-600/30 text-white font-black text-xl">E</div>
                            <div className="hidden sm:block">
                                <h1 className="font-extrabold text-lg text-slate-800 leading-tight">{TEST_DATA.organization}</h1>
                                <p className="text-xs text-slate-500 font-medium truncate max-w-[200px]">{TEST_DATA.title}</p>
                            </div>
                        </div>
                        <div className="absolute left-1/2 top-1/2 transform -translate-x-1/2 -translate-y-1/2 flex items-center">
                            <div className="flex items-center bg-white rounded-full border border-slate-200 p-1 shadow-sm overflow-hidden">
                                <div className="px-4 py-1.5 bg-slate-100 rounded-full text-xs font-bold text-slate-500 flex items-center gap-2">
                                    <span className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> LIVE
                                </div>
                                <div className="px-6 font-mono font-black text-xl text-blue-600 tracking-widest">{formatTime(timeLeft)}</div>
                            </div>
                        </div>
                        <div className="flex items-center gap-3">
                            {!isPaused && !isSubmitted && (
                                <button onClick={() => setIsPaused(true)} className="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-600 hover:bg-slate-200 hover:text-blue-600 transition" title="Pause Test"><Icons.Pause /></button>
                            )}
                            <div className="hidden md:flex items-center gap-3 pl-3 border-l border-slate-200">
                                <div className="w-10 h-10 rounded-full bg-gradient-to-r from-blue-400 to-indigo-500 p-0.5 shadow-md">
                                    <div className="w-full h-full bg-white rounded-full flex items-center justify-center text-slate-800"><Icons.User /></div>
                                </div>
                            </div>
                            <button className="md:hidden w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-600" onClick={() => setIsPaletteOpen(!isPaletteOpen)}><Icons.Menu /></button>
                        </div>
                    </header>

                    <div className="flex-1 flex overflow-hidden relative">
                        <div className={`flex-1 flex flex-col w-full transition-all duration-300 ${isPaused ? 'blur-content' : ''}`}>
                            <div className="flex-1 overflow-y-auto p-4 md:p-8 lg:p-12">
                                <div className="max-w-4xl mx-auto bg-white rounded-3xl p-8 shadow-sm border border-slate-100">
                                    <div className="flex justify-between items-center mb-8 pb-4 border-b border-slate-100">
                                        <div className="flex items-center gap-3">
                                            <span className="bg-blue-600 text-white px-5 py-2 rounded-full text-sm font-black shadow-md shadow-blue-600/20">Question {currentQIndex + 1}</span>
                                        </div>
                                        <div className="flex gap-2">
                                            <span className="bg-green-50 text-green-600 px-4 py-1.5 rounded-full text-xs font-bold border border-green-200">+{TEST_DATA.marksForCorrect}</span>
                                            <span className="bg-red-50 text-red-600 px-4 py-1.5 rounded-full text-xs font-bold border border-red-200">-{TEST_DATA.marksForWrong}</span>
                                        </div>
                                    </div>
                                    <div className="text-[17px] text-slate-800 markdown-body mb-8 leading-relaxed" dangerouslySetInnerHTML={{ __html: marked.parse(currentQuestion.question) }}></div>
                                    <div className="space-y-4">
                                        {currentQuestion.options.map(opt => {
                                            const isSelected = answers[currentQuestion.id] === opt.id;
                                            return (
                                                <div key={opt.id} onClick={() => handleOptionSelect(opt.id)} className={`group relative p-5 rounded-2xl cursor-pointer flex items-center gap-5 transition-all duration-200 border-2 ${isSelected ? 'border-blue-600 bg-blue-50/50 shadow-sm option-selected' : 'border-slate-200 hover:border-blue-300 hover:bg-slate-50'}`}>
                                                    <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center flex-shrink-0 custom-radio ${isSelected ? 'border-blue-600 bg-white' : 'border-slate-300 group-hover:border-blue-400'}`}></div>
                                                    <div className="text-slate-700 font-medium markdown-body flex-1 text-[16px]" style={{marginBottom:0}} dangerouslySetInnerHTML={{ __html: marked.parseInline(opt.text) }}></div>
                                                </div>
                                            )
                                        })}
                                    </div>
                                </div>
                            </div>
                            <div className="glass-nav border-t border-slate-200 p-5 md:px-12 flex items-center justify-between z-10">
                                <div className="flex gap-3">
                                    <button onClick={handleMarkForReview} className="px-6 py-3.5 bg-purple-50 text-purple-700 hover:bg-purple-100 rounded-full font-bold text-sm transition border border-purple-200"><span className="hidden md:inline">Mark for Review</span><span className="md:hidden">Review</span></button>
                                    <button onClick={handleClearResponse} className="px-6 py-3.5 bg-slate-100 text-slate-600 hover:bg-slate-200 rounded-full font-bold text-sm transition">Clear</button>
                                </div>
                                <button onClick={handleSaveAndNext} className="px-8 py-3.5 bg-blue-600 hover:bg-blue-700 text-white rounded-full font-black text-sm shadow-lg shadow-blue-600/30 transition transform active:scale-95 flex items-center gap-2">Save & Next <span className="text-xl leading-none">→</span></button>
                            </div>
                        </div>

                        <div className={`absolute inset-y-0 right-0 w-[320px] bg-white shadow-2xl transform transition-transform duration-300 z-30 flex flex-col border-l border-slate-200 ${isPaletteOpen ? 'translate-x-0' : 'translate-x-full'} md:translate-x-0 md:relative`}>
                            <div className="p-5 border-b border-slate-100 flex items-center gap-4 bg-slate-50">
                                <div className="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center text-blue-600"><Icons.User /></div>
                                <div><div className="font-bold text-slate-800">Candidate</div><div className="text-xs text-slate-500">{TEST_DATA.organization} Student</div></div>
                                <button className="ml-auto md:hidden text-slate-400" onClick={() => setIsPaletteOpen(false)}>✕</button>
                            </div>
                            <div className="p-5 grid grid-cols-2 gap-4 text-xs font-semibold border-b border-slate-100">
                                <div className="flex items-center gap-2 text-slate-600"><div className="w-3 h-3 rounded-full bg-[#10b981]"></div> Answered ({counts.answered})</div>
                                <div className="flex items-center gap-2 text-slate-600"><div className="w-3 h-3 rounded-full bg-[#ef4444]"></div> Not Ans ({counts.not_answered})</div>
                                <div className="flex items-center gap-2 text-slate-600"><div className="w-3 h-3 rounded-full bg-[#8b5cf6]"></div> Marked ({counts.marked + counts.marked_answered})</div>
                                <div className="flex items-center gap-2 text-slate-600"><div className="w-3 h-3 rounded-full border-2 border-slate-300 bg-slate-50"></div> Unvisited ({counts.not_visited})</div>
                            </div>
                            <div className="flex-1 overflow-y-auto p-5">
                                <div className="font-bold text-slate-700 mb-4 text-sm">Question Navigation:</div>
                                <div className="grid grid-cols-5 gap-2.5">
                                    {TEST_DATA.questions.map((q, idx) => (
                                        <button key={q.id} onClick={() => handlePaletteClick(idx)} className={`h-11 w-full flex items-center justify-center font-bold text-sm rounded-xl transition shadow-sm border ${currentQIndex === idx ? 'current-question' : 'border-transparent'} status-${status[q.id]}`}>{idx + 1}</button>
                                    ))}
                                </div>
                            </div>
                            <div className="p-5 border-t border-slate-100 bg-white">
                                <button onClick={() => handleSubmit(false)} className="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black py-4 rounded-2xl shadow-lg shadow-emerald-500/20 transition transform active:scale-95 text-lg">Submit Final Test</button>
                            </div>
                        </div>
                    </div>
                    {isPaletteOpen && <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-20 md:hidden" onClick={() => setIsPaletteOpen(false)}></div>}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
