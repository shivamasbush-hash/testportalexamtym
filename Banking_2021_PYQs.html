    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const TEST_DATA = {"title": "Banking 2021 PYQs", "organization": "ExamTym", "durationMinutes": 40, "totalMarks": 46.0, "marksForCorrect": 2.0, "marksForWrong": 0.0, "passPercentage": 40, "shuffle": false, "strictMode": false, "questions": [{"question": "Which of the following statements is correct relating to the Indian Financial System?", "options": [{"id": "1", "text": "RBI has direct supervision over depositories and mutual funds."}, {"id": "2", "text": "Monetary control is exercised through cash reserve ratio and statutory liquidity ratio."}, {"id": "3", "text": "Primary dealers mainly deal in shares, mutual fund units."}, {"id": "4", "text": "The decrease in statutory liquidity ratio contracts the credit creation."}], "correctAnswer": "2", "explanation": "Key Concept:\n* **Monetary Control:** The Reserve Bank of India (RBI) utilizes quantitative tools like the Cash Reserve Ratio (CRR) and Statutory Liquidity Ratio (SLR) to control the money supply and credit creation in the economy.\n* **Regulatory Jurisdiction:** SEBI (Securities and Exchange Board of India), not the RBI, has direct supervisory authority over depositories (like NSDL/CDSL) and Mutual Funds. \n* **SLR Dynamics:** A decrease in the SLR actually *expands* credit creation, as banks are required to park fewer funds in liquid assets and have more capital available to lend.\n**Related Concepts:**\n* **Primary Dealers:** Registered entities with the RBI that deal primarily in Government Securities (G-Secs), not corporate equity shares or mutual funds.\n* **Credit Multiplier:** The ratio that denotes how much new money will be created by the banking system for every unit of base money injected.", "id": 1}, {"question": "Which one of the following statements is not true about the Indian Money Market?", "options": [{"id": "1", "text": "Non-Banking Finance Companies (NBFCs) are financial institutions that constitute an organized component of the money market."}, {"id": "2", "text": "Money market mutual funds are allowed to sell units to corporates and individuals."}, {"id": "3", "text": "A well-developed money market is essential for a modern economy."}, {"id": "4", "text": "In the Indian Money Market, the predominant place is enjoyed by government and semi-government securities."}], "correctAnswer": "1", "explanation": "Key Concept:\n* **Structure of Money Market:** The Indian Money Market is a market for short-term funds (less than one year). Its organized component primarily comprises the RBI, Commercial Banks, Cooperative Banks, and specialized primary dealers.\n* **Role of NBFCs:** While NBFCs are part of the organized *financial system* (mostly operating in the capital and credit markets), they are not considered a core organized component of the *money market* itself, though they do participate by issuing Commercial Papers.\n* **Market Dominance:** Government securities (like Treasury Bills) dictate the highest volume and safety benchmarks in the money market.\n**Related Concepts:**\n* **Money Market Mutual Funds (MMMFs):** Funds that invest in short-term debt instruments and are accessible to both retail individuals and corporate investors.\n* **Dichotomy of Money Market:** The existence of both an organized sector (banks) and an unorganized sector (indigenous bankers, moneylenders) operating simultaneously.", "id": 2}, {"question": "Which of the following statements are false regarding electronic purse? Indicate the correct code.\n(A) Retinal pattern verification\n(B) Visual recognition\n(C) No risk of bad payment\n(D) Method of accepting payments with no cash float to manage and no risk of theft.", "options": [{"id": "1", "text": "A, B and C only"}, {"id": "2", "text": "B, C and D only"}, {"id": "3", "text": "A and B only"}, {"id": "4", "text": "C and D only"}], "correctAnswer": "3", "explanation": "Key Concept:\n* **Electronic Purse (E-Purse):** An e-purse is a smart card embedded with a microchip that stores prepaid monetary value for small, everyday transactions (e.g., transit cards, smart transit passes).\n* **Authentication Mechanisms:** E-purses generally do not require high-end biometric authentications like retinal pattern verification or visual recognition, as they are meant for fast, low-value, tap-and-go transactions.\n* **Merchant Benefits:** They eliminate the risk of bounced/bad payments and remove the need to manage physical cash floats, reducing theft risks.\n**Related Concepts:**\n* **Stored-Value Cards:** Payment cards with a monetary value stored on the card itself, not in an external account maintained by a financial institution.\n* **Biometric Authentication:** Security processes (like iris scans or fingerprints) used primarily for high-level secure access or large-value banking, not micro-payments.", "id": 3}, {"question": "Financial crises take the form of:\n(A) Currency crisis\n(B) Banking crisis\n(C) Systematic financial crisis\n(D) Foreign debt crisis", "options": [{"id": "1", "text": "A, B, C only"}, {"id": "2", "text": "A, B, D only"}, {"id": "3", "text": "B, C, D only"}, {"id": "4", "text": "A, B, C, D only"}], "correctAnswer": "4", "explanation": "Key Concept:\n* **Currency Crisis:** Occurs when a speculative attack causes a sudden, sharp depreciation in the value of a national currency (e.g., the 1997 Asian Financial Crisis).\n* **Banking Crisis:** A situation where a large number of banks face bank runs or failure simultaneously due to insolvency or illiquidity.\n* **Foreign Debt Crisis:** When a country cannot service its foreign debt obligations (sovereign default). A **Systematic Financial Crisis** is a severe disruption affecting the entire financial system, often combining the other three.\n**Related Concepts:**\n* **Contagion Effect:** A scenario where a financial crisis in one country or sector rapidly spreads to others due to interconnected markets.\n* **Twin Crises:** A simultaneous occurrence of a banking crisis and a currency crisis within an economy.", "id": 4}, {"question": "Match List I with List II:\n| List I | List II |\n| :--- | :--- |\n| (A) Market risk | (I) Associated with the efficiency with which a firm conducts its operations within the broader environment |\n| (B) Financial risk | (II) Arises due to change in operating conditions caused by conditions thrust upon the firm beyond its control |\n| (C) External business risk | (III) Variations in price sparked off due to real, social, political, and economic events |\n| (D) Internal business risk | (IV) Associated with the capital structure of a firm |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "(A) \u2013 (I), (B) \u2013 (II), (C) \u2013 (III), (D) \u2013 (IV)"}, {"id": "2", "text": "(A) \u2013 (III), (B) \u2013 (IV), (C) \u2013 (II), (D) \u2013 (I)"}, {"id": "3", "text": "(A) \u2013 (III), (B) \u2013 (I), (C) \u2013 (II), (D) \u2013 (IV)"}, {"id": "4", "text": "(A) \u2013 (IV), (B) \u2013 (III), (C) \u2013 (I), (D) \u2013 (II)"}], "correctAnswer": "2", "explanation": "Key Concept:\n* **Market Risk:** Refers to the potential for losses due to broad market movements, such as political events, economic shifts, or interest rate changes (A-III).\n* **Financial Risk:** Directly tied to how a company finances its operations; a highly leveraged firm (heavy debt in capital structure) faces higher financial risk (B-IV).\n* **External vs. Internal Risk:** External risks are macroeconomic or regulatory changes outside management's control (C-II), whereas internal risks stem from operational inefficiencies within the firm (D-I).\n**Related Concepts:**\n* **Systematic Risk:** Un-diversifiable risk that affects the overall market (similar to Market Risk).\n* **Unsystematic Risk:** Company-specific risk that can be mitigated through portfolio diversification.", "id": 5}, {"question": "Which of the following forms may not result in credit risk?\n(A) Principal and/or interest amount may not be repaid in the case of direct lending.\n(B) In case of guarantees or letters of credit, funds may not be forthcoming from the constituents upon crystallization of the liability.\n(C) Funds/Securities settlement may not be effected, in case of securities trading business.\n(D) Provide information for determining adequacy of loan loss provision.", "options": [{"id": "1", "text": "A, B and C only"}, {"id": "2", "text": "A, C and D only"}, {"id": "3", "text": "B and C only"}, {"id": "4", "text": "D only"}], "correctAnswer": "4", "explanation": "Key Concept:\n* **Nature of Credit Risk:** Credit risk is the potential that a bank borrower or counterparty will fail to meet its obligations in accordance with agreed terms (Statements A, B, and C describe actual default/failure events).\n* **Off-Balance Sheet Risk:** Guarantees and Letters of Credit (Statement B) represent contingent liabilities that crystalize into actual credit risk if the client defaults.\n* **Risk Management vs. Risk Event:** Statement (D) describes an accounting and risk *management function* (assessing provisions for bad loans), which is a tool to mitigate the impact of credit risk, not a form of credit risk itself.\n**Related Concepts:**\n* **Counterparty Risk:** A sub-category of credit risk where a party in a financial transaction (like securities trading) defaults before final settlement.\n* **Loan Loss Provision:** An expense set aside as an allowance for uncollected loans and loan payments.", "id": 6}, {"question": "Which one of the following statements is true about under the Basel I Accord, BCBS, fixed the minimum requirement of capital fund for banks at?", "options": [{"id": "1", "text": "8 percent of the total risk-weighted assets"}, {"id": "2", "text": "9 percent of the total risk-weighted assets"}, {"id": "3", "text": "10 percent of the total risk-weighted assets"}, {"id": "4", "text": "1000 crore"}], "correctAnswer": "1", "explanation": "Key Concept:\n* **Basel I Accord (1988):** Introduced by the Basel Committee on Banking Supervision (BCBS) to ensure international banks hold enough capital to absorb unexpected losses.\n* **Capital Adequacy Standard:** It universally mandated that banks must hold a minimum capital equal to **8% of their Risk-Weighted Assets (RWA)**.\n* **India's Adaptation:** While Basel I mandated 8%, the Reserve Bank of India (RBI) historically maintained a slightly more conservative stance for Indian banks, generally setting it at 9%, but the question specifically asks for the *BCBS Basel I fixed requirement*.\n**Related Concepts:**\n* **Risk-Weighted Assets (RWA):** A bank's assets weighted according to their inherent riskiness (e.g., cash has a 0% weight, while commercial loans have a 100% weight).\n* **Tier 1 Capital:** The primary funding source of a bank, consisting of equity capital and disclosed reserves.", "id": 7}, {"question": "Match List I with List II:\n| List I | List II |\n| :--- | :--- |\n| (A) Insurance Act | (I) 1988 |\n| (B) Life Insurance Corporation Act | (II) 1963 |\n| (C) Motor Vehicles Act | (III) 1938 |\n| (D) Marine Insurance Act | (IV) 1956 |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "(A) \u2013 (III), (B) \u2013 (IV), (C) \u2013 (I), (D) \u2013 (II)"}, {"id": "2", "text": "(A) \u2013 (III), (B) \u2013 (II), (C) \u2013 (I), (D) \u2013 (IV)"}, {"id": "3", "text": "(A) \u2013 (III), (B) \u2013 (II), (C) \u2013 (IV), (D) \u2013 (I)"}, {"id": "4", "text": "(A) \u2013 (IV), (B) \u2013 (III), (C) \u2013 (III), (D) \u2013 (I)\n*(Note: Option 1 has been academically corrected from the flawed original PYQ options to reflect the true historical years)*"}], "correctAnswer": "1", "explanation": "Key Concept:\n* **The Insurance Act, 1938:** The foundational framework legislation governing both life and non-life insurance sectors in India (A-III).\n* **The LIC Act, 1956:** Passed to nationalize the life insurance business in India, leading to the creation of the Life Insurance Corporation of India (B-IV).\n* **Other Acts:** The Motor Vehicles Act was comprehensively updated in 1988 (C-I), and the Marine Insurance Act, which regulates marine insurance contracts, was passed in 1963 (D-II).\n**Related Concepts:**\n* **IRDAI Act, 1999:** The act that established the Insurance Regulatory and Development Authority of India to protect policyholders and regulate the industry.\n* **General Insurance Business (Nationalisation) Act, 1972:** Nationalized the non-life insurance sector in India.", "id": 8}, {"question": "Which of the following statements are the defects of the Indian Money Market?\n(A) Profitable Investment\n(B) Dichotomy in the Indian Money Market\n(C) Financing Industry\n(D) Diversity in interest rates", "options": [{"id": "1", "text": "A, B, and C only"}, {"id": "2", "text": "B and C only"}, {"id": "3", "text": "A, B, and D only"}, {"id": "4", "text": "B and D only"}], "correctAnswer": "4", "explanation": "Key Concept:\n* **Dichotomy (Statement B):** A major structural defect in the Indian Money Market is its split into two unintegrated sectors: the organized sector (regulated by RBI) and the unorganized sector (indigenous bankers, moneylenders).\n* **Diversity in Interest Rates (Statement D):** Due to the lack of integration and varying risk profiles across the organized and unorganized sectors, there is a massive and inefficient disparity in borrowing rates.\n* **Positive Functions:** Profitable investment and financing short-term industry needs are *functions/benefits* of a money market, not defects.\n**Related Concepts:**\n* **Integration of Money Market:** The smooth transmission of monetary policy signals across all segments of the financial market.\n* **Seasonal Stringency:** Another defect of the Indian money market, where the demand for funds spikes dramatically during the harvest season.", "id": 9}, {"question": "The reasons put forth for the control over the activities of the international banks are:\n(A) These banks encourage inflation by adding stock of money supply through credit creation.\n(B) These banks sometimes are responsible for bank failures that mar the interest of the depositors.\n(C) They cause unmanageable indebtedness among the borrowing governments by charging high-interest rates.\n(D) They do not adhere to the credit allocation policy of the host government.", "options": [{"id": "1", "text": "(A), (B), (C) only"}, {"id": "2", "text": "(A), (C), (D) only"}, {"id": "3", "text": "(B), (C), (D) only"}, {"id": "4", "text": "(A), (B), (C), (D)"}], "correctAnswer": "4", "explanation": "Key Concept:\n* **Macroeconomic Control:** International banks can trigger inflation by injecting excessive foreign capital and creating uncontrolled credit lines outside the host central bank's tight supervision (Statement A).\n* **Systemic Risk:** Unregulated international operations can lead to cross-border contagion, causing bank failures that destroy local depositor wealth (Statement B).\n* **Sovereign & Policy Risk:** They have historically contributed to sovereign debt crises in developing nations (Statement C) and often ignore the host country's social/priority sector lending mandates (Statement D).\n**Related Concepts:**\n* **Basel Accords:** International regulatory frameworks designed precisely to mitigate the risks posed by globally active banks.\n* **Priority Sector Lending (PSL):** Directed lending mandates that foreign banks often struggle or resist complying with in host nations.", "id": 10}, {"question": "Arrange the following steps, in a logical sequence of debt recovery by financial institutions through Debt Recovery Tribunals (DRTs)?\n(A) Restrain him from dealing with/disposing of the concerned assets/properties pending at the hearing of the application.\n(B) Direct him to disclose particulars of properties other than those specified by the applicant bank.\n(C) Show cause within 30 days as to why the relief should not be granted to the bank.", "options": [{"id": "1", "text": "(B), (A), (C)"}, {"id": "2", "text": "(A), (B), (C)"}, {"id": "3", "text": "(B), (C), (A)"}, {"id": "4", "text": "(C), (B), (A)"}], "correctAnswer": "4", "explanation": "Key Concept:\n* **Initial Notice:** Under Section 19 of the Recovery of Debts Due to Banks and Financial Institutions (RDDBFI) Act, the DRT first issues a summons requiring the defendant to **show cause within 30 days** (C).\n* **Asset Disclosure:** To prevent the defendant from hiding wealth, the Tribunal then **directs the disclosure of property particulars** (B).\n* **Injunction:** Finally, the Tribunal issues an injunction to **restrain the defendant from disposing of or dealing with the assets** (A) until the final hearing concludes.\n**Related Concepts:**\n* **SARFAESI Act:** An alternative to DRTs that allows banks to seize and auction collateral without the intervention of the court/tribunal.\n* **Recovery Officers:** Personnel appointed under the DRT to execute the recovery certificates passed by the Presiding Officer.", "id": 11}, {"question": "Which one of the following statements is true about the risk considered for capital requirements under Basel II?", "options": [{"id": "1", "text": "Credit risk, interest rate risk, and foreign exchange risk"}, {"id": "2", "text": "Credit risk, market risk, and operational risk"}, {"id": "3", "text": "Credit risk, political risk, and country risk"}, {"id": "4", "text": "Credit risk, interest rate risk, and political risk"}], "correctAnswer": "2", "explanation": "Key Concept:\n* **Basel II Framework:** Introduced in 2004, Basel II represented a major paradigm shift from Basel I by expanding the scope of risks that required capital buffering.\n* **The Three Pillars:** Pillar 1 (Minimum Capital Requirements) explicitly mandated that banks hold capital against **Credit Risk, Market Risk, and Operational Risk**.\n* **Operational Risk Introduction:** Basel II was the first accord to formally require capital allocation for Operational Risk (losses from internal system failures, fraud, or legal risks).\n**Related Concepts:**\n* **Value at Risk (VaR):** A statistical technique used under Market Risk to measure and quantify the level of financial risk within a firm over a specific time frame.\n* **Advanced IRB Approach:** A method under Basel II allowing banks to use their own internal models to estimate credit risk components.", "id": 12}, {"question": "Which one of the followings is not the service provided under NBFCs?", "options": [{"id": "1", "text": "Leasing services"}, {"id": "2", "text": "Implementing modernisation"}, {"id": "3", "text": "Asset management services"}, {"id": "4", "text": "Mutual benefit finance services bank"}], "correctAnswer": "2", "explanation": "Key Concept:\n* **Core NBFC Functions:** Non-Banking Financial Companies provide targeted financial services such as equipment leasing, hire purchase, asset management, and microfinance.\n* **Mutual Benefit Funds:** Nidhi Companies (a type of NBFC) operate as mutual benefit finance institutions catering only to their members.\n* **Non-Financial Services:** \"Implementing modernisation\" is an operational, managerial, or engineering function within a manufacturing firm, not a financial service provided by an NBFC.\n**Related Concepts:**\n* **Asset Finance Company (AFC):** An NBFC whose principal business is the financing of physical assets supporting productive/economic activity.\n* **Shadow Banking:** The collective term for NBFCs and other financial intermediaries that facilitate credit creation across the global financial system but are not subject to strict regulatory banking oversight.", "id": 13}, {"question": "Which one of the following is not the characteristic of mutual funds?", "options": [{"id": "1", "text": "Consistent Investment process"}, {"id": "2", "text": "Strong fund management"}, {"id": "3", "text": "Diversity in interest rates"}, {"id": "4", "text": "Differences from the benchmark"}], "correctAnswer": "3", "explanation": "Key Concept:\n* **Characteristics of MFs:** Mutual funds pool money to provide professional/strong fund management, follow a consistent investment mandate, and aim to generate returns (alpha) that show differences from their respective market benchmarks.\n* **Diversity in Interest Rates:** This relates to macroeconomic conditions or defects in a fragmented money market (where different borrowers get wildly different rates), not a feature of a mutual fund product.\n**Related Concepts:**\n* **Net Asset Value (NAV):** The per-share value of a mutual fund, calculated by dividing the total value of all the cash and securities in a fund's portfolio, minus any liabilities, by the number of outstanding shares.\n* **Alpha:** A measure of the active return on an investment compared to a market index or benchmark.", "id": 14}, {"question": "Which of the following is not an approach to the structure of the Indian Financial System?\n(A) A brokerage can be either full service or discount\n(B) The financial system is concerned about money, credit, and finance, the three terms are intimately related yet are somewhat different from each other\n(C) Housing finance simply refers to providing finance for venture capital\n(D) Financial instruments may also be divided according to asset class, which depends on whether they are debt-based or equity-based", "options": [{"id": "1", "text": "(A), (C), and (D) only"}, {"id": "2", "text": "(B) and (D) only"}, {"id": "3", "text": "(C) only"}, {"id": "4", "text": "(A) and (C) only"}], "correctAnswer": "3", "explanation": "Key Concept:\n* **False Statement Identification:** Statement (C) is factually incorrect. Housing finance refers to providing credit for the purchase, construction, or renovation of residential real estate. \n* **Venture Capital:** This is high-risk private equity capital provided to early-stage startups with high growth potential, completely unrelated to housing finance.\n* **Valid Approaches:** Brokerage models (A), conceptual definitions of credit/money (B), and debt vs. equity asset classes (D) are all valid components of the financial system structure.\n**Related Concepts:**\n* **Discount Broker:** A stockbroker who carries out buy and sell orders at a reduced commission compared to a full-service broker but provides no investment advice.\n* **National Housing Bank (NHB):** The apex regulatory body for overall regulation and licensing of housing finance companies in India.", "id": 15}, {"question": "Given below are two statements:\nStatement I: Capital market plays an important role in mobilising resources and diverting them in productive channels.\nStatement II: Capital market is a market where buyers and sellers engage in trade of financial securities like bonds, stocks, etc.\nIn the light of the above statements, choose the correct answer from the options given below:", "options": [{"id": "1", "text": "Both Statement I and Statement II are true"}, {"id": "2", "text": "Both Statement I and Statement II are false"}, {"id": "3", "text": "Statement I is true but Statement II is false"}, {"id": "4", "text": "Statement I is false but Statement II is true"}], "correctAnswer": "1", "explanation": "Key Concept:\n* **Capital Market Definition (Statement II):** It is indeed the venue for trading long-term financial instruments, primarily equities (stocks) and debt (bonds).\n* **Economic Function (Statement I):** The primary macroeconomic role of the capital market is capital formation\u2014mobilizing idle savings from households and efficiently allocating them to corporate and government entities for productive investments (infrastructure, manufacturing).\n**Related Concepts:**\n* **Primary Market:** The segment of the capital market where new securities are issued directly by companies to investors (IPOs).\n* **Secondary Market:** The segment where already issued securities are traded among investors (Stock Exchanges).", "id": 16}, {"question": "Match List I with List II:\n| List I | List II |\n| :--- | :--- |\n| A. Role of Commercial Bank | I. Help to consumers |\n| B. NBFC service | II. Mutual saving bank |\n| C. Non-depository Institution | III. Hire purchase |\n| D. Depository Institution | IV. Mutual fund |\nChoose the correct answer from the options given below:", "options": [{"id": "1", "text": "A - I, B - III, C - IV, D - II"}, {"id": "2", "text": "A - II, B - I, C - III, D - IV"}, {"id": "3", "text": "A - III, B - IV, C - II, D - I"}, {"id": "4", "text": "A - IV, B - II, C - I, D - III"}], "correctAnswer": "1", "explanation": "Key Concept:\n* **Commercial Banks:** A core role of retail commercial banking is providing credit and transaction \"help to consumers\" (A-I).\n* **NBFC Service:** Non-Banking Financial Companies frequently specialize in vehicle and equipment financing through \"Hire Purchase\" agreements (B-III).\n* **Institution Types:** A Mutual Fund is an investment vehicle, making it a \"Non-depository Institution\" (C-IV). Conversely, a Mutual Saving Bank accepts retail deposits, making it a \"Depository Institution\" (D-II).\n**Related Concepts:**\n* **Hire Purchase:** A system of acquiring goods on credit whereby the purchaser pays for the goods in installments, gaining ownership only upon the final payment.\n* **Depository vs Non-Depository:** Depository institutions (banks, credit unions) legally accept public deposits. Non-depository institutions (insurance companies, mutual funds) pool money but do not hold standard deposit accounts.", "id": 17}, {"question": "Which of the following are the limitations in the creation of credit of commercial banks?\nA. The amount of cash that commercial banks possess\nB. Supply of collateral security\nC. Monetary policy of the central bank\nD. Allied deposits scheme\nE. Deposits linked with special benefits", "options": [{"id": "1", "text": "A, B and C only"}, {"id": "2", "text": "A, D and E only"}, {"id": "3", "text": "C and D only"}, {"id": "4", "text": "D and E only\n*(Note: Option 1 has been academically corrected from the flawed original PYQ options to reflect the accurate economic mechanisms)*"}], "correctAnswer": "1", "explanation": "Key Concept:\n* **Primary Deposits (Cash):** The fundamental limit to a bank's ability to create credit (loans) is the amount of initial cash deposits (A) it holds from the public.\n* **Monetary Policy:** The Central Bank (RBI) strictly limits credit creation by mandating reserve ratios (CRR and SLR). A higher CRR means less money available to lend (C).\n* **Collateral Supply:** Banks cannot lend in a vacuum; credit creation is constrained by the availability of creditworthy borrowers with adequate collateral security (B). \n**Related Concepts:**\n* **Credit Multiplier Formula:** $1 / CRR$. It dictates the theoretical maximum amount of money the banking system can create from a primary deposit.\n* **Leakages:** Cash withdrawals by the public act as a 'leakage' from the banking system, further limiting the credit creation multiplier.", "id": 18}, {"question": "Arrange the following steps in a logical sequence of the claim settlement procedure in the Insurance:\nA. Scrutinisation\nB. Investigation of an assessment\nC. Claim form\nD. Notice of loss\nE. Settlement and Arbitration", "options": [{"id": "1", "text": "A, B, C, D, E"}, {"id": "2", "text": "C, A, D, B, E"}, {"id": "3", "text": "C, B, A, E, D"}, {"id": "4", "text": "D, C, A, B, E"}], "correctAnswer": "4", "explanation": "Key Concept:\n* **Intimation (D):** The first step in any insurance claim is providing the insurer with an immediate \"Notice of loss\" regarding the event (accident, theft, death).\n* **Filing & Scrutiny (C, A):** The insured then submits a detailed \"Claim form\" (C), which the insurance company subjects to initial \"Scrutinisation\" (A) for basic policy validity and coverage.\n* **Evaluation & Closure (B, E):** A surveyor conducts an \"Investigation of an assessment\" (B) to determine the exact loss value, leading finally to \"Settlement\" or legal Arbitration if disputed (E).\n**Related Concepts:**\n* **Surveyor/Loss Assessor:** An independent professional appointed by the insurance company to assess the extent of the loss.\n* **Utmost Good Faith (Uberrimae Fidei):** The principle requiring the insured to declare all material facts honestly during the claim process.", "id": 19}, {"question": "Which of the following is INCORRECT about ways, the RBI can affect the structure of interest rates?\nA. By changing the treasury bill rate\nB. Blending of lending and trading activities\nC. By changing the Bank rate\nD. Fixing the maximum interest on time deposits with the bank\nE. Ineffective tapping and mobilization of savings", "options": [{"id": "1", "text": "A and D only"}, {"id": "2", "text": "A, C, D and E only"}, {"id": "3", "text": "B and E only"}, {"id": "4", "text": "D and E only"}], "correctAnswer": "3", "explanation": "Key Concept:\n* **RBI's Interest Rate Tools:** The RBI legitimately manipulates interest rates by changing the Bank Rate (C), altering Treasury Bill cut-off yields (A), and historically holding the power to fix maximum interest rates on deposits (D) to manage bank competition.\n* **Incorrect Statements:** \"Blending of lending and trading activities\" (B) is a commercial banking business strategy, not a central bank monetary tool. \"Ineffective tapping of savings\" (E) is a macroeconomic outcome/failure, not a deliberate mechanism to set interest rates.\n**Related Concepts:**\n* **Bank Rate:** The standard rate at which the RBI is prepared to buy or re-discount bills of exchange or other commercial paper from banks.\n* **Deregulation of Interest Rates:** Post-1990s reforms in India largely stripped away RBI's direct fixing of deposit rates, allowing banks to set their own based on market dynamics.", "id": 20}, {"question": "Which one of the following statements is FALSE regarding transactions of Internet Banking?", "options": [{"id": "1", "text": "Balance inquiry"}, {"id": "2", "text": "Statement of account is for a specific period"}, {"id": "3", "text": "Transfer of funds from one account to another account"}, {"id": "4", "text": "Withdrawal of cash anywhere in India"}], "correctAnswer": "4", "explanation": "Key Concept:\n* **Digital Limitations:** Internet Banking facilitates completely digital transactions such as checking balances, downloading statements, and electronic fund transfers (NEFT/RTGS/IMPS).\n* **Physical Cash:** It is physically impossible to \"withdraw cash\" directly through an Internet Banking web portal or mobile app. Cash withdrawal requires a physical touchpoint, such as an ATM (Automated Teller Machine) or a bank branch.\n**Related Concepts:**\n* **Core Banking Solution (CBS):** The centralized backend software system that allows customers to operate their accounts from any branch and via internet banking.\n* **Two-Factor Authentication (2FA):** The security protocol used in internet banking to verify fund transfers (e.g., Password + OTP).", "id": 21}, {"question": "Which of the following is NOT the feature of the Indian capital market?", "options": [{"id": "1", "text": "Co-promotes state-level venture funds"}, {"id": "2", "text": "Government rules and regulations"}, {"id": "3", "text": "Link between savers and investment opportunities"}, {"id": "4", "text": "Utilises intermediaries"}], "correctAnswer": "1", "explanation": "Key Concept:\n* **Core Market Features:** The capital market functions as a highly regulated entity (2) that requires intermediaries like brokers and underwriters (4) to establish a link between household savers and corporate investments (3).\n* **Institutional Role vs. Market Feature:** Co-promoting state-level venture funds is specific activity performed by Development Financial Institutions (like SIDBI) or state governments. It is not an inherent structural \"feature\" of the capital market itself.\n**Related Concepts:**\n* **SEBI (Securities and Exchange Board of India):** The statutory body responsible for establishing the government rules and regulations governing the capital market.\n* **Intermediaries:** Entities like merchant bankers, stockbrokers, and depositories that facilitate capital market transactions.", "id": 22}, {"question": "Which of the following order is followed in the issue of shares under the \"Fixed Price Offer Method\"?\nA. Issue of a prospectus\nB. Receipt by the company of application for share\nC. Selection of merchant banker\nD. Issue of share certificates\nE. Allotment of shares to the applicant", "options": [{"id": "1", "text": "A, D, E, C, B"}, {"id": "2", "text": "C, A, B, E, D"}, {"id": "3", "text": "C, B, A, D, E"}, {"id": "4", "text": "E, B, A, C, D"}], "correctAnswer": "2", "explanation": "Key Concept:\n* **Preparation (C):** A company first appoints a Lead Manager/Merchant Banker to handle the IPO process.\n* **Marketing (A):** The company files and issues a Prospectus detailing the fixed price of the shares to the public.\n* **Subscription (B):** Investors read the prospectus and submit their applications along with the application money.\n* **Finalization (E, D):** Post-closure, the company allocates the shares via \"Allotment\" (E) and finally issues \"Share certificates\" (D) (or credits them to demat accounts) to successful applicants.\n**Related Concepts:**\n* **Fixed Price vs. Book Building:** In a Fixed Price issue, the share price is predetermined. In Book Building, a price band is offered, and the final price is determined by investor demand.\n* **Prospectus:** A formal legal document that provides details about an investment offering to the public.", "id": 23}]};

        marked.setOptions({ breaks: true, gfm: true });

        const mathExtension = {
            name: 'math',
            level: 'inline',
            start(src) { return src.indexOf('$'); },
            tokenizer(src, tokens) {
                const blockRule = /^\$\$(.*?)\$\$/s;
                const inlineRule = /^\$([^$\n]+)\$/;
                let match;
                if ((match = blockRule.exec(src))) {
                    return { type: 'math', raw: match[0], text: match[1], displayMode: true };
                } else if ((match = inlineRule.exec(src))) {
                    return { type: 'math', raw: match[0], text: match[1], displayMode: false };
                }
            },
            renderer(token) {
                const safeText = token.text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                return token.displayMode ? `$$${safeText}$$` : `$${safeText}$`;
            }
        };
        marked.use({ extensions: [mathExtension] });

        const Icons = {
            Menu: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>,
            User: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            Alert: () => <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ef4444" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>,
            Printer: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>,
            Info: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>,
            Pause: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>,
            Play: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        };

        const DonutChart = ({ percentage, color, label }) => (
            <div className="flex flex-col items-center print-break-avoid">
                <svg viewBox="0 0 36 36" className="circular-chart w-28 h-28 mb-3">
                    <path className="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    <path className="circle" stroke={color} strokeDasharray={`${percentage}, 100`} d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    <text x="18" y="20.5" textAnchor="middle" className="text-3xl font-black fill-slate-800" style={{fontSize: "9px"}}>{percentage}%</text>
                </svg>
                <span className="font-bold text-slate-500 uppercase tracking-widest text-xs">{label}</span>
            </div>
        );

        const App = () => {
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [answers, setAnswers] = useState({}); 
            const [status, setStatus] = useState({});   
            const [timeLeft, setTimeLeft] = useState(TEST_DATA.durationMinutes * 60);
            const [isSubmitted, setIsSubmitted] = useState(false);
            const [isPaletteOpen, setIsPaletteOpen] = useState(false);
            const [isPaused, setIsPaused] = useState(false); 
            const [warnings, setWarnings] = useState(0);
            const [showWarning, setShowWarning] = useState(false);

            useEffect(() => {
                if (window.MathJax && window.MathJax.typesetPromise) {
                    window.MathJax.typesetPromise().catch((err) => console.log('MathJax error: ', err));
                }
            });

            useEffect(() => {
                if (!TEST_DATA.strictMode || isSubmitted) return;
                const handleVisibility = () => {
                    if (document.hidden) {
                        setWarnings(w => w + 1);
                        setShowWarning(true);
                    }
                };
                document.addEventListener("visibilitychange", handleVisibility);
                return () => document.removeEventListener("visibilitychange", handleVisibility);
            }, [isSubmitted]);

            useEffect(() => {
                if (isSubmitted || isPaused) return; 
                const timer = setInterval(() => {
                    setTimeLeft(prev => {
                        if (prev <= 0) { handleSubmit(true); return 0; }
                        return prev - 1;
                    });
                }, 1000);
                return () => clearInterval(timer);
            }, [isSubmitted, isPaused]); 

            const formatTime = (seconds) => {
                const h = Math.floor(seconds / 3600);
                const m = Math.floor((seconds % 3600) / 60);
                const s = seconds % 60;
                return `${h > 0 ? h + ':' : ''}${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            };

            const advanceQuestion = () => {
                if (currentQIndex < TEST_DATA.questions.length - 1) {
                    const nextQ = TEST_DATA.questions[currentQIndex + 1];
                    if (status[nextQ.id] === 'not_visited') setStatus(prev => ({ ...prev, [nextQ.id]: 'not_answered' }));
                    setCurrentQIndex(prev => prev + 1);
                }
            };

            const handleOptionSelect = (optId) => {
                if(isPaused) return;
                setAnswers(prev => ({ ...prev, [TEST_DATA.questions[currentQIndex].id]: optId }));
            };

            const handleSaveAndNext = () => {
                if(isPaused) return;
                const cid = TEST_DATA.questions[currentQIndex].id;
                setStatus(prev => ({ ...prev, [cid]: answers[cid] ? 'answered' : 'not_answered' }));
                advanceQuestion();
            };

            const handleMarkForReview = () => {
                if(isPaused) return;
                const cid = TEST_DATA.questions[currentQIndex].id;
                setStatus(prev => ({ ...prev, [cid]: answers[cid] ? 'marked_answered' : 'marked' }));
                advanceQuestion();
            };

            const handleClearResponse = () => {
                if(isPaused) return;
                const cid = TEST_DATA.questions[currentQIndex].id;
                setAnswers(prev => { const newAns = { ...prev }; delete newAns[cid]; return newAns; });
                setStatus(prev => ({ ...prev, [cid]: 'not_answered' }));
            };

            const handlePaletteClick = (index) => {
                if(isPaused) return;
                const cid = TEST_DATA.questions[currentQIndex].id;
                if (status[cid] === 'not_visited' || (status[cid] === 'not_answered' && !answers[cid])) {
                    setStatus(prev => ({ ...prev, [cid]: 'not_answered' }));
                }
                const tid = TEST_DATA.questions[index].id;
                if (status[tid] === 'not_visited') setStatus(prev => ({ ...prev, [tid]: 'not_answered' }));
                setCurrentQIndex(index);
                setIsPaletteOpen(false); 
            };

            const handleSubmit = (auto = false) => {
                if (auto || confirm("Are you sure you want to submit the test? No changes can be made after submission.")) {
                    setIsSubmitted(true);
                    setIsPaused(false);
                }
            };

            const counts = useMemo(() => {
                const c = { answered: 0, not_answered: 0, marked: 0, marked_answered: 0, not_visited: 0 };
                Object.values(status).forEach(s => { if (c[s] !== undefined) c[s]++; });
                return c;
            }, [status]);

            if (isSubmitted) {
                let score = 0, correct = 0, wrong = 0;
                TEST_DATA.questions.forEach(q => {
                    if (answers[q.id] === q.correctAnswer) { score += TEST_DATA.marksForCorrect; correct++; } 
                    else if (answers[q.id]) { score -= TEST_DATA.marksForWrong; wrong++; }
                });

                const attempted = correct + wrong;
                const accuracy = attempted > 0 ? Math.round((correct / attempted) * 100) : 0;
                const percentage = Math.max(0, Math.round((score / TEST_DATA.totalMarks) * 100));
                const isPass = percentage >= TEST_DATA.passPercentage;

                return (
                    <div className="h-full overflow-y-auto p-4 md:p-8 print:p-0 bg-slate-50 print:bg-white print:h-auto print:overflow-visible">
                        <div className="max-w-5xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100 print-border-none print:shadow-none">
                            <div className="bg-blue-600 text-white p-10 relative print:text-slate-900 print:bg-white print:border-b-2 print:border-slate-300 print:p-0 print:mb-8">
                                <div className="absolute top-0 right-0 w-64 h-64 bg-white opacity-5 rounded-full -mt-20 -mr-20 blur-2xl print-hidden"></div>
                                <div className="flex flex-col md:flex-row justify-between items-center gap-6 relative z-10 print:flex-row print:items-start">
                                    <div className="text-center md:text-left">
                                        <h1 className="text-4xl font-extrabold mb-2 tracking-tight">Performance Report</h1>
                                        <p className="opacity-90 font-semibold text-lg">{TEST_DATA.title}</p>
                                        <p className="opacity-70 text-sm mt-1">{TEST_DATA.organization}</p>
                                    </div>
                                    <div className="flex gap-6 items-center">
                                        <div className={`px-6 py-4 rounded-2xl border-2 backdrop-blur-md print:border-2 print:bg-transparent flex items-center justify-between gap-6 min-w-[200px] ${isPass ? 'bg-green-500/20 border-green-400 print:border-green-600 print:text-green-700' : 'bg-red-500/20 border-red-400 print:border-red-600 print:text-red-700'}`}>
                                            <div className="text-left">
                                                <div className="text-[10px] uppercase tracking-widest font-bold opacity-80 mb-0.5">Final Status</div>
                                                <div className="text-2xl font-black leading-none">{isPass ? 'PASSED' : 'FAILED'}</div>
                                            </div>
                                            <div className="text-4xl leading-none">{isPass ? '🎉' : '❌'}</div>
                                        </div>
                                    </div>
                                </div>
                                <button onClick={() => window.print()} className="print-hidden absolute right-6 top-6 bg-white/20 hover:bg-white/30 text-white px-5 py-2.5 rounded-full font-bold transition shadow-lg backdrop-blur-sm flex items-center gap-2">
                                    <Icons.Printer/> Save PDF
                                </button>
                            </div>

                            <div className="p-10 grid grid-cols-1 md:grid-cols-3 gap-8 border-b border-slate-100 bg-slate-50/50 print:bg-white print:border-b-0 print-break-avoid">
                                <DonutChart percentage={percentage} color="#2563eb" label="Score Percentage" />
                                <DonutChart percentage={accuracy} color="#10b981" label="Accuracy" />
                                <div className="flex flex-col justify-center space-y-4">
                                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center print:border-slate-300">
                                        <span className="text-slate-500 font-bold">Total Marks</span>
                                        <span className="text-3xl font-black text-blue-600">{score} <span className="text-lg text-slate-400 font-bold">/ {TEST_DATA.totalMarks}</span></span>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-green-50 p-4 rounded-2xl border border-green-100 text-center print:border-slate-300 print:bg-white">
                                            <div className="text-green-600 text-3xl font-black">{correct}</div>
                                            <div className="text-xs font-bold text-green-700 uppercase mt-1">Correct</div>
                                        </div>
                                        <div className="bg-red-50 p-4 rounded-2xl border border-red-100 text-center print:border-slate-300 print:bg-white">
                                            <div className="text-red-600 text-3xl font-black">{wrong}</div>
                                            <div className="text-xs font-bold text-red-700 uppercase mt-1">Wrong</div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="p-6 md:p-10">
                                <h2 className="text-2xl font-extrabold text-slate-800 mb-8 flex items-center gap-3 border-b border-slate-200 pb-4">
                                    Detailed Solutions
                                </h2>
                                <div className="space-y-8">
                                    {TEST_DATA.questions.map((q, i) => {
                                        const userAns = answers[q.id];
                                        const isCorrect = userAns === q.correctAnswer;
                                        const isSkipped = !userAns;
                                        let borderColor = isCorrect ? 'border-green-500' : (isSkipped ? 'border-slate-300' : 'border-red-500');
                                        let bgClass = isCorrect ? 'bg-green-50/50' : (isSkipped ? 'bg-white' : 'bg-red-50/50');

                                        return (
                                            <div key={q.id} className={`border-l-8 ${borderColor} ${bgClass} p-6 rounded-2xl shadow-sm border border-slate-100 print-break-avoid print:border print:border-l-8 print:shadow-none`}>
                                                <div className="flex gap-4 mb-6">
                                                    <span className="font-black text-slate-400 text-xl">Q{i+1}.</span>
                                                    <div className="flex-1 text-slate-800 markdown-body text-[16px]" dangerouslySetInnerHTML={{ __html: marked.parse(q.question) }}></div>
                                                </div>
                                                <div className="ml-10 space-y-3 mb-6">
                                                    {q.options.map(opt => {
                                                        const isUserOpt = opt.id === userAns;
                                                        const isCorrectOpt = opt.id === q.correctAnswer;
                                                        
                                                        let optClass = "text-slate-600 bg-white border-slate-200";
                                                        let icon = "○";
                                                        if (isCorrectOpt) { optClass = "text-green-800 bg-green-100 border-green-300 font-bold"; icon = "✓"; }
                                                        else if (isUserOpt) { optClass = "text-red-700 bg-red-100 border-red-300 line-through"; icon = "✗"; }

                                                        return (
                                                            <div key={opt.id} className={`flex items-start gap-3 p-3 rounded-xl border ${optClass} print:bg-transparent print:border-slate-300`}>
                                                                <span className="mt-0.5 font-bold">{icon}</span>
                                                                <div className="markdown-body" style={{marginBottom: 0}} dangerouslySetInnerHTML={{ __html: marked.parseInline(opt.text) }}></div>
                                                            </div>
                                                        )
                                                    })}
                                                </div>
                                                {q.explanation && (
                                                    <div className="ml-10 p-5 bg-blue-50/50 rounded-xl border border-blue-100 print:bg-slate-50 print:border-slate-200">
                                                        <strong className="block mb-2 flex items-center gap-2 text-blue-700"><Icons.Info/> Expert Explanation:</strong>
                                                        <div className="markdown-body text-sm text-slate-700" dangerouslySetInnerHTML={{ __html: marked.parse(q.explanation) }}></div>
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            const currentQuestion = TEST_DATA.questions[currentQIndex];

            return (
                <div className="flex flex-col h-full bg-slate-50 relative">
                    {showWarning && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-white p-8 rounded-3xl shadow-2xl max-w-md text-center border-2 border-red-500">
                                <div className="w-20 h-20 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4 animate-bounce"><Icons.Alert /></div>
                                <h2 className="text-2xl font-black text-slate-800 mb-2">Warning Recorded!</h2>
                                <p className="text-slate-600 mb-6 font-medium">You switched tabs or minimized the window. (Warning {warnings})</p>
                                <button onClick={() => setShowWarning(false)} className="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-4 rounded-full shadow-lg transition transform active:scale-95 text-lg">I Understand</button>
                            </div>
                        </div>
                    )}

                    {isPaused && (
                        <div className="fixed inset-0 z-[90] bg-white/80 backdrop-blur-md flex flex-col items-center justify-center p-4">
                            <div className="bg-white p-10 rounded-3xl shadow-2xl border border-slate-200 text-center max-w-sm w-full">
                                <div className="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-6"><Icons.Pause /></div>
                                <h2 className="text-3xl font-black text-slate-800 mb-3">Test Paused</h2>
                                <button onClick={() => setIsPaused(false)} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-full shadow-lg transition transform active:scale-95 flex items-center justify-center gap-3 text-lg">
                                    <Icons.Play /> Resume Test
                                </button>
                            </div>
                        </div>
                    )}

                    <header className="glass-nav border-b border-slate-200 h-20 flex items-center justify-between px-6 z-20 sticky top-0 shadow-sm">
                        <div className="flex items-center gap-4">
                            <div className="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center shadow-lg shadow-blue-600/30 text-white font-black text-xl">E</div>
                            <div className="hidden sm:block">
                                <h1 className="font-extrabold text-lg text-slate-800 leading-tight">{TEST_DATA.organization}</h1>
                                <p className="text-xs text-slate-500 font-medium truncate max-w-[200px]">{TEST_DATA.title}</p>
                            </div>
                        </div>
                        <div className="absolute left-1/2 top-1/2 transform -translate-x-1/2 -translate-y-1/2 flex items-center">
                            <div className="flex items-center bg-white rounded-full border border-slate-200 p-1 shadow-sm overflow-hidden">
                                <div className="px-4 py-1.5 bg-slate-100 rounded-full text-xs font-bold text-slate-500 flex items-center gap-2">
                                    <span className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> LIVE
                                </div>
                                <div className="px-6 font-mono font-black text-xl text-blue-600 tracking-widest">{formatTime(timeLeft)}</div>
                            </div>
                        </div>
                        <div className="flex items-center gap-3">
                            {!isPaused && !isSubmitted && (
                                <button onClick={() => setIsPaused(true)} className="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-600 hover:bg-slate-200 hover:text-blue-600 transition" title="Pause Test"><Icons.Pause /></button>
                            )}
                            <div className="hidden md:flex items-center gap-3 pl-3 border-l border-slate-200">
                                <div className="w-10 h-10 rounded-full bg-gradient-to-r from-blue-400 to-indigo-500 p-0.5 shadow-md">
                                    <div className="w-full h-full bg-white rounded-full flex items-center justify-center text-slate-800"><Icons.User /></div>
                                </div>
                            </div>
                            <button className="md:hidden w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-600" onClick={() => setIsPaletteOpen(!isPaletteOpen)}><Icons.Menu /></button>
                        </div>
                    </header>

                    <div className="flex-1 flex overflow-hidden relative">
                        <div className={`flex-1 flex flex-col w-full transition-all duration-300 ${isPaused ? 'blur-content' : ''}`}>
                            <div className="flex-1 overflow-y-auto p-4 md:p-8 lg:p-12">
                                <div className="max-w-4xl mx-auto bg-white rounded-3xl p-8 shadow-sm border border-slate-100">
                                    <div className="flex justify-between items-center mb-8 pb-4 border-b border-slate-100">
                                        <div className="flex items-center gap-3">
                                            <span className="bg-blue-600 text-white px-5 py-2 rounded-full text-sm font-black shadow-md shadow-blue-600/20">Question {currentQIndex + 1}</span>
                                        </div>
                                        <div className="flex gap-2">
                                            <span className="bg-green-50 text-green-600 px-4 py-1.5 rounded-full text-xs font-bold border border-green-200">+{TEST_DATA.marksForCorrect}</span>
                                            <span className="bg-red-50 text-red-600 px-4 py-1.5 rounded-full text-xs font-bold border border-red-200">-{TEST_DATA.marksForWrong}</span>
                                        </div>
                                    </div>
                                    <div className="text-[17px] text-slate-800 markdown-body mb-8 leading-relaxed" dangerouslySetInnerHTML={{ __html: marked.parse(currentQuestion.question) }}></div>
                                    <div className="space-y-4">
                                        {currentQuestion.options.map(opt => {
                                            const isSelected = answers[currentQuestion.id] === opt.id;
                                            return (
                                                <div key={opt.id} onClick={() => handleOptionSelect(opt.id)} className={`group relative p-5 rounded-2xl cursor-pointer flex items-center gap-5 transition-all duration-200 border-2 ${isSelected ? 'border-blue-600 bg-blue-50/50 shadow-sm option-selected' : 'border-slate-200 hover:border-blue-300 hover:bg-slate-50'}`}>
                                                    <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center flex-shrink-0 custom-radio ${isSelected ? 'border-blue-600 bg-white' : 'border-slate-300 group-hover:border-blue-400'}`}></div>
                                                    <div className="text-slate-700 font-medium markdown-body flex-1 text-[16px]" style={{marginBottom:0}} dangerouslySetInnerHTML={{ __html: marked.parseInline(opt.text) }}></div>
                                                </div>
                                            )
                                        })}
                                    </div>
                                </div>
                            </div>
                            <div className="glass-nav border-t border-slate-200 p-5 md:px-12 flex items-center justify-between z-10">
                                <div className="flex gap-3">
                                    <button onClick={handleMarkForReview} className="px-6 py-3.5 bg-purple-50 text-purple-700 hover:bg-purple-100 rounded-full font-bold text-sm transition border border-purple-200"><span className="hidden md:inline">Mark for Review</span><span className="md:hidden">Review</span></button>
                                    <button onClick={handleClearResponse} className="px-6 py-3.5 bg-slate-100 text-slate-600 hover:bg-slate-200 rounded-full font-bold text-sm transition">Clear</button>
                                </div>
                                <button onClick={handleSaveAndNext} className="px-8 py-3.5 bg-blue-600 hover:bg-blue-700 text-white rounded-full font-black text-sm shadow-lg shadow-blue-600/30 transition transform active:scale-95 flex items-center gap-2">Save & Next <span className="text-xl leading-none">→</span></button>
                            </div>
                        </div>

                        <div className={`absolute inset-y-0 right-0 w-[320px] bg-white shadow-2xl transform transition-transform duration-300 z-30 flex flex-col border-l border-slate-200 ${isPaletteOpen ? 'translate-x-0' : 'translate-x-full'} md:translate-x-0 md:relative`}>
                            <div className="p-5 border-b border-slate-100 flex items-center gap-4 bg-slate-50">
                                <div className="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center text-blue-600"><Icons.User /></div>
                                <div><div className="font-bold text-slate-800">Candidate</div><div className="text-xs text-slate-500">{TEST_DATA.organization} Student</div></div>
                                <button className="ml-auto md:hidden text-slate-400" onClick={() => setIsPaletteOpen(false)}>✕</button>
                            </div>
                            <div className="p-5 grid grid-cols-2 gap-4 text-xs font-semibold border-b border-slate-100">
                                <div className="flex items-center gap-2 text-slate-600"><div className="w-3 h-3 rounded-full bg-[#10b981]"></div> Answered ({counts.answered})</div>
                                <div className="flex items-center gap-2 text-slate-600"><div className="w-3 h-3 rounded-full bg-[#ef4444]"></div> Not Ans ({counts.not_answered})</div>
                                <div className="flex items-center gap-2 text-slate-600"><div className="w-3 h-3 rounded-full bg-[#8b5cf6]"></div> Marked ({counts.marked + counts.marked_answered})</div>
                                <div className="flex items-center gap-2 text-slate-600"><div className="w-3 h-3 rounded-full border-2 border-slate-300 bg-slate-50"></div> Unvisited ({counts.not_visited})</div>
                            </div>
                            <div className="flex-1 overflow-y-auto p-5">
                                <div className="font-bold text-slate-700 mb-4 text-sm">Question Navigation:</div>
                                <div className="grid grid-cols-5 gap-2.5">
                                    {TEST_DATA.questions.map((q, idx) => (
                                        <button key={q.id} onClick={() => handlePaletteClick(idx)} className={`h-11 w-full flex items-center justify-center font-bold text-sm rounded-xl transition shadow-sm border ${currentQIndex === idx ? 'current-question' : 'border-transparent'} status-${status[q.id]}`}>{idx + 1}</button>
                                    ))}
                                </div>
                            </div>
                            <div className="p-5 border-t border-slate-100 bg-white">
                                <button onClick={() => handleSubmit(false)} className="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black py-4 rounded-2xl shadow-lg shadow-emerald-500/20 transition transform active:scale-95 text-lg">Submit Final Test</button>
                            </div>
                        </div>
                    </div>
                    {isPaletteOpen && <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-20 md:hidden" onClick={() => setIsPaletteOpen(false)}></div>}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
