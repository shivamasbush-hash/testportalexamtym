    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const TEST_DATA = {"title": "UGC NET Paper 1 December 2025", "organization": "ExamTym", "durationMinutes": 60, "totalMarks": 100.0, "marksForCorrect": 2.0, "marksForWrong": 0.0, "passPercentage": 40, "shuffle": false, "strictMode": false, "questions": [{"question": "Data Interpretation Context (Applies to Q1 - Q5)\n**Directions:** Study carefully the table given below and answer the questions that follow. A college has four programs B.A., B.Sc., B.Com. and B.B.A. The results of the mid-semester and end-semester tests are shown in the table given below.\n**How many students are there in the four programs?**\n| Results | B.A. | B.Sc. | B.Com. | B.B.A. |\n| :--- | :--- | :--- | :--- | :--- |\n| **Failed in both tests** | 28 | 23 | 17 | 27 |\n| **Failed in mid-semester test but passed in end-semester test** | 14 | 12 | 8 | 13 |\n| **Passed in mid-semester test but failed in end-semester test** | 6 | 17 | 9 | 15 |\n| **Passed in both tests** | 64 | 55 | 46 | 76 |   ", "options": [{"id": "1", "text": "420"}, {"id": "2", "text": "430"}, {"id": "3", "text": "320"}, {"id": "4", "text": "330"}], "correctAnswer": "2", "explanation": "*Key Concept:*\n* The total number of students in each program is the sum of all categories in its respective column.\n* Total for B.A. = 28 + 14 + 6 + 64 = 112. Total for B.Sc. = 23 + 12 + 17 + 55 = 107. \n* Total for B.Com. = 17 + 8 + 9 + 46 = 80. Total for B.B.A. = 27 + 13 + 15 + 76 = 131.\n* Grand Total = 112 + 107 + 80 + 131 = 430.\n*Related Concepts:*\n* Aggregate summation.\n* Cross-tabulation data extraction.", "id": 1}, {"question": "Data Interpretation Context (Applies to Q1 - Q5)\n**Directions:** Study carefully the table given below and answer the questions that follow. A college has four programs B.A., B.Sc., B.Com. and B.B.A. The results of the mid-semester and end-semester tests are shown in the table given below.\n**What is the ratio of number of students in B.Sc. program to the number of students in B.Com. program?**\n| Results | B.A. | B.Sc. | B.Com. | B.B.A. |\n| :--- | :--- | :--- | :--- | :--- |\n| **Failed in both tests** | 28 | 23 | 17 | 27 |\n| **Failed in mid-semester test but passed in end-semester test** | 14 | 12 | 8 | 13 |\n| **Passed in mid-semester test but failed in end-semester test** | 6 | 17 | 9 | 15 |\n| **Passed in both tests** | 64 | 55 | 46 | 76 | ", "options": [{"id": "1", "text": "80:107"}, {"id": "2", "text": "107:131"}, {"id": "3", "text": "107:80"}, {"id": "4", "text": "80:131"}], "correctAnswer": "3", "explanation": "*Key Concept:*\n* Using the column totals calculated previously, the total number of students in B.Sc. is 107.\n* The total number of students in B.Com. is 80.\n* The ratio of B.Sc. to B.Com. is simply 107:80.\n*Related Concepts:*\n* Ratio and Proportion.\n* Direct data mapping.", "id": 2}, {"question": "Data Interpretation Context (Applies to Q1 - Q5)\n**Directions:** Study carefully the table given below and answer the questions that follow. A college has four programs B.A., B.Sc., B.Com. and B.B.A. The results of the mid-semester and end-semester tests are shown in the table given below.\n**If the number of students passing a test be considered a criterion for comparison of difficulty level of two tests, then mid-semester test of which of the following programs was the least difficult?**\n| Results | B.A. | B.Sc. | B.Com. | B.B.A. |\n| :--- | :--- | :--- | :--- | :--- |\n| **Failed in both tests** | 28 | 23 | 17 | 27 |\n| **Failed in mid-semester test but passed in end-semester test** | 14 | 12 | 8 | 13 |\n| **Passed in mid-semester test but failed in end-semester test** | 6 | 17 | 9 | 15 |\n| **Passed in both tests** | 64 | 55 | 46 | 76 | ", "options": [{"id": "1", "text": "B.A."}, {"id": "2", "text": "B.Sc."}, {"id": "3", "text": "B.Com."}, {"id": "4", "text": "B.B.A."}], "correctAnswer": "4", "explanation": "*Key Concept:*\n* \"Least difficult\" implies the highest passing percentage in the mid-semester test.\n* Students who passed the mid-semester test = (Passed mid but failed end) + (Passed both). \n* Pass rates: B.A. = (6+64)/112 = 62.5%. B.Sc. = (17+55)/107 = 67.28%. B.Com. = (9+46)/80 = 68.75%. B.B.A. = (15+76)/131 = 69.46%.\n* B.B.A. has the highest passing percentage, indicating it was the least difficult.\n*Related Concepts:*\n* Percentage derivations.\n* Interpreting categorical logic.", "id": 3}, {"question": "Data Interpretation Context (Applies to Q1 - Q5)\n**Directions:** Study carefully the table given below and answer the questions that follow. A college has four programs B.A., B.Sc., B.Com. and B.B.A. The results of the mid-semester and end-semester tests are shown in the table given below.\n**Which program has the lowest passing percentage in end-semester test?**\n| Results | B.A. | B.Sc. | B.Com. | B.B.A. |\n| :--- | :--- | :--- | :--- | :--- |\n| **Failed in both tests** | 28 | 23 | 17 | 27 |\n| **Failed in mid-semester test but passed in end-semester test** | 14 | 12 | 8 | 13 |\n| **Passed in mid-semester test but failed in end-semester test** | 6 | 17 | 9 | 15 |\n| **Passed in both tests** | 64 | 55 | 46 | 76 | ", "options": [{"id": "1", "text": "B.A."}, {"id": "2", "text": "B.Sc."}, {"id": "3", "text": "B.Com."}, {"id": "4", "text": "B.B.A."}], "correctAnswer": "2", "explanation": "*Key Concept:*\n* Students who passed the end-semester test = (Failed mid but passed end) + (Passed both).\n* Pass percentages: B.A. = (14+64)/112 = 69.64%. B.Sc. = (12+55)/107 = 62.61%.\n* B.Com. = (8+46)/80 = 67.5%. B.B.A. = (13+76)/131 = 67.93%.\n* B.Sc. has the lowest passing percentage (62.61%).\n*Related Concepts:*\n* Data segmentation.\n* Comparative ratio analysis.", "id": 4}, {"question": "Data Interpretation Context (Applies to Q1 - Q5)\n**Directions:** Study carefully the table given below and answer the questions that follow. A college has four programs B.A., B.Sc., B.Com. and B.B.A. The results of the mid-semester and end-semester tests are shown in the table given below.\n**Which program has the highest failure rate in the mid-semester test?**\n| Results | B.A. | B.Sc. | B.Com. | B.B.A. |\n| :--- | :--- | :--- | :--- | :--- |\n| **Failed in both tests** | 28 | 23 | 17 | 27 |\n| **Failed in mid-semester test but passed in end-semester test** | 14 | 12 | 8 | 13 |\n| **Passed in mid-semester test but failed in end-semester test** | 6 | 17 | 9 | 15 |\n| **Passed in both tests** | 64 | 55 | 46 | 76 | ", "options": [{"id": "1", "text": "B.A."}, {"id": "2", "text": "B.Sc."}, {"id": "3", "text": "B.Com."}, {"id": "4", "text": "B.B.A."}], "correctAnswer": "1", "explanation": "*Key Concept:*\n* Students who failed the mid-semester test = (Failed both) + (Failed mid but passed end).\n* Failure rates: B.A. = (28+14)/112 = 37.5%. B.Sc. = (23+12)/107 = 32.71%. \n* B.Com. = (17+8)/80 = 31.25%. B.B.A. = (27+13)/131 = 30.53%.\n* B.A. has the highest failure rate (37.5%).\n*Related Concepts:*\n* Inverted probability mapping.\n* Fractional comparison.\n### **Teaching & Research Aptitude**", "id": 5}, {"question": "Which of the following is an example of biological motive?", "options": [{"id": "1", "text": "Achievement"}, {"id": "2", "text": "Hunger"}, {"id": "3", "text": "Power"}, {"id": "4", "text": "Affiliation"}], "correctAnswer": "2", "explanation": "*Key Concept:*\n* Biological motives (also known as primary or physiological motives) are innate drives necessary for survival, rooted in the physiological state of the body.\n* Hunger, thirst, sleep, and temperature regulation are classic examples.\n* Achievement, Power, and Affiliation are secondary, psychological, or social motives learned through interaction.\n*Related Concepts:*\n* Maslow's Hierarchy of Needs.\n* Drive-Reduction Theory.", "id": 6}, {"question": "Journals that prioritize self-interest at the expense of scholarship and are characterized by false or misleading information, deviation from best editorial/publication practices, lack of transparency and and/or use of aggressive and indiscriminate solicitation practices, are known as:", "options": [{"id": "1", "text": "Open access journals"}, {"id": "2", "text": "Proprietary journals"}, {"id": "3", "text": "Professional journals"}, {"id": "4", "text": "Predatory journals"}], "correctAnswer": "4", "explanation": "*Key Concept:*\n* Predatory journals exploit the open-access publishing model by charging publication fees without providing legitimate peer-review or editorial services.\n* They deceive authors with false claims of high impact factors and aggressive email solicitations.\n* They undermine the integrity of academic scholarship and research databases.\n*Related Concepts:*\n* Peer Review process.\n* Academic integrity and ethics.", "id": 7}, {"question": "Which term is NOT related to computer hardware?", "options": [{"id": "1", "text": "Bus"}, {"id": "2", "text": "Switch"}, {"id": "3", "text": "Windows"}, {"id": "4", "text": "Mouse"}], "correctAnswer": "3", "explanation": "*Key Concept:*\n* Hardware refers to the physical, tangible components of a computer system (e.g., Motherboard, Mouse, Switch, Data Bus).\n* Windows is an Operating System, which falls under the category of System Software.\n* Software provides the instructions that tell the hardware what to do.\n*Related Concepts:*\n* Hardware vs. Software.\n* Operating Systems.", "id": 8}, {"question": "Which of the following are not true?\nA. In the argument from ignorance fallacy, something is accepted as true because it is not proven false.\nB. In Hasty generalisation fallacy, a general truth is applied to a particular case ignoring its uniqueness.\nC. In Begging the question fallacy, an event is wrongly accepted as the cause of some other event.\nD. The fallacy of Amphiboly occurs in arguing from premises whose formulations are ambiguous because of their grammatical construction.", "options": [{"id": "1", "text": "A, B and C only"}, {"id": "2", "text": "A, B and D only"}, {"id": "3", "text": "B and C only"}, {"id": "4", "text": "A and D only"}], "correctAnswer": "3", "explanation": "*Key Concept:*\n* Statement B defines the \"Fallacy of Accident\", not Hasty Generalization (which moves from a specific inadequate sample to a general rule).\n* Statement C defines \"False Cause\" (Post Hoc), not Begging the Question (which is circular reasoning where the premise assumes the conclusion).\n* Statements A and D provide accurate definitions for their respective fallacies. Therefore, B and C are NOT true.\n*Related Concepts:*\n* Informal Logical Fallacies.\n* Deductive vs. Inductive fallacies.", "id": 9}, {"question": "Which of the following are application software?\nA. Spreadsheet\nB. Word Processor\nC. Operating system\nD. Database\nE. Compiler", "options": [{"id": "1", "text": "A, C and D only"}, {"id": "2", "text": "B, C and E only"}, {"id": "3", "text": "A, D and E only"}, {"id": "4", "text": "A, B and D only"}], "correctAnswer": "4", "explanation": "*Key Concept:*\n* Application software is designed to help the end-user perform specific, singular or multiple tasks (e.g., Spreadsheets, Word Processors, Databases).\n* Operating Systems (C) and Compilers (E) are System Software, designed to operate the computer hardware and provide a platform for running applications.\n* Application software sits \"on top\" of system software.\n*Related Concepts:*\n* Classification of Software.\n* Utility Programs vs System Software.", "id": 10}, {"question": "As per the recommendations of National Education Policy, 2020, all stand alone teacher education institutions will be required to convert into multidisciplinary institutions by:", "options": [{"id": "1", "text": "2025"}, {"id": "2", "text": "2030"}, {"id": "3", "text": "2035"}, {"id": "4", "text": "2040"}], "correctAnswer": "2", "explanation": "*Key Concept:*\n* NEP 2020 aims to elevate the quality of teacher preparation by phasing out substandard, standalone Teacher Education Institutions (TEIs).\n* It mandates that by 2030, all teacher education programs must be housed within large, multidisciplinary universities or institutions.\n* This ensures that future teachers receive a holistic education alongside their pedagogical training.\n*Related Concepts:*\n* NEP 2020 Teacher Education Reforms.\n* Multidisciplinary Education and Research Universities (MERU).", "id": 11}, {"question": "Measurement validity primarily relates to:", "options": [{"id": "1", "text": "Qualitative research"}, {"id": "2", "text": "Quantitative research"}, {"id": "3", "text": "Interpretivism"}, {"id": "4", "text": "Constructionism"}], "correctAnswer": "2", "explanation": "*Key Concept:*\n* Measurement validity (or construct validity) assesses whether an instrument or tool actually measures the specific quantitative concept it is intended to measure.\n* It is a foundational pillar of quantitative research, which relies heavily on numerical data, statistical tools, and standardized metrics.\n* Qualitative research deals more with \"trustworthiness\" and \"authenticity\" rather than strict statistical validity.\n*Related Concepts:*\n* Reliability vs. Validity.\n* Quantitative paradigms (Positivism).", "id": 12}, {"question": "Identify the advantages of closed ended questions in survey research:\nA. It is easy to process answers.\nB. Respondents can answer in their own terms.\nC. They are easy for the respondents to complete.\nD. They allow unusual responses to be derived.", "options": [{"id": "1", "text": "A and B only"}, {"id": "2", "text": "A and C only"}, {"id": "3", "text": "A, B and C only"}, {"id": "4", "text": "B, C and D only"}], "correctAnswer": "2", "explanation": "*Key Concept:*\n* Closed-ended questions provide pre-defined options (e.g., multiple-choice), making the resulting data highly standardized and easy to process/quantify (A).\n* Because respondents just select an option rather than write an essay, they are faster and easier to complete (C).\n* Allowing respondents to answer in their own terms (B) and extracting unusual responses (D) are advantages of open-ended questions.\n*Related Concepts:*\n* Survey Design.\n* Quantitative data structuring.", "id": 13}, {"question": "Complete the following series: N7V, K9T, H12R, ?, B21N", "options": [{"id": "1", "text": "E14R"}, {"id": "2", "text": "E13Q"}, {"id": "3", "text": "E16P"}, {"id": "4", "text": "F16R"}], "correctAnswer": "3", "explanation": "*Key Concept:*\n* Analyze the components separately. First letters: N(-3)=K, K(-3)=H, H(-3)=E, E(-3)=B. (Missing is E).\n* Middle numbers: 7(+2)=9, 9(+3)=12, 12(+4)=16, 16(+5)=21. (Missing is 16).\n* Last letters: V(-2)=T, T(-2)=R, R(-2)=P, P(-2)=N. (Missing is P).\n* Combining them gives E16P.\n*Related Concepts:*\n* Alphanumeric Series.\n* Pattern incrementation.", "id": 14}, {"question": "Arrange the following in the ascending order of adoption in terms of Diffusion of Innovation among the masses:\nA. Opinion Followers\nB. Opinion Leaders\nC. Early Adopters\nD. Change Agents\nE. Laggards", "options": [{"id": "1", "text": "A, D, C, B, E"}, {"id": "2", "text": "D, C, B, A, E"}, {"id": "3", "text": "C, D, B, A, E"}, {"id": "4", "text": "A, B, C, D, E"}], "correctAnswer": "2", "explanation": "*Key Concept:*\n* Everett Rogers' Diffusion of Innovations theory outlines the chronology of how new ideas spread.\n* It begins with Innovators/Change Agents (D), spreads to Early Adopters/Opinion Leaders (C and B), then to the general masses/Opinion Followers (A), and finally to the Laggards (E).\n* Arranging by who adopts *first* to *last* yields the timeline D, C, B, A, E.\n*Related Concepts:*\n* Bell Curve of Innovation.\n* Sociology of technology adoption.", "id": 15}, {"question": "The issue related to 'traditional knowledge societies and their livelihood' is addressed in the National Mission for:", "options": [{"id": "1", "text": "Enhanced Energy Efficiency"}, {"id": "2", "text": "Sustaining the Himalayan Eco-system"}, {"id": "3", "text": "Sustainable Habitat"}, {"id": "4", "text": "A Green India"}], "correctAnswer": "2", "explanation": "*Key Concept:*\n* The National Mission for Sustaining the Himalayan Ecosystem (NMSHE) is one of the eight missions under India's National Action Plan on Climate Change (NAPCC).\n* A key objective of this mission is the protection and empowerment of traditional knowledge societies residing in the ecologically fragile Himalayan region.\n* It seeks to preserve their livelihoods against the backdrop of changing climate variables.\n*Related Concepts:*\n* National Action Plan on Climate Change (NAPCC).\n* Indigenous Knowledge Systems.", "id": 16}, {"question": "Arrange the following pairs of standard deviation ($\\sigma$) and total number of samples (n) pertaining to different sampling distributions in the decreasing order of their standard error.\nA. $\\sigma=1.6$, n=16\nB. $\\sigma=1.5$, n=25\nC. $\\sigma=0.6$, n=36\nD. $\\sigma=1.4$, n=49", "options": [{"id": "1", "text": "A, B, C, D"}, {"id": "2", "text": "A, B, D, C"}, {"id": "3", "text": "D, C, B, A"}, {"id": "4", "text": "C, B, D, A"}], "correctAnswer": "2", "explanation": "*Key Concept:*\n* Standard Error (SE) is calculated using the formula: $SE = \\frac{\\sigma}{\\sqrt{n}}$.\n* A: $1.6 / \\sqrt{16} = 1.6 / 4 = 0.40$.\n* B: $1.5 / \\sqrt{25} = 1.5 / 5 = 0.30$.\n* C: $0.6 / \\sqrt{36} = 0.6 / 6 = 0.10$.\n* D: $1.4 / \\sqrt{49} = 1.4 / 7 = 0.20$.\n* Decreasing order: 0.40 (A), 0.30 (B), 0.20 (D), 0.10 (C).\n*Related Concepts:*\n* Standard Error of the Mean.\n* Inferential Statistics.", "id": 17}, {"question": "Given below are two statements: one is labelled as Assertion (A) and the other is labelled as Reason (R).\nAssertion (A): People, who hold views contrary to those dominant in the media, keep those views to themselves.\nReason (R): Such people fear isolation or separation from those around them.\nIn the light of the above statements, choose the most appropriate answer from the options given below:", "options": [{"id": "1", "text": "Both (A) and (R) are correct and (R) is the correct explanation of (A)"}, {"id": "2", "text": "Both (A) and (R) are correct but (R) is not the correct explanation of (A)"}, {"id": "3", "text": "(A) is correct but (R) is not correct"}, {"id": "4", "text": "(A) is not correct but (R) is correct"}], "correctAnswer": "1", "explanation": "*Key Concept:*\n* This directly explains Elisabeth Noelle-Neumann\u2019s \"Spiral of Silence\" theory.\n* The assertion highlights the behavioral phenomenon where minority views are suppressed.\n* The reason provides the psychological driver for this suppression: humans have an innate fear of social isolation and ostracization. Thus, R accurately explains A.\n*Related Concepts:*\n* Spiral of Silence Theory.\n* Mass Media Influence on Public Opinion.", "id": 18}, {"question": "Two cyclists cover the same distance at 15 km/hr and 16 km/hr, respectively. If one cyclist takes 16 minutes longer than the other, then the distance travelled by each cyclist is:", "options": [{"id": "1", "text": "64 km"}, {"id": "2", "text": "16 km"}, {"id": "3", "text": "68 km"}, {"id": "4", "text": "12 km"}], "correctAnswer": "1", "explanation": "*Key Concept:*\n* Let the distance be $D$. Time taken by slower cyclist = $D / 15$. Time taken by faster = $D / 16$.\n* The difference in time is 16 minutes, which must be converted to hours: $16 / 60$ hours.\n* Equation: $\\frac{D}{15} - \\frac{D}{16} = \\frac{16}{60}$.\n* Find common denominator (240): $\\frac{16D - 15D}{240} = \\frac{16}{60} \\implies \\frac{D}{240} = \\frac{16}{60} \\implies D = 240 \\times (\\frac{16}{60}) = 4 \\times 16 = 64$ km.\n*Related Concepts:*\n* Time, Speed, and Distance formulas.\n* Algebraic linear equations.", "id": 19}, {"question": "Arrange the following fractions in ascending order:\nA. 2/3\nB. 7/19\nC. 9/11\nD. 8/9\nE. 7/9", "options": [{"id": "1", "text": "B, A, E, C, D"}, {"id": "2", "text": "B, E, A, D, C"}, {"id": "3", "text": "A, B, C, D, E"}, {"id": "4", "text": "B, C, A, E, D"}], "correctAnswer": "1", "explanation": "*Key Concept:*\n* Convert the fractions to decimals for easy comparison.\n* A: 2/3 = 0.666...\n* B: 7/19 \u2248 0.368\n* C: 9/11 \u2248 0.818\n* D: 8/9 \u2248 0.888\n* E: 7/9 \u2248 0.777\n* Ascending order (lowest to highest): B (0.368), A (0.666), E (0.777), C (0.818), D (0.888). Result: B, A, E, C, D.\n*Related Concepts:*\n* Decimal equivalents.\n* Fraction sorting logic.", "id": 20}, {"question": "Identify the correct mathematical statements:\nA. The value of $\\frac{1}{4} + \\frac{1}{4\\times5} + \\frac{1}{4\\times5\\times6}$ is equal to $\\frac{37}{120}$.\nB. $1+2\\div\\{1+2\\div(1+\\frac{1}{3})\\}$ is equal to $\\frac{4}{5}$.\nC. If the average of 6 numbers is 7, the average of 3 numbers of them is 5, then the average of remaining numbers is 9.\nD. If 75% of a number is added to 75, then the result is number itself. Then the number is 300.\nE. Largest fraction among $\\frac{9}{31}, \\frac{6}{23}, \\frac{3}{17}, \\frac{4}{11}$ is $\\frac{9}{31}$.", "options": [{"id": "1", "text": "A and B only"}, {"id": "2", "text": "A, C and D only"}, {"id": "3", "text": "C and D only"}, {"id": "4", "text": "C, E and D only"}], "correctAnswer": "2", "explanation": "*Key Concept:*\n* A: $1/4 + 1/20 + 1/120 = (30+6+1)/120 = 37/120$. (True).\n* C: Total sum of 6 = $6 \\times 7 = 42$. Sum of 3 = $3 \\times 5 = 15$. Remaining sum = 27. Avg = $27 / 3 = 9$. (True).\n* D: $0.75x + 75 = x \\implies 0.25x = 75 \\implies x = 300$. (True).\n* B and E are mathematically incorrect upon resolution.\n*Related Concepts:*\n* BODMAS rule applications.\n* Mean and Algebraic word problems.", "id": 21}, {"question": "Given below are two statements one is labelled as Assertion (A) and the other is labelled as Reason (R).\nAssertion (A): A wind mill will be more effective if it is placed at a higher elevation above the ground than a lower one.\nReason (R): Generally, the wind speed increases with altitude above the earth's surface.\nIn the light of the above statements, choose the most appropriate answer from the options given below:", "options": [{"id": "1", "text": "Both (A) and (R) are correct and (R) is the correct explanation of (A)"}, {"id": "2", "text": "Both (A) and (R) are correct but (R) is not the correct explanation of (A)"}, {"id": "3", "text": "(A) is correct but (R) is not correct"}, {"id": "4", "text": "(A) is not correct but (R) is correct"}], "correctAnswer": "1", "explanation": "*Key Concept:*\n* Wind turbines rely entirely on the kinetic energy of wind, which is proportional to the cube of wind speed.\n* Surface friction (from trees, buildings, topography) slows down wind at lower elevations (wind shear). As altitude increases, this friction diminishes, resulting in significantly higher wind speeds.\n* Therefore, the reason directly explains why higher elevations make wind mills more effective.\n*Related Concepts:*\n* Renewable energy physics.\n* Boundary layer meteorology.", "id": 22}, {"question": "Which of the following represents the ontological orientation of qualitative research strategies?", "options": [{"id": "1", "text": "Deductive"}, {"id": "2", "text": "Positivism"}, {"id": "3", "text": "Objectivism"}, {"id": "4", "text": "Constructionism"}], "correctAnswer": "4", "explanation": "*Key Concept:*\n* Ontology concerns the nature of reality. Qualitative research predominantly aligns with Constructivism (or Constructionism).\n* Constructionism argues that social reality is not an objective, static fact, but rather a dynamic framework continually constructed and reconstructed by human interactions and interpretations.\n* Positivism and Objectivism are the ontological bases for quantitative research.\n*Related Concepts:*\n* Research Paradigms (Epistemology and Ontology).\n* Interpretivism.", "id": 23}, {"question": "Arrange the following greenhouse gases in the increasing order of their life time in the earth's atmosphere:\nA. $SF_6$\nB. $N_2O$\nC. $H_2O$ vapor\nD. $CH_4$", "options": [{"id": "1", "text": "C, D, B, A"}, {"id": "2", "text": "C, D, A, B"}, {"id": "3", "text": "A, B, C, D"}, {"id": "4", "text": "B, A, D, C"}], "correctAnswer": "1", "explanation": "*Key Concept:*\n* Water vapor ($H_2O$) has the shortest atmospheric lifetime, cycling out via rain within days.\n* Methane ($CH_4$) remains in the atmosphere for about 12 years.\n* Nitrous Oxide ($N_2O$) persists for approximately 114 years.\n* Sulfur Hexafluoride ($SF_6$) is incredibly stable and persists for over 3,200 years.\n* Increasing order: C, D, B, A.\n*Related Concepts:*\n* Global Warming Potential (GWP).\n* Greenhouse Gas characteristics.", "id": 24}, {"question": "Given below are two statements: one is labelled as Assertion (A) and the other is labelled as Reason (R).\nAssertion (A): The projective techniques offer an approach to the measurement of the personality, which is different from the self-descriptive inventories.\nReason (R): Self-descriptive inventories require the subject to describe himself/herself while assessing personality.\nIn the light of the above statements, choose the most appropriate answer from the options given below:", "options": [{"id": "1", "text": "Both (A) and (R) are correct and (R) is the correct explanation of (A)"}, {"id": "2", "text": "Both (A) and (R) are correct but (R) is not the correct explanation of (A)"}, {"id": "3", "text": "(A) is correct but (R) is not correct"}, {"id": "4", "text": "(A) is not correct but (R) is correct"}], "correctAnswer": "1", "explanation": "*Key Concept:*\n* Projective techniques (like the Rorschach inkblot test) bypass conscious filters by asking subjects to interpret ambiguous stimuli, revealing subconscious traits.\n* This is fundamentally different from self-descriptive inventories (like the Myers-Briggs), which rely on the subject's conscious, direct self-assessment, as explicitly stated in the Reason.\n* Thus, R perfectly defines the contrast established in A.\n*Related Concepts:*\n* Personality Assessment Tools.\n* Psychometric testing.", "id": 25}, {"question": "Which among the following is the most liberal Open Education Resource license?", "options": [{"id": "1", "text": "CC-BY"}, {"id": "2", "text": "CC-BY-SA"}, {"id": "3", "text": "CC-BY-ND"}, {"id": "4", "text": "CC-BY-NC"}], "correctAnswer": "1", "explanation": "*Key Concept:*\n* Creative Commons (CC) licenses govern the sharing of educational resources.\n* CC-BY (Attribution) is the most liberal. It allows others to distribute, remix, tweak, and build upon the work, even commercially, as long as they credit the original creation.\n* Other variants add restrictions like Share-Alike (SA), Non-Derivative (ND), or Non-Commercial (NC).\n*Related Concepts:*\n* Open Educational Resources (OER).\n* Digital Copyrighting.", "id": 26}, {"question": "Given below are two statements: one is labelled as Assertion (A) and the other is labelled as Reason (R).\nAssertion (A): National Education Policy, 2020 (NEP-2020) visualized 'Research-Intensive Universities'.\nReason (R): NEP-2020 envisioned university as a place which lays equal emphasis on teaching and research.\nIn the light of the above statements, choose the most appropriate answer from the options given below:", "options": [{"id": "1", "text": "Both (A) and (R) are correct and (R) is the correct explanation of (A)"}, {"id": "2", "text": "Both (A) and (R) are correct but (R) is not the correct explanation of (A)"}, {"id": "3", "text": "(A) is correct but (R) is not correct"}, {"id": "4", "text": "(A) is not correct but (R) is correct"}], "correctAnswer": "1", "explanation": "*Key Concept:*\n* The NEP 2020 categorizes universities into three types to streamline quality.\n* The first type, \"Research-Intensive Universities\", is specifically outlined in the policy text to place an equal, rigorous emphasis on both high-quality teaching and frontline research.\n* The Reason directly defines the structural mandate behind the Assertion's creation of these specific university types.\n*Related Concepts:*\n* NEP 2020 Higher Education Institutional Restructuring.\n* Multidisciplinary university models.", "id": 27}, {"question": "Match List - I with List - II.\n| List I (Type of Development) | List II (Related with) |\n| :--- | :--- |\n| A. Psycho-sexual Development | I. Identity vs. Role Confusion |\n| B. Psycho-social Development | II. Anal Stage |\n| C. Cognitive Development | III. Hypothetical-deductive reasoning |\n| D. Moral Development | IV. Resolving ethical dilemma |", "options": [{"id": "1", "text": "A-I, B-III, C-II, D-IV"}, {"id": "2", "text": "A-II, B-I, C-IV, D-III"}, {"id": "3", "text": "A-III, B-IV, C-II, D-I"}, {"id": "4", "text": "A-II, B-I, C-III, D-IV"}], "correctAnswer": "4", "explanation": "*Key Concept:*\n* Sigmund Freud's Psycho-sexual theory includes the Anal Stage (II).\n* Erik Erikson's Psycho-social theory is defined by life crises, including Identity vs. Role Confusion (I).\n* Jean Piaget's Cognitive Development theory includes the formal operational stage characterized by Hypothetical-deductive reasoning (III).\n* Lawrence Kohlberg's Moral Development is assessed by observing how individuals resolve ethical dilemmas (IV).\n*Related Concepts:*\n* Developmental Psychology theories.\n* Educational Psychology paradigms.", "id": 28}, {"question": "Match List I with List-II\n| List-I | List-II |\n| :--- | :--- |\n| A. Independent variable in true experimental design | I. Outcome variable |\n| B. Dependent variable | II. Control variable |\n| C. Intervening variable | III. Spurious variable |\n| D. Confounding variable | IV. Stands between independent variable and dependent variable |", "options": [{"id": "1", "text": "A-IV, B-III, C-II, D-I"}, {"id": "2", "text": "A-II, B-I, C-IV, D-III"}, {"id": "3", "text": "A-I, B-II, C-III, D-IV"}, {"id": "4", "text": "A-II, B-III, C-IV, D-I"}], "correctAnswer": "2", "explanation": "*Key Concept:*\n* The Dependent variable is the result or \"Outcome variable\" being measured (I).\n* The Intervening variable (mediator) explains the process that stands between the independent and dependent variables (IV).\n* A Confounding variable creates a false or \"Spurious\" relationship between variables (III).\n* By elimination, the Independent variable in this specific list context maps to the controlled/manipulated variable setup (II).\n*Related Concepts:*\n* Experimental Research Design.\n* Variable Classification.", "id": 29}, {"question": "Arrange the following in increasing order in terms of their coverage:\nA. PAN\nB. MAN\nC. WAN\nD. LAN", "options": [{"id": "1", "text": "D, B, A, C"}, {"id": "2", "text": "A, B, D, C"}, {"id": "3", "text": "A, D, C, B"}, {"id": "4", "text": "A, D, B, C"}], "correctAnswer": "4", "explanation": "*Key Concept:*\n* PAN (Personal Area Network): Covers a few meters (e.g., Bluetooth).\n* LAN (Local Area Network): Covers a single building or campus.\n* MAN (Metropolitan Area Network): Covers an entire city.\n* WAN (Wide Area Network): Covers entire countries or the globe (the Internet).\n* Ascending order: PAN (A), LAN (D), MAN (B), WAN (C).\n*Related Concepts:*\n* Network Topologies.\n* ICT Infrastructure.", "id": 30}, {"question": "The smallest unit of information, a computer can understand and process is known as:", "options": [{"id": "1", "text": "Digit"}, {"id": "2", "text": "Byte"}, {"id": "3", "text": "Nibble"}, {"id": "4", "text": "Bit"}], "correctAnswer": "4", "explanation": "*Key Concept:*\n* A \"Bit\" (short for binary digit) is the most basic unit of information in computing and digital communications.\n* It can hold only one of two values: 0 or 1 (off or on).\n* A Nibble is 4 bits, and a Byte is 8 bits.\n*Related Concepts:*\n* Binary numbering system.\n* Computer memory architecture.", "id": 31}, {"question": "Given below are two statements one is labelled as Assertion (A) and the other is labelled as Reason (R).\nAssertion (A): The terms validity and invalidity do not apply to inductive arguments.\nReason (R): In an inductive argument, the conclusion does not have sufficient ground in the premises.\nIn the light of the above statements, choose the most appropriate answer from the options given below:", "options": [{"id": "1", "text": "Both (A) and (R) are correct and (R) is the correct explanation of (A)"}, {"id": "2", "text": "Both (A) and (R) are correct but (R) is not the correct explanation of (A)"}, {"id": "3", "text": "(A) is correct but (R) is not correct"}, {"id": "4", "text": "(A) is not correct but (R) is correct"}], "correctAnswer": "1", "explanation": "*Key Concept:*\n* Validity is a strict structural term used exclusively for deductive arguments where premises guarantee the conclusion.\n* Inductive arguments deal in probabilities, making them \"strong\" or \"weak,\" not valid or invalid (A is correct).\n* This is precisely because inductive premises only provide partial support (or probability), never a 100% \"sufficient ground\" guarantee for the absolute truth of the conclusion (R explains A).\n*Related Concepts:*\n* Deductive vs. Inductive Logic.\n* Argument Evaluation.", "id": 32}, {"question": "Match List - I with List II.\n| List-I | List - II |\n| :--- | :--- |\n| A. Phishing | I. Act of gaining unauthorized access |\n| B. Hacking | II. Unsolicited email sent over the internet to a recipient on a mailing list |\n| C. Spam | III. Small file or code stored on user's computer |\n| D. Cookies | IV. The creator sends out legitimate-looking emails to target users |", "options": [{"id": "1", "text": "A-II, B-I, C-IV, D-III"}, {"id": "2", "text": "A-IV, B-I, C-III, D-II"}, {"id": "3", "text": "A-IV, B-I, C-II, D-III"}, {"id": "4", "text": "A-I, B-IV, C-II, D-III"}], "correctAnswer": "3", "explanation": "*Key Concept:*\n* Phishing involves deceiving individuals with legitimate-looking, fake emails to steal credentials (IV).\n* Hacking is the technical act of breaching systems for unauthorized access (I).\n* Spam refers to bulk, unsolicited junk emails (II).\n* Cookies are small text files stored locally by browsers to track user data (III).\n*Related Concepts:*\n* Cyber Security threats.\n* Digital Footprinting.", "id": 33}, {"question": "Match List I with List - II.\n| List-I | List-II |\n| :--- | :--- |\n| A. Rhetorical | I. Considering communication to be discursive reflection on hegemonic ideological forces |\n| B. Semiotic | II. Considering communication to be the capacity of experiencing otherness through authentic dialogue |\n| C. Phenomenological | III. Considering communication to be Practical Art |\n| D. Critical | IV. Considering communication to be Intersubjective Mediation via Signs |", "options": [{"id": "1", "text": "A-III, B-IV, C-II, D-I"}, {"id": "2", "text": "A-II, B-IV, C-III, D-I"}, {"id": "3", "text": "A-I, B-IV, C-II, D-III"}, {"id": "4", "text": "A-III, B-II, C-IV, D-I"}], "correctAnswer": "1", "explanation": "*Key Concept:*\n* Robert Craig's 7 Traditions of Communication Theory outline these mappings.\n* Rhetorical tradition views communication as the practical art of discourse and persuasion (III).\n* Semiotic tradition focuses entirely on the mediation of meaning through signs and symbols (IV).\n* Phenomenological tradition prioritizes dialogue and experiencing the \"other\" (II).\n* Critical tradition analyzes power structures, hegemony, and ideological discourse (I).\n*Related Concepts:*\n* Craig's Communication Traditions.\n* Theoretical frameworks of media.", "id": 34}, {"question": "Arrange the steps of creative thinking process in correct sequence:\nA. Preparation\nB. Evaluation\nC. Illumination\nD. Revision\nE. Incubation", "options": [{"id": "1", "text": "A, B, C, D, E"}, {"id": "2", "text": "E, D, C, B, A"}, {"id": "3", "text": "D, C, B, E, A"}, {"id": "4", "text": "A, E, C, B, D"}], "correctAnswer": "4", "explanation": "*Key Concept:*\n* Based on Graham Wallas\u2019 classical model of the creative process.\n* It starts with conscious **Preparation** (A), followed by subconscious **Incubation** (E) where the mind wanders.\n* This leads to the \"Aha!\" moment of **Illumination** (C).\n* Finally, the idea undergoes **Evaluation** (B) and subsequent refinement or **Revision** (D).\n*Related Concepts:*\n* Psychology of Creativity.\n* Wallas' Four-Stage Model.", "id": 35}, {"question": "Active Audience Theories focus on assessing what", "options": [{"id": "1", "text": "people do with media"}, {"id": "2", "text": "media does with people"}, {"id": "3", "text": "administration does with media"}, {"id": "4", "text": "regulations impact media"}], "correctAnswer": "1", "explanation": "*Key Concept:*\n* The Uses and Gratifications theory, a hallmark of \"Active Audience Theories\", flipped the traditional media paradigm.\n* Instead of asking \"What does media do to people?\" (Hypodermic Needle Theory), it asks \"What do people do with media?\"\n* It assumes audiences are not passive sponges, but active selectors using media to fulfill specific needs.\n*Related Concepts:*\n* Uses and Gratifications Theory.\n* Audience Reception paradigms.", "id": 36}, {"question": "Match List I with List - II.\n| List - I (Successive discounts) | List - II (Equivalent discount) |\n| :--- | :--- |\n| A. 10% and 15% | I. 28% |\n| B. 20% and 30% | II. 32.5% |\n| C. 10% and 20% | III. 23.5% |\n| D. 10% and 25% | IV. 44% |", "options": [{"id": "1", "text": "A-I, B-II, C-IV, D-III"}, {"id": "2", "text": "A-II, B-III, C-I, D-IV"}, {"id": "3", "text": "A-III, B-IV, C-I, D-II"}, {"id": "4", "text": "A-IV, B-I, C-II, D-III"}], "correctAnswer": "3", "explanation": "*Key Concept:*\n* Formula for equivalent discount: $(A + B - \\frac{A \\times B}{100})\\%$.\n* A: $10 + 15 - (150/100) = 25 - 1.5 = 23.5\\%$ (III).\n* B: $20 + 30 - (600/100) = 50 - 6 = 44\\%$ (IV).\n* C: $10 + 20 - (200/100) = 30 - 2 = 28\\%$ (I).\n* D: $10 + 25 - (250/100) = 35 - 2.5 = 32.5\\%$ (II).\n*Related Concepts:*\n* Compound percentage changes.\n* Profit, Loss, and Commercial math.", "id": 37}, {"question": "Arrange the following senior functionaries of a central university in the correct hierarchal order:\nA. Visitor\nB. Dean of the faculty\nC. Chancellor\nD. Head of Department\nE. Vice-Chancellor", "options": [{"id": "1", "text": "A, C, E, D, B"}, {"id": "2", "text": "C, A, E, D, B"}, {"id": "3", "text": "A, C, E, B, D"}, {"id": "4", "text": "B, D, E, C, A"}], "correctAnswer": "3", "explanation": "*Key Concept:*\n* In Central Universities, the President of India acts as the **Visitor**, the highest statutory authority (A).\n* Below the Visitor is the titular head, the **Chancellor** (C).\n* The chief executive and academic officer is the **Vice-Chancellor** (E).\n* Academic divisions are overseen by the **Dean of the faculty** (B), followed by the **Head of Department** (D).\n*Related Concepts:*\n* University Administration structure.\n* Statutory bodies in Higher Education.", "id": 38}, {"question": "Which of the following explains the fallacy (hetv\u0101bh\u0101sa) of satpratipaksa correctly?", "options": [{"id": "1", "text": "A fallacy where an inference is contradicted by perception or some other non-inferential pram\u0101na."}, {"id": "2", "text": "A fallacy where one inference is contradicted by another inference."}, {"id": "3", "text": "A fallacy that disproves the very proposition which it is meant to prove."}, {"id": "4", "text": "A fallacy of the irregular middle."}], "correctAnswer": "2", "explanation": "*Key Concept:*\n* In Nyaya logic, *Satpratipaksa* (counterbalanced middle) occurs when a valid argument can be constructed pointing to the exact opposite conclusion using a different middle term.\n* It essentially creates a stalemate where one inference is equally contradicted by another inference.\n* Option A describes *Badhita*. Option D describes *Savyabhichara*.\n*Related Concepts:*\n* Hetvabhasa (Material Fallacies).\n* Classical Indian Logic (Pramanas).", "id": 39}, {"question": "Match List I with List - II.\n| List - I (Department of Ashram) | List - II (Subject) |\n| :--- | :--- |\n| A. Vishnu Sthana | I. Military Education |\n| B. Vivasta Sthana | II. Jyotish |\n| C. Garun Sthana | III. Politics |\n| D. Mahendra Sthana | IV. Travel and Transport |", "options": [{"id": "1", "text": "A-II, B-IV, C-III, D-I"}, {"id": "2", "text": "A-I, B-III, C-II, D-IV"}, {"id": "3", "text": "A-III, B-II, C-IV, D-I"}, {"id": "4", "text": "A-I, B-II, C-III, D-IV"}], "correctAnswer": "3", "explanation": "*Key Concept:*\n* In ancient Indian educational institutions (like Maitraka/Vallabhi setups or specific Gurukuls), departments were specialized.\n* Vishnu Sthana focused on governance, administration, and Politics (III).\n* Vivasta Sthana was dedicated to astronomy and Jyotish (II).\n* Garun Sthana dealt with logistics, Travel, and Transport (IV).\n* Mahendra Sthana trained warriors in Military Education (I).\n*Related Concepts:*\n* Ancient Indian Education curicullums.\n* Specialized Sthanas.", "id": 40}, {"question": "The oxygen consumed in the oxidation of an organic compound by microorganisms in the aquatic ecosystem is called", "options": [{"id": "1", "text": "Dissolved oxygen"}, {"id": "2", "text": "Chemical oxygen demand"}, {"id": "3", "text": "Theoretical oxygen demand"}, {"id": "4", "text": "Biochemical oxygen demand"}], "correctAnswer": "4", "explanation": "*Key Concept:*\n* Biochemical Oxygen Demand (BOD) measures the amount of dissolved oxygen needed by aerobic biological organisms to break down organic material present in a given water sample at a specific temperature over a specific time.\n* It is a prime indicator of water pollution levels; high BOD indicates high organic waste.\n* COD (Chemical Oxygen Demand) measures oxidation via chemical agents, not microorganisms.\n*Related Concepts:*\n* Eutrophication.\n* Water quality indices.", "id": 41}, {"question": "Match List I with List - II.\n| List - I | List - II |\n| :--- | :--- |\n| A. Primary Air pollutant | I. Peroxyacyl nitrate |\n| B. Secondary Air pollutant | II. Carbon monoxide |\n| C. Ozone depleting substance | III. Aerosols |\n| D. Cloud Condensation Nuclei | IV. Chlorofluorocarbons |", "options": [{"id": "1", "text": "A-I, B-II, C-III, D-IV"}, {"id": "2", "text": "A-II, B-I, C-IV, D-III"}, {"id": "3", "text": "A-I, B-II, C-IV, D-III"}, {"id": "4", "text": "A-II, B-I, C-III, D-IV"}], "correctAnswer": "2", "explanation": "*Key Concept:*\n* Carbon monoxide is directly emitted from exhausts, making it a Primary pollutant (II).\n* PAN (Peroxyacyl nitrate) is formed when primary pollutants react in the atmosphere with sunlight, making it a Secondary pollutant (I).\n* CFCs directly destroy stratospheric ozone, categorizing them as Ozone Depleting Substances (IV).\n* Aerosols provide the microscopic surfaces necessary for water vapor to condense, acting as Cloud Condensation Nuclei (III).\n*Related Concepts:*\n* Photochemical Smog generation.\n* Montreal Protocol.", "id": 42}, {"question": "Match List-I with List II.\n| List-I (Types Categorical propositions) | List-II (Explanation) |\n| :--- | :--- |\n| A. A proposition | I. Distributes both subject and predicate terms |\n| B. E proposition | II. Distributes only predicate term |\n| C. I proposition | III. Distributes only subject term |\n| D. O proposition | IV. Distributes neither subject nor predicate term |", "options": [{"id": "1", "text": "A-II, B-I, C-IV, D-III"}, {"id": "2", "text": "A-III, B-I, C-IV, D-II"}, {"id": "3", "text": "A-I, B-II, C-III, D-IV"}, {"id": "4", "text": "A-IV, B-III, C-II, D-I"}], "correctAnswer": "2", "explanation": "*Key Concept:*\n* In categorical logic, distribution refers to whether a proposition applies to all members of a class.\n* 'A' (Universal Affirmative - All S is P) distributes only the Subject (III).\n* 'E' (Universal Negative - No S is P) distributes Both the Subject and Predicate (I).\n* 'I' (Particular Affirmative - Some S is P) distributes Neither term (IV).\n* 'O' (Particular Negative - Some S is not P) distributes only the Predicate (II).\n*Related Concepts:*\n* Distribution of Terms.\n* Square of Opposition.", "id": 43}, {"question": "The theory that argues that media can have a strong influence in deciding the small number of public problems or issues that people will think about at any given point in time, is:", "options": [{"id": "1", "text": "Agenda-Setting Theory"}, {"id": "2", "text": "Knowledge-Gap Theory"}, {"id": "3", "text": "Limited Effects Theory"}, {"id": "4", "text": "Personal Influence Theory"}], "correctAnswer": "1", "explanation": "*Key Concept:*\n* Proposed by McCombs and Shaw, the Agenda-Setting Theory states that the media does not tell people *what to think*, but it is highly successful in telling them *what to think about*.\n* By repeatedly covering specific issues (like crime or inflation), the media forces those topics to the top of the public's mental agenda.\n*Related Concepts:*\n* Gatekeeping theory.\n* Framing and Priming.", "id": 44}, {"question": "Which of the following is/are true:\nA. The conversion of an O proposition is valid.\nB. The conversion of an A proposition is an A proposition.\nC. The conversion of an E proposition is conversion by limitation.\nD. The conversion of an I proposition is valid.", "options": [{"id": "1", "text": "A and D only"}, {"id": "2", "text": "A and B only"}, {"id": "3", "text": "C only"}, {"id": "4", "text": "D only"}], "correctAnswer": "4", "explanation": "*Key Concept:*\n* In formal logic, \"Conversion\" involves swapping the subject and predicate.\n* 'I' propositions (\"Some S is P\" -> \"Some P is S\") and 'E' propositions convert simply and validly.\n* 'O' propositions (\"Some S is not P\") CANNOT be validly converted. (A is false).\n* 'A' propositions convert by limitation into 'I' propositions, not other 'A' propositions. (B is false).\n* 'E' propositions convert simply, not by limitation. (C is false).\n*Related Concepts:*\n* Immediate Inference Rules.\n* Boolean logic conversion.", "id": 45}, {"question": "Reading Comprehension Context (Applies to Q46 - Q50)\n**Directions:** Read the following passage and answer the questions:\nOrganized endeavors directed by people responsible for planning, organizing, leading and controlling activities have existed for thousands of years. The Egyptian pyramids and the Great Wall of China, for instance, are tangible evidence that projects of tremendous scope, employing tens of thousands of people, were undertaken well before modern times. The pyramids are a particularly interesting example. The construction of a single pyramid occupied more than 100,000 workers for 20 years. Who told each worker what to do? Who ensured that there would be enough stones at the site to keep workers busy? The answer to such questions is managers. Regardless of what managers were called at the time, someone had to plan what was to be done, organize people and materials to do it, lead and direct the workers, and impose some controls to ensure that everything was done as planned. Another example of early management can be seen during the 1400s in the city of Venice, Italy, a major economic and trade center. The Venetians developed an early form of business enterprise and engaged in many activities common to today's organizations. For instance, at the arsenal of Venice, warships were floated along the canals, and at each stop materials and riggings were added to the ship. Doesn't that sound a lot like a car \"floating\" along an automobile assembly line while components are added to it? In addition to this assembly line, the Venetians also used warehouse and inventory systems to keep track of materials, human resource management systems to manage the labor force, and an accounting system to keep track of revenues and costs. **The passage documents that Egyptians involved in the construction of pyramids had:**", "options": [{"id": "1", "text": "An inventory system to keep record of the stones."}, {"id": "2", "text": "A plan for what was to be done."}, {"id": "3", "text": "An accounting system to keep the record of money."}, {"id": "4", "text": "A warehouse system to manage materials."}], "correctAnswer": "2", "explanation": "*Key Concept:*\n* The passage explicitly links the Egyptian pyramids to the fact that \"someone had to plan what was to be done\".\n* The advanced inventory, accounting, and warehouse systems are explicitly attributed to Venice in the 1400s in the latter half of the text, not ancient Egypt.\n*Related Concepts:*\n* Chronological fact extraction.\n* Distinguishing parallel examples in text.", "id": 46}, {"question": "Reading Comprehension Context (Applies to Q46 - Q50)\n**Directions:** Read the following passage and answer the questions:\nOrganized endeavors directed by people responsible for planning, organizing, leading and controlling activities have existed for thousands of years. The Egyptian pyramids and the Great Wall of China, for instance, are tangible evidence that projects of tremendous scope, employing tens of thousands of people, were undertaken well before modern times. The pyramids are a particularly interesting example. The construction of a single pyramid occupied more than 100,000 workers for 20 years. Who told each worker what to do? Who ensured that there would be enough stones at the site to keep workers busy? The answer to such questions is managers. Regardless of what managers were called at the time, someone had to plan what was to be done, organize people and materials to do it, lead and direct the workers, and impose some controls to ensure that everything was done as planned. Another example of early management can be seen during the 1400s in the city of Venice, Italy, a major economic and trade center. The Venetians developed an early form of business enterprise and engaged in many activities common to today's organizations. For instance, at the arsenal of Venice, warships were floated along the canals, and at each stop materials and riggings were added to the ship. Doesn't that sound a lot like a car \"floating\" along an automobile assembly line while components are added to it? In addition to this assembly line, the Venetians also used warehouse and inventory systems to keep track of materials, human resource management systems to manage the labor force, and an accounting system to keep track of revenues and costs. **According to the passage, the role of a manager includes all of the following, except:**", "options": [{"id": "1", "text": "Stacking stones for the pyramids"}, {"id": "2", "text": "Planning what is to be done"}, {"id": "3", "text": "Organising people for the pyramids site"}, {"id": "4", "text": "Directing the pyramid work force"}], "correctAnswer": "1", "explanation": "*Key Concept:*\n* The text defines the manager's role structurally: \"plan what was to be done, organize people and materials to do it, lead and direct the workers\".\n* Stacking stones is the physical labor executed by the workers under the manager's direction, not the organizational role of the manager themselves.\n*Related Concepts:*\n* Managerial functions (POLC framework).\n* Exclusionary inference.", "id": 47}, {"question": "Reading Comprehension Context (Applies to Q46 - Q50)\n**Directions:** Read the following passage and answer the questions:\nOrganized endeavors directed by people responsible for planning, organizing, leading and controlling activities have existed for thousands of years. The Egyptian pyramids and the Great Wall of China, for instance, are tangible evidence that projects of tremendous scope, employing tens of thousands of people, were undertaken well before modern times. The pyramids are a particularly interesting example. The construction of a single pyramid occupied more than 100,000 workers for 20 years. Who told each worker what to do? Who ensured that there would be enough stones at the site to keep workers busy? The answer to such questions is managers. Regardless of what managers were called at the time, someone had to plan what was to be done, organize people and materials to do it, lead and direct the workers, and impose some controls to ensure that everything was done as planned. Another example of early management can be seen during the 1400s in the city of Venice, Italy, a major economic and trade center. The Venetians developed an early form of business enterprise and engaged in many activities common to today's organizations. For instance, at the arsenal of Venice, warships were floated along the canals, and at each stop materials and riggings were added to the ship. Doesn't that sound a lot like a car \"floating\" along an automobile assembly line while components are added to it? In addition to this assembly line, the Venetians also used warehouse and inventory systems to keep track of materials, human resource management systems to manage the labor force, and an accounting system to keep track of revenues and costs. **According to the passage, the ancient equivalent of the assembly line was used in:**", "options": [{"id": "1", "text": "Egypt"}, {"id": "2", "text": "China"}, {"id": "3", "text": "Venice"}, {"id": "4", "text": "Giza"}], "correctAnswer": "3", "explanation": "*Key Concept:*\n* The passage explicitly states: \"...at the arsenal of Venice, warships were floated along the canals, and at each stop materials and riggings were added to the ship. Doesn't that sound a lot like a car 'floating' along an automobile assembly line...\"\n* This directly attributes the ancient assembly line equivalent to Venice.\n*Related Concepts:*\n* Analogy identification.\n* Targeted scanning.", "id": 48}, {"question": "Reading Comprehension Context (Applies to Q46 - Q50)\n**Directions:** Read the following passage and answer the questions:\nOrganized endeavors directed by people responsible for planning, organizing, leading and controlling activities have existed for thousands of years. The Egyptian pyramids and the Great Wall of China, for instance, are tangible evidence that projects of tremendous scope, employing tens of thousands of people, were undertaken well before modern times. The pyramids are a particularly interesting example. The construction of a single pyramid occupied more than 100,000 workers for 20 years. Who told each worker what to do? Who ensured that there would be enough stones at the site to keep workers busy? The answer to such questions is managers. Regardless of what managers were called at the time, someone had to plan what was to be done, organize people and materials to do it, lead and direct the workers, and impose some controls to ensure that everything was done as planned. Another example of early management can be seen during the 1400s in the city of Venice, Italy, a major economic and trade center. The Venetians developed an early form of business enterprise and engaged in many activities common to today's organizations. For instance, at the arsenal of Venice, warships were floated along the canals, and at each stop materials and riggings were added to the ship. Doesn't that sound a lot like a car \"floating\" along an automobile assembly line while components are added to it? In addition to this assembly line, the Venetians also used warehouse and inventory systems to keep track of materials, human resource management systems to manage the labor force, and an accounting system to keep track of revenues and costs. **According to the passage, persons responsible for the control, organisation and planning have been directing organised endeavors:**", "options": [{"id": "1", "text": "Since 1400's"}, {"id": "2", "text": "For 100,000 years"}, {"id": "3", "text": "For Twenty years"}, {"id": "4", "text": "For Thousands of years"}], "correctAnswer": "4", "explanation": "*Key Concept:*\n* The very first sentence of the passage provides the literal answer: \"Organized endeavors directed by people responsible for planning, organizing, leading and controlling activities have existed for thousands of years.\"\n* 1400s and 20 years are specific data points for secondary examples (Venice and Pyramid build time respectively).\n*Related Concepts:*\n* Main idea extraction.\n* Temporal data verification.", "id": 49}, {"question": "Reading Comprehension Context (Applies to Q46 - Q50)\n**Directions:** Read the following passage and answer the questions:\nOrganized endeavors directed by people responsible for planning, organizing, leading and controlling activities have existed for thousands of years. The Egyptian pyramids and the Great Wall of China, for instance, are tangible evidence that projects of tremendous scope, employing tens of thousands of people, were undertaken well before modern times. The pyramids are a particularly interesting example. The construction of a single pyramid occupied more than 100,000 workers for 20 years. Who told each worker what to do? Who ensured that there would be enough stones at the site to keep workers busy? The answer to such questions is managers. Regardless of what managers were called at the time, someone had to plan what was to be done, organize people and materials to do it, lead and direct the workers, and impose some controls to ensure that everything was done as planned. Another example of early management can be seen during the 1400s in the city of Venice, Italy, a major economic and trade center. The Venetians developed an early form of business enterprise and engaged in many activities common to today's organizations. For instance, at the arsenal of Venice, warships were floated along the canals, and at each stop materials and riggings were added to the ship. Doesn't that sound a lot like a car \"floating\" along an automobile assembly line while components are added to it? In addition to this assembly line, the Venetians also used warehouse and inventory systems to keep track of materials, human resource management systems to manage the labor force, and an accounting system to keep track of revenues and costs. **The reader learns from the given passage that:**", "options": [{"id": "1", "text": "Management is a recent creation."}, {"id": "2", "text": "The title of manager is an ancient one."}, {"id": "3", "text": "People directing organised endeavors can be seen down the ages."}, {"id": "4", "text": "The assembly line system was prevalent in China, Egypt and Italy."}], "correctAnswer": "3", "explanation": "*Key Concept:*\n* Option A is false because the text proves management is ancient.\n* Option B is false because the text explicitly says \"Regardless of what managers were called at the time,\" implying the *title* is modern, even if the *action* is ancient.\n* Option D is false because the assembly line is only attributed to Italy (Venice).\n* Option C accurately summarizes the entire thesis of the passage: the fundamental acts of management have occurred throughout human history.\n*Related Concepts:*\n* Synthesizing central themes.\n* Process of elimination in Reading Comprehension.", "id": 50}]};

        marked.setOptions({ breaks: true, gfm: true });

        const mathExtension = {
            name: 'math',
            level: 'inline',
            start(src) { return src.indexOf('$'); },
            tokenizer(src, tokens) {
                const blockRule = /^\$\$(.*?)\$\$/s;
                const inlineRule = /^\$([^$\n]+)\$/;
                let match;
                if ((match = blockRule.exec(src))) {
                    return { type: 'math', raw: match[0], text: match[1], displayMode: true };
                } else if ((match = inlineRule.exec(src))) {
                    return { type: 'math', raw: match[0], text: match[1], displayMode: false };
                }
            },
            renderer(token) {
                const safeText = token.text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                return token.displayMode ? `$$${safeText}$$` : `$${safeText}$`;
            }
        };
        marked.use({ extensions: [mathExtension] });

        const Icons = {
            Menu: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>,
            User: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            Alert: () => <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ef4444" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>,
            Printer: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>,
            Info: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>,
