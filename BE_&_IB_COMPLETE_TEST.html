    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        
        body { font-family: 'Inter', sans-serif; user-select: none; background-color: #f8fafc; color: #0f172a; }
        
        /* Smooth Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }
        ::-webkit-scrollbar-thumb:hover { background: #3b82f6; }
        
        /* Status Colors */
        .status-answered { background-color: #10b981; color: white; border-color: #10b981; } 
        .status-not_answered { background-color: #ef4444; color: white; border-color: #ef4444; } 
        .status-marked { background-color: #8b5cf6; color: white; border-color: #8b5cf6; } 
        .status-marked_answered { background-color: #8b5cf6; color: white; border-color: #8b5cf6; position: relative; } 
        .status-marked_answered::after { content: '✔'; position: absolute; bottom: -4px; right: -4px; font-size: 10px; color: #10b981; background: white; border-radius: 50%; padding: 0 2px; border: 1px solid #e2e8f0;}
        .status-not_visited { background-color: #f1f5f9; color: #64748b; border-color: #cbd5e1; } 
        
        .current-question { border: 2px solid #2563eb !important; transform: scale(1.15); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); z-index: 10;}
        
        /* Markdown Styling */
        .markdown-body table { width: 100%; border-collapse: separate; border-spacing: 0; margin: 15px 0; border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0; }
        .markdown-body thead tr { background-color: #eff6ff; color: #1e3a8a; }
        .markdown-body th, .markdown-body td { padding: 12px 15px; border-bottom: 1px solid #e2e8f0; border-right: 1px solid #e2e8f0;}
        .markdown-body th:last-child, .markdown-body td:last-child { border-right: none; }
        .markdown-body tbody tr:last-child td { border-bottom: none; }
        .markdown-body p { margin-bottom: 0.75rem; }
        .markdown-body strong { font-weight: 700; color: #0f172a; }
        .markdown-body ul { list-style-type: disc; margin-left: 20px; margin-bottom: 10px; }

        /* Glassmorphism */
        .glass-nav { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        .blur-content { filter: blur(8px); pointer-events: none; user-select: none; }
        .custom-radio { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .option-selected .custom-radio { border-width: 6px; border-color: #2563eb; }

        /* Donut Chart */
        @keyframes dash { to { stroke-dashoffset: 0; } }
        .circular-chart { display: block; margin: 0 auto; max-width: 80%; max-height: 250px; }
        .circle-bg { fill: none; stroke: #e2e8f0; stroke-width: 3.8; }
        .circle { fill: none; stroke-width: 2.8; stroke-linecap: round; animation: progress 1s ease-out forwards; }
        @keyframes progress { 0% { stroke-dasharray: 0 100; } }

        /* --- ADVANCED PRINT ENGINE (Fixes 1-Page PDF Issue) --- */
        @media print {
            @page { margin: 15mm; size: auto; }
            
            /* 1. Reset Global Layout */
            html, body {
                height: auto !important;
                min-height: 100% !important;
                overflow: visible !important;
                background-color: white !important;
                color: black !important;
                position: static !important;
                width: 100% !important;
                display: block !important;
            }

            /* 2. Unlock Scroll Containers */
            #root, .h-\[100dvh\], .h-full, .overflow-hidden, .overflow-y-auto, .flex-1, .flex-col {
                height: auto !important;
                overflow: visible !important;
                display: block !important;
                position: static !important;
            }

            /* 3. Hide App Interface Elements */
            .glass-nav, header, .fixed, .absolute, button, .print-hidden, .h-20, .h-16 {
                display: none !important;
            }

            /* 4. Fix Content Width & Page Breaks */
            .max-w-5xl, .max-w-4xl {
                max-width: 100% !important;
                width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
                box-shadow: none !important;
                border: none !important;
            }

            /* 5. Chart & Question Protection */
            .print-break-avoid {
                break-inside: avoid !important;
                page-break-inside: avoid !important;
                display: block !important; /* Fix for flex containers cutting off */
            }

            /* 6. Color Accuracy */
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            
            /* 7. Specific Fix for Charts */
            .grid-cols-3 {
                display: flex !important;
                justify-content: space-between !important;
                gap: 20px !important;
            }
        }
    </style>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const TEST_DATA = {"title": "BE & IB COMPLETE TEST", "organization": "ExamTym", "durationMinutes": 65, "totalMarks": 120.0, "marksForCorrect": 2.0, "marksForWrong": 0.0, "passPercentage": 40, "shuffle": false, "strictMode": true, "questions": [{"question": "A major competitor launches an aggressive marketing campaign. Concurrently, the government changes the overall GST structure for your industry. Which characteristic of the business environment does this scenario best illustrate?", "options": [{"id": "1", "text": "Specific and General Forces"}, {"id": "2", "text": "Inter-relatedness"}, {"id": "3", "text": "Totality of External Forces"}, {"id": "4", "text": "Uncertainty"}], "correctAnswer": "1", "explanation": "**Concept:** Characteristics of Business Environment\n\nKey Concept:** * The business environment consists of Specific and General forces.\n* Specific forces (like Competitors) affect individual enterprises directly and immediately.\n* General forces (like Legal/Political conditions, e.g., GST) affect all enterprises indirectly.\n* The scenario features both a competitor (specific) and a government tax change (general) operating simultaneously.\n* These dual forces define the structural impact on the firm.\n* \n**Additional Concept:** Inter-relatedness refers to different elements being closely linked, such as health awareness leading to organic food demand.", "id": 1}, {"question": "Match the components of the Business Environment (List I) with their correct classifications (List II).\n| List I (Component) | List II (Classification) |\n| --- | --- |\n| (A) Management Structure | (I) Specific Force - Micro Environment |\n| (B) Suppliers | (II) General Force - Macro Environment |\n| (C) Inflation Rate | (III) Internal Environment |\n| (D) Consumer Demographics | (IV) General Force - Socio-Cultural Environment |", "options": [{"id": "1", "text": "(A)-(III), (B)-(I), (C)-(II), (D)-(IV)"}, {"id": "2", "text": "(A)-(III), (B)-(II), (C)-(I), (D)-(IV)"}, {"id": "3", "text": "(A)-(I), (B)-(III), (C)-(IV), (D)-(II)"}, {"id": "4", "text": "(A)-(IV), (B)-(I), (C)-(II), (D)-(III)"}], "correctAnswer": "1", "explanation": "**Concept:** Components of Business Environment\n* **Key Concept:**\n* Management structure is an Internal Environment factor (controllable).\n* Suppliers are a specific force operating within the Micro Environment (immediate).\n* Inflation rate is a remote, uncontrollable Economic condition in the Macro Environment.\n* Consumer demographics fall under the larger societal/Social macro forces.\n* Proper classification requires identifying the locus of control and scope of impact.\n* \n**Additional Concept:** Micro environment factors use the acronym COSMIC (Customers, Organization, Suppliers, Market Intermediaries, Investors, Competitors).", "id": 2}, {"question": "Assertion (A):* A company's corporate culture and long-term vision are classified as uncontrollable variables because they dictate market trends.\n***Reason (R):* Factors existing within the business that management can alter are part of the internal environment.**", "options": [{"id": "1", "text": "Both (A) and (R) are correct and (R) is the correct explanation of (A)."}, {"id": "2", "text": "Both (A) and (R) are correct but (R) is NOT the correct explanation of (A)."}, {"id": "3", "text": "(A) is correct but (R) is false."}, {"id": "4", "text": "(A) is false but (R) is correct."}], "correctAnswer": "4", "explanation": "**Concept:** Internal Environment\n* **Key Concept:**\n* Corporate culture and long-term vision are part of the Internal Environment.\n* Internal factors exist within the business and are controllable by management.\n* The assertion incorrectly labels them as uncontrollable variables.\n* The reason provides the correct definition of the internal environment.\n* Therefore, A is false and R is true.\n* \n**Additional Concept:** The external environment (Micro and Macro) is uncontrollable, meaning the business must adapt its internal policies to survive external waves.", "id": 3}, {"question": "When analyzing the PESTEL framework, a government's transition from a Socialist to a Capitalist ideology primarily falls under which factor?", "options": [{"id": "1", "text": "Economic"}, {"id": "2", "text": "Political"}, {"id": "3", "text": "Social"}, {"id": "4", "text": "Legal"}], "correctAnswer": "2", "explanation": "**Concept:** Macro Environment (PESTEL)\n* **Key Concept:**\n* PESTEL stands for Political, Economic, Social, Technological, Environmental, and Legal forces.\n* Government ideology (Socialist vs Capitalist) is a core component of the Political environment.\n* This political ideology dictates how pro-business or pro-labor the nation's policies will be.\n* While it affects the economy, the ideology itself is a political driver.\n* Stability and foreign relations are also political factors.\n* \n**Additional Concept:** The Economic factor in PESTEL deals with the actual health indicators (GDP, interest rates) resulting from these political ideologies.", "id": 4}, {"question": "Consider the following statements regarding Economic Systems:\n**Statement I: In a Socialist economy, the primary driving force of economic activity is earning profit through intense competition.**\n**Statement II: A Mixed Economy involves a regulated market where the government uses laws like the Competition Act to prevent monopolies by private firms.**", "options": [{"id": "1", "text": "Both Statement I and Statement II are correct."}, {"id": "2", "text": "Both Statement I and Statement II are incorrect."}, {"id": "3", "text": "Statement I is correct, but Statement II is incorrect."}, {"id": "4", "text": "Statement I is incorrect, but Statement II is correct."}], "correctAnswer": "4", "explanation": "**Concept:** Economic Systems\n* **Key Concept:**\n* A Socialist economy aims for equality and social welfare, not profit maximization.\n* Profit motive and intense competition are key features of Capitalism, making Statement I incorrect.\n* A Mixed Economy combines both systems, allowing private firms but regulating them to prevent exploitation.\n* Statement II accurately describes the regulatory role in a mixed system.\n* India is a prime example of a mixed economy.\n* \n**Additional Concept:** In a socialist system, prices are typically \"Administered Prices\" fixed by the government to ensure affordability.", "id": 5}, {"question": "Which specific instrument of Monetary Policy involves the Reserve Bank of India buying or selling government securities to inject or suck liquidity from the market?", "options": [{"id": "1", "text": "Repo Rate"}, {"id": "2", "text": "Cash Reserve Ratio (CRR)"}, {"id": "3", "text": "Open Market Operations (OMO)"}, {"id": "4", "text": "Deficit Financing"}], "correctAnswer": "3", "explanation": "**Concept:** Economic Policies (Monetary)\n* **Key Concept:**\n* Monetary Policy is formulated by the RBI to manage money supply and inflation.\n* Open Market Operations (OMO) is the exact mechanism of buying/selling govt securities to manage market liquidity.\n* Repo Rate is the short-term lending rate.\n* CRR is the mandatory cash percentage kept with RBI.\n* Deficit Financing is a Fiscal Policy tool, not Monetary.\n* \n**Additional Concept:** Fiscal Policy, managed by the Ministry of Finance, uses Taxation and Public Expenditure to influence the economy.", "id": 6}, {"question": "If the Government of India increases its expenditure on building highways and bridges while simultaneously reducing direct taxes, this action is part of its:", "options": [{"id": "1", "text": "Restrictive Monetary Policy"}, {"id": "2", "text": "Expansionary Fiscal Policy"}, {"id": "3", "text": "Industrial Regulation Policy"}, {"id": "4", "text": "Capital Account Management"}], "correctAnswer": "2", "explanation": "**Concept:** Economic Policies (Fiscal)\n* **Key Concept:**\n* Fiscal Policy dictates Government Revenue (Taxation) and Expenditure.\n* Increasing expenditure on infrastructure pumps money into the economy.\n* Reducing income tax increases disposable income and demand.\n* These combined actions aim to expand economic growth, hence it is an expansionary Fiscal Policy.\n* Monetary policy relies on central bank tools (rates/reserves), not government spending.\n* \n**Additional Concept:** If expenditure exceeds revenue due to these actions, the government engages in Deficit Financing (borrowing or printing currency).", "id": 7}, {"question": "Arrange the following landmark Indian Industrial Policies in correct chronological order:\n**A) Abolition of the 'License Raj' under the LPG Model**\n**B) Classification of industries into Schedules A, B, and C**\n**C) Laying the foundation of a Mixed Economy dividing industries into 4 categories**", "options": [{"id": "1", "text": "C, B, A"}, {"id": "2", "text": "B, C, A"}, {"id": "3", "text": "A, B, C"}, {"id": "4", "text": "C, A, B"}], "correctAnswer": "1", "explanation": "**Concept:** Industrial Policy Evolution\n* **Key Concept:**\n* C refers to the Industrial Policy of 1948, the first policy laying the mixed economy foundation.\n* B refers to the Industrial Policy of 1956, the \"Economic Constitution\" creating Schedules A, B, C.\n* A refers to the New Industrial Policy (NIP) of 1991, which introduced the LPG model.\n* The correct historical timeline is 1948, then 1956, then 1991.\n* Chronology reflects the shift from strict PSU dominance to liberalization.\n* \n**Additional Concept:** The 1991 NIP was triggered by a Balance of Payment crisis, leading to the opening of borders to FDI (Globalization).", "id": 8}, {"question": "Match the Roles of Government (List I) with their corresponding examples (List II).\n| List I (Role) | List II (Example) |\n| --- | --- |\n| (A) Regulatory Role | (I) Creating Special Economic Zones (SEZs) |\n| (B) Promotional Role | (II) NITI Aayog setting 5-year agendas |\n| (C) Entrepreneurial Role | (III) FSSAI ensuring food safety standards |\n| (D) Planning Role | (IV) State Bank of India (SBI) operating as a bank |", "options": [{"id": "1", "text": "(A)-(III), (B)-(I), (C)-(IV), (D)-(II)"}, {"id": "2", "text": "(A)-(I), (B)-(III), (C)-(IV), (D)-(II)"}, {"id": "3", "text": "(A)-(III), (B)-(II), (C)-(I), (D)-(IV)"}, {"id": "4", "text": "(A)-(IV), (B)-(I), (C)-(II), (D)-(III)"}], "correctAnswer": "1", "explanation": "**Concept:** Role of Government in Business\n* **Key Concept:**\n* The Regulatory Role sets the rules, e.g., FSSAI regulating food safety.\n* The Promotional Role encourages growth via incentives, e.g., building SEZs or tax holidays.\n* The Entrepreneurial Role means the Govt acts as a business, e.g., owning SBI or ONGC.\n* The Planning Role sets long-term goals, e.g., NITI Aayog's digital transformation agendas.\n* Identifying these roles separates policy design from direct market participation.\n* \n**Additional Concept:** Non-compliance with the regulatory role's legal frameworks can lead to fines, imprisonment, or shutdown.", "id": 9}, {"question": "Assertion (A):* Under the Consumer Protection Act (COPRA) 2019, a person purchasing goods for resale is strictly excluded from the definition of a \"Consumer.\"\n***Reason (R):* COPRA is designed to protect end-users from exploitation, not to resolve commercial B2B disputes.**", "options": [{"id": "1", "text": "Both (A) and (R) are correct and (R) is the correct explanation of (A)."}, {"id": "2", "text": "Both (A) and (R) are correct but (R) is NOT the correct explanation of (A)."}, {"id": "3", "text": "(A) is correct but (R) is incorrect."}, {"id": "4", "text": "(A) is incorrect but (R) is correct."}], "correctAnswer": "1", "explanation": "**Concept:** COPRA 2019 - Definition of Consumer\n* **Key Concept:**\n* Section 2(7) of COPRA 2019 defines a consumer as someone buying goods/services for consideration.\n* It explicitly excludes anyone obtaining goods for resale or any commercial purpose.\n* The fundamental intent (Reason) is to protect final end-users, distinguishing B2C protections from general commercial contract law.\n* For example, a wholesaler buying ACs to sell is not a consumer under the Act.\n* Therefore, R directly explains the exclusion stated in A.\n* \n**Additional Concept:** The 2019 Act broadened the definition to explicitly include online (E-commerce) buyers and teleshopping.", "id": 10}, {"question": "Which of the following is NOT recognized as a fundamental Right of Consumers under COPRA 2019?", "options": [{"id": "1", "text": "Right to be Informed"}, {"id": "2", "text": "Right to Seek Redressal"}, {"id": "3", "text": "Right to Minimum Discount"}, {"id": "4", "text": "Right to Consumer Education"}], "correctAnswer": "3", "explanation": "**Concept:** Rights of Consumers (COPRA)\n* **Key Concept:**\n* COPRA protects Six Fundamental Rights.\n* These include the Right to Safety, Right to be Informed, Right to Choose, Right to be Heard, Right to Seek Redressal, and Right to Consumer Education.\n* There is no legal provision for a \"Right to Minimum Discount\" or \"Right to Basic Needs\".\n* The Act focuses on safety, transparency, and fairness, not dictating market pricing floors.\n* Option 3 is an exam trap designed to test strict legal knowledge.\n* \n**Additional Concept:** The Right to Choose ensures access to a variety of goods at competitive prices, preventing forced monopolies.", "id": 11}, {"question": "The introduction of \"Product Liability\" in the COPRA 2019 Act signifies that:", "options": [{"id": "1", "text": "E-commerce platforms must display the country of origin."}, {"id": "2", "text": "A manufacturer must compensate for harm or injury caused by a defective product, beyond mere replacement."}, {"id": "3", "text": "The District Commission can now hear cases up to \u20b91 Crore."}, {"id": "4", "text": "Celebrities can be jailed for endorsing any product."}], "correctAnswer": "2", "explanation": "**Concept:** COPRA 2019 - New Concepts\n* **Key Concept:**\n* Product Liability is a major new concept introduced in the 2019 Act.\n* It dictates that a manufacturer or service provider must compensate for any *harm* caused by a defective product.\n* Previously, under the 1986 act, only replacing the defective good was the norm.\n* Now, damages for the actual injury must be paid.\n* E-commerce inclusion and the CCPA are separate new concepts.\n* \n**Additional Concept:** The Central Consumer Protection Authority (CCPA) is the new regulatory body that can impose penalties for false advertisements, including celebrity endorsements.", "id": 12}, {"question": "Mr. X wishes to file a consumer complaint regarding a deficient service where the value of the consideration paid was \u20b975 Lakhs. Based on the 2021 Rules Revision of COPRA 2019, which agency has original pecuniary jurisdiction?", "options": [{"id": "1", "text": "District Consumer Disputes Redressal Commission"}, {"id": "2", "text": "State Consumer Disputes Redressal Commission"}, {"id": "3", "text": "National Consumer Disputes Redressal Commission"}, {"id": "4", "text": "Central Consumer Protection Authority"}], "correctAnswer": "2", "explanation": "**Concept:** COPRA Redressal Agencies (Pecuniary Jurisdiction)\n* **Key Concept:**\n* The 2021 Rules revised the pecuniary limits to reduce court burdens.\n* District Commissions handle claims up to \u20b950 Lakhs.\n* State Commissions handle claims more than \u20b950 Lakhs but up to \u20b92 Crores.\n* National Commissions handle claims more than \u20b92 Crores.\n* A claim of \u20b975 Lakhs falls strictly into the State Commission's bracket.\n* \n**Additional Concept:** If Mr. X is dissatisfied with the State Commission's order, he has appellate jurisdiction to file an appeal to the National Commission.", "id": 13}, {"question": "The Foreign Exchange Management Act (FEMA), 1999 fundamentally shifted India's regulatory approach. Which statement accurately reflects this shift compared to the older FERA 1973?", "options": [{"id": "1", "text": "FEMA shifted the focus from managing forex to strict conservation of forex."}, {"id": "2", "text": "FEMA treats violations as criminal offenses with immediate jail time."}, {"id": "3", "text": "FEMA operates on the principle that \"Everything is permitted unless prohibited.\""}, {"id": "4", "text": "FEMA determines residential status strictly based on Indian citizenship."}], "correctAnswer": "3", "explanation": "**Concept:** FEMA vs FERA Philosophy\n* **Key Concept:**\n* FERA was a restrictive \"Police\" Act where everything was prohibited unless permitted.\n* FEMA is a \"Civil\" and facilitating Act where everything is permitted unless explicitly prohibited.\n* FEMA offenses are Civil (monetary fines), whereas FERA was Criminal (immediate jail).\n* FEMA focuses on management, while FERA focused on conservation.\n* Residential status under FEMA is based on stay (>182 days), not citizenship.\n* \n**Additional Concept:** FEMA aims to facilitate external trade and promote the orderly development of the forex market in India.", "id": 14}, {"question": "Match the FEMA concepts (List I) with their correct descriptions (List II).\n| List I (FEMA Concept) | List II (Description) |\n| --- | --- |\n| (A) Person Resident in India | (I) Day-to-day transactions that do not alter assets/liabilities. |\n| (B) Current Account Transaction | (II) Regulated transactions altering international assets/liabilities. |\n| (C) Capital Account Transaction | (III) Generally, a person residing >182 days in the preceding FY. |\n| (D) The \"Purpose\" Test | (IV) An exception denying resident status if leaving for employment abroad. |", "options": [{"id": "1", "text": "(A)-(III), (B)-(I), (C)-(II), (D)-(IV)"}, {"id": "2", "text": "(A)-(III), (B)-(II), (C)-(I), (D)-(IV)"}, {"id": "3", "text": "(A)-(IV), (B)-(I), (C)-(II), (D)-(III)"}, {"id": "4", "text": "(A)-(I), (B)-(III), (C)-(IV), (D)-(II)"}], "correctAnswer": "1", "explanation": "**Concept:** FEMA Definitions\n* **Key Concept:**\n* Resident status requires >182 days stay in the preceding financial year.\n* The \"Purpose Test\" invalidates this if leaving for employment or business abroad.\n* Current Account transactions are short-term and do not alter assets/liabilities (e.g., travel, trade).\n* Capital Account transactions alter foreign assets/liabilities (e.g., FDI, property) and are restricted.\n* Matching these definitions is crucial for applying FEMA rules.\n* \n**Additional Concept:** Current Account transactions are generally fully convertible (free), while Capital Account transactions are partially convertible and heavily regulated by RBI.", "id": 15}, {"question": "Assertion (A):* Buying a house abroad by an Indian resident is heavily regulated by the RBI and is not fully convertible.\n***Reason (R):* It is classified as a Current Account transaction under FEMA.**", "options": [{"id": "1", "text": "Both (A) and (R) are correct and (R) is the correct explanation of (A)."}, {"id": "2", "text": "Both (A) and (R) are correct but (R) is NOT the correct explanation of (A)."}, {"id": "3", "text": "(A) is correct but (R) is false."}, {"id": "4", "text": "(A) is false but (R) is correct."}], "correctAnswer": "3", "explanation": "**Concept:** FEMA - Capital Account Transactions\n* **Key Concept:**\n* Buying a house abroad alters the assets outside India of a person resident in India.\n* Because it alters assets, it is strictly classified as a Capital Account transaction, not Current.\n* Capital Account transactions are restricted and heavily regulated by RBI (partial convertibility).\n* Therefore, Assertion (A) is true, but Reason (R) is false.\n* \n**Additional Concept:** Examples of Current Account transactions include payments for foreign trade, interest on loans, or foreign travel expenses.", "id": 16}, {"question": "The demographic trend known as the \"Demographic Dividend\" in India directly creates a high business demand for which of the following?", "options": [{"id": "1", "text": "Urban housing and public transport."}, {"id": "2", "text": "Smartphones, education, and fast fashion."}, {"id": "3", "text": "Cosmetics and time-saving appliances like washing machines."}, {"id": "4", "text": "Small \"Nuclear Family\" sized grocery packs."}], "correctAnswer": "2", "explanation": "**Concept:** Demographic Environment\n* **Key Concept:**\n* Demographic Dividend refers to India's highly young population (average age ~29 years).\n* This youth demographic directly drives demand for tech (smartphones), education, fast fashion, and automobiles.\n* Urban housing demand is driven by Urbanization.\n* Cosmetics and washing machine demand is driven by the rise in Working Women.\n* Small pack demand is driven by Nuclear Family structures.\n* \n**Additional Concept:** Ignoring social values (like food habits) can lead to severe boycotts, showing how socio-cultural environments overlap with demographics.", "id": 17}, {"question": "According to Section 135 of the Companies Act, 2013, CSR becomes mandatory if a company meets ANY ONE of three specific financial criteria during the immediately preceding financial year. Which of the following correctly states one of those criteria?", "options": [{"id": "1", "text": "Net Worth of \u20b9100 Crore or more."}, {"id": "2", "text": "Turnover of \u20b9500 Crore or more."}, {"id": "3", "text": "Net Profit of \u20b95 Crore or more."}, {"id": "4", "text": "Total Assets of \u20b91000 Crore or more."}], "correctAnswer": "3", "explanation": "**Concept:** CSR Applicability (The 5-10-5 Rule)\n* **Key Concept:**\n* Section 135(1) establishes the \"5-10-5 Rule\" for CSR.\n* The criteria are: Net Worth \u2265 \u20b9500 Crore, Turnover \u2265 \u20b91000 Crore, OR Net Profit \u2265 \u20b95 Crore.\n* If ANY ONE of these is met, CSR is mandatory.\n* Option 3 correctly identifies the Net Profit threshold.\n* Options 1, 2, and 4 mix up the numbers or use incorrect metrics (Total Assets).\n* \n**Additional Concept:** Net Worth is calculated as Assets minus Liabilities.", "id": 18}, {"question": "Calculate the mandatory CSR spending requirement for Alpha Ltd. if it meets the Section 135 criteria and has the following Net Profits over the last three financial years: Year 1 = \u20b910 Cr, Year 2 = \u20b920 Cr, Year 3 = \u20b930 Cr.", "options": [{"id": "1", "text": "\u20b91.2 Crores"}, {"id": "2", "text": "\u20b90.6 Crores"}, {"id": "3", "text": "\u20b90.4 Crores"}, {"id": "4", "text": "\u20b91.0 Crores"}], "correctAnswer": "3", "explanation": "**Concept:** CSR Spending Calculation\n* **Key Concept:**\n* The required spending is at least 2% of the Average Net Profits of the three immediately preceding financial years.\n* Step 1: Calculate Total Profit = 10 + 20 + 30 = 60 Cr.\n* Step 2: Calculate Average Profit = 60 / 3 = 20 Cr.\n* Step 3: Calculate 2% of Average Profit = 2% of 20 Cr = 0.4 Cr (\u20b940 Lakhs).\n* The calculation must be based on Average Net Profit, not Turnover or a single year's profit.\n* \n**Additional Concept:** If a company fails to spend this amount, the Board must specify reasons, and unspent funds (not for ongoing projects) must be transferred to a Schedule VII fund within 6 months.", "id": 19}, {"question": "Which of the following expenditures is legally counted as Corporate Social Responsibility (CSR) under Schedule VII of the Companies Act, 2013?", "options": [{"id": "1", "text": "Sponsoring a local political candidate's environmental campaign."}, {"id": "2", "text": "Setting up a free vocational training center for rural unemployed youth."}, {"id": "3", "text": "Providing premium health insurance exclusively for the company's middle management."}, {"id": "4", "text": "Upgrading the company's manufacturing software to increase normal business efficiency."}], "correctAnswer": "2", "explanation": "**Concept:** CSR Approved Activities (Schedule VII)\n* **Key Concept:**\n* CSR spending must align with Schedule VII activities.\n* Promoting education and employment enhancing vocational skills is an approved activity.\n* Political contributions are strictly prohibited.\n* Activities benefiting only employees are strictly prohibited.\n* Activities undertaken in the normal course of business do not count as CSR.\n* \n**Additional Concept:** Other approved activities include eradicating hunger, promoting gender equality, protecting national heritage, and contributing to the PM CARES fund.", "id": 20}, {"question": "Match the MSME classification (List I) with its new 2020 composite criteria limit (List II).\n| List I (Enterprise Type) | List II (Investment & Turnover Limit) |\n| --- | --- |\n| (A) Micro Enterprise | (I) Investment < \u20b950 Cr AND Turnover < \u20b9250 Cr |\n| (B) Small Enterprise | (II) Investment < \u20b91 Cr AND Turnover < \u20b95 Cr |\n| (C) Medium Enterprise | (III) Investment < \u20b910 Cr AND Turnover < \u20b950 Cr |", "options": [{"id": "1", "text": "(A)-(II), (B)-(III), (C)-(I)"}, {"id": "2", "text": "(A)-(III), (B)-(II), (C)-(I)"}, {"id": "3", "text": "(A)-(II), (B)-(I), (C)-(III)"}, {"id": "4", "text": "(A)-(I), (B)-(III), (C)-(II)"}], "correctAnswer": "1", "explanation": "**Concept:** MSME New Definition (2020)\n* **Key Concept:**\n* The 2020 MSME definition uses composite criteria of Investment AND Turnover.\n* Micro: Investment < 1 Cr AND Turnover < 5 Cr.\n* Small: Investment < 10 Cr AND Turnover < 50 Cr.\n* Medium: Investment < 50 Cr AND Turnover < 250 Cr.\n* The distinction between manufacturing and service sectors was removed in this 2020 revision.\n* \n**Additional Concept:** To memorize: start with 1 & 5 (Micro), multiply by 10 for Small (10 & 50), multiply Small by 5 for Medium (50 & 250).", "id": 21}, {"question": "Assertion (A):* NITI Aayog follows a \"Top-Down\" approach in policy making, similar to the defunct Planning Commission.\n***Reason (R):* NITI Aayog is a constitutional body chaired by the Prime Minister.**", "options": [{"id": "1", "text": "Both (A) and (R) are correct and (R) is the correct explanation of (A)."}, {"id": "2", "text": "Both (A) and (R) are correct but (R) is NOT the correct explanation of (A)."}, {"id": "3", "text": "(A) is correct but (R) is false."}, {"id": "4", "text": "Both (A) and (R) are false."}], "correctAnswer": "4", "explanation": "**Concept:** NITI Aayog\n* **Key Concept:**\n* NITI Aayog follows a \"Bottom-Up\" approach (Cooperative Federalism), entirely opposite to the Planning Commission's \"Top-Down\" approach.\n* Therefore, A is completely false.\n* NITI Aayog was formed via a Cabinet Resolution; it is a non-constitutional, non-statutory body.\n* Therefore, R is also false.\n* It acts purely as a \"Think Tank\" and cannot allocate funds.\n* \n**Additional Concept:** Its Governing Council includes Chief Ministers of all States and Lt. Governors of UTs to ensure state partnership in policy.", "id": 22}, {"question": "The technological phenomenon where new innovations render old industries obsolete, famously observed when digital cameras replaced Kodak film, is termed:", "options": [{"id": "1", "text": "Green Marketing"}, {"id": "2", "text": "Creative Destruction"}, {"id": "3", "text": "Demographic Dividend"}, {"id": "4", "text": "Product Life Cycle"}], "correctAnswer": "2", "explanation": "**Concept:** Technological Environment\n* **Key Concept:**\n* The technological environment introduces new methods of producing/operating.\n* \"Creative Destruction\" (or Obsolescence) is the process where new technology destroys old industries.\n* Digital Cameras killing Kodak film or Netflix killing Blockbuster are prime examples.\n* Green marketing relates to the ecological environment.\n* Demographic dividend relates to the population structure.\n* \n**Additional Concept:** Technological advancements also reduce labor costs via automation and create entirely new markets like the Gig Economy (Uber).", "id": 23}, {"question": "A firm engaging in \"Green Marketing\" is responding primarily to which component of the macro environment?", "options": [{"id": "1", "text": "Economic Policies"}, {"id": "2", "text": "Technological Automation"}, {"id": "3", "text": "Environmental (Ecological) Constraints"}, {"id": "4", "text": "Demographic Urbanization"}], "correctAnswer": "3", "explanation": "**Concept:** Environmental (Ecological) Environment\n* **Key Concept:**\n* The Environmental (Ecological) environment dictates the need to preserve the ecosystem.\n* Green Marketing is the process of selling products based on their environmental benefits (e.g., selling EVs as \"Zero Emission\").\n* It is a direct strategic response to ecological concerns and consumer awareness regarding sustainability.\n* It is distinct from economic, tech, or demographic shifts.\n* \n**Additional Concept:** Businesses must also track their \"Carbon Footprint\" (greenhouse gas generation) to comply with laws like the Environment Protection Act, 1986.", "id": 24}, {"question": "Match Porter\u2019s Five Forces (List I) with their business condition (List II).\n| List I (Force) | List II (Condition) |\n| --- | --- |\n| (A) Threat of New Entrants | (I) Customers have many options and can demand lower prices. |\n| (B) Bargaining Power of Suppliers | (II) The fight between existing players is fierce. |\n| (C) Bargaining Power of Buyers | (III) Capital requirement to start a business is very high. |\n| (D) Rivalry among Competitors | (IV) There are very few entities providing raw materials. |", "options": [{"id": "1", "text": "(A)-(III), (B)-(IV), (C)-(I), (D)-(II)"}, {"id": "2", "text": "(A)-(IV), (B)-(III), (C)-(I), (D)-(II)"}, {"id": "3", "text": "(A)-(I), (B)-(II), (C)-(III), (D)-(IV)"}, {"id": "4", "text": "(A)-(III), (B)-(I), (C)-(IV), (D)-(II)"}], "correctAnswer": "1", "explanation": "**Concept:** Porter's Five Forces\n* **Key Concept:**\n* Threat of New Entrants is evaluated by how easy it is to start; high capital requirements mean a Low threat (Condition III).\n* Supplier Power is high when there are few suppliers (Condition IV).\n* Buyer Power is high when customers have many options (Condition I).\n* Rivalry is the fierce fight between existing firms like Coke vs Pepsi (Condition II).\n* Porter's framework helps analyze the Micro Environment.\n* \n**Additional Concept:** The Threat of Substitutes measures if another product entirely can replace yours (e.g., Tea replacing Coffee).", "id": 25}, {"question": "Which of the following combinations correctly represents the \"COSMIC\" acronym factors that define the immediate Micro Environment?", "options": [{"id": "1", "text": "Culture, Organization, Social, Media, Investors, Competitors"}, {"id": "2", "text": "Customers, Organization, Suppliers, Market Intermediaries, Investors, Competitors"}, {"id": "3", "text": "Competitors, Organization, Suppliers, Macro, Inflation, Customers"}, {"id": "4", "text": "Customers, Operations, Society, Market, Institutions, Capital"}], "correctAnswer": "2", "explanation": "**Concept:** Micro Environment (COSMIC)\n* **Key Concept:**\n* The Micro environment consists of actors intimate to the firm's immediate environment.\n* The COSMIC acronym represents: Customers, Organization, Suppliers, Market Intermediaries, Investors/Financiers, and Competitors.\n* These factors affect day-to-day performance directly.\n* Social, Macro, and Culture are Macro environment (PESTEL) factors.\n* \n**Additional Concept:** Market Intermediaries include middlemen, transporters, and advertising agencies that help sell and distribute.", "id": 26}, {"question": "The implementation of the Goods and Services Tax (GST) in India replaced a complex web of indirect taxes. Which statement correctly identifies its nature within Economic Policies?", "options": [{"id": "1", "text": "It is a direct tax managed by the RBI under Monetary Policy."}, {"id": "2", "text": "It is an indirect tax that has a regressive nature, falling under Fiscal Policy."}, {"id": "3", "text": "It is a direct tax with a progressive nature, managed by the Ministry of Finance."}, {"id": "4", "text": "It is an administered price mechanism under socialist economic systems."}], "correctAnswer": "2", "explanation": "**Concept:** Economic Policies (Taxation)\n* **Key Concept:**\n* Taxation is a core component of Fiscal Policy, formulated by the Govt of India.\n* GST is an Indirect Tax.\n* Indirect taxes have a \"regressive nature\" because everyone pays the same amount on a product, regardless of their income level.\n* Direct taxes (like Income Tax) are progressive (rich pay more).\n* The RBI manages Monetary Policy, not taxation.\n* \n**Additional Concept:** GST's implementation was a massive Macro (Legal/Economic) change affecting the entire nation's logistics and pricing.", "id": 27}, {"question": "Assertion (A):* A business firm has full control over the specific forces in its micro environment, such as suppliers and competitors.\n***Reason (R):* Factors existing outside the business entity are uncontrollable in nature and require the business to adapt.**", "options": [{"id": "1", "text": "Both (A) and (R) are correct and (R) is the correct explanation of (A)."}, {"id": "2", "text": "Both (A) and (R) are correct but (R) is NOT the correct explanation of (A)."}, {"id": "3", "text": "(A) is correct but (R) is false."}, {"id": "4", "text": "(A) is false but (R) is correct."}], "correctAnswer": "4", "explanation": "**Concept:** Components of Business Environment\n* **Key Concept:**\n* The external environment (both Micro and Macro) exists outside the business.\n* All external factors, including specific forces like suppliers and competitors, are Uncontrollable by nature.\n* A business must adapt to them; it cannot control its rivals.\n* Therefore, Assertion (A) is completely false.\n* Reason (R) states the correct fundamental definition of external factors.\n* \n**Additional Concept:** Only Internal Environment factors (like Corporate Culture and Management Structure) are controllable.", "id": 28}, {"question": "A multinational corporation (MNC) faces a sudden ban on its operations in a foreign country due to diplomatic tensions. This scenario best exemplifies the impact of the:", "options": [{"id": "1", "text": "Technological Environment"}, {"id": "2", "text": "Internal Environment"}, {"id": "3", "text": "Political Environment"}, {"id": "4", "text": "Demographic Environment"}], "correctAnswer": "3", "explanation": "**Concept:** Political Environment\n* **Key Concept:**\n* The Political environment includes government stability, ideology, and foreign relations.\n* Diplomatic tensions (foreign relations) are a pure political force.\n* E.g., Political tension stopping trade, or the Indian Govt banning TikTok due to political/legal shifts.\n* These are uncontrollable external macro forces that can shut down operations immediately.\n* \n**Additional Concept:** A government's emphasis on \"Atmanirbhar Bharat\" (Self-Reliance) is another political ideology heavily impacting manufacturing incentives.", "id": 29}, {"question": "Under the Companies Act, 2013, if a company's required CSR spending for the year does NOT exceed \u20b950 Lakhs, which of the following exemptions applies?", "options": [{"id": "1", "text": "The company is entirely exempt from spending any money on CSR."}, {"id": "2", "text": "The constitution of a separate CSR Committee is not mandatory."}, {"id": "3", "text": "The company can spend the money on internal employee benefits instead of Schedule VII activities."}, {"id": "4", "text": "The company is allowed to contribute the amount directly to political parties."}], "correctAnswer": "2", "explanation": "**Concept:** CSR Committee Exemptions\n* **Key Concept:**\n* An important amendment exists regarding the CSR Committee.\n* If the amount to be spent by a company does not exceed \u20b950 Lakhs, the constitution of a separate CSR Committee is NOT mandatory.\n* In this case, the Board of Directors itself can discharge the committee's functions.\n* The obligation to *spend* remains; only the administrative requirement of a separate committee is waived.\n* Political and employee-only contributions remain strictly prohibited.\n* \n**Additional Concept:** A standard CSR Committee must have a minimum of 3 Directors, including at least 1 Independent Director.", "id": 30}, {"question": "Match the regulatory bodies/Acts (List I) with their primary objective (List II).\n| List I (Body/Act) | List II (Objective) |\n| --- | --- |\n| (A) Competition Act, 2002 | (I) To facilitate external trade and manage forex |\n| (B) FEMA, 1999 | (II) To prevent monopolies and promote market fairness |\n| (C) COPRA, 2019 | (III) To regulate matters of false advertisements and protect buyers |\n| (D) SEBI | (IV) To regulate stock markets as a regulatory government role |", "options": [{"id": "1", "text": "(A)-(II), (B)-(I), (C)-(III), (D)-(IV)"}, {"id": "2", "text": "(A)-(I), (B)-(II), (C)-(III), (D)-(IV)"}, {"id": "3", "text": "(A)-(II), (B)-(III), (C)-(I), (D)-(IV)"}, {"id": "4", "text": "(A)-(IV), (B)-(I), (C)-(II), (D)-(III)"}], "correctAnswer": "1", "explanation": "**Concept:** Legal Environment - Overview\n* **Key Concept:**\n* The Competition Act, 2002 replaced the MRTP act to prevent monopolies and promote competition.\n* FEMA, 1999 manages forex and facilitates trade.\n* COPRA, 2019 protects consumers and established the CCPA for false ads.\n* SEBI is the standard example of the Government's Regulatory Role over stock markets.\n* Matching these accurately maps India's commercial legal landscape.\n* \n**Additional Concept:** The legal maxim \"Ignorantia juris non excusat\" (Ignorance of law is no excuse) applies to all these acts.", "id": 31}, {"question": "A manufacturing company expands operations, resulting in an Investment in Plant and Machinery of \u20b945 Crores and an Annual Turnover of \u20b9240 Crores. Under the 2020 MSME definition, it is classified as a:", "options": [{"id": "1", "text": "Micro Enterprise"}, {"id": "2", "text": "Small Enterprise"}, {"id": "3", "text": "Medium Enterprise"}, {"id": "4", "text": "Large Enterprise"}], "correctAnswer": "3", "explanation": "**Concept:** MSME Definition (Calculation)\n* **Key Concept:**\n* Classification requires checking both limits of the composite criteria.\n* Medium limits are: Investment < \u20b950 Crore AND Turnover < \u20b9250 Crore.\n* The firm's 45 Cr investment is under the 50 Cr limit.\n* The firm's 240 Cr turnover is under the 250 Cr limit.\n* Because both metrics fall below the Medium threshold but above the Small threshold (<10Cr / <50Cr), it is a Medium Enterprise.\n* **Additional Concept:** If Turnover had exceeded 250 Cr, it would lose MSME status entirely and become a Large Enterprise.", "id": 32}, {"question": "Which fundamental legal philosophy distinguishes the Foreign Exchange Management Act (FEMA) from its predecessor, FERA?", "options": [{"id": "1", "text": "FEMA assumes all businessmen are corrupt, whereas FERA assumed honesty."}, {"id": "2", "text": "FEMA treats violations as civil offenses, whereas FERA treated them as criminal offenses."}, {"id": "3", "text": "FEMA aims to conserve foreign exchange, whereas FERA aimed to manage it."}, {"id": "4", "text": "FEMA strictly prohibits all Capital Account transactions, whereas FERA allowed them freely."}], "correctAnswer": "2", "explanation": "**Concept:** FEMA vs FERA differences\n* **Key Concept:**\n* FEMA (1999) changed the nature of offenses from Criminal (FERA) to Civil.\n* Under FERA, violations resulted in immediate imprisonment.\n* Under FEMA, violations result in monetary penalties (fines); imprisonment occurs only if fines aren't paid.\n* FEMA assumes businessmen are honest and aims to manage/facilitate forex.\n* FERA assumed businessmen were thieves and aimed to conserve forex.\n* \n**Additional Concept:** FEMA is considered highly investor-friendly compared to the draconian FERA.", "id": 33}, {"question": "In the context of Porter\u2019s Five Forces, if it is extremely difficult and highly expensive for a new tech startup to enter the semiconductor manufacturing industry, this indicates:", "options": [{"id": "1", "text": "High Bargaining Power of Buyers"}, {"id": "2", "text": "High Threat of Substitutes"}, {"id": "3", "text": "Low Threat of New Entrants"}, {"id": "4", "text": "Low Rivalry among Competitors"}], "correctAnswer": "3", "explanation": "**Concept:** Porter's Five Forces (New Entrants)\n* **Key Concept:**\n* The \"Threat of New Entrants\" force analyzes how easy it is for a new company to start.\n* A high capital requirement acts as a massive barrier to entry.\n* Because it is so difficult to enter, the threat posed to existing companies by new entrants is Low.\n* This protects the profitability of the existing players in the micro environment.\n* \n**Additional Concept:** If there were many options for buyers to choose from, that would indicate a High Bargaining Power of Buyers.", "id": 34}, {"question": "Assertion (A):* The Central Consumer Protection Authority (CCPA) can impose penalties on celebrities who endorse misleading products.\n***Reason (R):* The CCPA was established under the 1986 Consumer Protection Act to handle E-commerce disputes exclusively.**", "options": [{"id": "1", "text": "Both (A) and (R) are correct and (R) is the correct explanation of (A)."}, {"id": "2", "text": "Both (A) and (R) are correct but (R) is NOT the correct explanation of (A)."}, {"id": "3", "text": "(A) is correct but (R) is false."}, {"id": "4", "text": "(A) is false but (R) is correct."}], "correctAnswer": "3", "explanation": "**Concept:** COPRA 2019 (CCPA)\n* **Key Concept:**\n* The CCPA regulates matters of consumer rights violations, unfair trade practices, and false advertisements.\n* It has the direct power to penalize celebrities for misleading endorsements. Thus, A is true.\n* However, the CCPA was a new concept introduced in the 2019 Act, not the 1986 Act.\n* Furthermore, it regulates all false advertising, not *exclusively* e-commerce. Thus, R is false.\n* \n**Additional Concept:** E-commerce inclusion (handling returns/country of origin) is a separate distinct new concept of the 2019 Act.", "id": 35}, {"question": "Match the Economic Systems (List I) with their Core Features (List II).\n| List I (System) | List II (Core Feature) |\n| --- | --- |\n| (A) Capitalism | (I) Central planning decides production; state owns means of production. |\n| (B) Socialism | (II) Price Mechanism purely determines prices; profit motive drives activity. |\n| (C) Mixed Economy | (III) Co-existence of Public and Private sectors; regulated market. |", "options": [{"id": "1", "text": "(A)-(II), (B)-(I), (C)-(III)"}, {"id": "2", "text": "(A)-(I), (B)-(II), (C)-(III)"}, {"id": "3", "text": "(A)-(II), (B)-(III), (C)-(I)"}, {"id": "4", "text": "(A)-(III), (B)-(I), (C)-(II)"}], "correctAnswer": "1", "explanation": "**Concept:** Economic Systems\n* **Key Concept:**\n* Capitalism (Free Market) relies on the Price Mechanism (Demand/Supply) and the Profit Motive.\n* Socialism (Command Economy) relies on Central Planning by authorities to ensure social welfare.\n* Mixed Economy involves Dual Sectors (Public and Private) co-existing, with government regulation preventing exploitation.\n* Matching these identifies the fundamental rules governing resource allocation.\n* \n**Additional Concept:** The USA is a prime example of Capitalism, former USSR of Socialism, and India of a Mixed Economy.", "id": 36}, {"question": "Which of the following is an example of a \"Capital Account Transaction\" under FEMA, 1999?", "options": [{"id": "1", "text": "Paying tuition fees for a child studying in Australia."}, {"id": "2", "text": "An Indian company importing raw materials from China."}, {"id": "3", "text": "Receiving dividend income from shares held in a US company."}, {"id": "4", "text": "An Indian corporation taking an External Commercial Borrowing (ECB) from a foreign bank."}], "correctAnswer": "4", "explanation": "**Concept:** FEMA - Capital vs Current Account\n* **Key Concept:**\n* Capital Account transactions alter Assets or Liabilities outside India.\n* External Commercial Borrowings (ECBs) create a large foreign liability (debt) for the Indian company, making it a Capital transaction.\n* Current Account transactions are short-term and do not alter assets/liabilities.\n* Foreign trade payments (imports), education expenses, and net income (dividends) are all Current Account transactions.\n* \n**Additional Concept:** Foreign Direct Investment (FDI) into India is another major example of a restricted Capital Account transaction.", "id": 37}, {"question": "What is the fundamental difference between the \"Bottom-Up\" approach of NITI Aayog and the \"Top-Down\" approach of the defunct Planning Commission?", "options": [{"id": "1", "text": "NITI Aayog allocates funds directly to states, while the Planning Commission did not."}, {"id": "2", "text": "NITI Aayog treats States as partners in policy-making (Cooperative Federalism), unlike the centralized Planning Commission."}, {"id": "3", "text": "NITI Aayog is chaired by the President, while the Planning Commission was chaired by the Prime Minister."}, {"id": "4", "text": "NITI Aayog only plans for 1 year, while the Planning Commission planned for 5 years."}], "correctAnswer": "2", "explanation": "**Concept:** NITI Aayog vs Planning Commission\n* **Key Concept:**\n* The core philosophical shift to NITI Aayog was embracing Cooperative Federalism (Bottom-Up approach).\n* This means States are active partners in policy-making via the Governing Council.\n* The old Planning Commission followed a rigid, centralized \"Top-Down\" approach where the center dictated to the states.\n* NITI Aayog does NOT allocate funds (Finance Ministry does).\n* Both are/were chaired by the Prime Minister.\n* \n**Additional Concept:** NITI Aayog functions purely as a \"Think Tank\" for the government.", "id": 38}, {"question": "Assertion (A):* Under the \"Right to be Informed\" outlined in COPRA 2019, a seller is legally obligated to disclose the purity, standard, and price of goods.\n***Reason (R):* This right aims to prevent unfair trade practices and ensure the consumer makes an educated purchasing decision.**", "options": [{"id": "1", "text": "Both (A) and (R) are correct and (R) is the correct explanation of (A)."}, {"id": "2", "text": "Both (A) and (R) are correct but (R) is NOT the correct explanation of (A)."}, {"id": "3", "text": "(A) is correct but (R) is false."}, {"id": "4", "text": "(A) is false but (R) is correct."}], "correctAnswer": "1", "explanation": "**Concept:** Rights of Consumers (COPRA)\n* **Key Concept:**\n* The Right to be Informed explicitly guarantees the consumer's right to know the quality, quantity, potency, purity, standard, and price of goods.\n* The stated purpose of this right is explicitly \"to prevent unfair trade practices\".\n* Therefore, the Reason (R) is the exact legal justification for the Assertion (A).\n* \n**Additional Concept:** This is distinct from the Right to Consumer Education, which involves acquiring general knowledge and skill to be an informed consumer over time.", "id": 39}, {"question": "Which major historical industrial policy is credited with bringing the \"LPG Model\" (Liberalization, Privatization, Globalization) to India in response to a Balance of Payment crisis?", "options": [{"id": "1", "text": "Industrial Policy Resolution, 1948"}, {"id": "2", "text": "Industrial Policy Resolution, 1956"}, {"id": "3", "text": "New Industrial Policy, 1991"}, {"id": "4", "text": "MSME Development Act, 2006"}], "correctAnswer": "3", "explanation": "**Concept:** Industrial Policy Evolution\n* **Key Concept:**\n* The New Industrial Policy (NIP) of 1991 is famously known as \"The Game Changer\".\n* It was introduced specifically in response to the Balance of Payment crisis.\n* It brought the LPG Model: Liberalization (abolishing License Raj), Privatization (disinvestment), and Globalization (opening to FDI).\n* The 1956 policy was the highly restrictive \"Economic Constitution\" emphasizing PSUs.\n* **Additional Concept:** The shift represented a massive move away from socialist-leaning central planning toward a freer mixed economy.", "id": 40}, {"question": "In calculating CSR applicability, the threshold for \"Turnover\" during the immediately preceding financial year must be:", "options": [{"id": "1", "text": "\u20b95 Crore or more"}, {"id": "2", "text": "\u20b9100 Crore or more"}, {"id": "3", "text": "\u20b9500 Crore or more"}, {"id": "4", "text": "\u20b91000 Crore or more"}], "correctAnswer": "4", "explanation": "**Concept:** CSR Applicability Thresholds\n* **Key Concept:**\n* Applicability is governed by Section 135(1) via the \"5-10-5 Rule\".\n* The threshold for Turnover (Sales) is strictly \u20b91000 Crore or more.\n* The threshold for Net Worth is \u20b9500 Crore or more.\n* The threshold for Net Profit is \u20b95 Crore or more.\n* Memorizing the exact numbers (500 NW, 1000 TO, 5 NP) is critical for exam calculations.\n* \n**Additional Concept:** Only one of these three conditions needs to be met for CSR to become mandatory.", "id": 41}, {"question": "A sudden change in consumer preference from offline shopping malls to online e-commerce platforms primarily illustrates which characteristic of the Business Environment?", "options": [{"id": "1", "text": "Totality of External Forces"}, {"id": "2", "text": "Specific Forces"}, {"id": "3", "text": "Dynamic Nature"}, {"id": "4", "text": "Inter-relatedness"}], "correctAnswer": "3", "explanation": "**Concept:** Characteristics of Business Environment\n* **Key Concept:**\n* The Dynamic Nature characteristic dictates that the environment is never static; it is constantly changing.\n* Shifting consumer tastes from offline to online shopping is the classic example of this dynamic shift.\n* Technology improves, and preferences shift, forcing businesses to constantly adapt.\n* Inter-relatedness involves two different elements linking (e.g., social health awareness driving economic food demand).\n* \n**Additional Concept:** Uncertainty is a closely related characteristic, noting how difficult it is to predict these future happenings, especially in fast-moving industries.", "id": 42}, {"question": "The \"Product Life Cycle Theory\" of international trade suggests that trade patterns are primarily influenced by:", "options": [{"id": "1", "text": "The absolute efficiency of a nation's labor force."}, {"id": "2", "text": "The differences in national factor endowments like land and capital."}, {"id": "3", "text": "Where a new product is introduced, matures, and eventually becomes standardized."}, {"id": "4", "text": "Government subsidies artificially lowering the cost of production."}], "correctAnswer": "3", "explanation": "**Concept:** International Trade Theories (General IB Syllabus)\n* **Key Concept:**\n* Developed by Raymond Vernon, the Product Life Cycle (PLC) theory explains how a product's location of production shifts over time.\n* In the \"New Product\" stage, it is produced in the inventing, developed country.\n* As it \"Matures\" and becomes \"Standardized\", production shifts to developing nations to capitalize on cheaper labor.\n* Factor endowments (land/capital) relate to the Heckscher-Ohlin Theory.\n* Absolute efficiency relates to Adam Smith's Absolute Advantage.\n* **Additional Concept:** The PLC theory heavily explains the movement of consumer electronics production from the US/Japan to countries like China and Vietnam over decades.", "id": 43}, {"question": "Assertion (A):* Under FEMA 1999, the Indian Rupee is fully convertible on the Current Account.\n***Reason (R):* Current Account transactions are day-to-day transactions (like import payments) that the government generally permits freely.**", "options": [{"id": "1", "text": "Both (A) and (R) are correct and (R) is the correct explanation of (A)."}, {"id": "2", "text": "Both (A) and (R) are correct but (R) is NOT the correct explanation of (A)."}, {"id": "3", "text": "(A) is correct but (R) is false."}, {"id": "4", "text": "(A) is false but (R) is correct."}], "correctAnswer": "1", "explanation": "**Concept:** FEMA - Convertibility\n* **Key Concept:**\n* The Golden Rule of FEMA is that Current Account transactions are generally permitted (FREE).\n* Because they are free for trade/travel, the Rupee is Fully Convertible on the Current Account.\n* Reason (R) defines these as day-to-day transactions that don't alter core assets, explaining why the government allows free convertibility.\n* \n**Additional Concept:** In stark contrast, Capital Account transactions are restricted, meaning the Rupee is NOT fully convertible (partial convertibility) on the Capital Account.", "id": 44}, {"question": "Match the International Trade Theories (List I) with their Originators/Concepts (List II).\n| List I (Theory) | List II (Originator/Concept) |\n| --- | --- |\n| (A) Absolute Advantage | (I) Heckscher-Ohlin |\n| (B) Comparative Advantage | (II) Adam Smith |\n| (C) Factor Endowment | (III) Zero-sum game; accumulate gold |\n| (D) Mercantilism | (IV) David Ricardo (Opportunity Cost) |", "options": [{"id": "1", "text": "(A)-(II), (B)-(IV), (C)-(I), (D)-(III)"}, {"id": "2", "text": "(A)-(IV), (B)-(II), (C)-(III), (D)-(I)"}, {"id": "3", "text": "(A)-(II), (B)-(I), (C)-(IV), (D)-(III)"}, {"id": "4", "text": "(A)-(I), (B)-(IV), (C)-(II), (D)-(III)"}], "correctAnswer": "1", "explanation": "**Concept:** International Trade Theories\n* **Key Concept:**\n* Absolute Advantage (Adam Smith) focuses on producing where a country is most efficient.\n* Comparative Advantage (David Ricardo) introduces the concept of relative efficiency and opportunity cost.\n* Factor Endowment (Heckscher-Ohlin) states trade is based on abundant resources (labor/capital).\n* Mercantilism is the ancient theory viewing trade as a zero-sum game focused on exporting to hoard gold/wealth.\n* **Additional Concept:** Modern trade theory heavily relies on Michael Porter's Competitive Advantage of Nations, which introduces the 'Diamond' model of national advantage.", "id": 45}, {"question": "A consumer intends to file a case directly with the National Consumer Disputes Redressal Commission (NCDRC) under COPRA 2019 (2021 Rules). What must be the minimum value of the goods/services paid?", "options": [{"id": "1", "text": "More than \u20b920 Lakhs"}, {"id": "2", "text": "More than \u20b950 Lakhs"}, {"id": "3", "text": "More than \u20b91 Crore"}, {"id": "4", "text": "More than \u20b92 Crores"}], "correctAnswer": "4", "explanation": "**Concept:** COPRA Redressal Agencies (National Tier)\n* **Key Concept:**\n* Tier 3 is the National Commission (NCDRC) located in New Delhi.\n* Its pecuniary jurisdiction (Monetary Limit) is to hear complaints where the value exceeds \u20b92 Crores.\n* Values up to \u20b950 Lakhs go to the District Commission.\n* Values from \u20b950L to \u20b92Cr go to the State Commission.\n* \n**Additional Concept:** Any person aggrieved by the National Commission's order can file a final appeal to the Supreme Court of India within 30 days.", "id": 46}, {"question": "If an enterprise has an investment in Plant and Machinery of \u20b99 Crores and an Annual Turnover of \u20b948 Crores, it is classified as a:", "options": [{"id": "1", "text": "Micro Enterprise"}, {"id": "2", "text": "Small Enterprise"}, {"id": "3", "text": "Medium Enterprise"}, {"id": "4", "text": "Large Enterprise"}], "correctAnswer": "2", "explanation": "**Concept:** MSME Definition Calculation\n* **Key Concept:**\n* We use the 2020 composite limits.\n* Micro limit: Inv < 1 Cr AND Turn < 5 Cr.\n* Small limit: Inv < 10 Cr AND Turn < 50 Cr.\n* The firm's Inv is 9 Cr (< 10) AND Turn is 48 Cr (< 50).\n* Because both metrics fall securely within the Small bracket (and exceed the Micro bracket), it is classified as a Small Enterprise.\n* \n**Additional Concept:** If the turnover increased slightly to \u20b951 Crores, the enterprise would immediately be pushed into the Medium Enterprise bracket.", "id": 47}, {"question": "Which of the following activities is STRICTLY PROHIBITED from being counted as CSR spending under Schedule VII of the Companies Act, 2013?", "options": [{"id": "1", "text": "Contributions to the Swachh Bharat Kosh."}, {"id": "2", "text": "Contributions to any political party."}, {"id": "3", "text": "Promoting gender equality and empowering women."}, {"id": "4", "text": "Protection of national heritage, art, and culture."}], "correctAnswer": "2", "explanation": "**Concept:** CSR Prohibited Activities\n* **Key Concept:**\n* Schedule VII dictates approved CSR activities.\n* There are strict NOs: Contribution to any political party is explicitly banned from counting as CSR.\n* Activities benefiting *only* employees are also banned.\n* Swachh Bharat (environmental sustainability), gender equality, and heritage protection are all approved activities.\n* \n**Additional Concept:** The underlying philosophy is that business uses resources from society, giving it a moral/legal obligation to give back broadly to the public, not to narrow political interests.", "id": 48}, {"question": "Assertion (A):* Under FEMA 1999, Mr. Y, who stayed in India for 190 days in the preceding financial year, is automatically a Resident of India regardless of why he leaves the country this year.\n***Reason (R):* FEMA bases residential status solely on staying more than 182 days in the preceding financial year.**", "options": [{"id": "1", "text": "Both (A) and (R) are correct and (R) is the correct explanation of (A)."}, {"id": "2", "text": "Both (A) and (R) are correct but (R) is NOT the correct explanation of (A)."}, {"id": "3", "text": "(A) is correct but (R) is false."}, {"id": "4", "text": "Both (A) and (R) are false."}], "correctAnswer": "4", "explanation": "**Concept:** FEMA Residential Status (Exceptions)\n* **Key Concept:**\n* While the general rule requires >182 days stay in the preceding FY, it is NOT the sole automatic determinant.\n* FEMA applies the crucial \"Purpose Test\" exception.\n* Even if a person stayed >182 days, they are NOT a resident if they leave India for employment, business, or an uncertain stay abroad.\n* Therefore, both the Assertion (automatic residency) and the Reason (solely based on days) are false.\n* **Additional Concept:** Residential status is critical because only true Residents can hold standard Savings accounts and freely buy agricultural land; NRIs face strict limitations.", "id": 49}, {"question": "Match the types of Regional Economic Integration (List I) with their defining features (List II).\n| List I (Integration Type) | List II (Feature) |\n| --- | --- |\n| (A) Free Trade Area (FTA) | (I) Removes internal tariffs + Adopts common external tariff. |\n| (B) Customs Union | (II) Removes internal tariffs only. |\n| (C) Common Market | (III) Adds integration of economic policies (e.g., common currency). |\n| (D) Economic Union | (IV) Adds free movement of factors of production (labor/capital). |", "options": [{"id": "1", "text": "(A)-(II), (B)-(I), (C)-(IV), (D)-(III)"}, {"id": "2", "text": "(A)-(I), (B)-(II), (C)-(IV), (D)-(III)"}, {"id": "3", "text": "(A)-(II), (B)-(IV), (C)-(I), (D)-(III)"}, {"id": "4", "text": "(A)-(III), (B)-(I), (C)-(IV), (D)-(II)"}], "correctAnswer": "1", "explanation": "**Concept:** Regional Economic Integration\n* **Key Concept:**\n* Integration progresses in stages.\n* FTA (lowest): Removes internal tariffs among members.\n* Customs Union: FTA + a common external tariff against non-members.\n* Common Market: Customs Union + free mobility of labor and capital across borders.\n* Economic Union (highest): Common Market + harmonized economic policies and often a single currency (like the Euro).\n* **Additional Concept:** The European Union (EU) is the prime real-world example of an Economic Union, having evolved from a simple Customs Union and Common Market.", "id": 50}, {"question": "The \"Geocentric Approach\" to international staffing policy suggests that a multinational enterprise (MNE) will:", "options": [{"id": "1", "text": "Staff all key management positions with parent-country nationals."}, {"id": "2", "text": "Seek the best people for key jobs throughout the organization, regardless of nationality."}, {"id": "3", "text": "Prefer host-country nationals to manage local subsidiaries."}, {"id": "4", "text": "Outsource all management functions to third-party consultants."}], "correctAnswer": "2", "explanation": "**Concept:** International Human Resource Management (EPRG Framework)\n* **Key Concept:**\n* The EPRG framework (Ethnocentric, Polycentric, Regiocentric, Geocentric) guides MNC staffing.\n* The Geocentric approach is completely globally integrated, seeking the best talent worldwide regardless of passport.\n* Ethnocentric restricts key roles to parent-country nationals (home country superiority).\n* Polycentric uses host-country nationals for local subsidiaries (local adaptation).\n* Regiocentric focuses on managers from within a specific geographic region.\n* **Additional Concept:** A geocentric strategy aligns best with a \"Transnational Strategy,\" balancing global efficiency with local responsiveness.", "id": 51}, {"question": "Which WTO principle dictates that any trade concession (like a tariff reduction) granted to one member country must be immediately and unconditionally granted to all other member countries?", "options": [{"id": "1", "text": "National Treatment"}, {"id": "2", "text": "Special Drawing Rights (SDR)"}, {"id": "3", "text": "Most Favored Nation (MFN)"}, {"id": "4", "text": "Anti-Dumping Regulation"}], "correctAnswer": "3", "explanation": "**Concept:** WTO Principles (MFN)\n* **Key Concept:**\n* Most Favored Nation (MFN) is the foundational rule of non-discrimination in the WTO.\n* Despite the name, it means you cannot favor one nation over another; a favor to one is a favor to all.\n* National Treatment is the other pillar, demanding equal treatment for foreign and domestic goods *after* they enter the market.\n* SDR is an IMF reserve asset, not a WTO trade rule.\n* **Additional Concept:** Regional Free Trade Agreements (like NAFTA/USMCA) are an explicitly permitted exception to the MFN rule, allowing members to grant special tariffs only to each other.", "id": 52}, {"question": "Assertion (A):* Direct Taxes, such as the Income Tax in India, are progressive in nature.\n***Reason (R):* Progressive taxation ensures that higher-income individuals pay a larger percentage of their income in taxes compared to lower-income individuals.**", "options": [{"id": "1", "text": "Both (A) and (R) are correct and (R) is the correct explanation of (A)."}, {"id": "2", "text": "Both (A) and (R) are correct but (R) is NOT the correct explanation of (A)."}, {"id": "3", "text": "(A) is correct but (R) is false."}, {"id": "4", "text": "(A) is false but (R) is correct."}], "correctAnswer": "1", "explanation": "**Concept:** Fiscal Policy (Taxation)\n* **Key Concept:**\n* Direct taxes (Income Tax) are the core of India's direct revenue collection.\n* They are inherently \"Progressive\".\n* Progressive means the rich pay more; as income brackets rise, the tax rate percentage rises.\n* This is a tool to reduce wealth inequality within the economic system.\n* The Reason perfectly defines the mechanics of the Assertion.\n* \n**Additional Concept:** Indirect taxes (like GST) are \"Regressive\" because everyone pays the exact same amount on a product, impacting the poor harder.", "id": 53}, {"question": "Which PESTEL factor is represented by a country's average literacy rate, joint family structures, and changing lifestyle habits?", "options": [{"id": "1", "text": "Political"}, {"id": "2", "text": "Economic"}, {"id": "3", "text": "Social"}, {"id": "4", "text": "Technological"}], "correctAnswer": "3", "explanation": "**Concept:** Macro Environment (PESTEL - Social)\n* **Key Concept:**\n* The Social (or Socio-Cultural) environment encompasses society's traditions, values, demographics, and lifestyle.\n* Literacy rates, culture, demographics (age/gender), and family structures (Joint vs Nuclear) are prime examples.\n* Joint families drive demand for bulk sizes; Nuclear families drive demand for convenience foods.\n* The Political environment deals with government stability; Economic with GDP/inflation.\n* \n**Additional Concept:** The rise of Working Women is a massive socio-demographic shift driving new market demands for formal wear and time-saving tech.", "id": 54}, {"question": "Match the International Institutions (List I) with their primary function (List II).\n| List I (Institution) | List II (Primary Function) |\n| --- | --- |\n| (A) World Trade Organization (WTO) | (I) Provide short-term loans to resolve Balance of Payments crises. |\n| (B) International Monetary Fund (IMF) | (II) Provide long-term loans for infrastructure and poverty reduction. |\n| (C) World Bank (IBRD) | (III) Settle global trade disputes and enforce multilateral trade agreements. |", "options": [{"id": "1", "text": "(A)-(III), (B)-(I), (C)-(II)"}, {"id": "2", "text": "(A)-(I), (B)-(II), (C)-(III)"}, {"id": "3", "text": "(A)-(III), (B)-(II), (C)-(I)"}, {"id": "4", "text": "(A)-(II), (B)-(I), (C)-(III)"}], "correctAnswer": "1", "explanation": "**Concept:** International Institutions (IMF, WB, WTO)\n* **Key Concept:**\n* The WTO (born from the Uruguay Round) creates rules for global trade and settles trade disputes.\n* The IMF (Bretton Woods) ensures monetary stability and provides short-term bailouts for BOP crises.\n* The World Bank (sister to IMF) focuses on long-term developmental loans for infrastructure.\n* Confusing the IMF (short-term crisis management) with the World Bank (long-term development) is a common exam trap.\n* **Additional Concept:** The IMF created Special Drawing Rights (SDRs) to supplement global liquidity during crises.", "id": 55}, {"question": "When a company engages in \"Dumping\" in international business, it is:", "options": [{"id": "1", "text": "Exporting hazardous environmental waste to developing nations."}, {"id": "2", "text": "Selling products in a foreign market at a price below its cost of production or below domestic prices."}, {"id": "3", "text": "Licensing its intellectual property without charging royalty fees."}, {"id": "4", "text": "Subsidizing its domestic suppliers to bypass WTO tariffs."}], "correctAnswer": "2", "explanation": "**Concept:** International Trade Practices (Dumping)\n* **Key Concept:**\n* Dumping is a predatory pricing strategy in international trade.\n* It occurs when an exporter sells goods abroad cheaper than at home, or below the actual cost of production.\n* The goal is to flood the foreign market, destroy local competitors, and establish a monopoly.\n* Dumping is distinct from environmental waste disposal or domestic subsidies.\n* **Additional Concept:** If a country proves dumping is hurting its domestic industry, the WTO allows it to retaliate by imposing \"Anti-Dumping Duties\" on the offending imports.", "id": 56}, {"question": "Assertion (A):* The Competition Act, 2002 penalizes companies simply for being large and achieving a dominant position in the market.\n***Reason (R):* The objective of the Act is to prevent monopolies and protect the interests of consumers.**", "options": [{"id": "1", "text": "Both (A) and (R) are correct and (R) is the correct explanation of (A)."}, {"id": "2", "text": "Both (A) and (R) are correct but (R) is NOT the correct explanation of (A)."}, {"id": "3", "text": "(A) is correct but (R) is false."}, {"id": "4", "text": "(A) is false but (R) is correct."}], "correctAnswer": "4", "explanation": "**Concept:** Legal Environment (Competition Act)\n* **Key Concept:**\n* The Competition Act, 2002 replaced the old MRTP Act.\n* Unlike MRTP, the Competition Act does *not* penalize a firm merely for being large or dominant. Dominance achieved through efficiency is legal.\n* It only penalizes the \"abuse\" of that dominant position (like predatory pricing or forced tying). Therefore, A is false.\n* Reason (R) correctly states the broad objective: preventing monopolies (anti-competitive agreements) to promote market fairness.\n* **Additional Concept:** The Competition Commission of India (CCI) enforces this Act and scrutinizes major corporate mergers and acquisitions.", "id": 57}, {"question": "In the Balance of Payments (BOP), where would an Indian IT company\u2019s earnings from exporting software services to Europe be recorded?", "options": [{"id": "1", "text": "Capital Account"}, {"id": "2", "text": "Official Reserve Account"}, {"id": "3", "text": "Current Account - Merchandise Trade"}, {"id": "4", "text": "Current Account - Invisibles"}], "correctAnswer": "4", "explanation": "**Concept:** Balance of Payments (BOP)\n* **Key Concept:**\n* BOP is divided into Current and Capital accounts.\n* The Current Account tracks trade in goods, services, and transfers.\n* Physical goods are \"Merchandise Trade\" (visible).\n* Services (like IT, consulting, shipping) are recorded as \"Invisibles\" within the Current Account.\n* It is not a Capital Account transaction because it does not create future asset/liability obligations.\n* **Additional Concept:** Foreign Direct Investment (FDI) or taking foreign loans (ECBs) would be recorded in the Capital Account.", "id": 58}, {"question": "A manufacturer explicitly labels their packaged food product as \"100% Organic\" when it actually contains synthetic pesticides. Under the COPRA 2019 framework, which newly formed authority has the specific power to regulate this false advertisement?", "options": [{"id": "1", "text": "Reserve Bank of India (RBI)"}, {"id": "2", "text": "Central Consumer Protection Authority (CCPA)"}, {"id": "3", "text": "National Consumer Disputes Redressal Commission (NCDRC)"}, {"id": "4", "text": "Competition Commission of India (CCI)"}], "correctAnswer": "2", "explanation": "**Concept:** COPRA 2019 (CCPA)\n* **Key Concept:**\n* The 2019 Act introduced the Central Consumer Protection Authority (CCPA).\n* It acts as a proactive regulatory body.\n* Its specific mandate includes regulating matters relating to the violation of rights, unfair trade practices, and specifically *false advertisements*.\n* The NCDRC is a redressal court, whereas the CCPA is an investigative/regulatory authority that can suo-moto halt false ads.\n* \n**Additional Concept:** The CCPA can also impose heavy penalties on the celebrities endorsing these fake organic products.", "id": 59}, {"question": "When analyzing the Socio-Cultural Environment of India, why do fast-moving consumer goods (FMCG) companies aggressively market \"Ready-to-eat\" meals like Maggi and small pack sizes in urban areas?", "options": [{"id": "1", "text": "To comply with the environmental packaging laws."}, {"id": "2", "text": "To target the growing demographic of Joint Families."}, {"id": "3", "text": "To target the rising number of Nuclear Families and Working Women who seek convenience."}, {"id": "4", "text": "To bypass the progressive direct taxation laws on large family packs."}], "correctAnswer": "3", "explanation": "**Concept:** Socio-Cultural Environment (Family Structure)\n* **Key Concept:**\n* Family structure deeply influences demand.\n* Nuclear Families demand small packs and convenience foods (like Maggi or ready-to-eat meals).\n* Joint families demand large \"Family Packs\".\n* Furthermore, the rise in Working Women reduces available cooking time, highly increasing the demand for time-saving convenience foods.\n* This is a strategic adaptation to a social shift, not a tax or legal compliance issue.\n* \n**Additional Concept:** Urbanization (village to city migration) accelerates this trend, driving massive demand for urban housing and packaged goods tailored to smaller, faster-paced households.\nI hope this comprehensive simulation proves invaluable for your UGC NET June 2026 preparation. Remember, identifying the subtle differences in legal limits and conceptual terminology is what bridges the gap between NET and JRF. Let me know if you need to deep-dive into any specific unit!", "id": 60}]};
