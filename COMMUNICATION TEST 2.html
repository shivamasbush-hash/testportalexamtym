    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const TEST_DATA = {"title": "comm test 2", "organization": "ExamTym", "durationMinutes": 35, "totalMarks": 60.0, "marksForCorrect": 2.0, "marksForWrong": 0.0, "passPercentage": 40, "shuffle": false, "strictMode": true, "questions": [{"question": "Small talk or casual conversation that serves primarily to establish or maintain social relationships rather than impart significant information is academically termed as:", "options": [{"id": "1", "text": "Phatic Communication"}, {"id": "2", "text": "Didactic Communication"}, {"id": "3", "text": "Cathartic Communication"}, {"id": "4", "text": "Heuristic Communication"}], "correctAnswer": "1", "explanation": "**Detailed Explanation:** Phatic communication, a term introduced by Bronis\u0142aw Malinowski, refers to communication used to perform a social task, express sociability, or establish an atmosphere, rather than conveying heavy information. Common greetings like \"How are you?\" or chatting about the weather are prime examples. Didactic refers to instructional communication, cathartic is for emotional release, and heuristic is for discovery/problem-solving.", "id": 1}, {"question": "In the study of non-verbal communication, the use of physical objects, clothing, jewelry, and personal accessories to convey identity, status, or mood is known as:", "options": [{"id": "1", "text": "Olfactics"}, {"id": "2", "text": "Artifactics"}, {"id": "3", "text": "Chromatics"}, {"id": "4", "text": "Gustatics"}], "correctAnswer": "2", "explanation": "**Detailed Explanation:** Artifactics is the study of how people use artifacts\u2014physical objects, clothing, uniforms, or jewelry\u2014to communicate non-verbal messages about their social status, profession, or personality. Olfactics (Option 1) is the study of smell. Chromatics (Option 3) involves the use of color in communication. Gustatics (Option 4) relates to communication through taste. Artifactics plays a crucial role in forming first impressions.", "id": 2}, {"question": "Which mass communication theory, popular in the 1920s and 1930s, suggested that media messages are directly and uniformly \"injected\" into the minds of a passive audience, causing immediate behavioral changes?", "options": [{"id": "1", "text": "Uses and Gratifications Theory"}, {"id": "2", "text": "Magic Bullet Theory"}, {"id": "3", "text": "Cultivation Theory"}, {"id": "4", "text": "Standpoint Theory"}], "correctAnswer": "2", "explanation": "**Detailed Explanation:** The Magic Bullet Theory (also known as the Hypodermic Needle Theory) posits that mass media has a direct, immediate, and powerful effect on its audiences, treating the audience as passive receptacles. It assumes messages act like bullets fired straight into the viewer's head. Options 1 and 3 are later theories that acknowledge an active audience. Standpoint Theory (Option 4) deals with how a person's social position influences their understanding of the world.", "id": 3}, {"question": "The autonomous statutory body \"Prasar Bharati,\" which functions as India's public service broadcaster encompassing Doordarshan and All India Radio, was officially established in which year?", "options": [{"id": "1", "text": "1959"}, {"id": "2", "text": "1976"}, {"id": "3", "text": "1997"}, {"id": "4", "text": "2004"}], "correctAnswer": "3", "explanation": "**Detailed Explanation:** Prasar Bharati is India's largest public broadcasting agency. It was established on November 23, 1997, following the Prasar Bharati Act. Before this, Doordarshan and All India Radio (AIR) operated under the direct control of the Ministry of Information and Broadcasting. 1959 marks the introduction of television in India, and 1976 marks the separation of Doordarshan from AIR, making 1997 the correct answer.", "id": 4}, {"question": "In the standard process of communication, which of the following represents the very first step initiated by the sender?", "options": [{"id": "1", "text": "Encoding"}, {"id": "2", "text": "Ideation"}, {"id": "3", "text": "Transmission"}, {"id": "4", "text": "Channel Selection"}], "correctAnswer": "2", "explanation": "**Detailed Explanation:** The communication process begins with Ideation, where the sender forms an idea, thought, or concept they wish to convey. Once the idea is formulated, the sender then translates it into symbols or words (Encoding), selects a medium (Channel Selection), and sends it (Transmission). Without the initial cognitive step of ideation, there is no message to encode or transmit.", "id": 5}, {"question": "Communication that occurs exclusively between two individuals, allowing for immediate feedback and intimate exchange of verbal and non-verbal cues, is strictly defined as:", "options": [{"id": "1", "text": "Intrapersonal Communication"}, {"id": "2", "text": "Mass Communication"}, {"id": "3", "text": "Dyadic Communication"}, {"id": "4", "text": "Group Communication"}], "correctAnswer": "3", "explanation": "**Detailed Explanation:** Dyadic communication refers specifically to a quantitative interaction between exactly two people. It is the most common form of interpersonal communication, allowing for deep, reciprocal exchanges (e.g., an interview or a conversation between two friends). Intrapersonal (Option 1) is communication with oneself. Mass and Group communications involve larger numbers of participants, ruling them out.", "id": 6}, {"question": "In the context of educational communication in India, 'SWAYAM PRABHA' is a group of DTH channels devoted to telecasting high-quality educational programs. On which satellite do these channels operate?", "options": [{"id": "1", "text": "INSAT-3DR"}, {"id": "2", "text": "GSAT-15"}, {"id": "3", "text": "Edusat (GSAT-3)"}, {"id": "4", "text": "RISAT-2B"}], "correctAnswer": "2", "explanation": "**Detailed Explanation:** SWAYAM PRABHA is an MHRD initiative providing educational content via Direct-to-Home (DTH) channels on a 24x7 basis. These channels are uplinked from BISAG, Gandhinagar, and heavily utilize the GSAT-15 satellite. While Edusat (Option 3) was India's first dedicated educational satellite launched earlier, SWAYAM PRABHA specifically relies on the transponders of the modern GSAT-15 satellite.", "id": 7}, {"question": "Which concept refers to the non-verbal elements of speech, such as pitch, volume, speaking rate, and articulation, which modify the meaning of verbal communication?", "options": [{"id": "1", "text": "Kinesics"}, {"id": "2", "text": "Paralanguage"}, {"id": "3", "text": "Proxemics"}, {"id": "4", "text": "Syntactics"}], "correctAnswer": "2", "explanation": "**Detailed Explanation:** Paralanguage (or vocalics) encompasses the vocal but non-verbal aspects of speech. It includes pitch, tone, tempo, volume, and vocal segregates (like \"um\" or \"ah\"). It dictates *how* something is said rather than *what* is said. Kinesics is body language, Proxemics is spatial distance, and Syntactics is the grammatical arrangement of words.", "id": 8}, {"question": "When an evaluator assesses student learning, progress, and classroom communication *during* the course of a semester to provide ongoing feedback, this is termed:", "options": [{"id": "1", "text": "Summative Evaluation"}, {"id": "2", "text": "Formative Evaluation"}, {"id": "3", "text": "Diagnostic Evaluation"}, {"id": "4", "text": "Norm-referenced Evaluation"}], "correctAnswer": "2", "explanation": "**Detailed Explanation:** Formative evaluation is conducted during the learning process to modify teaching and learning activities to improve student attainment. It provides real-time feedback. Summative evaluation (Option 1) evaluates student learning at the end of an instructional unit by comparing it against a standard. Diagnostic (Option 3) identifies prior knowledge before instruction. Thus, continuous, in-progress assessment is formative.\n### Section B: Moderate / Matching & Analytical Statements (40% = 12 Questions)\n*Focus: Match the following, Chronological order, Statement-based (I & II).*", "id": 9}, {"question": "Match List I (Communication Networks) with List II (Characteristics).\n**List I:** A. Wheel Network, B. Chain Network, C. Circle Network, D. All-Channel Network\n**List II:** I. Information flows strictly up or down the scalar chain of command. II. Members can communicate with everyone; high satisfaction but slow. III. All information flows through a single central leader; highly centralized. IV. Members communicate only with adjoining members on either side.", "options": [{"id": "1", "text": "A-III, B-I, C-IV, D-II"}, {"id": "2", "text": "A-I, B-III, C-II, D-IV"}, {"id": "3", "text": "A-III, B-IV, C-I, D-II"}, {"id": "4", "text": "A-IV, B-I, C-III, D-II"}], "correctAnswer": "1", "explanation": "**Detailed Explanation:** In a Wheel Network (A), one central figure coordinates all communication (III). A Chain Network (B) strictly follows formal hierarchical lines (I). In a Circle Network (C), communication occurs only between adjacent peers (IV). An All-Channel Network (D) is decentralized, allowing everyone to interact freely, typical of self-managed teams (II). Option 1 correctly aligns these organizational topologies.", "id": 10}, {"question": "Consider the following statements regarding 'Gatekeeping' in mass media:\n**Statement I:** Gatekeeping is the process by which a vast array of potential news stories are filtered, selected, and edited by media executives before reaching the public.\n**Statement II:** Kurt Lewin originally coined the term 'gatekeeping' to describe the unhindered, free flow of information on digital social media platforms without any editorial control.", "options": [{"id": "1", "text": "Both Statement I and Statement II are true."}, {"id": "2", "text": "Both Statement I and Statement II are false."}, {"id": "3", "text": "Statement I is true but Statement II is false."}, {"id": "4", "text": "Statement I is false but Statement II is true."}], "correctAnswer": "3", "explanation": "**Detailed Explanation:** Statement I is the accurate definition of media gatekeeping, where editors and producers act as filters deciding what information the public consumes. Statement II is false; Kurt Lewin did coin the term in 1943, but he applied it to food habits and later to structural social filtering, not to the \"unhindered free flow\" of digital media, which actually undermines traditional gatekeeping.", "id": 11}, {"question": "Arrange the following key developments in the history of Indian broadcasting in chronological order:\nA. First television broadcast by Doordarshan\nB. Introduction of Color Television\nC. Establishment of All India Radio (AIR) under that name\nD. Launch of Vividh Bharati Service", "options": [{"id": "1", "text": "C, D, A, B"}, {"id": "2", "text": "A, C, D, B"}, {"id": "3", "text": "C, A, D, B"}, {"id": "4", "text": "D, C, A, B"}], "correctAnswer": "1", "explanation": "**Detailed Explanation:** The correct historical sequence is: C: All India Radio was officially named in 1936. D: Vividh Bharati, the commercial/entertainment broadcasting service, was launched in 1957. A: The first experimental television broadcast in India occurred in 1959. B: Color television was introduced to India much later, in 1982, coinciding with the Asian Games. Thus, C, D, A, B is the accurate timeline.", "id": 12}, {"question": "Match List I (Normative Theories of Mass Media) with List II (Core Philosophy).\n**List I:** A. Authoritarian Theory, B. Libertarian Theory, C. Social Responsibility Theory, D. Soviet Media Theory\n**List II:** I. The press must be completely free from state control to discover the truth. II. Media is owned by the state and exists solely to serve the interests of the working class/party. III. The press should be free but has an obligation to be accountable to society and adhere to ethics. IV. The press acts as a servant to the state, and censorship is justified to protect national interests.", "options": [{"id": "1", "text": "A-IV, B-III, C-I, D-II"}, {"id": "2", "text": "A-IV, B-I, C-III, D-II"}, {"id": "3", "text": "A-II, B-I, C-III, D-IV"}, {"id": "4", "text": "A-I, B-IV, C-II, D-III"}], "correctAnswer": "2", "explanation": "**Detailed Explanation:** Authoritarian Theory (A) justifies state censorship (IV). Libertarian Theory (B) advocates for absolute press freedom (Free Press Theory) (I). Social Responsibility Theory (C), developed by the Hutchins Commission, balances freedom with ethical obligations to the public (III). Soviet Communist Theory (D) ties the media directly to the state/party for ideological propagation (II). Option 2 matches perfectly.", "id": 13}, {"question": "Consider the following statements regarding the phrase \"The Medium is the Message\":\n**Statement I:** Coined by Marshall McLuhan, it suggests that the nature of the communication channel itself has a more profound impact on society than the actual content it carries.\n**Statement II:** It implies that television programs, regardless of their genre, have no sociological impact compared to the physical television sets sitting in homes.", "options": [{"id": "1", "text": "Both Statement I and Statement II are true."}, {"id": "2", "text": "Both Statement I and Statement II are false."}, {"id": "3", "text": "Statement I is true but Statement II is false."}, {"id": "4", "text": "Statement I is false but Statement II is true."}], "correctAnswer": "3", "explanation": "**Detailed Explanation:** Statement I is entirely accurate; McLuhan theorized that the medium (e.g., print vs. TV vs. internet) structurally alters human perception and societal norms independently of the content. Statement II is a gross misinterpretation; McLuhan didn't mean the physical hardware is the only thing that matters, but rather that the *experience and format* of the medium shape our cognition more than the specific broadcasted show.", "id": 14}, {"question": "Arrange the elements of Harold Lasswell\u2019s linear model of communication in the correct sequential order:\nA. In Which Channel\nB. With What Effect\nC. Who\nD. To Whom\nE. Says What", "options": [{"id": "1", "text": "C, E, A, D, B"}, {"id": "2", "text": "C, A, E, D, B"}, {"id": "3", "text": "E, C, A, D, B"}, {"id": "4", "text": "C, E, D, A, B"}], "correctAnswer": "1", "explanation": "**Detailed Explanation:** Harold Lasswell's 1948 model is one of the most famous linear communication frameworks. It is structured as a series of questions: \"Who (C - Communicator) -> Says What (E - Message) -> In Which Channel (A - Medium) -> To Whom (D - Receiver) -> With What Effect (B - Effect).\" Therefore, the correct chronological sequence is C, E, A, D, B.", "id": 15}, {"question": "Match List I (Types of Noise/Barriers) with List II (Specific Example).\n**List I:** A. Physiological Noise, B. Channel/Physical Noise, C. Syntactic Noise, D. Cultural Noise\n**List II:** I. A speaker using incorrect grammar or abruptly changing sentence structures. II. A listener suffering from a severe migraine during a lecture. III. Static on a radio broadcast or poor internet bandwidth. IV. Misunderstanding a thumbs-up gesture in a foreign country.", "options": [{"id": "1", "text": "A-II, B-III, C-I, D-IV"}, {"id": "2", "text": "A-III, B-II, C-IV, D-I"}, {"id": "3", "text": "A-II, B-III, C-IV, D-I"}, {"id": "4", "text": "A-I, B-IV, C-III, D-II"}], "correctAnswer": "1", "explanation": "**Detailed Explanation:** Physiological noise (A) stems from the body, such as illness, fatigue, or a migraine (II). Channel/Physical noise (B) is environmental or technical interference, like static or bad Wi-Fi (III). Syntactic noise (C) occurs when grammatical errors or poor syntax disrupt meaning (I). Cultural noise (D) arises from differing cultural norms and symbols, like gesture misinterpretation (IV). Option 1 maps these accurately.", "id": 16}, {"question": "Consider the following statements regarding Chronemics (the study of time in communication):\n**Statement I:** Monochronic cultures view time as linear, sequential, and highly structured, prioritizing punctuality and completing one task at a time.\n**Statement II:** Polychronic cultures view time as fluid and circular, where multitasking is common, and interpersonal relationships are prioritized over strict adherence to schedules.", "options": [{"id": "1", "text": "Both Statement I and Statement II are true."}, {"id": "2", "text": "Both Statement I and Statement II are false."}, {"id": "3", "text": "Statement I is true but Statement II is false."}, {"id": "4", "text": "Statement I is false but Statement II is true."}], "correctAnswer": "1", "explanation": "**Detailed Explanation:** Both statements are true and accurately reflect Edward T. Hall's distinctions in cultural Chronemics. Monochronic cultures (like the US, Germany) treat time as a tangible commodity (\"time is money\"), favoring strict schedules. Polychronic cultures (like India, Latin America, Middle East) are highly flexible, viewing time as continuous and prioritizing human interactions over rigid deadlines.", "id": 17}, {"question": "Match List I (Educational Communication Terms) with List II (Definitions).\n**List I:** A. MOOC, B. Webinar, C. Podcast, D. LMS\n**List II:** I. A digital audio or video file available for downloading or streaming on demand. II. A synchronous, web-based seminar or presentation allowing live interaction. III. A software application used to administer, document, track, and deliver educational courses. IV. A free, online course accessible to large numbers of global participants.", "options": [{"id": "1", "text": "A-IV, B-II, C-I, D-III"}, {"id": "2", "text": "A-III, B-IV, C-II, D-I"}, {"id": "3", "text": "A-IV, B-I, C-II, D-III"}, {"id": "4", "text": "A-II, B-III, C-I, D-IV"}], "correctAnswer": "1", "explanation": "**Detailed Explanation:** MOOC stands for Massive Open Online Course, catering to global audiences (IV). A Webinar is a live, interactive web seminar (II). A Podcast is an episodic digital audio/video file for asynchronous consumption (I). LMS stands for Learning Management System (e.g., Moodle, Blackboard), used to host and track educational content (III). Option 1 provides the correct digital education mappings.", "id": 18}, {"question": "Consider the following statements regarding the concept of 'Silence' in communication:\n**Statement I:** In interpersonal communication, silence is considered a complete absence of communication, carrying zero informative or emotional value.\n**Statement II:** Strategic silence can be utilized as a powerful non-verbal tool to express anger, establish dominance, or emphasize a preceding verbal point.", "options": [{"id": "1", "text": "Both Statement I and Statement II are true."}, {"id": "2", "text": "Both Statement I and Statement II are false."}, {"id": "3", "text": "Statement I is true but Statement II is false."}, {"id": "4", "text": "Statement I is false but Statement II is true."}], "correctAnswer": "4", "explanation": "**Detailed Explanation:** Statement I is entirely false. In communication theory, \"one cannot not communicate.\" Silence is profoundly communicative and rarely means \"nothing.\" Statement II is true; silence is a potent non-verbal cue that can convey deep emotions (the \"silent treatment\"), demonstrate authority, encourage a speaker to continue, or provide dramatic effect after a key statement.", "id": 19}, {"question": "Arrange the following communication behaviors in a classroom according to their level of learner activity and cognitive engagement (from lowest/most passive to highest/most active):\nA. Participating in a peer-to-peer debate\nB. Passively listening to a traditional lecture\nC. Leading a student-driven collaborative project\nD. Asking a clarification question during a presentation", "options": [{"id": "1", "text": "B, A, D, C"}, {"id": "2", "text": "B, D, A, C"}, {"id": "3", "text": "D, B, A, C"}, {"id": "4", "text": "B, D, C, A"}], "correctAnswer": "2", "explanation": "**Detailed Explanation:** This relates to active vs. passive learning. The most passive form is just listening to a lecture without interacting (B). Asking a specific question requires slightly more engagement (D). Participating in a debate requires active formulation of arguments and responses (A). Leading a collaborative project requires the highest level of synthesis, leadership, and continuous multilateral communication (C). Thus, B -> D -> A -> C.", "id": 20}, {"question": "Consider the following statements on Interpersonal Communication:\n**Statement I:** Symmetrical relationships in communication are characterized by equality, where individuals mirror each other's behavior and power dynamics.\n**Statement II:** Complementary relationships are based on differences, where one individual's behavior (e.g., dominant) elicits a contrasting behavior (e.g., submissive) from the other.", "options": [{"id": "1", "text": "Both Statement I and Statement II are true."}, {"id": "2", "text": "Both Statement I and Statement II are false."}, {"id": "3", "text": "Statement I is true but Statement II is false."}, {"id": "4", "text": "Statement I is false but Statement II is true."}], "correctAnswer": "1", "explanation": "**Detailed Explanation:** Both statements are foundational principles of relational communication proposed by Paul Watzlawick. Symmetrical communication involves partners interacting as equals (e.g., two competitive peers). Complementary communication involves a maximization of differences, often falling into a superior/subordinate or teacher/student dynamic where one leads and the other follows. Both definitions are completely accurate.\n### Section C: Difficult / Analytical & Case-Based Application (30% = 9 Questions)\n*Focus: Assertion-Reasoning (A-R), Short Case Studies, Analytical application.*", "id": 21}, {"question": "Given below are two statements, one labeled as Assertion (A) and the other as Reason (R).\n**Assertion (A):** In the modern digital era, the traditional 'Gatekeeping' function of mass media has been largely replaced by algorithmic filtering on social media platforms.\n**Reason (R):** Algorithms prioritize content based strictly on journalistic ethics and factual accuracy rather than user engagement metrics.", "options": [{"id": "1", "text": "Both (A) and (R) are true, and (R) is the correct explanation of (A)."}, {"id": "2", "text": "Both (A) and (R) are true, but (R) is NOT the correct explanation of (A)."}, {"id": "3", "text": "(A) is true, but (R) is false."}, {"id": "4", "text": "(A) is false, but (R) is true."}], "correctAnswer": "3", "explanation": "**Detailed Explanation:** Assertion (A) is true; traditional human gatekeepers (editors) have been largely bypassed by algorithms that curate what news appears on a user's feed. However, Reason (R) is blatantly false. Social media algorithms are designed to maximize user engagement, retention, and ad revenue, often promoting sensational, emotionally charged, or polarizing content, rather than adhering to journalistic ethics or objective truth.", "id": 22}, {"question": "Case Study Application:\nA software development team in Bengaluru (a high-context, polychronic cultural setting) is collaborating remotely with a project manager in Germany (a low-context, monochronic cultural setting). The German manager sends a strict, detailed email outlining precise, uncompromising deadlines. The Indian team responds with a brief, vague acknowledgment and later misses the first deadline because they prioritized a sudden, critical bug fix in another module. The breakdown in communication is primarily caused by:", "options": [{"id": "1", "text": "Semantic noise due to language barriers."}, {"id": "2", "text": "A clash between monochronic adherence to schedules and polychronic flexibility."}, {"id": "3", "text": "The German manager's inability to use the correct technological channel."}, {"id": "4", "text": "Artifactic misinterpretation."}], "correctAnswer": "2", "explanation": "**Detailed Explanation:** This is a classic cross-cultural communication clash. Monochronic cultures (Germany) view time rigidly and expect exact adherence to scheduled tasks. Polychronic cultures (India) view time fluidly, easily shifting priorities based on immediate relationships or suddenly emerging problems (like the bug fix). The issue isn't language (Option 1) or technology (Option 3); it is the fundamental cultural difference in perceiving time and task priority.", "id": 23}, {"question": "Given below are two statements, one labeled as Assertion (A) and the other as Reason (R).\n**Assertion (A):** According to Leon Festinger's theory, individuals exhibit 'Selective Exposure' by actively seeking out media messages that align with their pre-existing beliefs.\n**Reason (R):** Selective exposure is an unconscious psychological defense mechanism used to avoid the mental discomfort known as Cognitive Dissonance.", "options": [{"id": "1", "text": "Both (A) and (R) are true, and (R) is the correct explanation of (A)."}, {"id": "2", "text": "Both (A) and (R) are true, but (R) is NOT the correct explanation of (A)."}, {"id": "3", "text": "(A) is true, but (R) is false."}, {"id": "4", "text": "(A) is false, but (R) is true."}], "correctAnswer": "1", "explanation": "**Detailed Explanation:** Assertion (A) is true; people consume news channels and social media that reflect their own political or social views. Reason (R) perfectly explains why: Cognitive Dissonance is the psychological stress experienced when holding contradictory beliefs or facing conflicting information. To avoid this stress, people selectively expose themselves to congruent information, validating (A) as the direct outcome of (R).", "id": 24}, {"question": "Case Study Application:\nIn a large university, the Vice-Chancellor issues an administrative memo stating, \"All faculty must improve the rigor of their student assessments.\" A senior professor interprets \"rigor\" as increasing the volume of subjective essay assignments, while a junior professor interprets \"rigor\" as implementing stricter negative marking on MCQs. Both act accordingly, leading to massive student confusion. This specific communication failure is an example of:", "options": [{"id": "1", "text": "Bypassing (a semantic barrier)"}, {"id": "2", "text": "Information Overload"}, {"id": "3", "text": "Group Polarization"}, {"id": "4", "text": "Media richness failure"}], "correctAnswer": "1", "explanation": "**Detailed Explanation:** \"Bypassing\" occurs when the sender and receiver miss each other in meaning because they use the exact same word but assign entirely different meanings to it. Here, the word \"rigor\" acted as a semantic block. The sender assumed a shared definition that did not exist. This is not about having too much information (Option 2) or channel issues (Option 4). It is a pure semantic failure.", "id": 25}, {"question": "Given below are two statements, one labeled as Assertion (A) and the other as Reason (R).\n**Assertion (A):** In Information Theory, increasing the 'Redundancy' of a message decreases its 'Entropy'.\n**Reason (R):** Redundancy introduces deliberate repetition and structural predictability, which counteracts noise and the uncertainty of the signal being received correctly.", "options": [{"id": "1", "text": "Both (A) and (R) are true, and (R) is the correct explanation of (A)."}, {"id": "2", "text": "Both (A) and (R) are true, but (R) is NOT the correct explanation of (A)."}, {"id": "3", "text": "(A) is true, but (R) is false."}, {"id": "4", "text": "(A) is false, but (R) is true."}], "correctAnswer": "1", "explanation": "**Detailed Explanation:** Assertion (A) is scientifically accurate in Claude Shannon's framework. Entropy is the measure of randomness, unpredictability, or noise in a message. Reason (R) correctly explains that Redundancy (repeating a message, using predictable grammar, or backup channels) lowers this unpredictability. By making the message highly predictable, redundancy ensures the receiver decodes it accurately, effectively neutralizing entropy.", "id": 26}, {"question": "Case Study Application:\nDuring a heated classroom debate regarding climate change, a student aggressively challenges the teacher's data, raising their voice. Instead of silencing the student or invoking authority, the teacher maintains eye contact, nods slowly, lets the student finish, and responds calmly, \"I understand you feel very strongly about this dataset, let's look at the methodology together.\" The teacher is actively utilizing which communication strategy to de-escalate?", "options": [{"id": "1", "text": "Authoritarian gatekeeping"}, {"id": "2", "text": "Cognitive restructuring"}, {"id": "3", "text": "Empathic listening and immediacy behaviors"}, {"id": "4", "text": "Semantic filtering"}], "correctAnswer": "3", "explanation": "**Detailed Explanation:** The teacher is employing Empathic Listening (seeking to understand the student's emotional state and perspective) combined with non-verbal Immediacy Behaviors (eye contact, nodding, calm tone) which bridge psychological distance. This approach validates the student's right to speak without validating aggression, effectively de-escalating the conflict. Authoritarian gatekeeping (Option 1) would involve shutting the student down.", "id": 27}, {"question": "Given below are two statements, one labeled as Assertion (A) and the other as Reason (R).\n**Assertion (A):** According to Elisabeth Noelle-Neumann\u2019s 'Spiral of Silence' theory, mass media has a minimal impact on shaping public opinion.\n**Reason (R):** People who perceive their views to be in the minority are highly likely to conceal their opinions due to an innate fear of social isolation.", "options": [{"id": "1", "text": "Both (A) and (R) are true, and (R) is the correct explanation of (A)."}, {"id": "2", "text": "Both (A) and (R) are true, but (R) is NOT the correct explanation of (A)."}, {"id": "3", "text": "(A) is true, but (R) is false."}, {"id": "4", "text": "(A) is false, but (R) is true."}], "correctAnswer": "4", "explanation": "**Detailed Explanation:** Assertion (A) is false. The 'Spiral of Silence' theory posits that mass media has a *massive* impact on shaping public opinion because it dictates what is perceived as the majority view. Reason (R), however, is true and forms the core of the theory: individuals fear social isolation, so if they feel the media portrays their opinion as the minority, they remain silent. The silence of the minority makes the majority look even larger, accelerating the spiral.", "id": 28}, {"question": "Given below are two statements, one labeled as Assertion (A) and the other as Reason (R).\n**Assertion (A):** Marshall McLuhan classified Television and Film as 'Hot Media'.\n**Reason (R):** Hot media provide high-definition data that completely fills the senses, requiring very little active cognitive participation or imagination from the audience to complete the picture.", "options": [{"id": "1", "text": "Both (A) and (R) are true, and (R) is the correct explanation of (A)."}, {"id": "2", "text": "Both (A) and (R) are true, but (R) is NOT the correct explanation of (A)."}, {"id": "3", "text": "(A) is true, but (R) is false."}, {"id": "4", "text": "(A) is false, but (R) is true."}], "correctAnswer": "4", "explanation": "**Detailed Explanation:** Assertion (A) is false because McLuhan actually classified Television as a 'Cold Medium' (low definition, requiring the viewer to actively fill in the gaps and participate mentally), while Film was classified as a 'Hot Medium'. Reason (R), however, is the perfectly correct definition of a 'Hot Medium' (like print or radio), which provides so much data that it requires low audience participation. Because A classifies TV incorrectly, A is false, but R is true.", "id": 29}, {"question": "Case Study Application:\nA postgraduate student preparing for a highly competitive national exam realizes they learn better through visual aids than text. Instead of reading standard textbooks, they intentionally curate a playlist of specific YouTube educators who use animations and mind maps, strictly to satisfy their cognitive needs for exam preparation. Which mass communication theory best explains this user-driven media consumption?", "options": [{"id": "1", "text": "Two-Step Flow Theory"}, {"id": "2", "text": "Cultivation Theory"}, {"id": "3", "text": "Agenda-Setting Theory"}, {"id": "4", "text": "Uses and Gratifications Theory"}], "correctAnswer": "4", "explanation": "**Detailed Explanation:** The Uses and Gratifications (U&G) Theory flips traditional media models. Instead of asking \"what media does to people,\" it asks \"what people do with media.\" It posits that audiences are highly active and purposefully seek out specific media platforms and content to fulfill their specific psychological, social, or educational needs. The student actively seeking animated videos for study directly exemplifies this theory.\nWould you like me to create Mock Test 4 based on another Paper 1 unit next?", "id": 30}]};

        marked.setOptions({ breaks: true, gfm: true });

        const Icons = {
            Menu: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>,
            User: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            Alert: () => <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ef4444" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>,
            Printer: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>,
            Info: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>,
            Pause: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>,
            Play: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        };

        const DonutChart = ({ percentage, color, label }) => (
            <div className="flex flex-col items-center print-break-avoid">
                <svg viewBox="0 0 36 36" className="circular-chart w-28 h-28 mb-3">
                    <path className="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    <path className="circle" stroke={color} strokeDasharray={`${percentage}, 100`} d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    <text x="18" y="20.5" textAnchor="middle" className="text-3xl font-black fill-slate-800" style={{fontSize: "9px"}}>{percentage}%</text>
                </svg>
                <span className="font-bold text-slate-500 uppercase tracking-widest text-xs">{label}</span>
            </div>
        );

        const App = () => {
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [answers, setAnswers] = useState({}); 
            const [status, setStatus] = useState({});   
            const [timeLeft, setTimeLeft] = useState(TEST_DATA.durationMinutes * 60);
            const [isSubmitted, setIsSubmitted] = useState(false);
            const [isPaletteOpen, setIsPaletteOpen] = useState(false);
            const [isPaused, setIsPaused] = useState(false); 
            const [warnings, setWarnings] = useState(0);
            const [showWarning, setShowWarning] = useState(false);

            useEffect(() => {
                if (!TEST_DATA.strictMode || isSubmitted) return;
                const handleVisibility = () => {
                    if (document.hidden) {
                        setWarnings(w => w + 1);
                        setShowWarning(true);
                    }
                };
                document.addEventListener("visibilitychange", handleVisibility);
                return () => document.removeEventListener("visibilitychange", handleVisibility);
            }, [isSubmitted]);

            useEffect(() => {
                const initStatus = {};
                TEST_DATA.questions.forEach((q, i) => { initStatus[q.id] = i === 0 ? 'not_answered' : 'not_visited'; });
                setStatus(initStatus);
            }, []);

            useEffect(() => {
                if (isSubmitted || isPaused) return; 
                const timer = setInterval(() => {
                    setTimeLeft(prev => {
                        if (prev <= 0) { handleSubmit(true); return 0; }
                        return prev - 1;
                    });
                }, 1000);
                return () => clearInterval(timer);
            }, [isSubmitted, isPaused]); 

            const formatTime = (seconds) => {
                const h = Math.floor(seconds / 3600);
                const m = Math.floor((seconds % 3600) / 60);
                const s = seconds % 60;
                return `${h > 0 ? h + ':' : ''}${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            };

            const advanceQuestion = () => {
                if (currentQIndex < TEST_DATA.questions.length - 1) {
                    const nextQ = TEST_DATA.questions[currentQIndex + 1];
                    if (status[nextQ.id] === 'not_visited') setStatus(prev => ({ ...prev, [nextQ.id]: 'not_answered' }));
                    setCurrentQIndex(prev => prev + 1);
                }
            };

            const handleOptionSelect = (optId) => {
                if(isPaused) return;
                setAnswers(prev => ({ ...prev, [TEST_DATA.questions[currentQIndex].id]: optId }));
            };

            const handleSaveAndNext = () => {
                if(isPaused) return;
                const cid = TEST_DATA.questions[currentQIndex].id;
                setStatus(prev => ({ ...prev, [cid]: answers[cid] ? 'answered' : 'not_answered' }));
                advanceQuestion();
            };

            const handleMarkForReview = () => {
                if(isPaused) return;
                const cid = TEST_DATA.questions[currentQIndex].id;
                setStatus(prev => ({ ...prev, [cid]: answers[cid] ? 'marked_answered' : 'marked' }));
                advanceQuestion();
            };

            const handleClearResponse = () => {
                if(isPaused) return;
                const cid = TEST_DATA.questions[currentQIndex].id;
                setAnswers(prev => { const newAns = { ...prev }; delete newAns[cid]; return newAns; });
                setStatus(prev => ({ ...prev, [cid]: 'not_answered' }));
            };

            const handlePaletteClick = (index) => {
                if(isPaused) return;
                const cid = TEST_DATA.questions[currentQIndex].id;
                if (status[cid] === 'not_visited' || (status[cid] === 'not_answered' && !answers[cid])) {
                    setStatus(prev => ({ ...prev, [cid]: 'not_answered' }));
                }
                const tid = TEST_DATA.questions[index].id;
                if (status[tid] === 'not_visited') setStatus(prev => ({ ...prev, [tid]: 'not_answered' }));
                setCurrentQIndex(index);
                setIsPaletteOpen(false); 
            };

            const handleSubmit = (auto = false) => {
                if (auto || confirm("Are you sure you want to submit the test? No changes can be made after submission.")) {
                    setIsSubmitted(true);
                    setIsPaused(false);
                }
            };

            const counts = useMemo(() => {
                const c = { answered: 0, not_answered: 0, marked: 0, marked_answered: 0, not_visited: 0 };
                Object.values(status).forEach(s => { if (c[s] !== undefined) c[s]++; });
                return c;
            }, [status]);

            // =====================================
            // RESULT SCREEN
            // =====================================
            if (isSubmitted) {
                let score = 0, correct = 0, wrong = 0;
                TEST_DATA.questions.forEach(q => {
                    if (answers[q.id] === q.correctAnswer) { score += TEST_DATA.marksForCorrect; correct++; } 
                    else if (answers[q.id]) { score -= TEST_DATA.marksForWrong; wrong++; }
                });

                const attempted = correct + wrong;
                const accuracy = attempted > 0 ? Math.round((correct / attempted) * 100) : 0;
                const percentage = Math.max(0, Math.round((score / TEST_DATA.totalMarks) * 100));
                const isPass = percentage >= TEST_DATA.passPercentage;

                return (
                    <div className="h-full overflow-y-auto p-4 md:p-8 print:p-0 bg-slate-50 print:bg-white print:h-auto print:overflow-visible">
                        <div className="max-w-5xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100 print-border-none print:shadow-none">
                            
                            {/* Result Header */}
                            <div className="bg-blue-600 text-white p-10 relative print:text-slate-900 print:bg-white print:border-b-2 print:border-slate-300 print:p-0 print:mb-8">
                                <div className="absolute top-0 right-0 w-64 h-64 bg-white opacity-5 rounded-full -mt-20 -mr-20 blur-2xl print-hidden"></div>
                                <div className="flex flex-col md:flex-row justify-between items-center gap-6 relative z-10 print:flex-row print:items-start">
                                    <div className="text-center md:text-left">
                                        <h1 className="text-4xl font-extrabold mb-2 tracking-tight">Performance Report</h1>
                                        <p className="opacity-90 font-semibold text-lg">{TEST_DATA.title}</p>
                                        <p className="opacity-70 text-sm mt-1">{TEST_DATA.organization}</p>
                                    </div>
                                    <div className="flex gap-6 items-center">
                                        {/* Fixed Badge Layout: Text Left, Icon Right */}
                                        <div className={`px-6 py-4 rounded-2xl border-2 backdrop-blur-md print:border-2 print:bg-transparent flex items-center justify-between gap-6 min-w-[200px] ${isPass ? 'bg-green-500/20 border-green-400 print:border-green-600 print:text-green-700' : 'bg-red-500/20 border-red-400 print:border-red-600 print:text-red-700'}`}>
                                            <div className="text-left">
                                                <div className="text-[10px] uppercase tracking-widest font-bold opacity-80 mb-0.5">Final Status</div>
                                                <div className="text-2xl font-black leading-none">{isPass ? 'PASSED' : 'FAILED'}</div>
                                            </div>
                                            <div className="text-4xl leading-none">{isPass ? '🎉' : '❌'}</div>
                                        </div>
                                    </div>
                                </div>
                                <button onClick={() => window.print()} className="print-hidden absolute right-6 top-6 bg-white/20 hover:bg-white/30 text-white px-5 py-2.5 rounded-full font-bold transition shadow-lg backdrop-blur-sm flex items-center gap-2">
                                    <Icons.Printer/> Save PDF
                                </button>
                            </div>

                            {/* Analytics Grid */}
                            <div className="p-10 grid grid-cols-1 md:grid-cols-3 gap-8 border-b border-slate-100 bg-slate-50/50 print:bg-white print:border-b-0 print-break-avoid">
                                <DonutChart percentage={percentage} color="#2563eb" label="Score Percentage" />
                                <DonutChart percentage={accuracy} color="#10b981" label="Accuracy" />
                                <div className="flex flex-col justify-center space-y-4">
                                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center print:border-slate-300">
                                        <span className="text-slate-500 font-bold">Total Marks</span>
                                        <span className="text-3xl font-black text-blue-600">{score} <span className="text-lg text-slate-400 font-bold">/ {TEST_DATA.totalMarks}</span></span>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-green-50 p-4 rounded-2xl border border-green-100 text-center print:border-slate-300 print:bg-white">
                                            <div className="text-green-600 text-3xl font-black">{correct}</div>
                                            <div className="text-xs font-bold text-green-700 uppercase mt-1">Correct</div>
                                        </div>
                                        <div className="bg-red-50 p-4 rounded-2xl border border-red-100 text-center print:border-slate-300 print:bg-white">
                                            <div className="text-red-600 text-3xl font-black">{wrong}</div>
                                            <div className="text-xs font-bold text-red-700 uppercase mt-1">Wrong</div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Detailed Solutions */}
                            <div className="p-6 md:p-10">
                                <h2 className="text-2xl font-extrabold text-slate-800 mb-8 flex items-center gap-3 border-b border-slate-200 pb-4">
                                    Detailed Solutions
                                </h2>
                                <div className="space-y-8">
                                    {TEST_DATA.questions.map((q, i) => {
                                        const userAns = answers[q.id];
                                        const isCorrect = userAns === q.correctAnswer;
                                        const isSkipped = !userAns;
                                        let borderColor = isCorrect ? 'border-green-500' : (isSkipped ? 'border-slate-300' : 'border-red-500');
                                        let bgClass = isCorrect ? 'bg-green-50/50' : (isSkipped ? 'bg-white' : 'bg-red-50/50');

                                        return (
                                            <div key={q.id} className={`border-l-8 ${borderColor} ${bgClass} p-6 rounded-2xl shadow-sm border border-slate-100 print-break-avoid print:border print:border-l-8 print:shadow-none`}>
                                                <div className="flex gap-4 mb-6">
                                                    <span className="font-black text-slate-400 text-xl">Q{i+1}.</span>
                                                    <div className="flex-1 text-slate-800 markdown-body text-[16px]" dangerouslySetInnerHTML={{ __html: marked.parse(q.question) }}></div>
                                                </div>
                                                <div className="ml-10 space-y-3 mb-6">
                                                    {q.options.map(opt => {
                                                        const isUserOpt = opt.id === userAns;
                                                        const isCorrectOpt = opt.id === q.correctAnswer;
                                                        
                                                        let optClass = "text-slate-600 bg-white border-slate-200";
                                                        let icon = "○";
                                                        if (isCorrectOpt) { optClass = "text-green-800 bg-green-100 border-green-300 font-bold"; icon = "✓"; }
                                                        else if (isUserOpt) { optClass = "text-red-700 bg-red-100 border-red-300 line-through"; icon = "✗"; }

                                                        return (
                                                            <div key={opt.id} className={`flex items-start gap-3 p-3 rounded-xl border ${optClass} print:bg-transparent print:border-slate-300`}>
                                                                <span className="mt-0.5 font-bold">{icon}</span>
                                                                <div className="markdown-body" style={{marginBottom: 0}} dangerouslySetInnerHTML={{ __html: marked.parseInline(opt.text) }}></div>
                                                            </div>
                                                        )
                                                    })}
                                                </div>
                                                {q.explanation && (
                                                    <div className="ml-10 p-5 bg-blue-50/50 rounded-xl border border-blue-100 print:bg-slate-50 print:border-slate-200">
                                                        <strong className="block mb-2 flex items-center gap-2 text-blue-700"><Icons.Info/> Expert Explanation:</strong>
                                                        <div className="markdown-body text-sm text-slate-700" dangerouslySetInnerHTML={{ __html: marked.parse(q.explanation) }}></div>
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            const currentQuestion = TEST_DATA.questions[currentQIndex];

            // TEST INTERFACE
            return (
                <div className="flex flex-col h-full bg-slate-50 relative">
                    
                    {/* Strict Mode Warning */}
                    {showWarning && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-white p-8 rounded-3xl shadow-2xl max-w-md text-center border-2 border-red-500">
                                <div className="w-20 h-20 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4 animate-bounce"><Icons.Alert /></div>
                                <h2 className="text-2xl font-black text-slate-800 mb-2">Warning Recorded!</h2>
                                <p className="text-slate-600 mb-6 font-medium">You switched tabs or minimized the window. (Warning {warnings})</p>
                                <button onClick={() => setShowWarning(false)} className="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-4 rounded-full shadow-lg transition transform active:scale-95 text-lg">I Understand</button>
                            </div>
                        </div>
                    )}

                    {/* Pause Overlay */}
                    {isPaused && (
                        <div className="fixed inset-0 z-[90] bg-white/80 backdrop-blur-md flex flex-col items-center justify-center p-4">
                            <div className="bg-white p-10 rounded-3xl shadow-2xl border border-slate-200 text-center max-w-sm w-full">
                                <div className="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-6"><Icons.Pause /></div>
                                <h2 className="text-3xl font-black text-slate-800 mb-3">Test Paused</h2>
                                <button onClick={() => setIsPaused(false)} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-full shadow-lg transition transform active:scale-95 flex items-center justify-center gap-3 text-lg">
                                    <Icons.Play /> Resume Test
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Navbar */}
                    <header className="glass-nav border-b border-slate-200 h-20 flex items-center justify-between px-6 z-20 sticky top-0 shadow-sm">
                        <div className="flex items-center gap-4">
                            <div className="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center shadow-lg shadow-blue-600/30 text-white font-black text-xl">E</div>
                            <div className="hidden sm:block">
                                <h1 className="font-extrabold text-lg text-slate-800 leading-tight">{TEST_DATA.organization}</h1>
                                <p className="text-xs text-slate-500 font-medium truncate max-w-[200px]">{TEST_DATA.title}</p>
                            </div>
                        </div>
                        <div className="absolute left-1/2 top-1/2 transform -translate-x-1/2 -translate-y-1/2 flex items-center">
                            <div className="flex items-center bg-white rounded-full border border-slate-200 p-1 shadow-sm overflow-hidden">
                                <div className="px-4 py-1.5 bg-slate-100 rounded-full text-xs font-bold text-slate-500 flex items-center gap-2">
                                    <span className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> LIVE
                                </div>
                                <div className="px-6 font-mono font-black text-xl text-blue-600 tracking-widest">{formatTime(timeLeft)}</div>
                            </div>
                        </div>
                        <div className="flex items-center gap-3">
                            {!isPaused && !isSubmitted && (
                                <button onClick={() => setIsPaused(true)} className="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-600 hover:bg-slate-200 hover:text-blue-600 transition" title="Pause Test"><Icons.Pause /></button>
                            )}
                            <div className="hidden md:flex items-center gap-3 pl-3 border-l border-slate-200">
                                <div className="w-10 h-10 rounded-full bg-gradient-to-r from-blue-400 to-indigo-500 p-0.5 shadow-md">
                                    <div className="w-full h-full bg-white rounded-full flex items-center justify-center text-slate-800"><Icons.User /></div>
                                </div>
                            </div>
                            <button className="md:hidden w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-600" onClick={() => setIsPaletteOpen(!isPaletteOpen)}><Icons.Menu /></button>
                        </div>
                    </header>

                    {/* Main Layout */}
                    <div className="flex-1 flex overflow-hidden relative">
                        <div className={`flex-1 flex flex-col w-full transition-all duration-300 ${isPaused ? 'blur-content' : ''}`}>
                            <div className="flex-1 overflow-y-auto p-4 md:p-8 lg:p-12">
                                <div className="max-w-4xl mx-auto bg-white rounded-3xl p-8 shadow-sm border border-slate-100">
                                    <div className="flex justify-between items-center mb-8 pb-4 border-b border-slate-100">
                                        <div className="flex items-center gap-3">
                                            <span className="bg-blue-600 text-white px-5 py-2 rounded-full text-sm font-black shadow-md shadow-blue-600/20">Question {currentQIndex + 1}</span>
                                        </div>
                                        <div className="flex gap-2">
                                            <span className="bg-green-50 text-green-600 px-4 py-1.5 rounded-full text-xs font-bold border border-green-200">+{TEST_DATA.marksForCorrect}</span>
                                            <span className="bg-red-50 text-red-600 px-4 py-1.5 rounded-full text-xs font-bold border border-red-200">-{TEST_DATA.marksForWrong}</span>
                                        </div>
                                    </div>
                                    <div className="text-[17px] text-slate-800 markdown-body mb-8 leading-relaxed" dangerouslySetInnerHTML={{ __html: marked.parse(currentQuestion.question) }}></div>
                                    <div className="space-y-4">
                                        {currentQuestion.options.map(opt => {
                                            const isSelected = answers[currentQuestion.id] === opt.id;
                                            return (
                                                <div key={opt.id} onClick={() => handleOptionSelect(opt.id)} className={`group relative p-5 rounded-2xl cursor-pointer flex items-center gap-5 transition-all duration-200 border-2 ${isSelected ? 'border-blue-600 bg-blue-50/50 shadow-sm option-selected' : 'border-slate-200 hover:border-blue-300 hover:bg-slate-50'}`}>
                                                    <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center flex-shrink-0 custom-radio ${isSelected ? 'border-blue-600 bg-white' : 'border-slate-300 group-hover:border-blue-400'}`}></div>
                                                    <div className="text-slate-700 font-medium markdown-body flex-1 text-[16px]" style={{marginBottom:0}} dangerouslySetInnerHTML={{ __html: marked.parseInline(opt.text) }}></div>
                                                </div>
                                            )
                                        })}
                                    </div>
                                </div>
                            </div>
                            <div className="glass-nav border-t border-slate-200 p-5 md:px-12 flex items-center justify-between z-10">
                                <div className="flex gap-3">
                                    <button onClick={handleMarkForReview} className="px-6 py-3.5 bg-purple-50 text-purple-700 hover:bg-purple-100 rounded-full font-bold text-sm transition border border-purple-200"><span className="hidden md:inline">Mark for Review</span><span className="md:hidden">Review</span></button>
                                    <button onClick={handleClearResponse} className="px-6 py-3.5 bg-slate-100 text-slate-600 hover:bg-slate-200 rounded-full font-bold text-sm transition">Clear</button>
                                </div>
                                <button onClick={handleSaveAndNext} className="px-8 py-3.5 bg-blue-600 hover:bg-blue-700 text-white rounded-full font-black text-sm shadow-lg shadow-blue-600/30 transition transform active:scale-95 flex items-center gap-2">Save & Next <span className="text-xl leading-none">→</span></button>
                            </div>
                        </div>

                        {/* Sidebar Palette */}
                        <div className={`absolute inset-y-0 right-0 w-[320px] bg-white shadow-2xl transform transition-transform duration-300 z-30 flex flex-col border-l border-slate-200 ${isPaletteOpen ? 'translate-x-0' : 'translate-x-full'} md:translate-x-0 md:relative`}>
                            <div className="p-5 border-b border-slate-100 flex items-center gap-4 bg-slate-50">
                                <div className="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center text-blue-600"><Icons.User /></div>
                                <div><div className="font-bold text-slate-800">Candidate</div><div className="text-xs text-slate-500">{TEST_DATA.organization} Student</div></div>
                                <button className="ml-auto md:hidden text-slate-400" onClick={() => setIsPaletteOpen(false)}>✕</button>
                            </div>
                            <div className="p-5 grid grid-cols-2 gap-4 text-xs font-semibold border-b border-slate-100">
                                <div className="flex items-center gap-2 text-slate-600"><div className="w-3 h-3 rounded-full bg-[#10b981]"></div> Answered ({counts.answered})</div>
                                <div className="flex items-center gap-2 text-slate-600"><div className="w-3 h-3 rounded-full bg-[#ef4444]"></div> Not Ans ({counts.not_answered})</div>
                                <div className="flex items-center gap-2 text-slate-600"><div className="w-3 h-3 rounded-full bg-[#8b5cf6]"></div> Marked ({counts.marked + counts.marked_answered})</div>
                                <div className="flex items-center gap-2 text-slate-600"><div className="w-3 h-3 rounded-full border-2 border-slate-300 bg-slate-50"></div> Unvisited ({counts.not_visited})</div>
                            </div>
                            <div className="flex-1 overflow-y-auto p-5">
                                <div className="font-bold text-slate-700 mb-4 text-sm">Question Navigation:</div>
                                <div className="grid grid-cols-5 gap-2.5">
                                    {TEST_DATA.questions.map((q, idx) => (
                                        <button key={q.id} onClick={() => handlePaletteClick(idx)} className={`h-11 w-full flex items-center justify-center font-bold text-sm rounded-xl transition shadow-sm border ${currentQIndex === idx ? 'current-question' : 'border-transparent'} status-${status[q.id]}`}>{idx + 1}</button>
                                    ))}
                                </div>
                            </div>
                            <div className="p-5 border-t border-slate-100 bg-white">
                                <button onClick={() => handleSubmit(false)} className="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black py-4 rounded-2xl shadow-lg shadow-emerald-500/20 transition transform active:scale-95 text-lg">Submit Final Test</button>
                            </div>
                        </div>
                    </div>
                    {isPaletteOpen && <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-20 md:hidden" onClick={() => setIsPaletteOpen(false)}></div>}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
